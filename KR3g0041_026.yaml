body:
  text: 星學大成卷二十六明萬民英撰殿駕五星碧玉真經序碧玉真經星家精要余取而讀之見其道理通隂陽之運格局盡星曜之變其㫖㣲其言邃未易以淺近窺也近世編註圖例破碎支離弗得作者之意余甚病焉因暇日詳閲融㑹其義為之註解雖未能盡合作者之意而隂陽之運星曜之變亦庶㡬窺其端云易水育吾子識殿駕五星碧玉真經人為萬物之靈覆載莫逃乎天地命禀有生之初災祥實係乎星辰使其數少或有虧則於人將何所頼吕望白頭為釣叟時未來兮子竒髫稚秉鈞衡命使然也凡觀星者以本源為上而論格者以殿駕為先本或有差末將何補使一星背而難救其非縱羣曜吉而莫能為福或吉星入命而本主卑㣲縱青衫入手而身隨幻化解曰凡觀星者以本源為上論格者以殿駕為先二句乃碧玉經之綱領故論五星以命主身主為上又須坐殿駕合格局為貴然二主所屬有淺深之不同宫度有偏正之或異苟或考究不真其本亂矣詳究其末亦何補哉故命主虛虧身主陷弱恩星失躔隂陽反背是一星背也何以自救其非縱羣曜皆吉如入垣乘旺之類亦屬閑辰所以莫能為福也或羣曜有吉星入命而身命主却虛虧陷弱是其本已卑㣲雖得榮名豈能常享可見論星者當以本源為上也水居雙女惟癸與巳酉丑之人木入雙魚乃甲見申子辰之命亥卯未逢丁而火居卯位寅午戌見庚而金守辰宫惟餘戊巳生人喜見土居丑位雖見此五星之入格亦湏滿三用而入垣遇此者何皆能為貴金入酉火居戌木臨寅水居申此乃偏垣匪為正局此曜若居本位終身亦作貴人此首言五星入垣乘旺為本源之要也上五句乃五行各歸本垣與當生嵗干合氣更地支扶助上則為貴顯科名次則為財富福夀滿三用者命主星入垣又属仁元馬元禄元之類或以之為恩為用謂之三元並駕禄又加官是也盖格局髙竒而又滿此三用無有不貴顯者金入酉四句亦是五星入垣但此以偏垣言固雖不如前格局之髙然五星既居本垣亦不失為貴人也星家以子丑二宫屬土寅亥屬木夘戌屬火辰酉屬金申巳屬水然何以丑亥夘辰巳為土木火金水之正垣而以子寅申酉戌為偏垣者何説亥乃木之専主夘乃火之自出丑乃土之正位辰藏三宿獨亢居中巳屬東南萬派統㑹故此五宫為正垣寅木火相兼戌火土各半申水土並行酉無金宿子屬坎宫是五者不得獨専其柄故為偏垣一云殿者當年天干也駕者地支也本源者命主也天生地成陽施隂受合而為人其氣相通而理亦相貫吾之命主歸窠更與天干同垣地支扶局是謂得天地之正氣方為正局又必滿三用而後為貴若空自歸垣無殿駕以㑹合之其氣尚與天地不相貫故目之曰偏垣亦通火到金宫金受傷金入火鄉金受制火居水位火神無氣木入金宫木星有虧水化伏尸遇太陽豈為惡曜木逢地刼逢羅㬋變作吉星土埋雙女見炁非凶金騎人馬遇土則吉有救皆善無助則凶此繼言五星落陷受傷而生尅制化不可以一律言也五行皆喜生而惡尅故五星所躔之宫亦然然必無救解者乃為凶論有救解者反是水居戍宫化為伏尸本怒也遇太陽之尊水喜依輔火不敢争所以不為忌木逢子位名為地刼本凶也遇羅㬋之火水生火火轉生土所以不為傷土埋雙女土尅水也有炁為柔曜以和解之而又能制土之剛故水不受傷金騎人馬木傷金也有土為恩星以生旺之而又能培木之根故金為有救盖五星生尅乃其常理而制化之妙方成造化學者宜詳察之水逢月孛非夭則刑金遇羅㬋匪傷則折紫木豈宜同舎水火不可同居若匪傷身亦湏破病此以五星生尅制化無救者言也水逢孛木遇炁者元氣脱也金遇羅火同水者尅戰勝也皆主刑夭折傷尤當審時令宫分分向背往來㫁之木先交逢熒而易脱火先入遇木而有輝使炁木無土則易失於偏枯金火朝陽則不成其戰尅木行遲火行疾木先火後則火勢炎而易為煨燼火先木後則火勢緩而漸有光輝炁能泄木有土則木得栽培故不失於偏枯火能尅金朝陽則火氣降伏故不成其戰尅可見行度分先後而吉凶頓異同宫遇助伏而生尅則殊在觀星者審之木到大梁翻作咎月居閑極反為祥木本善星能作福也惟到大梁則怒翻為凶論閑極弱宫不得力也惟身主居之則喜反作祥言又云木怒大梁月喜閑極然其中又有得失之辯假如午丑安命則大梁之木反謂鬼星入弱戌亥安命則閑極之月反謂安身傍鬼不可不知隂陽失位必定為災金木反盈豈能邀福隂陽身命之主宰日到日垣月升月殿則得位矣如使晝生日在子之危酉之畢月在午之星夘之房是失位也則命本不立必定為災金木仁義之吉宿金居金度木歸木經則滿盈矣如使金木同宫金躔井角斗奎木躔鬼亢牛婁是反盈也有如同室之人各乖其所豈能邀福既濟尤防於未濟得經尤慮於失經彼此貴乎相應首尾懼乎相傷若相刑相尅則處世多迍相順相和則終身安静此數句總結上文之意也彼此分兩星而言首尾總一星而言彼此句應既濟首尾句應得經盖謂此之既濟尤防於彼之未濟首而得經尤慮於尾而失經假如金躔辰宫入垣為既濟矣若三合對照遇土計則相應是濟中之濟者也若三合對照遇火羅則不應是濟中之未濟者也彼此貴乎相應如金躔亢為得經於首矣若當夏令干音時日屬火是不能全於尾矣故首尾懼乎相傷相應則和而順終身安静相傷則刑而尅處世多迍學者當詳究之他來刑我我居廟旺亦何妨我若賴他他既休囚而何濟此以五星生尅制化而論廟旺休囚也廟者入垣局也旺者得時令也休囚者反此凡觀命者二主之外當視恩難之廟旺休囚假如寅宫立命木入垣而春生縱有刑來刑我我何患焉如木失陷而夏生當藉水以濟而水源夏絶將焉賴之餘倣此所喜者官魁福禄所忌者暗耗刑囚若往者吉來者凶則始焉成而終焉敗此以十干化曜言也官魁福禄曜之吉者命之所喜暗耗刑囚曜之凶者命之所忌若先入者吉後至者凶則始焉值吉而成終焉值凶而敗矣若先入者凶後至者吉反此官魁拱命當膺孟子之萬鍾福禄夾身可比石崇之巨富左右吉星最喜拱主前後忌曜尤忌傷身刑囚拱夾雖韓信難免遭刑暗煞加臨縱龎㳙焉能迯命此承上文而歸重於身命也言官魁彰顯而拱命又必受拱者之廟旺得以享其重禄福禄垣窠而夾身又必受夾者之髙强得以任其巨富夫左右吉星既最喜于拱主而前後忌曜尤切忌乎傷身刑囚拱夾必主弱而鬼强暗煞加臨復凶難而㑹煞如此則難免韓龎之禍矣福禄夾身為上客隂陽拱命豈凡夫計孛往來尤恐傷夀火羅反背是豈為災此六句舉官福隂陽就其吉星之重者而言之舉火羅計孛就其凶星之剛者而言之然福禄不夾身隂陽不拱命亦為無用計孛不往來亦不大害火羅非反背乃始為災也往來者此往而彼來假如孛角十計亢四命主在亢初孛順往而計逆來前後夾廹必然傷夀反背者相反而背去假如羅角五火亢八命主在角十二羅往西而火行東金雖在中而火羅反背不能為災也煞前主後當膺藩輔之權煞後主前必有徒流之患煞星入命是豈為煞刑曜傷身惟其自刑身命坐煞煞本為榮本主逢官官能遷轉此條以煞與命對㸔亦承上文火羅計孛而言之蓋煞星各就命宫論在十一曜俱有然火羅計孛其煞尤為利害若煞在主前而其主强權膺藩輔煞在主後而其主輕患配徒流亦如子平身强煞淺假煞為權煞重身輕終身有損之意也但子平以輕重言此以前後言耳煞星入命安可就以煞論湏身命陷弱方能為煞故云自刑也是知身命兩宫在髙强而坐煞則煞為我用而本為榮身命二主逢官禄而㑹煞則官以煞顯而能遷轉假如子宫安命以土為主以卯為官以木為煞土在卯火木亦在卯木生火火生土豈不威顯五七賦云催官天馬太嵗吊合煞方遷調是也舊説煞前主後者如亥命金在戌木在子反此是為煞後主前愚謂前後者歴家右算之前後也先别主煞二星所行之遲疾留退次察主煞之衰旺向背而後可以言吉凶假如水月為命主在前土計為難星在後是煞後主前凶矣然水月行疾土計行遲則後者不及於前不可以凶論也又如火為命主在後水為煞在前是煞前主後吉矣適水躔留退火星順行則前者返傷於後此又不可以吉言也且其中又有衰旺見伏者存焉觀星者不可以一例論隂陽拱帝座當為朝省正郎日月夾垣城便是廟堂宰輔帝座命之時支垣城命之日支人命重乎日時故日月拱夾皆貴然日之比時尤為𦂳要而夾之比拱尤為親切故其貴有小大而其近君則一也官忌囚星之反集魁防暗曜以相侵如禄星變作刑星是吉曜反為凶曜官非魁星莫誘其進禄由官主始見其榮是必相資而後成雖欲缺一而不可官魁當年之吉曜囚暗當年之化曜也囚集官則官受辱暗侵魁則魁無光是固命之所當忌防者也如官禄主變作刑星是吉曜反為凶曜官待魁而進是官魁相倚也禄由官而榮是官禄相湏也蓋人命有官無魁有官無禄亦焉能以有成也爵星助禄當為顯貴吉人禄主隨官便是榮華上客福喜居於福地禄宜坐於禄宫一世無災終身有慶福居禄地福日見於川增禄入福宫禄時聞於山峙星若無於駁雜夀俾見於熾昌爵者地元爵禄者天元禄爵星助禄則禄益豐禄主隨官則官愈美所以俱榮顯也福者福德主也禄者官禄主也福居福禄居禄是各居本垣固終身有慶福居禄禄居福是彼此亙垣固福禄有加然必無閑神忌曜以駁雜於其間方夀命悠久而享此福禄也不然亦豈能終保哉隂忌計陽忌羅名為惡曜日蝕朔月蝕望始為蝕神日火月土莫臨十五度之中隂計陽羅怕在二三躔之内人命以日月為𦂳而星以火羅計孛為畏日之所忌者羅與火也月之所忌者土與計也然日遇火羅在朔則蝕月遇土計在望則蝕故日火月土莫臨十五度之中而隂計陽羅怕在二三躔之内餘時則輕度逺不忌月孛當頭湏尅子羅㬋在命必傷妻水逢月孛非緇尼必在娼門炁遇羅㬋乃清閑而為居士火羅計孛為剛星當頭皆主尅子在命俱主傷妻然孛為妖彗除舊布新之象以之當頭則一畨掃除必尅子也羅㬋逆行截㫁隔别以之在命則彼此暌離必傷妻也水性無定吉凶隨所遇之星逢月孛則妖滛無制愈加流蕩女命宫值此非尼則娼也炁性本柔善解剛星之厄遇羅㬋則和其毒而益其孤愈見清髙男命得此乃清閑而為居士望斗經以火為兒以金為妻孛能尅火羅能尅金二星在命當頭故難為妻子亦通耗居二四難免傷財主到九三定須離祖二四財田宫也宜聚而不宜耗九三遷閒位也宜客而不宜主主入煞宫非富則貴煞侵命位非夭則刑此煞宫非疾厄之宫也若以疾厄為煞宫則辰酉卯戌同類無煞乃是甲子甲午起隂陽甲辰甲戌起天秤甲寅甲申起寳瓶逆數至本生年位使身命躔入其宫則倚太嵗而得權非富則貴煞侵者乃刼亡的刃刑囚直難同鬼星犯命是也更主弱無以制之非夭則刑一説命主入疾厄宫入垣升殿化為官魁福禄不富則貴疾厄宫主為難星入命宫無制加以刑囚直難不夭則刑亦通晝忌火夜忌土尤看三方日從陽夜從隂總司百福晝夜指日月言非晝夜之晝夜也晝火興禍夜土為災然無忌於三方詩云火在隂宫土計陽縱有災殃還較可是也晝重太陽夜重太隂實總司乎百福經云太陽入陷人終賤身主逢刑處世難是也又云晝隂夜陽若是三方主不以為忌亦通命臨妻位財豐阜閒守身宫禄破除主居相貌必長軀身守遷移須出祖人命以妻為財命臨妻位故財主豐阜兄弟能刼我之禄閒守身宫故禄主破除主居相貌湏木守而軀方長身守遷移當落陷而祖方出白首奔忙塲屋盖暗星守而主星㣲丱角馳騁鄉閭乃魁星現而官星顯或圭角不露而顯出於隠或華實相副從微而至著魁彰官隠少年薦鶚快横秋官隠禄彰晚景化龍知有日此足上文官魁禄爵相資之意蓋言暗星䕶守而命主卑㣲終為書儥不了魁星光現而官星顯著必能少年發逹又有韜光渾渾而圭角不露者蓋由文魁顯星出於田財地下隠而莫之遇也又有文彩斌斌而華實相副者蓋由官魁禄爵升於官禄天上著而莫之掩也又有魁彰官隠則官由魁而進以其魁先彰故必早登於仕路又有官隠禄彰則禄待官而至以其官尚隠故湏晚嵗而得名此可見窮逹之或異者由於官魁之明暗遲速之不齊者由於官禄之隠彰故曰是必相資而後成雖欲缺一而不可禄在刑先既榮復辱耗居福後雖榮亦枯福刑胥㑹尤分在前在後之差禄耗並行當主一敗一成之兆此申明上文往吉來凶始成終敗之意仲尼非相文旺身衰李廣不侯官髙禄薄身命衰㣲縱文星顯而不相禄曜陷弱縱官星髙而不侯見人當以身命為𦂳官禄為要也最怕四空之無曜尤㸔方主以何如所喜八煞之有星亦㸔垣窠而奚若四空者三合與對宫也最忌無星若三方主居强坐實雖空不以為忌八煞宫者解見前註最喜有星又湏㸔其星之垣殿何若乃以為貴三方三日不陷則貴八煞八元居髙則榮三方有力一生發非横之財八煞無虧一世享優游之福三方者假如亥卯未安命金火月之類蓋其説以亥屬乾金以夘屬火以未屬月隂從隂位故為三方之主三日者太隂前後三日宫也蓋立命以太陽數至卯位則凡三十日同一時者皆同一命宫而太隂三日之内已行四十度是人之安身異日而移宫也故重三日宫使三方三日入弱遇惡則主陷身虧何以取貴故必不陷而後貴八煞者六甲布於申子辰而逆數至生年其法皆至八而更端故曰八煞八元者禄元馬元貴元命元夀元天元地元人元故曰八元使八煞八元入弱失垣則本傷位卑何以為榮故必居髙而後榮也然三方司一生之限比三日為尤重廟旺有力定發非横之財蓋不止於貴也八煞掌一世之權比八元為尤𦂳髙强無虧必享優游之福蓋不止於榮也官星入命當主貴榮身命坐官亦能遷轉官坐徳徳坐官乃是徃來貴客命入身身入命此為内外二臺名曰互垣當膺顯爵湏無惡曜以相雜㫁曰終身而有權此一節専以身命官福互垣言也官星入命位則命得官而榮命主入官福則官佐命而顯是身命官福互垣格局俱以美論官福二宫皆為貴客官坐徳徳坐官是徃來皆美故曰貴客身命二宫分為内外臺身入命命入身内外皆吉故曰二臺然互垣格局最怕惡曜雜之不為純美故又曰湏無惡曜以相雜所以終身而有權君幸臣臣背君官難遷轉母顧子子顧母禄必豐盈徃或在於怒宫來不居於樂地此格虚言互垣不善此因上文言互垣之有未善者太陽行徤而為巡狩之君五星朝拱而為廵職之臣君臣慶㑹則上下咸賴如或太陽到於命宫登殿坐駕是君幸臣而臣却背之不來引從朝拱是臣背君官者君之所予今既背之安能遷轉又有生我者為母我生者為子母子朴依則氣脉相闗母顧子如金入水位則水賴以生子又顧母如水入金鄉則金以水潤禄者身之所享今既相顧豈不豐厚然又當審君臣子母徃來之地何若也假使陽君入西没之鄉子母躔反盈之度是謂怒地雖名互垣終歸虛格而實不善矣前引後從貴有吉星左提右挈亦嫌凶曜引從者吉則外貴乎空提挈者凶則内喜乎善使夾拱之雖貴恐包羅之或遺内拱雖善而外拱者凶始用皆諧而終謀不善引從者身主之前後星也提挈者命主之左右星也要吉而不要凶喜應而不喜背如引從之星吉矣湏外無忌曜以傷之提挈之星凶矣喜内有吉星以助之若外之拱夾雖貴而内之包羅有遺内之拱夾雖善而外之照合不美皆主終始成敗之㫁此一節可與既濟未濟一條㕘㸔官禄若臨身命其貴可知刑囚外輔官魁為災莫大始雖禄秩無虧終見暴亡不善官禄臨身命固為貴矣然官之所忌者刑禄之所忌者囚若加以刑囚夾輔官魁雖貴不能悠久一星兩用有吉助則以吉言孤跡角形若凶多則從凶㫁或變不變而變者貴乎吉或用不用而用者毋自傷如凶星掌善事富貴非遲吉曜作凶神敗亡亦速凶無吉助一生勞漉不曾閑惡有善從晚景優游能自樂使非凶之凶而凶實難救不吉之吉則吉誠可嘉角形者如角之形有兩也一星兩用與孤跡角形句同言可以作吉可以作凶有吉助則以吉言若凶多則從凶㫁也變者承吉助而變不變者承凶多而不變用者因吉而用之不用者因凶多而不用之蓋言或有助而變或無助而不變如欲變則貴乎吉使變而為凶不若不變之為無害也或善而為用或善而不用如欲用之則毋自傷使用而自傷不若不用之為無傷也如火羅土計孛本凶神也或在官福而掌善事或為恩用而司官魁則力雄氣壮精彩愈倍無不富貴日月金水木炁雖善星也或在弱陷而作凶神或為仇難而㑹暗煞則憤惋不平不能相容而敗亡尤速不吉之吉即凶星掌善事句非凶之凶即吉曜作凶神句盖言星雖吉凶有定而實變化無常此一凶星也無吉助而不變而勞漉乎平生有善從而變吉而優游乎晚景可見吉曜作凶神是非凶之凶凶實難救而凶曜無吉助但不免勞漉而已凶星掌善事是不吉之吉吉誠可嘉而惡星有善從亦能享優游而已夫星之吉凶人所知也而中有不吉之吉非凶之凶非逹造化者孰能識之刑囚内拱初年必定傷身福禄外從末主湏還享福凶為吉用用者皆吉吉作凶行行之亦凶刑囚内拱者左右夾也福禄外從者三方拱也内拱則近故初年傷身外從則緩故末年享福若刑囚外從而福禄内拱則初年享福而末年傷身可逆推矣凶為吉用四句即上文凶星掌善事吉曜作凶神之謂也吉凶相雜以先入為尊善惡相半以主星為上先凶後吉乃惡星入而吉星從先富後貧乃財星弱而耗星徤此指一宫者而言分先後主客也吉凶相雜四句互看蓋言吉凶相雜乃善惡相半也當究其何星孰先入孰後入先入則得氣為尊乃以尊者而配乎吉凶又當察其何星是命主是宫主主則以得垣為上乃以上者而配乎禍福或惡星先入而吉星後從則先值惡而凶後值善而吉或財主星弱而耗主星徤則先以財而富後以耗而貧反此則以反推义曰相雜之中而欲究先入者必察其星所行之遲疾若遲者先入而反在後疾者後入而反在前須詳究之不可因其立度而定先入也徳官引援而徳官皆厚福禄擁隨而福禄俱豐徳官即福禄主也引援在命主之前引逺而援近也擁隨在命主之後擁近而隨逺也官福二星為身命之引從是前後皆有貴客衛護身命而身命又入垣升殿逄生坐實其福禄豈不豐厚升一位沉一位明晦不同縱漏闗横漏闗徃來俱貴升一位者命宫東升之位沉一位者對宫西没之位如晝生日木土在東升之度火金月在西没之度夜生火金月在東升之度日木土在西没之度出者明則入者晦昏旦得宜反是則明晦倒置矣此蓋以出没為東西而非以卯酉為東西以升沉為明晦而非以晝夜為明晦也縱漏闗者四正相闗横漏闗者三合相闗或彼有星而此無曜此有曜而彼無星皆得徃來相闗無彼此得失之異是此貴字以貴重言而非富貴之貴也自此以下多論格局中分五五首尾遮䦨前後三三官魁引從計羅闌截夜西北而日東南日月循行朝子午而暮夘酉天地喜守望於巳亥之位日月宜守照於子午之宫逆則為災順則為福星盤以子午為中央羅為天首居午計為天尾居子是中分二曜對直故名遮䦨左右均有五宫也湏漏出有用星辰晝夜不背為妙身命以前後為引從午命前隔三位為戌後隔三位為寅魁在寅而官在戌前後各有引從也須官魁引從命主得廟乗旺為佳餘曜以羅計為重蓋二星為交道相對所以截㫁衆星不能過然必晝生而衆星截於東南夜生而衆星截於西北方成竒局七曜以日月為尊日月欲循行者必朝從陽宫月在子而日在午暮從隂宫日在夘而月在酉隂陽各得其位晝夜不背其行方為正局亥為天門木守之已為地戸水守之是謂得乾巽相對之體午為天上日守之子為地下月守之是謂得坎離相媾之用遵此則順而為福反此則逆而為災一星伴月喜加臨於巨蟹之宫二曜朝陽當併㑹於離明之地一星謂水天一生水也二曜謂火地二生火也水伴月火輔陽隂陽類聚也水月㑹於巨蟹火日㑹於離明日月得宜也止論命宫不論晝夜計孛夾身還短命刑囚拱主必傷身須觀釣出飛來次看横衝直撞計孛二句不可槩以凶論苟上盤有恩星釣出而生扶之下盤有用星飛來而尅制之或恩用二星有自三合横衝而解其圍有自對照直撞以紓其難亦不可以短命傷身言也經謂正煞暗生轉禍為福賦謂正煞暗中還有救凶禍應無有是巳尤防起處受傷身須信無中還有曜此二句以身命通加言也身命二主明見無煞假如辰宫命以金為主起在子宫土位似為美矣却有夘宫火星暗通或有亥宫羅星加入是起處受傷無中有曜假如子宫安命以土為主起在寅宫木位似為凶矣却有已宫火星加入丑宫羅星暗通是起處受傷無中有曜可以吉言可以凶言也故明有不如暗見面南拱北君臣之禮不相拘移東就西夫婦之情終至老日為君月為臣子宫立命日在亥月在丑拱夾命宫是君臣同列而名分不拘共拱于北而面南離此格湏如此方合他則非也東是命宫西是妻位辰宫立命金飛入酉則是移東就西男命以金為妻而辰命以金為主夫妻一體氣味相投豈不諧老此格湏辰宫安命方是餘則非也太乙抱蟾官必顯逹計都朝斗禄自豐榮孛為太乙蟾為太隂不謂之孛而謂之月孛者以孛與太隂同水之類也孛在未入廟月在未入垣二者同度方為太乙抱蟾若彼此先後有間不可以抱言也未命值此官必顯逹計属土曜斗為土垣不謂入斗而謂之朝斗者必虚其斗舎而躔於牛女二者異度方為計都朝斗若計直居斗之次不可以朝論也丑命值此禄自豐榮夫孛妖星也以之抱蟾則相扶而輝計毒曜也以之朝斗則歛迹而善故皆主榮顯木金逢龍遇官魁方合入垣金水㑹蛇為官禄始名上格辰屬龍金躔亢木躔角是逢龍也然必為當年官魁辰宫安命方合入垣餘雖金木升殿亦不合格已屬蛇金躔翼水躔翼是㑹蛇也然必為命中官禄寅宫安命方成上格餘雖金水相㑹亦為次等或星分四維環拱四斗或星聮三位環衛三方四維者乃乾坤艮巽之位軫角箕斗壁奎參井隔界之度也四斗者乃虚房星昴之宿太陽次舍至尊之位也安命在四斗正位十一曜排列於四維餘宿無星名為環拱四斗星聮三位者如午宫命三合寅午戌無星而未申酉卯辰巳亥子丑九位三聮排列有星獨環衛此三方此二格一則四正無星一則三方無星皆為大貴格舊本三位環三方者乃以三方主聮命宫假如午宫立命六丙生人日木土為三方主日在午木在巳化禄土在未化福是巳午未聮三方主星而寅午戌三合無星以照破之又如六乙生人申宫安命水木土為三方主水在申化貴木在未文星土在酉化福是未申酉聮三方主星而申子辰三合無星以照破之俱為竒格背君朝主必榮身出坤入乾為上格背君朝主者巳宫安命水為命月為身水在巳月在未共朝午未太陽因太陽不在其位而入巳躔軫月與水同宫是身背君之虚位而朝君所幸之實位也人臣面君身豈有不榮之理出坤入乾者亥屬乾未屬坤木為命主而喜出於坤是木入秦州也月為身主而喜入於乾是月到天門也身命出入居乾坤非上格而何乾坤定位平分諸曜拱天庭日月循行引領衆星朝帝闕拱斗朝天夫豈為禍戴天履地斯能致祥乾坤造化之本原亥屬天庭要虚其宫坤為地維貴實其主今身居命命在亥乾坤定位而十一曜分居十一宫環拱天庭之虚是平分諸曜拱天庭也然必命居乾身居坤方合日月衆星之領袖日在月前月在日後日月循行子丑之宫而引領衆星之先衆星順布寅卯辰位而聮續日月之後以向乾天是引領衆星朝帝闕也然必日月循行不背而衆星又聮絡不絶亥宫安命方合惟亥屬天惟丑有斗朝天拱斗者以三方主言也如午宫安命木日土為三方主日在戌土在子木在寅獨空亥丑二宮是朝天拱斗也午位為天子丑為地戴天履地者以身命主言也如身在午未為戴天而日月金水麗之命在子丑為履地而木火土羅居之左右四宫俱無星曜是戴天履地也凢此皆為竒格萬無一二又豈不能致祥而反為禍者哉五曜連珠便是廟堂宰輔日月合璧當為鐘鼎竒英五曜運行各有次舍然前後參差疾速互異欲其聮珠也難矣今却順布五位纍纍不㫁如珠之聮而無盈縮於其間焉此命間世一遇所以為廟堂宰輔日月循行各有躔度然每月一㑹每㑹皆同欲其合璧也難矣今則同宫同度相符無間如璧之合而無虧蝕於其中焉此命殊世難逢所以為鐘鼎竒英一云五曜連珠五星不必順布五位或同一宫而在官福或相聮一處而拱命宫無四餘犯雜俱是又如水在申金在酉火在戌木在亥土在子聮珠入垣尤為難得一云日月合璧璧乃文章之府天庭之位日月恰好合此如五星㑹奎之類然豈易得哉守一空一便主文章居三隔三乃為秀士守一空一者十二宫中或六陽有星而六隂無曜或六隂有曜而六陽無星是也内得二主垣窠三方得力便為文章之魁居三隔三者十二宫中或亥子丑有星而寅卯辰則無巳午未有星而申酉戌則無内得身命髙强官福廟旺乃為俊彦之士正闗漏闗而官禄為無用闢拱闔拱而刑囚徒具文蓋吉曜失度似吉非吉凶星得地雖凶不凶凡命主皆以官禄為正闗以三合為漏闗假如六庚生人寅宫立命巳為官禄水為禄主却入於戌之漏闗謂水泛白羊官禄失地將焉用之闢拱三合外拱也闔拱左右内拱也假如六庚生人寅宫立命丑夘為闔拱木在夘土在丑化為刑囚午宫安命寅戌為闢拱水在寅土在戌化為刑囚俱凶然二凶得地又為三方官田之主不能為害其刑囚徒具文耳此可見官禄吉曜也入漏闗之失度反以凶言刑囚凶星也隨拱夾而得地翻為吉㫁然則論星格之吉凶者宜細詳焉首尾隂陽居四正禄厚官髙火羅計孛守四强權尊禄重若獨行而為貴如混處以為災四正子午夘酉四强命禄妻田凡四正立命位者以羅㬋計都太隂太陽而分布於四正升于廟垣則對待之體以立故禄厚官髙凡四强為原守者以熒惑天首天尾月孛而分居於四强安于廟旺則英雄之勢以張故權尊禄重然此二格在二曜貴乎清明在四餘貴乎獨旺茍有他星混處於其間則善惡相揉明晦相奪必以為災也火孛同宫須防夭折火羅作黨易致災危火怕入於陽宫土忌居於隂位火孛異類必相讐也以之同居命宫則尅戰不已故湏防乎夭折火羅同黨必自焚也以之同侵命位則剛烈異常故易致乎災危晝忌火也宜隂而不宜陽夜忌土也宜陽而不宜隂若火在陽宫而晝生土居隂位而夜誕其災危夭折也又何疑焉若火土是本命三方主又不以為忌當併詳之以輕易重富而夀夀而康將重換輕苖不秀秀不實論格局論垣窠庶清濁之必辯分源流分體用貴本末之相承正則重偏則輕主莫背守莫失體用俱勝少年題鴈塔之名本末若差至老作鷄窻之士使用輕而本重則始逸而終勞或用重而體輕則始勞而終逸初敗終成蓋耗在前禄在後先難後獲由主居弱限居强强弱不分始終何益凶㣲吉衆乃先弱而後强吉少凶多必始成而終敗以輕易重者假如辰宫立命在角度金論是為偏垣偏則輕矣若命主金星飛入酉宫昴度或入丑宫牛度此謂之以輕易重富夀之命也以重易輕者假如亢度立命為金之正垣正則重矣金星却飛入寅宫尾度或入卯宫房度此謂之將重換輕秀而不實之命也命有格局有垣窠格局正而垣窠得者為清垣窠失而格局偏者為濁又有清濁之相半者或合格而失垣或得垣而廢格皆當細而論之庶可以辯其清濁之分命有源流有體用體即源命之本也用即流命之末也當因源而遡其流因體而究其用或自流而反其原自用而觀其體真見其何者為本何者為末而尤貴乎本末之相承清濁以分本末以悉凡得其正垣則重也而不可易之以輕凡得其偏垣則輕也而貴乎換之以重凡為身命官福之主不宜弱陷而勝之以客凡為七强原守之星最怕飛吊而失之以傷體用俱勝身命官福得地也宜題鴈塔而早擢髙科本末俱失命主限主落陷也則老鷄窻而終身不第使用輕而本重其流弊也鮮克有終使用重而體輕其源濁也罔功於始使耗前而禄後則初敗終成使主弱而限强則先難後獲使凶微而吉衆是重能勝乎輕也故先弱而後强使吉少而凶多是清而混於濁也故始成而終敗觀星者審之善惡不宜混處吉凶要在分居源清流逺始榮復見於終榮本固末滋後吉何殊於先吉原守雖然無咎流行尤怕為災體用皆强始終盡吉流行雖惡猶如潢潦之無根原守皆醇尤勝膏粱之有味造化體用固亦如是限數流行亦當細推主或有虧限湏得地諸限以洞㣲為上逐年惟小限可推竹羅茍能論則休咎潦然碧玉若明推則吉凶洞若雷公急脚尤防入斗尅身斗底黄泉亦怕傷身居煞子午卯酉實為去路寅申巳亥須憑鬼門一不可拘二湏敢㫁吉凶同㑹較量重輕星曜交臨尤宜詳究命强限弱渾如逆艇之上灘命弱限强猶似槁苖而得雨始終發禄亦聮限之吉星首末破財乃一生之凶限福財俱背㫁無吉曜之可言刑煞若臨湏信凶年之將至吉星臨限富可享而貴可求凶曜當宫禍將萌而夀將折如限裏全空則未必為福宫中有主則豈能致災禍福無門脩短有數脩為由命倚伏在人此論實珠珍之比推源乃碧玉之名兹不虚傳固宜實寳此篇詳舉諸家限數言原守者當生之星也言流行者流年之曜也若原守體用皆在髙强而流行凶惡亦無大害苟或主本有虧要觀限途得失諸家限數所當悉推有名洞㣲限者一二本限裏三四對照衝三合五六載其年見吉凶是也有名竹羅限者開端隔節數三宫逆行零順㡬年終若見逺時數二節零年交入甚宫中是也有雷公急脚斗底黄泉限者皆以子午夘酉為去路寅申巳亥憑鬼門一順一逆而互推之是也有逐年小限者自命宫起當生之年而逆推之是也然諸家之限湏以洞㣲為上小限次之竹羅次之黄泉急脚又其次之洞㣲飛限遍乎一周逐年小限輪於二六竹羅重三方之主黄泉急脚因其命限俱弱者而交併於二六之門亦所當推若吉凶同㑹湏較量彼此之重輕星曜交臨當詳究本末之强弱或命强限弱渾如逆艇上灘雖載重而莫能進或命弱限强猶似槁苖得雨雖受滋而莫能生聮限皆是吉星主始終之發禄一生無非凶限㫁首尾之破財福以居身財以養命二主星俱背又何有吉曜之堪言刑者刑難煞者地煞在明暗加臨必湏防凶年之釣動然行限怕空臨宫喜實若限裏對合俱空豈能為福若一空對合有主未必為災是以禍福無門脩短有數脩為由命倚伏在人善通造化者固當不二以聴天又當居易以俟命可也通星賦推歩已定占星不移吉凶先驗於廟堂災福實係乎星曜且如出入烏府無迯日入廟堂優游鳯池多是水居壬癸一吉入命必作公卿一忌臨官多難富貴廟一也而有得失之殊忌一也而有吉凶之異主雖臨於旺地湏看宫分之髙低生不生尅不尅蹤跡飄流吉不吉凶不凶行藏汨没命吉而限亦吉取功名如拾芥命凶而限亦凶求財利如捕風吉莫吉乎五星不戰凶莫凶乎六曜相臨始辱終凶只因火去刑金先敗後成多是水來生木木星須貴猶慮金傷水宿輕清湏妨土尅水孛入遷移㑹火晝見穿窬火羅㑹官禄逢金夜生紋面火土非盲則缺計土不啞則聾日同土計揚子雲訥不能言孛共水羅公孫𢎞詐而不實紫炁雖是吉曜失度而反為災計孛應是凶星得地却能為福水孛坐咸池之位男好色而女為娼木炁臨華盖之宫男為孤而女為寡為僧為道炁臨身命而命入閑宫做賈做商主入遷移而財居命位火為文士而坐奎决為儒者金是武人而臨計主利兵戎水星見木口吐鷄舌之言紫炁逢金足躡丹砂之地水星無定要吉同宫孛計多疑嫌凶共位隂陽逢蝕子夏䘮明計孛同鄉鄧攸哭子計臨妻位孤鸞僻處鳯將來木在兒宫丹桂芳時春未老布衣藜食火土俱髙甕牖繩樞木星俱陷疾厄遭逢火孛常患瘡痍月宫常傍羅㬋必多心氣學堂失陷徒闗孫敬之門科名不髙枉鑿匡衡之壁登金門而歩玉堂田聚福位衣輕裘而乗肥馬身入財宫木入命為人仁義金入身本性猖狂孛水金臨疾厄枯木生春水土孛臨財宫薄氷見日官宫遇刑耗臨囚加照定作罪囚命主得福禄兼權聚㑹必膺富貴忌曜髙兮難發福星見兮易榮孟軻不遇主命限四值空亡李廣不封侯福禄二宫失陷投河投井身逢刑曜而水孛落在疾厄之宫自縊自刑命居刃宫而火羅坐於相貌之地或逢兵厄金羅火入刃煞之宫或值産傷水火孛犯身星之位惡星臨照百事相縈嵗徳加臨千災頓息火羅入命皷莊子之盆土計臨夫哭秦王之璧遷移遇吉必利遊行疾厄逢凶多招横禍火臨五位中年妻子少亡孛在四宫早嵗爹娘多尅兄弟若逢孛宿必主孤單僕馬若逢羅㬋多防走失紫金相㑹身居翰苑之中羅火同宫位處諫臺之上太乙抱蟾一生榮顯姮娥抱鬼多見災殃羅㬋得位勇畧過人水星居髙智謀出衆若水星妙入命位百藝多能如紫炁妙臨身宫是非屢有火宿逢羅成敗相仍水星見計刑囚㑹惡金為妻宿逢火羅必定難為火作夫星逢水計决然相尅孛在福宫必夭命炁逢月孛定長年火羅更逢月孛死在刀兵土孛若遇火金終於犴狴水耗財宫荷葉露土刑身位栁花風下弦之月守妻宫有圓有缺白晝之火逢子位多損多傷木星守財兮仁而不富計水守財兮富而不仁夫主星受妻主星尅則妻奪夫權父宫曜得子官曜生則父慈子孝忤逆不孝者羅計犯於太陽四徳兼全者金水㑹於妻位奎宿㑹於木位文章冠當世桃花逢於金孛好色損天年炁孛傷人者晝見火金羅計尅命者夜見土木婦人帶子重嫁夫命主與男女主同在遷移男子停妻再聚妾身主與妻妾主俱陷奴僕青龍領木庫喜逢春朱雀妙午宫宜向夏白虎候秋金得位𤣥武正冬水司權勾陳宜四季之中人命獲一生衣禄命清限晦蘇老泉二十六而讀書身貴限㣲朱買臣四十九而應詔星辰低弱更憂限遇低星身命俱髙仍慮限逢忌曜入吉宫便離凶處逢吉星便見安寧炁星本吉奚如木徳之純全計曜多凶尤勝孛星之最暴計孛守身宫切忌行船渡水火孛守命位宜防履險登髙箕星好風不宜見火必防風疾之災畢宿好雨不宜見羅多生血勞之疾羅為天首逢凶星頭靣有災計為地尾遇惡曜手足有患身吉限凶十分好也難成命强身弱萬事成而弗就脾屬土土逢木主脾疾而不和腎屬水水遇土主血濁而盈積咳𠻳者肺屬金金逢火制寒熱者心屬火火遇水刑木逢金而肝受傷金屬孛而色害命計羅侵日月而眼目失明金水逢計孛而手脚多疾孛羅在命虎狼心計羅在命惡毒輩艱危處享福無凶蓋縁星辰俱吉是非中成家立計自是身命俱髙子孫星弱裸蜾負螟財帛曜凶花蜂釀蜜田宅逢火水蕩産破家妻妾逢羅孛傷妻尅子幹事不辭勞苦主入奴宫求財每受艱辛財居閑極紫炁同孛星入命閨女未出嫁而産嬰孩主曜與金羅守身老夫已白頭而生赤子三方俱吉勝如平地湧泉四正逢凶好似聚毛見火塵灰滿釡宫主休囚金玉滿堂身居旺相聚此賦者名曰通星同志見知幸無失矣襍訣徴語煞前主後踈則憂疑親則煎廹煞後主前遐則剥削邇則摧殘月居閒極而無傷始為福元主到遷移而逢吉豈諳羇旅遷移星惡當為東西南北之人閒極曜佳必是散誕游談之士七宫得地可擢髙科五位逢仇難招嗣續官宫强財宫弱爵禄豐盈而府庫虚耗財星勝田星負貨資富厚而隴畆蕭條金孛相逢號為花酒之客福禄兩旺㫁為富貴之人年管平生月當早嵗日居中主時轄末年須當次第而推慎勿躐等而㫁孛星守時守身偏能舌辦火羅照身照命必是粗豪吉星得助如錦添花惡曜逢生似虎生翼忌星背免致為災喜星背莫能邀福休旺自屬四時尅化闗係五命日生忌火夜生忌土此乃俗談羅宿傷陽計宿傷隂斯為正論忌曜如歸本垣不甚為災喜星若居本位尤能為福凡居本垣為上但落陷宫則㣲主起逢生基址已厚限雖值弱福氣未衰福命至於衰鄉尚有餘福窮途漸行旺地猶帶餘窮火羅偏能驟發土孛只解晚成身命二主俱逢生不富即貴主身兩處盡遭尅非夭則刑二主坐貴坐禄逢生則貴禄可崇兩宫俱刼俱刃遇囚則刼刃致死主坐驛馬不生何濟身居刼煞無尅何憂無中還有有中還無吉者反凶凶者反吉亡神如坐囚煞愚蠢可知桃花若臨身命淫蕩何言父母見傷不尅則離祖出繼男女值尅縱得亦頑蠢螟蛉日月拱夾有生則榮華可期刑囚夾拱無煞則摧折莫保官宫雖美身命受傷亦徒然福主髙强限次縱虧亦不甚身主重於命主官宫那勝福宫主居陽刃逢囚犯刑身居福馬遇吉則貴水生木木生火五星生尅衆皆知水尅木木生土一法須求人不識一本固有萬殊萬殊豈遺一本一宫星有善惡當推在前在後之等殊本位曜值吉凶更辨或制或化之輕重生尅制化貴在細推遲留伏逆亦當研究好星互換而多吉惡曜入廟亦少凶喜極宜坐於崇勲惡極惡登於嵗駕四柱空亡須分初主中主末主一年災厄可推官符病符死符限宫限主俱逢惡曜不死何為限主限宫兩值好星其發不小源清者其流必清本弱者其末亦弱太嵗扶起惡星其惡必横流年來佐吉曜其福尤豐月愛孛星乃得比和之道日要土宿誰知生旺之功太嵗空亡遇三位此宫還實平生通順得一星運照限成火性急望見即發孛星遲過後方見土計臨照太陽喜尤勝於金水計土照臨太隂虐更甚於火羅且相貌宫主兩傷必逢惡死兼遷移宫主受尅當没殊方須防樂極悲來最善凶中救至空亡自古最驗議論何今不然禍福最驗於星曜秤停若較於權衡諸星隨主曜之所生尅譬一樹由根本以致榮枯水泛白羊金騎人馬土埋雙女木打寳瓶湏知此類以謂何非坐命宫則毋論諸星環拱命宫其人必貴三方傷犯身命終世亦貧四角有星居官則權柄不小八煞星吉蒞政則風力異常我之喜者彼亦喜之彼之忌者我非忌也正論所宗當權顛倒之義惟顛倒之理不逹故起驗不驗之疑吉則喜臨於實地凶則愛入於空宫今年明年之推遷故於小限以詳也逐月逐日之禍福宜於太隂而取之惡星登駕若臨身命必傾危吉曜守籍當主兒孫以榮貴金木得時能膺臺閣之職火孛用事尤宏將相之權禄位吉助既重應叨正禄官宫生意若輕僅可偏官田宅宫又為父母之宫相貌宫亦是徒配之位相貌宫主或本主受傷刑傷惡死福徳宫主或本主受尅顛沛流離大限為主小限受難可稍有乗除當生為重流年逢尅亦不過損益金宿與太陽臨地難曰空亡五星兼餘炁同空誰云烏府是宜互體以推不可一槩而論女推閑極一宫以㫁平生貴賤男詳福徳一位可定終始窮通金空則鳴蓋縁反振音聲火空則發尤謂終歸煨燼星坐四正謂之髙强曜在四空譬之沉溺本根既弱最忌後限不如前限主雖佳奈何身主却遭煞得經失經固當詳也似格非格亦宜推之當生忌巳云空流年扶之還實最愛日月拱夾深憐星曜背馳囚星有黨凶尤横要宿無生吉不來奚須論暗耗刑囚不必推印權貴禄能遵正法以推免有多岐之惑當生既論四空流年亦合一體主居相貌必豐肥忌居疾厄希康徤雖云造化分定亦在修為何如合格合局㣲有尅亦自無傷傷命傷身縱逢吉似難發越限臨之宫辯躔度淺深以定遲速星臨之位推制化虚實而詳重輕木羅㑹舎湏知可吉可凶金水㑹蛇當分有憎有愛䘮門吊客臨命限逢凶則服動奚疑陽刃刼煞坐主身遇吉則權髙㧞萃身主命主值太陽遇吉則貴限主宫主遇生宿陷則無妨他刑我他居陷弱則反佳我用他我居空位則何濟惡星為限主為我用則惡頗輕善星到限宫被他傷則善亦薄木入秦州只利未宫安命金居乾位最便命坐已宫火居巳申不必為忌金到亥寅豈謂有傷諸宫湏有忌喜一理湏定吉凶惡星怕衝怕合吉曜愛合愛衝一生一尅當以或輕或重而言一合一衝湏於有偽有真而辨金無餘氣効勝兩宿星夾太陽權匪常倫合不如照之功拱豈勝夾之理星躔退度善惡分别有情宿值空亡生尅總成顛倒或喜或怒其要在於迎逢所愛所憎正當明於分背飛來湏曰切當釣出尤為致親吉則喜有吉助凶則患於凶扶知命則推吉避煞樂天則安命固窮如大限本佳吉扶月建則早嵗亦可粗通或大限自强凶臨月建則中年亦湏剥削當生太嵗吉凶則闗係平生推行三限得失則管領窮逹湏互以推勿固以論星學大成卷二十六
