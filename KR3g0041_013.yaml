body:
  text: 星學大成卷十三明萬民英撰入骨仙機望斗經序余觀望斗璧玉二經文義相為表裏璧玉經余既注之而望斗惡可已也舊文倒亂無章而注又舛謬不純作述之意兩失論者病焉武生杜以信何其俊頗通星理遂命釐正訂補余復參詳潤色以發明之文雖分乎三篇義則合乎一卷説雖質之諸家理則通於一貫自今觀之布二六以奠地維定四七以透天關推度數别黃道以考星辰進退揭升沉按上下以論身命官田可謂洞究天人之藴深明星命之理矣中下二篇辭雖似重而意各有所指意雖若淺而訣則有所傳援引諸説所以證己言之有據獨執一理所以信人命之無差欲知人之富貴榮華貧窮夀夭舍是經其奚適哉余故表之以告後之術者讀望斗經云易水育吾子識新注入骨仙機望斗經余按望斗三篇詞意雜亂似非出一人之手讀者病焉乃略更訂上篇總論十一曜度數通加生尅制化以星命之純吉者言中篇分吉凶相半下篇専論凶云上篇仙機一卷望斗三篇説盡隂陽之理漏窮神鬼之機此首言作經之意而取名仙機望斗一卷三篇也斗運乎天心而星無不拱機通於入骨而發無不中以隂陽而括人之造化故謂之仙機以度數而測天之星辰故名之望斗言此經説隂陽生尅之理終始兼舉漏鬼神變化之機本末無遺術實精而弗戾言有大而非誇矣人雖靈於萬物命實由於五星欲問富貴榮華藴習天心之訣要知貧窮夀夭深通入骨之經富貴榮華貧窮夀夭二者人命之大較也命稟於有生之初而實五星之所為人孰不欲問而知之然舍望斗仙機則無由而知非藴習深通亦惡能窺其奧哉宫分二六星列四七隂陽之數各六二六者星盤十二宮也四方之宿各七四七者星禽二十八也此言看命之法先布十二宮排二十八宿以論人立命何宮主何度也周天之數約行三百六十之有五分野之間除太初三十度之無餘周天約行三百六十五度四分度之一每分野以太初推之計三十度四十三分八十秒然天行健一日一周而過一度太陽一日一周不及天一度故一年退三百六十五度四分度之一與天會而成嵗太隂一日不及日十二度十九分度之七故每月二十七日有竒與日會而成月今言三百六十之有五者舉成數也分野周齊子午兩宮每宮計三十度四十三分八十秒其餘魯衛晉趙秦楚宋鄭燕吳十宫計三十度四十三分七十九秒今言無餘者舉大較也先别黃道之移宫次推星辰之進步日行黃道月行九道天本無道也因日月之行而強名耳月道距黃道逺六度二分而九道當交之處交初為羅㬋交中為計都自交初至交中月在黃道外名陽厯乃背羅向計之處自交中至交初月在黃道內名隂厯乃背計向羅之處也月道猶水道日道猶陸道而羅計猶橋道是黃道在於四七之間有一定之處也耶律純以春黃道始於東而以四木度為之夏黃道始於南而以四火度為之秋黃道始於西而以四金度為之冬黃道始於北而以四水度為之不明天文亦大謬矣夫不知黃道之移宮又何以推星辰之進步故為黃道之歌周天黃道之歌曰角一至九正黃道十至十二近天田亢一至六五蹊險七曜加臨吉有驗限行不忌四空宮但要吉星黃道現氐三四度直至房房初至四共北方斗宿三四至七度虛二三度吉中央危八直至十三度室一至五端無慮璧星之度正屬兹奎一到十皆可許昴一九兮參三度井至十四星相顧栁一二與星二三此皆黃道無差誤時人會得黃道經限裏吉凶自見明五星日月若行此如無刻剝福非輕周天黑道之歌曰星辰到此減輝容限度臨之即鬼門有人會算精天理限到無差説可慿心一二度黑道生尾一至三少光明八至九兮皆不吉箕五六度不堪行斗只八度有些虧女至三五禍必侵婁三四度應危險胃六七躔暗不明畢十一二度全惡觜只半度不見星鬼一二張三至十翼八九內有災迍軫十七與十八九巳上皆屬黑道論詳觀本末省察盈虛使其體若差微則將用何所補本者命也末者限也盈者得經也虛者失陷也命以本為體以末為用貴乎本末相應首尾得經使本主差微毫釐千里機微不審則無往而非差矣雖詳於用亦何補哉夫觀宋屬東升父之基趙為西沒娘之祖官號天上田名地下雖云明晦不同各有隂陽度數此一節乃隂陽之至理星家之玄奧也夫宋屬卯地為東趙屬酉方為西太陽命本為父太隂身主為娘天上為午為官地下為子為田東升為明西沒為晦善觀人造化者不以卯為卯而以東升父為卯則吾之命可知不以酉視酉而以西沒娘視酉則吾之身可知蓋地之卯酉東西也定地不易天之卯酉房昴也隨天運轉人之卯酉命身也通乎天地者也固不可以天地為吾人之卯酉而吾人之卯酉實不離天地之卯酉為卯酉也由是自吾之卯而視天中則官祿之限為獨加是非午之午也自吾之酉而視下地則田宅之位為至隱是非子之子也東升則明而為陽西沒則晦而為隂隂陽明晦雖有不同出入度數則無少異學者通於此説則性命之理思過半矣天傾西北論乾為尊地缺東南詳巽為重是以乾天布金金生五行之異秀巽地藏土土養萬物之精竒義知天地之紀綱信祕隂陽之終始置乾於西北列巽於東南此文王後天之易而星命之理皆由此出天傾西北故以西北屬乾乃地支戌亥之方也地缺東南故以東南屬巽乃地支辰巳之位也己亥為天地門户乾巽總天地生養故特以二宮為尊重何也蓋兌非無金惟乾之金得天一之水以清而能生五行之異秀壬甲納乾是也坤非無土惟巽之土得地二之火以暖而能養萬物之精竒丙戌祿已是也金於五常為義剛健不毁土於五常為信生成咸賴乾巽綱紀乎天地義信終始乎隂陽造化且然而况於人乎論星者當知所本矣或有宮有度或無曜無星或釣起有功或飛來有慶十一曜運行十二宮各有本垣之度然躔有先後行有疾徐或有占於一二宮而别宮則空或有聚於五七位而他位則無若不看三方四正釣起飛來何以論生尅明制化而斷人之吉凶禍福也故看命之法當論宮則論宮當論度則論度或本宫無曜而觀三方之釣起或本度無星而察四正之飛來須知暗中有吉也防起處受傷不可一例而取裁併把通加而研究此論命之大法也大槩當論宫則論宮當論度則論度先究一身之要次詳三命之原同宫千里分前後異宫尺寸看遲留此條發明耶律之意以提醒夫人也言十一曜在二十八宿度其十二宮中有一太陽五太隂二火二金六水六土六木之説當論宮則論宮如一太陽二火二金是也當論度則論度如五太隂六水六土六木是也太陽三十日一宮太隂三日行四十度是立命衆人之所同而安身一巳之所獨故太隂視太陽為尤緊而安身較立命為最切也談星者當先究一身之要果何宮果何度孰為得孰為失次詳三命之原何為度主何為命主何為身主或同宮而逺若千里或異宫而近如尺寸逺者當分其前後如土遲而在前水疾而在後雖千里亦近近者當審其遲留如水疾而前行火留而後退雖近亦逺此又發耶律之所未發而歐陽子所獨得者大要五星相尅嫌十五度之中雖有遲留亦怕二三躔之內此星家之口訣當深究之舊注云三命者身命度是鈐釋云祿身命是經云干為祿本定一生職位髙低支作命基布三限夀元終始假如甲子年生人尋絶處為祿命身以絶處有生也甲為祿屬木木絶在申以申水為祿主子為命屬水水絶在巳以巳水為命主以納音金為身金絶在寅以寅木為身主是也此説亦微當併詳之日論行南行北月分上弦下弦若有蝕神來往最嫌朔望相逢晝生父必早傷夜誕娘當先逝二三躔內使合來須見尅十五度外如背去有何妨太陽夏至行南陸則晝長而多暑冬至行北陸則晝短而多寒欲論太陽得令須是夏日臨垣是也太隂在上弦則自缺而之圎在下弦則自圎而之缺要論太隂得時須是秋蟾升殿是也然日月晦蝕皆由羅計而羅計相逢最嫌朔望使日在井之十三而羅在井之十五火在井之十一是謂合來須相尅也使日在井之十五羅在井之初一火在井之二十九是謂背去有何妨也碧玉云日蝕朔月蝕望始為蝕神隂忌計陽忌羅名為忌曜日火月土莫臨十五度之中隂計陽羅怕在二三躔之內經云晝生掩日之輝去父又能損巳夜生埋月之彩去娘又主傷妻如此計羅誠為惡曜當併觀之日到日躔人特達月升月殿性含靈日到日躔者躔四日度也月升月殿者躔四月度也經云惟有太陽臨位而榮貴無災月曜入宫而清慈獲福惟容是而且秀取人事而最足是也然須晝日夜月不背方合此論秋蟾升殿生成詩禮之家夏日臨垣長在富榮之室太隂為命之所自來既升殿而復在秋清光可愛也宜生成於詩禮之家太陽為命之所主宰既入垣而又當夏炎暖可知也當長在富榮之室陽君火木守荆周片言入相隂后水金歸秦趙一舉成名日為陽君以火木為侍衛日在巳午火木同宮是太陽居南離而不孤月為隂后以水金為引從月在未酉水金同宮是太隂入垣廟而有助片言入相一舉成名言易也日月以入垣升殿為佳更又夏秋得時晝夜不背為福日月君后之象左右要有朝佐之臣不可使之孤也故又以此條言之其意由淺以入深從微而至著也合前三節而觀之則日月之所喜忌大略可知矣金水共躔春有利名秋必折水熒同步冬須破落夏能成伏逆則凶順行則吉此明五曜之旺衰生尅以論人之吉凶也木旺在春無金斫削不成梁棟至秋則折不可絶用金也火盛在夏無水潤澤易至煨燼在冬無氣不可純賴水也夫金木水火躔度雖同而春夏秋冬吉凶頓異可見當分别旺相休囚又要看順留伏逆蓋五星貴現而不貴伏喜順而不喜逆若順行則以吉言伏逆則以凶斷也太白當秋莫病火清辰旺月不愁鎮木到春榮金退志水逺夏位火呈輝火入金鄉須明次度水居土室亦較當時太白四句論五星得時當權不怕戰尅火入金鄉四句言又須明次度以别先後較當時以論盛衰也與上文互相發明智火休逢旺水義金最慮炎熒嵗為用而怕金辰當宫而懼鎮猶嫌衆凶相尅那堪兩忌戰刑若不夭折乎命定教惡疾躔身智火義金嵗木辰水鎮土也五行乘四時而有盛衰五星本五行而論尅制貴相生而相順毌相戰而相寃智火四句言五星乘旺分主賔以論生尅命主失時别恩用而為強弱茍賔來尅主便作福作官為魁為爵猶未凶害若聚凶會煞𢃄劫化刑而主受其欺則其主益傷實為難救故曰猶嫌衆凶相尅那堪兩忌戰刑若不夭折乎命定教惡疾躔身五星伏逆和睦亦能獲福四餘無黨相順必定加祥坐度得經十有九富安躔怕鬼百無一成伏逆五星之最忌者茍逢生有情和順雍睦雖不大發亦能獲福經云五星須要比和以得時而為貴是也餘奴十二曜之最凶者茍獨力無黨相順不尅不但無災必定加祥經云四餘不宜充實宜獨行以為佳是也且十一曜之躔度循二十八宿為次舍要不過金木水火土而已茍坐度而得經如春木之躔四水四木則相生相比而七政専得其尊坐度失經如秋木之躔四金四火則相尅相戰而七政不安其位故有成敗之分焉失序失經名必敗得時得度性能為此以身命主言也凡七政以隂陽言則有其序不可先隂而後陽以次舍言則有其經不可就尅而背生以節令言則有其時喜旺相而惡休囚以周天言則有其度喜廟樂而惡陷弱人安身立命而得時得度則乘旺相居廟樂故能設施而有為安身立命而失序失經則背隂陽受尅制故終無成而必敗自此以下多論得時而得度者也包含萬象身居楚智過千夫命守豳楚屬已為地户地則無所不包身若居之則德合乎地矣故曰包含萬象豳屬亥為天門天則秀出特異命若居之則清配乎天矣故曰智過千夫此二句須亥宫立命巳宮安身天門加地戶地户加天門又有日月以照臨之方合此格未必凡亥立命凡巳安身便可以如是斷也少年身到鳯池水陽度楚壯嵗名題鴈塔金木居豳此以巳宫立命亥宫安身言之楚東南水地太陽居之則東升水星居之則入垣命安於此是命主朝君也豳西北木地太白躔之則入格木星躔之則歸垣身安於此是恩用兩得也合上節觀之豈惟包含萬象智過千夫且將少年登第壯嵗題名矣水宿歸經處世身居翰苑木星度駕平生足履王庭水木乃文學福德最為吉曜歸經者如水躔箕參軫壁木躔井角斗奎度駕者登當年之嵗駕此二句互看水歸經而度駕身居翰苑木度駕而歸經足履王庭碧玉云水居雙女惟癸與巳酉丑之人木入雙魚乃甲見申子辰之命即此意也一主當權敢掌當朝之大事四餘獨旺能教衆國之來降一主者命主或水或木是也度駕歸經可謂當權命得此者必職掌鈞衡而為相也四餘者餘曜氣孛羅計是也單居得時可謂獨旺命得此者必威服四夷而為將也衆煞不降貧且賤一星得用富而驕一星得用則衆煞自降衆煞不降必一星失力二句互相發也財積如山田廣似海勳居極品譽播三公官福二宫生絶異田財兩位更清竒此條總論官福田財為身命主之緊要財積如山二句極言其富勳居極品二句極言其貴若此者蓋由官福二宫升殿坐駕互換合局而絶異田財二位乘時廟旺會命輔身而清竒此所以為大富大貴之命也自此以下散論官福田財而皆以身命為主官彰祿隱譽播乾坤之貴爵擁魁從名傳邦邑之榮官魁者當年之官魁爵者地元爵祿者天元祿也官彰則名顯祿隱則資厚二者相仍譽必播乎乾坤爵擁則身榮魁從則文耀二者相等名自傳於邦邑魁宿若隨三十六齡輔相官星如掌二十四考中書魁宿若隨者言官宮有吉星化魁隨官主則官得魁而益尊故必如房玄齡早登宰輔官星如掌者言官宫有主星化官則官居官而益顯故必如郭子儀久任中書然豈易得而易言哉官魁乘旺福祿歸窠隂陽得體互換有情屏內金叉十二門前朱履三千官魁者官魁星也福祿者福祿主也官魁二句言歸窠隂陽二句言互換歸窠貴乘時而入廟互換貴得體而有情命全此者則為大富貴人也隂陽對互換看非指日月言隂得隂體如火金月躔隂位陽得陽體如木日土躔陽位是也命安馬地最超羣主到官宫當富貴驛馬之地四衡之獨吉者命生驛馬或遇長生臨官必為起越之士官祿一宫七強之最要者身命入官祿更得吉星相助必為富貴之人有用刑囚掌握又加權印相從決有皂纛朱幡之貴斷為一呼百諾之人有用刑囚者身命二主所化或以身為刑以命為囚或以命為刑以身為囚母星亦然皆為有用刑囚也權印乃十干變曜或以體為權以用為印或以體為印以用為權皆為權印相從也以權印而用刑囚以刑囚而輔權印得令得局相宜相會決居諸侯之貴斷為權要之人煞會文昌權謀出衆科名見貴學問過人煞大煞是也煞凶神文昌吉曜煞會文昌是文武兼濟也故主權謀異衆科名年干是也科名為文星天乙為貴氣科名見貴是華秀特出也故主學問過人然二者未必能皆貴要看身命官福何如耳魁遇學堂功勳生於毫管官逢大煞名利出於旗鎗隂陽共輔田財平地致富福祿順迎官印唾手成名官乃官星非官主也煞乃飛廉非嵗煞也魁星遇學堂又足以經邦功勳生於毫管官星逢大煞武足以戡亂名利出於旗鎗隂陽二曜拱輔田財之宮是更清竒宜平地而致富福祿二主順迎官印之曜是生絶異必唾手而成名主到田園承父基而發迹田來拜主守祖業以昌榮此條専論田主亦要與身命有情也主到田園或乘旺而歸窠田來拜主或得體而會輔人命得此非承父基而發迹則守祖業以昌榮矣賔主相和則名揚四海財星會輔而富集全家此條以賔主會輔為言亦承上章互換有情之意假如酉命金為主火為賔火金同躔酉位值夜生交輝冇情更得月助是三限主員淨明朗必主名揚四海財星會輔假如子宫安命土為主木為財帛火為恩木火會輔在命財生恩恩生命更得太隂同躔定是富集全家千倉萬箱田財化義一富二夀官福生仁仁義為立人之道金木乃五行之粹以仁配木以義配金自然之理也金秋生得用入田財之宫相生相成必主千倉萬箱之富木春生滿用入官福之宫相和相順不特富也而又有眉夀焉福地安身管主一生間到老財飛入局儘教百事不求人此條専以財福言然亦當觀其得體有情與否若子宫命不喜福地安身辰宫命不喜財飛入局當併詳之玉堂安命宜修學官印扶身貴莫當魁登嵗駕胸藏萬斛珠璣文會書齋筆掃九天風雨催宿及限數功名可求喜神遇身宫錢財易取玉堂者天乙貴人也官印者官星印星也命坐玉堂則為文人身逢官印則為貴客魁星甲月乙日之例是也書齋當生納音長生是也若魁星登於嵗駕文曜會於書齋文魁得地身命無虧必主學飽五車文成七步催宿者催官也喜神者喜神星也欲求功名於當年當審催官之度數冀取橫財於非望必緣喜曜到身宫然此當互而觀之不可執一例論舊注云凡一切吉神若人身命主度限主三方四正官福強宫或逢或見或坐或加君子遇此可以為官賢人逢之可以逹聖縱遇退留亦當大發亦是數比龜齡夀星得地年齊鶴算仁曜歸窠舊説以當年之天干為仁曜以當年之納音為夀星假如甲子生人天干屬木納音屬金仁曜與夀星相尅以之為夀不亦謬耶愚見夀星以當生之天干言仁曜以命主之恩星言謂生年干為太嵗一世之所賴也若得地則命有所主而不虛命主恩星為一生之所資也若歸窠則命有所生而不傷故皆主有夀仁者生生之意子平云印綬重逢且比老彭之夀亦是此意一説夀星辰之次也金命人以土為恩而土又躔於夀星之次謂之老人星現此説更精然百無一二故老夀之人一鄉寧幾人哉五位逢生兒孫滿眼七宫無煞琴瑟和鳴逢生則生無煞則和亦自然之理也五宫福木子顯真英鸑鷟七位權金妻婚合起鴛鴦五位男女宫也春木得令甲年化福又有母星相生主其子必貴七位夫妻宫也秋金入垣戊年化權又有吉星相扶主其妻必佳女命福隨木德俱好但權隱金神最忌夜土為災戊巳之人更難救晝熒興禍丙丁之命實堪憂土喜晝生居六陽之位使夜生居隂宫號五殘星必能作災然甲乙人猶有救若戊巳生則土得嵗為有力其災愈重火喜夜生在六隂之位使晝生居陽宫化天刑星必能興禍然壬癸人未足憂若丙丁生則火得年列冇氣其禍益烈又須審垣廟退弱以别分數也詩云夜生戊巳屬勾陳落陷逢凶最不情亥子二時遭破敗縱使為官是夭人又曰第四火星兼旺晝且看命宫何所守少年孤苦老無兒百嵗何曽開得口是也春夏火羅能作孽秋冬孛計愈興災火羅炎毒在春夏逢生司令更能作孽計孛凶惡在秋冬乘旺當權愈見興災若火羅獨行於隂位孛計單處於陽宫則亦未為害也陽限火羅災害緊隂宫孛計禍難禁有福必傷父母不然亦損爾明陽限六陽宫也隂宫六隂宫也火羅剛狠為禍最烈晝生忌在陽宫孛計狡邪為凶猶緩夜生不宜隂位命犯此者雖有福而父母亦傷無則必喪其明也抱膝長憂身怕鬼忍飢待死命嫌休金脆火炎須夭折水深木弱必漂流此四句下兩句明上兩句身怕鬼者怕尅星乘旺如辰宫命夏月晝生最忌火星伴月命嫌休者嫌本主無氣如寅宫命冬月夜生尤怕木入申宫蓋夏月炎炎金脫冬月水深木弱所以皆主夭折之命熒星近土終作無成之子太白逢辰永為破落之徒此是我生他也名為脫氣受傷必無發達若鬼旺尅我須又賴子以制之不可一槩論也金火不降舉手傷人之輩木羅能化回頭無恨之人金火不降者金強火閫故舉手而傷人即子平庚逢丙擾多有不仁之意木羅能化者木解羅凶故回頭而無恨經云衆煞不降楊修有捷對之機餘羅有氣蘇武陷羝羊之屈正謂此也金非怕火孤處一生衣祿足火若愁金富中半世枕衾寒金非怕火二句以金為命主言太白當權身旺不怕煞也火若愁金二句以火為命主言熒惑司令主旺能尅財也二者皆主享有衣祿但金火不宜相見見則必尅故夫妻之間多不如意卜商哭子五位熒星逢惡曜莊周鼓盆七宫太白見凶神火星五位未可論孤若逢水孛交戰難免子夏之傷太白七宫可謂得位如遇火羅所傷必有莊周之嘆假如戊申生人命立戌宮火孛二星同躔在男女午位火化刑孛帶刃二星相戰又逢天狗必主尅子又如丁亥生人命立卯宫羅金同躔在妻妾酉位羅化刑金恃旺二星相拒又逢的煞必主傷妻妾奪妻權金怕火孫傳後裔水欺熒天狗臨兒兒孫決無繼續地喪戰室室家斷定相刑此六句専論五七二宫由淺以及深也言金為妻星而怕火者未必遂尅妻特妾奪妻權耳熒為兒曜而怕水者未必盡絶後亦有孫傳後裔耳若火被水欺天星已為不吉而天狗為五宫之最忌者復會於水火尅戰之宫兒孫決無繼續欲孫傳後裔不可得也金被火照天星已為有傷而地喪為七宫之最憂者併於金火交戰之地室家斷定相刑雖妾奪妻權猶未止也又經云水火同行婦尅夫水火同居夫傷婦若還夫婦不相傷斷定至老傷男子此又不以火金為論而特以水為斷當參詳之日躔隂度月鎮陽宫逢蝕神早喪父母居命分多尅妻孥日月反背而遇蝕神不止傷父母亦尅妻拏可見日月在人命最重而計羅同隂陽最凶也隂陽犯弱羅計相逢縱有一善扶持也教雙親早喪六位身逢此曜偏生庶出九宫命會斯星異姓同房日月既入乎弱宫朔望又逢乎羅計是命之夲原巳不立矣縱有一水善星能解羅計之厄然亦難免雙親早喪不特此也或身臨六位而逢此曜則主偏生庶出或命入九宫而會斯星則主異姓同房羅計之不可同處有如此隂陽失力雙親重拜首尾相近半道堪為隂陽失力者乃是隂入陽宫陽居隂位或遇落陷受傷或遇孤神寡宿又遇晝火夜土四餘相攻必主重拜雙親首尾一名曰天關地軸一名曰廉貞科目若相近於身命則為半俗半道之人經云羅計在天橫行而衆星莫過隂陽陷之必定薄蝕木氣值之刑尅孤獨水火遇之必遭刑戮故經云廉貞若臨身命嗣續有傷科目更入命宫妻身受刃正謂此也氣孛對身兄弟恰如秦楚計羅蔽日父子一似華夷身值孤則兄弟相離日逢蝕則父子不保能侍父母福權文印佐隂陽逺棄妻孥刑囚暗耗湊金火父南子北四餘忌掩雙精兄楚弟秦三宿刑傷一主如相尅則相寃使相生而相喜太陽屬父太隂屬母最喜吉星佐輔福權文印當年化曜之吉也得是吉以輔之則能侍奉父母而盡其為子之道金星為妻火星為兒最怕凶曜侵凌刑囚暗耗當年化曜之凶也得是凶以凌之則必逺棄妻孥而傷其為夫之情若隂陽二曜為四餘所掩則父子必相離身命二主為三間所傷則兄弟不相保也夫父子兄弟夫婦皆人倫之所當盡而最重者合前數節觀之可見星命相尅則至親化為冦讐星命相生則至親聚成骨肉吁人惡可不思自勉而盡委之命哉中篇文能求貴仲尼壯嵗合封侯武解成名李廣當年宜佩印此四句言人雖靈於萬物命實由於五星如使人不由命則文章可以取貴武略可以成名而何有終身不遇者哉三學士者身居清吉一腐儒者命遇天空身月也清吉得地也如月居天稱月照白羊月臨雲漢月歸東井月到天門月朝南斗月生滄海之類又遇上弦酉戌亥下弦子丑寅者皆為清吉得地必主翰苑蜚聲學士之選也經云身居清吉休愁命福德堅髙不問官是也天空正空亡之位也如身命落在此宫衆星又值伏逆到底無成終為腐儒而已經云空亡為害最愁人材智英雄悮一身只可為僧并學術雞忩勞苦度秋春是也蹭蹬文章學堂失次精竒藝術天乙當權身宫宫主為學堂怕入弱而失次餘曜紫氣為天乙喜得地而當權蓋學堂得地必文章發逹之士天乙當權乃清髙藝術之人反是則不然也一説身宫宫主為職元學堂者乃玉堂位兼長生臨官位是也文若會兵斷作才能之相主如逢煞決為謫降之官文文星兵大煞主命主以文星會兵煞文武全也斷作才能之相如命主衰弱而會大煞無吉星救助必是謫降之官夫同一大煞身強為兵身弱為煞故曰先究一身之要次詳三命之原刃刑更屬官星能裁典章之理暗煞如逢祿馬窮搜訟獄之情官星者年干對祿之官星祿馬者當年干支之祿馬如官星逢陽刃刑囚祿馬加暗煞嵗煞縱在貴人祿馬之中亦是一生吏曹之輩少病優遊身安福德多災坎坷主怕官宫身安福德經云福祿主星入命來身居福德亦無災命主若還居福德少年富貴入三台主怕官宫經云人生官限最為長身命逢之主吉昌最忌煞刑侵此位多生坎坷有災殃是也主拜官宫則身輔帝闕官刑主位則身犯天條命主化祿入官宫逢生無不富貴官星化刑入命位尅主定有官非有患經春直難和年作梗無災一世福官與命相成直難和年作梗者乃身命遇直難凶星加以流年凶星攻併而後為梗也福官與命相成者乃身命與官福主曜加以順垣樂廟相和而後為成也主去欺賔為財為庫尤還濁富賔來尅主作福作官宜守清貧相違則破相順則成主身命主也賔對主而言仇難之類是也欺者乘勢以相尅主賔各有勝負主或釣起而欺賔是主為賔而賔為主則賔非間辰是財是庫尤還濁富賔或飛來而欺主是賔為賔而主為主則主非忌曜作福作官亦守清貧此可見主貴旺賔貴衰主可欺賔賔不可尅主也賔衰受主之欺則其勢相順主衰受賔之尅則其情相違順則成違則破寧非理之必然者乎賔來破主則儉假無情主去欺賔而取財不義賔破主者他來尅我也假如子宮命土為主木為賔木飛入主生春令是賓來尅主雖其木化為官福則亦儉假無情上文相違則破是也主欺賔者我去尅他也假如土為命主飛入申宫土旺四季是主去欺賔其宫有水為財庫則取財不義上文相順則成是也主若旺賔權尊祿重賔如勝主偃蹇傷殘尅已待人財遇鬼僥幸致富鬼生財慳吝一毫秋怕計搜羅萬狀夏逢熒主旺於賔則其主厚賔勝於主則其主傷即上意也財遇鬼者如丑安命以土為財而逢木劫是也鬼生財者如卯安命以木為財而逢水生是也計至秋而氣已衰故主慳吝熒至夏而性益烈故主搜求此理極為明著土遇水火遇金居金谷而作主金見火土見木在陋巷以安居此以主賔而言我身旺能尅他則平生享用如石季倫之在金谷園中我身弱而為他所尅則生平不足如顔子之在陋巷也孛計占財慳貪吏輩氣金居命節儉僧門那堪一水加臨必主無知破蕩孛計二星本云曹吏之星以之占財則必慳貪經云善掠人財歸自已為緣水計會財星是也氣金乃是清間之曜又主孤尅以之居命則為儉僧經云孤神傍照為人難是也此四星喜獨行怕與水會若有一水加臨則孛蕩金泄計戰氣爭又何疑其破蕩哉身遇氣計清間技藝財逢金帛製造羅裳經云氣居命位清間技藝之流金入財宫製造羅裳之士即此謂也但當審其身命官福若何而後可以斷之不可一槩論也財主若遇天空家徒四壁田身復逢庫印粟腐千囷天空天亡宫也財星落空亡又逢耗劫破碎定至家徒四壁庫印四庫之中逢印綬也若田宅身命二主入庫逢恩得局決主粟腐千囷先貧後富主欺三先富後貧間尅一主欺三者主強三弱也間尅一者間強一弱也行限有逺近故貧冨有先後鬼旺財衰雖榮亦辱官輕祿重縱富無名權福若遇髙強家享千鍾之粟耗刑而加地下居無滴水之儲鬼旺者官星顯也財衰者財星陷也鬼旺財衰則雖榮於官而辱於財即上章賔來尅主作福作官亦守清貧之意祿重者祿神有氣也官輕者官主失陷也官輕祿重則雖富於財而歉於名即上章主去欺賔為財為庫尤還濁富之意權福俱在髙強家積千鍾之粟富而貴也耗刑而加田位居無滴水之儲貧且賤也故凡人命富貴雙全者必官福二宫生絶異田財兩位更清竒否則必不能兼之也囚刑有用田財受氣威鎮邉疆倉廪備福祿無情身命落空闤闠􅕋室忍飢寒身化刑命化囚謂之有用本不為忌若田財二宫廟旺有氣是身命田財俱美冇體有用故主為官則威鎮邉疆更享富貴之樂忌化福難化祿謂之無情原不為美若身命二主落陷逢空是身命官福俱虧無體無用故主下賤則闤闠􅕋室更受飢寒之苦官星落陷名無久財主歸窠富不休官星者官祿主也官星失地入弱雖榮名而無久財主者財帛主也財主歸垣入廟定殷富而不休貪濁無厭財命疾清貧徹底命財留財命疾者乃命主疾行於財宫有貪求之意命財留者乃財星留尅於命主有難勝之患故清濁不同如此主宿隨身名不求而自得財星背命利多取而無成三主困於三河浮舟作計九宫流於九位望海為生蓽蓬托宿四位遭傷陋巷安居田星落陷命會太隂坐於強宫入躔升殿名不求而自至財同命主入於陷地相背相尅利多取而無成三主身主祿主命主也三河周地浮泛之位也午屬九宫亦三河之地也申宫立命午為間極宫三主入此巳為受困午宫間極主又流於遷移子位子屬大海是三主輾轉飄流故主望海浮舟作生涯也四位乃田宫也若四位遭傷田星落陷又安得華屋而居之財從白手而生運限有氣魂逐黃泉而去循數無情此下二條専主限而言也運限有氣者乃五星入垣官福髙強隂陽順躔馬遇長生祿逢生旺煞遇貴人四餘樂廟皆是人命值此決主財從白手成家立計人也循數無情者乃祿逢衝破馬遇空亡限逢倒煞命值流星運逢迎送衆曜相攻刃頭煞尾羅計重逢刑囚加夾太嵗迫凶皆是人命值此決主魂逐黃泉亡死夭折人也少年行空作事如醉老來行庫生涯益昌空者天空及年空也行空限失其所依之主庫者年干納音基也行庫地得其所用之財故主少年混沌作事無成老來精明生涯益盛空雖凶而空其煞則反凶為吉庫雖吉而網其難則反吉為凶觀琴堂之説尤為精當氣木相攻體如刀削土旺四季肌必重肥以下二條論人之相貌自其顯露者而言也木主瘦長土主肥濁木見氣攻則其氣益泄土逢四季則其氣益旺人命稟之故其瘦肥不同若土氣春生奴不勝主雖瘦弱未必如削土逢餘月星不當權雖豐腴未至重肥金木水陽居海角貌勝阿難計羅土孛鎮天涯威如那剎佛有阿難十分美貌鬼有那剎十分凶惡卯命相貌在辰是天涯也有計羅土孛凶星而居於辰必生凶惡之貌酉命相貌在戌是海角也有金木水陽吉星而居於戌定稟都姣之容五曜順兮心清如洗四餘並兮口濁如羝此下四條論人之心術自其隱微者而言也五曜喜順行四餘怕同聚順行則清朗而可愛同聚則混濁而可畏人身命得之故清濁不同如此左吉右凶心狼毒前虛後實愈多謀左吉者命前相位有吉星右凶者命後財宫逢凶曜因前後之有吉凶則知外貌雖善而中心狠毒矣前虛者命前四位虛空後實者命後四位填實因前後之有虛實則知權變難測而沉謀不露矣笑裏藏刀身見刃怒中無毒氣居空陽刃主宰殺天之凶神最怕身見大煞主凶暴地之惡曜極喜空逢若身見刃則笑裏藏刀是謂之小人也煞居空則怒中無毒不謂之君子乎若身見刃而逢空命坐煞而居實則不可以是斷也暗刑臨主斯人能謹於言囚忌當宫此輩好談話霸暗囚乃化曜也若刑星化暗來臨本主忌星化囚正當命宫暗則懦故能謹言囚則強故好妄談寡宿當臨好守煙霞深處孤神傍照宜居泉石林中此下三條論人之性情自其喜好者而言也寡宿孤神乃紫氣也當臨是命宫對照是妻妾宫也天乙經云天得紫氣日月朗明地得紫氣祥瑞並生人得紫氣萬事光亨又云一云孤宿二云官星孤宿妨妻害子尅陷六親官星寬慈愷悌有權有職詩云紫氣清間僧道人慈悲齋戒藝術精夀比南山松柏固空房對月度青春金孛與水同躔迷花戀酒水木和身共度咏月嘲風金孛與水同躔一宫則淫縱無以自持故好迷花戀酒水木和身共聚一度則流麗適以相濟故主咏月嘲風金孛如躔昴畢鼓舞終朝水日若度參箕笙歌一世昴畢乃是風花雪月之星參箕亦是春花秋月之曜身同金孛躔昴畢則鼓舞終朝命和水日度參箕宜笙歌一世僕馬聚羣奴婢成類鴈行成陳棣萼聨芳六宫無戰則繁華三位有刑分汝我極宫凶惡鴈行孤妾位相和夫偶盛四位空而無星終身獨立三方陷而見煞雙手為人聚羣言多也成類則是主奴同心而盡其力成陳言衆也聫芳則與昆季齊名而並其芳僕馬聚羣者六宫有天馬地驛馬元之類鴈行成陳者三位照合有貴人文印之類然又必有相生相成之星相合相順之宿而後能成類聫芳也妾位者妻宫也相和者寅申巳亥一七相生也大要六三一七之宫喜金木水陽長生祿馬貴人相會不喜水火金羅刑囚破耗相尅四位者對合四位也三方者三方主也對合無星則其命孤三方落陷則其類失通加無救不為獨力雙手之人乎碧玉經云看方主以何如是也子養外來生處絶兒孫異姓絶中生生處絶者如年納音是金見時上丁巳納音是土金長生在巳土絶在巳是也絶中生者如年納音是木見時上甲申水木絶在申水却生在申也一云生處絶者如男主木星躔在亥是長生也值丙寅年納音絶地在亥是生處絶也絶中生者如木星填在申是絶也值壬辰年納音長生在申是絶中生也前説以時籍言後説以宫主言二説俱通當併詳之交朋有信體用相和結義無情主賔並戰體即主用即賔體用若相須相和必主交朋有信若相尅相寃定是交義無情下篇不祿不官惟看十宫誰掌握無衣無食便詳十一以為慿人命惟官福為重茍有不祿不官無衣無食者將何以稽之惟看二宫慿誰掌握必其非間神乃忌曜故至此也舊注云官福二宫若官魁印綬貴人祿馬有用刑囚祿主居祿福主居福晝陽夜隂之類管主成名發達如晝火夜土四餘交戰日月薄蝕刑囚央拱無情福祿管主遭刑害破蕩之人經云身宫清吉休愁命福德堅髙不問官是又以福為重也當併詳之信失禮虧棄功名於物外仁乖義絶視富貴若浮雲在天為五星在地為五行在人為五常其理相通而其氣相貫故星盤一曜不明於人未必無欠茍土陷而信失火伏而禮虧木空而仁乖金爍而義絶則其人終賤而處世亦難矣又安有功名富貴之望哉主入天空業如鎔雪財親耗難富若浮雲命主入天空及空亡之位財宫遇天耗及劫難之星皆主無成立人也耗碎欺財不足守成之輩刑囚欺本無端破落之徒耗與刑囚化曜之凶也碎的煞也富命不能無耗碎特不在財宫耳若耗碎聚會而欺財豈是守成之輩貴命不能無刑囚特不欺主本耳若刑囚拱夾而欺本必為破落之徒少喫多間三方變忌朝飱暮討二主逢空三方主星化為刑忌身命二主坐落空亡倘無吉星之助決為不足之人暗耗欺遊街衢呌賣刃刑並煞市井屠沽暗耗尅財之星遊行街衢之地刃刑宰割之曜大煞權柄之星使遊行有氣身命髙強無財亦可興販帶刃反為有權茍遊行為暗耗所欺命宫為煞刃所併而他無可取非呌賣屠沾之輩而何暗忌相攻與四鄰而不睦田園破制使三代以無傳命之左右為四鄰使財相暗忌相攻而不相順必主四鄰不睦言身命孤也父母宫為田園使田園囚忌相制而不相生必三代無傳言根基淺也海角傷身夜蓋漁翁之網天涯尅命朝隨裘馬之塵戌為海角辰為天涯如辰命金論而身安於戌是火地傷身故夜蓋漁翁之網因其在海角也又如寅命木論而木入於辰是金地尅命故朝隨裘馬之塵因其在天涯也此命須官福二宫通無可取乃以是斷之六八隨身身居萍梗九三伴命命遇栁營六八兩宫名為惡弱九三二位亦號凶宫身命落此更水孛相逢孛羅來往四餘駁雜星辰退逆者若非栁營絶塞之軍必是萍水他鄉之客身與四餘同度栁必好為偷奴和二主共躔箕須當落破氣孛羅計為四餘奴曜而孛計尤為利害固不可與身命同度栁在天傍鬼曲頭側伏原非端星箕在天好風倐聚忽散本無定性亦不可以身命同居若身與孛計同度栁以邪濟邪故好為偷二主落陷奴宫共躔箕以弱濟弱故主破落而卒於無成也若度栁而無四餘止有太隂是月挂栁稍也躔箕而非二主止惟奴宫是箕翕其舌也未可純以凶論星栁宫中安首尾間攤似鬼虛危度裏有欃槍見識如神釋義云攤為開為鋪星栁二星主盜賊却安羅計而與命同度虛危二宿主清虛若安攙搶而與身同宫皆主險邪機變似鬼如神非君子之流也燕趙有水計而不和秦楚遇孛羅之交戰不是蛇傷虎咬也遭雷打波沉晉魯無情多縊死周齊相反衆猖亡生本者威而不猛尅身者貴亦傷殘燕趙秦楚者寅酉未巳之分野晉魯周齊者申戌午子之辰次燕趙水計相攻秦楚孛羅交戰更逢浮沉血光血刃刑尅身命決主遭厄無疑夫水計孛羅論相尅均謂之凶何獨言秦楚燕趙之位蓋孛在秦是孛入秦州而羅壞之羅龍角是首携龍角而孛戰之山下蒙泉之水最忌計尅大梁金牛之金最忌孛泄故於此為獨凶晉魯無情者水火交互也周齊相反者日月反處也故皆主不得其死又當知有生我命主尅我命主之不同生我命主星雖威力而有可救若是尅我命主縱成貴格亦難免乎傷殘矣詩曰霹靂一聲誰不怕命刑身陷何須訝夀促當逢惡曜臨其人死在雷霆下又詩曰血光入命必傷殘刑犯凶時禍更専六尺之軀亡虎咬不然須是溺波間又曰己卯二宫忌曜臨命身化煞禍尤深又曰土金經躔四正宫死囚鋒刃怕主會尅刑身命定蛇傷不然虎咬君休怪又曰土臨八煞光灼灼火在財宫福不全若是鬼刑屬忌曜蛇傷災阻定當年是也燕趙並行身流西北荆吳雙立命喪東南楚豳之邦逢土計宋徐之位見熒羅身不亡於獸蹄體必葬於魚腹燕寅趙酉荆巳吳丑楚巳豳亥宋卯徐戌也寅酉並行乃金木相尅假如癸丑生人納音木不可受尅却金木同躔酉位是木到大梁而金居旺地木削於金故身流西北己丑雙立乃水土相尅假如辛未生人納音土不可受陷却水土同躔己位是土埋雙女而水居旺地土不勝水故命喪東南己亥逢土計者假如壬辰生人納音是水己亥二宫立命夜生土計同躔是水隨難而木見仇也卯戌見火羅者假如戊子生人納音是火卯戌二宫立命晝生火羅同躔是火氣脫羅性暴也人命值此皆不免喪於非命風恙者嵗星入楚刑流者辰曜歸揚楚屬巽為風木至此則動搖其根而風恙之疾難免揚厲坎為水水至此則泛其性而刑流之禍奚辭詩云翼有異風吹百木火蛇熒木必生凶經云顰眉常不足只嫌水到揚州是也計孛同行為人好逞金羅背去性氣多虛女人𢃄此必驚風男子逢之為浪蕩若遇刑囚與暗耗定教凶夭與孤貧衆憎指背煞難侵宫半世顰眉直刑尅本或觀往來猶分背去孛計同行則其性鬪金羅背去則其勢分故主其人皆剛狠而有好逞尚虛之不同然惡曜凶星在男女命中俱不宜有則一也使遇福祿權貴善星助之猶可解救若遇刑囚暗耗交會是以惡濟惡難煞交侵命位宜取憎於衆人直刑専尅身星必憂愁於半世然亦不可一槩論也當於煞難直刑察度數之往來先後分順逆之向背遲疾而斷之庶乎其不差矣五鬼尅身終是身亡縲絏三刑尅本定然命喪沉塗五鬼者五官符是也假如甲子年五鬼在辰屬金亥宫立命金來尅木太隂在戌金星同度又加三煞飛廉併天羅地網之地故主極凶三刑者寅刑巳是也假如壬寅生人立命在巳土為刑星躔星太隂躔申寅刑巳巳刑申申刑寅輾轉相刑更加亡神伏尸闌干貫索等關故主惡死命喪道路也四餘並刑因官喪已三命遇煞為鬪傷身三命身主命主度主四餘並刑乃三命遇煞也若四餘星與身命度主相攻或為刑囚加夾或帶的刃衝併非因官而喪已必為鬪以傷身斷斷乎不能免矣讎鄉疊見伸訟曷頻刃處雙逢凶頑無匹仇鄉疊見者乃是五鬼陽刃又帶刑囚亡劫的煞重疊必陷官非經云官怕囚星之反集福嫌忌曜以相侵是也刃處雙逢者乃是陽刃重疊如自刃飛刃之類陷之必主凶頑無匹自刃者戊刃在午故戊午為刃飛刃者午刃飛入子故戊子為飛刃詩曰飛刃自刃重疊來兩般逢此便為災煞曜四強同水火少年遇惡死為灰是也繡靣紋身貌神會煞截頭刖足體主加凶貌神體主者相貌宫之主也若遇六曜受傷五星剝雜血光相會的破交侵必主繡面紋身截頭刖足纍犯三章伏尸躔中遇鬼頻遭百辱卷舌度內逢刑三章刑憲也伏尸卷舌闌干貫索星家謂之鬼門關躔度見不利言人之纍犯憲章頻遭官辱皆由伏尸躔中逢尅身之鬼卷舌度內值尅夲之刑行限遇之定主惡死無疑若不遇鬼不逢刑對合參差或有吉神解救亦未可以凶斷煞難隨身膏盲及已刑囚尅本痼疾躔身煞難隨身凶神貼體也刑囚尅本煞曜刑身也故皆主不起之疾奪項霸之材海角帶刑兼尅本染伯牛之疾天涯為難復纒身海角為地網為奴僕天涯為天羅為相貌是二宫最弱貴人不臨之地而况帶刑囚以尅主為難煞以躔身命值此者豈不死於刑而殞於疾哉假如六戊人命立辰宫以金為主飛入戌位火垣火化刑尅本雖項霸雄材終不免於凶死又如六巳人命立亥宫以木為主身入辰宫金垣金化囚躔身縱伯牛德行亦難逃乎惡亡衆惡臨夫夫疊損群凶聚妾妾重傷衆惡群凶兼天星地煞無有救解而言今人有一婦而損數夫一夫而傷數妾者正坐此耳一七變仇須失業六三如反走他鄉四位相欺家必敗本宫聚煞壽難堅此節雖以一三四六七之相尅而言而實有關於身命也蓋十二宮分言之雖有強弱不同統言之要皆和順為美如一七變為仇囚六三與命相反四位星辰相戰本宫惡煞交侵皆為不足故主貧賤奔走刑尅不夀也是知強宫固要有力弱宫亦不可無情看星者當兼審之方隅有犯壽命難長體用無情福緣易消方者三方隅者四正茍凶煞交犯而無救助之星則夀命不永體者命主用者命限若體用無情縱有群曜之吉則福緣易消四正無星三方落陷壯嵗若居臺省末年餓死陽山四正空而無星三方陷而見煞本為不吉忽行官祿限遇吉星得地驟然一發過此一限仍舊守窮途而飢死前言雙手為人終身獨立意猶未盡故此復言之也命弱限強發達不久命強限弱榮超終難經云命強限弱渾如逆艇上灘命弱限強終似稿苖得雨是也兒女當傷室家合戰莫言安有刑害限遇孛羅必喪兒女兒女宫主室家夫妻宫主此二宫星辰最怕相刑相尅假如二宫遇原守孛羅尅戰勿謂無有刑害須行限遇之或在夲宫或在合照衝吊孛羅尅妻子無疑此重限而言也三悲九哭戰年宫每被妻孥之削五鬼六衰欺嵗駕頻遭官吏之辱三悲三喪門九哭九白虎五鬼五官符六衰六死符若身命限遇三九五六之位兼以流年相戰則其凶必以類應矣或有劫煞多是流年作梗更逢失墜必惟嵗煞相攻審有吉神之助便無凶曜之侵劫煞乃是應天所謂十六般亡神十六般劫煞人命中所不能無者或冇劫煞為災害必是行年衝併而後為梗不然亦是太嵗與衆煞相攻故有失墜之禍若得吉神以救解之庶可以無凶也客曜占強六親氷炭賔星破主九族華夷忌讎流尅主賔煞難直刑體用察無根基之穩斷為薤露之人賔星破主與流尅主賔賔字不同上以難星言下以限主言也言七強宫為間忌所占則六親如水火之不相入身命主為間忌所傷則族屬若秦楚之不相恤忌囚者忌曜化囚煞難者煞星黨難直刑體用是衆凶會於當年根基不穩定死無疑經云太嵗迫凶而入局夢入南柯流年會煞於當秋歌興薤露是也四位俱空披頭撒髮孤神傍照員頂方袍披頭撒髮師巫流也圎頂方袍頭陀輩也四位乃對合之宫孤神乃煞羅之曜四位無星孤神傍主非僧道師巫而何紫氣髙強師巫有分食神共位俗計無緣半俗半僧間伴主孤衾孤枕命隨奴紫氣若在髙強又與羅計共位是孤中之孤故主俗計無緣師巫有分詩曰紫氣逢入紫極宸吉星同照信精神孤寡空亡間極位主為僧道九流人是也間極伴主半俗半僧命主隨奴孤衾孤枕又當以紫氣遇蝕神而互觀之不可執一論也間居命裡守孤幃主到間宫眠半被命主入間間主入命乃是互換孤神更值紫氣奴羅照合必主守孤幃而眠半被夙夜忘憂間伴主朝昏勞役命隨奴凡身命不可失之於弱弱則必牽於所遇所以間伴則間奴隨則勞也是故先立乎其大則其小者不能奪豈特於人為然雖命亦有然者夫壻寄生一七主星互換公婆真假二三四位相依夫壻寄生是夫入贅於妻賴妻家以資生也公婆真假是不公婆其公婆而父母其公婆也夫壻寄生必夫星入命宫命星入夫宫彼此互換公婆真假必財帛田宅間極三宫互相依附以致是二者又有得失之辨假如寅申巳亥四宫為一七互換是水木相生雖寄生主夫妻諧老未申二宫為二三四位相依是日月金水類聚雖真假主富貴雙全其餘他宫皆主不美孛若欺金妻用妾計如刑火息為兒息女子也古人稱女為息如呂翁謂家有弱息配髙帝左師觸龍謂賤息舒其是也妻用妾是以妾為妻也息為兒是以女為子也金孛為謀多侍妾火羅背約奪人夫氣計加臨無似有鎮辰交會有如無金妻星孛妾星金強孛弱妻主能為孛強金弱妾奪妻權男命金孛會於妻宫則多侍妾女命火羅同於夫位則傍人夫蓋男以金為妻最怕孛泄女以火為夫最忌羅黨故也氣孤計毒相尅不順鎮濁辰蕩交戰無情若加臨交會於妻妾之宫更臨四敗四煞則於夫妻亦如有而如無矣九三若會暗金私淫棠棣一七如加權印內亂緦麻太白逢凶妻魍魎火羅𢃄惡子螟蛉寡宿臨夫明月清風誰與共孤刑尅命髙山流水少知音金乃妻星化暗則不明化權印則非體若化暗化權與九六一七相會皆主內亂然此論其大較也使君前父側權印何妨火月齊明化暗何害惟賤曜相牽咸沐相併故可以此論之太白逢凶者金神值亡劫的刃為流年衝併必主魍魎之妻火羅帶惡者火羅遇刑囚天狗為流煞交戰定是螟蛉之子孤神在隔角之位寡宿在庫基之鄉女忌寡宿而臨夫宫男怕孤神而刑本命皆主孤幃獨枕人也髙堂觀不可同行河上臺焉堪共度自已不遭妾辱其妻也主淫娼楚襄王遊髙堂觀以夢神女故宋玉有朝雲暮雨之咏衛宣公作河上臺以要宣薑故詩人有燕婉戚施之刺此二事皆淫縱而破義者以髙堂觀喻遷移河上臺喻間極不可同行共度言不可入命宫占妻位或與妻命同宮同度也若此四宫主星混處互換加以刑囚拱夾其妻妾不豪霸而欺夫亦必貪淫而可耻矣貌勝西施膚不朽賢如孟母命歸基偎玉偷香身坐馬迎新送舊主咸池金木水陽與身主會於相宫必主有西施之貌日月金木為命主不起本垣必主有孟母之賢凡女命安身最怕臨官四馬乃臨官之地立命最嫌沐浴咸池乃沐浴之鄉偎玉偷香迎新送舊亦甚言其淫也經云咸池一煞禍最真逢水妖嬈主亂淫沐浴進神仍見貴必教傾國與傾城是也六曜朝垣夫榮子貴五星聚貌臉媚肌香已嫁如未孤神貼體失婚似有賤曜磨身遇木則天香國色見火則佛口蛇心六曜氣孛羅計日月五星木火土金水朝命垣而六曜合格聚相貌而五星相生則四餘不可以凶言而相貌難槩以弱論矣其有容色而享夫榮子貴也不亦宜哉孤神氣也兩賤水孛也貼體磨身言與太隂同宫而近度也孤則孤賤則賤又何疑焉五星中嵗德最吉熒惑最毒故又抽而言之以見命主貌宫遇木則善遇火則凶安可以五星聚貌盡謂之美哉終夜迎歡大忌賤垣合馬未婚先産尤嫌水孛扶身逞扮者身臨四敗披緇者命會孤刑雲水之徒羅遇氣風塵之女孛逢金大抵女人之所忌者咸池祿馬之地月孛水金之星然必身與命坐咸池或咸池會祿馬或水孛會咸池或金孛臨沐浴方可以淫賤言也若女遇孤刑而男逢羅氣則雖免於淫賤亦不失為僧尼之徒垣城合馬婦非為帝座逢虛兒不肖星家以垣城名曰支帝座名時支琴堂以日支為妻時支為兒與子平之法同看假如日屬子丑則以土論時屬寅亥則以木論看土木二星坐落何宫若逢生坐實皆主妻賢子肖此説的有至理發星家所未發也今觀望斗之説假如寅午戌生人馬居申巳為日支巳與申合是垣城合馬甲子旬人戌亥為空虛時支屬亥是帝座逢虛故主妻多非為而兒亦不肖也此與琴堂之論合一説日納音生處為垣城時納音旺處為帝座兩賤扶身煙花粉黛雙凶夾命自縊投河兩賤者金與孛也扶身是同行同度雙凶者計與孛也夾命是一往一來故一落風塵一主惡死衆煞扶身非懸尸則刎頸群凶損已不産喪也多驚衆煞群凶者非特亡劫的刃三煞大煞之屬如火金相戰水熒交逢金羅來往日月被傷此皆為煞曜往來俱能傷身損已經云交逢陽刃互帶懸針楊貴妃身沒馬嵬戚夫人體為人彘若有晝陽夜月福祿吉神加拱天月二德在命雖有大凶亦不橫死正謂此也日換三粧身營栁鬼夜眠無伴命度虛危栁主輕搖鬼主譎詐虛主清孤危主哭泣如人身命居此四宿必好為粉飾而不免於孤眠鳯眼桃花外假慈悲而自重鼠眸祿馬內實淫蕩於私期太乙獨占咸池風流倜儻水金如臨沐浴泛濫妖嬈鳯眼桃花者酉為鳯庚子生人見酉為鳯眼酉宮之金飛入亥見臨官為桃花故曰鳯眼桃花鼠眸祿馬者子為鼠丁卯生人見子為鼠眸子宫之土飛入已遇馬元為祿馬故曰鼠眸祿馬二者雖異名而實一類女命值此外雖假慈悲而自重內實淫蕩於私期也若月孛占咸池水金臨沐浴皆以此論鼠眼回頭踰墻偷漢鳯眸順視渡水從夫見紅鸞能惹王孫之腸斷逢喜神暗牽公子之魂消子生人以酉為咸池以子視酉謂之回頭酉生人以午為咸池以酉視午謂之順視回頭則曰踰墻順視則曰渡水亦曲盡人情也紅鸞喜神男命宜見之若女命會於咸池謂之賤垣皆主貌美有情故多淫賤咸池煞舊説申子辰三合見酉巳酉丑見午總名咸池今觀經云鼠眸鳯眼回頭順視桃花祿馬之説是純以子午卯酉言如子見酉酉見午午見卯卯見子咸池遇咸池故以淫賤言之若總三合一例驗諸女命多不然乃知望斗之論有的見也經言子酉而不及午卯餘以午見卯卯見子亦當立命馬足前奔鬼頭反顧然淫欲則不若子酉豈非子酉為金水五星中以金水多淫故也此余獨見觀者試思之權隱金神揭鞭嫁壻刑加火宿及笄從人咸池見孛期我桑中之約寡宿逢羅空耽枕上之歡男女以火金為夫婦化曜以權刑為男子女人金不喜權火不喜刑若權隱金神則金益剛刑加火宿則火益熖故主敢於自為年少而求夫也咸池本是浴地孛星又好祼體咸池見孛在身命二宫嬌淫可耻經云那堪月孛占咸池才子佳人事事宜期我桑中清夜約免教穴隙鑽相窺是也寡宿夲是孤宫羅星又好隔絶寡宿逢羅在身命二宫孤單難言經云明月清風誰與共髙山流水少知音是也命會攙搶逞艷嬌淫之女身逢天尾慳貪節儉之人攙搶者孛星主淫女人身命遇之更逢差錯破碎咸池沐浴決主嬌淫逞艷為色招凶也天尾者計星主算男子身命逢之更遇秋生失地財庫無破決主慳貪節儉一毫不拔也小兒命數禍福宜詳宫度失留三嵗死前凶後惡墮胎亡四煞刑膚胎內須當破相三刑尅命産前必定傷身小兒之命亦有當論宫則論宫當論度則論度宫度二主不可去留也前凶後惡者三日宫之前後不可有凶惡也四煞者劫亡的刃也三刑者寅刑巳巳刑申也小兒之命未有根本最重命度與三日宫茍宫度失留則根基不壯三日有犯則受氣無資劫亡的刃以刑身巳申亥寅以尅命俱主難養月逢忌土貌遇惡羅不啞聾必生餘指非禿癡也主雙盲縱有吉星之助也須凶夭難當此以下三節俱論小兒言身主忌逢夜土相貌怕遇日羅如小兒身命值此定主壓身破相縱有木氣母星救解亦末如之何也經云生時疾厄臨人馬又與鬼門同分野坐陷或逢土水刑所傷必定主瘖啞太隂火土處何万東出相逢最不祥八煞惡星如照限便知目精實遭傷一主生時躔度逆又兼羅計尤相射臨官兼犯太陽時左眼失明何戚戚月逢計羅少光輝右目盲來指掌稀主順日月逢此曜目疾由來且庶幾忌朔望逢之更凶月在凶躔雙共乳身躔次度兩同胎奴來主舍主起奴宫不是隨娘嫁娶也須換父操持生命復生生兩子尅身重尅尅雙兒凶躔次度一也惟其次度故是凶躔危十二十三四度張十四十五六度是也更十二宫位星宿隔界之度亦是亥有雙魚已有雙女若身臨此宫又與凶星同坐次度多主雙生奴星入命主星入奴又逢逆行相尅相反必主重拜雙親生復生者如金為男主躔巳又見辛巳年納音金之類是也尅重尅者乃煞處逢煞如金為男主入戌地又見羅之類是也生而復生故有兩子尅而重尅故失雙兒詩云雙生巳亥見金鄉寅入寅申合此方未會次躔南到丙火金土月看隂陽男會忌星同月宿此人須喚妾為娘又云雙魚雙女主雙生月入寅申計孛侵男子兩途分朔望望過一子一為隂又云三刑隔宿更空亡華蓋重併主過房必是偏生并庶出不然重拜兩爺娘皆是也三日加凶三日喪七煞無救七朝亡使一主之不虧決終身之無咎小兒生有三日七日亡者有長大成人者三日亡三日宫加凶也七朝亡七煞無救也長大成人命主之不虧也蓋三日宫係人一身禍福最緊惡星躔之災禍立至七煞是亡神身主在七宫值亡神則命宫便是劫煞最為利害若身命主廟旺不虧更有吉星解救雖三日宫七煞宫有傷決主不死經云本主興隆遇凶危而無咎是也計孛穿身童嵗死長庚伴月少馳名計孛本是凶星最忌穿夾身命或加臨三日之宫童嵗決無成立長庚本是吉曜極星伴乎太隂或更臨亥未之位少年必擢髙科詳其體用察其主賔復究洞微何若更推流年相應若能窮此仙機亦庶幾於望斗體用命與限也主賔主與難也洞微大限小限流年急腳黃泉既觀本體又察末流既别大限又推行年則人之星命亦庶幾其不差云星學大成卷十三
