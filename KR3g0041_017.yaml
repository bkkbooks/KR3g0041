body:
  text: 星學大成卷十七明萬民英撰三辰通載五星水德辰星總龜算法置積日加八十一以一百十五日八十七分六十一秒為伏見留退一終之數除之不滿者為餘日一下中定星以餘日數去之看在何假又看入假得幾日十七度便是水星定度夕伏十八日行三十四度五十分去日十六度五十分而夕見於西方順行十七日順遲十日共行三十一度五十分夕留二日不行夕退十日九十二分八十秒半行八度六分十九秒半晨退十日九十三分八十秒半晨留二日晨遲十日順行十七日晨伏十八日行度並與上同水星論水星辰星之精也一名滴星一名龜星建北方之氣其色黑其性智廷尉之象出沒依期光明澤潤歲豐民泰伏見不時災傷獄訟不平其行宫度亦有伏順留逆附日而行不離前後一宫一年一周天入留假號台星主發薦不能登科入逆假號厄折星主多災難又伏假號天井星主口舌是非庚生人以為祿主星甲生人以為刑星乙生人以為貴星丙生人以為蔭星丁生人以為耗星戊生人以為福星己生人以為暗星辛生人以為權星壬生人以為囚星癸生人以為印星此星廟午旺巳喜辰好亥子琅玕經云水居雙女最為靈華省臺官給諌臣巨蟹栁星超職位股肱帝力彩絲綸或臨亥子多招祿方主推之福轉純身命限中俱見照財多恩博更相親此星入命専主性巧文章冠世筆陳超羣經云北方水星専主智性地惺惺多巧藝好樂隂陽巨蟹宫若臨申巳尤為貴生逢坐命最聰明更在身宫亦伶俐非惟辨舌若懸鈴更主文章多藻麗水入命者無大驚恐災厄逢危不危臨險不險大事成小能順人情合煞星則反吉成凶見善宿則變禍為福水星入命最為神危厄災迍事不成逢惡則凶善則吉方知此曜順人情惟有水星本無定相近之處即為性附陽與陽為福星附隂與隂為善慶與日合兮主文章性巧聰明難比並世上文才須見水善星成福最為佳忽然更有吉星照人間喜美事奢華賦云給諫功臣須假水臨雙女最怕與計羅孛同位則主刑害夭折忌疾壓身若六壬人見之為囚不得其用更在戌位則為怒地主早年作事淹滯坐命在寅亥者以此為科甲安身在巳申者以此為學堂宜在髙強旺樂喜好之宫更有吉星臨照或居三合四正大有福力若為官星為祿主庚人以此為天官正祿俱不可陷弱經云官星元在第十宫此星宜順旺廟中若能躔在髙強處必為將相祿權隆天元祿主星更髙身命四正福堅牢此星陷弱多吉曜雖然有剝免煎熬坐命在卯子者以此星為天厨祿主若人命則為坐天厨格更有金木同宫即便以富貴兩全斷之六壬生人見之四十以前未見食祿晚年大享福水星歌辰星快利有文章形相清嚴色潤光智慧聰明多巧妙出人學問不尋常情不定性溫良遇員則員方則方樂廟若居巳申貴他宫筆吏好心腸水在命宫樂廟髙曰反第他宫有文才筆吏也日會父筵多酒食月逢二母莫思量木月見吉仍昌李杜文章萬丈長日月會主文章晝火若同貧且賤刑尅尤防上法場夜土會主癱傷金妻愛入别人房與夜土會主癱難與金合主妻淫天乙更貪修養術彗來劫盜惡聲揚首尾氣豪多勇毅居財一似雪和湯兄弟犯隔他鄉田宫祖産破狼當子息女多男巧妙僕夫偷走急忙忙水在三宫兄弟離别四宫破祖業五宫男女多巧妙六宫主奴僕走妻位主妻多外染厄宫腰腎也羸尫遷移處好遊商官宫早歲甲科昻福德自然多福壽貌宫儼雅性溫良從頭説盡人間事後學須教仔細詳水星善惡本無心同處尤宜吉曜臨最怕惡星同入陷平生浮泛不能禁水星如傍火之精火土同行何許清若與金星相夾帶平生天下有才名晉地相逢土反宜衣豐食足不須疑若還更伏太陽下萬事和平福可期雙女宫中得逢金超升富貴巳宫臨金水共蛇蛇會處科甲必定稱人心水人以木為兄弟壬癸生人亦如之吉曜重重在此宫兄弟五人五箇貴太隂屬水再逢水兩水令人多智慧反成愚鈍本無他只為金牛非正位體貌洋洋得水星水星又為火同行相濟相傷成福德只憂田宅主多更太陽紫氣并水星若當本命富還清富主堆金仍積玉貴時只是自清明六合相逢金水鄉多能相貌更堂堂木星鄰近多淫亂却主資財壽命長水逢吉宿便興祥莫使凶星共一方若值孛來同照命一生性毒好爭強火星若與太隂同作事從來不見功好競到官常失理夜生方免獄瘟凶土人得水不為財反於財帛起悲哀破蕩田園死妻子亦愁宅舍化為灰水星辰上仍逢水若遇太陽本富貴莫教别有一星來不可圖名且圖利水入紫氣先喪父戌未水星當尅母為人持重有文章直待晚年方發舉火入強用水為官土星同位主孤寒從教學館星光曜空讀詩書自小頑太陽元是火之精子丑宫中並水星若在邊傍應為福定須科目振聲名水星臨日性淫邪紫氣同宫命曜加子午卯酉四處命平生只是愛貪花同金多欲火貪婪晝夜相逢多夭死孛計相逢邪佞人晝則吏戎僧道爾金居亥火絶男兒三十年前未見妻若也有須生死絶真金必定化為泥水火相刑第九宫土羅對照賊徒中三方若在髙強位日夜貪謀作貝戎水主文筆的作竒木金西沒並光時一星乘旺三方位須作龍頭貴格推辰星在巳旺非常與日同躔列軫鄉假使不登黃閣貴也須官至翰林郎水星最喜遇金奇富貴須成少壯時凡有所為無不利更知有壽到期頤水星殿局朝元水星附太陽曰玄武持旌在獅子午為正殿居申子巳亥為本局愛箕璧參軫四星為朝元身命太歲臨之文章華詞翰苑之任六庚生人最佳水星廟旺樂順留伏逆廟旺宫水入雙女巳上名為文昌玉堂星凡人若是本宫帶祿馬更官祿宫有吉星兼行五星順假便斷為至貴若不行本限只身命相應更見祿馬只作龍圖給諫翰林命斷若論科名應在第二三四名前若有救星作賢良出身若在此宫留伏逆段減力仍看他星斷之兼內品之位樂宫水入隂陽申位上名為天鸞利英星若人遇之皆有文學更有吉星相應便作京朝斷之若無救星只作名流上等清貴若伏留逆假皆減力只主伶俐如在别官減半福更若吉星同臨便應外臺順假永入順假名為天犀天科星凡人身命遇之更看主星便作品貴之格若論科名多主二甲四甲大凡看命若斷科名先看此星為準仍看祿馬得地留假水入留假名為黃道台星凡人身命遇之主聰明只發薦不登科有救星加三分經云水入留假號天嚚榮妻寵妾是前因主星三合妻宫位亦可文章以立身伏假水入伏假名為天鳯天井星若人身命逢之多主口舌是非為事不定淺薄若得祿馬入格有救星必多巧藝更主星在強宫者貴經云水星伏假名宿汨為人作事尚匆猝主星前後三宫行情性無常多恍惚逆假水入逆假名為厄折窮哀星若人身命遇之識見機關陽宫多智隂宫多詐更會祿馬貴人作貴命斷如在低宫夜生多學傷口過招是非經云水在前逆名厄折致難見災常切切主星之後第三宫好色貪淫無限節水在後逆名窮哀為患為寃不可猜主星對日須有位貪淫迷色損傷財水星躔宿俱出玉關經玉關歌水躔角宿號天成清秀文章學術明喜怒無常心不定平生財祿自豐盈水居角位有金星金居龍位好辰星水角得金分外貴金水相潤有精神水躔亢宿號天津容貌清奇通道術心清間暇作文章多學多智善音律龍頭水潤有髙功最喜學堂四正宫女必聰明男學士祿主權方達聖聰水躔氐宿號天旨言語聰明知道粹人情好惡性能通遇吉終須文學貴氐宿所屬卯與辰水居初度福堪論八度深躔尤怕火水火相戰是間人水躔房宿號天淫智識聰明如賢人衣祿自然心泛濫文章學術妙經綸房宫日兔向東家水臨此地不堪誇日兔不堪辰曜立水到東居勢位差水躔心宿號天凌清潔為人快性情巧計多修文業秀聰明才藝二三分心宿從來樂火臨水遊火分勢難禁火須于心居大火水焦火位病來侵水躔尾宿號天澄理義該通學術明資財耗失多災否惟恐風狂染疾人尾宿亦怕水星遊火虎從來水不流虎若在寅正所屬水臨此地福難求水躔箕宿號天浧心間快樂任天真平生衣食資財足道藝文詞足講論箕星好水水相宜水豹周流日日竒上下相流堪作福水木相扶却有依貴格云辰星偏喜度經箕丹桂須攀第一枝水躔斗宿號天德俊譽文章心耿直子孫榮貴更氣和衣祿豐盈言語澀水來斗宿莫臨妻必定難婚事涉遲若在餘宫怕吞尾水氣相逢恩蔭竒水躔牛宿號天甄朋友氣和益子孫心謀機密人難測財物多應得外人水牛相會貌超羣處世榮華蔭子孫只憂計孛相臨照凶暗乖離受苦辛水躔女宿號天驛眼疾朦朧是貴人貪財好學多議論平生衣食也艱辛女星更好月同行隂曜同隂祿可亨若見土星同度立妻兒孤尅自無成水躔虛宿號天馴清潔為人財祿臨多能技藝心慈善孝順終須樂弟兄虛星星月水中求水星到此福髙丘須要吉星兼祿主若無留逆福綢繆水躔危宿號天中語澀心艱眼半朧中末之年方得力外人財物稍寬容危宿本是屬水宫水無定度木兼隆若是留遲方定貼更逢廟旺反無功水躔室宿號天攸文學聰明智慧優厯事未能心預測算籌多計樂間遊聰明文曜水星精臨室度中喜順行若作科名并祿主安身坐命祿安榮水躔璧宿號天池智慧多端有志機天文玄象多通會衣食平生也不虧璧宿在亥號天宫水要加臨璧度逢水從此宫元甚妙須逢福曜木尤隆貴格云水星度璧福偏隆挺出千羣推第一水躔奎宿號天凌忠直為人性急煩財祿自然多積聚平生多事不安間奎星七度過乾宫水曜臨之福不窮若是深行宫度分白羊水浸實難容水躔婁宿號天澌耿直為人不受欺衣祿豐隆多稱遂平生快樂勿凶危婁宿從來屬火棲水還同度固難為水浸白羊終汨沒縱逢祿主亦凶危水躔胃宿號天泓耿介於人記事明忠孝有心多執滯為官衣祿未安榮胃宿水星切莫逢天羊孤角自生凶水位更逢夜裏土修書無氣更顓蒙惟藉金星同度分方居福祿號文昌水躔昴宿號天誾容貌清奇識五音心謀巧計事沉靜衣祿平平禍不侵昴位正屬金牛宫水躔金宿氣英雄若是主星兼氣力少年聰俊廟堂中水躔畢宿號天淋歷事三思性又欽容貌清奇衣食足文才學問滿胸襟辰星水蛇方躔畢八度如何有貴榮逆伏留遲皆不吉若行順旺稍聰明水躔觜宿號天樞清潔為人足智謀多財多藝多工巧歡樂平生好逺遊水星聰慧主文詞四七之宫不喜觜孛曜同行來此地色欲貪歡只為斯水躔參宿號天湫歡樂無憂足計籌作事未能心巳怠豐衣足食自優遊水臨參宿正廟居文星入廟要因扶水性聰明専好動因能自執不凶虞貴格云水曜經行參宿度貴榮廊廟位三臺水躔井宿號天潯心好清間志曉明籌䇿文章人薦用聲名逺播定官榮井為木犴未宫棲水來此地福相宜井有水星須得地此為富曜福希奇水躔鬼宿號天洪好靜為人更美容心裏洞明兼道釋衆人欽用樂無窮鬼星正𬋩未宫陽水鬼相躔未可當此曜順行宜見水水孤井立必孤孀水躔栁宿號天汪為人柔善會文章巧計多謀心不定聲名閭里自揄揚栁星所樂水相從水扶栁曜最從容栁緑更宜流水處科名騰播達宸聰水躔星宿號天清伏見皆能官職榮與日同宫須大用定為喉舌顯朝廷火星居地水爭衡星宿騰輝水路亨水宿星官多巧麗文成七步氣鏗鍧水躔張宿號天榮富貴雙全性又靈文武才猷皆並用賢才兄弟樂平生張度水星衆所欽每臨身命福資深必能顯赫人爭羡名譽昭彰達古今水躔翼宿號天異年少登科文學貴清華要路驟遷榮與日同宫須大貴翼宿八度至十三員明淨潔水來參不論遲留并伏逆當居科甲有文談水躔軫宿號天岑文學之官衆所欽聰明謀略人多會藻思文章入翰林軫宿本是水樂宫水星入廟福尤濃上下同流為樂曜男人多學女人聰水星行度水星在星宿三度十六分以上至七分為向廟至張五度為正廟在隂陽宫為本宫旺參宿為樂宫在雙女為旺宫翼宿十二度為次旺宫軫宿四度為正旺居此生人聲聞四海辰星星為員明水之廟也不以伏逆順見皆主大貴常居一人之前後有出人之才為喉舌之官若臨雙女宫翼二度及十度為好樂之宫及為旺度與日同到少年便貴歷清華之選若日在軫水在翼為宰輔之任日在翼水在軫為文學之官水無正性以對合為性近金好音律兵戈近木好近貴人近火土貴則貴賤則賤近蝕神好偷盜近孛好殺近天乙好神仙之事入宫十五度以前好文章十七度二十度好醫卜二十一度至二十六度有見識好潔為僧道二十五度至三十度近日則吉逺日則凶若伏逆皆為技術之巧與金相好與火相惡日度主性格溫厚內剛外敏聰明有才智衆人見重是主星晝生有位夜生大富不是主星晝生文藝出衆不貴夜生性巧因道藝立身後必富月度主性聰明有信急性多巧多嗔有貴位木度主多智謀書算多男女能行義事為事吉慶非主星多災火度主多災厄為性不定多毒害有機密識量因妻子有厄損財主患風狂木見減半金度主性格聰明英雄多才智好兵法知未來之事有聲名足財帛王者用之授斧鉞木應轉好是主星貴不可測亦因女人疾妬之厄土度主損兄弟因男女有厄婚姻不定或娶在他州有暗疾災躔或損一目多貪財論訟火相尅則死木相應則免水度主足文學有聲名常快樂能講論足財帛女人有厄水星入宫日宫主聰明文學白日轉加大有文學聲聞四海好圖書有道藝合得國王重用多因貴人喜愛夜生有財非主星晝生文藝出羣順行並貴夜生微有福月宫主聰明工巧好文學得貴人見重因此成立為事不顧危亡是主星有位非主星因武藝立身致富木宫主聰明出羣智量深逺合道理明玄象知好惡能知人是主星多近君王左右得貴人見知非主星微有福火宫為人性沉厚作事方圓有心機好道德明音律禍福預知人休咎凡事有成伏逆諸事難決是主星夜生有位晝生有財非主星夜生有福晝生技巧非貴也土宫主性凶猛見善行善見惡行惡言語澀心細難測得外人財物主患眼目是主星微有職位非主星多非橫之災善星救之可免金宫主形貌端正心性寬多憂惱能音律與人為師水宫主聰明急性能知人智量方圓見事長有文藝是主星夜微貴晝生富對照三合性格亦同福力減水星同宫水木同宫有智慧足文章大人委用有貴子詩斷木星喜與水星俱水賜洪休慶有餘百六會時千福備等間平步入雲衢水火同宫主富心平多姦惡詩斷火星怕與水星交困苦傷殘百事淆隳廢凌遲逢百六夫妻父子總相拋水金同宫主食妻祿富貴少年榮顯足壽詩斷金水二星若相會俯取官榮如拾芥大凡遇此喜非常百六逢之俱吉太水土同宫多滯言語不快會文章日生吉夜生人主年九十詩斷土星若會水星同學行孤髙膽氣雄秉節揮戈文武備福來百六慶無窮水羅同宫不論晝夜生人少疾衣食平平至霹靂之難宜念善詩斷水星最忌與羅同詭計無廉一世窮不孝不忠多暴雪不然瘖啞與盲聾水計同宫主兵刃寇盜之厄詩斷水與計都相照會缺唇跛足并駝背或生癖疾女多淫或是逃亡與結配水孛同宫主貧賤詩斷辰星不欲相交彗男可為奴女可婢邪淫姦宄主貧寒畢世十謀無一遂水氣同宫有財祿足壽詩斷氣星若與水星同天産其人福勢昌官爵顯榮家又富千斯倉與萬斯箱紫與水星能作善厚德純性學神仙醫卜伎巧多文藝一生福壽兩綿延琅玕經節要水乃陽曜喜樂陽星輔日而行助其光熾主方廟旺卿侯之職水木同宫貴重祿豐加之氣月主順興隆水乃陽星宜同太陽晝居廟旺官至卿監水木同宫主髙貴豪富更加氣月貴為守帥重職同金多欲遇火不和貪婪無足為事妖訛計孛加臨非節非忠夜生尤順晝則藏凶水星同金居廟旺遇火羅照雖受衣蔭主淫濫破田業晝夜不順必夭壽如同計都孛夜生則吉亦主性不忠良晝生見之非戎吏即僧道或免凶害即主刑傷不仁好殺晝同土曜當盛可期順則廟堂與身肇業仕宦亨嘉居官名節夜則湛薄貴而歇滅若遇留逆多屯苦節水星見土白日見之順行廟旺則貴而忠信官位興隆官至守土夜生減福在強宫則富掌大財留逆促壽損尅妻子不死則帶篤疾中風之患羅㬋樂旺掌權之多陽宫祿厚隂夜蹉跎水同羅㬋晝生陽宫則貴領重權祿位髙厚雄貴出羣夜生隂宫尅剝刑傷貧窮下賤身難卓立最宜旺位氣木同行晝逢吉曜福祿轉增水星照臨十二宫命宫守照命宫形質重厚體貌威嚴舉措有成性快寬厚多學多智有頭無尾柔中之剛姦中之義心有謀用不懷遷怒此星入命專主性巧文章冠世筆陳超羣一生無大驚恐災厄逢危不危險不險大事成小能順人情若見惡星則反吉為凶見善宿則變禍為福寶鑑歌云水星入命最為精危厄災迍自不成逢惡則凶見善則喜入廟主少年及第在酉宫女有命服巳申巧性文章卯戌藝業口談到未謂之八極星一生福祿與紫氣同在命好神仙黃白之事與日金同為輔弼格最吉惟水滿三用吉多則反凶謂之無救樂旺中主大發財正好處則死蓋水不欲滿用故也金木同位同行少年及第在陷宫不伶俐與火星相惡金星忌妬與日同行多主淫欲忌孛及計同水照合有文章才學多智識心性無定主詩斷水星臨命智多能引薦求財事不成廟旺遷官榮爵秩餘宫僧道晚年興水德星辰在命宫得逢旺處便攀龍聰明智識多機變生在榮華富貴中命宫只有一水星蓋世文章異衆人父兮生我今何在不見登科出仕林財帛宫水入財帛幼年多散水照有文章筆上財帛之分衣食中年少稱意詩斷財帛宫中遇火爭一如把火照霜氷此二宫中逢此曜初年􅌩槖盡皆傾第二星辰在弱宫飄飄財帛去如風若無惡曜來衝破却曉魚鹽水利豐兄弟宫水星主多姊妹難得力水照兄弟隔離他鄉詩斷水星吉曜遇還稀來照三宫便不竒上有親兄下親弟兩頭無義便侵欺水星到巳正乘旺最嫌金火來相傍太陽若落在前頭縱是後生亦先葬田宅宫主自成立又云若臨父母永年齡水照主先破後成田産多因外方立家成活詩斷善星一曜是辰星得入強宫福轉精不見當年刑忌照便須萬頃與千贏四宫遇得水星光吉助先令母壽長文華一遇登科早為官食祿及爺娘男女宫端正至老得力在戌位則招偏庶異色之子水照有聰俊之男見多者只招一人之力詩斷辰星髙照子孫位俊邁文章為國瑞水數推來只一男振起家風日榮貴奴僕宫雖有奴僕鞍馬亦多主失竄水照奴婢六畜多損害詩斷水星旺處旺牛馬却多奴使性難驅雖然萬物總由分所為稱意自安居金木同來奴婢宫前有太陽男女貴只用五六正相鄰名達天朝振經藝妻妾宫妻宫端正談論聰明手足纖細中道亦主生離死别水照主妻性不定多外情及姦盜詩斷水照妻宫對照命富貴貞賢福難並忽然惡煞來相侵心濫情淫性無定疾厄宫少災又云在疾厄時常疾滯水照須防江河之厄亦主疾病詩斷第八宫中水德臨溫柔情性足人欽忌星凶惡來侵犯沉溺波濤墜井深遷移宫水入遷移所謀稱意水照不利舟行防有風波之險厄詩斷水星合照最為珍更看東生命位星賔主和同無惡犯遷移出處總歡榮第九宫中會金水金水太陽同一位更加本命對宫濕屋宇既多尤壯麗官祿宫主多口舌強仕以前主有官非相染亦忌婦人憂擾之事水照主官職驟遷詩斷水星偏喜照官宫出類超羣福自隆委任股肱扶寶祚官居高品貴侯封官祿隂陽水到寅不然火到亦為迍自言健訟誇無敵破散田園自有因福德宫君子得之早年亨通一世優遊晚年以來財帛大旺庸人得之得力得財中年橫發衣食自然所謂不栽一株桑箱中有餘服不種一畝田倉中有百榖水照有聲譽貴人舉重之喜只一生不宜隂人交性多反善為惡尅身之事詩斷十一宫中水德來汪洋智識仰賢才公嚴厚德人欽重澤被生人遍九垓相貌宫身形肥小而不瘦神氣清髙容貌端正水照主人好華得隂人喜重詩斷氷星相貌最為強清風凜凛肅冰霜若遇惡星無惡曜容顔端正動君王相貌宫中遇水星機謀多計足嚴明雖然羡容豐衣祿祗恐飄蓬破六親水星變假名寶瓶宫玉池星又名天宸星主巧妙聰明得北方祿詩斷玉池本是水之精學館科名萬事亨更有惡星相照視便為僧道也聰明磨蝎宫沉晦星又名天殊星主貴人欽羡文學詩斷水星丑地為沉晦疾厄遷移溺水津妻妾主逢妻不潔男為盜賊女風塵人馬宫滲漏星又名天樂星主歌舞好舞能謳詩斷寅宫滲漏水為凶六宫疾病命相呼對照傍臨無吉曜一生辛苦受貧窮天蝎宫仇讐星又名天狡星心性狡猾不誠實詩斷太衝水宿號仇讐貴賤命來由爾招若值孛星羅土計零丁親屬定應消天稱宫玉龍星又名天貪星主吝財物招是非詩斷角亢辰星號金龍更加金水喜重重學堂四正無凶煞馳譽蜚聲翰苑中雙女宫玉女星又名天驄星俊傑文章巧妙詩斷巳宫玉女最為良更得金星佐國王男兒得此官榮顯女人逢此有冠裳獅子宫天目星又名天妙星文才巧妙詩斷午為天目水髙貴色衣子息皆聰慧更加四正福星臨鮮讀詩書文美粹巨蟹宫巧計星又名天厭星主遭人厭枉屈詩斷未為巧計美容顔破蕩莊園賣祖田若被惡星相照合機關巧藝會千般隂陽宫紫微星又名天德星福祿全美詩斷隂陽全會紫微星富足奢華有始終更得妻財增貴盛子孫榮舉孝廉中金牛宫失偶星又名天傾星隨世情逐髙下詩斷水星失偶到金牛兩取三婚尚未休女子若逢三度嫁不然離祖在他州白羊宫天剛星又名天巨星主事沉毒坑陷詩斷天剛白羊男女怕切慮大限損天年更逢月孛同宫度定遭刑獄及顛狂雙魚宫玄武星又名祿崇星主福祿超崇詩斷亥宫玄武水之精掌握樞機果不輕官祿遷移兼福德何愁方外不揚名星學大成卷十七
