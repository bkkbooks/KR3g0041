body:
  text: 星學大成卷二十九明萬民英撰喬拗天機淵微序五星麗於天以入躔為吉失躔為凶星之常性人之所共知也然亦有不盡然者或入躔而反凶失躔而反吉其喬拗之謂乎拗而不失其順亦何惡於拗也此理淵微非通於造化者孰能知之鄧太史喬拗是獨得龍從火裏出虎向水中生之玄所以補諸家之未備也若定光矞天機則又不論好樂廟旺盈縮圓缺伏留順逆三方三日七強五弱而專以二明三暗三明一暗論貴賤禍福此又特見陽中之陰陰中之陽其旨與鄧太史雖不同而其用意則一也故合而為一卷聊敘作者之意引於首簡易水育吾子識喬拗淵微鄧太史喬拗經豫生西京世居太史之職仰觀天文俯察地理靡所不至因笑世人但知金水木火土五星垣殿有喜有怒而獨不知有喬拗存乎其間鑑於司天明盡五星之玄奧洞知造化之幽微真吕公所謂五行顛倒術五行若逆行龍從火裏出五行不順行虎向水中生之類是也斯文本不傳於世不求聞達於人適遭時多艱遍厯宇內屢試屢驗后之君子韞匱藏諸宋太史鄧鑑心傳喬廟火土二星號喬廟世人知音少物有相反乃相成此理最為精世人只愛正廟好更不詳推考誰知喬廟更為竒細説與君知晝火參軫及箕壁無咎乃大吉夜土角斗及井奎降福亦如之火逢水廟俱宜利剛柔得相濟土德如居木度中晦滯乃踈通貴命若還逢此限臺省并給諫常人遇此亦為竒富貴更康寧此是官星微妙訣真機休漏泄入垣星辰反生禍甲申壬申詩甲申壬申寅上木不主官司定主哭寅上木星曰若還身命更凶時必主夀年於此促辛巳生金在辰丙戌生詩辛巳生人金在辰丙戌生人土齊瓶土在子乙亥生木在亥曰乙亥命人木在亥若非傷夀必然貧庚午癸巳詩庚午癸巳水居申衆論皆言是吉神生水在申曰限逢出入皆遭險若是孤刑免喪身庚寅生詩木入秦州庚惡寅戊寅寅亥限非宜木在未曰非惟孝服并官事否則亡身定不疑失躔星辰反見福木鬼金室詩木躔鬼度號高強金室翌牛福亦昌翼土角木曰更有土星躔斗角限行至此福非常火土水命宜詩木躔亢度號逢龍若是秋生福亦濃木躔亢角曰三合只愁金尅戰水金命遇又還凶甲子生人詩木躔婁度是凶躔甲子生人又不然木星婁吉曰命限田財寅亥者必然發福進庒田水星躔詩水星躔胃木來凶行限申宫及巳宫胃吉曰三合飛來無尅破命限相逢必富翁金火相逢詩金星行限火同躔未可為凶一例言宜分晝夜曰晝裏生人貧且夭夜生福夀必雙全木土居詩土居申酉如逢木子丑限中富夀足申酉曰緣何土木不為主鬼弱畨能為我福木氣宜詩木逢紫氣本來凶若居午酉又難同午酉曰行限逢之人必吉此是餘奴救主翁令星宜詩四季司權號令星若還受尅始為榮受尅曰且如木命金來尅可許榮華福更新又四季司權號令星諸星不敢與爭衡曰任他囚的臨刑難也須膽落更心驚計孛不宜詩計孛名為紙筆星如居田宅最堪嗔居田宅曰破家蕩産令人哭命好除非自立成火羅計孛詩火羅計孛四雄星若守財宫福愈深冝守財曰若也財星更明白其家必定富千金火羅宜詩火羅夾命福滔天縱犯凶星福亦堅夾命曰金命生人還不足必然夭死在童年限主入垣當生詩限宫宫主入垣中最忌當生太歲衝太歲衝有大凶曰破耗相攢宜出位限星至此總成空竊詩水生冬月與金同子盛母衰反不中星曰人命若逢申酉限金星水伴盡皆凶乙丑生孛為詩乙丑生人孛在寅化為祿主限中迎祿忌木對曰誰知木氣申宫照不死終為帶疾人破碎星最詩破碎星辰煞最凶人生切忌命宫逢忌入命曰為人慷慨多光霽縱有鎡基亦主窮破碎宫主詩破碎星辰不出宫那堪行限在其中不宜居垣曰若非官事并喪服到此終須百事凶月忌詩中弦之月十分清垣廟皆言是吉神晝生曰限行至此皆無福月正揚輝天已明中弦夜月守詩夜生孤月遇中弦必主更居更置田限不問宫主曰縱使限星逢惡地此宫亦許福綿綿剛柔詩火羅計孛過於剛紫木純柔也不祥相濟曰若得剛柔相濟遇為權為福定非常刑囚暗耗宜詩刑囚暗耗實難言我尅他時反是權納音尅他曰身命逢之鄉曲富官星明白玉階行戊子生人最不宜詩戊子生人最忌土當生元化為祿主土星守命限田財曰若守田財大限中不但喪財仍破祖諸凶並宜空亡並吉詩尅命忌囚暗耗刑更兼破碎刃宫星只怕太歲衝凶曰逢空有吉皆無禍太歲相衝又不寧破碎宫限主逢詩破碎空中最是凶限星遇泊便為凶之無不退落曰非惟冷退仍招禍縱使廟垣禍一同當生八煞有鬼煞詩當生鬼煞落空亡大限相逢空鬼鄉空亡大限空大吉曰不貴即當家大冨名高仍且夀延長鬼曜星辰不宜詩鬼曜星辰坐命宫那堪行限一般同命限有空則吉曰無破無空傷本命可憐揮淚對西風女命不宜詩女人天首命宫加才嫁夫時便做家羅守命曰必主公姑皆隔角不然刑尅定無差陽星不宜夜見詩晝見星辰夜宿時限逢福作五分推陰星不宜晝見曰陰星垣廟如逢晝命限相逢大不宜陰詩火金羅月是陰星夜裏相逢最有情星曰若廟官宫并身命三台八座有聲名得用星辰不詩星辰得用最為良惡弱相逢亦不妨問居強弱曰得地不須論惡弱失時何必問高強限忌詩限行陽刃最為凶莫使凶星在限中陽刃曰限好終須有刑尅限凶終是禍重重凶空吉詩凶星行限要空亡吉曜空亡又不祥吉空凶曰吉曜空亡還減福凶星空却可無妨土計相逢却要詩土星行限元怕計只要當生木同制木制餘星倣此曰限行至此皆無福他星亦可為前例金火二星為限詩火星行限如逢日此限之中難發積主怕日同躔曰金星與日又同躔縱居垣廟皆無益刃星互詩飛刃星辰陽刃鄉刃星互換實堪傷垣最凶曰無空無破如逢此縱有相生亦少亡星辰行限詩限星最要仄垣宫宫主相逢反見凶宜出垣吉曰金辰若發酉限內金酉却富辰限中行限宜詩限宫切忌正垣星比如亥限木星臨避宫主曰非惟無福仍招禍木亥限寅福反深行限太陽不宜詩太陽居午太陰未自古皆言垣廟地午太陰不冝未曰太限相逢不發財若出廟垣方吉利田財命主詩若問田財又不然主星又喜不離垣又宜居垣曰只愁大限逢宫主縱發猶防夀不堅尅命星入命詩尅命之星真可畏命宫切忌逢刑至宫限亦然曰若還為忌又逢凶惡死身亡須棄市計都在命及居詩天尾星辰在命宫嫁夫必定兩三重午酉宫符女命曰若居午酉官符位定主身亡在獄中紫氣臨身命詩紫氣從來號善星若臨身命主孤刑又逢計都曰更逢天尾同相守巧語能言最不情命居福德詩命居福德火同躔天首同居夀不堅火羅同躔曰若是金星并夜見限行至此福綿綿水火同居四詩寅申巳亥四強宫水火同居一宿中強為官田主曰若是官星并田主玉階金殿富家翁歲駕星升垣火詩歲駕星辰喜入垣火羅孛計愛同躔羅孛計同躔曰惡曜受制兼朝斗節鉞聲名播九天陽刃星在命是詩陽刃星辰在命宫假如星命運亨通火命在水宫曰聞詩聞禮多間雅富貴中年永不窮破碎陽刃同宫詩破碎星辰陽刃臨若居命裏是前程命主居陽破位曰命主若居陽破位火人金局福多全水星行限水詩水星行限計來侵水在申宫計在辰在申計在辰曰不問升垣并入殿也須貧困促年齡木為財主居三宫詩木為財主第三宫金若同躔福最隆金同躔於四庫曰丑未更兼辰戌位經營財穀永無窮四庫中有水計詩辰戌丑未為四庫水計相逢貧且妬又為命貌主曰若還命貌在其中不義取財而致富水孛逢四主詩水孛如逢田宅宫更加天尾又相同又計都同宫曰為人幹僕添財産末主須交不善終命主土計日又詩水孛奴星入命宫命主土計日怕逢水孛入命宫曰其家必主生淫欲奴婢貪花犯主公身星與羅同宫最詩身星最忌與羅同猶怕魁罡子午中怕在魁罡子午曰此是計羅升殿位若非夭夀必然窮乙丑生命丑身詩乙丑生人命丑宫太陰身主又相逢命主登歲駕曰身命主星登歲駕惡星丑未怕相逢乙酉生命在詩乙酉生人命未宫太陰却向酉宫逢未月在酉宫曰巳邜丑宫分善惡非官貴也富家翁五行生尅吉凶金沙中劒鋒兩般金若居震上莫相侵外有四金須忌火沙劍無火不成金水水見天河大海流二者不怕土相酬外有四般須忌土一生衣祿且難求木松柏楊栁桑柘木大林五木忌金刀惟有坦然平地木無金不得上青霄火覆燈爐內與山頭三火元來怕水流外有三般不怕水一生衣祿近王侯土城頭壁上與屋上三土元來怕木衝外有三般不怕木一生清貴步蟾宫星辰玄妙論凡水火土木皆能自生自旺惟金得火而後有用無星輔皆主不好蓋謂天地肅殺之氣收斂萬物秉權則生意斬然上帝好生抑之不令肅殺之氣盛所以廢之時道四星有餘獨金無餘以此凡土陷山崩枯枝敗葉長江浩蕩爛斧繡針爝火大明吉凶救解最須詳説土星最忌落空亡升殿入垣而落空謂之土陷山崩亦主退敗可畏如有惡星降夾逼迫多有氣蹙噎吃之疾惡星降夾多主倒限如火會謂之填凹補缺金會謂之山嘯呈寶又皆主名利發達木星落空謂之栁枝落根如金會則斫削成林火會則焚折灰滅火出木燼水會則漂槎泛筏不免漂蕩無物水星落空謂之長江浩蕩退敗無餘金會則洪水漂蕩滔天常有不測之災金星落空謂之爛斧繡針最宜煆煉又得貴人星會之則是常行用之物又主名利有成火星落空乃離中之虛謂之爝火大明反主發達夜生尤妙蓋火遇夜則明故也如前件落空者皆是升殿入垣而有此格禍福即旬中空是也如丙辰生土為福在女度行限甲寅旬無子丑亦主退財坐地受災能説不能行如戊申生人土祿在卯甲辰旬無寅邜行限反主奔波勞碌不利財穀所以星落空者切不可以福祿及升垣殿以為吉四時五星論春月生人命限連有土孛金水太陰羅計謂之雲雨不解淋漓花果觸目愁景主退敗可畏四五月雖然得雨然亦不可連接行限見前項星辰為久霖不晴皆主冷退愁悶生意蕭然如有此格日火行限謂之久雨逢晴伸眉舒目人物欣快必主驟然大發秋月生人連有風雨星行限主霖雨傷稼冬月生人連有凶不妨凡氣入申為入猴山不過作事混沌凡木氣為禍不過冷淡是非留連不寧所以木星為禍遲淹延不安氣木為人執拗不惺會凡水泛揚州損自己之財命逢氣吉拏他人之財為自己之用為緣水計相逢凡行水宿水宫會土於寅邜上決主見災無妨不倒金尅木於巳午火尅金於亥子木尅土於申酉水尅火於辰戌丑未皆主重災凡金為天地肅殺之星是以行金星限未有無刑尅孝服化吉亦然春天土木相會行土限驟發名權而死則難免凡疾奴兄財妻兒等宫仍兼其宫度主論之極驗剗法凡七政為身主命主夀主命度主夀元限主所泊躔宿最怕在前剗破多死化凶亦然占煞刃尤惡其在後剗破又輕假如限行火宿怕水同在火宿行土宿怕木同躔行月宿怕土羅計日宿畏木羅計孛等奪他倣此然如行木宿受金春月剗脈不斷行火宿遇此謂雨雪載途皆非好格冷落寂寞不言可知所以晴雨之星要有相間行限得晴雨停勻生意順快凡土孛氣羅計會日皆謂黑雲暗日主大貧人命五六月生火日行限却在巳午謂之旱魃南離生意焦枯如遊年孛土羅計到晦掩其光反主一發過了遊年又主禍依然是以喜行雨限若行限又俱是火日亦曰久晴不雨萬物爍落如忽行一星如羅計孛金水太陰氣星則雲興雨降物苗勃然發達可知凡行風雨星而逢日在戌或行限在戌三合對照則雲收雨過落照餘暉遇此格者主晚年發達凡太陽坐命極主勞碌不間一云慷慨蓋日運行不息故也冬月水羅會謂之和風解凍寒林生春火會土謂之寒谷回春皆主發越春木宜日火怕羅計如會日可謂蒸烘日火則春入園林粧綴紅紫羅計到風僝雨僽反主貧夭秋天水居水宿見金謂寒潭浸月火寒未免清秀而貧薄氣會月在前謂慶雲捧月在後謂浮雲蔽月化水夏生剗脈不斷金值火宿秋生無害土行水宿冬月反好四季之土遇木何妨最須詳辨剗法至要有一人土在危三度好在危五度行土限遂死拗星例愚謂此法謂之全降與半降也即空亡空盡最為竒之意甚驗水在金宫遇金反吉次喜火羅三合喜木氣一木氣在酉辰角日羅亦解之在張月火可解羅子遇水可活凡木逢金要水氣之扶或火羅之救便無害金在邜戌遇火反吉火入酉金入戌或火金同戌或火金同酉或火在辰金在邜或火金同辰或火金同邜皆主無妨惟金在邜一節秋生又斷或寅亥或木到或氣同到或土水火救凡金入陷或遇火喜土星之生水孛之救或火金而在金宫或火宫而反無害金火只忌秋生立在巳木解氣亦可解土在寅亥火羅金可救凡土喜計來救又喜火羅來救亦可又辨凡土計同喜氣木水在辰戌丑未遇金孛氣木月反可無害火在酉巳要木氣土計羅日可解太陽之斷惟金拱救或月會可救太陰之斷惟金孛水星可救或日可解水不斷乾火不斷坤火歸坤地害災除土不斷四木辰角戌奎未井丑斗木不斷辰亢蓋東方水地也冬金不斷卯冬水夏火難斷春木秋金易斷四直星正二月太陽三四月太陰七八月水孛九十月木氣十一十二月金星五六月火星凡遇直星煞難守照命位限宫者刑尅疾破虛耗勞碌損夀逢日傷父逄月傷母逢妻刑妻逄子刑子為煞星大凶為父母星相生相順不以此論又合論福鬼房二宿度號為天眼男命值之多是多非凶狠權豪便能反叛女主淫亂亢井主敢為敢斷箕畢主病患六十年喬拗詩花甲循環六十年星辰喬拗細推論一隅不以三隅反奧妙當知在不傳木躔婁度號凶躔甲子生人又不然命限田財寅亥者必然發福進庒田甲子生人孛在寅化為祿主限宫迎誰知木到申宫照不死終為帶疾人乙丑金人命丑宫太陰身主又相逢身命主星登殿駕惡星酉未怕相逢丙寅木喜入秦州限入東方百不憂火木同行或逢孛前程亦許享優遊丁邜邜寅惟喜計孛在乾亥子宫利木星午未羅在申隨有希求皆稱意戊辰午宫遇木氣兩耗而推難一例酉羅戌孛總相宜土宿莫嫌居井位己巳計耗為有用土在午宫福尤重孛羅戰激總無妨定主為權能伏衆庚午癸巳水居申衆論皆言是吉神限逢出入皆遭險若是孤刑免喪身辛未水計羅在亥須知亥限為最快辰巳二限最相宜刑破六親誰避諱壬申甲申見前癸酉宫宜計水同木居牛斗總無凶孛羅更且能為福軫壁參箕火轉紅甲戌逢羅福更多火星逢孛亦無疴只愁軫水夜逢土凶禍重重福奈何乙亥辛巳丙戌辛巳生人金在辰丙戌生人好齊瓶乙亥生逢亥上木若非傷夀必然貧丙子生人喜四餘氣羅光彩耀天衢計水為禍只宜孛土水遭逢亦不虛丁丑人逢計最宜黃星不可以為非只愁土孛遙相望貧病交攻孰解圍戊寅見前己邜羅㬋最有權戊宜逢計耗難言孛星逢紫居高位安樂和平福祿全庚辰金酉若居垣限盡窮途豈偶然計守限宫還有力土羅雖好莫爭先辛巳見前壬午生人細品評氣權計祿福難慿孛星若是居寅邜為害為災實不輕癸未木邜氣在亥亥當禍重邜為輕計孛土羅居丑未限行至此倍精神甲申見前乙酉子丑逢土木名為暗耗翻為福羅申滿用實可慿戌亥氣孛見禍速乙酉生人命未宫太隂却向酉宫逢己邜丑宫分善惡非常貴也富家翁丙戌見前丁亥亥木便為迍五星亥上福難慿計羅孛限應無禍更有金牛福氣增戊子生人最怕土當生元化為祿主若守田財大限中不特喪財仍破祖己丑行年子細推計都孛宿兩相宜單行三合無爭戰命限逢之作福基庚寅莫遇羅并土巳上偏宜見計都申上水星皆不吉誰知喬拗有二夫辛邜星辰兩得宜氣申羅子互光輝午宫水計相遭遇衣祿隨緣度歲時壬辰遇計寅增光火孛同行亦不妨酉戌土刑難減福寅宫單孛又須防癸巳見前甲午生人逢氣土皆主平生無險阻設或行限遇火羅即許滔天多福助乙未羅㬋最是凶限行至此一場空孛星土木相遭遇試看晦滯得踈通丙申行限到東南紫氣羅㬋樜境甘土孛那能添福力計都陰險更難堪丁酉星辰又不同桃花見孛却無凶限行羅計俱為禍造化分明指掌中戊戌土計福平平羅宿單行有用星紫氣遭逢財不聚可憐孤苦更伶仃己亥火羅偏有情逢茲順境福川增氣餘為福力尤重木計用逢各逞能庚子火星為有用命限逢之福尤重那堪行限厯西南名利兩全誰與共辛丑氣居辰巳界發福發財誠穩耐設使土計兩強梁命與仇謀翻取敗壬寅却喜羅居未炳耀揚輝無不利那堪孛又在玄枵定許希求俱稱遂癸邜逢羅又不宜雖名祿主禍相隨計都行用翻為福喬拗宫中子細推甲辰獅子忌逢木不主官司須夀促行限如臨此位中禍患重重難主福乙巳生人喜計都慳貪致富語非虛常人遇此皆竒意積善之家慶有餘丙午辰邜逢土木根基穩耐非庸俗康寧夀福足平生蓄積多金榮福祿丁未生人偏喜計命限逢之翻吉利此為相反仍相成漏泄真機難自祕戊申木不喜臨官禍患須知見百端馬遇空亡難著腳限行至此倍悲酸己酉納音元屬土遭逢木宿人皆妬誰知木氣若相逢無害無災安若堵庚戌金命却嫌火自我觀之又無禍能以妙理定無差命限逢之當自賀辛亥木星嫌在亥欲求發福應空待若非傷夀定孤貧必見非災多橫害壬子計都為祿主限宫逢著皆無取能於造化細推尋禍福莫言無定據癸丑土星計孛火誰知作黨非為禍却為權祿暗相扶橫發資財聲譽福甲寅命若逢南斗土宿相逢反為咎刑囚暗耗總為祥己午見之福猶厚乙邜孛星臨限度雖為祿主空遭遇除非權福火月也二星來方許榮華無錯誤丙辰土星至在子塊然一物無可取木星化祿己午間起禍生災難制御丁巳土正好齊瓶木星為福又還輕刑權囚孛皆無慮限裏逢之定有成戊午午宫忌遇日水金輔之皆不吉安命如逢又不然限裏逢之數難出己未卯辰宜火羅最忌計都居酉戌行限如逢火土星却主旺家多發積庚申辰戌宜計羅土多亥宫生意多木遇臨官反無用辰羅臨出暗消磨辛酉祿宫嫌氣祿木星朝斗多愁哭孛星土計更羅㬋却主光輝能發福壬戌戊上宜土刑亥逢火計更豐盈孛宜在巳偏嫌氣土計如臨亦不凶癸亥嫌木居亥宫羅如在午福昌隆孛宜在巳偏嫌氣土計如臨亦不凶限主升本垣當生太歲衝動為禍諸宫宫主星倣此為例限宫宫主本垣中最怕當生太歲衝破耗相攢宜出位限行至此總成空限主還元大可愁五星帶奪煞同謀更兼忌曜來助虐此命須登白玉樓論倒限倒限之法奪星為第一奪星行限逢氣生起或宫主相生或化惡背時決然倒限火土名忌乃煞星也二宫相會謂之二煞同謀最為凶害此等格局雖有過北斗之資亦難買無常之厄如忌奪相會相尅謂之二煞反目十度之外相逢不過見災而已雖喪亡亦可救也如行限遇之死無疑矣煞星帶刃火土雙星帶刃來那堪垣廟兩和諧流年太歲來衝倒任是公侯也受災火土二曜乃煞星也况又帶奪其惡尤甚又且得經得垣加之太歲月將衝動為禍不可勝言限行到此雖有扁鵲之智亦不能救若二星身帶陽刃破碎的煞決不善終凶送凶迎凶星行限又將終又有凶星後限中凶送凶迎凶鐵定饒君鐵漢也成空凶星如忌如奪固凶星也金羅計孛火土化惡亦惡一惡星在後行緊關來關將盡又有一凶星初關緊關方來惡星光芒相射必為薤露人矣又如剛星得田財戰鬬或剛星聚吉戰鬪得氣救解只恐氣之光星一出或忌或奪來迎皆主大發亦速死無饒矣木星奪煞木星帶奪命難延五福之中夀不堅若使氣星同共到玉皇來詔靳夭年氣木雖善奈為讐星二星不宜會光景之內木星又帶煞是善以需惡二星相遇於三十度內忌計孛金羅於中間間斷至於會合相逢必登無常之録矣前關後鎖身命田星日月曜兩箇欄星占前後限到中間進退難任是神仙也難救日月二曜乃君后也初不為害於人而關人之夀夭何歟蓋日月命田之主受傷故也若日月為身命之星當生却被羅計於緊關攔截掩其光彩或關煞來犯或孛大土化惡羅計夾輔穿釣有如此者非惟日月受傷而吾之身命亦受傷矣至若太陽為身命田之主尤其緊切蓋月是身若是惡星來釣是壞其所生之主矣豈不為南柯夢中人也剛星帶戰剛星穿戰實難當田命逢之怕受傷化惡化讐年夀促散財散福見閻王剛星為夀主命主當生遇剛星於緊關內或望合相穿正照皆非吉兆儻得煞星為命田之主或帶奪受二星之尅或受彼之所傷限數還元假饒化吉穿戰受制得志之時速死之患難免異宿相攻火星行限孛星來金星行限羅㬋猜日月二宿怕羅計孛星忌曜兩崔嵬聚煞交戰火計金羅孛一同更兼忌奪二星攻假饒德氣中間救光景無從亦主凶火孛計羅皆剛星也若三剛互戰使根基壯亦無益也縱得氣水來救光彩一出不復解救又更詳其命如何聚煞反常金星帶煞遇羅星二煞相生奈例評老幼反常還不利閻王來詔入蓬瀛金星帶奪於緊關內正度或鋒芒交承之際或火土兩煞星為主限而金孛羅兼老人遇此於生旺少年逢此於死絶此等格局多死限入空關限入空關多煞神星辰遼逺又無情流年衝到招凶煞定作南柯夢裏人限到當生所在煞上無星主事兩旁三合之星亦復遼逺即為空限若火羅計孛交戰於此限之正度即為夢蝶人矣又六十年詩甲子熒羅紫氣輝計都乃是禍之基人言木土雖無吉我道其星禍果宜乙丑孛羅寅卯宫非惟無福禍來攻刑囚暗耗非凶論天尾牛宫福反豐丙寅木未限行東只怕南方熒惑凶若只單行為福緊限行權孛化為凶丁卯計寅孛亥子更有羅申木未午四箇星辰最為吉唯有水星是禍祖戊辰木氣居於中雖則囚耗最為愈更有孛羅酉戌好土井亦言是吉主己巳計都匪耗言孛羅交戰有威權土星更喜居於午行限相逢有福田庚午生人羅耗加計都月孛亦堪誇凶星囚耗反為用命限相逢福祿奢辛未陽豬木邜中人行亥限福興隆氣星辰已雖無吉不免孤貧亦是凶壬申未宿限平平計在南方最有情惟有孛星還不利求謀作事少能成癸酉火星喜失躔計都合水亦為先孛星最好羅為忌木斗依然以禍言甲戌夜生土最凶羅午計未喜相通若人命限臨其上作事偏成喜氣濃乙亥羅㬋會孛星此星不可以凶名土星若遇還為弱亥卯升垣反禍崇丙子土木不相宜天首羅㬋紫氣竒更是四餘皆有用計都與孛福無涯丁丑孛星豈為凶不應土宿對宫衝計都若又還為用命限相逢作富翁戊寅木氣亦言凶月到申宫橫禍宫卯上土羅凶變吉計都遇著亦中庸己卯羅㬋最有權計陽雖耗反為堅氣星若在高強位亦是平平不十全庚辰最喜計都逢招入資財足萬重更有土羅亦可取若人限遇事還通辛巳土寅與木羅此星最喜限中過氣星祿主還無用金在辰垣反化訛壬午孛臨寅卯木還言此是禍之胎紫氣為權計為祿限行平穩可無災癸未氣豬木邜居若行亥限命還危禍來卯限還消滅土計孛羅未丑竒甲申孛子木寅宫土月五星皆是空只有氣豬為福力羅㬋星更不為凶乙酉吉星土木羅獨嫌孛計戌上過更嫌水日三合座無禍仍教有禍磨丙戌孛酉邜計都須知為福十分呼木卯亥宫土歸子無端禍患並來扶丁亥土子有災危五星居亥反為竒計孛羅星凶吉半人行酉戌禍來隨戊子木氣酉無凶天尾戊辰富可求亥上土星平穩當若臨強位反為仇己丑計都與孛星若教遇著禍來陵羅㬋最喜單行吉果決威權福祿興庚寅土羅無所取計都却又喜居蛇人言水在參垣好我道忌星亦不佳辛卯羅子申氣來凶星自作吉星裁更嫌木氣居於午便斷平平不用倩壬辰土酉戌無災但於孤刑不免哉火孛同行無礙處寅宫單孛禍之胎癸巳孛子羅㬋丑若言福祿皆無有更有蔭金亦無取若問當生土在酉甲午羅㬋做事來更亥火宿亦然哉盡言土氣亦為好只有未辰反不才乙未羅囚亦是凶孛星祿主反無功二星木土多屯否作事還如制縛同丙申羅吉氣平平只利東南限度榮土孛二星知可貴計都險惡亦遭驚丁酉羅刑與計貴遭逢命限福重重雖然囚孛桃花上然亦平平無大凶戊戌土計有機權更有單羅亦吉言天尾氣星還不吉更破財穀不堪論己亥熒羅却有情木星天尾亦為榮更有氣星亦云吉皆是平平匪至精庚子土羅是吉星西南限度好經營其餘星宿宜詳斷當審飛來釣起情辛丑忌星辰巳間限中遇得享安間惡曜土星及天尾此箇星辰作事難壬寅金水總朝陽命限相逢反不祥惟有斷躔金是禍秋冬却以火為良癸卯水星亦輔君若居財帛總無成羅㬋化祿亦非吉木宿限行主訟庭甲辰土宿忌升垣若也升垣禍蔓延更有凶星水孛限只能晦氣不傷年乙巳還畏水金張若在田財命限當不特喪身并破祖更教夀亦夢黃粱丙午水星利失經卯辰土計是良星氣星天乙臨寅丑大吉須防亦有刑丁未土星在邜辰若居惡煞免災迍水星限度諸為顯限到水星有訟爭戊申金木限中來孝服臨門更妨財唯有土熒還發福限宫命裏細推裁己酉熒羅是福基只言太白不為竒水星與木還為禍命限相逢大不宜庚戌秋冬愁火羅只言土星少比和若臨命限田財上舉動云為百事訛辛亥土星臨限中虛花財穀盡成空唯有秋冬火曜吉氣羅作事正興隆壬子計土能為福春水水金限不宜若臨命位主破相損耗資財不用疑癸丑土計水為忌命限如逢必見殃若逢羅㬋與日月限中逢此是高強甲寅土星在於丑命宫逢之福乃有暗耗刑囚己午間無災無禍平平守乙卯孛星限不宜羅㬋不可以囚窺若人命限遭臨著福祿威權最是竒丙辰十福子上土己午福星為祿主命限逢之無福祿仍且招延禍患苦丁巳土子禍又鍾木乃平平可免凶羅孛刑囚皆有用限行至此必從容戊午太陽居午位水火輔之皆不利限若逢之亦可憂更遇流凶必顛墮己未木羅居卯辰須知生意日津津火星若遇亦冝利唯有計都作事迍庚申土計與辰羅此箇星辰最喜過惟有木寅無用處辰羅臨出訟消磨辛酉忌祿反成殃木計來朝亦不良惟有戌宫土計吉辰羅逢著亦為強壬戌土刑戌亦佳亥間火計最堪誇孛羅己午禍難測氣計孤刑不免邪癸亥羅㬋不背祿火孛逢之必有福土躔婁星亦無禍惟有金星禍最速論忌星甲庚生人不用火火星在戌為殃禍乙辛生人不用金金星辰上化為塵丙丁生人不用木木德在寅多反覆丁壬生人不用水水星在巳無依倚戊巳生人不用土土星在子多愚魯朔日太陽居於午十五太陰居於未身命運限若相逢如此之人須正忌星學大成卷二十九
