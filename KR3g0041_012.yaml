body:
  text: 星學大成卷十二明萬民英撰十二宫安命論下未宫論巨蟹屬太陰命坐於此乃四墓之地祿馬不臨卦氣不在本與申宫相關坤為卦氣有無善惡與申相應凡安命於未為三合之體正則為三合偏則為四正又偏為不入局偏正稍異則取用不同所重者太陰乃身主也以火金月為之局主火為官星金為福德太陽為財土為難星月為金火皆同功一體夜生用之火金會月在夜生為福最緊是為官福會身金星近月是為長庚伴月經云金星伴月常屬曉迎朔相逢事業𢎞此金月火體用最大蓋未屬陰以陰屬陰以陰類陰其用備矣或火金月會於白晝故為晝生夜裏陰陽然終為三限交聨特其軟弱不可謂之凶忌太陽與金為田財主若白晝逢之為吉此又是金水輔陽土之為難遇在晝陰消陽長之時不能為災得其吉助茍夜生逢土計難必為災厄若得木氣制之尤為庶幾或以火羅助其禍必速人命見之不惟災厄傷身亦且壽年不久此宫三宿井之一宿二十餘度臨於秦州此宫以亥卯未為木局而井度屬木故當以木神主之中間又不可全用木木星秉春月之令晝生合從木用不可言太陰也其他時節難以一體用之惟以太陰為主最緊太陰本夜生三方主也又以宫神主之以三方歸太陰為主更太陰歸陰方是太陰功用豈可分毫離太陰茍捨太陰而從木斷皆背陰反陽之義鬼金一宿與井相與已近金為福主晝夜常在乎其間秋冬時節與金相干者安可棄乎金栁土一宿與井鬼又差殊不以土為難不以火為忌羅孛得之者亦無患喜獨行輔於命此宫命者但是土星髙強則為忌若土星入命不足為凶蓋命宫以卯加未男女宫以亥加卯遷移宫以未加亥三合上下皆是木局土星臨之稍緩與三合見木氣亦是一般道理但恐夜在三合宫又有火合土反成木生火火生土其人不免於殘夭此三合為體而以三合取禍福通關翻覆又其次也此三合者與亥宫坐命體勢稍同上下十二宫皆為三合中翻覆與命宫相統攝亥中又與未善惡相關雖異而實同福德在酉與財帛通關凶吉往來當審之巳酉丑乃福德之合金居其上是福德星得局當有興廢木星居三合之上則木入金局人命值之多主破敗雖有鎡基亦歸消散火星臨福德之三合夜生則火有情晝生則破我福德又不可以官星論蓋火入金局故也戌為官祿夜火顯用官髙名重晝火無光有官不顯夏令得時為官愈熾水孛合火多是驕恣以敗亡木氣合火多是清亷而見用戌之一宫與巳相翻覆但恐戌中無星巳中有曜是暗中有害即不可救雖寅午戌合得吉相輔是外助不能制內惡忌子宫疾厄之為難土計臨子是難星入垣若是身臨鬼地者不可一槩言凶如子生人六戊生人六癸生人有太陰乃身命入在子宫雖是身入難鄉却是子生人嵗駕戊生人卦氣癸生人崇勳此三者又不可以為忌但以大限土計相逼謂之身衰遇鬼依此禍福斷然不差發明云未宫生人以月為主所關二用以月為命主亦以月為身主如命主飛起坐煞而身主亦是坐煞此宫坐命乃三合局地月在卯又加卯在未是月到月宫未加亥亥加未亦是月入月宫三位互加此其為三合局也午為財帛宫太陰在午謂之身居財帛太陽在未謂之財元入命亦謂財命互垣亦是身主入命命主入身此為內外臺格切不可謂陰陽反背但取身命互垣俱為貴命若甲午巳未生人得此格者愈好甲午生人未為貴宫午為嵗駕是身命主臨駕身命主坐崇勳此則富貴雙全大格局也若火計在午土孛在未六丙六丁生人以火孛為囚以土計為煞臨身照命禍不可言是為客曜臨朝飛星破祿合此格者必是凶惡之人如戌限加合皆是刑囚破敗傷殘甚至死於非命如格局布定一星稍異理皆不同巳為兄弟之宫太陰在上謂之身居間極夜生帶於格局反添福德日生不然若有福祿主權星財元居之謂之身命合財帛有刑囚直難居之又是身命夾煞星凡夾福夾祿皆為福夾刑夾難皆為禍若六丙六戊生人崇勳在巳是身宫命主坐崇勳天盤以巳加酉丙祿又加福德福入祿宫福祿雙全皆是富貴之命酉戌二宫最關利害酉為福德之宫月在酉上謂之身命坐福德金為福主又為母星飛入命宫不惟宫主與福星互垣亦是身命二主互垣又合內外二臺格若六丁六丙生人帶之坐貴愈佳更加殿駕天馬地驛職元局主居上乃是卿相之格若是寅申巳亥生人的煞在酉為祿逢破碎又減力戌為官祿之宫月在上謂之身命二主坐官祿或六丙六丁生人又是二貴夾官祿二貴夾身宫若火為官星與身主飛入未宫是命主官星互垣亦合內外臺格須是登殿臨駕坐貴坐福祿方為竒特子為八煞之宫月居之是身居疾厄土乃月之所忌蓋月為命主最忌土計二主如土計在亥卯二宫照命加入命宫若六戊六丙六壬六庚生人不為福祿拱命乃是刑難拱命雖有吉星拱夾亦是貧夭造化如戊子生人卦氣在子月臨之不為身居疾厄是身臨嵗駕卦氣若是金為福星在寅火為官星在戌正合漏關格局此格尤佳又不可以疾厄論也日在卯月在亥謂之日月朝命日月夾官福身命主登駕坐殿臨卦皆是有福有祿之命若刑囚夾命或拱夾直難便是貧賤之格如蔡樞密己丑十二月二十七日申時生太陽在子太陰在寅嵗駕在丑金為福星在寅火為官星在丑日月夾官星日月夾嵗駕金在寅木星怒宫金為福星加入官宫火為官星加入福宫謂之官福互垣月居官福日月拱夾豈不為大貴之命若日月居奴僕福星既陷則不大貴所謂誰信無中還有曜豈知弱處是髙強若加臨有凶星破之又不可以貴命言也如星命坐殿駕會刑囚難直而官福俱陷若加盤又有殿駕祿馬貴人卦氣聚會亦可以貴命言也若月在辰坐田宅如金在巳火在卯官福宫主夾身若木在丑六甲六乙生人見之科名照命大約三十六嵗行酉限得官星祿主福星科名交照行此酉限其人英雄傑特無疑若身命皆坐煞會刑囚直難官福祿權俱陷必主剝雜無成如太陰在辰土計在寅午二宫大約三十七嵗入戌限寅加午午加戌戌加寅皆犯土計必以刑夭斷之若於加合中得金木解救則免申宫命申乃水垣以水為先申屬坤乙癸生人卦氣水命得之為長生此宫為諸不入局惟與未通關雖所屬與己相類然體用與己不同巳宫以太陰為三限古人云夜忌土星晝忌火若見三方尤較可此宫與他不同以木為官星以月為財帛以水為田宅以火為福德以土為難且己申皆屬水在巳命者忌土為重申宫命者忌土為輕又以未與申皆以土為難在未者以土為重在申以土為輕蓋己未二宫屬陰取土為直難申宫屬陽取土為三限中之一物是以不甚為忌生於晝者多以為得更如本命干音屬金命居申宫以土計為得其所養但夜生以土計為凶申之忌土計不如未巳二宫之甚水月為田財夜生得用生理厚實水火為官福晝則喜木夜則喜火若春令木強是官星乘勢雖為金制終不損之得官必顯達夏令火炎是福星得地雖為水制亦不為失得此者福氣尤重此宫為局本水之長生地與絶處之水又不同土不能勝木不能泄遇金亦熾遇火亦熱四時不竭此宫四宿居之參宿固與宫神相類畢雖太陰偏垣亦乃水之精觜火半度乃水中之火合從水主井之一宿屬木申子辰木星亦三限之主或甲乙人及納音木人皆可從木用其餘干音皆可從水為主更以木得時則從木用立命於井者但晝生逢金為凶然亦不足為忌當春夏之月此時木盛火炎金神消爍若是金髙何懼之有若時秋冬金行東南井木固忌之然生於夜望又不為凶是金火無夜忌木土無晝凶之理此説明矣今有戊己庚辛命者在參畢為命度中間或得之為福蓋晝生見之多發夜生遇之亦有小災其間須尋太陰所躔如何若太陰居陽分雖有土計亦無傷恐太陰居陰分則土計非我家三方主是相霄壤諸宫最切者戌亥子丑數宫自命而交相貌通關午酉又當取午宫之得失戌為福德與己相表裏田宅福德來往實重戌為火局申為水局水臨戌一則失其本領二則破我福德上盤巳酉丑金局固能生水是又傷下盤寅午戌之火若得木星合之水隨木化反凶為吉亥為官宫木居之為官主入垣火居之為變官為福乃以亥卯未為木局以官祿為上盤午字却成寅午戌火局縱有金星破官祿亦不為破有一火則火制無火亦有火局可用蓋以木生火火尅金故也子之遊行上盤是未諸星臨之為得體以未宫太陰之垣也故不為身入鬼鄉是子之土又不能傷申之水有未字為天盤木局也丑乃土本傷水又以命宫之申加丑是為命主就鬼此乃申命加卯則八煞加申丑為八煞是下之丑對上盤之申若有木氣在三合巳酉丑又制之於命宫三合申子辰猶為喜所以此宫體勢與巳宫不同也發明云申宫安命以水為主巳宫安命亦以水為主巳與申合俱屬水命雖相類而官福之類不同申上安命為諸不入局又名借局隔六位互相加內無奴僕疾厄卯為奴僕之宫若水在卯本為陷弱以卯加申是水居水位命主入垣丑為疾厄之宫若水在丑本為失位以丑加申亦是水入水宫命主入垣或命主水星飛起登殿臨駕入局坐貴祿馬互換有情與宫神太嵗暗加關攝則為富貴之命若命主水星飛入煞宫會刑囚直難互換無情將重易輕無有關攝則為貧賤之命此宫所喜者金為母月為財帛木為官祿火為福德所忌者土為煞星又為疾厄計乃土餘為害一也或土計二星在當要處臨照身命必為禍媒若大限見之必然為災輕則壓身破相重則傷己戕生如根基壯厚福氣雍容又得木氣加合解破其禍稍輕若根基淺薄必然夭折更加流年惡星黨之決定刑害死於非命未為財帛之宫水居之謂之命主坐財月居之謂之財星入垣或水星在巳居田宅亦謂之水星入垣或金星在巳乃是金水會蛇命主逢生或金水日月居午位不可為身命主居間極是子母日月同宫此金月雖化為刑囚無害若化為福祿尤佳如行限逢金月六丁生人必大發福更加祿馬官魁科名科甲則富貴自來逼人如命上水星在巳或與日月同宫或日月拱夾或官福入垣得局或官入官宫福居福位或官福互垣或身坐祿或登殿或守時籍或會科名科甲魁星則當期以大貴如許狀元戊子七月初一日丑時生安命在申月在未水在巳為身命入垣坐祿木在亥火在戌官福入垣身命與官福俱在髙強入廟入垣水為祿元木為官星拱身火又為魁星得位加入身命豈不為大魁乎所忌者土為難星在子孛為忌星在疾厄難加入命位羅在巳計在亥照身所以不得其夀矣辰為男女之宮金星在巳水星逢金生又來同宫謂之母附子子顧母格子母相生有情極為竒特或水在卯火在申水火互垣不相交戰是命主與奴僕互垣交戰無情不能安享或有祿貴殿駕居之福祿臨之終欠享福或月在寅火計在巳謂之身犯四刑又名土計拱身命或寅申巳亥四位上又是七煞即亡神也劫煞陽刃嵗煞之宫亦為刑害之命若月在亥日水在巳又為錦上添花那更火星在未木在卯官福俱入明地福居庫位是官福拱身命木在卯不可謂官星坐奴僕此是逢旺入廟加起入命若生於春月官星愈顯但防生於秋月金神得時令又在寅卯之上是為官星受傷難以為福如水星在戌不為水泛白羊是主居福德若火星入命又為福主與命主互垣或天馬不背職元局主髙強或臨身命則主功名富貴矣遷移子宫土位為水旺之所水星在上逢生旺則吉受尅制則凶或生於冬月水神得地是為水星逢旺或壬辰癸巳丙子丁丑生人水旺在子子為帝座之宫丙子帶之尤妙乃為命主臨帝座之宫又得日月左右夾之可以三台八座格局不謂之主星受傷若生於辰戌丑未之月土神得局之時子上又嵗煞陽刃所破乃是命主受傷為貧賤之命或水在丑坐八煞以申加丑亦是命主入垣如土居丑位又不可為命主入垣論帶此格者多廢疾之人如福主居其位反能為福此吉凶相對歸之於福則以貴論歸之於凶則以貧斷須分輕重論之萬無一失矣酉宫命酉宫坐命以反吟為體卯加酉酉加卯卯火來制金金受火制卯酉相對是為反吟有四破四正四破者火羅計孛居子午卯酉是也四正者如日月官祿居子午卯酉是也四正未分俱福四破未分俱禍當觀局之變處輕重如何此宫丁生人卦氣屬兊立命忌火羅喜土計用巳酉丑金局以土計居之為生我則得地明矣且以酉宫金主也金火月三限主也水日田財二主也木土官福主也火為鬼木為難如土星得用四季為吉得之為官髙祿厚水日為田財白晝見之田財必厚木為福德春令有情得之為利秋冬無情見之為害一木兩用善惡當分但以晝生終有情夜生終無用苟或九月十月之際為直難兼行加以水孛即為助虐惟火與金一則為主一則為鬼若巳酉丑金火月取則如何且金星乃命主也火賊也金遇火則失勢然有得失存焉古人以金火月為三限主是以陰從陰之義也但火金二勢不可兩立如春月金行西北此宫命者白晝見之是時金勢尚柔不能無患春金誠為忌火夏月金行午未間如晝生見之火秉權金必衰也若火金相刑戰有勝負則金果失時若火金相去隔逺三合無相干犯又可捨金星而從火用何也蓋夏月生人以火秉令此一不可去也又金火月為三限主二不可去也限度望火反為祥望金反為禍至於秋月金臨辰巳之間如秋中見之其時金又司令火不能勝如秋冬生命臨金分此乃金星得時不貴亦富縱金不得地命亦安強冬月金行丑寅之左右時冬陰凍冽木葉凋零金星主殺水星司令金水相依水強火伏金星又勝火金相合亦可無凶此宫三宿胃以土為經土為金母土星為官豈可多從土斷且木火亦時得時失亦宜以宫主交參用之不可偏用昴宿雖曰太陽只從金用畢月宿取太陰亦有憑據且以陰從陰金火月三限主也亦命度主也太陰為先金為次雖以月為主晝生亦貴乎金夜生不嫌晝火甚忌諸宫最切亥子以至於寅戌加於辰亥加於巳官祿於子四正往來若陽刃加刑中年多主反覆初主有變若四正無凶星陽刃有吉曜臨之則為富貴癸卯癸酉子己卯午巳酉駕丁卯午丁酉駕此六命人者官祿為吉蓋有崇勳卦氣在此四正為得也丑為遷移土為主以未加丑是未墓木制土太陰居之為吉地寅宫乃疾厄木居之為凶若是以火合木是火得寅午戌之局而犯疾厄其禍尤甚此宫取用與四正伏吟則異而大體有與之相關者可以類取也發明云酉為金旺之地此宫安命反吟為體反吟者是卯加酉酉加卯卯屬火酉屬金火來制金金受火制卯酉二位所以為反吟也此局往來七位互加又為四破局又為四正局火羅刑囚在子午卯酉則為四破局也日月官祿在子午卯酉則為四正局也曰破為禍曰正為福更看局之變處輕重何如以用之此宫以金為主土計我之命母火羅我之忌星也若寅午戌三位火羅居之是直鬼賊交橫要路他既得地我必受制矣更混之以木氣則為禍尤酷是黨惡也若混之以土計則又反禍為祥乃是誘火羅為福也更看所守者何星若金與火羅同宫必為禍若金與土計同宫必為福如命主在辰辰乃奴僕之宫金居金位命主入垣金星得地不以為弱火星在戌辰加戌戌加辰俱是刑星若水在辰金反生水水能尅火是生子禦寇若金在午土在子午加子子加午土能生金金主失位逢生互換往來皆見官祿金在巳水在亥亥加巳巳加亥金為命主木為福星互換往來此貴命也若木在巳土在午巳加亥福星入垣午加子官星入垣福居福位官入官宫豈不美哉如安墩御史壬午十二月二十六日午時生日在子月在丑土在巳木在午安命在酉金主在亥身主在己亥天門也巳地戶也天門加地戶地戶加天門身命主戴天履地況壬祿在亥嵗貴在巳祿貴相加土為官星在巳木為福星在午巳加亥官入福宫午加子福入官宫官福互垣日在子子加午日居日位月在丑丑加未月居月位陰陽升殿官福互垣三元得地經云三元得地為上品之公卿日月升宫乃百官之領袖豈不為御史乎此乃加合隱中之妙若月在丑日在子若己酉己卯丁酉生人祿在日正命臨嵗駕日月拱之或命主更乘天馬地驛職元局主亦佳若六巳生人太嵗為祿主加在午月為祿主在子土為官星在酉木為福星在卯卯加酉互加皆見官福照命子加午官祿加祿官星坐祿午加子崇勳官祿官主入垣此乃宰相公卿地位如官魁拱命福祿夾身或官祿拱身福祿夾身或日月拱殿陰陽拱駕或身命拱駕官福夾駕日月夾垣陰陽拱帝座皆是大富貴命如或刑囚拱命難直夾身或刑囚拱身夾命或客曜臨朝飛星守駕則為凶惡命也申為財帛之宫水星居之是財元入廟月居之是身居財帛若六巳生人月為祿位又為祿主臨財寅為疾厄之宫木星居之為難星入垣月居之為身居八煞若九月十月生人木為直星必多疾病那更火在申申加寅寅加申加入八煞所以寅申之宫相關也若六丙生人以火為囚又為囚星會直難會刑星加之身宫守於煞位若金更在申宫或在午戌之地為災非小必主惡死未為間極之宫月居之一為身主入垣二為身居間極三為身命夾財帛甲戊生人丑未為貴人之地未加丑丑加未互換貴人得局六辛生人若月在卯辛祿居酉謂之衝干對祿又為佳也若金在戌戌屬火金乘火位以辰加戌辰屬金又為金乘火位命主受傷則為害矣水為財星在子六庚生人為祿主為財元逢旺木為福德主在辰三合申子辰命主復坐子位祿主之水又生辰上福德之木所謂福祿相生豈不為妙儻火為刑星飛來寅位寅來加申又有木氣助之雖然命主之金祿主之水福主之木本來竒特豈知寅上之火加入申則是命主之金生祿主之水祿主之水生福德主之木福德之木生刑星之火尅我命主之金雖有福祿又為無補是謂抱薪救火自焚其身若土計在午戌二位以泄火氣火衰而金旺可以挽回春意戊人以土為祿壬人以計為祿則彌佳矣戌宫命戌以火為主以六合為體六位互加一無奴僕二無疾厄以戌亥相關乃翻覆之義卯為疾厄命宫加卯此加盤之義卯之關係尤輕巳之關係尤重此宫無祿馬無卦氣先以翻覆觀之以制為後諸宫以奴僕為輕惟辰戌二宫為重二宫之奴僕戌宫奴僕又重於辰宫奴僕也戌宫以日木土為三限以土為官主金月為田財星他宫立命身居田宅福輕此宫以太陰居未為身入格若太陰不在未但得居寅亦好是未加寅得上盤之田宅為次吉也金為財星居於酉則為財臨財若不得金在酉只得金居辰亦好是酉加辰也又是金垣亦謂財星臨財此乃無中有曜也木土日為三限或以晝生木土髙強木為父母土為官星依附太陽為官主朝君三星儻有得處或居強或無刑破皆貴格如夜生亦可用但不如晝之切水為忌居命則水泛白羊此乃萬古不變之論生於春者如白晝之際其時司令以水從木化雖凶亦輕其他時節雖不居四正之位但是命宫合之限度合之却為忌夏秋日見之火神為主安可有此非禍而何冬月火衰已甚水司令行東北中年限值之若無日制之其災更慘此宫二宿奎為天府圖書命居之多俊秀為官必居清要在草茅者亦老於文儒春令之木得水為善遇金不怕雖宫主屬火然木隨水化火中得之終不為害秋冬之令不可取木捨火夏月火令雖奎度屬木終歸火性生尅制化從火斷之婁宿是火中金金中無位惟生於秋月金司令喜得土星生逢火不畏取金之義固長其餘月令通以火斷經曰水泛白羊躔婁最緊若是夏生不問婁奎皆以火斷且以本宫安身命中有卯對宫有酉卯酉辰戌為六合體至於官祿在丑田宅在未子午加之却為六害六合之命則多和合六害則多讒謗亥為相貌暗加辰字又與戌通辰戌對衝雖曰弱宫實有關涉於命子為福德暗加巳字巳戌又通是福德與奴僕有統攝丑為官祿以午加丑以火臨之則曰命主乘旺此最吉也或太陰居之則曰日中見斗是得中之失其間或有煞氣臨之如陽刃破碎之類尤甚若金星居之為財星得地金入局也卯為疾厄命中有卯言命宫無疾厄也諸宫以八煞為難惟辰命加酉戌命加卯不可以此論戌比辰為尤重巳為奴僕吉星臨之可以關命凶星破之亦能害命若水孛在巳皆為凶斷惟水獨行為水居雙女即為凶格昔有一貴人辛巳八月初一日戌時日月金水火在巳人以為險其富貴不可曉不知巳中有戌又為嵗駕以諸星關命此乃弱中之強其大貴宜也但戌上立命有吉星在巳更以嵗駕卦氣等臨之皆貴或有凶星兼以他煞破之皆為窮困夭賤之人決無差矣發明云戌宫屬火火庫居戌卯與戌合戌者陽也卯者陰也陰陽交合故戌屬火而卯亦屬火安命此宫六合為體六位互加最切奴僕疾厄福德之宫也有吉星則吉凶星則凶安命在戌火在卯卯加戌與戌合火居火位是不為疾厄也火在巳戌加巳火加火位命主入垣是不為奴僕也然戌上雖屬火而巳上又屬水此兩處不相入或曰火星在巳火居火位又曰火入水宫此戌巳二宫加合之難辨也如巳宫有福祿貴人驛馬嵗駕居之必能化為福或有的劫嵗煞七煞居其上必能變為災不可槩論也如官均光祿大夫辛巳八月初一日戌時生日在巳月在巳金水在巳火在巳安命在戌諸星皆居奴僕之位亦未為奇然火為命元水為運元金為祿元并日月在巳嵗駕在巳戌加巳命臨嵗駕三元臨嵗駕加入福德之宫身命二主上下入垣登駕所以為貴水火交攻未免多迍耳卯為疾厄之宫屬火火居其上不為難星入垣乃是命主入廟亦為八煞有星若乙卯生人祿在卯嵗駕在卯命主臨駕坐祿況卯與戌合是為天地合德木在卯木為科名火為命主木來生火有情至十六嵗行限在亥宫見祿駕辰為夫妻之宫辰與酉合火星在上火入妻宫加入財帛酉辰二宫屬金皆為得地儻水星同在上水為刑星終是受傷若是六害三刑對照又有月孛居之愈重其惡孛乃水餘以水加孛煞氣增盛刑害可知甚至惡死若火星在辰土在酉守財帛土為官是福主臨財辰與酉合命主暗合財宫合處有情乃為貴也丙戊生人以土為福祿愈妙縱三合有木氣傷之又有命主之火在焉則木氣只生命主之火火却生土為官福愈有氣也大凡戌上安命最切者土蓋官福俱為土也木氣二星本來尅土而得命主之火泄其氣反能生官福之土生而復生有無窮之造化未為田宅本宫月居之謂之月居月位身坐田宅甲生人身又坐貴木星居之為木入秦州亦謂身會福主此為福也孛星臨之不為太乙抱蟾乃是身犯煞曜水星居之不為水㴠月魄乃是身犯難星若以未加子子加未皆是六害為刑星為禍尤甚子為福德之宫土在上謂之福主入垣月在上為身坐福德六丙生人見之為化福坐福丑為官祿之宫土在上謂官主入垣月在上為身居官祿六戊生人見之為真祿歸窠雖夜生人不以土為忌日生人見之愈妙若大限經過子丑二宫必然大發財福若命主更臨嵗駕登殿坐貴天馬地驛或加職元福祿主乃享萬鍾之命也申為間極之宫火在上絶處受傷若火躔井木犴又得木星火絶處逢生水在命宫躔木狼則水只生木木泄水之氣則水為害小或丑上有氣卯上有水丑加申卯加戌又得木氣以助火則水雖為禍亦輕矣未可便以水火互垣為忌也火為命主最喜寅戌二宫得火在火旺處逢生丁巳生人祿在午又得旺中坐祿逢生乃是上象垣局若行刃限午來加丑行斗限者謂之日中見斗必然田財耗散尤防官刑火災如耗星在亥辰加亥本為六害局又是相貌弱宫有甚好處所幸亥屬木火居木位或夜生人三合無刑星傷之是謂火照天門更加日月在子戌二宫又為日月夾天門陰陽拱主若乙亥癸亥生人駕在亥祿貴在子又是身主登駕祿居祿位福入貴地此為仕宦之命若水孛二星守子位破我福德若六庚六乙生人水孛化為祿貴行子限亦還一發發後必夭此造化之妙不可不知也亥宫命亥以木為主此宫以三合為體故滿盤上下皆三合局大槩與未上同中間並無刑害四破之類亥卯未木局若得木星居之為木入木局得三合之正此宫與辰通關辰通亥亥通辰猶巳宫關疾厄之戌火為難彼此雖同而實異蓋巳之難火是我尅他亥之難金是他來尅我要審言之亥中屬乾壬甲人卦氣若命居於此有本年崇勳卦氣嵗駕殿與驛馬貴人又得木局主用為本然論理此宫以金火月為三方主以水火為田財木為官祿以金為難金火月為三限須夜生則吉晝生減力若火交金金交月則可為三限之用若金獨行又為難火夜生最為用故為身主臨財又勝以水火為田財火獨行則宜夜用並行則宜晝用若夜中水火交行却是客星攻主木為官星木守命木居寅為命官入垣木居福德遷移皆為吉用木入未得上盤亥字甚佳木臨辰為八煞或者金傷為礙不知八煞辰宫有金則忌辰宫無金則是申子辰三合為水局是水生木為吉只木入酉與太陰居酉此為身命入鬼鄉不可以身居間極論此宫是無間極蓋以酉金尅木也金在命左右若春月見之則不甚害乃春木盛而金柔不足畏也夏月金星背馳於西南夜中見之火盛金衰金不犯分更以夜生為三限主是金星不能傷我惟秋金主殺每行東南冬金行東北此二季以金忌若是白晝見之或木金合度或木前金後皆為害曜可忌也人見之主殘疾甚而夭若有水火以濟之尤庶幾或見土計助之為毒尤大此宫二宿室宿乃亥之正度雖曰火終是木宫之火必有木而後有火木既失躔火從何出四時之中不離乎木雖夏火司令亦不棄木為主也水入室宿一則田星入命二則母星入命木得所生火則有恃若白晝木火並行只從木論夜中取用火然火亦度主也又財元也又為三限主也壁乃水為度主水能生木雖遇土亦何畏以亥卯未皆木局也與其他處立命土星躔壁取用又差此宫雖土不入命但居於強尤實為礙若木居别處三合與難星同一斷也金居福德雖曰土垣實為金局蓋上盤巳下盤丑即金庫也身主臨之難為福德木星到丑亦為木入金局有水化金即為得用若土星合木己酉丑為土生金勢鬼暗受生木又失地不可以木尅土而論寅為官祿乃自家之地木臨三合為官星得地如火入三合反為財局蓋下盤寅合上盤午是寅午戌火局木星晝見居強又為官祿之造化貴格明矣若夜得火強為財局造化却主富木星得局失於戰尅亦有官但多讒謗火星全局失於戰尅亦有財特多耗散蓋三合局面諸宫皆合官宫財宫乃寅午全局蓋三局已成不為他破可以富貴却以金為疾厄雖曰金鄉喜成水局得金生水水生木為吉但恐金星強在他宫則難以制局斷矣發明云亥宫屬木在於乾者亥也寅與亥合而寅亦屬木此宫三合為體滿盤皆三合也木為命主最宜居亥卯未三合之宫再須己申二水宫皆為得地惟辰酉二金宫不宜居之謂之失地況辰為八煞酉為間極如木飛入辰宫金尅木又值弱宫必難獲福若以申加辰辰加子變為水木局如更水孛在申子二宫必至獲福或有金火在申子二宫則反為災蓋申子辰三宫者三合之中暗相管攝也水為命母孛乃水餘所以愛也金為煞難火為竊氣若五六月生人火為直星火神用事命木逢之為害不小所以忌也丑為福德之宫木星在寅官入官宫又為命主坐祿木星在丑命坐福德若丁丑生人命主在丑為嵗駕亥為貴人命主登駕命坐貴宫此為佳也癸丑生人雖是為駕其如陽刃的煞何所以減力不甚為佳如太陽在巳太隂在酉謂之拱駕朝主又是六巳生人太陽為祿元太陰為祿主又謂福德受日月合拱巳酉丑三位加合往來俱見祿元祿主福星必為宰輔如木在寅壬寅丙寅乃為奇特壬寅木生在亥命坐崇勳命合嵗駕丙寅生人命坐貴官星臨駕豈不美哉若卯寅甲申生人更髙一頭地甲申生人祿在寅申子辰馬居寅祿馬俱入祿地命主官主祿元馬元福星權財科名滿用坐祿坐馬登駕入垣衆善輻輳若天馬地驛不背職元局主有氣則富貴雙全官居鼎鼐木星雖滿用須入垣登駕坐祿為佳如木在戌乃木居財帛是命臨財若火星在午火旺在午謂之財元逢旺若三十六嵗行寅限金在戌財元在午只欠寅一字輳成財元局若六甲生人火為祿主行此等限發福發財若是五六月生人火又竊木之氣恐發後必夭若十一月十二月生人水神用事木得水以蔭傷之生子為財又何害焉若在午混之以水則財元逢財神不旺若辛生人混之以氣則富擬陶朱木星在申坐田宅木居水位若水星在子水為田宅主乘旺復生命主之木若六庚生人以水為祿主有甚不好但土在辰申二位混之以木又為囚星尅祿主何益於我土在辰混之以金金生祿主之水為佳若六巳生人以金為田財福星生囚囚星尅命主俱為禍也若水不在子為禍不小若水在子此是福星生囚星囚星生命母命母生命主相生不已此其為佳乃水星之力如木星在酉謂之木困金鄉土星在丑木為官星土為福星又為官福漏關土在丑混之以金又是六巳六辛生人以金為刑囚是福星黨刑囚而尅命主之木更當秋冬金神用事之時木神無氣我必受傷如火在巳不惟不喜然火居巳卯丑火來生土土來生金以丑加酉金加木乃財帛生刑囚直難尅命主也若行丑限二十六至三十七嵗財散人亡尤防損己若丑上有卦氣居之則煞尤輕大抵亥上安命須要日月在寅申乃日月拱天門又為陰陽拱命若身命二主飛起臨駕登殿坐祿坐貴為妙不然官福守時科名科甲魁星登籍乃是卿相之命若羅在卯孛在未六癸人羅為祿主孛為福權又為福祿拱命太陰在官祿福德之宫又是上貴之命不可以孛羅為惡曜論也孛在申羅在亥計在巳謂之四正逢刑怕見身若二十七嵗行寅限加嵗煞在寅刑害可知若是十一月十二月生人化金為直乃是刑星逢生在丑惡之甚矣婦人則主産難之厄大抵十二宫主第一怕餘奴犯主不足刑天之命雖有好惡終亦不甚發達此十二宫坐命加合變局隱藏造化若龜卜燭照禍福昭然矣星命之説多矣求其醇正無疵而能發明玄齋之奧者未有若此之盡雖不知其為誰所作中有虞學士生年月日意必元時人也蓋術者得一異書則為私家祕傳埋前人之功大可鄙也然而傳寫既久訛舛有之重復有之僕因得善本雖相參改正第智識淺陋未能盡詳當更訪先達悉改正之使無憾而後可洪武甲寅中秋日吳郡徐繼孫題星學大成卷十二
