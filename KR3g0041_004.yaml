body:
  text: 星學大成卷四明萬民英撰觀星節要星盤或問育吾子方裒集刪定諸家星命之説以廣厥傳忽有客坐而問曰五星麗於天者也凡民麗於地者也天地邈不相及胡術家者流以五星而推人祿命其説亦有理與余應之曰天地不外隂陽隂陽不外五行人不能外五行以生五星乃五行之精凝結成象天垂以示人者也人之生也稟天地之精英萃隂陽之造化天星運於上而適協厥期人命鍾於下而感與天通是故長庚入夢而太白生歲德下臨而曼倩降郎官應宿庶民惟星以五星而推人祿命其理至著其道至微但術者未盡知耳客曰星命之説固云有理然所以推星與命者則吾未之喻也敢問何以先排十二宫一命宫二財帛三兄弟四田宅五男女六奴僕七妻妾八疾厄九遷移十官祿十一福德十二相貌其立名次序無乃牽強也與答曰人之生也以身命為主故命宫為第一財為養命之源故次二分我之財者獨兄弟故次三田宅所以安命藏財而居兄弟故次四既有財帛兄弟田宅而男女所以承田與財者也故次五奴僕所以輔男女故次六妻妾敵體與命宫對衝故次七夫自命宫而至妻宫其敘自不可亂疾厄人命之所不能無者故次八遷移人之所不能免者故次九官祿天之所豫係於命而最要故次十福德人之所享係於天而難得故次十一相貌所以成身故次十二自疾厄而至相貌其敘却乃倒言何也十二宫之中命與妻相對相貌福德官祿出天上故列在身前財帛兄弟田宅隱地下故敘在身後遷移疾厄妻妾限數最緊皆太陽過午而行促有相貌而後見福德有福德而後居官祿有官祿而後厯遷移有遷移而後見疾厄自相貌而至於疾厄皆日月之喜升而惡沉有財帛而後見兄弟有兄弟而後分田宅有田宅而後歸男女有男女而後居奴僕自財帛而至奴僕皆日月之右轉而分布人之所以為人不過如此故十二宫之名足以盡人之一生也男女身命所生遷移父子所專兄弟和樂妻奴雍睦人之福德此二者最難財與官祿相連奴僕所以服官而營財也貌為疾厄所苦田宅所以安身而養疾也故皆三合此十二宫流行之敘對代之體錯綜之用有如此子殆未之思乎客曰星盤十二宫既聞命矣然何以午未屬天子丑屬地亥寅屬木卯戌屬火辰酉屬金巳申屬水與五行地支十二之理不同又何説與余曰五行以寅卯為木巳午為火申酉為金亥子為水辰戌丑未為土乃地支十二維也午與未合居於上而屬乾故以為天子與丑合居於下而屬坤故以為地上天下地一定之體也亥與寅合屬春故以為木卯與戌合屬夏故以為火辰與酉合屬秋故以為金巳與申合屬冬故以為水春夏秋冬四時之序也日月麗天水金輔之故喜金水土石麗地木火生之故喜木火此雖與地支十二維分布不同而其道理則相貫也客又曰人一日之生不啻億萬何以從太陽為命太隂為身遂據此斷吉凶禍福僕未深信敢問其故何也余曰善哉問我明告子天形如卵而左旋日月代明而右轉天體日周東方常抽惟其東抽是以西沉一沉一抽無停留也太陽之升出在東方太隂之沒入在西鄊一升一沒無差忒也人之出乎胎中即天轉乎地上若是卯時而塵天日俱出東廂惟卯時以後天體無形以日為準故因日而數至卯即卯地而出蒼穹太隂日之配身之所自出也故以太陽立命太隂安身身命人之所最重者故先求此二宫天體度數各有對度是以日月同其好惡身命同其禍福東出父命西沒娘身東出太陽西沒太隂東出亢金西沒婁金東出井木西沒斗木故琴堂有身命一般般之説蓋為此也客又問曰人之身命同乎天地得夫子之教已喻其理但加關之説樓上架樓而禍福却以為準又何理與願盡泄天機以教僕請授業於門焉余曰前言巳盡子猶未深悟乎夫天開於子地闢於丑人生寅出卯千竅萬妙不出一卯天盤之加順天左旋十二宫地盤之關因日右轉十二宫洞微飛數遍周天皆左旋陽九小限逐日月皆右轉曰加曰關惟卯互換地盤卯酉定地不易天盤卯酉房昴是的前言人之生也因天體之出卯也天運不息不能昴卯故隨所生而值所宿皆謂之卯酉也吾人之卯酉以天日之卯酉為準故以卯加命宫此之謂三才合一道理故吉凶禍福可得而判也星之源流吾已略注望斗三盤之法詳著卷首子取而觀之豫何言哉客又曰星家源流其理既同然何以有準於古而差於今驗於今而謬於古其故又何僕也惑敢問余曰此天道自然之運也天之運也積氣日月五星積氣之光曜者也其循行次舍七十年而差一度天道且然而况於人乎世有升降國有隆汚皆囿於天道自然之運人乃積氣中之動物身之用舍道之行藏又囿於國家一時之運此古今人命之所以不同而星家準與不準之辨咸在此矣客恍然而悟醒然而得再拜而退閲數日請見作而言曰今夫天日陽精忌火月隂精忌土五行獨以火土為惡為日月所畏以金水木為善為日月所喜今夫人凡水凡木凡金凡火凡土為命主皆日為身主皆月忌有五行之不齊皆火土喜有五行之不一皆金水木此亦是否乎余默然不答客退不敢復言或又有問曰諸星家俱以太隂為身琴堂雖有身命一般般之説乃是命宫所喜身亦喜之如命度屬金喜土太隂傍土亦不為忌謂之安身傍母今夫子答客乃不以太隂為身而以身為太隂所自出不知指何者為身也答曰命者父之所鍾身者母之所生星家既以太陽數至卯為命獨不以太隂數至酉為身蓋未悟耳夫十二宫命宫與妻宫正對合為夫婦有夫婦然後人生焉是身命乃夫婦所出觀立命則立身可知矣東升是命西沒是身可見當以命對宫之度為身不可直指太隂為身此身命所以為一般般而好惡禍福同也此余獨得之妙因子問而盡發之括蒼季宗舒琴堂五星總斷士君子凡欲看命先看身命二主落在何宫専以空實強弱夾拱衝驀八字定其人品出處高下次以福祿恩官田財六主定其貧富貴賤真假輕重然後次以金木水火土氣羅計孛日月十一曜天德月德并的刃劫煞三煞白虎華蓋六害等守命安身以分其為君子小人姦直粗細之性行却以大小二限太歲流旬直難填實逢空有無貼襯之類以斷其發達衰遲好惡生死大要十二宫所主緊切處吉星坐實勝居強位凶星落空勝居弱宫明實不如暗實原空不若流空有實不如有夾有夾不如有拱空其位莫若空其星實其主莫若空其煞貴人祿馬殿駕此五者明淨純粹喜天恩拱福不喜拱煞黨惡日月官福田財此六者喜互換飛出坐實不喜雜煞散漫無情用星不可被傷身星不宜落陷天煞地煞切忌拱福拱官駕前駕後尤怕逢刃逢的身命逢官無實拱祿秩難高福官坐實值身空發施不出身官值好既能貴而臨事俱能福恩兩高縱遇險而依還不險如身命二主并限主值流旬一齊空却須看限宫拱夾之有無直難天地二煞夾身者有空亡限行其上亦防凶死但遲一步爾大抵恩能取信恩一陷而信令不行福能保官福一空而官居不久福嫌身弱田忌財空身弱福強似病人而挑重擔田高財陷如浪子而逞風流忽然福忽然災多是殺恩守命暫時貧暫時富定緣直難傷財論尅父母在古説則無此理而今以生害之理推之如計犯月夜生人必先尅父羅犯日晝生人必先尅母此乃隂陽相峙子午流注之理或是日月同宫謂之日月合朔日生人必先尅母夜生人必先尅父或日月衝照謂之日月對望日生尅母夜生尅父蓋取其有光無光之義也日生人太陽落隂宫則父先亡夜生人太隂落陽宫則母多先死隂陽反背之義也至於夫妻男女俱有成法兹不復論但琴堂星法其玄妙只在空實二字其禍福只在夾拱二字貴賤真假須看四柱上四箇實字俱有吉曜得用之星守之三方左右夾拱有力福星恩官田財各得其實當決定作真富貴命斷之或四柱上實地只有二處守吉星則看其所守者是何宫主如是田財之主則其人可富或身星限星強則此命必是自家成立發達或日月田財命主都守實則斷其人必多祖業承蔭有餘生平不受勞碌如命主守官祿或坐天月二德貴人祿馬有實字拱夾者則知其為文獻衣冠故家之裔有德守成之士也或身命同文魁星坐文昌長生實地者須分晝夜日月司天之法看之則知其人有學有識極聰明多才多藝之士也或身命守的刃劫煞白虎六害之宫或的刃六害咸池之類夾之則知其人為姦粗小人市井尋常之徒也或天月二德貴人祿馬雜的刃劫煞白虎六害之類守夾身命二主者則知其人界乎君子小人之間也或天馬守實地馬逢空身命二主與之同宫者則知其人乃幫間隨時附勢之徒也或身命與金氣孛同守天空或入兄弟宫者則多浮蕩江湖醫卜賣活之輩無疑或身命主坐奴僕貴人祿馬衝夾此則多在公府皂𨽻之類其他可依此例活法斷之不可具述也如病人欲問其目下生死或凡人行限問其壽夭應在何年月日者其要只把各年太歲逐宫輪轉看其宫分原有何吉凶星守之或太歲帶的刃祿馬貴人之類值年填之以分其災福如太歲帶刃填起煞星衝我命宫并大小二限者斷其人是何年月日災病破財或是官祿主星在限上被其當頭衝填其煞入官祿之宫又有直難的刃重見被太歲填實則知其人此年必因官事囚禁破耗勞苦大不稱心有官則剝官停俸次年有恩星填實救之則可解脫或太歲填煞入福德財帛田宅者則止破財營運不能有利門户疊見繁擾却無他重災其餘妻子奴僕之宫並依此例推之如身命二主逢空大限主星又落空亡後限主星又不如先者流年太歲一連趕起的刃三箇地煞到命到限其年小限主星又作煞論者并其月令透出黨三煞又有直難坐實則善病而亡若太嵗一般趕煞到身亦未即死大凡欲逐流年看星必須以流年太嵗論之蓋太嵗能吊起三方之星如大嵗在申則能吊起子辰二宫其三宫所得力之星一時皆動是名吊起之法其太嵗所守之位有星並皆填起其吉凶動靜皆由此而應如士大夫功名之人問動靜則以催官天祿天馬之類太嵗吊起之法依正經所載一一斷之萬不失一大槩煞星乃小人之象偏喜合不喜衝故太嵗三合吊之有吉則能成吉衝宫之衝有凶則能成凶所謂小人女子合則喜衝則怒也天理人事一而二二而一也其實皆可以理推其玄微以形像求其倣佛夫吉凶消長得失存亡之道固不可以預知然果能依此求之雖不中不遠矣然易有言曰君子修之吉小人悖之凶則天理本具於人心修身之道或可消非於無妄迎福祿於大有者必灼然矣括蒼二十字例恩恩者如水生木木生火之類煞煞者如水尅火火尅金之類制制者如甲子旬中無戌亥空亡之類化化者如命主財帛田宅主福德官祿身主并天元祿主是也凡此六主一元命限見之皆不作煞斷此即所謂化也其餘主星惟金星無餘氣計羅孛除化天元祿不作煞斷外餘皆一例作煞論之氣盛衰消長隨時變易之義五星論氣當隨氣運變遷而觀之也體靜也謂如四柱中有八箇干支乃無形不動之定位分布於十二宫以填實地戴五星日月四餘以行原守流年衝合焉是則所謂體也用動也謂如十一曜皆動物行度有遲留伏逆躔於十二宫分隨其躔處以論所屬并大小二限定吉凶焉此則所謂用也星天星日月金木水火土孛羅氣計天祿天馬催官文魁之類曜地曜駕殿天月二德并陽刃劫的祿馬驀越天空白虎華蓋六害長生臨官帝旺咸池之類原原守謂生下之時天星地曜所躔之宫流流年謂各年太嵗流星三煞流旬空亡之類強七強宫謂命宫財帛田宅福德官祿所屬之宫是也男女妻妾皆是強宫弱五弱宫謂兄弟奴僕遷移疾厄相貌所屬是也空謂當生四柱旬中之空亡是也流年旬中空處依上斷之實謂四支中所有四字於十二宫中填於本位是也拱謂三方拱向如申子辰亥卯未之類要四柱有字為實拱也大凡看有用之星極喜拱處是名真富貴惟煞星的刃若有拱極禍夾謂左右夾起如子寅二位實能夾丑宫之類與拱同斷衝衝謂對宫有實字即能衝起本宫也凡空者若有對宫一實字衝之禍福之星皆起本宫如有實字不怕衝若本宫原守落空須得一實字衝之才實凡煞星落空不喜衝有用之星落空則喜衝起惟原守嵗駕一字衝之不問本空實與不實並衝得落空禍福皆不能準流年嵗駕若至各宫除有用之星逢空喜他衝起若煞星逢空不喜他衝起或流駕輪還填起各宫若值有用之星是名太嵗有情則一年凡事稱意喜美進益若填煞難的刃之星是名太嵗填煞則一年災敗或值福空限空并身命恩星皆逢空流年復惡則多死亡合即上文拱者是也貼貼襯謂命宫身星官福田財等主星飛起别宫或值四柱空亡及流旬空却本不為吉緣他宫主星雖空我命限二宫支上又有字填起是名貼襯有力雖危無咎若貼襯無力一空却死矣此法有驗看星凡例八條一看命宫有星無星并主星飛出何宫得令不得令母星尅制化伏身星傍母傍鬼二看天元祿主官福田財如何三看祿勳卦氣驛馬天馬地驛貴人在年月日時否四看劫亡的刃桃花冠帶紅喜有礙無得五看滿盤空亡四柱虛實六看大小二限流年神煞十二宫神比和生尅如何七看直難小兒最緊八看四柱天干俱化吉凶若福祿權貴印守命大貴限逢亦發又看納音生尅上壽夭看星節要八十一條一看五星之法先排太陽以生時加在太陽度上逆數至卯則知安命在何宿何度方為端的須是以度主為要宫主次之蓋宫主者州郡也度主者縣令也由縣而州其宫主必要逢生得令不要尅制不為太陽所伏及三方四正無星相尅方好更看度主又坐高強又坐祿馬長生嵗駕又逢生旺得時為妙一立命既定更看是晝生夜生晝生人不要火金月孛羅照命夜生人不要日木土氣計照命名曰五殘星皆主貧賤不然則多憂少樂生平成敗碌碌到老無不切中一立身在何度何宫晝生人看命度主夜生人看身度主如上弦望前望後及下弦生者看身度主為緊亦如命度之法一須先看福德宫為緊蓋人生處世以福為最有福則有妻子立名利致富貴福德既虧前數者未見其可得也福德者人生一世之主若見福居祿祿居福身主命主入福又有日月照福德權貴蔭映之星入福德金水夾月居福德皆是有福之人為人性必端厚量必寬洪仁慈處世無刻薄之患有福有壽可以定人性情每試果驗若見土計坐福德者必寡言語其性沉重若見福德宫有刑囚耗星居其上者必是刻薄之人凶悍之徒大寬小急不仁不義之流心多好殺言不忠信詭譎欺詐姦謀機巧未見其為福如福德宫無好星又看三合對照有何星守照如三合對照守照俱無星亦未可便言其吉凶更看財帛宫如何一財帛宫亦人生受用大端也或福祿守財帛日月照財帛田財互垣命身二主臨財財帛又逢生旺得令得時是乃有祿之人斯人既是有財則可以養妻子致奴僕既有財則有名若財主失經刑囚暗耗照財帛是無用之人如財帛不好未可便言其吉凶又去看田宅宫何如一田宅之位亦人生受用之源如田宅主星不起或有福德照田宅日月照田宅身命坐田宅亦看作有財名望之人既有田宅則妻子皆自田宅而出人之一生福德田宅財帛三宫既無吉星便不可以為福只是尋常碌碌成敗命斷一看生平行限如何如人一生命好身吉若行限不好却不作發福論之蓋命好不如限好如身命好行限又好方是好命蓋命為魂身為魄限為血氣三者須要相扶譬如人之一身血氣稍滯則血不流故為寒熱相攻瘡毒並作風邪客氣得以侵之若血氣和暢其身既壯安得有病也一行限須要向明不背方吉何謂向明夜生人見火金月當限日生人見日木土水氣當限皆謂向明發福可期如日生人不曽見日木土星又皆獨見火金月照限行限又經行的煞劫煞陽刃三煞空亡之上未可以發迹許之一凡大小限以生日後交神煞祿貴以冬至日後交命宫行度九嵗以前在童限至十嵗上本生度起行一看命須要看得令為緊如春木夏火秋金冬水土則寄旺四季為令令者如臣稟君令宣其教化生民休戚係焉以令主之不背則赫然號令從所曕仰立春木為令主發生則萬木萃於春為人亦清麗煥彩然木既主令金不可尅木乃掌時月之星金當藏刃土則培木只怕金土參差是為逆亂伐上禍由斯發主為凶厄夏月火陽當空水縱泛濫豈敢侵月令之火金廢則沮於爍石流金之勢何所用焉亦當廢棄故夏金多行南方若金火日用事必有酒色之疾大抵當廢之星主事為人志大謀踈虛空無實愚而好自用平生怏然易於退失只怕金水相合與火爭勢為反逆之曜以此用事主凶惡而不得其死秋金用事大火西流本自棄置萬木黃落當廢之時惟金司權逆金為禍若水火相合既不受令又有陸梁安得不凶冬水沍隂必藉火為順流溫助之宿土為隄防之星皆無傷用事之時却水木無相生之理相合氷凍若水星夜見以之用事其人必孤寒大抵令星春時必借土為栽培之宿冬月火土自為相生相養亦與水而濡沐者雖星廢不當時却畢竟相為表裏皆吉只有火金月不可相見必不能相順見之禍發令星從陽順則吉為贊助協翊之星逆則凶為跋扈飛揚之宿所以順者或引陽或從陽逺在十度不為尅奪所謂逆者侵陽用事令星最要得日君行事居有氣之位與命不相反方為令自出稍為尅奪則是聽令於人令星司奪當之必死令星司福用之必祥五星犯殿傷宿即尅奪之星也主為人行所不為之事亦受人所不受之禍萬萬必中一太嵗最為緊要大凡人命要主星臨駕與太嵗相關攝則富貴嵗君不收録則無用之人又忌煞星破駕凡人命身與福德為重有祿無福祿將安享有命無身命將安保一凡煞星不要逢時要失時如春水逢金冬水逢土之類煞星失時主星有氣凡火為煞不宜晝生人土為煞不宜夜生人木為煞防春金為煞防秋水為煞防冬火防夏皆得時失時之妙論一金星若在太陽之宫名曰映進若作命主在太陽之前為特進各名曰金星映日又曰金星當權皆主權貴太陽之前只喜身度主命度主及金星在前者皆作吉論若太陽之前或是刑囚暗耗名曰誤進十進不吉命主及金星在太陽之後者名曰後進其福減半一諸星並行有先有後大凡煞星則欲其前行主星則欲其後至且如水火二星同行水能尅火則以水為煞星如水星在前行則不能尅火如火在前水在後其煞逼身最為利害不可不審諸星皆然經云煞前主後當膺藩輔之權煞後主前必有徒流之患詩曰身命二星若無尅須交金向木前行水火二星不相尅更饒水向火前行土月二星無相食最宜月向土前行土之行遲月行疾不分前後極難言一諸星退行有退而有力者有退而無力者且如退而有力火金二星同行金在前火在後而退行此煞星不敢進前以尅其金是退而有情如或金星退遇火順行是退而逢其煞也五曜皆然亦有退而升殿退而入垣退而逢生皆為有情又作吉論或退而坐煞退而逢煞或退惡弱之宫皆為無力可作凶論一遲留伏逆五星中緊要學者不可不明遲則順度留則不行伏則不見逆則退行有用之星順行為福遲留伏逆進退減力經曰順則優遊逆則退縮留則拘繫抑鬱伏則韜晦無光如命午太陽忌木氣同躔木前日後退之為禍日前木後退之為福留者用星留於實地為福久遠煞星留於實地為禍不休若留於虛地禍福皆無伏者用星伏則無力忌星伏則無災逆者退行也有退為福有退為禍以理推之詩曰五星遇日須當伏三合逢陽必定留若是對宫為逆度不逢陽處是為遲一羅計截斷半天星有吉有凶或截斷諸星在左而限行右名曰反背行限不遇諸星故也又有升沉之不同或日生而諸曜當天截在辰巳午未申位而有星行限從酉戌亥子丑寅位而無星者為不得體又有夜生截斷在戌亥子丑寅位而有星行限從辰巳午未申位而無星者皆為升沉之不同並不合格一羅計截斷半天星斗有跳出一星在外者當専論在外一星禍福如跳出一星為福主祿文命主身主或官魁權貴星夜火夜月晝木晝土皆為得格主人必有富貴名利之事如跳出一星刑囚暗耗或奴僕主陽刃劫煞的煞主星晝生而火漏出夜生而土漏出在外者皆不合格主人貧賤勞役奔波勞碌度世無成不為吉論一截斷不要太陽跳出如太陽格在外名曰孤君孤遁君而無輔極為不好蓋太陽乃人君之象必諸星輔佐而行或左右皆為吉論若太陽孤立主其人不得人之力雖親輔人人多遠之平生勞苦一諸星聚會有吉會有凶會吉會者為命主身度主官魁福祿或化權貴蔭印皆為吉會雖是火羅計孛亦無害如不為前項等星而為的劫陽刃等主或化刑囚暗耗皆為凶會不可不察一身命主坐奴僕有凶有吉貴人之命多有身命主入奴僕而貴者亦有入奴僕而賤者如奴僕宫主原是貴人祿馬長生帝旺籍駕殿勳垣卦之地皆不可以奴僕論皆是大貴之命如奴僕宫主原是劫的亡刃死絶暴敗之鄉而身命限主居其上皆是奔波勞役無成之人方可以奴僕言之一太陽孤立照妻宫皆主夫妻年紀不等不然妨尅重婚一太隂正照妻宫皆主妻妾無貌不然亦非正禮而婚緣太隂虧盈之不常也一夜生人太陽獨照男女宫無星以輔之其人主無子晝生而見太隂在男女宫無星以輔之亦無子夜生人惟有水輔日在男女宫反主有子一妻宫不論妻妾宫主星假如甲子年丙寅月寅亥木垣木為兄弟乙巳日巳乃水垣為妻妾水得地逢生坐實則妻賢貌美內助榮夫或坐籍駕祿馬貴人則因妻致富或水星坐空脫之地逢煞星同行皆不好妻或無妻一男女宫不論男女宫主只以時論之如丙戌時卯戌火垣火星逢生坐實祿馬貴人之地者皆主得貴子火若虛脫或逢煞主無子送終必有損破否則破蕩之子也一看命須是四正為緊或日月照四正或金木照四正福德照四正及用星居四正之地皆貴乃有受用之人亦有火羅計孛守四強及化得好者皆為合格如是刑囚暗耗等星居於四正宫中而逢相尅之曜皆主破敗一看諸星皆如看命之法亦看三合亦看正照方斷吉凶大抵論三合四餘輕五星重對照四餘重五星輕蓋四餘乃橫衝直突之曜也一看帶疾先看命度身度受尅與不受尅及起處坐煞與不坐煞更看疾厄宫中何星坐其上如疾厄宫有火羅計孛刑囚暗耗諸凶星併會其上者皆主重疾如疾厄宫無星而三方對照有凶惡之星夾照者主帶疾一命主度主起坐劫的亡刃主人尅害父母骨肉不全或出祖破祖過房自立方免一遊行坐驛馬主人過房出祖坐長生馬者有四方之志一身命主起遷移入兄弟奴僕宫者皆主出祖過房偏生庶出也試之驗一十干坐命如六甲生人不要立命在金宿度上名曰鬼尅皆主不安勞役只喜坐生星坐水宿名曰父母之上坐土宿名曰財帛之上坐火宿名曰脫局之上當以意會消息得時得令為好餘倣此一男女宫有土羅火計孛暗耗刑囚照者其人多子女一年一産及至老來皆不得力如雞抱鴨相似不然忤逆之男多出在外亦同無子一命坐祿坐貴坐長生坐庫坐駕坐殿坐夾貴窠坐祿馬樞坐生旺鄉皆主富貴不然亦主衣祿盈饒天玄賦云祿馬貴人持世立身須主清高咸池凶煞臨身出處必然微賤是也一命坐劫的亡刃暴敗空亡死絶三煞飛亷煞者皆主人性不好心險行怪狠暴不仁成敗勞苦一夾命要日月夾命福祿夾命官魁夾命印貴夾命三合拱之者亦吉或命度主身度主起在别處而夾拱之者不露人見皆大貴一劫的亡刃之宫或凶星夾拱其凶暴不可言亦主死于非命然無官符不成煞刃無歲破不成劫的無病符不成疾厄此乃五行真生煞一官祿不要星尅其宫名曰官鬼且如官祿在寅地却不要金星入內亦不要三合四正宫值之皆主其人健訟不然遭官事亦無食祿之分一官祿福德二宫最要吉星臨如日月居官祿福德或福祿居官福水日金月各居官祿行限遇之皆發福如官福二宫無星有吊起或吉曜居其上者亦吉又看對照三合之宫以斷休咎富貴之人未嘗官福二宫無星如二宫原無本星官主又惡吊起對照又無星辰照臨一生虛花無成一婦人不要太陽坐命及照命如身弱皆主欺夫奪權性有男子志氣一婦人田宅宫如刑囚暗耗坐其宫並有惡煞坐其上者皆主破耗外家零落兄弟無情婦人最重田宅財帛之宫一婦人坐驛馬又帶水孛照身立命或在五弱之宫皆主淫奔其餘與男子一體同斷一看命惡弱之星則要其居陷弱明顯得用之星則欲其居高強一看八煞之宫非但主人疾厄亦主一生權柄之地若權星印星福星祿星居之皆主人有權一貴人之命多是陷弱有不可觀者其中有一星得用坐煞得時及官祿有吊起吉星暗加其位者皆貴不然三方有吉星交照官宫又不然有吉星交照八煞之宫一金星不要坐陽刃劫的煞之上蓋金星主煞遇則煞氣騰輝為煞最重一太乙抱蟾常人若見月與孛同行謂之太乙抱蟾非也須是上弦及望既望下弦在未上見之又生於戌亥子丑之時方謂之太乙抱蟾如非上弦下弦及望前望後名曰太乙抱鬼如在辰亥戌子丑之宫又是下弦既晦之後遇之者名曰抱死鬼却不為福如他宫遇之皆非抱蟾一看命只可求其主星命度命主身度身主看強弱禍福不必諸星一一高強一一得地故經云一星得地終為貴顯吉人又云使一星背而莫究其非縱羣曜吉而莫能為福譬如五七員官員在任不必員員識而其中有一員得力則羣從州縣莫不刮目觀星當以理推其次看限主行限須要限主高強得地受生吉星交會方為好限發達不然皆為不福一凡有用之星辰要在高強大抵小人命多是有用者居於陷弱無用者處於高強歌曰相生須用他生我相尅還須我尅他他尅我時為禍大我生他時福消磨有用為我無用為他一論命必言身論身必言命二者出於一體且如立命子丑土為命主木氣為難火羅為恩月為身主亦以月為土之用星並不可使月與木氣同宫亦不可木氣合時與月亦不可使土月二星躔於四木度及泊於木宫此二星倘逢木氣又躔木度木宫便見有禍無福如土月二星躔於火度泊於火羅便以吉斷切不可以身命二主異用父母兄弟妻子田財限主並可依此一官祿福德二宫主人中年成敗生死富貴貧賤於此實為利害有中年一落千丈有中年奮發馳騁有中年衣紫腰金有中年孤苦伶仃福德且干係妻子兩宫如吉星守照於福德照妻照子不但官中光景亦許佳兒佳婦如凶星守照不但初年蹭蹬亦早傷子刑妻官祿干係田財二宫如吉星守照許其田財若凶星守照一生決無福矣更所忌者羅㬋守官祿少年逞訟權豪若為用恩二星又許有用不問是何命並依此斷一晝生人則要太陽在卯辰巳午未上方應晝生為朝陽向明之格如日生人太陽坐申酉戌亥子丑之上皆非合局夜生人則要太隂照命行限亦要火羅月金孛當限方為得體一余論五星每每推究太隂躔度次舍斷禍福吉凶貧賤富貴十有九中蓋人命以太陽為主身宫以太隂為主主本既危何所根蒂故凡日生人當推太陽夜生人當推太隂如日生太陽逢惡曜夜生太隂逢凶曜無不貧賤夭折日生吉宿逢陽夜生吉星釣月無不功名富貴然猶當論其在十五度中與不在度中也一木羅會舍在寅上為會吉蓋木喜於寅羅樂于寅二星相得為會舍則吉其他處不可以會舍言一火氣為職權在卯寅上方為合格蓋火入廟於卯生於寅寅又氣星之垣卯為氣旺之地二星相生故為職權不以晝夜為忌他宫減半一命坐弱宫主星又微行限又微一見好星在前却不能勝其任而命即亡蓋素貧賤而行乎貧賤雖有富貴不能享也一命坐高強主又高強行限又好一見凶惡之星在前而不能進蓋素富貴行乎富貴雖有貧賤不能處而亡也一人命合主有疾而少年未見乃是未曾遇煞星尅星行限故不發也一行煞地又見煞星高強決是重疾廢疾有中年患目患風者由此一日生人自少至老一見太隂在前謂之陽極隂生決主人死一夜生人一生見行太隂又行隂星之限至老一見太陽在前謂之隂極陽生決主人亡又如命躔房日度行限至張月度必死蓋有月光而無日光也又如躔心月度行限至星日度必死蓋有日光而無月光也然須看有無惡星當關方可以此斷之一太隂逐月隨日而右轉化金木水火土太隂屬水則不喜土月同躔如太隂屬木則不喜金月同躔皆主疾厄妨尅如更在亡煞劫刃空亡之鄉決主其人亂説言語不實一男女坐亡神及主星起坐亡神桃花帶馬者而又有氣孛金水照之皆主其人慷慨風流歌唱風月女人值之決主為娼一定人心性先以守照論守照如無以對照論對照又無以三合論或四宫無星以福德宫論之一命好星辰俱善柔而不能作大事業又要一凶星以助其權大凡吉星多凶星少則以吉論凶星多吉星少則以凶論貴人之命非權煞不能治世一人命多有生時不定以子為亥以亥為子以初為末以末為初故其言禍福不準須加減定其災難受制受尅方能定其死生故經云一不可拘二當敢斷妙在識其通變如是禍福不應未可據言休咎村居之人不近譙樓標牌更鼓之下亦有晦冥風雨氣侯不齊難以定時故算禍福不應况古今聖賢立法未有不驗在意消詳以定之一有人命不好而享用者不當有妻子有妻子者何以言之或有父母在倚恃父母福蔭故安享受用父母一殁便破敗不當有妻子而不能受妻子之奉至于死亡而後已一有妻子在前而命中無妻子未至終身妻子俱亡零丁半世孤寡至老皆初年限路稍強因主其一時之榮及至末年限路一弱氣運不佳皆非所有一有人命身好初年行限不佳未免奔波辛苦無成人皆以貧賤視之一旦行限好平地發迹立名利故舜起側微傅説起于版築不可不察一人命皆要日月明潔方為吉論蓋天地以日月為主若日月明淨方始貴顯故經云貴人日月要分明日月不明非貴人一氣孛羅計乃四凶之星化凶並皆要獨行則主重權一福祿權貴亦要單行方為顯貴一原守之星固好乂恐流年之星為患如限主乂惡又弱流年凶星重則亦能死人不可不察若限主健只是流年為禍必侯凶星出去方好故經云原守雖然無咎流年又怕為災原守雖醇尤勝膏梁之有味流年為患譬猶潢潦之無根是也一行限有迎有送人多送煞之年皆能死亡若是逢煞不好迎送又不好決死無疑若迎送不好非有好吉星不能救其活亦十死一生也一行限須要限元得援故經云得援高強失援孤弱限主失援莫不卑微一壽之修短不可以限度定止從難星若難俱受制全主高壽且如立命在辰金星為主火羅二星為難火被水尅羅被孛尅各各受制莫能為毒的許高壽縱使限到難度亦不為害如或被火尅羅無制未可斷其高壽必二難俱受制方可斷壽之高也一財庫五星中各有庫如壬子生人木為庫在未未上有好星主財盛如無星主管耗星凶星居之反破財庫若平生不聚財乃田宅財帛坐馬多搖動一得妻財假如戌命妻在辰宫或身主起於妻位若有土計與火同宫三合生金主得妻財如無土計不以論如身命在妻有火計相生主進妻財亦有因妻失財者如未命妻宫在丑土為妻星月若在酉土在巳或三合加合相會必因妻失財亦不和合一婦人有破父母家者如命坐酉金為主有火羅居申必破父母家出外行限遇火羅必破夫家內則父母外則夫家一妻妾有權者如寅亥命木為主妻乃水星或水化權行限遇之必有權之妻孛為權星主有權之妾辰宫命火為妻羅為妾羅強火弱妻無權妾有權一老得少妻土孛同行得少妻計孛同行得少夫一立命安身在女心畢柳及身命二主泊貴人咸池遷移官宫又逢氣孛土星合作九流百技之人也富貴豪家之人亦主高壽一多口舌人如甲乙生氣為口舌丙丁生羅為口舌戊已生計為口舌壬癸生孛為口舌庚辛人金是如人命或對頭三合守命見之多口舌亦主口嘴不中一凡行限遇難星須論金木水火土分别緩急輕重如以火為難望見生災以水為難過去為禍以金為難對度方凶以土為難則緩而遲以木為難則急而輕蓋火未然而先煙水既流而後濕金正遇而後能傷人土之性緩水之性柔故也其為災禍凶難亦以五行類推如以內言之火則心血燥熱痰痢等症水則腎胱冷濕白濁遺精等症金則腸癰痔漏等症土則脾胃噎塞等症木則肝膽風眩等症以外言之水則溺火則焚金則刃土則壓木則撲之類又須看三方四正加關通無救解或有救而力不能又命主低微故以此斷余屢試有驗竇陶氏十問竇陶氏能推占天文人事要其吉凶休咎不出十二宫之外蓋天道遠人道邇一貫之理外天求人非理外人求天非道也請試其一二方知天道不遠矣或問太嵗尊神互相管攝如何竇陶氏答曰太嵗宫神各有管屬尅我者禍生我者福最怕當頭犯之不足男命犯之受他制伏女命犯之並無養育馬若當頭退晦反覆祿若當頭波波碌碌貴若當頭受人凌辱夫妻犯之多見反目老人犯之至老奔逐小兒逢之多見災毒嵗為尊貴怕入奴僕若來尅我必遭刑戮右此専怕當頭正是利害須占命中有相管攝方有是説或問坐命行限遇空亡如何答曰立身立命空亡中坐福不見福禍不見禍馬遇空亡奔波到老祿入空亡終身僧道妻入空亡一妻難保奴入空亡自㸑自掃貴入空亡少離襁褓財落空亡財帛自耗日落空亡少年必破官落空亡徒有負抱若有煞神救援則可右此空亡隂怕陽空陽怕隂空前後最驗也或問五星發用十二宫神生旺如何答曰馬遇長生多動刀兵男空奔波女必淫顛沐浴在命處事流連命逢冠帶妾奪妻權臨官在命發在少年男命喜之女命不然帝旺守命難結夫緣衰病死絶女德必賢處於墓地能顯財田男命逢此晦昧萬千若遇胎神罵鬼怨天男亦如此胡語亂傳小兒逢養端的還魂右十二宫禍福應之如響須於安命處所裁酌或問二十八宿立命何度善惡答曰鬼有二度號曰天眼男命係之多見凶狠不是權豪便是反叛心月為狐五度有半女命逢之必淫必亂且是精靈多招離悶亢金為龍井木為犴命立其中敢言敢斷箕風畢雨倐忽聚散男女立命多有病患可以詳觀不可例斷或問水命怕土子上土旺水亦旺何以斷之答曰子宫安命以土為主水來受制其水可取若行夏令當云以火土必得時於水何補若行秋令得金為母金能生水有水無土冬水得時水勝土負或問卯為火垣又為木局何以辨别答曰若行夏令有火無木若行春令有木無火冬令得時返為木黨三方有水湊成木局或問人之父母兄弟妻子參酌孤寡答曰十二宫中寡宿孤神若逢太陽先喪其父若犯太隂先喪其母日火月土則又有準左右逢此必無親情兄弟宫見必無弟兄妻宫見之一世單身奴僕見之一世艱辛逢祿逢貴出家道人逢劫逢的終身山林右人命不可犯孤神寡宿位諸般煞上有凶則可畏或問既分十二宫坐命隔界何以斷之答曰十二宫中皆屬宫神既有子丑合論癸壬既言戌亥乂有乾辛既論申酉合論坤庚雖言午未亦有丙丁曰乙曰巽以配巳辰曰甲曰艮以𨽻卯寅隔界之處要看分明若以主論辨其重輕純言其度取用不真或問小兒關煞何以取之答曰前後有煞命在其中三方拱夾亦是煞門原守如是更有加盤若無救援十死九難更有一件為小兒關春命在酉夏命子看秋嫌卯位冬怕午安此上安命乃為災難右此關小兒關煞細推有理但忌三嵗或問官貴之命何以見之答曰官貴之命有官有印官印相生方有權柄印強官弱掌財之命官強印弱虛名不正金水清高只是受蔭木氣高強正科必定羅孛高強只膺武品前後試之無不有應右生我者印尅我者官或問七政四餘守命何如答曰計都守命愚而自用羅㬋守命色心最重孤氣守命難與人共木星守命性執且迷孛星守命為人慳吝金星守命義重財輕水星守命詞唱輕清火星守命性急凶狠土星守命貪酷而淫太隂守命為人不佞太陽守命快性便行日月合朔晦而不明右如明字者吉如反日月字者凶再將十二宫辨問為證詩曰十二宫中帶煞神煞神排布甚分明須知月建有強弱反凶作吉各位均願聞假如子上安命以土為主或見木氣為凶或見木氣不夭何以斷之若生夏令母星是火火羅乘旺必能生我母星占強安能為禍若生春令木氣高強無金與羅必定相傷身逢水孛實有不良若生秋月金星得時土亦不厚木氣有虧倘有災殃不至深危若生冬令水土俱旺木氣雕零土星堅壯小兒遇此所以保養中年行限財物亦昌若遇火羅福壽愈長假如丑上安命以土為主何以斷之丑宫所論與子無異春夏秋冬皆如其理只論官星太白得地趕退餘奴無有不是便看隂陽斷其終始又怕寅亥身逢土計假如寅宫安命或見金氣有傷或見金氣無傷何以斷之若生春令有木無金若生秋令有金無木三方暗加土計是煞夏令炎炎子母相生秋令見氣氣反為榮冬令見金煞星躔身若見太陽反煞為榮金水高強必主富貴孛氣高強刑尅有畏遇月虛名品官不正可以詳觀不可例斷假如亥宫與寅宫參酌以何辨别若論亥宫寅宫頗同限逢金氣皆斷為凶又怕火尅戰尅重重夜計與氣十死九生三方吉曜返本還元假如卯上安命或見水孛而天或見水孛不夭何斷若逢夏令火星乘旺水孛相攻本身堅壯若逢秋令母星黨子縱有吉星不破即死更逢春令母星有力縱遇凶神不能損失忽在冬天水土俱強生子潔淨安能有傷須分晝夜子細推詳假如安命戌宫與卯宫何強何弱戌宫火庫本是強宫水孛相攻秋令甚凶若見日月木氣相同更遇旺神福更昌隆餘月遇鬼與卯宫通攢聚衆煞反榮受傷亦當一發發成便亡假如辰上安命或見火羅而夭或見火羅不死何斷辰垣以金度有軫角雖忌火羅亦分強弱軫度水局計孛為殃角道屬木見火必亡亢金堅剛秋不忌火剗度忌羅四時皆禍若逢夏令火爍亢金灰飛煙滅角木不禁若逢春令角度平穩若逢冬令軫度無損雖遇火羅皆不危困依此辨别吉凶有準假如酉宫安命與辰宫何以分别酉為西垣太白本地若逢秋令火羅不忌若逢夏令見火不利春冬平平水孛泄氣四季土旺金神所喜限行官祿恩鄉得意齊地貴人稱遂無比辰宫官祿與酉不同太隂為主夜生則榮加盤俱換須要研窮假如巳宫安命或見土而死或見土不死何斷若逢夏令當云以火土必得時安能尅我若逢秋令得金為母土能生金金能生水若遇春令得木為鬼尅戰餘奴不能尅水若逢冬令土旺水旺不能相傷本身皆壯若逢四季水無所望子細推詳依經勿忘假如申上安命與巳宫何以分别申宫水局巳宫一般四季如前十分細觀假如午未上安命屬日月若見衆星何以斷之午未二宫乃屬日月羅計朔望遇此為蝕若非朔望為我奴僕反凶為吉甚是獲福若遇紫氣刑傷孤獨若不傷財重重白服四餘作黨傷官敗祿星學大成卷四
