body:
  text: 星學大成卷二十七明萬民英撰摘金碎玉原夫刑衝喜樂逆順伏留夜厭柔星而用事晝嫌強曜以聚天土在齊吳子丑雖夜生福猶昌熾火居宋魯邜戌縱日誕祿亦盈餘名題鴈塔天首周邦足躡雲霄太陽魯分水日妙星張之位孛羅同箕尾之鄉金水會蛇廣納殊祥金木逢龍多招福祿水流鶉尾巧計千般孛坐玄枵機謀百變金羅同而虎閫制兵同在寅宫水木清而蘭臺掌翰申宫也子孫忌孛妻妾宜金家藏異寶從來日在金宫困之資財大抵火居金位柔星在命無奈發遲惡曜臨身奔波衣食金乘火位其人少失尊親火入金鄉此命早拋兄弟掠他人之物以為己有蓋緣水會計都捐自己之財以濟他人必是木同紫氣氣月為人之華蓋金孛乃命之咸池火在八宫而主疾羅居十位以遷官金到亥而主夀木到亥而福延厄雖主疾亦是貴人之威權疾厄宫主飛起受尅主疾亦主貴人權柄妻不專財蓋觀幼年之禍福天元納音所屬福深八煞有權不富則貴火寅則旺水丑則嫌非水孛不妓非木日不儒金計乃軍庶之流水日必技能之士論冨須看財宫貴榮須參限路五星順序入命位以封侯一孛朝天到官宫而作宰羅斷計謀孛尚權勇火星赤黑暴燥難瞞土宿短肥寡言多佞火未來而先應土雖去而尤遺月穿細栁黑頭宰相何疑木打寶瓶白首愚夫奚惑氣羅見日非道即僧土會孛羅不貴則富或命主限主則吉水日計孛志巧而心靈日木氣土德和而性厚或日在命依此斷日出扶桑遇白羊而金烏朗烈月生滄海到金牛而玉兔熒煌羅計土孛兮容貌粗俗金水陰陽兮形容端莊水火併於田宅破家傷業日木會於財宫發福多財一星伴月於天門二曜朝陽於邜位後學之士宜評識焉玉衢真經太史星翁劉世民編緝十一星辰拱玉堂玉堂宫主坐庭光三主齊高還入廟必然超侍聖明王貴人元有紫薇垣惟此宫中最可言身命主星來到此必能富貴作廷元惡星犯煞最恓惶凶曜逢刑不可當幼歲多殃羅計破中年蹇滯忌囚傷木羅會舍分強弱金計同宫論後先吉宿強時能壓煞凶星強後吉如燃吉星先入多強妙後入宫時氣不全女人先推居福德男人切重在移遷福星廟旺人欽仰夀主高時夀必延日背太陽難得力夜生月皎正光妍官高官必居台位夀顯年庚比泰山八煞有星權不小七強無宿賤堪言身宫清吉休愁命福德堅高不問官囚忌顯時人破散德官相聚必榮歡夫妻和睦因金到父老娘延自氣還兄弟多時緣木至資財耗散孛相看命宫擁從星尤貴身位飛來宿更鮮身命清時多福祿木金死絶必衰貧女人怕帶男人曜日裏防逢夜裏星天德相逢為將相印官相聚必公卿月逢晦曜須還蝕日遇凶星亦不明惡曜偏宜居死絶吉星最喜帶生成木星獨貴諸凶散孛彗當凶吉宿沉陷處受傷多破碎強宫得地越生成惡星帶吉分先後吉宿逢凶論淺深吉曜為元添福德凶星作煞最傷刑計羅遇日元凶散金月逢霄兔魄盈土氣夾羅多險厄氣陽金計主孤單一星有氣皆為得諸曜齊星事可憐孛入財宫財自散火居子位子難延火星拱斗人膺祿諸曜朝天福最綿五星歸宫人足祿三主犯惡必無年生時須愛居尊位坐命偏防入四刑二主俱高權顯大七強有宿貴終身財中有氣財終聚身上逢凶身不安生處逢傷生氣絶逆中有順逆神間諸星逢逆全無氣衆曜強時必貴人凶曜主強多惡暴吉星帶絶必衰零福元淺陷多無福夀主凋殘夀不興三主俱低無發氣兩宿陷却亦堪憐諸星得地須榮顯衆曜相衝越苦貧吉曜逢傷多尅剝凶星帶煞損精神兩宫坐福千年夀二德臨財萬頃田坐貴宫中宜立命死凶局內怕安身此經總是真玄語細把工夫密地論星辰禍福斷歌水星隨日至天中錦繡文章達聖聰羅在日前官顯顯羅居日後禍重重火入金宫兄弟喪金尋火位喪雙親孤陽射退三方煞一木能消四正凶水火失躔多厄難木星失度主傷殘羅計偏宜居巳亥縱為禍曜禍無干君居臣位娘先死臣犯君宫父早傾日月反躔依此斷日月升殿兩親康日邜月酉命坐邜火星居午妙非常日酉月邜相違背人生值此有乖張太乙抱蟾宜未亥夜生富貴足衣糧羅曜獨居官祿上必是為官佐聖王四角有星權不小四空無曜夀難延四空無曜看命主不知命主在何方若是主星入強位官強福弱有災殃四空之限依此斷限主受制入泉鄉福祿夾身還促命鬼福鬼祿刑囚守命夀延長刑囚得度水火相交多死氣火金同度夭天年木羅會舍分強弱木羅反背主貧寒孛騎獅子人凶惡佛口蛇心毒害人計羅截出孤月滿夜生西北富家翁計羅截出單陽滿日在東南福不窮計羅截星還反背一生辛苦暗朦朦命中金孛少男女三十年前不得妻若是有時刑尅早回頭只見影相隨日月分明共金水此星高照位三公水星伴月終須貴火曜朝陽福最隆當生身煞會身宫身主無破在祿宫掌握兵權宜武職聲揚萬里抑蠻戎背祿何嘗得寸祿命前行煞不為凶靈臺經陰陽守巽至老耳目聰明火孛臨坤未免腰背屈曲安身在巽見日月主總明巳為耳目也又申為腰背之所火孛乃凶星無制主有疾羅居午位眼必無光水入寅宫喉風壅塞午乃眼目之鄉寅為喉舌之所惡犯星辰主有是疾患鼻頭帶赤火孛而守申宫命在申或行限在申火孛居之主有災疾臉面萎黃土孛而居辰位辰乃關人顔色之所計臨申位面上有虧羅入命宫胡鬚可驗命臨計六丙為刑六甲為囚夜生無驗孛羅到酉心氣往來晝羅衝心心風難禁酉為心氣之府孛與羅居之更或在命宫或行限遇之及帶煞刃則主是疾孛羅居於亥子臂犯瘡疽金木戰於辰酉肺心咳嗽羅逆行而不順多犯血光火若退而遲晉難堪酒痢更若孛星有黨血上加膿那堪土宿來臨痔而帶疾木到巽而見煞左手拘攣氣入寅而逢刑腳腿虛腫要觀疾病先論陷星吉凶了然易如反掌矣相真行人生夀夭與貧賤五星推之晦實顯官祿臨之夀必崇刑囚傍照福必淺木人最怕計金扶老來咳喇自焦枯木人者乃令星木金主也最怕金計入命行限遇之則依此斷水命亦怕氣與火吐紅翻胃喪其軀水怕氣火土命尤防氣孛臨腸風虛腫夀難圖土怕氣孛金命亦怕木羅侵氣瘤痔疾會傷人金怕木羅火命若逢水孛梗定在人前語不真火人怕水孛莫教火土入其中才年二十耳便聾若是計孛三方照腰駝背屈身躘蹱萬一火金加入馬一生奔走如飛蜂火金入馬勞力不定不惟勞力自奔走生瘡發癩又疽癰命宫若遇火孛夾頭尖項縮似村農金遇孛羅兩邉拱遍身出水成虛腫萬一紫氣暗相加定知唇缺鼻無孔有金在命孛羅拱夾則主水腫有氣暗侵者則依此斷添減皆不可此訣君須仔細詳有人得之似仙方宜將宫度仔細看却把他星細酌量又有一般極可鄙氣在馬宫逢的是此命生來極不仁定教手足無一指金水毗和無别慮堂堂相貌好驚人一生快樂無憔悴女人命裏却不同他身五漏不作比若問女人受命源他篇説了子細觀篇篇盡看有意義若無此訣怎談言知理之人更須看尚書洪範晉天文前賢説事有條理世人雜説徒紛紛擎天遊奕亦須看假如卯酉在其間只看二月與八月其餘月分亦等間擎天逰奕主二月禍福如在邜酉只是二八月有凶吉事寅申正七月有吉凶依此例推土忌夜兮火忌晝此是世人煅煉就火土人間日夜生此説那來斷休咎却是朔望不須疑火土朔望見之生受此兩日外其餘不問見之其人多生受不惟一生無享用且是壓身多損夀金木生人火是水生人土是餘不怕四正日月怕西沉便看日月在酉申亦須日月為度主日月西沉須是為度主方説女人值之似鶺鴒不惟懵懂身不足又且汨沒奔風塵女人值之却不害只怕丈夫不為人女人欺負丈夫善淫蕩全無畏懼心縱有舅姑不伏事不孝不義恣其淫此篇最是緊切語後學詳悉不誤人女人欺夫善懦恣行淫蕩知天門星家路徑直如筆爭奈世人俱不識天運東南冬之餘地傾西北夏之日最嫌水火會于箕猶怕日月會于畢水火更加計來臨蛇傷虎咬定可必日月若有土計侵顛狂心熱宿瘤疾萬一火孛入咸池上弦酉是下弦卯是更加火金來會之火孛入咸池女嫁夫分離此人定是自縊死投河落井更無疑女人值此惡星臨嫁夫十箇九箇離老少如何得乘馬十五以下六十以上行限入馬宫主跌撲傷莫教惡星在分野寅申巳亥四宫神釣起馬元是何星以四馬宫頭初度主為馬元寅申尾三火為馬元申宫畢八度月為馬元巳上張度月為馬元亥宫危十四度月為馬元木氣跌兮金孛賤火羅勞削自傷辰土計一生癱手足日月見之役一身婦人見之身薄賤一生産難好驚人的煞初星入命度子午邜酉正屬巳誰知張月是初星自軫初度巳張月酉胃土丑斗木或火為馬元或月為馬元有此星相臨如此斷之傷殘骨肉穢男婦不問男女及老少恩情半路相辜負不惟夫妻與父母雖與朋友亦難聚限行三方四正對照見之是則依上斷之十二宫星各有屬假如財帛兄弟之類亥上安命財宫木初度若見客星臨此人一生定不足萬一耗星在初度田宅啖盡如破竹若人了烈及聰明須是對宫見文曲十二宫中取初度為例忌尅星文曲聰明對宫見年干是也假論年干為文曲即本年間所屬如甲子木丙丁火之類臨於命對宫無尅制者方驗也此篇假假皆已效實藏於身莫教人除此篇篇有祕傳淳風無敢施其巧婦人吟此篇喚為初伏吟名為初伏值千金加合之中多意義可因此本暗搜尋婦人最重見崇勳正看干支與歲君命主崇勳却不是時上崇勳却堪言女人要時帶祿豈知時乃自家時時乃一生受用之若得崇勳來守此平生便是好根基女人安命對六合更要祿在二宫生假如甲生人坐命最喜祿在寅中盛婦人最喜祿在二宫遷移疾厄又要庚人祿居申此是八宫最可人八疾辰宫亦喜居遷移有祿又其次正是三宫係其身莫教二貴夾一祿一生流落在風塵更教二貴夾一馬一生辛苦減精神豈知好是日月夾更無刑囚直難雜生來白手自成家夫賢子貴相和合日月夾祿夫賢子貴婦人要祿不要馬帶馬之人多淫冶縱有回頭百媚生身姿輕薄與幽雅萬一咸池有宿臨朝朝暮暮貪歡耍咸池有宿主淫貴要單兮祿要單祿重尤較貴重難女人坐命如逢此定作簾前婢妾看若是馬元逢暗耗一生孤苦自飢寒時上若還俱帶馬死於道路沒衣棺生尅之中有制化命值刑囚誰不怕主在遷移見刑囚身到老來尤重嫁命主在遷移更見刑囚主老了又再嫁二八宫中難宿臨婦人見此便傷心假如子宫安命度巳亥須防金火臨二八宫惟忌星夾亥二宫巳八宫也亦忌十辰居難宿疾病淹淹多不足婦人最怕金火臨壓身破相不成人更值鰥寡與孤獨此宫論命人難測若論刑人人不識乃三刑非刑囚最怕三刑一例推此篇視之尤詳悉經云寅來刑己巳刑申最怕三刑見孛星女人坐命如值此平生茍合入風塵四句章詩為緊切百試百中不悮人男人值此亦尅妻况乎生來為女人更將年干上參看女人禍福在二宫命若吉兮遇貴壻命若低兮值夫窮君不聞勸人莫作婦人身一生苦樂由他人又不聞婦人三從古有義夫為妻綱亦有倫夫身居貴妻亦貴夫身若貧妻亦貧方知命脈係於夫命中豈能自有無世人但把命中看豈知命內有兩途更有一訣似神仙馬入的宫真驗然女人值之不堪説嫁夫枉自腹便便生兒不令腹中死子出定是腳先懸縱令有人來扶掖也教胎衣在身邉萬死千死定無疑説起今賢一一知婦人在世極生受恰是浪上駕船兒勸君從頭論到尾算星只此是便宜婦人只重身為貴貴逢吉曜必純粹身命二主吉星臨決定榮華兼子貴不要金水孛相逢同宫人命皆淫欲婦人以水為福星福星守命多衣祿却喜金星同木行金木臨之多富足身命怕見孛火土産難胎亡主凶禍羅孛行限極不宜惡宿遷移多殃否賤人限居六十二身命陷空為切忌主居切要居高位祿守祿宫為大貴日月升殿世所稀必有賢夫為正配三限四元俱得力斯人可有后妃榮諸星入廟高強福星無駁雜夀康寧女人碎金月孛入夫帶咸池先姦後娶水來汚水孛同行照身命為人不足心色粗遷移晝水淫堪言水日雖淫有所禦金日照身不可犯金水惺惺蕩有餘主人遷移皆不正計都不語却非愚見土持重真堪羡囚忌臨身破相軀貴在九宫為婢妾水來坐貴理家徒孛羅坐貴有權柄氣金見貴作尼姑氣孛花酒遭人笑偷盡風流美少夫火孛水星如相會夫壻生情意外思重婚再嫁多離别僥僥內亂作麻絲孛羅火日如相會若不傷夫有幾夫驛馬安身與立命性却惺惺賢不愚隔界安身與立命若不淫奔定尅夫福德更兼田宅內刑囚忌煞不堪居夫宫子位星高顯賢夫賢子曜門閭郎官朝命真富貴福德星高祿有餘若依此語參詳斷貧賤富貴總如斯婦人歌婦人偏是怕金水金水分明是賤人若是再行金水宿終能榮貴亦無倫祿要單兮貴要單祿重尤較貴重難不為奴婢貪淫輩便作簾前婢妾看婦人造化在身上千古朝昏看太陰若遇火羅相對照強豪過似丈夫身命主寅申巳亥宫少年嫁娶主重重一夫未能得到老須是三夫方保終婦人限行遇羅計妨夫害子一生孤婦人禍福在福德氣若居之終戰尅若是金水孛同居到老沉迷貪花色婦人最要看財宫非星入此便為凶若是此宫逢日月為人端正好儀容婦人亦要看遷移羅孛居之主别離若是限行逢紫氣尅夫害子定無疑婦人安命若坐馬東驢西鶩常奔走若有羅火在其中戀酒貪淫情太雜妻星論七宫之星在何宫身星妻位須入贅妻星入命最高門金星妻曜臨強位妻星奴位宜偏室不然奴僕壞人倫妻星入田并財帛招得妻家人益財妻星入子招好子陽宫多男陰多女妻星若在疾厄宫妻多疾厄還夀促妻星福德并官祿夫妻和諧家富足金氣同行在妻宫此妻必與僧道通金孛妻宫難得子妻星須見兩三重妻星若或在遷移外州外縣與成親金木妻宫多美貌金水同和百歲緣火入妻宫妻用雙土入妻宫無貌娘羅計妻宫多損失夫妻不和亦主疾妻星若在間極宫兄弟伯叔亦相通妻星若在桃花上淫聲四達醜家風男兒當把金為婦女子元來火是夫夫星得位夫無厄火星失位兩三重水星若在桃花上百嫁千夫無定向氣星若或在夫宫孤眠獨枕誰與共指南總推婦人貴賤與子平通問曰凡女人命孰為吉為良何為凶為賤答曰凡女人命須要五行清淡不要生旺又不要暴敗不犯臨官欲得四柱無氣為佳貴乎休囚死絶為上不要帶貴人驛馬旺祿合神已上為吉為良若犯生旺臨官兼有貴人驛馬旺祿合神皆為不美若犯生旺臨官三刑六害陽刃飛刃皆為不善神白縱有云驛馬遇貴人終竟落風塵合絶莫合貴此法人難知但以日為年此法聖人傳帶祿入生旺産死遭人謗帶祿入衰鄉雖禍未為殃司馬季主云女人推命貴人一者為良若叢雜合多不尼即妓又兼帶雙鴛合沈芝曰桃花又帶雙鴛合冗雜貴人真妓才桃花者臨官上見馬謂之桃花馬臨官上見劫煞謂之桃花煞又有一般煞巳酉丑騎馬街頭走此言巳酉丑生人見午是亥邜未鼠子須堪避此言亥邜未生人見子是寅午戌兔子門前立此言寅午戌生人見邜是申子辰逢雞夜不眠此言申子辰生人見酉是問曰又何以謂之雙鴛合答曰譬如一巳見兩申一乙見兩庚一丙見兩辛一丁見兩壬皆為雙鴛合也或是四柱千元有甲巳有乙庚但是四柱中兩兩對合皆謂之雙鴛合餘者皆倣此以為例女命有之皆為不良李愚叔云貴人或落空亡裏祿馬皆違如不值設令性識甚聰明男即伶倫女娼妓亦有生來貴族中淫聲浪迹與娼同須知斯命有所使桃花三月開春風源髓歌云滚滚桃花逐水飄月籠花影任偏饒多情只為傷空合惆悵寡合魂易消已上皆係桃花煞也犯之者皆為不良壺中子云負天月二德則霞帔金冠得祿命之財則夫榮子貴此可謂之吉也若見三刑六害亡神劫煞孤辰寡宿皆主喪夫尅子凡男女宫皆怕犯臨官帝旺全主夫妻相傷源髓歌云臨官帝旺未為好再嫁重婚傷亦早若還相敵作夫妻頭男頭女常見夭若犯陽刃煞及朝沖陽刃者皆主産厄源髓歌曰或時藏刃入於胎日刃或朝時上來更若干支相尅剝妻身當産妊憂災此言夫命犯之當主妻有産厄婦人之命若如此敢斷定憂生産死更加卯酉二時生若免墮胎應尅子朝充陽刃者譬如卯生之人見甲日與甲時之類或辰日而時干見乙此皆謂之朝充陽刃餘者倣此以為例一寸金二十七首人生日月要分明惡曜來侵禍不輕金水若還來扶助不教富貴也聰明度主元來最緊要人生難得當頭照若得升殿更當頭定是生來福祿厚刃星最怕惡星同行限逢之定見凶女命定因遭産厄男人亦是惡亡終祿主當頭坐命宫此人至老不貧窮若還登殿入垣局衣祿豐隆又不同官主朝陽定作貴福星隨月福難攀太陽落限人終賤身主遭刑處世難仇星不可例言囚若居垣局反自由正怕會刑來尅命平生成敗又多愁諸星會惡為交戰人命逢之禍不輕惟獨朝天居亥上反為伏化吉星名若有星辰在命多必看星辰果如何要知須是強星主若是間星莫羡他大凡照命星辰行便看其中弱與強若是力停相尅戰便是凶斷細推詳命看妻妾薄姻緣只因命裏見羅㬋獨居午上當離地反主齊眉到白頭惡宿原來拱刃星限行隨刃禍非輕倘還化吉仍為福若是凶星惡損身宫主離窠及失躔未宜便把作凶言若然來命歸垣數是謂餘星反主權各各宫中只一星對宫虛拱最為榮命中極喜相逢月得地當為間世英赦文臨限喜非常限主為囚亦不妨但忌赦文來受尅人逢此難定堪傷孛星若見守財時定主其人不妄為決是慳貪無厚施更於財上用心機南離一位號端門最喜陰陽兩伴存若無惡星居此位定教榮顯佐君尊日月同宫守四正富貴雙全無比並若還羅計又交臨必主終身多疾病安命若居兩隔界便把其宫度主看各宫隨局看星辰難把當生宫主斷人言財帛怕刑星不曉刑星福不輕反主分來多富貴財星不陷始豐榮官值刑囚須會得便且看宫分主客若還主客不齊強有祿有權為上客紫氣原來是德星若居福位福非輕亦須純粹無凶雜惡煞星來隨變更孛星若是坐命宫不可逢之便説凶必主為人多計較相交未可許其忠女命如逢水孛星為人多曉又多能若還命在桃花上必落煙花度此生女命因何不能間只因刑囚在命間更加福德宫逢會定主辛勤下賤看惡曜如逢犯太陰也應宿疾便來侵不然母道相刑尅更恐琴弦調失音妻宫若見月華明定主其妻貌相清不但夫家得其力定知財物亦豐盈一説月有盈虧妻宮見之反是妻宫若見惡星來定主其妻見禍災若是對降無尅戰也教琴瑟不和諧續步天經警句二十二首此後人倣耶律而作也富貴須將田宅尋間神不到福星臨此星不落空亡地富主高強直萬金日月若臨并拱夾奴星亦到禍尤深若居惡弱須加合萬頃千庒是此星富命以田宅為論間神不須臨之要母星到不落空亡日月夾拱當以富貴論若田宅主奴僕破之不宜矣若田宅守惡却得加盤入強宫必是大富人也欲識往來徹骨窮母星尅陷手拏空互垣衆煞尤相併身命還居惡弱宫更犯天涯地角處驅馳奔走任西東主照日月臨刑局日不聊生此世中貧命母星受尅更加衆煞相併身命更守惡弱辰戌之邦奔走衣食更日月臨刑局日不聊生也日月官星要得宜加臨拱夾是玄機若居惡弱須詳察反在高強衣錦衣身趕祿星并截馬掌權握柄福巍巍母星若更逢生旺富貴雙全世所稀貴命日月官祿星須要得地若居惡弱須加合推之反在高強身為高官而衣錦也若太陰趕祿攔馬必為朝相更命母居生旺富貴雙全財星不必官星至最怕財星落官位為官端的是貪汚喪職剝官以為例天馬若還居死絶遷轉艱難當困滯奴星若更在高強權在奴星少得志士夫功名當以天馬運行為凖若遷官轉職又以天馬加流年而數之生旺遷轉休囚死絶必罷職剝官言為官之人官星不宜居財帛財星不可居官位主為貪婪之人因財喪職若天馬居當生太歲納音死絶之地必然遷轉艱難若官星為奴所泄是為奴𨽻執權矣主星最怕奴星泄更怕餘奴居福德身宫若居惡弱宫附近貴人無所得太隂若躔四煞度處世多迍無所遇何期短夭夀命危煞尅身命須畏懼命主為奴星所泄更居福德加太歲命主皆居惡弱乃奴𨽻附近貴人求溫飽而已若太陰居四煞度平生遇貴不遇財更煞星近身命必不長年也局主官星居煞宫孤寒門户豈亨通太陰若更居三煞命犯亡神主困窮財星縱顯應無力田力須強亦不中日月命身居死絶空亡之地豈豐隆局主三限主也官星官祿主也局主官星坐劫煞宫乃孤寒之人太陰最怕守三煞命犯亡神必主窮困縱田財高強若日月守死絶空亡亦主生受太陰元主平生福晝夜須當細品量若是上弦為福重更逢既望熾而昌晝若逢羅夜逢計生平成敗尅爺娘縱是母星應不尅若為官職豈安康人命以太陰為主上弦至十五六夜生必為重福若逢羅計必生平成敗尅害父母縱羅計不虧命母為官亦不安靜先看命主次看度主度二星為體用主星若更坐高強度主受刑為禍重主若強時度更強更逢生旺福而昌縱然落在休囚死也是平生富足郎著命以宫度二主為體用若命在高強度主受刑為禍愈重若宫度兩強逢生旺為福祿重縱在休囚亦作富人也午忌羅㬋未忌計躔在鬼星作眇視若以八煞眼無光限入此宫最可畏兩宫坐命此星逢為人強狠多姦計尅妻害子性無常處事有權人義氣午未最忌羅計躔鬼星二宿若子丑二宫安命逢此二星守宫乃八煞之地必然眼目無光輕則眇視重則雙盲若此兩宫安命逢此必為強很尅妻害子為性不弱有義氣之人也午安命不以此論申巳二宫為肩背孛羅土計忌相逢肩斜背曲皆為爾兩耳須防病更聾若是太陰同到此為人夭折夀難終若躔觜翼尤為忌若在張畢不相同申巳為肩背若孛羅土計同到必肩斜背曲耳更常聾太陰亦到此宫夀非可永若日月躔觜翼為禍尤深若躔張畢又能略為小福耳馬元若為難星尅子丑寅亥最親切不惟病跛不能行二限相逢須一跌更加火孛來相侵歲君衝動腳須折若還逢計亦為凶足有風兮何待説凡馬元受尅更在子丑寅亥四宫必然跛足若二限相併更流年火孛交侵歲君衝動必然跛折腳足若此四宫逢計亦冇風足之災木人最怕計金扶平生咳嗽自焦枯若是秋生應更緊孛羅相會命難圖氣計更來必癆瘵肺腸氣軋內空虛行年若是氣金到定在秋前喪一軀木命忌氣金相尅更秋生會孛氣計必主癆瘵平生咳嗽肌肉消瘦流年氣金又來秋前必死矣為人蹇吃不能言火命尤防土計孛土若退行真可畏略無誠信向人前命在胃氐并栁女若逢土計亦如然若為夜忌居辰戌身在其中福亦偏火星忌土計相攻為人蹇吃語滯若胃氐栁女安命更土逆在辰戌太隂同到必是啞人為福亦淺吐紅翻胃是何星水命須防氣火臨身喪命亡從此得更加孛計定相刑太陰受此惡星制處世艱難貧又貧更值行年惡星犯其人必定入泉扃水命逢煞火相會主有吐紅翻胃之疾更孛計會太陰必主貧賤若行年惡星犯其人必死金命尤防羅火逢氣瘤之疾必傷人若在寅亥躔尾室痔疾相煎亦損神更忌癰疽并癤毒羅㬋相會禍須頻若在辰命限居未腦發摧殘禍有因金命逢火羅必有氣疾瘤癭若星在寅亥室尾亦患痔漏更流羅重會主有癰疽癤毒如辰命限未或合見木羅流年更到必為腦發因此命終矣腸風虛膽常驚畏土命怕逢孛與計更逢木氣兩相侵若是馬元手足墜太陰孛計若同宫女人值之誠不利一生産厄損兒男歸在辰宫生腋氣土命怕計孛主病腸風更木氣相會又是馬元損足太陰與計孛同宫女人值之産厄損胎在八煞主腋氣男女同斷倒限從來要煞推限行遇此實相猜須分晝夜還當忌煞不臨時禍不摧限路若危防節氣若逢凶曜禍須來節如帶煞須難度此是星家大妙哉倒限以煞為難亦分晝夜行年煞不臨則不然矣終輕若行年煞到更遇節氣如金命忌立夏是節帶煞必死男忌黃泉女急腳限危遇此端消爍要知此煞有動時火年動在寅午戌若逢此月禍相侵限在危時身必卒不作黃泉久逝魂也作人間無祿客急腳限是子午卯酉為黃泉寅申巳亥辰戌丑未為急腳此煞火年動在寅午戌月餘倣此羅食朔兮計食望日月相逢身浪蕩若居厄難眼無光若守命身人性莽不為朔望何須忌平生作事多姦計定主陰謀陷害人與人寡合無一是羅計分朔望忌之若日月相逢必是浪蕩之人在疾厄則眼目無光若此星犯命主為人譎而不正與人寡合孛星為性最猖狂男女逢之定不良若使羅㬋相會遇定於産厄必身亡姦計會之為賊首毒熒同到必凶強若人值此四餘曜禍有胎兮福不長孛星為性不定不問男女皆淫冶不良若會羅男必尅妻損子女必墮胎若會計為賊首若是有用星必因得疾福不長久與火相會為人凶強姦猾且説婦人淫不淫最嫌命位孛金臨墮胎血塊令人駭十度懷胎九不成若得木星相會遇轉為吉兆福來臨命宫再見熒羅會害子妨夫不可禁女人若金孛守命必然墮胎損子血塊常有若三合木臨可轉凶為吉若火羅同守或三合會害夫損子二三重天上星辰皆拱北斷星須要觀星客天機妙訣少人知十二宫中有生尅就中制化未易言心中經綸自推測合將宫度兩相參便是神仙竒妙訣星躔摘金集十六五行要訣有真機更有幽玄識者稀不遇明師親付與任君模倣盡皆非摘金語句臨行訣漏泄天機竒更竒立命星辰分母賊太陰一訣在詳推解曰五行要訣端有玄微不可模倣忖度非明師親付何從得之如十二宫命中要訣及卦氣已授受矣感君之厚察君之勤摘金一書臨行分付此竒中竒玄中玄看命之法命宫且緩身宫最急蓋命衆人之所同身一人之所獨所以推步月行最為親切子今得吾之傳當祕藏之月行中天多顯晦圓缺朔望不相同如人降生稟所賦富貴貧賤有窮通所以推月不執泥分配五星各相從生尅制化於身取若還反背實無功解曰月行中天自有明暗圓缺晦朔弦望不同如人處世有貧賤富貴亨迍之異此命宫緩而身宫急也平生禍福必以身驗看月不可以拘泥當從五星分配生尅制化取之命在子丑月是土命居寅亥配成木命火還從火星推命居辰酉從金取命在巳申以水論命居太陽從日程惟有未垣并金鬼宿身順背看陰陽土星嫌木最嫌氣木怕金星與火羅火宿從來嫌水孛金星熒惑莫相過巳申之水最怕土計孛兩曜不諧和午日木氣為掩禍太陰土計福消磨解曰此論仇賊也以月配五星惡見仇賊所謂安身傍鬼者也土垣見火為命母木垣水宿福無阻火垣木曜喜相逢金垣土宿真貴路水逢金德占巍魁太陽金水分明美月見金高並火羅十二宫中忌奴氣解曰此論命母也以月配五行喜見生我助我子丑命火羅夾月皆福五行在天成象緯分曜於地便成形假如水德降於地子旺辰墓長生申萬物成形有生滅消長陰陽從屈伸不須執泥五星象旺生墓即是星辰解曰五形在天成象在地成形金木水火土光芒炳炳於天本與天地相長久及其降形於地則生旺便有墓蓋五行在人間消長盈虛存乎四時安可不求五行之盛衰及至流行於地則生申旺子繼之墓辰蓋申子辰即水之所成於此取星辰三合義極為當吉凶有準如戌命火故忌水但月在申子辰之地繼以煞在限於此必死蓋即水也不必要明見水奪方指為凶無中有象莫重於此直曜母星鬼奪殿駕重垣之星皆以鬼母相參得用失用玄齋所謂局勢參詳判死生此乃察五星之地支者至切亥宫主木木長生至邜旺位轉敷榮未宫成庫全木局春來得勢便亨通惟有土命為鬼局太陰在上恐難行火宫取位為母位太隂同火見光明限行取舍判於此凶吉猶如谷裏聲解曰亥邜未木局最宜火命用為母鄉稍有星辰得用全吉但不宜土命如子丑命有木邜上險地也若生當春月有煞合太陰居之無陰注陽受陷禍必死已宫金氣初舒處酉位橫鋒逞刃芒丑則成形歸庫實三宫秋月最難當若是木星為命主申限一見便刑傷惟喜水人居正局太陰符合獲禎祥解曰巳酉丑金局也木命忌之若見土計身在其上便是黨惡更加神煞衝動生平福氣消磨限行即死但水命人用為毌局當殿駕祿貴月在其中有利益人馬之宫火始生才臨南午勢炎炎白羊入墓成局勢辰酉安命最為嫌若有木星當夏月太陰限路禍相兼土命若還得正局平生福祿實光亨解曰寅午戌火局辰酉二金所嫌生於夏月火烈金銷更有木氣間神入局同惡相濟身命相干必死惟土命為福地蓋母也經云五行既列諸辰次相參推究定枮榮二十八宿本脈絡其名雖異實同途假如火命火為局尾觜翼室即一隅不待星見方是限但觀氣數辨盈虛五星即五行五行即地支之寄地支即二十八宿之閫奧二十八宿即辰舍之脈絡初不待正見星辰方為凶吉蓋五行之氣寄於二十八宿之度中便當推度主之火得時得位在他宫何若在地垣借氣守重垣則入四火度中便為吉凶如金忌之土樂之之類一得一失殃咎立至諸垣以例推看星須看得時星看煞須看局重輕星若得時主事立局若重時禍轉深煞星切忌時之旺更兼當直禍流行煞星若也俱休廢貰死須知福不增解曰推五星於緊處便當明得時失時所用之星要得時所忌之星要失時局勢最嫌專城禍煞最要失時若得時守局一死無疑煞星若尅此命安身於凶神之地命中何所仰賴此玄中玄也談命最急為局勢其次最切是間神間神返背實為禍夾煞侵垣凶即生若也諸星當夜煞十人九死決難生若得調達煞神意便是神仙陸地行解曰煞者亡神劫的凶神也神者局勢也煞神衝合地局一假間神亂占我家有禍生焉又有間神侵凌為之勢安得生意夜生暗占煞行限十人九死大抵限路最切消詳局勢生我者吉尅我者凶間神入局者凶貴祿同宫煞又臨居垣得地禍辰侵吉凶同位如何判於此分明説摘金出入度中還煞管正垣分爾善星明貴祿歲垣依舊制不妨發福事從心解曰貴祿在此宫又有間神同守還如何分訣以入垣出垣為煞主之見凶兆合倒限及至中間正垣乃吉神之位蓋天星吉神正臨垣度若君子席不正不坐地煞專守偏處候人於危厄之際大抵一宫必分中初末有隂注陽受解之雖不死亦無吉利至於出垣交承之際禍竟再合煞星居煞有其煞陽刃亡神三煞同更有一般為的位最嫌重疊定招凶獨見煞垣難煞尾兩煞當詳隔界中惟有三神至三位亭亭禍患在其中此法當審煞度也如一宫見煞限到其上則出限三四度定凶詳湧頭接腳之法以定出入前後宫兩有有煞則於兩宫之界出此宫入彼垣必然凶發若是三煞倒限行煞正中間不好大抵專看神煞重疊若一垣有煞天盤地局兩三處又見則莫大之禍若是三煞更天盤煞神合處人應死不問命母互加三煞之中皆倒限至切靈驗與何星三合更加間神到斯人斷定入泉扄最是直星居煞地大限才交身必傾此是摘金真口訣方知神煞最為靈神煞交合處前所説限入必死不問母曜皆可倒限若見間神入局直難星入煞限行十有九死大抵地煞若合縱有善星亦救不得但流年有凶來即死矣所謂母曜倒限此也從來日月是尊星限見無非福祿榮夾拱吉慶為吉局惹凶引禍害須生三合若也包煞局間神一入更難行縱有根基為穩實也應著腳向冥程日月為天之曜限見當發其説自是若夾拱凶星直難間神三合拱住煞局則不可知矣限入必死官祿從來號健宫中年限路便相逢陰陽合朔來相照若遇關闌禍竟攻陰凌陽替天盤午限路交承實是凶十二宫中皆忌見解神欲救亦無從命前巳宫是官祿乃天盤南離之地至貴之曜當權之時豈陰陽同處十二宫中坐命入限見日月合朔官宫若遇關闌皆倒無關闌者富貴關闌必羅計也觀星形勢最為先禍福無差玄又玄限路榮枯生死訣却為局勢有真詮星位乎天辰次地星辰勢路要參研摘取幽玄金樣比擇人而付有心傳富貴貧賤必以星而取觀星之法形勢為先限路榮枯生死真機只於煞局而取所謂形勢煞局乃觀星推測要領摘出幽微真金可比擇人傳心斯得之矣星辰雜斷歌五星衆宿逐官移日月得地要明知忽然落陷兼遲疾沒處有星仔細推日在子兮月在午移乾就濕夭而貧日若纒危方可慮月躔星宿始為凶若還日虛月張位何愁南北與西東火行戍亥便為災水土龍蛇忌有哀金遇邜寅須有否木行申酉最相乖太隂生來在陷宫僥幸吏輩又英雄府縣廳前聽呼喚上弦月皎福昌隆四月生人帶邜時斯人不夀報君知若教父沒身隨沒三十年來父不隨四月生人月照亥少年遇此便為災若值空亡禍減半若臨煞地禍重來照亥則在巳也巳為陽極假如申上安命宫最嫌土計便為凶若還土計居衛分縱有災殃命不終月作妻宫宜作贅不然妻主立其雙如何妻年不相同月孛元來在妻宫男女宫中多竅妙日生最怕太陰照夜誕亦忌太陽臨縱然有子無兒呌第四火星嫌在晝但看命中何所守少年孤苦老無兒百歲何曽開得口第五宫中須哭兒第七宫中須喪偶忽然火星臨十一福祿虧兮仍損夀女人安命坐四馬嫁夫生子定重重男人命坐四馬位超越世類更英雄男人行限見太隂娶妻招妾每年尋忽然金孛一齊入咏月嘲風使萬金魁星若産在高強更遇官星名必揚孛羅為權計為印定他壯歲拜三公十月酉時月在邜若躔房宿始為竒若還晝誕行已限夫妻不死也分離亥限見妻宫晝月故也陽刃最嫌自刃宫戊午丙午最為凶壬子癸丑相逢著決定危亡不善終享通顯達逢生旺遁悶迍危遇併衝此是交相生死訣吉凶消息在其中壬子之人生十月空胎無祿兩般凶假饒時日逢亡劫也須危亡不善終空亡空盡始為竒空則能容塞則迷萬物皆從空裏出能令冨貴享耆頤惟有金空空則鳴火空則發土空陷木空則折君須記水空河海能枯渴隂見陽空無足取陽見陰空真可懼雖然空裏分陰陽也須識得天機趣論命之人見論時時真命定更無疑天時隂晦夜長短仔細推詳講是非人生從何論吉凶又嫌運限祿馬衝祿逢衝破馬逢絶富貴之人亦語凶凡人命限無生旺吉曜臨兮吉不動生又不生旺不旺一切妻兒無可望最嫌運限祿馬衝破盡錢財費盡功初限若還逢太歲若無凶曜亦無凶人生體用要高強生旺臨官吉宿長生處自生旺自旺一切營求皆吉昌時人身命絶中生死命衰中衰不榮絶處逢生君細認背中反旺是高人雜歌四段歌加盤母曜觀星把甚為根源當以宫主為關鍵三命天盤在眼前當頭對照天淵逺諸宫皆以邜宫加又以天盤再轉寅邜酉二宫却加子此宫又以數宫主強弱尤須看命主命母尤為利害關母若逢生能獲福若逢尅母禍之端賊星若見犯吾母一世貧窮百事難假如安命在辰酉便看太陰何所守若居邜戌必傷身最喜躔在於子丑縱有火羅子丑中火羅又能生二宿凶星反作吉星行十二宫中細推究歌凶躔次度安命若坐陰陽界更在穿心并六害若男定是正男兒焉知父母重重拜女命安命在此宫嫁送不妨三兩再亡神劫煞互相加若不犯刑亦破敗生尅星辰固易言隨宫制化最難明金若逢火被孛制木來尅土更逢熒吉多凶少為吉斷凶多吉少作凶行吉凶禍福明如鏡當以分毫别重輕歌定時生時訛説不分明虛費心機枉役情好語生時自差錯莫言算法不分明測驗生時正與敧却從何理得明知但將父母兼兄弟妻子宫中察細微先安命位落何中妻妾兒孫在甚宫父母兄弟何所在隨星推屬識窮通又歌同年同月日時同福祿如何兩不通或有妻房并子息或無兒女守空宫一人富貴無長夀二命之中難測度諭君靜處細思量生時同處命難齊聽我分明為指迷必是婚中不同命只因孤尅尅妻兒又推風水兼陰德又怕夫妻命運低好把人生三代論何愁南北與東西星學大成卷二十七
