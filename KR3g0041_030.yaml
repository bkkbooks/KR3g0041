金星照命中木金水紫照身宫官宫水宿相關月閭里稱傳豐富翁二交金木水火土孛月二交水宿向寅申孛星犯月吉星辰木金火土來臨命遇此榮華主貴人二交木水火土氣孛月火土水紫四星竒二交木孛更臨之命身相會斯強曜賜紫分明又著緋祿宫水火二交躔土氣木曜又相關更居生旺無刑尅聰俊英豪發少年二交金木火土氣孛月二交金土氣相關木土孛星前後安錢穀豐盈無刻剝榮華富貴俗難攀二交金水火土氣孛月土孛相逢計月羅火金強位入官居一生水紫同關命引從聲名到帝都火孛金星對與月二交水紫照南宫土星引從台元好享祿他時及萬鍾二交金木水火土氣孛月命宫金土羅兼孛火計紫星高對月歲星水宿守南方駙尉武僚居右列剛明火土羅并計木犯蟾光加孛氣金水計都入命中狀元及第非常貴二交紫氣向寅申火土木曜吉星辰此位更加金水孛照人身命貴無倫火星剛健紫星柔南北之宫土計㬋土水木金關月孛自然富貴兩優遊太陽定命宫太陽本是太陰主不為福慶不為禍限宫身命任相逢男女居之招四五詩曰一日行一度名曰太陽星推時分節氣一歲一周經入命生時定都從此位成順行逢卯止逆數定枯榮論身宫月到之宫格局成太陰坐處吉凶生會宫只為無星照推命之人切辨明大元經星甘石紀之元矞定之陳卓論之皆命宫為首身宫次之天機例論以命宫為緩身宫為急命宫者以太陽所在之宫加所生之時順數至卯即就卯上所得之宫為命似於人無所係月者衆人之身太陰所在即為身宫實為要害故言月到之宫格局成太陰坐處吉凶生然人之吉凶禍福率皆在於身宫則凡推命宜先定於身躔身躔即太陰太陰既定則禍福無不應者欲知月躔所在即以太陰星正身宫悉以十二月起常例點之至於當閏之月或前後差互不定即以日直關節氣及望推之起太陽法背閏初過度正月朔起室二月奎三月胃四月觜五月鬼六月星七月翼八月亢九月房十月尾十一月斗十二月虛歌云正室二奎胃暮春四觜五鬼六星鄰七翼八亢九房宿尾斗同虛冬月循向閏取中半法正月朔起危二月壁三婁四畢五井六栁七張八角九亢十心十一斗十二女歌云正取危壁季春婁畢井朱明栁上遊次到三秋張角亢心斗須女暮冬求當閏第三遲訣正月朔起虛二月危三奎四胃五參六鬼七星八翼九軫十房十一箕十二斗歌云春月正虛危又奎胃參從鬼九夏移秋星翼軫相連帶房箕三合斗柄移閏月多是十五日或前後一日是初氣為一月節候即為初氣起日宿依常例點以望日與太陽相對晦朔與太陽同宫其太陰如此約之萬不失一論身命所在宫身在獅子容貌端正身在人馬寅能幹男女命在四角大貴身在辰強戌亥無星方看身與命或在戌上主人性機狡并肚腸毒害此不以星辰論強弱四方有強星身低詩曰火土加孛有星高柔星犯月身低詩曰富貴不用看星辰強星犯月身低詩曰暗星蝕月天涯也火土犯月身低詩曰星曜分張小二宫又曰火土太陰同與對詩並見前論身在陷宫為禍奴婢第一陷相貌第二陷兄弟第三陷遊行第四陷論身在高強為福命宫第一正緊官祿第二正緊田宅第三正緊妻妾第四正緊論身在強半福德第一官祿合元髙財帛第二命宫合元髙男女第三田宅合元髙身在沉宫諸曜雖強居暗處身宫沉者是虛儒縱饒學問過顔孟終沒功名祿已殊身在死敗宫死敗二宫身與命二交強曜入南曹聲名雖則傳州里縱得為官也不超身宫值陷身宫值陷居間地又以其人強曜推強忽有星居大限中年亦可及緋衣二明強曜午宫當更臨身陷落何方吉星若也居間地門蔭之官子細詳身陷無星四正強縱然不貴足錢糧強星若不加身命財物雖豐壽不長宫有所主十二宫中見所主卯為夫兮酉為婦夫婦左右前後宫不出二交榮孛土申辰前後為僕從寅戌左右屬財庫震離坎兊宫辰别善惡之星從性説巳亥丑未男女宫鰥寡輩流因獨月論四空本宫對視并三合四位都緣不見星強曜更加沉溺所陷才出沒便沉冥論四正四正無星身在強難名衣食足錢糧安知四正無強曜爵秩如何至正郎東西兩位無星照南北宫中聚首星錯雜陰邪無剋剝狀元及第擁旗旌何知人命有英聲四正無強有一星三四坐髙名位好其人必定有虛名論五刑水星刑火火刑金金曜無令陷木星水是天元憂土到木為祿主怕金刑土人憂木來相尅此徒誰與免刑名天元忌星惡曜甲計乙羅丙忌火丁孛戊木却為禍已忌金星庚土星辛陰壬水癸氣過化囚也論星散每一宫中坐一星此名為散限頭乾仍存四正加臨著財利驅牽過一生每一宫坐一星無同宫者為散凡星禍福不甚緊切無成多敗區區用心勞煩過生爾仍取強星加四正見月方可斷其人僅足不爾更寒賤也但每一星人命罕有值此者有一二星同宫而散者多亦可以此斷之如景德丁丑年正月初七日生諸星各占一宫惟有火月一處是也論星聚星辰聚作一宫安相生相尅性不純正坐四方言食祿天涯地角必艱辛五七星辰同一位互相辭避難專事相生即是富豪家相尅還憂貧困悴諸星一宫聚以五緯取次必有相生相尅書云相生則富貴相尅則貧困憂悴此以序推之也如木在先火次之土又次之是為相生木為先金次之火又次之是為相尅若相生坐見月即是富貴之人卿相之命若相尅更在天涯地角必是艱辛亦不至貧如景德丁未六月十八日生人木金火土聚於獅子宫是也然則星散者五星六曜皆散星聚者止言五星不言六曜相生相尅歌五緯相生與相尅舉此二端為凖則火土水土併水金此外餘殘鬬相賊如此相生與相惡交互變成一十數第一火土豐厚人第二水土豐家户第三金水多才藝第四火木空倉庫第五水火破薄家第六土木無男女第七木金孛計虛第八水木孤寒聚一云水火相刑禦第九金火主驕淫一云金水土相刑第十土金頻官府止言同宫并對照更值太陰福禍愈二交參錯生異端強弱宫辰量力取論星辰換宫見月曽説換宫星照曜素聞火土主豐盈但看金水人才藝不久京華振大名十二宫皆有五星所主火土換宫正坐見月富貴之命金水換宫見月巧妙技能之士木水換宫見月清間文藝之輩水火換宫見月薄技飄蓬之人論火土金木月相參貴賤火土要高金木參生來富貴世間談若交火土與金木貧賤催殘實不堪星主看尊卑有金木參火土火土參金木識其尊卑方可論此處髙為尊處低為卑居先為尊居後為卑火土居尊金木居卑則謂之金木參火土反此謂之火土參金木亦以見月為凖日月朝天天門星斗互相迎日在奎婁月次經身命忽臨乾位上日朝月拱至公卿身命朝天身居寶瓶奎作命中虛一位為天門生時或逢寅子位官顯三公近至尊朝天月到天心象帝王或躔室璧或奎房身命各號前後位定為將相近清光主星入廟旺主星入廟在生鄉科甲官星會一方更得主星三用滿少年作相入朝堂背陽身命宫星前一位太陽君象後先朝一生休作調羮手才近清光壽不長月在強宫強星四正各居高月在強宫又不朝一暗明星如從月為官災患壽難逃強曜犯月強曜須教犯月光若逢月陷自乖張有官減尅多間曠庶俗財虛不積倉強星從月強曜強星有數般吉如不吉細推看強星從月無柔弱八座三台是貴官強星近月強星若乃兼臨月又要申宫子午高更有權星居十位亦驚天地振英豪月居惡弱月犯空間居惡弱定知父母早拋來強星日月居間地異母須知四五胎月會柔星三明一暗居男女月共柔星剝戍辰子息強宫交在照到頭一子總為親立命三強與二明太陰交會照柔星高文只是推鄉薦桂籍之中不與名月落柔星分度間柔星高處善星間三方不照強星陷下賤之人處一班蝕神犯月南北宫中星不強蝕神犯月戍辰方胎方若要加金計疾病相纒主少亡柔星犯月若犯柔星兼祿主常流百姓一生難更逢忌曜兼刑煞只是軍戎受歲寒富而不貴看星位蓋有柔星犯太陰若還四方逢火土滿堂盈富足資金金木參火土不犯計孛水氣必主富貴須要二交孛火土當位也若金木低即成六悲不富柔星照月強曜煌煌照八方柔星照月少年亡二交從月居低弱終身困苦走他鄉水星捧月月到天門四海明水居雙女一天清月白水清天得地一星捧月誓橫行六壬水木官柔顯金命之人富有成金星捧月月生滄海耀金牛太白相逢入趙州科甲官星如廟旺定知年少作公卿木孛捧月孛星掌祿木同宫捧月那堪向命宫火水計羅官祿位少年鼎食至三公忽若相逢天蝎上太陽不照恐無終夾帶身居雙女位吉星巨蟹作命宫獅子位中多貴祿此名夾貴富重重六辛命入逢土木丁人合木火皆同忽然一宿居其上拖紫腰金官顯榮水土入命強星引從坐元胎水土二星入命來富貴榮華多財帛家豪金物積成堆水土朝北身命二宫逢坎方定應水土向南方祿貴相逢朝北位少年濶步上朝堂熒惑靣南北方熒惑木為殃却喜生時背太陽更加命臨獅子位定知年少祿軒昻金木逢龍金木相逢會亢龍前扶後引貴相逢雷電更加居帝位佇看平步至三公宫星拱雷門宫星二位安身命中拱雷門坐貴人科甲更高時不背少年平步上青雲照廟逢貴五星最忌臨磨蝎惟有當生月喜遊命在丑兮身在未此位照廟作公侯祿貴夾帶身命二宫星不照寶瓶磨蝎互相尋祿馬貴人前後擁腰懸金帶蓋垂金引從命前一位吉星臨命後須逢祿位尋更若主星俱得地此宫引從福祿臻貴人執劍甲入身命火來侵見土須當武職臣官貴更臨兼廟旺少年金榜御書新土若不臨兼伏逆日生又值賊星刑空亡劍煞如相遇帶疾刑徒一世貧馬頭帶劍羅計高強入命宫金臨天馬照其中刑煞更加官祿位少年名顯振蠻戎貧而樂道富貴榮華若有心東西南北重相尋明星因有參羅計金木水氣只是文章不富人論婦人陰人多陷紫金鄉定是淫邪色欲娘胎元若無善星助風塵歌舞近侯王婦人火曜本為夫西沒宫中金紫居胎元惡宿多淫欲更同火曜喜相扶二明居暗細推詳身居金紫水同鄉不問強星居四正此人禍患也非常論孤貧限星柔弱惡宫當更尋身陷落何方受福之人多夭折孤貧庶得可潛藏福德相貌好星辰少年此限富榮身官祿宫無星限照須教辭富也居貧形色水旺之人秀耳輪金人靣白皓然頭木星位旺雙眸俊火曜之人厚白唇隆凖土肥中嶽聳額高方廣紫星真陰陽命見人端麗羅計孛生出俗倫二交主貧富二交身見在寅申四正無星却發財如四正逢水紫主破蕩子午尤緊不問二交在身紫氣逢之則為十六事身命見之尤緊不問三合水加紫主疾金加紫主刑十六事僧道疾病孤害刑厄雙生過房貧乏破家愚魯異胎信向異母外學鰥寡絶嗣不善終論大小限大小二限最清竒學者雖多得者稀六曜隨宫分禍福五星次第定安危二明三暗多為福太歲其人有旨歸不是其人莫傳受等間容易泄天機論限有輕重限有輕重從頭説重言遂事輕屯蹇重時強曜衆通知輕與柔星獨關見假令卯是隂位從後起陽位從前起一歲二歲在卯三四對照五起亥六起未辰在陽三在辰三四對照五起申次在子宫辰十二一周天禍福依憑信是先卯戌子宫言十四卯六乙八戌五乾九癸五子九亥辰十載次推遷亥四壬六辰五巽五己宫十一無加減己六丙五申午加寅十五年申七寅八午九丁六丑未八年十二酉丑四艮四未二坤六酉六辛六寅方十六看終躔天地人三方人居於中晝夜運行日自東出西入故東西為之三主寅卯辰為初主己午未為中主申酉戌為末主餘皆為身後之宫天機大約與今之洞微玄象璧玉三限雖少異而大意無殊但以見生星辰所主謂之元頭星性氣斷之災福可見大約亦從卯上起其數一依上篇取定之論元頭限大限元頭要近身却看辰己午星辰卓然火土相臨照磊落文章冠縉紳太陰為限弱同宫或然相望也為凶本命若還無根柢此限交之命必終論金木限木星為限金相望刑水之星見月光疾厄若無強曜助其人要死在長江金限相逢計與羅自然財散自消磨或然柔曜來相湊憔悴危亡怎奈何金星為限主傷財僧道之人尚有災倘若木柔為小限自然疾困破家財金木身命催限照可怕災星四象臨若不目盲終是夭疾困孤寒不稱心行年如是金當限限有元初金木見損財傷病又遭官要好且須熒孛見何期短夭壽年厄限內逢金入木時不要行年逢木限限時身世且拋離金星為限木星來此限交之必有災更有木陰相對望器小無成惹禍媒金若為限會於木此限木交須命促貴者停官富者災小人逢此遭刑獄論火金限火星為限來相逐二交坐命半為福或居大限及身宫淫色傷財主壽促金星為限火星侵斷定其人至死淫更被木星來會此定傷骨肉復傷心星學大成卷三十
