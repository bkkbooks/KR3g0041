body:
  text: 星學大成卷三十明萬民英撰天機淵微總論先賢陳氏論星辰猶勝巫咸與石申命若契符如影響莫將機密亂傳人苗公郎子修行去雲夢之中遇一賢悟了五星真祕術布出聲名天下傳大梁甘石得遺文曾究乾坤驗十分造化天機從此泄災祥得與後人聞二交火土孛皆同只在東西南北逢議命須論強與弱精微全在五星中星曜照人看得力命宫少緩身宫急無星合照會空關生死窮通便消息定光矞論星文自有淵微訣今古諸經皆未説金木雖云本善星亦有却作災時節土火雖云是惡星此星致福非常别五星六曜自消詳豈可膠柱而定轍任他留順并伏逆不顧樂旺并員缺也無晝火夜忌土亦無五弱七強説福德相貌并三日方主限元更迂濶但能把此數端求休咎何憂不精切天機常例星無順留伏逆亦無好樂廟旺日無盈縮月無圓缺無晝火夜土忌無三方主向背之説不用相貌生後三日宫只以五星正生為髙天涯地角為卑奴僕為天涯相貌為地角見月為緊不見月為緩二明三暗為強三明一暗為弱若依歌斷之則禍福無不應矣星性善惡二明三暗則光芒四正相交坐八方作福作威從此得都緣星性屬剛強二明火土三暗孛羅計三明一暗屬陰柔不説髙低共逆留將謂與人為福慶元來從此作寃仇三明金水木一暗氣天一生水地二生火天三生木地四生金天五生土陽為竒陰為偶陽為剛陰為柔土水木為陽星金火為陰星此其常性也然水屬北方太陰幽冥之氣順時趨流而就下木屬東方少陽仁厚之氣其陰可庇其水可食雖是陽星其性柔為陽中之陰故金水木紫氣皆係柔星所謂三明一暗者是也火者南方陽明之氣其性炎上不容於物金屬西方乾健義勇之氣雖是陰星其性剛為陰中之陽故火土羅計孛皆係剛星所謂二明三暗者是也交初為羅㬋交中為計都所謂二交者是也剛強二交月孛是權星不須觀象又觀形得限逢之為吉曜自然富貴得安寧火土吉曜惡星辰剛健輝光見日新身命見之皆吉慶布衣換作錦衣人柔弱金木雖是善柔星限數相逢都不寧四正居之為大禍直教謹守保生平紫氣惡曜九流星僧道孤惸及藝精此限才逢喪厥福妨財妨利又妨名論剛柔苗公星度真竒絶強弱諸宫皆不説只言金水是休祥火土謂之禍凶孽苗公本意祕深妙造化真機安漏泄何須仰觀星辰象不必髙低比優劣根深步取太陰宫合對同宮磨觀切火土強星髙照月其間富貴并員缺四方強曜富華人五弱居強就卑列論輕耀二交首尾必賢豪日月相逢當虧缺朝身逢忌職司權見月宫位失臣節天吏躔月求火土金木來參犯刑法曾因水火漫漂流不是損傷須廢折明星金火但煌煌與月相逢發禍殃亦有小兒曾異母無辜風疾及痍瘡異母妨親孤害子亦悲金木作仇讎行年子午招貧困僧道為人及九流日月男女宫中星曜照多憑星性窮多少於中若見至陽精四五二男為繼紹獨月五星六曜無常主己亥逢空無一處斯人必主古人言生得五男並二女第三宫中名間極月到諸經稱得力本言月到反吟宫月到其宫云置福木月對偶身宫何用木當時婚娶妻居服加之木紫又交加中道暌離又反目星有太陰同對木生來未便豐財榖東西二位無強曜南北宫中計孛羅若是身中關木月功名終是見奔波火月火星關陷到身宫為人情性不和同台元金紫相關照姦猾多謀愛逞功土月土星天吏聚身間值陷須知性小寬或作台元多懶慢木星如會有機關玩日廢時妨進習傷財破産謾經營常行土後二宫半安得京川兩字名金月娶妻年紀信髙低除是長庚坐正西土孛不關迎少女枯楊今已見生梯水月水月流精臨後嗣到了千端求一子衆星不犯女雙雙嵗星性氣還同此三元宫有申子辰水德騰輝上應辰成象在天如犯月少年非命喪其身本月宫中説性靈誕情虛詭老姦情萬般機巧便宜事羸得鄉閭有溢名氣月逸星紫氣加身命鰥寡之徒孤獨逈月逢母氏再從夫即目憂身招疾病老人星出丙丁隅一似斯人土木居不及龜年并鶴髮也須終盡百年餘篤疾纒綿何以知命宫強曜細尋推太陰紫氣加辰戌腰曲低頭四大推孛月天吏文星説最佳限頭逢處接榮華兒宫遇著生男貴妻上相逢得麗華孛星主祿性雄豪要得相參火土髙為報士人休嘆晚到頭名姓列仙曹羅月身宫若也坐羅㬋四正強星不會柔燮理陰陽居輔弼三明來陷號仇讎計月計都守命主宫身更看南北位星辰果然強曜加臨照兩府樞機作近臣木土月此名天上三災星今嵗相逢又不成財散遭官喪與病其間亦有損年齡明星木土照光芒不問髙低與合方男女居之無刑剋官居如遇有災殃木金月金性剛兮木性柔一如氷炭不相投生時若值同宫分富貴來兮身已悲出木入金為六悲月之前後較毫釐果然對照并三合蹤迹蕭然人不知金木從來號六悲為妨父母及妻兒正言碩望當途者不是黃衣即褐衣五常金木為仁義仁義之中不主財今日木金相對照聲名淹抑四旬來木火月明星木曜火同宫財帛強宫倉庫虛若見命身臨二宿令人冷淡處閻閭木水月水木四正纒坎經不然獨木發洪名里閭贏得先生號富貴除非别有星南北東西如水木光芒射月年華促肌膚消瘦藥無靈忍死親親情不足木氣月木星紫氣來相併惟愛林泉門閥伶若關後嗣或雙女到了他人作親迎木星紫氣前後宫參謁門庭是此公誰識螟蛉為後嗣不然異姓紹家風紫氣與木是孤星九流之士道及僧不然疾厄如孤宫行限逢之禍患併木孛月木孛天然性符契當信居官食天祿其間四正有強星耆父年齡冠羣族身居木孛好顔容土曜加臨性且忠若作胎元無别照為人正直甚難容火金月金火二曜忌留方他方取得外孫娘身命忽然逢暗曜聲名錢榖滿傳揚火土月火土太陰同與對人心所欲合天機四方正坐官榮顯地角天涯力稍虧火土居髙兼見月木金水氣不相干此人前定知陰注力助官崇固不難太嵗干頭有六辛切看辰午有星辰卓然火土同臨照磊磊文章列縉紳火土強宫守命身更看南北位星辰若還柔輕交關照即是恩科受蔭人剛強火土來關月職重權髙鎮大藩雖處名藩難久任其人剛烈性難安火水月水火多敗亦多成直言不耐少安寧方寸曉然招外學難教似訥遇平生火氣月火紫為限多招疾血光暗昧縈風卒金木水臨不善終此限相逢失骸骨火孛月二交火孛扶太陰遇此之人福最深若見胎元強曜助榮華富貴足資金土金月富而不貴似何推金木從他見月離廟旺四方星得地石崇繼踵更為誰土水月水土四方躔坎經不然獨木發聲名里閭贏得先生號富貴除非别有星土交有水月行蹤土水逢交事亦同懦怯只因辭寡訥不如仁者不遭逢土氣月兩重親位災祥别紫氣柔星加土月髙宫定是富貴人若是本宫寒賤説土紫相逢愛好宫四正之宫喜曜逢太陰髙位忝羅計中年一帶至三公土孛月一如土孛到天心須假分明見太陰不顧順留并廟旺驀然壯嵗足珠金月下宜參土孛星先生富貴及簮纓仍詳好命方言説己亥兒孫繼後榮土計月土計身宫與月參富貴百姓足鮮甘二交正位臨財帛優裕榮華足可談金氣月天上明明紫氣星主人災害與孤惸曾關金月多招病為犯行年致不平金孛月孛星好酒金聲色犯月當途無以加莫道一生無快樂耳中音律眼中花金孛犯月任髙低父母年齡恐不髙老父定知年少母須知因色致昏迷水孛月水孛柔邪照命時太陰合照更居低與人結識無終始好事讒言説是非孛羅月孛星不要犯羅㬋切忌當年限到頭夫恐娶妻三度死女妨生産兩回憂孛計月二交月孛性皆同立性元來愛逞縱計都不可衆人識更無材藝膽粗雄羅計月二交貴要坐寅申不是加臨坐戍辰財自外來天付與取之以義不由人暗星蝕月天涯地破蕩田園人受濟四方七政月華新弱冠榮華取髙第火土日月火日同居疾厄鄉不論土月一般詳若逢火土臨身命其人五福偹非常陰陽二曜全無救終日困苦走他鄉有福聾盲兼跛躃手足拳攣免别傷木金日月日月如逢金木星加之四正號重明自家三代無親繼必是當年外室生木金火月同宫一處見金木火不救之失財榖若還金宿守低宫權握兵符多侍僕木金土月曾見金星己亥居土木性氣又何如後人不肖螟蛉輩至老千端守一株木金或爾迭來居己亥相參性一如勤儉家風雖繼紹千端一子若驪珠木金氣月清間樂道若何推紫木星官命裏隨金木加之雲外客慈悲僧道合天機月犯金星與紫星木星髙處福須傾更加柔宿同身命不是他刑便是刑月之前後交并氣金木柔散人不意懸龎負贅及雙胎更恐月低有親二木土氣月五星中有土木對對月四方天地配若關紫氣嗣孤單犯月養成殊性輩木火氣月水月火月木紫星先須審問過房親若無損尅承宗祖便是親生不濟人身命之宫紫木隨更兼九五水星歸縱教限好妻兒輩可定其人著色衣火土氣月土火相交犯紫氣身命合照空無移局中若也逢強曜朱紫何慙不帶歸土氣孛月紫氣掌祿命宫看強曜強星四正安只看太陽梟土孛照臨方定作髙官土木孛月不但太陰關火孛官榮多早起超升木星得地如強要他日須防害股肱火土孛月火土在身或旁照性直為人語又良孛星更若臨身命此人立性定髙強孛星犯月得宫強火土煌煌合照方燦爛文章如錦繡髙攀仙桂紫微郎火土羅月火星從月照南方諸曜俱無守四強雖有土羅三合照功名才得即身亡火金羅月偏枯金火犯蟾輪浩蕩輕飄性不純得附二交居四正反災為慶及於身恩生妻族或妻財金月為婚月是媒不是二交來相救防身淫病發迍災金孛羅月孛金不要犯羅㬋切忌當年限到頭男恐喪妻三度厄女防中産血身憂二交火月二交正位主威權大有金資富有田取坎一星關火月盛名列世涉朝賢欲識家豪積富財火星關月月為台二交入庫盈財帛富盛豐隆財自來二交木月官祿相刑身會柔髙低照月主徒流二交木宿非公吏貧賤寒生幾度秋二交與木得官髙出入公庭可吏曹今日木前家道盛他年辛苦不辭勞即用二交兼用木當年聚育作災星乍寒乍熱病軀作半喜半憂官事成木與二交𠫭衆曜行年如見有寃尤立身不在公門裏怎得逃生過失憂二交金月二交金月命宫居羅計又在丙丁隅更得三方星宿順清華閣學與尚書二交孛月計都星陷與羅㬋孛更居髙主死流官祿災宫無救助也須死在石幢頭木金水火月四強正在木兼金家業資財破産深更忌三方加水火定知惡疾遞相臨木金火土月富而不貴看星位蓋有柔星犯太陰更若四方逢火土滿堂榮富足資金火土木金髙見月宏才博學猶貧缺木金火土月且低員缺區區寒賤説木金火氣月月宫金木須逢火紫氣太陰來輕坐月癆宫臟久纒綿更值二交刑辱脞木金水氣月柔星金水紫并木若不休官命還促縱教有救命須存無救命如風裏燭同位推排子細看柔弱剛強是兩般金帶水氣木金獨此人居位至朝端金火土氣月要知三道及三關火土紫氣交往還金火土星三合照太陰紫氣亦清間木火土氣月病若中間有寅風火𠫭氣木土星平皆因犯月加辰戌到底因須厥疾終木水土氣月紫照田宅破田莊三災土水一般言三方水木相關照定主田莊不十全木金氣孛月紫氣孤星照命中更看孛曜照身宫強星固有關金木却認他人作婦翁木金火孛月不但太陰關火孛官榮華貴起超升木金得勢如強曜他日須防害股肱木火土孛月火土木交兼月孛五位星辰性最剛命身乃若居生旺不是員郎亦正郎火土木孛居強位太陽辰戌參羅計此為有福無難