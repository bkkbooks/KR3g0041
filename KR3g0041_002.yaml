body:
  text: 星學大成卷二明萬民英撰星曜圖例論干神妙用世人論命止論十二支而於甲庚丙壬乙辛丁癸乾坤艮巽皆不言餘度於十二宫中為神藏煞沒天德也星盤之中且不知此十干安知其中之妙理獨不聞隂陽家之説乎凡為人立宅架造移吉避凶其有出東作西不曰出甲作庚則曰出乙作辛何嘗云出卯作酉出寅作申至於三隅方道皆然蓋支神乃神煞所居而干神乃天德月德月合月空嵗德所會避凶而趨吉也豫於星盤上亥子隔界之中著一壬字子丑隔界著一癸字十二宫各有一干一支相比而去而每宫之中度數有狹闊之不同吾亦因闊狹而分焉且如子之一宫有三十一度半危六乃壬之半女至八度為癸之半丑宫二十七度太則牛金始二度為癸之半斗至十度乃艮之半寅宫二十八度半箕六度乃艮之半尾至九度乃甲之半卯宫二十九度半心初乃甲之半至氐七乃乙之半辰宫三十度太亢三乃乙之半軫至十六乃巽之半巳宫三十度前後各八度軫一乃巽之半翼四乃丙之半午宫三十度前後各七度半張一乃丙之半栁十一乃丁之半未宫二十七度半鬼一丁之半井十五坤之半申宫二十八度井二乃坤之半畢十三乃庚之半酉宫二十七度半畢初乃庚之半胃十一乃辛之半戌宫三十二度前後各八度婁七辛之半奎九乾之半亥宫三十二度半壁二屬乾之半室四屬壬之半以此所屬而觀命者命宫命主二位俱臨干神之位數皆富貴之人亦必本命為嵗德月德月空月合卦氣六合有用之地其人資性亦了了不至蠢弱其三台八座與州長官富家大室白手成立之人往往臨之所以秉陽德之剛明絶隂柔之晦惡若地支神亦聞有富貴之人而必星度十分合格此干神貴者最多不可不察也歌曰十二支神隂德居十二干神陽德管止論支神不論干算得命來只一半二德月空與月合干神十二位中居身命主曜俱臨此不貴當為富丈夫月德無如嵗德髙隂陽等對待如何丙壬庚甲強於戊論命觀星細揣摩甲加心尾丙加張畢得庚臨危北方更有戊坤培井木命身臨此最為強劍鋒大煞本干神凶吉於中亦細明四仲月前金位毒名為真劍銼人身假如不死得人身十箇之中九箇刑帶角披毛真畜類多因坐處上刀砧乙辛丁巳癸隂干若比陽干貴裏難尚論支神此為吉於中分晰吉凶看癸水女牛生與尅乙臨氐亢尅其躔丁居栁鬼尅生半胃土生辛巳産乾乾坤艮巽四維髙乾巳坤辛戊位牢此位劍鋒多半吉巽淵艮土得功勞嵗駕從來號吉神殿勳籍貴與齊名干神一位人多忽會者星翁第一人十干之位本純陽君子居之大吉昌女子小人居則亢可為鰥寡孤獨傷卦氣從來止論干支神卦氣亦須看往來身命詳交互不是公侯也品官年值支神煞最凶尊神嵗駕獨臨方惟旁干神凶不射不然祿馬貴人鄉假如未年生命在未乃嵗駕也若偏傍於丁坤土坐則無煞也所謂甲庚丙壬乙辛丁癸乾坤艮巽神藏煞沒者此也故為天德又歌曰嵗君對位亦凶神帝座衝干曰一星乃太嵗也人命莫當一星正偏干庶可免其刑太嵗支干有真合甲人合己乙人庚若人身命兩臨此早得妻財琴瑟鳴午辰酉亥四年生又向支神安命身此上若無刑囚位六親骨肉必罹迍嵗刑之位既加詳子午宫神互换方寅巳申宫參錯見更明丑戌未相妨六害之年看互換此宫安命亦妨親六親不尅身尅命亦主重妻異子人四廢干神人皆惡誰知神旺德之光星盤位不嫌斯廢喜在陽神干位方空亡二位曰凶神安命其中亦損身宜向干傍非正位其凶可怕是支神十干官星宜細詳蓋以五隂配五陽隂人見合為官貴尅我我尅有雙傷論進神甲子甲午己卯己酉只此四位是也論三竒詩曰天上三竒甲戊庚地下三竒乙丙丁若人命值三竒貴三元及第冠羣英太乙妙旨云乙丙丁甲戊庚命局相成生復生不作蓬萊三島客也應金殿玉階行論夾祿壬癸生人見辰是丙丁生人見戌是得此二位主貴論拱祿交祿暗祿拱祿者戊辰生人見丙午丙午生人見戊辰丁巳生人見己未己未生人見丁巳前後相拱只此四位是其他不係交祿者甲申生人見庚寅庚寅生人見甲申如此類是暗祿者甲生人逢亥是亥能合寅乙生人逢戌是戌能合卯他倣此詩云暗祿仍須仔細看甲人須向亥中安乙人祿戌尤相喜入格才髙作狀元夾祿拱貴并交祿命裏重逢金滿屋食前方丈與諸侯富貴是人之所欲論飛騰祿如甲申甲子甲辰生人見寅是蓋祿馬俱在寅庚寅庚午庚戌生人見申是蓋祿馬俱在申命得此者主大貴也詩云命中若遇諸般祿德潤身與富潤屋不惟日享五侯筵一食萬錢尤未足論祿馬食神甲申甲子甲辰生人見丙寅庚寅庚午庚戌生人見壬申只此六位主大顯貴論連珠食神甲食丙丙食戊戊食庚庚食壬年月日時胎相順自上食下是也歌曰時人欲識食神名甲人食丙乙人丁丙食戊兮丁食已已食卒上戊食庚庚壬辛癸偏相喜壬甲癸乙最光榮若遇食神騎祿馬必居豪富顯功名不食空亡陽刃煞不食休囚并死絶食生食旺食貴神食印食財别優劣有能推究得其真祿食天厨無休歇論學堂凡身宫主星是學堂星假令太隂星在人馬宫是身宫也即木為宫主星看木星在何方若在四正七強宫并順旺入廟主文章之士若在留逆段五弱宫不會文章雖然登第必出他人之力詩云身宫宫主為學堂怕六十二八宫當若到此處皆為陷雖有文章夀不長身宫宫主為學堂留逆怕逢三惡方廟旺更兼行順段七強宫裏錦肝腸又云納音生處為學堂金人見巳辛巳為正木人見亥己亥為正水人見申甲申為正土人見申戊申為正火人見寅丙寅為正論學館甲乙生人屬木得寅庚寅為正丙丁生人屬火得巳乙巳為正戊巳生人屬土得申戊申為正庚辛生人屬金得申壬申為正壬癸生人屬水得亥癸亥為正論官貴學堂學館甲乙生人見巳是學堂申是學館蓋甲乙用庚辛為官星庚辛屬金金生巳臨官申丙丁生人見申是學堂亥是學館蓋丙丁用壬癸為官星壬癸屬水水生申臨官亥之類論正印金命逢乙丑水命逢壬辰木命逢癸未火命逢甲戌土命逢丙辰謂五行正印空則為僧道旺則為貴人也若丙丁人得甲戌壬癸人得丙辰又謂之夾貴印水生人得正印吉中有凶詩云正印分明格局清士人唾手取功名更兼華蓋臨身命晝錦還鄉示顯榮論官貴六合印庚子得乙丑戊午得癸未丁酉得壬辰己卯得甲戌辛酉得丙辰是論五命財庫金命木財未為庫木命土財辰為庫水命火財戌為庫火命金財丑為庫土命水財辰為庫論外財只取長生宫是如甲用戊巳為財見戊申是也癸用丙丁為財見丙寅是也此類多得外財定驛馬十二位驛馬五行驛馬最超羣更遇生官祿貴神君子成名加爵位庶人營運足珠珍病絶驛馬值空亡士庶營謀半吉昌更有工商并技藝徒勞心力走忙忙六害馬前六害不堪名月上逢之損弟兄父母胎中先見尅日時妻子更防刑六害須憂損六親只宜僧道可安身又逢沐浴兼陽刃百世空為一世人馬前一辰名六害命若逢之多破敗除非奴隸定生涯四體不完始安泰華蓋華蓋聰明號吉星大宜執卷主科名更逢天德同官印位至公卿佐聖明生逢華蓋主文章藝術偏多智慮長女命縱然多色欲也須榮貴坐髙堂華蓋空亡僧道同更兼陽刃在其中縱饒手藝多能解百事終無一事通劫煞劫煞為災不可當徒然奔走利名場須防祖業消亡盡妻子如何得久長四位逢生劫又來當朝振業逞儒魁若兼官貴居時上鯁直名標御史臺劫神包褁遇官星主執兵權助聖明不怒而威人仰慕須令華夏悉安榮災煞災煞身多主禍殃更逢陽沐細推詳若臨日月并時上兄弟妻兒定夭亡災煞當加帝旺方更兼祿貴此中藏變災為福誰知得一舉成名入廟堂天煞天煞難招父命長纒綿宿疾不離床除非祖業先磨滅難免此身陷禍殃天煞加臨冠帶鄉不愁衣著不愁糧身間命吉無災咎枝葉偏多福祿昌地煞地煞難招母命長須知前後喚人娘若然在舍應愁悶南北衣資始大強地煞如逢貴祿鄉若能修學富文章不然營運多財寶立業成家事事昌年煞年煞原來最是凶不招祖業走西東重重婚娶無男女外族須教破一重生逢年煞臨時日帝旺重加福祿強君子修文應富學小人謀運足衣糧月煞月煞之神半吉凶弟兄男女有無中師巫僧道間過日却主前程命運通月煞加逢自墓臨聰明智慧衆人欽農商工賈并僧道營運豐盈各稱心亡神一名天官符乂為大煞破軍亡神七煞禍非輕用盡機心一不成尅子刑妻無祖業士人猶恐有虛名命宫若也值亡神須是長生遇貴人時日更兼天地合匪躬蹇蹇作王臣將星將星文武兩俱宜祿重權髙足可知不做宰臣清要職便居帥府擁旌旗將星財寶永無窮家活生涯事事通天乙更來天德上少年平步上天宫將星一位最為良時日相同命必昌官職崇髙宜世賞安邦定國鎮邊疆攀鞍攀鞍在命最為竒年少登科世所稀更得官星加冠帶晚年定有貴男兒命中帶馬用攀鞍華蓋前當四柱安管取飛黃騰踏去狀元及第又何難定納音長生十二位長生長生管取命長榮時日重臨主性靈更得吉神相會遇少年及第入王庭長生若也得相逢生下須招祖業隆父母妻兒無尅陷安然享福保初終沐浴沐浴凶神切忌之多成多敗少人知男人值此應孤獨女命逢之定别離沐浴喜堪祿位逢更兼引從在其中讀書必定登科甲莫把諸神例説凶桃花沐浴不堪聞伯叔姑姨也合婚日月時胎如犯此定知無禮亂人倫女命若還逢沐浴破敗兩三家不足父母離鄉夀不長頭男頭女須防哭冠帶命逢冠帶少人知初主貧寒中主宜更得貴人加本位功名成遂又何疑人命若還逢冠帶兄弟妻孥無陷害因何接祖紹箕裘只為胎中有華蓋臨官帝旺臨官帝旺最為竒祿貴同宫仔細推若不狀元登上第直須黃甲脫麻衣衰病死納音衰病死重逢成敗之中見吉凶若得吉神來救助變災為福始亨通墓庫墓庫元來是葬神一為正印細推論相生相順無相尅富貴之中次第分人命若還逢墓庫積穀拘財難計數慳貪不使一文錢至老人呼守錢虜胞絶絶中逢旺少人知却去當生命裏推反本還原宜細辨忽然迍否莫猜疑胞神一位名為絶尅陷妻奴家道劣不惟朝暮走忙忙羊食狼貪無以别胎養胎養須宜細審詳半凶半吉兩相當貴神相會應為福惡死重重見禍殃或云胎養小長生人命惟逢自積靈若也修文應稱遂不然營運亦光亨論納音定子息歌長生之位中旬半沐浴一雙保吉康冠帶臨官三子位旺中五子自成行衰中二子病中一死中至老沒兒郎除非養取他人子入墓之時難保雙受氣為絶一箇子胎中頭女有孤娘養中三子只留二男女宫中仔細詳取納音尅我者是也如金命人用火為子孫火生寅寅上起長生看男女宫在何方順數依此斷之即知吉凶也假如火命人男女宫在午從寅上起長生至午是帝旺旺中五子自成行則主有五子之位也依此而推萬無一失又如木命人男女宫在申取納音尅我者為子孫金尅木金生巳從巳上起長生至申是臨官冠帶臨官三子位則主有三子之位餘皆倣此乂云取我生者為兒孫如金命人金生水用水為兒孫水生申從申上起長生看男女宫在何方如在酉上則主一雙男女以上一則取納音尅我者為子孫一則取我生者為子孫俱要數至男女宫斷之皆為有理定祿元宫歌人生各有祿元宫惟此宫中號最雄但把日時從日數數從逆主本年終更看宫內何星曜宫主髙時星復廟更加金木作宫星本祿重加官必妙儻然陷弱帶凶囚反福成凶皆惡兆推尋此地若精時貧富自然心下曉祿元一宫人所罕知若求此宫只將太陽推過宫定凖然後生時從太陽宫逆數至本年住即為祿元之地夫此宫者要本家之祿或官祿或坐本命若遇吉星無不享福如其坐陷弱而遇惡星或與囚煞同行或遇計羅成黨斷主刑傷尅破也定祿元宫度與前説不同甲祿寅木星在箕八乙祿卯火星在房五丙祿巳水星在軫八戊祿巳水星在翼十丁祿午太陽在張十己祿午太陽在星四庚祿申水星在井二辛祿酉金星在昴九壬祿亥水星在壁二癸祿子土星在危五定祿馬宫慶賀相逢第一尊祿馬同宫身命欣從來此説為真貴管取榮華謁帝君祿馬宫中皆有度度中分秒宜窮數若得來臨身命中發祿榮身居帝輔凡身命坐祿馬謂之慶賀不值凶星有吉曜榮華無比定驛馬宫度又名貴元又名馬元申馬寅本星在尾十五度火為驛子馬寅木星在箕五度火為驛辰馬寅木星在斗四度火為驛寅馬申金星在觜一度水為驛午馬申金星在參五度水為驛戌馬申金星在畢十四度水為驛亥馬巳火星在翼八度木為驛卯馬巳火星在軫二度木為驛未馬巳火星在軫十四度木為驛巳馬亥水星在室九度計為驛酉馬亥水星在壁三度計為驛丑馬亥水星在奎一度計為驛論天馬地驛其法以驛馬宫天元祿主為是如申子辰馬居寅則遁甲祿在寅甲以火為天元祿故火為天馬甲木為地驛也寅午戌馬居申遁庚祿在申庚以水為天元祿則水為天馬庚金為地驛己酉丑馬居亥遁壬祿在亥壬以計為天元祿則計為天馬壬水為地驛亥卯未馬在巳遁丙戊祿在己丙以木為天元祿戊以土為天元祿則木土為天馬丙火戊土為地驛自本主星天馬宫泊定隔宫逆數零年順數數起一年一宫若逢到馬臨官分即有喜事遷轉若土計火孛混之乃雜馬臨官三十年才逢恐不純論此也三車一覽云驛郵亭也馬有代勞之功病處見子是也如申子辰水局生於申病於寅而得木為子以代其勞故曰驛馬按此説則寅午戌病於申必取土而不取金其説未融余為之説曰驛馬之論乃病處而見財非病處而見子如申子辰水局至寅而病得丙火為財為馬以代其勞寅午戌火局至申而病得庚金為財為馬以代其勞巳酉丑金局至亥而病得甲木為財為馬以代其勞亥卯未木局至巳而病得戊土為財為馬以代其勞古人亦以官為祿以財為馬未聞以子為馬也寅申巳亥為四衝故衝處置驛驛中有馬亦取長生之義也定卦氣卦氣者六十花甲俱納於八卦之中也如甲壬生人卦氣在乾乙癸生人卦氣在坤六庚生人卦氣在震六辛生人卦氣在巽六丙生人卦氣在艮六丁生人卦氣在兊六戊生人卦氣在坎六巳生人卦氣在離凡星盤身命官福坐於卦氣之上無不富貴是卦氣耶律之最重者又考範圖河洛中天大定諸數悉皆以此為正祿其可忽諸論三方主星立例歌七政隂陽各有取品量以配三方主晝生只在日上求夜則須從月中取當知月火金為隂日木土向陽類尋夜宜隂主晝陽主不背端能為福深隂如逢晝陽逢夜難説終身禍不侵西天之法重乎此最要其星在髙位各得其宜乘旺行必主生來居富貴七曜更臨身命宫超騰必作人間瑞論三方主星立例及明其大略晝生就日夜生就月各於其所在宫取之日木土主陽月火金主隂晝夜不背則為福金木從來是善星所臨非主亦非榮三方却怕逢火土的有無情惡曜名夜見隂宫方烜赫晝生陽位始光明論金木水火土惟不是三方方主星其禍福不同如此定三元星亥卯未為命宫者木為天元印火為地元祿土為人元夀寅午戌為命宫者火為天元印土為地元祿金為人元夀申子辰為命宫者水為天元印木為地元祿火為人元夀己酉丑為命宫者金為天元印水為地元祿木為人元夀論天元印星歌從古賢愚皆有命世人徒自苦經營天元順廟居強位早嵗須登富貴名印星守順七強宫旺廟之中甲第雄復與地元同廟位不為卿監必三公辰戌丑未宫名陷天印星分入此宫為人雖貴無官品定有迍災及不終詩曰大抵天元號印星此星宜順冠羣英忽然留逆仍居陷難望朝中顯大名論地元祿星歌主祿當星仔細看七強四正有多般生時旺廟兼行順以此須知作省官祿星不背又三方如在髙強官祿昌武品定知為大使文資應也至員郎三合位中逢此星此星不弱最相親同躔若使逢留逆到得郎官須退身祿星雖好印星滯縱有官資祿不深印祿二星皆得力此人必得四方欽祿印其宫占七強亦有科名祿又昌若見夀元當弱位縱能榮貴命危亡詩曰品位髙低看地元生時沈陷祿多邅如逢廟旺兼強位不是文僚即武權論人元夀星歌夀元星正在東西順段之時命絶竒仍向命中逢旺樂天年應與嶽山齊人元陷在五弱宫不出初年命必終若向陷宫逢正度縱教延逺四旬中人元主夀細推詳相尅逢之命豈長更在忌星兼伏逆兩旬之內見危亡夀星居命陷祿元縱有年長且沒官又值天乙不得力一生落魄主孤寒印祿二星盡居強獨有人元守弱方雖有科名及祿位奈何年夭且非常詩曰人元曜得旺宫居更在髙強夀不疏便見忌星臨在命也應年及七旬餘論三魁魁星有三惟正魁頗驗若人行年星限遇之必占甲科身命臨之進取必魁多士正魁例甲用太隂乙太陽是也小魁例甲羅乙紫丙金星干屬丁兮火上尋戊水己計庚水宿辛土壬陽癸太隂三元都魁例甲庚乙孛丙木方丁計戊巳水邊藏庚與辛遊火位上壬癸那堪紫氣當論四元歌四元乃仁元夀元祿元馬元是也馬星為貴祿為祿仁元干配的無疑夀元惟向納音取要在強宫與限隨仁夀二元如得用並是名家極富兒限星更得入垣局此人終與聖賢齊四元三限滿三用不犯凶星忌曜傍滿在強宫明健處定須執政入朝堂上貴之人限星全先要仁元與夀元得入正限及身命貴祿兩元又相連或在四正髙強處清華富貴定兩全文星明健當台輔武星髙貴主重權或被惡星臨照破也為給諌立朝端金為兵兮火為武水為文兮土為輔四星俱在髙強宫文武兼資佐明主夀元星最忌晝火夜土馬元又為貴元論馬元如申子辰馬在寅寅屬木即木星是也祿元者如甲生人祿在寅寅屬木即木星是也仁元者以甲乙生人屬木即木星是也此謂之木星得三用夀元者如甲子生人納音是金即金星是也須看仁夀二元為先貴祿為次此四元要在七強宫及四正順段廟旺好樂之地會限為上守限宫主及命為次最嫌在五弱宫及留逆死絶之地論九事九事者四元星與三限星并時命兩星是也若在四正七強宫主大貴九事全兮順五行自然享福得遐齡九事若雜福不至萬般智慮一無成生時九事得五六終身只可為中福欲明九事本元例四元三限時命備此為九事歸垣局不知垣局也為非論八煞宫歌八煞宫中最要窮時人只謂八宫中見聞未叩天機處難定浮生吉與凶此宫理致最竒妙禍福吉凶皆有兆吉星臨此福非常惡曜到時災不小若知窮算此宫中兩句幽深務通曉子午隂陽辰戌稱寅申二位寶瓶宫數年退數從逆取尋取生年何位終宫主又髙星又吉何愁福祿不豐崇福官身命宜居此權宿加臨祿位隆囚忌儻然相尅戰為官必定少年終凡八煞一宫號為最髙者此宫所主貧富貴賤無不應驗自臺諌吳祕正而下罕得此訣往往傳聞之誤夫八煞一宫甲子甲午旬隂陽宫起甲寅甲申旬寶瓶宫起甲辰甲戌旬天稱宫起對宫逆數至本生年止即是八煞宫有吉星臨之合主大權身命居此何愁福祿不豐隆縱使福祿兩宫俱無星照終還顯赫若囚忌相尅戰雖為官亦主少亡論天厨福局歌天厨福局實難逢年時次日順天輪身命逢之皆吉慶局星照命亦光明善星守局皆為福空局亦為足食人限逢局上福立發布衣換作錦衣榮論以生年或同時併在天命宫有善星守照主貴或身命分作年時二局亦緊若無星守照或官祿二星俱陷只主衣食富足之命論天堂貴局歌貴人自有天堂局尋取生時命所屬若居四正及身命助限由來貴無並武星髙照主將材文星為限主儒魁日月分明會金水三星得地乃三台凡人本生時及命宫所屬之星是也如子時即水星卯上為命即木星若人生時與命所屬同是其星來助限得力即天堂局也論天祿貴局當生年祿上為命宫其次身坐祿宫無不貴顯論禋褥局法以五命庫墓中坐命如火庫戌金庫丑是也論蔭敘局水命申金命已火命寅木命亥土命辰戌丑未論蔭堂局法取四生坐命天干生處及納音生處是經名聲價權道局論蔭助局法取旺宫坐命為之最怕夜土晝火論垣局太微垣午紫微垣木與氣同在角婁為紫微舍人天市垣火在卯金在寅午戌主魁甲角道垣孛星在軫室巳與亥宫太常垣土星在斗丑宫金星在亢主提轉専城之任文昌局火星在亥卯未宫榮名局如寅卯生人屬木在命宫是他倣此天堂局火星在卯榮顯局水星在星虛之宿歌曰凡立功名主重權須要坐限命入垣星滿三用居本位會命見限福仍堅火為天市居天蝎土是太常守磨蝎金星天稱亦太常榮顯水星在南方火星占入紫微垣紫木辰宫為限元木星三用正臨亥營室角道主兵權或然兩用兼為限俊譽英雄發少年金為太常垣在亢宿土在斗宿火限在天蝎水限在星與虛木限在軫與室凡此五星若不是限但身命宫亦得木與紫同在婁角為滿用亦須仁元入垣為緊凡入垣皆須滿三用方為正垣惟木星兩用便是垣也星又云木星三用為中台局水星三用號榮名局金三用號文昌局紫氣見木土金居命位號紫微舍人局星甚貴乎有用也三用則大貴兩用則貴有用則不賤若無用則其星之弱而陷也可知巳此誠造化之所係且如六甲人以木為財為福又用以為祿此星在命誠不可掩如六戊人以木為囚為煞若命值此則平生福淺而禍深豈木星獨私於六甲人而憎於六戊人耶由所遇非所用耳如孛在乙人則為祿主在丁人則為囚此其所遇無用有用之理甚明後學所宜深辨也論嵗德朝垣歌天上一星為嵗秀地下一星名嵗德嵗秀嵗德俱朝垣天地位中相對祿大凡共值此宫星一品加官必崇格日月能為此二星弱冠之年榮白屋嵗德朝垣假令卯生人先定天上太嵗宫主為嵗星星乃天蝎宫卯是後加地下安命宫主為德星二星同宫及衝對崇勳之宮也天地二盤更以臨駕登殿入局崇勳此乃丞相一品極髙之命其宫星不犯退留伏逆為妙如若犯弱退留伏逆為次更凶惡之宫者雖位崇勳而為難也論入局只看他貴元局是也如乙巳鼠猴之類者主星居其上則曰入局要晝夜不相背星辰不相反則曰天乙吉神若相背相反則曰天官凶位便看三方主星不要相尅戰如尅戰則減福更不係主星居其上則曰間神入局凶夫局者天地精英之所萃乾坤秀氣之所鍾人命主星臨之無有不貴詩曰貴局元來喜主星間神破局不為榮福祿官魁臨吉位定知攝職至公卿論升殿歌要會玉堂也第一躔星妙獅子次看寶瓶虛日鼠第三宫日昴金牛第四蝎宫房日兔危月燕兒在子尋晝太陽兮夜太隂午宫之上有張宿酉畢對宫卯日心須與日月為三元與太嵗相攝太嵗者乃酉為金牛卯為天蝎或乙巳生人寶瓶壬癸天蝎丙丁金牛六辛獅子以日為入殿也與太嵗相干又要是三元主如不是三元主則無用既得日月為三元主而入殿者更不以五星為用乃上品之位論臨駕一星作三四主者號受權臨駕如為二主星號選職臨駕為一主則無用嵗駕怕空也論登籍歌帝座加命第一竒崇勳臨卯亦相宜崇勳在位第三貴太嵗守勳可憑依宫星似此號登籍天地宫中自合儀勳嵗宫中言貴祿限行到此世間稀此宫度者甲子以寶瓶為第一座若加天命第一竒也人馬寅宫為崇勳加命為貴若寶瓶子加寅人馬寅加子巨蟹加丑磨蝎加未此是天地合儀星處其中名曰登籍第一限主乃一品二品之祿第二運主乃次也第三宫主則為不明之祿如此論合儀之星者定三元而後用不係三元不可用也論崇勳只看他祿宫主是也如甲祿寅乙祿卯有主居其上則曰崇勳遇於駕殿亦為臨駕登殿若是飛星臨之則曰飛星破祿凶夫勳者功也崇者髙也窮則詩書事業達則號令文章功名所在萬世不泯載之於竹帛簡册之中無非有功有勳者也歌曰竊聞逺祿最相干星入崇勳不等間更得馬乘天相祿男命邅馬必貴女命值馬必貧寅多相逢名為活馬田財相見成敗有之病絶死逢徒然無用六害相會奔馳勞碌玉堂者天乙貴人不臨辰戌日時衝而不足命主會而有情貴在丑未衝却無妨祿主臨而不貴人命值而未宜卦氣臨命則名利顯赫慷慨聰明嵗破逢身則先敗後成破蕩難支運限逢而財敗六合濟而孤貧倘會天中不祥尤甚田財身遇必主破財陽刃者凶敗也怕在命官四柱又忌加見劫亡若會三刑如虎添翼君子逢之有權好殺亦難善終小人值之逢凶好逞多主橫死女命逢之主産厄男命遇此見是非亡劫者亡為官符劫為大煞亡神值命會勳印玉馬而反吉獨守命宫則駁雜凶頑而狂蕩倘加陽刃難保善終六害相逢其凶莫比劫煞在命宜於生鄉忌臨衰地身命限主不可逢加驀為悖逆之象衝為白虎之神在命有貴則吉運行到此有日月傾倒之災更加惡神其凶非小驀到身命近君不久末後尢乖飛廉者凶神身命遇而必招凶惡汨沒者淫神身命限主不可居更會其祿好酒破家在位加官進爵不為難登籍之星多智慧平生早達動人心成名金榜全忠孝天下聞名冠古今主星臨駕受強謨主性多機與衆殊非只言官主庫藏他年財榖有盈餘論特進歌人馬雙魚木守春火居天蝎白羊神秋金天稱金牛上雙女隂陽冬水神四季主星登此進先行日月有其明因斯宫度關非漏細取三元分等倫此宫度者乃主星先進晝生在太陽之前夜生在太隂之前在此宫者故曰廟進如在駕勳故曰特進如在宫分樂旺廟兼與太嵗相攝者則曰入進特進則一品二品之貴廟進則為第二入進難言其位縱有而嵗晚方發如位隔者或前進隔日月兩位者名漏關處日月之後者名曰末後既進要係三元主星然後觀其度數用之論近帝座假令天蝎卯宫為帝座若二三主居天稱號曰近帝座一二三品之貴論受職星取本宫對宫上逆數至太嵗是如戊申人自地盤寅上逆數甲至太嵗上得庚以水受職星也受職星臨本生太嵗宜為貴人論食邑星歌文武尊榮食邑星住命宫主取元情午屬太陽未屬月申巳水宿辰酉金卯戌火星寅亥木子丑遇土來天福廟順須封萬户侯怒逆難為榮上爵論漏關歌推命先須覓漏關四方三位不相攀一如申子逢辰月年上星辰善惡間星坐之處即照六陽宫每宫星連對照三合漏關六位也漏關者不在對照三合之內如申子辰為三合巳亥為四方則午戌為漏關常在前後二宫論衝殿歌嵗後一辰為衝殿乃隂刃也駕後一宫名驀越大凡人命防衝越致禍為災不可測駕前宫度嵗後辰更恐其星行退逆衝勳衝嵗亦為凶太嵗支干刑又尅三元主落在其中干祿求榮終大隔本命太嵗後一辰為衝殿駕後一位為驀殿帝座前一辰為近駕論救陷宫歌相奴兄疾名為陷陷了星辰祿不昌更有一般消息好若陷嵗時必無妨論管辰星歌人生自有管辰星禍福災祥自此明本日生人推本宿宿中算取甚星臨福星到此皆為福祿宿臨之祿自興身命躔之均得力值囚凶忌定邅刑凡人之生各有管辰星以主生人禍福如本生月初一日屬亢星十四日則屬奎星看取奎星有何曜而斷人禍福貧富夀夭未嘗不自此而基之凡起管辰先置積日以一十七萬一千三百單九算去之餘者又以二十八算去之不滿者從角宿輪起即知管辰星星學大成卷二
