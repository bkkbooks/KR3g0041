body:
  text: 星學大成卷七明萬民英撰總論諸限洞微百六限起例洞微大限一百年零六箇月故曰百六命宫十五貌宫十福德妻宫十一詳官祿十五最髙位遷移止有八年糧疾厄七兮共六六財帛兄弟五年強田宅子孫并奴僕四年之半定毫芒假令晝生火在巳午未申酉併空亡二十六七為盡處不然破敗卒他鄉假令卯上安命日生人火在已為忌星二十六嵗限數至此不行故午未申酉併為空亡也木在午兮火在酉三旬之七福非常天蝎之前生在晝六旬之六定為殃當生木星在官祿宫至三十七嵗以後限入天中至此稱心卯為命宫前即酉也日生人限至此逢忌星故為禍殃人生百六以為凖學人細説莫能忘命宫十五嵗命宫初排十五年看取生時善惡躔晝夜隂陽分兩曜值命須知短夀年更有羅計孛星照不過七七入黃泉兩曜者火土也日生忌火夜生忌土如在命宫必夀短更遇惡星臨照見命身者不過七七至四十九日須死亡也故云七七若只三合五年定對衝三嵗見迍邅三合宫有惡星不過五嵗對照不過三嵗更看星宿幾時入再侵元限定為寃行年惡星入守舊位則凶生值紫氣木星照自然長大少災躔此限管年十五嵗看取生時禍福元相貌宫十嵗相貌十嵗限須知看取生時善惡推若遇晝熒并夜土十六七上定須危若遇吉曜生時過一自六七喜歡歸更言孛計相臨照十年困苦似神迷初入宫中十六嵗對衝八九喜兼悲初入限一二年有應對照三四年方應災福三合十與十一數宜須逐位細詳推此限管會都一十通前二十五年期福德宫十一嵗福德十一細推排二旬六嵗限方來生時善宿躔於此二旬七八受恩回金木紫氣羅㬋水月入順旺合照此位大吉若言忌曜當臨照定須催促入泉臺生時忌曜日火夜土惡星同此二十八嵗身亡也若遇行年吉星照吉星退後必興災五七三方善星照三旬一二笑顔開三合有喜星至三十一二嵗見喜也若是惡曜同前述禍惡皆從生受來官祿十五嵗官祿十五限髙強生時善宿在何方紫木金羅來照此三旬七上入朝堂官祿宮住十五年三十七嵗入五十一嵗出若吉星守照主榮位進職也生逢忌曜當臨位行年暗宿又來傷四七之年當惡死未交前限早身亡三合見逢六七嵗對衝三十九恓惶如三合見凶星四十一二重災若對照主三十九嵗身亡此限管行五十一宮中善惡細推詳吉曜生臨當喜夢惡星照處惡還當遷移宮八嵗遷移八嵗命合方但看生時善惡詳五旬二上交中限吉星臨照足財糧合方三合也五十二嵗入五十九嵗出加官進職分明定在外須知利四方主星有力乃紫木羅星守此主進職僧道加服庶人有財喜若逢惡曜凶星守五旬六七定身亡忌星計孛照此主災五十六嵗主身亡也對照防災七八嵗三方五十八九防如對惡星五十六嵗有災如吉星守則喜慶三合惡星照五十八九有災危也疾厄七嵗疾厄七嵗限須防但看生時善惡詳吉曜六旬添喜慶災星照著有災殃六十交入六十六交出初入限逢吉星六十交限便受吉慶蝕神首尾如狼虎利害計孛大為殃忌宿若非是方主六旬有一定身亡對照六十三災至三合六旬六限當正逢限星六十一嵗災如對衝六十三凶如三合六十六主身亡生逢惡曜災應厚吉曜臨時百福昌妻妾十一嵗西沒妻妾十一年六旬七嵗到其邉生值惡星居此位六旬七八便憂煎尅妻害子加災至為官罷職不堪言三合防災七十一對照六十九來躔惡星火土計孛也六十七交入七十八交出吉則吉凶則凶奴僕田宅男女共十三嵗半奴僕子孫與田宅此限共計十三年每位分明四載半都來半載一周天七旬八嵗交前限生時星宿細推遷八旬一嵗歸男女八旬四上入田園五宮惡曜八十一四位八旬六七言男女宫凶星八十一主身亡田宅宫凶星八十六七身亡善惡限看當生宿災殃須算降生年看當生星辰元守宫排凶吉逐限交入合遇吉凶一一如是前限不逢凶惡曜兄弟五年財帛全財帛兄弟各五年也逐年行宫到此吉壽星高照亦安然限位都排一百六仍須學者細推研若更有人彭祖壽又從命裏説根源統論大抵洞微所急者限主也洞微所貴者祿星也所重者諸曜順行也所發者廟宫也所畏者忌星也所好者吉神也所輔者行年也所助者三方也所惡者計孛在他宫也如是善星陷逆則福慢順行則福緊凶星陷逆則災緊順行則災慢如遇吉星順行即得本宫加數若遇惡星他宫則其數半減若是限星居廟度即於本數外更加四年居旺樂度即增算二年如一限之中見兩星在旺樂合共延四年以此增損數更在子細加減凡逢惡限行年上却逢吉星臨照身命即延得一年壽其行年星過便亡也大凡吉星居七強為福緊五弱力慢災星在強宫為災慢五弱為災緊凡限本宫見星災福之應十分對照七分三合四分凡限星在終末之度即災福之力側微而不可以定數言之凡忌星在好樂宫入限三年內為福三年以後反為災咎大凡限逢忌星不死亦災若火在陰宫土在陽宫或為三方主雖有厄而不亡故歌曰夜忌土星日忌火三方不是死無疑此星若是三方主雖有災侵命不離火陰土陽宫尤妙好樂位中别有奇謂此也凡災忌星生時在伏段限內為災禍只有三四分力福星生時在伏段亦只得三四分力蓋被太陽所伏光芒不見有類臣居君側包藏光美之象凡一限中見吉凶星同聚即以入宫先後及順逆而斷吉凶故限入宫深者先見限入宫淺者後逢之也凡遇本限及對照三合並不見一星名曰空限主多災凶圖事不成若得限主當生有力之位則反此惟有官祿宫上逢空限最凶必於四十六七嵗死矣凡當生若吉星照身命者主中年富貴縱逢災數直至限末始見災厄若當生凶星照身命者中年雖逢福限四旬之後亦主迍滯至限末方為福大都吉凶之應全藉根基當生有祿則吉限上無祿則喜宫難發是猶無根之木雖逢春終不能發葩而成實也故經云若無一星居身命自是賢愚别有因此之謂也洞微歌百六惟推星命人有星方是富豪論若無一星居身命自是賢愚别有因夜誕晝生忌自别晝土夜火前經説陽宫晝火陰夜土此限逢之死可決夜生人忌土晝生人忌火此是忌星各自别也若更晝火在陽宫夜土在陰宫限數遇之死無疑矣福曜相兼榮裏亡暫時延得少時節若忌星限內却有福星照臨即此人在稱意中亡但是一時也生時計孛若同宫迍邅還是死前發生時若計孛同宫而限內逢者必先失宫散財然後己身亦亡也夜土晝火是主星亦為災害亦為榮夜土晝火非為主災禍相仍難再生日月金木并紫氣當生限內成貴榮以上七曜要當生得力度分不移旺廟宫掩映方為貴氣羅㬋亦是貴權星限若逢之無不利羅㬋是天中貴曜别無凶星刑尅當領重權當生孛至為災異家宅不寧禍有餘限遇月孛主老幼不寧陰私氣悶兼有哭聲夜生較輕惟到金牛胃宿九度巨蟹二十一度則反有遷榮剝官退職因何事限裏元來見計都若在亥宫并戌位反為遷轉涉亨衢縱有吉星同限內些小災患不能無三空若遇災頓併六年之內增重病惟到獅子十五年出限之時須喪命中限災福有遲速對時三四合五六惟是正八最無疑一二年中之禍福好星限內惡星來身命行年小可災限星最忌逢惡曜定行催促入泉臺凡人逢忌星行年又有凶星照臨斷定不生限星若在旺廟處必見貴人有遭遇廟星增算四五年樂旺一二年為據忌星若在廟旺宫不為災害福相逢星入宫淺官早來星入宫深晚為職大凡五緯忌留逆善惡逢之皆減力計都要在戌亥宫命限之中不可逢星限之內一百六説盡人間災與福好星增算惡星乖限內分明一一排陰陽大抵須消息必候聰明可斷裁洞微歌二前限惟推富貴人不知更有苦併貧若要得知從何起但看生時與限辰太陽為父在高強火孛同之必早亡太陽兩處怕豬蛇凶宿臨之少哭爺太陰為母同惡宿不死之時禍又速火月相對如非主方信無男亦無女金與孛計入陰陽不見妻身媱亂戕多姊多妹多兄弟只看命前第三位命前三位有惡星兄弟多傷亦無義限數如來到火上晝誕夜生不為主及與二星相對時不配不溺遭蟲虎生來何得早貧窮二星同到兄弟宫如有善星對合照縱教有始也無終孛計到兄弟宫及火日在四宫雖有金木紫相衝合身命始貴終貧作盜賊也尅妻喪婦從何得二宿同來見太白太白反與火宫同陰陽身命須消息凡妻星與水火同在陽宫主生離及性惡在陰宫主自縊暗死與孛計對照主無亦主縊離日月同宫夾火星月宫人馬土星臨平生雖道無災福久後須交眼不明出家移父在他鄉不必星辰在廟堂但看生時與九宫四星何處奠其方此歌雖是長如牘子細推之有災福學者要得逢其真看取行年限遲速百六吉凶歌人生貴賤稟星推限數交宫各有時凡人貴賤皆稟日月五星之氣如以星限推之可見休咎限數者若卯宫十五辰宫十之數是也若遇羅㬋金木曜太陽紫氣月宫隨限逢此曜遷官職火土星宫到便危若人當生以上吉曜在高強得力度分限數遇之必合遷官喜慶如其星生時不得力雖逢之為福亦微薄此歌中略不言水星災福者蓋水無定性附善則善附惡則惡也夜逢土星晝火曜三方不是死無疑此星若是三方主好廟宫中别有奇夜生人土不是主晝生人火不是主限數逢之立見災危若是方主雖有厄而不亡又如甲人逢火戊人逢土惟此二命雖是忌曜亦於其限內遷官轉職將出此宫然後身亡故也家宅不寧因孛至更兼迍悶恰如癡月孛多主家宅不寧心神不快陰私迍悶晝生尤甚惟六乙生人較輕也計都失職終須記若逢奎婁立轉移計都臨限居官者失職常人散財疾病如更值日月其災轉深移到白羊宫奎婁二宿則反有遷榮稱意之喜首曜陽宫為福緊尾星陰位定災稀羅㬋好晝在陽宫則福力更加計都好夜在陰宫為災較可宫中對視三方淨空限凡營事不期官祿上逢空限死四旬六七命須悲凡遇本限及對照三合並不見一曜名曰空限主多迍邅圖事不成若得限主當生在有力之位則反此惟官祿宫上逢空限最凶必於四十六七身亡善星限內逢災忌稱意中亡是此基只有災星宜詳審剝官孛計限仍知更逢忌曜因何死失職中亡請細推若人行金木氣限晝火夜土與計孛同宫即有祿者遷官而死無祿者進財而亡如星限中只有災星不是忌曜即須子細消息定之蓋災星慢於忌曜故也孛計限仍知失官散財憂撓疾病如更於忌曜同行此人必有災而後身亡晝土夜火如是主限逢稱意主官資火陰土陽宫為妙好廟宫中别有奇主領重權王委任延年四二細推之晝土夜火如是主仍土在陽宫火陰宫則有加官進財之喜諸星入好樂廟限者合統清要之權為王腹心兼廟限者於本限别更延得四年在好樂限者延得二年五星伏段臨宫位災福三分與四齊五緯居伏段與日月相近則災福之應有三四分蓋為太陽掩映光芒不見故也吉曜七強為福緊災星五弱有災疲吉星在七強則福倍加災星在五弱宫則災較重也臨宫一二對三四三合年中五六推凡限在本宫者發在第一二年中對照限者發在第三四年中災福之應十分三合見限者災福之應四分而發在五六年中也限數臨宫未一嵗身命行來災忌隨前宫更有忌星迫未交前限命須悲大凡行限到將來之時身命行來宫上見災忌之星前一宫又遇忌星來迫則更不候入前宫而便亡假令夜生白羊是命生時土在人馬自三十七至五十一限在磨蝎於五十嵗又遇土星臨照身命則便不候交人馬限而亡也身命行年逢吉曜不候交宫福佑之如人將入福星限未交限前一年遇金木紫氣羅㬋照身命行年宫則不候交到前限便有遷官喜慶之事災星忌曜命宫位樂宫二位莫生疑一二嵗中為福慶已後災侵禍不遲若晝生人火在天蝎夜生人土在磨蝎寶瓶數遇之初入限一二年主有喜事已後必有災危又看疾厄遷移宫更詳諸曜命宫推孛計相逢無吉曜限數將交定死期妻妾疾厄遷移名曰三緊位當生切忌惡曜照臨若見計孛則壽夭而不善終行限至此又無吉星照臨則出宫時死矣限中紫氣星相見職位清高主翰詞十一曜中惟推天乙紫氣遇之倍勝别星若當生更與日月同對此限數遇之未仕者主釋褐授官已得仕者職加清峻名位顯揚或居臺閣一限兩宫俱好樂益壽四年福要知假令獅子為命宫行金牛宫限遇見金月二星是官祿宫中好樂又火土同在磨蝎火臨旺度土臨廟堂是兩宫好樂限數遇之不問晝夜在限本數只加一星之數經云晝火不增數夜土不加年故也限逢惡曜兩相見為災至甚定難移一限之中見兩災星臨照則災重雖遇善曜亦不能救初入忌星宫限裏身命行年惡曜隨留逆之月為亡月宫居五弱不須疑如人正入晝火夜土限身命行年宫入值凶星守照兼其宫在五弱位雖是初入限忌星留逆之月身便亡更不候依常數而災發也限惡行年身命惡好曜過時也便危凡人限在火孛計宫上時下若遇福曜臨身命行年吉曜方過主見災也星辰本宫勝餘位七強宫內福加之五弱添災福祿減學者須詳善惡推七曜若在當年本宫度分更若高強限數遇之勝於他宫若遇五弱則災重而福輕矣死生災福無一失方信從來學洞微論百六數有增減諸星滿用記前篇賾探幽玄是會元百六限中得本數更求增減又玄玄星躔廟樂益四年廟好之宫加二算星躔廟旺增一年星在怒宫減一半星辰遲伏且平行限到其宫不減增減於本限除一半增於前限外加添獨論五星增減數六曜吉星只平度怒逆星辰同一宫內減外增無差誤凶星滿用平平過忌星廟樂不增加的取天機經百六興衰生死的無差論限有出入半限定吉凶何知根本理休為出入宫中有細微增減後來交本限惟將星曜細尋推滿用諸星主限宫須知滿用福盈豐設使縱橫星曜怒保全天命不殂終凶星在限本傾危滿用縱橫則庶幾只怕前宫忌星迫未交滿限命須悲凶星初入本為災若是中分福不來或有災星期限滿於兹果斷最難猜有星滿用限須滿災星來侵限之半喜星救援入限宫依此推詳為妙斷火星入限便為災土計興災限滿來計火土羅喜救援例推主事識凶衰日月羅計怕相逢限遇交時命即終羅計若然逢日月如喜滿用即無凶忌星會限則當亡滿用之時福反昌羅計孛星如守限無星催促且無妨日火會水不為憂月土得火反為休不逢滿用逢水火定行體骨掩荒丘紫氣福時前限福欃槍後來方災促若是滿用福祥多仍識縱橫須委曲限宫凶吉星共同增減滿用不滿用星辰主事分先後用事先權福為重星辰滿用吉凶同亦尋星入理先蹤吉星先入先為福惡曜後來後亦凶救限最吉祿主星更兼食邑與科名文曜三方并壽宿限宫當主亦延生大凡滿用皆榮美能伐凶星尤可貴被伐名為受制星相喜往來皆慶瑞滿用相喜來百六入仕遷官榮爵祿例推出入與中分育子取妻發金榖紀綱百六辨凶衰測驗天機緊洞微更有細微陽九限逐年災禍細尋推論限星切驗都例單星守限不滿用仍算行年星入用若臨善曜福無涯惡曜交加歸大夢更知生死憑何據百年六月分三處二分為生一分亡生限可逃亡則住生限凶星尚可逃三之二分總星交六十七後為亡限凶曜當之命即拋百六交宫取定期直須生月日兼時交宫過後方為準逐限推求深斷之交過前宫入限中除却前限萬端凶如囚囹圄遭原赦魚出疏罟鳥出籠吉星臨限多發福入仕遷官榮爵祿誰知此嵗濟歡榮更加日月蒙星福又知百六合凶星救援全無大可驚須知其年當棄世知何日月往泉扄百六限中當何月陽九宫中尋甚日例使縱橫理吉凶仍識月分前後節陽星須識屬前節日木水土紫羅别陰星須知後節期月金火星并計孛又知星曜孰重輕陰陽兩辰皆會合須明禍福發何星主事後先期晦朔若識死時夜與晝限內星辰宜審究陽星興禍夜間亡陰宿推殘亡必晝陽九限逐年吉凶人生災宿稟符陰陽九相逢即此尋求法命宫坐一嵗二年財帛逐年臨只待平期二十五移入限中逐例使逐年吉凶識星辰直至限中方始阻百六限中守吉星符陰吉曜福祥興官榮超擢移宸陛仕庶凡謀必稱情論洞微行年小限要識星行禍福時須在流年位上推起於東出常為例一宫一嵗逆移之交來每遇生日後不問陰陽總若斯流年小限立例始於命宫順天輪而轉次至財帛若在地盤則為逆矣木照金臨皆有喜益財遷職多如意復到二星原守宫凡有所圖無不遂貴人更得一相逢舊祿既加新祿至納婦生兒吉慶門此時自是凶星避行年東出若同此榮進有期亦緣水更看所至主宫星如在高強自然利假如限到午與未日月更為其主星日在長時福即深月遇初生吉無比日短月虧仍有災用兹可以推餘位行年如到火土處口舌資財悉堪慮若使其星復照之困厄須知少生路次第常推第八宫生時何曜在其中如值蝕神并土火遭刑遇溺卒然終或是火月來西沒及因上下禍多同自一嵗從命宫起逆行一年移一宫遇生日即交也不論男女皆同行所行之宫但只看其宫內有何星照臨而消息禍福大凡遇到火土計孛原守宫即為災到木金紫氣原守宫必有遷官進財喜事若到宫內並無星辰臨照即看其時有何行年星來到宫內木星入行年順行即通泰退逆喪服及口舌金星木星同入則君子加官常人財喜或在遷移則有遷轉出入之喜水月同入得女人財君子遷榮火入煩撓口舌土入三合有惡曜主刑禁火月同入主傷墜驚恐土月同入主冷病或痢疾火入行年在日宫則君子遷官常人男女得財稱心土與羅計入多重病連綿紫氣入在公遷進在私財物稱意更是原守則重重喜慶或進人口計都入在辰戌宫孝服官事孛入行年多姦非及迍悶若更原守並無星臨視即看宫主善惡而斷吉凶洞微飛限歌洞微何要妙要妙在飛宫一二本限裏三四對照衝三合五六載其年見吉凶陽宫逆取順行去陰宫順取逆行同三合各一嵗本宫兩嵗從若能用此法端的是飛宫世之術者雖陽前陰後之飛宫所住年分不同不得其法故禍福難憑今得飛宫之法最為有理用之多驗學者却宜用此洞微飛限詳説一二命宫三四妻妾五男女六遊行七八命宫九十妻妾十一男女十二遊行十三四命宫十五妻妾共十五年十六七相貌十八九奴僕二十田宅二十一疾厄二十二三相貌二十四五奴僕共十年二十六七福德二十八九男女三十妻妾三十一兄弟三十二三福德三十四五男女三十六妻妾共十一年三十七八官祿三十九四十田宅四十一財帛四十二奴僕四十三四官祿四十五六田宅四十七財帛四十八奴僕四十九五十官祿五十一田宅共十五年五十二三遊行五十四五兄弟五十六男女五十七命宫五十八九遊行共八年六十六十一疾厄六十二三財帛六十四田宅六十五相貌六十六疾厄共七年六十七八妻妾六十九七十命宫七十一福德七十二兄弟七十三四妻妾七十五六命宫七十七福德共十一年七十八九奴僕八十八十一相貌八十二財帛半年共四年半八十三四男女八十五六福德共四年八十七八田宅八十九九十官祿九十一疾厄半年共四年半九十二三兄弟九十四五遊行九十六福德共五年九十七八財帛九十九一百疾厄共四年右飛限以當生元守星辰看遇吉則吉遇凶則凶若流年又遇吉神無有不吉流年又遇凶神無有不凶竹羅三限竹羅乃山名在天之西北夜半子時諸星列宿皆聚其上判人間禍福李袁二士曽造彼處授書三卷分為三限經若限主得地則富貴終始如一寅午戌宫晝生日水土夜生水日土亥卯未宫晝生金火月夜生火金月申子辰宫晝生土水木夜生水土木己酉丑宫晝生金月火夜生月金火右三方主星取日出沒時分晝夜説竹羅三限安慶信齋有言愚於諸家星限無不窮究或言洞微限好竹羅限不好竹羅限好洞微不好禍福分兩岐更不敢斷細推竹羅限其理優長竹羅限有三不驗較量生時不正一不驗也星辰過宫不正二不驗也交限不得其理三不驗也愚謂信齋之言最為切當然竹羅洞微兩家星限不可偏廢當兼而用之洞微大限只看本宫所守星及限主然求流年災福全在飛限兩限當以竹羅為先飛限次之若兩限俱好妙無以加或飛限好竹羅限不好識者自當權宜輕重其説可也起限太極肇分天地位二氣斡旋生萬類中有人為物最靈均受五行之秀氣昔賢立法考陰陽日月推來理味長竹羅三限從兹得不識其原謬較量命中三限最難分時人將作主星輪不論陰陽宫宿度但從命裏起周旋若從命裏分晝夜十二宫中子細詳寅午戌兮日木土夜生木日土為強亥卯未兮金火月夜生火金月最光申子辰兮土水木夜生水土木為良己酉丑兮金月火夜生月金火相當此星名作三方主當從出沒細推詳三方最樂七強位切忌納音四煞藏金星四嵗土星五木三水一火二數太陽元是火之精太陰便是水之副二法各取水火行便是竹羅三限路開端隔節數三宫逆行零順幾年終若見逺時數二節零年交入甚宫中但看當生星曜斷善星為福惡星凶零年順轉逐宫移遇交限處便交之中限便從本限起依前又數三宫止零年順轉逢末限末限又如前限起零年順數尋惡宫惡極之宫生即已一如土為初限在己上便從己上起五嵗大數十五在卯二十五丑二十六却回寅餘準此更要在七強順旺廟樂不宜五弱留逆經云三方陷弱其人空貴無官一主高強此命永成善慶假令大紀二年戊子嵗十二月初八日卯時生即丑上安命歌云己酉丑兮金月火又云夜生中即反其初其人小寒節過十二日生可作夜生人起限月金火為例是年六十九嵗火命人限星到寅即長生限也三限用七政行年例水星限二十四年木星限三十年土星限二十六年金星限二十六年火星限二十八年日月取水火之數己上行限各就其本位行其數若未交星即管數到第二星交是交宫行限須四煞宫方敢決人死生四煞乃本生年納音沐浴死墓絶宫是也日限日限土臨日不宜夜生交此多傾危日生尋取一周天每遇惡星難更延日限火入計羅位或主傷殘或法終或若滿用即堅固深災過了却亨通日若為限要滿用更臨旺樂明健宫貴者驟遷愚者福福中又恐催人促若得後限來救之却向中年多晚祿日限怕逢納音煞夜生更被羅計侵不惟家破兼無壽金火臨之主犯淫月限太陰行限土同宫忽然相望也為凶本原易散無根蒂此限才交命即終假使交時須未死行宫逢煞命須窮愚者臨斯應夭折清高之士吉還凶惟有太陰好水星木金紫氣共同行更臨旺樂無刑尅月宫高折桂枝榮不惟福壽如山海輔助明君萬國寧木限木限當生遇火尅更被孛臨全減福小人此限死無疑貴者交之須失祿更看後限不如前此限應不到周天木限若逢計與羅自然財散祿消磨忽然值限無星救憔悴危亡怎奈何木限官宫金主命榮貴崇高增福慶或被火孛來衝破促壽敗官事不寧更有同宫木火憂晉魯吳宫與鄭州相貌僕馬遭撲殺三九宫中謹逺遊凶星守照難歸舍縱然歸得命難留毒藥惡疾來相及限主元宫此是仇火限火若為限會於木此限之中即發祿貴者遷榮駭衆人小人遇此多財榖當生首尾不相交體大安寧兼壽足白羊三宫及卯丑其宫明淨十分福火限用金無雜亂金數加福乃榮遷後限若踰三四位火無長焰不能延火若為限主離財夜裏生人尚有災或若日中憂壽促那堪尾曜來相觸自然破敗心多愚易盛易落時消福一箇周天子細推縱有深災命也危計都之次有羅㬋忽然逢之主徒囚或更滿用占強宫後限強臨須福佑土限土若為限不宜逆死敗危亡須嘆息縱有吉星救不得斯人夭折心多惑或為夜限孛星來此限交時的有災更有太陽相對望器小無情禍有媒不惟壽促兼無義雖然內美外無財惟有土星好四處子午卯酉四宫排金限金星行限火來侵斷定斯人至死淫更被孛來同此會定傷筋骨復傷心偏惹是非迷酒色促壽亡家百禍臨首尾同之主滯多須交妻子不相和若在吉宫逢救宿縱有深災怎奈何忽然熒惑會於金私期暗約主姦淫有時刑法及傷殘只怕羅㬋計孛侵火金為限若相會限星滿用福為最或在死氣沐浴鄉淫欲為傷夀不長更被當生暗曜侵刑法相殘百禍臨交限更交元氣中生時忌曜復來衝死見氣勞并吐血或主傷殘或法終慎者全無知者半智人能悟夀延從水限水若為限怕逢孛水厄氣勞并風卒四刑星照膿血終三九宫中失骸骨或居第八十二宫死敗加臨疾似風若得滿用居旺樂為官食祿爵彌豐總限限星明健命有氣安然享福無災否三限當生俱得力終身福厚無憂戚三限只得一限力一限所為多利益三限忽若兩限強只得兩限福榮昌交入當生無力限去者福兮來者殃初限若居無力地年年常是見迍否中限不力憂夭亡自然財散亡家計初中兩限俱低弱作事難成福銷鑠若能知命學修行末限微福便安樂生時三限俱無力定是終身無子息若非僧道作間人一世孤貧怎過得限星怕忌曜又忌在沉沒宫卯為沉酉為沒又忌在無氣死敗宫主多災家破人亡帶疾夭折孤貧餓死三九宫主旅亡在六十二宫主撲傷三八宫患手足疾即延年也九宫好間遊逢暗曜則偷盜姦淫十宫火星犯徒金星姦淫計都法死孛星決配智者倣此妙在變通不多言矣三限各居明健方頓然發祿異尋常更得四元星助限榖粟錢財金富藏限強更得吉星照立事成功服萬方後限更高無戰尅封公公上又封王限星得力要垣星有限無垣亦何憑定取限星明健處垣星入限始為精三限四元時命併臨官有氣夀康寧不惟易發登榮貴更逢合格主長生日月若逢吉曜臨明朝執政伏民心後限忌星臨破却自是官高被謗深人命三元與限同須看有氣占強宫身命三元無煞曜星辰縱陷祿重重又上貴之人看第十多是太陰并限入木星金水一箇臨限主傍宫躡科級若得限星無雜亂須為當代秉鈞衡水土星高主性靈或然作限更為清水交日月足文學自然才譽振英聲文官須得限星強木金水月臨照傍限轉行年相會處科名遷職總相當後限不明宜換武免教失祿及恓惶貶官罷職以何憑看取生時正限星若犯忌星并忌宿行年到此自災生最凶孛火如臨限早年遁去保前程凡人三限惡星臨此限才交禍便侵更被四刑星守限沐浴星宫子細尋更有十二六八宫行年到此見閻公忌限本處有些力更加吉宿庶無凶忌限當生占七強雖見深災未必亡行年復到惡星度魄散魂揚似醉鄉限惡宫中逢火羅不惟促壽更奔波又犯四刑星守照王法須遭暗折磨子午卯酉最為弱壽福家財自消爍若遇行年相對時莫教忌曜微照著任是吉星災轉加本宫旺日死無差此限若為三四用終於原守莫咨嗟限若無力空性靈官祿宫逢暗曜星浮沈之人雖得力事公階下度平生死氣二宫兼沐浴須知心下不分明不然遊藝或僧道若不浮蕩有虛名水火限來沐浴宫火胎在子事還同忽然作限終身福莫比諸星例説凶限星陷逆本多凶若然不死大貧窮惡限破家刑骨肉不死必然末限通初中限當死而不死亦主家破生災失財若是末限好必超出初中交末主方吉也凡限星在三六八九十二宫為陷對太陽為逆多凶害也限居二八惡星躔須教腳手見攣拳十二八宫限火金太陽同守忌星臨定須帶疾并傷目不然廢疾或傷心火孛同宫并守限只怕刑星四餘侵若不雙盲定主夭衣食生來却稱心大抵凶星臨限時不惟自折更傷兒忌星行限福星救却增壽算滅災危夫人三限忌星刑只恐斯人性自靈頑惡癡愚隨限沒智明精妙却延齡人生若得限星強一生康寧命也長若見多災偏聚散直推三限細推詳學者精窮自然悟星辰之祖此中藏限星怕忌曜又怕在沈沒宫卯為沈酉為沒又忌在無氣宫及死敗宫若在三九宫主旅亡在六十二宫主撲傷在三八宫主忌失足之疾即延年限星若圓淨明健又在七強宫則主富貴雙全壽數綿延也貴人改動重臣出入要先知三九宫中子細推行年限入終當動凶吉星臨善惡移明健入垣為本限如臨吉宿發無疑限惡星臨如會此停官失祿禍須知貴格行年上貴之人限星全先要仁元與壽元得入正限及身命貴祿二星又相連或居四正高強位更無忌曜可修仙若不修仙須弼輔兵武星高主立邉或被忌星臨照破也為給諫主文權武星高者有將才文星為限主儒魁日月分明金水會片心忠節應三台金為兵火為武木為文土為主賤格行年忌星忌曜同行限才交此限多魔難更犯死氣并沐浴六親刑害資財散或時所守沈沒宫自刑自害多凶卒更向三宫與九宫客死他鄉無骸骨六宫十二傷肢節高險須防驚墜失此宫星曜不堤防心愚祇是便無良陰陽二曜全無救終身貧窘走他鄉有福聾盲并吃啞手腳攣拳却免傷少年忿欲行姦盜老為餓莩及孤孀倘若無疾為傷斷促壽亡身上法場行年災福行年限裏惡星來悲憂如醉沒心懷二惡星臨災兩犯三惡星臨重有災若臨財帛資財失交於人命多災疾第三宫中損鴈行第四父母訟災厄忌星忌曜會行年浮泛凶星小不寧若是當生原守惡不惟破敗更亡身三限行年到何宫分凶星主災二凶二度三凶三度若當生限明健行年逢凶則災半矣行年入二宫損財三宫損兄弟四宫父母災或爭訟八宫疾病九宫逺行失財官非訟厄五七十一宫防妻子災十二六宫主危險四煞宫主災當生限好逢此惡星謂之浮沈凶星小小災疾忌星者日火夜土忌曜者木忌火孛金見火孛災淺火忌水孛計羅水忌孛土忌孛及逆太陽忌羅計土孛月忌火孛土論遊年星辰入命限遊年星入限宫來或則為祥或則災本限吉星當日月如遭羅計大為乖遊年莫犯忌限中又論當生本命宫入命對宫尤緊限星辰凶吉最多功紫羅金木福榮昌孛計火土禍兼殃八位尊星行度數行年入限定災詳忌星羅計與孛星單守百六保全生遊年重疊臨命限或加金位命當傾欲識遊年理凶吉算星交入命限别或是入到原守宫入宫之日星方説遊年亦論滿用星來家命限福祥興但算臨宫住幾日凶星滿用反康寧論童限一命二財三疾厄四妻五福順行流六嵗却從官祿起看看移到命宫休急腳限例子起亥丑起寅寅起己卯起申辰起卯己起午午起酉未起子申起戌酉起未戌起丑亥起辰寶瓶在亥丑居寅人馬來蛇蝎奔申天稱在卯雙女午獅子金牛蟹寶瓶陰陽戌地金牛未白羊居丑亥居辰但向命宫尋起處一年一位掌中輪不論男女皆順數行年逢煞命難存子午即是黃泉路卯酉呼為二八門限到煞宫人便死若無惡曜主災迍假如子上安命即亥上起一嵗酉上一十一未上二十一零年順數節節而去即不隔宫如算小兒體例一般最怕與限星併大小運併在子午卯酉宫及本命墓煞三刑宫論黃泉急腳限黃泉急腳衆皆知兩樣推尋識者稀急則順行還逆轉若能曉此是真機世人皆以黃泉急腳為一限不知分為二蓋順行則為急腳逆行則為黃泉若能曉此是真機也論斗底急腳限孟二仲八季加五但向命宫相對取一則呼為急腳限二名黃泉檢死簿死絶之宫逢限凶大忌運限入四墓忽然大小運相逢即時趕入黃泉路如大小二運入墓者極怕此限男忌辰戌女忌丑未凶此限專忌入墓運順限逆運逆限順如命宫納音及太嵗入墓鄉極凶更忌三丘五墓大算須知倒限年海風吹動釣魚船火羅孛土皆臨限此地催人下九泉倒限之法自古為信然但以諸星推求如諸限皆為惡星相照死無疑也論倒限論當生之限主星限宫星及小限次及行年星數四殺三合推之若皆凶星照臨可定其危矣若有吉曜救助亦當分其輕重而詳辨之西天聿斯經人命生來稟星算厯數幽玄妙難斷須識西天都例經理義分明有條貫但問生時日宿宫加向時辰回視東天輪轉出地輪上卯上分明是命宫因之以配十二位十二位中有高貴卯并己午最高強子酉之方次強位寅申頭上名近強未亥微看三合方此方照處有不照七曜皆同貴此鄉辰戌二宫名惡弱星辰不欲照臨著一切加臨落此宫資財福祿盡消滅第三宫中號間極五星不得纎毫力惟有月向此宫生却向命宫添福德七曜陰陽各三主強弱輪排依此數白日生人見配之夜則歸宫求類取陰主三方月火金便為陰曜福其陰陽主三方日木土白日生人貴為主夜生白日背陰陽福祿不堅難積聚西天之法重三方生時貴欲在高強三方若得居高位居宿之中各福貴忽然七曜並相當超騰必作人中瑞金木二星為善星所為非主亦為榮火土二星為惡曜三方切怕他臨照夜生陰宫主光明晝則陽宫最為妙夜忌土星晝忌火各自相逢斷為禍火在陰宫土在陽縱有災殃還較可獨有水星本無定見附近處即為性附陽即陽之相輔附陰即陰為害病與日合照主榮貴巧妙聰明難比並木為文兮火為武金為兵兮土為主五星見月即非常三主居高必台輔諸曜皆言在強位更要七星乘旺氣日旺白羊十九度月旺金牛第三位土旺稱宫二十一火旺磨蝎四與七雙女辰星二五中金占魚宫旺在室星七度與栁十三太白流之實可堪木向蟹宫初入鬼旺氣相成主崇位各於旺處逢一星出入旌旄主權貴更加所好轉為精木樂尾兮土寶瓶金愛牛宫火重蝎水居雙女最為靈生時一宿皆臨照即為豪貴處王庭五星見月三方主要得居高生旺處陽生向日陰生月將相三公必無慮又看生後三日宫月到何星分度中金木相逢主文學聰明必見水星遇更遇善星作宫主宫主復來在強宫此為有福無難人一生所為稍皆遂忽然三日月逢火推命之中最為禍第一損壽二損財迍厄顛危常折挫更遇土星相合地終身坎坷多迍否木曜縱橫不照之壽終不得夭然矣相貌福德宫又别晝生從日夜從月所取日月相去宫還從東上配其宫所終之處為相貌即看何曜在其中若遇善星更月照福壽堅牢添祿料又兼金木作宫辰復在高強最為妙其次又看相合地土木金兮同一位忽居強處照其人的作公侯得榮貴若逢土木水合照性直文章主巧妙忽作熒惑反相刑即向命宫作凶兆土木同行生在晝更向陽宫富貴有夜生若向陽位中變作迍邅作凶咎土金合照福堅牢性潔難婚亦貴豪金火合與照強位華鮮衣服志居高火土合兮有學祿智慧多端好反覆木火同宫主貴權為事心中多敏速木星合得好資財容貌端嚴志多惑月合木兮自遷榮月加即好減差平火合日兮生在夜日在火兮必權霸木星照曜定封侯却向武中稱善價火星合照最超殊貴顯堂堂出衆徒火合月兮生在夜縱然殘減亦分符木照更能添福德豐厚多財貴宗族月火照兮每倍加常患瘡病在其足同宫一處見土木火不照兮足財榖忽然兼居土术宫主握兵符多侍僕木金祿厚有慈貴名高美貌足財榖水日同宫或左右必豐學問足文辭水木同位又同行高才博學任公卿月木同宫位清列又在日前更殊絶生時值火伏同宫先代家財盡消滅福星多處必財豐惡曜還生貧賤中第六位兮對十二兩宫就分各凶忌生時七曜居此宫一世貧窮苦憔悴白日生人火占高與日復來相對視夜生土曜亦如然短壽孤窮登望位月落惡星分度間惡星高處善星間三方不照五星伏必為賤𨽻處人寰更有五星相對視就中五星為災瘴相對在強并在月中年困苦多消竭濕宫水照投江湖乾位蟲狼多咬嚙少男少女少資財多疾多迍多口舌或遭毒藥兼臨刑了了經中皆具説曜經宫中陽為土復在陰中更辛苦火金相對不宜婚金月相照却宜婦鎮星對望詞蹇澀為事尋常濫心腹火月促壽及風狂火月自傷仍尅父水月猶自厄言辭土月對宫不宜母火星同月轉就土土星照月轉就火火月同宫皆深禍不然同在十宫生或守月行西沒墜此為夭折貧賤人又更防災家破敗星運要知災福時却向行年宫上推行年初起從東起還將一嵗一宫移每嵗皆須就日生數至今年宫上推木照金臨皆有喜加官益職定無疑更到金木原守處木金又照復何慮必得相逢見貴人舊祿重加福自新娶婦孕子貴門庭運縮盈虛皆有據行年東出亦同占水加原守喜同兼身命二宫皆要木金星同照喜加添更須促取行年至善星高位福同住但行獅子蟹宫位日月便為宫主是日貴長時福即多月到初生喜來至月虧日短為厄時須向心中明作計土火生時原守宫行年命運到其中口舌資財須詳忌不然憂怕事關心如今火土又來臨厄難慮忌不相容末後相看第八位生時何曜守其中若遇曜神并土火多為法溺促其終更益火月來西沒或居上下禍皆同生時不欲星辰弱善惡之中皆減力退留伏守不如行對合宫中皆好亟十五度中皆正照過此還同不相識近轉得好福堅牢推命之人貯心頭五星照守近南方少年得祿恐非常好曜初星皆西沒早年祿後與倉卒惟是火星莫照西即知不得終簮笏生時土火在西方所招凶禍難儔匹更有加臨虛沒位須多理曉其中意人生禍福皆前定分數無逃於天地但知子細認其歌更盡經中玄妙義起竹羅三限假如日生人寅上坐命寅午戌兮日木土午為日方亥為木方丑為土方此即三方主謂之三限便從午上起二嵗管十年太陽從火論火數二逆數亦二故十二在辰二十二在寅零年二十三回卯順數二十四在辰二十五在己二十六在午二十七在未二十八在申二十九在酉共二十八年三十及三十一三十二停住三十三交木限在亥管十年木三數四十三在申五十三在己各十年木無零數六十三六十四停住六十五交土限在丑管十年七十五在申十年逆數五八十五在卯零年順數八十六在辰八十七在己八十八在午八十九在未九十在申共二十六年通前是三限一周餘倣此推太陽火星限二起逆數亦二各二十八年太陰水星限一起逆數亦一各二十四年木限三起逆數三無零金限四起逆數亦四土限五起逆數五金土二限各二十六年星學大成卷七
