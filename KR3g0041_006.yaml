body:
  text: 星學大成卷六明萬民英撰安命論星家源流以太陽為命之所自出太陽出夘故人之立命亦在夘不知太陽出夘者舉大較也以大較例人安命此命之所以不準今以太陽東升考之小寒至芒種小暑至大雪俱出夘若冬至後十九日晝極短而出辰初初刻夏至後十五日晝極長而出寅正四刻人立命既以太陽為體則所生所出時候亦當隨太陽推遷以余觀之凡日出夘時則立命在卯若出寅辰則立命當在寅辰通闗加盤俱因輪轉方足以體造化之妙臺厯首論十二宫立命専考對度余命太陽在斗十九對度是張一當以張一度立命是也況太陽過宫處毫釐之差宫分判然又不可不細考也十二位論三辰論十二位高下歌當生日㸔在何宫加向元時回視東天輪自轉地輪定夘上長為命所宗然後配以十二位其中昭然賤與貴巳夘午上為最强子酉之方是其次寅申亦以近名之三合要㸔亥與未此為照處餘則非吉星要聚凶星離辰戌二方稱惡弱天象奚堪下臨著善曜何常能致祥凶星好事渾銷鑠第三之宫號閑極五星不得纎毫力惟有月在此方生却向命中添福徳十二宫高下乃逆數也凡吉凶星曜在命三合及對見之則力𦂳也丑之為位乃在癸水之末且其為土又是虚處水遇虚則明故宜於月雖曰閑極實可為用比其他星曜所不能及大抵以夘為命則當從此推之在餘位者固不可執為例也論命宫主星歌本位無星理對宫縱橫三合理皆同若無一宿推宫主宫主星同斷吉凶如人命宫無星者但㸔宫主星在何方若在七强宫更在廟旺亦主富貴若在五弱宫并留逆段或作忌星主貧賤或更與惡星犯身命不得其死矣論身宫主星歌古人常重在陰陽此法推來第一强日向東生為命局月從西出作身方今人只筭在身宫但把當年月位終理謬不知真造化枉將心力妄推窮造化身宫源流皆有自來今之論星皆以太陰坐處即為身局是為淺陋夫身宫者與命宫同即以生時從太陽數至夘則為命宫胡不以太陰數至酉為身宫既以太陰生處即為身宫則當以太陽生處為命局此法甚長余世家之學每每頼此論身命宫歌身命第一號高强惡曜偏防犯此宫日忌火兮夜忌土不宜十五度中逢前後最嫌逢惡曜吉星釣月有光耀更加金木作宫神宫主尊時第一妙天之稟賦實根原身命二宫人之操持亦憑賴陰陽二宿身命二宫防惡曜之侵陰陽二主忌凶星之入擇其尤者則日生重太陽夜生重太陰推其至者則男人重身女人重命然十五度中而遇忌星加宫主星無氣必然禍起災生此論甚審論身命二主十二宫中惟身命二主最為利害論五星先當輕重乎此夫主星如魚之水木之根魚無水則死木無根則枯身命無主則危此理甚明論主星者畏刑煞忌陷弱如或逢煞與刑逢陷與弱欲長年享福將何所恃必然刑害夭折凡論主星一喜逢禄二喜逢貴三喜逢生四喜逢廟旺五喜高强與善星並立遇此者必功名富貴若陷入遷移必主流蕩在疾厄主傷殘臨財帛多積聚入田宅則田宅萬頃居福禄則福禄有餘入奴僕則奴僕不走與善星併則先艱難而後富貴若逢惡曜斷然貧薄隨驗隨應余嘗試之而屢中也論星曜同照命宫金木水同宫若臨廟旺樂度主文章秀麗聦明智慧清職品序貴格金土炁日月同宫若廟旺得地主蔭潤福禄龎厚性寛處世温煖也金火水孛日同宫若陷沒主尅父尅妻平生多蹇金火羅同宫得地則貴乃武職品序若陷沒反成蹇破招刑火土計孛同宫若陷沒主凶暴夭刑若非兵權武卒必難保平生之福金木火計孛同宫則曰疊刑主人成中反破福中反禍尅害陷禍多蹇招刑日月羅計同宫則曰蝕神主人損尅父母若在第四宫必主破相兼主權性暴出身低㣲偏生庶出土孛計同宫若夜生更陷沒必主夭夀卑㣲下愚狠毒主刑火土同宫不問日夜若陷沒宫決多蹇破孛計金水同宫主性姦雄淫慾酒色招刑是非愛憎臨身雕身不足舉此十例其他尅剥皆准此論星曜合照命宫木金水合照主聦明文藝性多巧伶俐貴氣文秀日月炁合照福禄厚重享福豐足火土合照主性靈不藏事得地則聦明陷沒則凶暴羅計火土合照主形性膽氣凶暴雄豪若為武職主威權日月合照主大富貴為人材貌英偉聦明近貴且舉此五例若有一星臨之須詳前段星辰論其禍福隨宫分𦂳慢而言之也凡論五星全在於命宫分野宫度然後論其身宫主星禄主星三方三限主星其星辰禍福子細消詳廟旺陷弱而言之也歌曰土日同方生在晝更在陽宫當富有夜人倘見落陰鄉作事多艱是殃咎土星合照福堅牢好潔難婚亦貴豪金如㑹火守强位性𦂳貪華性更高水與土合有學禄智慧無窮愛畨覆木火同照主貴權設施驚衆誇神速木金宜得女財多貴貌端嚴心多慾此二星在命宫或對合見之主得富貴貴而多妬日在火兮生在夜若㨿火西必權霸木星更照定封侯尤於武庫増聲價從來日與木同塗貴顕成家與衆殊夜生月若火相㑹縱然殘減亦分符更向高强逢著木名達財豐真貴族火如照月當晝盈却苦瘡痍每煎蹙論星曜對照命宫歌更推星曜相衝望就中火土為災障對在强方并見月中年困苦多消歇濕宫水照當憂溺乾位却須防獸嚙少男少女少資財多病多迍多口舌或遭毒藥及刑傷了了經中皆具説東南巳午為乾宫西北亥子為濕宫諸方最怕陽對木復在陰宫更勞漉金如望火不利婚若使迎陰却宜娶土星衝月蹇語言作事多妖難與語月如見土夭并狂見水其音為吃苦火日自傷先尅父土月須知不宜母火星對月轉就火須信望中俱作禍火月或土對土月或火對及月對土火是也不然共守上下宫或伴月行西沒過此為夭折寒㣲人縱使暫成終亦破流年星與限值及太嵗相宜則有如意之事然根基淺薄終久不利也按此節専論日月怕見火上亦須分晝夜而言之論財帛宫若見金木日月主豐足温厚富福經云足禄多財木星與太陽同㑹平生不耕蠶而衣食具所謂生居豪族世無虞出有輕車食有魚福夀厚高天與佑平生萬事稱心如金主得妻財月常有財帛多成敗不積貯日多積蓄星聚為福忌土火孛計水臨照此宫或臨巳午之上更有火土之照決多蹇剥土主耗散縱得錢纔滿必傾若吉星合照同宫不妨四十後五十㣲發經云火居財上旺年年中主交時即不堅若得吉星三合照中年破得末團圓月孛生來少積貯假使中年承祖宗付托有如三春之花正開時被狂風猛雨折了若有吉星照視方免破敗計求財如縁木求魚隨得隨喪多成多敗中末却主旺水主初年耗散經云財帛宫中遇水星如人把火照霜冰第二宫中逢此宿初年囊槖盡皆傾水星生旺莫臨財進退難逃主有災縱有資財千萬倍如人把火照氷開别有吉星轉助則可若見水星獨臨陷沒必多破敗祖業論兄弟宫兄弟只論其和睦與不和睦今人多愛問幾兄弟若與他分其數目則失矣兹見日月金木炁則兄弟慈和友愛日喜於陽位則福𦂳夜生在於陰宫則禄慢月主有兄弟姊妹上下和睦無尅害月在第三宫號為入廟經云第三宫中為閑極金主兄弟三人姊妹二人皆得力木主三兄二弟孝順和睦無尅只忌羅計孛火土必須尅剥當自立也羅主有兄弟三兩人亦得力主大貴計有兄弟不得力若獨行則兄友弟恭孛總不得力縱有亦爾東我西相見如水火與他人一般只宜自卓立水難得兄弟力土不得力論田宅宫田宅亦為父母宫若見日月金水炁福星臨之得地必主滋蔭享上人之福經云多居産業金水木照田園金主有祖業父母具慶衣食自豐水難招祖業自立方旺木多居産業父母全月主尊親有夀宜居祖業忌羅計火土入宫分必須尅剥父母不然主過房庶出破敗祖業破而再成也羅自宜卓立更有吉星照臨則家道大興計祖業難靠宜自卓立如炁木二星傍照不以此論火不得祖業賦曰少失資財金火同臨獅子位獅子非午也葢獅子乃官禄之位對照田宅在子位也若吉星則禍福又異土雖紹祖業亦尅父母因田宅争訟孛主尅父母有祖業終破敗若居次胎則父母無碍更加土計同宫則主過房偏生經云田宅宫中土孛防三方閑極可悲傷此身若不為僧道却喚他人作父娘又云土星月孛居四鄉合招異姓作爺娘不是偏生婢妾養東房移過喫西房論男女宫第五宫中號男女最忌孛計并火土必然尅剥少女男若非外姓應難主若見金木水日月必主貴子俊麗之男金長宜見女次則男貴主有三男二女或晝生人或在寅上名為愠怒兼六已人宜見異姓之子木主少女多男日生則多夜生則次男聰明智慧女四徳兼全水主有四子聦明端正至老得力如在戍位則宜偏生過房桃花夾竹異姓之子若六壬人見之即主二男二女須詳吉凶星斷日主五男二女至老不尅六壬人見之謂之魁星倍加福力月主男得力若被羅計照破則主遲晚或長見女若在夘酉亥未巳者不怕惡星若見月孛必主尅剥經云子孫之位怕孛過無男應是女生多若得善星來照視晚招一對定應多孛主女多男女遲見方保六丁人此宫見之全無縱有亦不得力如有吉星合照不妨若太陰相對則主男大貴女封號日生則減力火主二三人若為土星首尾合照或白日生人六丙生人全不得力主孤寡土主一子若入廟則有二子忌曜則減力炁主有男女宜遲此星亦名孤星計男女少若早見則定尅晚年主一子羅不宜早見經云蝕神臨子最難為得力還招外姓兒假饒若過三旬外親生一箇是便宜主桃花夾竹偏生過房惟六甲辛壬人主三男二女至老得力若六巳人此宫見之全無子息縱有不得力又論命宫福星盛旺必主子息之盛若見凶星惡弱必然蹇破經云妻無子息都縁月孛在七强凡論女人子息大槩與前同惟巳午宫坐命曰乾宫若見計孛忌星則主難子不生或亥子坐命曰濕宫若見金木土星多主子息三男二女之數論奴僕宫第六宫中號惡弱五星不得臨照著一切加臨在此宫福禄資財日消鑠凡星辰皆不喜此一宫若得善星在其中福力慢主奴僕侍從之福金木得力定主少年尅父母水主有奴僕鞍馬中年走失土有奴僕多走失若有木星同位則至老奴婢成羣羅主奴婢自然豐厚一呼百諾日一生得力若見計孛火土刑星反遭其害計常被脫賺孛不得力多走失火有奴僕不久逺六甲人見此星者所謂禄主臨惡弱之地難為享福若魁星科甲三方高强無慮此宫若科甲魁星官星學堂禄主一切星落此總不得力論妻妾宫妻妾一宫與命宫相對又曰西沒宫㸔此宫有何星曜若見金木水星則主美貌夫婦和睦若見火星計孛必然尅破陷害又況金為人之妻星㸔金星落何宫又㸔善惡星相㑹言之若㑹木水必近妻家財妻之蔭潤或近陰人財若同火土計孛必多尅剥經云尅妻害子太乙與首尾同宫論疾厄宫第八宫中號疾厄忌見計孛并火土忽然陷沒更疊刑難免疾厄終身禍如有福星來解免尚且疾中難可保若無救療決生違至死必須還尅破君子貴命見之多主脚疾股肱之患終身常帶氣血之疾小人則折脚眇目拳秃駝腰官刑徒杖之禍女人多招産難血氣之疾至重者亦至身疾金計相㑹男女多主雕青痕痣也論遷移宫遷移主行藏喜金木炁福星臨之主君子遷官進爵經云欲問榮華大扺金居九位凡見善星臨之處世行藏皆吉若見凶刑忌星主平生多歇滅縱有官品常多蹇滯若見忌土多主九流商旅㳺學紫炁土星並係客星此論載靈臺經論官禄宫第十宫中號官禄若見善星多富足貴人職品必須高小人必近食官禄凡貴命又㸔宫主是在何宫却分品序此宫若見凶刑忌星計孛陷弱反成不足職卑命薄也論福徳宫十一宫中號福徳若見吉星須享福加與金木紫炁同更在强宫必為淑若見計孛火土必多蹇破亦多主福中之憂禄中不足縱使富豪常有意外之不足太陽福徳最為竒白日生人喜得之五福俱全尊上徳貴榮三爵福無涯専論福禄二主人元當生之年稟賦者十有一星安排者十有二局十二宫中所要者惟福禄為主十二局中所重者惟福禄二宫今推之五星質之人為凡有卓立功名致富貴者而此二宫未嘗無吉曜而福禄二主星亦未嘗陷或禄主歸窠或福星歸福或帶吉而逢生或歸徳而帶權或入廟旺似此之類往往皆是豈福禄無星而可耶如其處世孤貧為人流蕩以其福禄二宫驗之未嘗有一吉曜而二星亦未嘗不弱或禄主背命或福曜逢囚或禄宫帶刑星而黨立或福徳帶惡曜而傷殘似此之類往往皆是豈五星闗鍵而不在此二宫耶再論福徳宫變格福徳一宫人莫窮晝生從日夜從陰數取日月相去位還從東出配其終數盡之處為相位次㸔何宿守其中若遇善星相對照福夀高崇禄料豐又兼金木作宫主福徳高强福更隆見西天都例經福徳者為身命之根源吉星聚此則福夀堅牢惡曜臨之則命浮弱吉凶如響凡推其福徳宫日生則從太陽數至太隂夜生則從太陰數至太陽數其相去幾宫然後從命宫數其相去宫位即為相貌次則福徳若正坐高强復得吉星為本宫之主加以文星又在高强必然享福無窮受禄綿逺再論相貌奴僕兩位相貌奴僕非高位兩者多縁凶與忌當生七曜落其間一世孤窮苦憔悴晝裏生人火占高月最不宜來對視夜逢土宿同此推太薄如何望身貴月在惡曜行度間惡者復强善者閑三方不救五星伏必為賤𨽻處人寰論相貌奴僕於理為長識者宜詳味之定三日宫若下胎元宫不下三日宫若下三日宫不下胎元宫三主高强福禄昌文星㑹命貴人鄉更逢紫水臨其限少年及第佐朝廊三日宫中紫孛羅三方辰戌更相過若被忌星來照著定向三朝損命多三日宫中居惡弱更加凶曜在其中吉星不照難延命縱然不死患重重三日宫中土孛傍三方閒極可悲傷此身若不遭迍否定教他人作父娘三日宫中水木星平生聦俊佐王廷三方若在高强位金榜無疑定有名三方始得力羅紫命中行縱然為文職須當帶珮行一生身命處高宫三方精徹在其中官禄遷移吉星照員郎給諫至三公三日宫中晝火星夜生遇土一般同紫炁限星如交著定見危亡三嵗中火星有夀只三年縱得成人被禍纒大限不到三四十須交十五入黄泉更㸔生後三日宫月到何星分度中金木相逢俱是吉若交見水性偏聦善星更作身命主復占强方不失度此為有福無難人一生謀運何嘗阻忽然至此却逢火終身豈免興災禍第一損夀二損財所向多乖遭折挫更坐土星同照地常時分外生迍否木曜縱橫不救之禄筭永終天然矣夫三日一宫最難分别或者以為身命第三宫或者又為日第三宫互相矛盾妄指其説以為竒吁論五星者尚不識三日宫何以論人之禍福夫三日宫者係人一身禍福之地惡星躔之災禍隨至吉曜臨之福夀可期如其又在十五度中其應立驗烏可不詳論之今以三日宫併言之大凡論三日宫先推太陰躔何星宿而後迤邐推其宫分前三日則前三星後三日則後三星也如太陰躔尾宿前三日尚屬斗宿後三日屬房宿此為三日宫甚明而禍福如影響捨是推何星而躔三日之宫乎從其輕重分剖則造化可窺矣定胎元宫太陰所歴過一宫是余按此條有二明三暗之説葢引天機所重者而証己之言胎元宫裏金兼木貧賤性殘當夭促人生不幸定遭之若見時臨傷眼目土火胎元係二明男子遭之則昌榮婦人逢之夫位顯莫教柔曜月前迎金水二星號最柔蟾魄無令與聚頭抱病打傷猶可已其間貧苦更憂愁月過一宫為胎元金木相逢定夭貧火土二交并孛曜高强即是富華人天機數有胎元星三暗相扶及二明必取富豪并世禄其中一半是官人疾病多端見小孩只因金火犯元胎奈何上下相闗照眼目瘡痍競發來身宫胎元紫炁星不是疾厄與孤刑尅害爺娘身自立不然有異見雙生男女紫炁犯胎星且為僧道及孤貧不是雙胎并異母又須刑害尅雙親後扶前引㸔星辰强曜康寧福夀人錯説陰柔凶短折更加惡弱老憂貧太陰却到㑹空辰金木從高性且迍恩及親知成悔吝到頭顧遇有誰人月限犯孤星不救月前方九十度無星對月皆金木水行年又却值三災月限忌土木二交行年不要見後人推步知相識若使斯人禍患來太陰所歴過之一宫謂之胎元宫以未生三日之前月在其中故也亦名生前三日宫此宫有星曜禍福尤切月在之宫謂之身宫未到之宫謂之生後三日宫此三宫星曜照見善惡與身一例言之天機無生前三日生後三日之説只以前扶後引有何星曜依訣斷之則無不驗然只以去太陰二十七度為准在二十七度外雖是隔宫亦如不見不謂扶引也天機更取前一方者葢以十二宫分之為四方則一方者月前三宫是也定九十一度為準九十一度外不是如無强星輔之月限孤矣總龜十二位論命宫欄駕經天柱星飛在禄宫又玉堂貴人宫夘上謂之明堂午上謂之軒轅戌上謂之武庫身命主星居此未可作下流命㸔天柱而羅計同不吉獨行主人身閑若在天門及飛天宫上吉大凡禄主居廟旺之地皆主發禄財主星㑹天柱在弱宫吉天柱命主二星俱入金門宫不必論田宅最好文昌星入學堂主修學如丁巳生人天柱在未名夜劍鋒煞未為陽刃主夭夀凡人天柱帶馬獨行見太陽主人心狂天柱躔遷移宫主人入贅過房遷居離祖之類與天蠱星同主人好訟或天蠱入身命宫主多招訟事天柱入官禄之宫乃官禄入命主星尋官並以吉斷歌曰金星入命夜生吉白日生人減半力木星照命有多般白日逢之必作官夜生若有暗曜雜返為凶禍主憂煎水星在命合入廟夜裏生人太陰照或居雙女與陰陽決定少年居顯要火星入命不堪詳白日生人主禍殃更被孛羅三合照定知啞吃與人傷患勞枉死人孤寡夜生又宜却無妨土星入命主頑鈍夜裏生人不可論水命定知須啞吃黄腫氣疾命難存太陽坐命若逢木羅紫同宫須食禄火星不照定封侯月孛臨之患心腹太陰在命生逢夜水宿同宫為僕射土宿入命孛星來有禄定知非乆謝紫炁印星號天乙凡在命宫皆有益生時不被惡星臨善宿合兮多子息未月見紫入夜宫夜裏生人為輔弼若是土星三合照雖則高强終是疾羅㬋入命計謀多木紫同宫主富豪金木太陽三合照此人慷慨更英豪女人夜生羅照著自縊勞刑貧又薄紫火水計入命時此則定主十般惡計都入命憂火命此則十煞惡無定貴人遇者以無權白日生人宜修進木星紫日如照臨主命俱强為福慶孛星入命人㢘潔目快心清為性别紫木日金合照時所作高强皆有節日生火孛主星㣲決定刑傷蛇虎食掩口不開氣衝人直得為官須歇滅財帛宫欄駕經天寶星財帛者天寶所司㸔飛在何宫禄主玉堂吉見羅計孛火土正忌星反財物耗散怕廢星財不興耗星財不聚陷星及狼籍分皆不吉㑹天蠱星主訟破財歌曰金臨財帛足隨時夜裏生人皆進滋木臨財帛必豐隆日中生者最難逢水臨財帛財帛散更被孛來不足㸔火居財帛與前同土居財帛皆豐亨太陽居此足錢財貿庫常開待物來月居財帛多財帛只怕土星三合尅紫入二宫亦忌之遇日木扶還又得羅計孛入損資財終身不得資財力兄弟宫欄駕經天玉星所司兄弟之宫名為閑極如獨行飛入陷宫主少兄弟或本宫上見羅計孛多凶金木主二人水月主二人紫炁與水星皆善星日生人忌太陰夜忌太陽並為孤宿㑹刑廢耗主尅害狼籍主尅損見火孛兄弟如仇讎大抵男女二命可詳細推歌曰木金兄弟主英雄水星和樂旺門風火在此宫定孤寡夜生不與孤寡同土臨兄弟終和睦日居未可同年語生時父母決相背木計合宫主貧苦太陰若得主星來輔弼榮華由此胎紫臨第三兄弟少計星遇此斷生災月孛來時損兄弟古今傳説禍難推田宅宫欄駕經天富星田宅者天富所司在命宫主田宅加凶宿即無落陷終有亦少强宫廟旺承祖業如羅計孛星土忌刑廢耗星相㑹或被劍鋒狼籍天蠱對照或三合傍照並主破産如飛陷宫主先無後有禄宫玉堂皆是自能卓立歌曰金居田宅父母宫白日生人主困窮如逢夜裏最為吉産業自營邁祖宗木臨田宅興父母自然福夀世難同水居第四旺田莊更有雙親夀命長火星臨此不堪説土星躔入有房廊白日生人為最吉夜生父母早身亡日居田宅足田園木臨雙親夀命全火孛不照多産業水金合㑹常堪憐月臨雖稱旺田地白日生人反作累紫炁居之多壯宏父母一時居富貴木星入位必有官水月合兮居顯位羅入田宅不堪猜十般惡死及破財計都侵之憂父母田莊牛馬化成灰月孛居此亦如之夜生亦可減毫釐晝生又忌火來尅父母早亡主孤恓男女宫欄駕經天孤星男女乃天孤所司大槩與兄弟同推詳入陷宫主遲或刑耗忌星化劍鋒狼籍天廢星並主尅損更㸔犯星輕重太陰在五宫先見女金水多男女羅計主抝性及尅害歌曰金星若在男女宫三男聦俊各英雄火在此宫不得地遇著定來更莫窮土臨第五遲遲有夜生決定主孤蹤太陽若照男女宫必主貴子顯門風太陰居之亦如此三男富貴夜為功紫炁當生照男女不被惡星并火土三合水月同聦俊男女榮華定文武羅照男女主夭亡計都臨照亦災苦孛星倘若照此官十生九死空費乳為人性狠惡肚腸此乃依經與君語奴僕宫欄駕經僕馬星六宫見孛與人不和太陰星入此宫定主卑㣲下賤又惡星㑹極不好天柱星入此宫主閒事勞漉小人反覆不情之態歌曰金木星居足奴僕土若加之夜為毒火在此宫必少力太陰值此多悲哭非惟辛苦有多般決定生時非正屋月若居之被日土一世多迍更貧苦第六宫中見太乙男女頑愚多忌疾不然遲忌亦寡㣲此乃皆言為不吉計羅居此有災殃孛若臨之號凶極妻妾宫殿駕經天對星妻妾乃此星主之忌惡星在此宫主損妻天對之星入陷婚遲此星見劍鋒狼籍及主星皆不吉金為婦星須要明浄如同劍鋒煞主凶亡見羅計主尅害孛寅金申主妻有貌帶官星主妻有蔭見刑星即刑火主重婚土主重濁肥短貌不佳金水秀麗木星長瘦金星逢天耗狼籍二星女命全見主尅盡外家財帛人口之類歌曰金在七宫妻妾好木星㑹此日相逢其妻非但能㢘潔貌白容妍世孰同水在妻宫多妖冶火則傷殘莫論容夜生猶自主離别何況生逢在日中土入妻宫無貌娘妻妾命如日裏霜太陽美貌火孛醜太陰見水美容粧紫木星臨太陰吉羅㬋自縊檢尸傷計入妻宫勞患死不然毒藥溺江亡妻妾宫中見孛星計都水火自相刑兼主蛇傷並自吊不然産難墮青冷火孛瘟黄死暴哀落水懸崖産難灾金鎮太陽真絶妙多招妻妾外家財火土生離并帶疾鼓盆三度請良媒木紫二星多美麗姿容可與孟姜偕羅計二妻産難别暴䘮迯亡自帶來紫孛水金淫慾甚交情奴僕老心灰疾厄宫殿駕經煞難星疾厄者煞難所司如見本宫星主帶疾六八十二同見孛主破相或有宿疾此宫水月同主風疾土計同主脚患土孛同主耳聾火化劍鋒主心腹血氣之疾金忌火傷主血膿腸風之類大凡命宫疾厄是火忌孛星照羅計穿命不問福禄皆主夭折火星大忌午上照身命及天柱星皆不吉歌曰金在疾厄永無疾木居富貴常安逸水在此宫遇計孛必定腰駝并背屈白日生人火曜衝必定風疾吐血終熒度疾厄須驚悸土臨八宫主瘟凶太陽遇計火土孛風癆血病不久歿如見木陰獨照之一世優游無消歇此宫若見紫炁臨定是安榮居要津羅照此宫應篤疾計㑹孛來定凶侵非惟勞瘵又瘟黄抑且吐血卧床亡遷移宫欄駕經遷移謂之近强人命三合宫見土宿主離鄉忌星主貧賤福貴禄星吉曜主經商如見月孛謂之客死星見羅計主偏生庶出過房出祖帶刑出祖不離鄉土若四刑星無紫炁星解救亦主過房出祖金木吉水宜逺行金木合照封侯火入凶土阻逺行太陽主晝生吉月㑹金水夜生吉歌曰此宫見紫主為官太陰合兮為瑞端羅在遊行必見刑家中長見檢屍靈計都若㑹孛星入決定蛇傷并虎擒切聞月孛入遷移損田損宅損妻兒官禄宫欄駕經官禄强星乃司命掌之又為文解恩牒之星士人遇之主發解僧道遇之主披剃庶人遇之主發財置業如下流命本宫見之㑹天蠱狼籍主犯刑法官災小人最怕陽刃官符宫主星相㑹及與的煞狼籍星㑹無福貴二曜救解凡與宅宫主星相㑹皆不甚好更㸔命主星明净㑹羅計主凶死不然㸔有禄無禄大禄小禄大凡主星㑹羅計者主夭不然中年火孛照身命宫皆不吉即賤人也孛星在官禄主貧窮下賤刑憲初主貴末必不好限入官禄宫添羅計天蠱入限或在六八十二歌曰太白金星入官禄一世為官居要軸天上之宫㑹水星太陽合照作公卿水居好樂合於月官居顯位職非輕火在十宫夜入廟朝端定列仍年少福徳宫欄駕經福夀星福徳之宫福夀星所掌宜天權福財照此宫上吉如男女宫得木星紫金水善星照尤佳縁福徳與男女宫相對吉星在廟旺之宫順行為福深在陷宫為福淺最忌火星主傷福徳故也歌曰福徳宫中或見金夜生一世福神欽木㑹太陽居十一禄優福厚居顯秩水㑹月吉火淺薄金土同照主食邑十一宫中羅最吉太陽木炁三合值生則須封萬戸侯死則定知須廟食相貌宫欄駕經相貌當與六八此三宫用推詳孛羅計㑹或主刑害破相疾厄六根不足之命也歌曰土星相貌却烏黃木宿元來瘦且長金白不惟多嗜慾水星行動愛趨蹌羅㬋薄藝隨身有月孛為人帶黑醜熒火一星多性惡水星最是雙眉好計都巧計愛談論羅火東西打殺人水火相隨多雜藝太陽為性却逡巡月孛一生多口嘴水星伶俐木都美土星頑鈍言語澁羅火為人貪可鄙琴堂十二位論論命宫凡坐命宫官禄福徳田財星飛入為吉此乃富人之命切忌空亡的破流霞刼煞不吉必主暗疾破相華葢居此必主𫝊符度法之人六害星辰飛入一生勞碌論財帛凡財帛主度主官禄福徳主居此一生富貴財星飛出田宅官禄福徳宫富弱宫陷地主貧賤更空亡的破居此再財星失陷則食不充口衣不葢身若財帛高强根基厚重衣禄豐隆若六位星辰居此管幹起家之人也論兄弟凡田宅官福四星入此兄弟豪富空亡的破入此兄弟貧賤孤寡星居之則鴈行無伴官符居之主兄弟逞訟華盖居之主兄弟道粧疾厄流霞刃星入則兄弟帶疾破相馬星入則兄弟東西咸池入則兄弟迷戀也論田宅凡官禄財星太陽入此祖業見承田地加進空亡的破入此則産業破蕩或胎星嵗破通闗則兄弟争奪奴僕主入則僕幹莊田之徒或田星飛起官禄福徳財帛之地則富財帛同田星飛起則重賣交易矣論男女凡空亡的破居此則男女貧賤孤寡六害華葢入此則子女如石中求玉流霞刃星居此則男女帶疾若居女位女必産亡咸池星入男女迷戀田財官福居之男女豪富遷移星居此男必過房女必重嫁然陽宫男多陰宫女多論奴僕流霞的刃刼居之主奴僕有疾長生帝旺則無災鬼宿居之則奴僕偷竊論妻妾七宫隨禄妻有粧奩因而致富家業興隆空亡的破居之妻性不常若逢木星生旺不是為煞招妻俊雅炁計居之妻醜頑抝孤寡星居之必孤論疾厄此宫乃八煞宫若火星入之無制主人一生多難月到見煞母有疾日到見煞父有疾五位飛來男女疾三宫星來兄弟有疾七宫星來妻妾有疾流霞的刃煞難居之主帶疾不寧於厥身也論遷移本宫忌孛星居之主離祖遷轉無定身命主居此必當離祖過房三位星居之兄弟離祖女見桃花煞居此有合則不良不然必嫁逺夫并陽刃居之則離鄉别井論官禄身命二主并財福居之則禄位高强的破居此不吉三位星居之兄弟豪富論福徳本宫田財身命四星居之主清閑享用有福之人也的刼飛來有福不能享流霞亦然論相貌此宫名弱宫身命官福田財不喜居之臨官帝旺金木水陽居此則狀貌青秀若刼的流霞居之主破相星學大成巻六
