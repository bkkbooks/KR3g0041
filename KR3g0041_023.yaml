body:
  text: 星學大成卷二十三明萬民英撰總龜紫府珍藏敘總龜一書集諸家而總類之大半與三辰通載相似是為通載所採托也今不復録惟草堂丁無咎續集一篇考厯象之性情體禽類之變化摘星辰之善惡類聚成格非深達天文洞究造化者必不能作余為考訂以廣其傳草堂博洽多聞學有源委星命乃其一端云易水育吾子識總龜條議按金雞呈瑞條解言堯厯仲春日躔于昴青龍用事條言紹興戊辰歲星在秦州於厯算俱不相合今以歲差考之每年差一分五十秒七十年差一度餘堯厯立春日在箕四度于今有三千五百年差得五十度今授時厯孟春日在虛一無不合則堯時仲春日在午初度明矣今曰堯厯仲春日在昴宿不知如何算也歲星厯算大約卯年俱從卯起逆算十二辰而一周天故謂之歲以今厯考之雖留逆不同然亦只差來往一宫耳今曰戊辰歲星在秦州則差七宫亦不知如何算也意者古今厯算有不同歟至如合璧以三合為説華蓋以十二星配太隂所行恐或非也書此以俟後之知者紫府珍藏星命總龜續集草堂學餘丁無咎進之編合璧連珠總説夫日月五星皆會一次日月則若璧合五星則若珠連進退皆無盈縮之患惟會丑者九世一遇會他次者間世一遇詩云太初丁丑歲為頭七政相逢會斗牛誰識當年差五日連珠合璧詎相侔日月合璧太陽太隂同宫或對照或三合照是也然須廟旺方為貴日有中道月有九行中道者黃道也九行者青道二出黃道東赤道二出黃道南白道二出黃道西黑道二出黃道北分主八節合乎四正四維按隂陽中終之所交則日行正當黃道八行與中道而九乾坤定位則八位各得其正及其寒暑相推晦朔相易則在南者變而居北東者徙而為西日行與歲運皆遷月行隨交限而變日出入赤道二十四度月出入黃道六度故交於子正則晦日之朝猶朔日之夕也是日月皆不見若合於午正則晦日之晨猶朔日之昏也是以月日皆見蓋其如合璧當視子午正交則人命在其中可論其強弱且如昔紹興甲寅十一月朔夜半日在斗一度而月在斗四度則是月於晦日之夕已交於子正也又如在嘉定辛未正月朔日已於十二月二十八日過子宫至朔日日在女六度月離猶在牛二度是其交於午正後方過子彼或者不知合璧則見正月一日卯時便作合宫得日月合璧亦惑矣况朔望交虧而人命在其中者豈能無害如辛未四月朔日望日生命在合璧對照宫是也歌云日居月諸是何如日月流行有疾徐誰知子午分交處最愛生逢合璧如五星連珠五星不必同宫只得順布五位相續而不斷者亦是虛拱一位而命居其中者亦是拱日門則是五星連珠拱地户則是五星拱太微拱紫微所謂坐實不如拱虛對照不如正照者是也或順乎兩位而拱亦妙五星運行各有次舍及其相聚却為難得若得連珠尤妙淳熙十三年丙午閏七月五星同在雙女宫人命逢此已為竒特戌又如乾道四年戊子丑月生水在申金在酉火在木在亥土在丑是為連珠此年際會風雲名位顯著者不少歌云五星次舍不同行卿相會連珠亦吉亨人命當生遭此會不為宰相亦公牛斗秀氣紫氣十一曜之最尊清而貴文而美者也丑位有斗牛二宿乃二十八宿之始金陵之氣盛於東南龍泉劒名之神光於牛斗若紫氣一星對照正照丑上安命特為竒異東南吳越乃丑分也日月五星初躔皆自星紀故名星紀者斗建之間也十一月陽生於雲漢漸退降及艮維始下按於地至斗建間復於列舍之氣通於易天地始交泰之象也雲漢下流百川歸焉火土二星雖為忌曜至丑相逢返為福星獨歲星在此宫閩人得之為福尤重春秋昭公三十二年夏吳伐越史墨曰越得歲而吳伐之必受其凶是時歲星與日合於南斗三度後三十八年而越滅吳歲星及斗牛矣茍人命得曰木合於星紀者無不獲福故曰斗牛秀氣易傳亦云日月五星起於牽牛此説信矣文章祕府日月木金水紫羅三合對照亥宫安命是也亥有木星主圖書乃文章祕府之星也主為人才學富足識見超卓福氣亦厚十月隂氣進踰乾維始上達乎天雲漢至營室東壁間升氣悉究自王良閣道由紫垣絶漢抵營室上帝之離宫也故金水木日月計同在此宫則有文章祕府之象以其近帝宫也五星朝斗五星會於雙魚則有卿相之象若一星二星居於前後者亦是日月木金水五星同居雙魚宫是也蓋亥為天門乃上帝之離宫衆星聚此以拱北辰是五星朝斗之宫也夫斗星北斗也七星環衛紫微者是也其下有三台星文昌星尚書四輔上相等星五星若朝于此主人有卿相之榮孛居東井孛居未上夜生人未上安命是也貴而有權之命古者太平之世日不蝕星不孛則孛者常順於天隱而不見惟怒則為彗星一見則衆星失色此星性猛機變威權常好居黃道正位故在東井則為吉星故曰孛居東井首攜龍角角亢二宿為蒼龍之角也羅㬋建首乃天之神首居辰之位乃如龍之有首而角亢二宿左右扶之似為之角矣命居辰上而得羅㬋主為人英武榮顯羅㬋天首之星也屬火之氣又為天權天統之星其星廟於辰樂於寅喜於卯乃龍尾伏辰故也又旺於午位蓋其與日月交則能蝕日月之光如霸者之擅權也故曰首攜龍角計居龍尾尾宿四星為蒼龍之尾宿也計都星乃天之神尾入寅之位乃如龍之有尾而尾之四星又有輔翼則為真龍矣凡此二格皆主權高職重人命在寅而見計都乃計居龍尾羅計二星若望而止於黃道是謂臣壅君明則陽為之蝕矣故日者陽也在陽則不蝕羅計居陽則為吉變而入隂則為凶且一日冇十二辰自寅至午為陽自未至亥為隂故羅在寅卯辰午則為吉星計居龍尾鶉尾亦為吉宿大人虎變西方參有九星五星貫其中四星環其外如首如尾如足如手有白虎之象而金之一星則為西方白虎之秀氣如秋生於寅申或在寅申上安命謂之大人虎變酉上尤妙又謂之白虎當權無不貴顯者酉雖在金旺之鄉而冇畢月烏之次舍焉故金月同居則為吉也茍人命安於此宫得金月以相扶必能改變故曰大人虎變老人星現南極下生一星為老人星在辰上亦謂之夀星或金星土星為夀元居於辰日月居於其上皆謂之老人星現主夀也陽氣曰明堂建於龍角曰夀星龍角謂之天關在易以陽決隂夬象也然夬之象乾居下兊居上夫以乾居下而夬兊隂豈得為夀星蓋乾金也兊亦金也與金同氣故謂金樂鄉是知土生金而金與土同氣茍人坐命在辰而得金土佐臨尤為重厚福夀必獲兩全也隂陽類聚隂陽同居一處合為廟旺得同類之吉星照身命者是也易曰水流濕火就燥亦各從其類也凡人命在午而得日火同宫身在未而得金水同宫無不發迹蓋以陽從陽以陰聚陰其氣味之相投故也衆星拱北孔子曰北辰居其所而衆星拱之蓋天之星運轉不窮而北辰一星不易其位北辰所居乃天之北極子位是也十一曜環居衆位而虛拱一子却去子上安命是也日水計木金月六星居亥又得火土紫氣星居丑以拱子一位或環而拱之散居諸位虛拱一子從而安命亦是也此皆至貴之命如鄒太參貴命星辰正按此局豶豕之牙奎星本天之武庫亦為封豕之星為性猛烈人命若亥生或亥月亥時或亥命得木星順行者權貴之局况亥上室璧二星室為火豬璧為水㺄皆象豕之類茍木星逆行却為害不淺日月金計水木皆以娵訾為旺樂之宫亥上是也大抵皆從歲星春秋傳曰有星出于婺女子上是也禆竈曰今茲歲在顓帝之墟其明年進及營室復行豕韋之次亥上是也景王問萇𢎞曰今茲諸侯何實吉何實凶對曰蔡凶此蔡侯般弒其君之歲也夫豕韋之次蔡分野也木逆於此而蔡凶則知木樂於亥而不可逆行也惟其逆行于亥子之間一吉一凶此景王所以問萇𢎞也旄頭直事羅㬋乃天之神首酉上有昴宿九天之旄頭煞是也安命在酉而遇羅㬋加以一二惡星為禍最慘昴畢二宿雖次大梁而其分野則在常山之地東南外接旄頭地皆河外陰國也茍日生人火計臨此而坐命在此皆主不吉故曰旄頭直事蓋此煞乃外夷凶星也人命值之若不惡終必主逺配大火當權古者閼伯居於商丘後世配食於火星或食於心乃卯上星宿也或食於星乃午上小星也故卯為大火午為鶉火季秋之後天月建在邜須是夜生於邜午上安命是也其發最驟日月火星在戌安命亦在戌乃大火當權蓋大火至戌而納火火庫在戌而火星宫主亦在戌此所以謂之當權也須是夜生方合此格日生者非限主當權衆星聚在一處一限星居其中其衆星各以類聚來拱不然則忌星作限主而衆善星拱之尤妙竹羅限垣局厰云凡立功名主重權須要當生限入垣正入三用居木位會位臨限福仍兼火為天帝居天蝎土是太常守磨蝎金星天稱亦太常榮顯水星在南方此乃限主當權之謂也太微受制火星常以十月入太微受五帝之制命行司賞罰太微者南方朱雀權衡為三光之庭北運斗星以臨制四方運四時而均五行者也故太陽居午太隂居未為樂宫以其日月循黃道而行入赤道內而受制於太微也茍人命得同日月坐此樂宫與木水相會無印星入者無不貴長庚入命東有啓明乃水星之象西有長庚乃太白之象昔李太白母夢長庚星入懷蓋月乃母道也身之所從出也夜生金月同在酉乃合此格李太白母夢長庚入懷已而有娠及生太白詩才冠天下則知長庚入夢必主産不世之竒才神羊觸邪未上巨獬之分野獬乃神羊之獸遇惡則觸古者帝王置之殿庭以警不忠如未生人又在未上安命純得凶星者為貴若不背日月而安命在戌上白羊之位亦是太乙居紫微東纒赤道內警凶惡而斬姦邪進良善而佑忠直蓋遇善星則為善遇惡星則為惡愛巨獬之宮謂之金羊若見邪穢無不擊觸凡人命在未宫而得孛星入者皆秉性忠直靣刺人過內無隱情故號神羊觸邪凡乙人得孛與木金同在未宫者官可至御史三公雙女爭權金火計月土星在雙女宮主淫欲或偏異生也在易離上兊下為暌兊上離下為革聖人於暌卦則曰二女同居其志不同行於革卦則曰二女同居其志不相得夫離火也巳亦火也火能生土而尅金今也金却生在巳而土則陷於巳言金而及土者以其泄火生金故金與火爭兊屬金也金能生水而怕火尅也今也木却敗放於酉而火陷於兊言火而及木者以其木火俱敗陷西方故火與金聞此謂爭權日出扶桑卯為日門乃晹谷扶桑之地坐於邜無惡曜對照而在卯上安命者主貴卯固為日門而夏至日常自扶桑水府而出故旦朝猶在於寅若人命只得木日同在寅宫而在寅宫安命亦為貴格其為在卯則同箕星好風李尋云日將出清風發羣隂皆伏是日出則生風日入則無風日在丑寅朝生主有聲名更有惡星則未免却主淫蕩月纒箕宿亦主生風反為不利惟日在寅命在寅無凶星者為妙風之從虎以類應也寅既為虎風日從之但宫有尾箕斗三宿而特有箕星好風者蓋尾度更屬邜斗度巳屬丑惟箕則得其正寅故云箕星好風也人命得與歲星同此宫者皆為吉命况寅為木木又生風人命逢之安得不譽高望重哉畢星好雨詩云月離于畢俾滂沱矣書云星有好風星有好雨太隂躔畢度而在酉上安命是也若七八月之間正旱而沛然甘霖以澤萬民更逢水星雖辰上安命亦妙儻在叄肆月生乃水潦漲溢之時則止為飄蕩之命日月之行則以風雨釋洪範者以為不吉之兆不知月之從星從其所好畢雨則有肓物之功豈得為不吉之兆乎如人命安身在畢無凶星惡宿入者皆能育物濟時皆為有福之命若凶曜入者則不祥大月當斗韓昌黎云愈生之辰月宿斗東坡亦身在磨蝎宫故知月宿於斗最出文人才子也詩云惟北有斗不可挹酒漿主招口舌興讒謗也二君子未免故曰君子為仕多折青龍用事春生人見木星在寅卯安命乃青龍用事夏生見火星在巳午安命乃朱雀當權秋生見金星在申酉安命乃白虎當權冬生見水星在亥子安命乃玄武當權四季生人見土星在辰戌丑未安命乃勾陳得位已上數者須是不背日月晝夜者妙木為青龍其名為用事者最愛順行而無退逆之患也紹興戊辰生人其年歲星在秦州人皆以為木入秦州必有特達掀轟者及視其年生人非徒無甚顯達又且成敗棲遲每每皆是若以百中經觀之其年五月木星在未何為無顯達之人及以統元經細算其年歲星自丁卯八月過未十月退戊辰四月又至未閠九月過午十二月又退未此與逆於玄枵者何異焉此其無顯達之人也星環帝座太陽帝之象也日之所居在子午皆為帝座吉星左右環拱者最佳但人之生時亦為帝座若吉星三合對照環拱於時者亦合此格其貴必矣假如淳熙十三年丙午歲閏七月十六日巳時生其時諸星皆環帝座身命三合又無空宫實為難得豈不為大貴人况四元三限時命二星所謂九事者又為滿用洞微九事歌云九事全而順五行必然享福得遐齡九事若離福不至萬般智慮一無成欲知九事本原例四元三限時命至乃正得此格也左右環拱凡人命宫若得五星左右環拱無有不顯達者假如坐命在璧五度木星在壁一度則為左青龍金星居璧九度則為右白虎火星在奎一度則為前朱雀水星居室十六度則為後玄武真為左右環拱然亦不必如此之近但布於左右前後宫分者亦為難得也其榮貴者當然印夀雙全在亥上安命而得木火土星在命者為貴格蓋亥屬木故木為天元印木生火故火為地元祿火生土故土為人元夀其餘安命倣此洞微經説祿印夀三元星須要居高強宫而無留逆者乃是吉命故歌云三元訣法少人知亥邜未宫木曜推火地土人高處著必居俸祿定無疑不逢惡曜相刑尅為官權貴有彰施忽然留逆兼無氣官災多失更流移印夀雙全之説於是歌而可見金雞浮瑞先賢配十二時以酉為雞而晝生乃日之精逸居陰位若日在命而於酉上安命者是堯厯於仲春則曰寅賓出日蓋日者陽也陽春布澤之時惟藉日之融和故堯敬而賓之仲春之日堯厯躔昴昴者日雞也昴屬金垣乃為金雞日至日中幽隱無不臨照况仲春是時發肓之恩其功最大故昴雞與太陽當仲春之時日中同運至中天而發肓萬物此金雞呈瑞也金紫朝斗辛生人太陰與紫氣居申位命與金星居辰位水與太陽居子位乃金紫朝斗格蓋日者人君之象居於子位子乃北方之地而身命夾金紫朝日此乃清貴之格切忌土孛羅㬋入命併傍照則凶月扶斗杓凡月建所在則是斗柄魁星之所指也惟閏月斗柄斜指兩辰之間若太陰在月建之位者乃合此格一年有十二月節候斗杓隨月建而轉至於閠月則斗杓乃指於兩辰之間潮候亦隨之而盈縮則知天地陰陽消息盈虛應如凖繩無毫髮之差誤蓋日月之行與斗杓所指相為經緯此乃三光全而寒暑平也茍人生安命身應在斗杓所指之辰名為月扶斗杓如正月生人安身在寅二月生人安身在邜三月生人安命在辰皆為此格主榮華富貴然太隂與吉星同宫則為吉土孛羅計侵之則又為凶也身居華蓋五行以馬前二辰為華蓋此謂太隂居華蓋是也蓋以月居辰戌丑未為吉然月居未為樂宫戌為喜宮若在辰丑似無意義要知華蓋者乃北極天皇所居擁衛之星也其星有十二星居中又有六星庇於左右如蓋故曰華蓋太陰循黃道而行未嘗居於華蓋此言身居華蓋者蓋人生負陰抱陽故以時加太陽循東而出遇卯而坐命也此乃抱陽也又以太陰安身亦如權衡之象乃比華蓋然太陰一日行十三度三十七分如華蓋之有十二星又有六星之義也故古人先論坐命次論安身亦以此也假如只論坐命而人命在三日內生而同時者必同一宫坐命而太陰三日之內已行四十度則人之安身異日而異宫也古人之重三日宫者蓋此也故聿斯經云即都例經也又見生後三日宫月到何星分度中金水相逢極為美文學聰明須見水更得善星在宫主宫主復在高強位此為有福無難人一生謀運皆如意人云忽然三日水金加人間喜美事奢華世上文章須水照善星為主福無涯故身居華蓋者非獨清貴又且一世無非橫之災禍坐祿帶輿祿前馬前命前三辰位名曰金輿祿主星居於金輿而土星入局者是五行惟土於物其功最多古人論之詳矣然十二支為馬者有四為祿者有八皆屬金木水火而辰戌丑未宫獨無祿馬則是土無功於物矣不知土之為物無時不遇常居中以統四方故人命之帶祿馬者常愛見土為重厚然則土之所以權輿於萬物者其功最多矣茍人命坐祿而得命主入土局皆是吉命假如柯監丞壬子八月二十七日亥時生作九月算壬祿在亥亥屬水也坐命坐申為水祿廟宫宫主飛起入於辰是坐祿而入土局此坐祿帶金輿之格也金星入斗兊卦用事在秋分寒露霜降之節若辛人安命在酉而生居秋月金星入於丑位為貴此亦是坐祿帶輿格假如辛人祿在酉則是以金為祿茍辛人安命在酉宫而金星飛入丑位亦是吉命故名金星入斗箕翕其舌兊卦用事寅上安命若見金星水星入命則主口舌詩云惟南有箕載翕其舌不獨金水二星為然火星亦然入命坐人馬官而遇火守箕皆多招口吻愛説是非偏惹淫辭酌斟人過飾已之非好爭間氣傲慢尊長雖割其舌猶不已也謂之翕者合也合其舌亦好言也丙人見此尤甚神水華池水星居亥子上是也水星隨日至酉酉上安命亦是也西宫咸池則有觜星東南則有大星曰狼下有四星曰狐此地有大星曰南極老人老人若見治安太平兵革不起夫水星本無定性遇吉則為吉遇凶則為凶故常輔日而行至五月時出於狼狐而遇老人星則為吉凡人命遇此者無不長夀享福所謂神水者以水星逐吉星也所謂華池者以老人所居西宫咸池酉上是為神水華池也風生浪擊凡人生時遇初八二十三日午時生者皆狡猾凶惡蓋初八二十三日午時乃月弦初生而漸生於海風生浪擊之謂也然又當算月弦日乃太陰所在而知其善惡如太隂遇吉星則為人威權有膽氣如太隂遇惡星則為人凶惡徒配之命若無星同照者則主困弱乃風生浪擊而不寧也祿馬同鄉祿元星與馬元星照命者是也命書云馬元為貴祿為祿人元干配的無疑夀元惟向納音取要照強宫與限隨凡人命最愛祿馬二元同在強宫以照命未有不為顯仕者若不照命但得祿馬二元助限亦能發福虎踞龍盤木星乃東方之蒼龍金星乃西方之白虎金在命木正照夜生人得之乃龍盤虎踞金木同居於命又為龍虎交馳更在辰寅二宫坐命者尤妙命宫居於子午木星在邜金星在酉木正得之正合此格蓋木為青龍在東方金為白虎在西方又在前四宫與後四宫拱照豈但二宫坐命離坎交會水星稟北方坎宫之氣火星稟南方離宫之氣夜生人火星在命水星正照乃合此格此最主為人氣槩精神能剸裁繁劇祿位優厚若水火二星同守命宫則是為煎熬星矣返主災禍陰陽交輔日為陽君月為陰后若與吉星夾照命宫者此格也若惡曜與日月同宫則非惟不能為福而且生禍三光環微日在相貌宫月在遷移夾拱巳午二位名三光環微或巳午全無星亦妙三光全寒暑平注云三光乃日月五星也太微垣居巳午若日月身命在午而五星環拱之極妙為三光環太微格當有卿相之位雲漢騰輝丑未二宫雲漢經緯於其中若丑未中得日月紫氣木金水之吉星交照主為人文彩秀麗學海淵深也詩云倬彼雲漢為章于天雲漢即天河是也衆怒難犯身命宫凶星相會怒得一吉星解救則不為凶夫五星最愛順假如行順段雖凶星亦不甚害如入逆段雖吉星亦無力也茍命中五星有三四入逆段是謂衆怒難犯前後凶徒死於非命者皆此類也恃勢相陵善星入宫犯衆凶星故衆凶星恃勢以陵於善星若同宫同度則又為相合在十三度外則未免相陵凡五星欲其順軌不欲其相陵甘石已占之矣順軌則彼此協和相陵則彼此不靜又觀善惡二星同宫孰為冇用孰為無用也如命宫帶木星與火星同舍若行木限則不勝其凶行火限則不勝其福故命書云木限當生遇火尅更被孛臨全減福則是木限當生見火為凶也又云火若為限會於木此限交之須發祿則是火限見木則為吉也故木限見火為凶恃勢相陵者也鰲頭獨步三春生人在寅卯二宫安命而寅卯上見木星也此得時得位得用鰲頭自當獨步也江湖沛澤亥為江子為湖水星在亥子二宫而在亥子二宫安命也四月生人為妙蓋江湖當四月之時有滔滔漲溢之勢主為人抱負聰敏志高量宏驟居華選若遇惡星同守又恐不然以水星性無定度也子行父政太陽乃火之精太隂乃水之精故日為父火為子月為母水為子也且太陽之廟在午太陽居之當然也今則太陽却居子火星却在午又於午上安命是父之政子乃行也太陰之廟在未太隂居之當然也今則太隂却居丑水星却在未又於未上安命亦子行父政之説也此格主人艱難於始逸樂於終以其幹蠱之早也金神得位庚辛生人金星入命是也若更同在廟樂喜宫主福夀雙全河洛呈祥紫氣木星在午上同照命宫蓋午屬豫州河洛之地也天官書云歲星一曰攝提曰重華曰應星曰純星營室為清廟乃歲星之廟也歲星出東行十二度百日反逆行八度百日後復東行三度十六分外之七熒惑出東行十六舍而止逆行二舍六旬自所止之舍十月而入于西方心為明堂熒惑之廟也太白其出行十八舍二百四十日而入東方復行十一舍百三十日而入西方又行三舍十六日而出亢位亢為疏廟太白之廟也辰星其出東方四舍四十八日其數二十日而反入東方其出西方四舍四十八日其數二十日而反入西方星為員官星辰廟也鎮星出百二十日而西行西行者二十日反東行現三百三十日而入三十日後出東方斗為太室鎮星之廟也夫以室為木星廟斗為土星廟亢為金星廟心為火星廟星為木星廟亥分屬衛午分屬周卯辰分屬宋鄭斗分屬吳皆中國河洛分野若人生而在此數宫安命又得此數星歸宫是為河洛呈祥若正文謂紫氣木星在午而安命在午者亦為此格皆主才學過人五福全備也三台扶斗斗在丑分命若在丑而得三台星同宫乃此格也若丑之前後三宫皆有兩星亦是又有所謂三台扶日三台扶月皆倣此而取所謂三台者皆為三公之象人命得之位至三公雷乃發聲二月驚蟄之後生人在辰邜上安命而遇水星乃為此格自雷未發聲則未免汨沒發聲之後容易施為非惟榮貴且主聲名昭著紫微四輔旋轉天輪辰巳午未上有四吉星巳午之間坐命是也輔星乃輔弼之象得之者當居宰輔精神具足天一生水為人之精地二生火為人之神水火順受人命得之為精神具足精為養命之源神為養形之源精以養命而運內神以養形而運外內隂外陽故水為隂之精火為陽之神隂之不可無陽陽之不可無隂水與命同生於晝火與命同生於夜相望而各不失度者豈不獲其厚福歟又名坎離交會格月華金闕金星在亥與太隂同宫金星在辰與太隂同宫皆謂之月華金闕若金星在亥辰與太陽同宫者謂之日華金闕二格皆主富貴日中見斗太陽與羅㬋會合於未而太隂又在未此為日中見斗太陽與太隂同宫此為月朔可知又與羅㬋相會此為日蝕可知况日在未則日已過昃設使安命在此而遇日蝕乃六月朔日生人晝既昧則北斗見於東方人命坐北安得有吉茍得五星或木星火星同在未宫以禦侮則猶庶幾不然則竒禍之臨身者大可畏也明入地中太陽至申酉而沒而受羅㬋所蝕然申酉安命是也太陽君星至申酉西沒既失君位矣命坐此已為無力况被羅㬋所蝕其能自保乎命值此非惟破阻無成又恐招暗昧之事因此喪身誠可憂也明出地晉命宫在申而太陽在寅命宫在酉而太陽在邜命宫在戌而太陽在辰皆為明出地晉此格須是日生人為妙更得金水輔太陽而行或金水居前導引皆為貴命木上水井水先入宫木後入宫或木星先入水星後入皆為井象更得在東井未上又在未上安命必主道心員融有常德以食天祿也井居其所而不遷地之德也而木居水上有養而不窮之義或人命得木同居於未而水星對照於亥此亦得木上水井格蓋亥居下而有井之象也然在天之井則異於是以井而居河漢之中其為度則三十視其他度數最長半次實沈半次鶉首在實沈者水為樂宫在鶉首者水為入廟此亦養而不窮之義或者謂實沈鶉首既以隔界豈得為養而不窮不知夫古人以為紫氣者木之餘氣其廟實沈月孛者水之餘氣其廟鶉首則是實沈鶉首二宫乃木上水井養而不窮之義誠爾也若人命宫同得氣水在於實沈孛水在於鶉首者皆得此格須是無凶星則貴有凶星則僧道出家流也衆星環月夜生坤方五星環太隂更在太陰宫住命者合此格太陰之行有九道其行最疾衆星本不能環也且北辰不移衆星可得而拱之月既行速則惟星是從所以因之而有風雨歲在庚午二月初五夕月入南斗中其年自八月旱而無雨以黃道推之至十七日月從黃道入畢宿下知其日有雨至此日其雨雱𩃱此乃月之從星也及十一月初五日月在南斗三十餘度至二十一日亦從畢星之度經過却又無雨此蓋月别從九道行也今此謂衆星環月乃隨其星之吉凶而卜善惡如月與木星同度則吉與土孛同度則凶與金星司度則主淫亂與水星同度則主文華與火星同度則多疾患與羅計同度則主夭折當隨其所在宫分星宿而詳之若左右前後皆是吉星雖太隂未至於從星亦主獲非常之福輔弼雙星北斗七星斗杓謂之外庭陽精之所布也斗魁謂之會府陽精之所復也杓以治外故鶉尾屬南方魁以治內故娵訾屬中州是以鶉火大火夀星豕韋為中州之分野如亥午辰卯生命得土星在子丑辰午亥卯又無凶星侵入皆得北斗輔弼雙星之臨照為人必福祿豐厚金居乾位亥上乃西北乾位乾宫為金而金星亦居亥土乃為此格未年與申主人得金居乾位最佳蓋未屬井鬼其分野則在秦申屬觜參其分野則在晉得金之正氣又與未日同居於亥乃金居乾位若無火計羅孛人皆為貴命水注東南巽居已位東南之地也四方之水則皆會之於箕雖北有溟浡南有大海西有流沙而水之傾注則歸於東海以勢不滿於東南也水星在巳而木星與命宫在寅乃合此格蓋水既順則有滔滔無窮之福其發達也必矣酉生人與寅生人得水星在巳木星與命在寅是也蓋寅坐屬尾巳分在燕西屬畢畢分在趙是得正氣而流入於巽是水有所歸况與未命同在寅或本命與寅生同在酉得水日在四正之宫則又為水歸地户格除舊換新月孛乃天上之彗星有除舊換新之象所照之地則有變易更改其星如帚掃所以掃除塵穢更新改舊在亥正月生或在丑十一月生是也蓋十一月一陽方生更改之始在丑次正月為一歲之始日在亥次故也或孛星在未上而七月生蓋七月秋氣始生先庚之象有更革之義又如十一月初一生而日月在斗之初度木星順室亦為革故取新蓋日月初躔於斗初而木初躔於室初斗初在人馬宫室初在雙魚宫寅與亥合至為貴格又除舊取新之意火水未濟火先入宫水後入宫同居一宫以照命者是也蓋火自上炎水自下注相違而不相向安得能和而能濟故易曰未濟男之窮也帶此者主貧賤水火既濟水先入宫火後入宫同居一位以照命者是也蓋水性潤下火性炎上上下相得而不相違切嫌一二凶星侵入則返主生禍更若水星為宫主為命主為祿主則福最厚冨貴雙全之命也附指南正貴格天地德合干為天之清氣支為地之厚載干合者得賢人之心本乎天者親上支合者得衆人之心本乎地者親下支干俱合是為天地德合假如甲子見己丑戊戌見癸卯之類是也時合為上日合次之不然年與月相合日與時相合尤為福緊君臣慶會干為君之象支為臣之象干支俱合在一旬之內見之是為君臣慶會謂人臣近君天威不違顔咫尺假如甲戌見己卯戊辰見癸酉之類並在一旬之內是也時合為上日合次之所謂好日不如好時不然年與月合日與時合尤以為最一氣為根乃謂年月日時胎五合納音純金純水純木純火純土也假如甲子年金癸酉月金辛巳日金乙未時金甲子胎金是也又如庚子年土丁亥月土戊申日土丙辰時土戊寅胎土之類是也兩干不雜謂年月日時連占兩干純一而不雜也假如甲子年乙亥月甲戌日乙丑時甲乙兩字不亂又如丙寅年丁酉月丙辰日丁酉時丙丁兩字不亂之類是也又謂之兩干連珠格三合聚集年月日時胎或干辰帶三位支辰帶三位納音帶三位皆云三合聚集假如乙丑年乙酉月丁巳日乙巳時三箇乙謂之干三合又如丙寅年庚寅月戊寅日戊午時三箇寅謂之支三合又如辛邜年木庚寅月木丙戌日土己亥時木三箇木謂之納音三合蓋以一生二二生三三生萬物盈數之義也四柱純全帶寅申巳亥全者有五行生氣驛馬學堂臨之是為四柱帶子午邜酉全者有五行旺氣乙辛丁癸臨之是為四正帶辰戌丑未全者有五行財氣華蓋正印臨之則為四墓然此四位若於年月日時得之則富貴太乙云凡物太盛則折如漂風暴雨之至易盛易衰要以胎代之則為可久可大之命也五行俱足謂年月日時胎一帶金木水火土全也如甲子年金戊辰月木丁巳日土丁未時水己未胎火是也又如乙酉年水壬午月木辛未日土丙申時火癸酉胎金之類是也六位相乘謂年月日時胎命六位相乘合起十二支辰無有欠缺也如甲子年丁邜月戊寅日辛酉時戊午胎却去巳上安命子與丑合邜與戌合寅與亥合辰與酉合午與未合巳與申合位位相合全無虧也干辰一字謂年月日時四位干辰不雜也假如甲子年甲戌月甲寅日甲子時是也又如乙丑年乙酉月乙亥日乙酉時是也支辰一字謂年月日時四位支辰不雜也假如甲寅年丙寅月庚寅日戊寅時是也又如戊辰年丙辰月甲辰日戊辰時是也凰鳯池謂如戊午年戊午月戊午日戊午時是也又癸亥年癸亥月癸亥日癸亥時之類是也引從包承假如甲子生人以前三辰為引則丙寅丁卯為引以後二辰為從則壬戌癸亥為從引宜逺以丁邜為逺從宜近以癸亥為近前遮後擁左右包承若甲子生人後得癸亥前得乙丑丙寅生人後得乙丑前得丁卯之類又謂之年中太子舉世難逢神藏煞沒甲庚丙壬為陽干之吉會乙辛丁癸為隂干之貴德大凶神至此而遁藏四惡煞遇茲而寂沒故陽則甲庚丙壬隂則乙亥丁癸如年月日時四位上四干分明不論刑害衝破皆為吉氣更加祿馬貴命加增福力而凶神惡煞自然遁藏寂沒也祿馬交馳馬是扶身之本祿為養命之源祿嫌衝破馬忌空亡祿無所破則官職貴顯馬無所損則名位清高且如寅午戌馬在申而時干得庚亥卯未馬在巳而時干得丙戊申子辰馬在寅而時干得甲巳酉丑馬在亥而時干得壬如年月日時四位支干互換得之謂祿馬交馳如年月不見祿馬而日時互見者尤以為妙也趕祿欄馬祿不趕而不發馬不欄而必驟且如甲戌生人甲祿在寅須得丁丑以趕之寅午戌馬在申須得癸酉以欄之此格極貴得之者無不顯達成名不必求正祿正馬但得此則祿馬自然有也他凖此集福發福謂年月日時四位生旺之氣或四位支干吉會之氣或四位祿馬福貴之氣聚於時上者謂之四位集福於帝座如時上揭上旺氣秀氣聚在諸位之上者謂之帝座發福於四位集福於帝座則以純厚忠信得君發福於四位則以聰明端直自進五行自然之理造化之所不能移也五字連珠謂年月日時胎五位干得甲乙丙丁戊五字與己庚辛壬癸五字是也蓋以甲與己合乙與庚合丙與辛合丁與壬合戊與癸合又謂之十干連珠格已上貴格只忌空亡死絶相衝刑破則減福也全一路無破善終州縣全二路無破善終京官全三路無破善終朝官全四路無破官至員郎全五路無破官至正郎全六路無破官至卿監全七路無破官至兩制全八路無破官至兩省全九路無破官至兩府全十路無破官至三公細論身命宫主活法凡命先求坐命次論安身福德次及貴星官祿徒居陷地祿元入照雖無官亦有祿之人本宿加臨縱遇死有更生之理陽為七政之尊遇皆有救陰為六陰之祖陷恐無成金雖妻象居六隂怕近六陽水是文星背十位嫌逢土忌計都原毒六壬乃是祿元月孛為災四煞定居刑責火居妻位必先尅共枕之人羅入官鄉乃食祿有權之位土逢疾厄主妻病以風顛金入弟兄必妻間而子弱此十一曜之權綱屬十二宫之分野更有相生相尅或剝或刑先到為主後入為客一切吉凶以為格式詩云論五星無多訣先從宫主分明説世人只泥原守星此法原來不是活身命主星互垣命宫在亥木為宫主身宫在辰金為宫主二宫主星各歸本宫固為吉命設或木為木主飛入身宫辰上逢龍金為身主飛入命宫亥上乘旺名曰互垣又為內外二臺主富貴雙全福祿深厚詩云內外二臺君且聽命主入身身入命縱教生煞會凶星冨貴榮華天賦定身命主星入財帛宫此宫大槩與田宅宫一同身命主星若臨此宫主財帛充盈詩云財帛主田宅主身命二星喜相遇若無暗曜與刑囚可與石崇鬬豪富身命主星入兄弟宫第三宫謂之間極此宫有喜星亦只徒然若身命之主飛入此宫主衣食不足惟喜太隂居此却能與命宫添其福德也詩云間極主入命宫縱為吉曜總成空白日只宜間袖手不知衣祿自何從身命主星入田宅宫田宅宫又為父母宫若身命主星照臨此位主千斯倉萬斯箱或田宅宫主飛入照身命則家多金玉滿盛無比詩云身命主坐田宅千倉萬箱無破尅田宅之主入命來管取珠珍多蓄積身命主星入男女宫身命之主飛入男女宫謂之母來護子主有官爵及子孫或男女宫主星入照身命亦主官高祿厚詩云身命主守子孫母來護子豈無恩子星若還回顧母官高祿厚世推尊身命主星入奴僕宫此為惡弱之宫雖是吉星亦不為福只宜守常詩云身命主入奴僕縱是吉星也勞漉身間心却不能間猶忌小人生返覆身命主星入妻妾宫二星入照妻宫主妻有貌及有賢德兼得妻財若妻宫主星入照身命亦主得外家財産詩云身命主入妻宫妻財昌盛貌雍容妻主若還來入命定招外舍橫財通身命主星入疾厄宫疾厄宫或者謂之陷宫却不然也若主星入此宫來亦謂與官祿同斷詩云疾厄宫非惡弱莫信時師胡泥著此宫還與祿宫同命主膺之臨顯爵身命主星入八煞宫八煞宫有二説詳見前集與要括一卷身命主星入八煞宫主少年發迹貴顯若此宫星主入照身命主疾厄纒身詩云身命主坐八煞財祿少年當早發若還煞星來入命疾厄纒身難解脫身命主星入遷移宫主星入遷移宫主過房若非入贅亦主庶生兒息詩云身命主入遷移過房出祖定無疑若不贅居并入舍也須偏産庶生兒身命主星入官祿宫此宫主星入照命宫雖是忌星亦不為災更得命主飛來此宫名曰互垣主位至三公詩云官祿主入命宫縱為忌曜不成空命主若還入官祿互垣終是拜三公身命主星入福德宫福德宫主星入照命宫主福夀俱高更命主星飛入福德宫互垣亦主三台之貴詩云福德主入命來斷主福夀永無災命主若還居福德互垣終是拜三台身命主星入相貌宫命主入相貌宫貌宫主星入命宫主為人堂堂之貌若遇惡星相會則破相貌醜多災害詩云相貌主入命鄉命居相貌貌堂堂若是煞星來會此破相多災貌不揚身命宫左右夾照星辰凡看身命宫星既吉更須看左右宫若值凶星刑囚夾拱必傷尅身更得吉星夾照乃為一生富貴之命詩云凡看星看左右左右吉星欣遇會若遇田財與官福一主富兮一主貴論祿馬俱陷却貴或不陷却貧賤祿元馬元星皆居陷弱但身命田宅宫星處廟旺及坐貴人鄉又不受尅必貴身命田財主星俱陷雖有祿馬星入命而三合有刑囚衝破必貧論命坐祿馬貴人星辰入廟旺却無官祿馬天貴俱臨身命星又廟旺但身命主星化為囚暗官宫又見刑耗忌星臨之非惟不貴又多官災論身居富貴平生多災身命田宅俱值貴人祿馬宫主星不陷只是疾厄主星與囚星入命故多災或太陰被土所制日被火羅所制必主流行帶煞如福德宫有廟旺星其人只多災亦不至犯刑不然亦得貴人救也論貧賤却無災田財身命主俱陷而身宫却有木先照不犯刑煞又疾厄宫無惡星故無災論先聚後散或先散後聚身命田財宫各見福權星照先聚如身命主星受傷尅又飛入弱宫當後散也火土暗耗二星守身命田財宫初年必見破散如身命主飛入強宫更廟旺無刑戰則中年卓立成家論命貴身賤或身貴命賤命坐貴人及命主居強宫或廟旺本宫又有星一生得貴人扶持身宫陷弱主星受尅田財宫值火羅水孛變為刑耗惡星與金星同局及在命宫必主破祖只得貴人敬重身在貴人宫見吉星宫主星入廟旺更是強宫但命主星受傷又居陷弱田財宫主星又陷必是官族或是好人後方破敗論耗田業或自置産業田宅宫被忌耗刑囚星入主破業如田宅宫主飛入財宫主賣盡田地只聚財開典庫財宫無星主星飛入田宫廟旺其人將財就田若田財宫主皆入命宫命主又居廟旺與福祿星同科極富論初年富貴後却投軍生時與命俱坐庫上宫主與身同陷遇祿馬二元飛入奴宫貌宫忌星交官祿限則主投軍論初年投軍後却得官生時與身俱陷命宫官宫被火圡尅但命主官祿主飛入廟旺照身命并遇貴馬貴人必軍中出職論身命田宅宫俱見貴星又却破散身命田宅宫主俱陷弱宫其宫却有木氣守之但非廟旺主初招祖業後因逰行浮浪破散論螟蛉異姓子成家男女宫犯刑煞被火土孛刑囚星照主無子如男女宫主并第九宫主入命更見田宅主星須得外姓子養若坐庫上必成家或兄弟男女宫主同入命宫主覔得兄弟子及姊妹子也論妻妾妻宫有吉星必禮聘分明若妻宫主星飛出逰行宫見金孛必奔走不然則非禮聘成親如命主飛入兄弟父母宫見妻星或父母兄弟宫主星飛入妻宫必因親致親又論妻宫見金孛星係是四淫宫妻必淫宫主入陷宫必隨外人宫主及本宫金孛星在四淫宫入廟旺則淫蕩不止如孛與紫氣在妻宫宫主入陷必通僧道土孛同在妻宫宫主星出逰行更是四淫宫必通秀才金水孛同在妻宫宫主更入奴僕相貌宫必通僕卒金水孛同在妻宫更是四淫宫遇貴人必通官人論尅妻妻宫帶刑煞尅妻金星被火尅亦損妻或妻宫遇忌星必尅妻也論妻貌及性美德火在妻宫性惡貌小少髮土在妻宫肥端性慢貌黑孛羅則醜而淫羅獨在妻宫長大損頭妻金妻美貌溫雅柔和木妻性善貌平常水妻伶俐貌小長瘦論人多疾病疾厄宫犯刑煞見惡星故多病日生見火在疾厄宫主惡死暴敗夭亡若非雷傷斬首必見血疾并官棒血光死如身宫不犯煞則腸風血疾死夜生土在疾宫主癱風中風死不然身帶風疾若身宫犯刑煞見氣木必主氣疾無刑煞不病見首尾星主瘟癆死論在家貧出家富或在家冨出家貧身在逰行宫入廟旺地田宅宫值囚耗忌星其主星飛入廟旺地故在家貧出家富田宅宫見福祿星其主星與財宫主星却飛出逰行宫受制故出家貧論人有吉慶便生災禍身命宫犯暗刑囚煞雖官祿宫見吉星凡遇吉慶則有凶災如官宫見惡星身命無刑煞又見吉星或居貴人與福德宫宫主在命宫廟旺則無災論為僧道生時陷身命二位值氣木星守之宫主出在間極位故為僧道如更入廟旺及生時在貴科必主為高上僧如羅獨守主大權夜生土孛尅身後必還俗如犯刑煞主徒流歸俗如有救神即免論人居官貧或因官致冨身命坐貴人官祿宫見吉星入廟田宅財宫却見惡星主星受傷又陷故居官常貧田財宫見火孛又化為刑囚宫主身命同出在貴人祿馬廟旺地初主貧因官便冨論帶子入舍大或帶子出嫁生時坐逰行宫身命男女宫主俱出逰行宫逢金入廟身命主出逰行遇火入廟必隨母嫁也論過房生時身命俱在九宫兼背日月田宅宫無吉星必主過房之子也定奴𨽻生時身命俱在六宫六宫主出逰行宫更是土孛會日月必為奴𨽻也定乞丐生時祿馬陷田宅宫無好星照身命主星又出逢傷逰行宫與忌星會乞丐必矣定風塵天稱巨蟹雙魚雙女謂之四淫此上安身命更與金水孛同會宫主星飛入桃花上必走風塵一曰歲煞申子辰年未上是亥邜未年戌上是巳酉丑年辰上是寅午戌年丑上是此煞乃三煞太歲乘旺尅煞歸於庫位切忌與陽刃相見妻男位值之更凶又當細辨如申子辰三年三煞俱在於未獨辰年尤緊蓋四正庫墓相加而三位之前煞尤重也人但知數申子辰為三而不知自辰數至未為三餘倣此詩云墓中歲煞最為凶更加陽刃禍非常辰火戌金水到丑土來未上不善終二曰大煞子丑寅年申酉戌邜辰巳年巳午未午未申年寅邜辰酉戌亥年亥子丑此煞亦名飛亷遇吉以之吉遇凶以之凶吉則司生殺豫奪凶則為橫事惡死喜官祿身命髙強臨之若為間忌煞難所占是倒持太阿授人以柄也詩云大煞飛亷不可當小人命裏弗宜逢官主高強為得用自然名利出旗鎗三曰的煞子午邜酉巳是寅申巳亥酉是辰戌丑未丑是此煞乃暗金煞也巳酉丑金局一名金神煞一名破軍一名破碎田財妻男身命俱忌之女命坐此更凶若金水為恩福命金在酉丑水在巳反凶為吉吉不可量詩云破軍不可日時逢貴賤元來不善終五福朝元官極品小人徒配死囚中四曰陽刃煞祿前一位是也甲刃在邜加子酉徒流加戌惡流乙刃在辰加子亥徒流丙刃在午四柱有財惡死加煞徒流丁刃在未加戌亥徒流加寅惡死戊刃在午四柱有財惡死加煞徒流巳刃在未庚刃在酉加寅邜徒流辛刃在戌壬刃在子加邜酉徒流邜巳戌惡死癸刃在丑加申午徒流邜辰寅惡死陽刃者為煞中不可當之煞切忌與亡神劫煞相見若見之定主少年橫死之兆其煞又不可一槩而輕議也陽命夜生隂命日生則二當一陽命日生隂命夜生則一當二甲陽乙隂四柱雖有所取須看煞在甚宫時主初日主往月主來便是見徒流惡死見須以運考之即見其年限也且如人命祿馬環鎖有官有祿為兩府之資時運正發化煞為權人皆畏慕時運稍衰化權為煞大凡人命四柱最不可遇之詩云陽刃逢針號死囚劫亡相見主徒流兼刑帶煞須當絞惡煞爭馳命不留五曰劫煞申子辰生人巳是巳酉丑生人寅是亥邜未生人申是寅午戌生人亥是大抵此煞多生被小人謀害劫奪之事人命值之有五星吉神之類劫煞更在生鄉位居人臣之表若五行駁雜劫煞更在衰鄉定主貧賤惡夭詩云劫煞凶神最不祥主財渾似雪和湯若值生鄉兼值吉位居臣表宰朝廊星學大成卷二十三
