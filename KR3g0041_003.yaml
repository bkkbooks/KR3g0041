body:
  text: 星學大成卷三明萬民英撰星曜例歌論十二宫管庫星歌人命推排十二宫宫星為主實難通今人只論元来曜誰把宫神主宿窮此宿從来為管庫主人禍福吉和凶精窮主星歸何地善惡推来得度中得時不論居䧟弱失時何問在髙强伏逆順留居段局廟旺喜怒細推詳逐宫推算從頭始著意躔教首尾終此説精㣲難説盡心機徹處透天工夫人命中推排十二宫者皆有實局自命而推次則財帛以至相貌配為十二宫又分為七强五弱凡宫分有主星如寅木則屬木之類如此星者為主星今之論星第以十二宫主為重此法亦西天之精神然較之十二宫管庫主星則又驗前宫主也凡欲求十二宫之禍福但推詳其管庫星在何宫分得地失時以别强弱庶乎論定論得地失時星歌十二宫中有强弱七强五弱例難窮命宫官禄最髙位福徳妻宫次强宗近强男女并田宅第九遷移合照宫五弱疾宫并相貌兄弟奴僕八宫中强宫愛見吉星照弱處星辰無福功古人雖有推詳例理致未為長乆通洞天宫法窮其妙失地逢時廟旺中不問强弱宿星地只將好廟論窮通得地不問居强弱失時休誇强最雄䧟處得時猶享福强宫失位總成空那堪髙處重居廟作福興財分外豐倘還䧟弱加時失一分凶作十分凶星辰之要貴在得時懼在失時得時則享福失時則䧟害休咎吉凶轉移甚易官之强弱固不必執定論得地不得地夫十二宫者各有分野而星辰類有好樂之宫論五星者先論其廟與不廟强與不强則無不應驗且如木星在寅亥為樂廟好之宫凡得地為福深不得地為福淺得地為禍亦輕不得地為禍亦重若用福星得地照臨其福百倍假令為福而不得地亦猶當生年不用之以為福也若其用為然星失地則其煞誠不可解得地則未必不轉煞而為福矣其得地如此不得地如彼君子不得不講究乎是論强弱前後凡論五星善惡之混照者湏辯其强弱先後之理也劉少白問曰何謂强弱先後曰强者譬大國弱者譬小國小固不可以敵大弱固不可以敵强在智者深究之則吉凶可見前後入宫之前後也或强而後入或弱而先入當以强弱論若强先弱後當以前後論論留順伏逆凡論五星不過金木水火土之五宿五者運而無息故有留順伏逆之推移劉少白問曰何謂留順伏逆曰五星者臣下也太陽者君象也臣當敬其君之威而不敢犯使其近太陽則伏對太陽則逆三合見太陽則留如順而有用則十分之福可以輕重而詳斷之也如光芒不見不能為福亦不能為禍留順伏逆與强弱先後並㸔如前進而留後進而順則後者反在前矣如强者伏弱者逆則强亦不能作福而弱者反興禍矣論吉凶星歌火羅計孛四凶神炁水金陽本吉星當究生時善惡用莫専自古吉凶名吉星為惡災非淺禍曜為祥福自興不論用時徒泥迹貧窮富貴又難明善輪星者無疑其善惡之名當究其善惡之用夫名者乃炁金水火孛羅也夫用者乃福權財禄囚煞忌刑也用之為福禄則福禄居髙用之為囚煞則囚煞必有若徇其名不究其用則是無造化耳且夫火孛羅計四星之最惡然亦能為福星權曜亦能為禄主財元如是則不純乎惡也炁金水木四星之最善然亦能為煞曜刑星亦能為囚星疾宿如是亦不純乎善也天機造化實轉移乎是烏可泥其名而不究其用乎論休囚歌水土卯星居其鄉三元主落定為殃木居午未宫刑戰身命逢之不可當火星戌上無星管運行衝破卒他鄉金向丑邊為正局學人須要細推詳論汨没歌水絶己木絶申之説也申子辰居雙女邊亥卯未兮申上還寅午戌怕雙魚位己酉丑来人馬安四季相加災又𦂳運臨其上定為寃三元宫内無刑戰神煞臨排第一篇定乾濕沈没宫一説巳午為乾宫亥子為濕宫更是丑亥未為濕宫寅卯酉辰為乾宫卯為沈宫酉為没宫論五行沈泄法歌通於子平火見水而死金沈怕水鄉土逢火化烈木見水生芳金消逢火地木火過須妨水見火而戰火金而刃傷土見火生處土反脱火光木見土而種水土尅難當金生存土位水見水而愴土見金而泄木懼金捐黄水清金越秀金逢木鈍鋼火生懼木地土見木虚亡欲慕淵源法其理要精詳定天空太嵗前一位是也如天地諸般煞星逢之皆不能為禍若有用之星逢之皆無力不能為福身命二星逢之必是有藝業之人頗聰明只是多學少成大槩處事必少恩義若陽刃與的煞夾之多不吉其流年嵗駕前一位亦能空其吉凶之星定驀越駕後一位是也如駕在前此位乃是趕駕有驀越之象凡諸有用之星逢之皆减一半之力若煞星逢之或化直難與身星並見陽刃的煞又来凡行限見之或太嵗流年填之多主惡死衝之必見官事災晦定天厄天空對位是也不宜諸煞交入此宫且此宫極忌同於八厄若男女犯之定主厄難定血刃以子年加戌逆數一年一位至本生年是此星主有血光行限犯之惡死然必陽刃劍鋒聚㑹或天星羅孛交戰而後為災定勾絞勾以子年加卯逐年順數絞以子年加酉逐年順數二煞未始不相對主刑囚然必加三刑或流年白虎官符太嵗衝動方以此斷定喪門白虎吊客病符此四煞當年太嵗之所布假如子年一太嵗在子三喪門在寅九白虎在申十一吊客在戌十二病符在亥喪門吊客主孝服哭泣白虎病符主官非病破若有赦文天解天徳月徳解救無妨定天哭披頭天哭以子年加午逆數披頭以子年加辰逆數此二煞與喪吊並主有喪服若更值惡星到而太嵗亦到其上則孝服不可免定飛符暴敗飛符以子年加辰順數暴敗以子年加未順數此二煞主横災官事惟天月二徳解神可以救免然暴敗最怕身命相值飛符忌日時同到定天狗天狗在駕後二辰五位值之主多生少養若火孛交攻子星落䧟方以無嗣續斷之定刃鋒刃者子年子位是丑年丑位是十二位皆依此推鋒者子年癸丑年戊寅甲卯乙辰已巳丙午丁未巳申庚酉辛戌戊亥壬是大抵取比肩祿旺亦陽刃之意也此煞身命值之更加陽刃主惡死限值之尤甚若身命髙强反成威福經云馬頭帶劍威鎮邊疆言此煞利在馬前也耶律云女人切忌刃鋒辰言此煞女人最忌也定伏尸卷舌欄干貫索四刑星宫度歌四正宫中取四刑命低限弱怕刑星子年起子尋戌亥破家凶惡出其星伏尸卷舌為膿血命限臨之依此說欄干貫索主傷殘隨限尋之仔細看四刑宫中更多惡暗曜囚星莫並逢那更若来宫度内必然破敗主刑徒兩主不宜相㑹遇不須更坐命身宫一切加臨皆剥煞伏尸度内亦多凶若四位之中有用之星反能制福無用之宿兼為忌煞必然䧟凶伏尸星辰最為凶惡曜併之真可畏若能吉星同位中福祿榮昌有職位欄干之曜最凶辰惡曜臨之必見刑若有吉星同位坐富貴榮華百年春貫索星辰不可當更兼惡宿最為殃三方四正吉星入福夀榮華職祿昌卷舌凶星逢吉曜或朝或㑹最為宜三方四正星辰旺富貴榮華百嵗期論沐死墓絶四煞宫度歌生年納音算也古法當求四煞度最忌沐浴死絶墓身宫躔此定多殃限若逢之招死禍或然更有吉星来度近猶能成吉䕶火羅計孛若相侵早知趕入黄泉路木生人絶參二墓柳四死星五沐危九金生人絶尾十七墓牛三死危一沐星四水生人絶翼十九墓氐一死氐十六沐胃十四土生人絶軫一墓軫十八死心一沐畢四火生人絶璧三墓婁一死昴二沐房一論産星其法申子辰年金巳酉丑年水寅午戌年木亥卯未年火此煞男主血光女主生産若與惡星交則主禍厄論血支其例丑寅土子卯木辰亥火巳戌金午酉水未日申月即星盤所屬而移一位也此煞犯之男血光女産厄論血忌其例丑寅土子日夘月辰亥木巳戌水午酉火未申金此煞犯之其凶禍與血支同論擎天遊奕擎天屬火遊奕屬水數以六十花甲隔節布於十宫起於子終於夘而丑寅不與未申飛變者以河漢始於丑寅終於未申故擎天屬火不入故也其煞男怕擎天女怕遊奕皆主刑尅定空亡陽謂之空隂謂之亡陽年空陽隂年空隂歌曰空亡為害最愁人才智英雄悞一身只可為僧并藝術堆金積玉也須貧金空則鳴火空發水空日夜流不歇不惟財寳積如山官爵重重無斷絶直難星歌正二太陽三四隂五六火星君休説七八水孛更為殃九十木炁為難絶十一十二是金星此是神仙真口訣一説十一十二土星是也直難者難星直月也雖日月金木善星以為難直則反吉為凶假如丑宫命正二月夜生則太陽為直難寅宫命晝生則太隂為直難更化刑囚其凶必矣陽刃煞此煞在天為紫暗星在地為陽刃命吉則吉命凶則凶詩云陽刃之煞最為凶那堪五鬼在其中刑妻害子渾閒事配遞徒流不善終禄前一位為陽刃日月逢之也不明更怕禄星居其上一生成敗主多傾陽刃雖為凶惡神只宜君子掌權人五行若更逢生旺定有兵機作帥臣論的煞一名破碎煞夫金乃太白之星將軍之象子午夘酉的在巳寅申巳亥的在酉辰戌丑未的在丑秉煞最重如人命犯更坐在惡限乂逢凶星被火土忌星孛計奴星守照主星沈沒多主惡死不然貧窮帶疾徒配之人若身命逢星辰或入體格或吉星飛起在命為福用之星主為官顯耀重權詩云人命若逢破碎煞破財恰似湯澆雪行年運限更加臨官事連綿無休歇飛㢘煞一名大煞歌大煞子人先是猴丑鷄寅犬問来由夘蛇辰午巳逢未午虎未兎申龍頭酉猪戌䑕難迴避循環亥上却逢牛此煞逢吉則主威權逢凶則主横死指南云凡煞不可執一而論如入格命視刑煞若將帥於兵卒指麾喝咄惟命是從故用刑煞為之驅使不入格命若常人遇兵卒則為䧟害故忌刑煞如畏兵卒此理甚明亡神刼煞一云亡神謂七煞亡為官符刼為大煞此二煞相對俱在寅申巳亥吉凶歌斷在前大耗煞歌鼠忌羊頭上牛嗔馬不耕虎憎鷄嘴短兎怨猴不平龍嫌猪面黒蛇驚犬吠聲有人犯此煞財食散伶仃大抵煞謂之耗謂之刼惟怕田財二位學者當消詳之穿心六害歌穿心六害禍非輕尅䧟爺娘及弟兄若然雙親無損害自身妻子切須刑三刑歌三刑身體忌傷殘不測官災大不祥妻子亦須防尅破為官必定死他鄉三刑寅刑巳巳刑申申刑寅轉轉相刑是也吞㗖煞歌猪犬羊逢虎必傷猴蛇相㑹樹頭亡鷄逢犬子遭徒配兎趕蛇身走逺鄉䑕見犬来當惡死馬牛逢虎定相傷兎猴逢犬難迴避龍米未上水中央凡人若值凶時日三合為災仔細詳此煞乃以二十八宿而論大禽吞小禽也人命時日值之更加三合主骨肉刑併流霞煞歌甲鷄乙犬丙羊加丁是猴精戊見蛇巳馬庚龍辛逐虎壬猪癸虎是流霞此煞人命犯之男主他鄉死女主産後亡返伏吟年頭為伏吟對宫為返吟忌行運到此主刑䧟六親書云伏吟返吟泣涕零零孤辰寡宿歌寅卯辰人怕巳丑巳午未人畏申辰申酉戌人嫌亥未亥子丑人寅戌嗔若人值此多孤寡刑害兼須損六親男遇孤辰須切忌女逢寡宿獨眠瞋歌斷孤辰切忌男妨婦寡宿須教女害夫兄弟亦當離别去爺娘骨肉不同居孤辰寡宿好為僧若居庶俗必伶仃更被穿心来守破不然帶疾主雙盲論黄幡豹尾申子辰年則辰是黄幡而戌是豹尾巳酉丑年則丑是黄幡而未是豹尾寅午戌戌是亥夘未未是此煞是太嵗墓人命犯之主孤寡損六畜及疾病官災退財有救解無妨紅艷煞歌多情多慾少人知六丙逢寅辛見鷄癸臨申上丁見未眉開眼笑樂嬉嬉甲乙午申庚見戌世間只是衆人妻戊巳怕辰壬怕子禄馬相逢作路妓任是富豪官宦女花前月下㑹偷期隂錯陽差歌陽差隂錯是如何辛夘壬辰癸巳多丙午丁未戊申位辛酉壬戌癸亥過丙子丁丑戊寅日十二宫中子細歌好風流處不風流花燭迎郎不自由不是寒房因孝娶殘房入舍兩家仇女人逢者亦依然真假公姑或續絃否則有刑多寡合外家零落是前縁呻吟煞一名孤鸞煞歌木火蛇無婿木火蛇丁巳乙巳是金猪木虎傷辛亥甲寅是赤黄馬獨卧丙午戊午是黒䑕土猴孀壬子戊申是總論駕前神煞歌一太嵗劍鋒伏尸寄二太陽天空仍可畏三喪門内外孝事至四太隂貫索勾絞具五官符杖責難迴避六死符月徳同行位七嵗破月空欄干是八龍徳暴敗天厄至九白虎飛㢘同此據十天徳福星卷舌係十一弔客天狗吠十二病符順行位總論駕後神煞歌一年一宫逆行子年紅鸞卯為首天喜對宫在於酉血刃浮沈及解神戌上分明牢掣肘天哭還從午上尋披頭更向辰宫究流年諸煞與諸凶逆認地支人罕有此是神仙不肯留術人依此長相守地煞賦總斷凡論嵗殿以登殿為本論嵗駕以登駕為先身命主俱登臨顯達無比日月主若拱夾富貴非常殿駕無星而無得禄主加臨而更竒惟怕客曜臨朝餘奴是也飛星破殿闕囚煞加臨而不美主當刑煞以須防勲者天禄也欲全而不破忌空衝為要㑹玉馬為竒玉堂驛馬衝則四柱相衝破則飛星破禄禄主臨曰崇勲宜居官福命宫值曰全吉忌見刼空禄逢帝座足有錢財貴值垣城堪稱文雅子午相逢名為活禄辰戌丑未禄馬不臨如合通闗吉無不利馬者扶身之寳也欲生而不病喜逢勲玉忌在空亡馬遇垣城須當富命則酒色皆好遇吉則轉禍為祥空亡者煞滅也陽為空而隂為亡陽忌陽而隂忌隂煞者滅也滅者絶也命與日時值之暴亡必見忌木火之位宜金水之宫不宜居坎而宜居離諸煞逢空化凶為吉的煞相㑹成敗不無四柱逢空不欲再見空亡不亡尤為庶㡬二位全見名利難成刑害者凶惡也三刑守害遇六害而凶惡難逃六害命逢遇三刑而同惡相濟刑居五福極主官髙害㑹的亡孤貧破敗斯為禍福之凖繩誠乃加盤之妙法百煞經夫觀命者未論禄馬貴人先論胎息神煞夫煞人之成器能掌君子之重權能發庶人之財禄煞之一字千變萬化煞多無貴即勇猛暴亡煞絶無貴即卑微孤獨君子帶煞權貴福禄之任庶人帶煞挺立鄉黨之間女人帶煞子夫刑傷之患煞無欄處定是傷身閉門帶煞反受災殃年上帶煞自損其身月上帶煞必損父兄日上帶煞夫妻必喪時上帶煞子女先亡若見四位無刑害須知夭折守空房陽刃之煞怕逢金刼煞最忌火加臨的煞須知頭粉碎亡神最忌水深臨六害重見六親損隔角逢之主孤貧孤神日上逢隔角未申戌亥丑寅辰巳其妻到底定生離桃花咸池来深處春花照水定生淫若是仕宦人家女不用媒人自求親大耗之煞怕逢空家財渾似雪和湯六甲空亡怕齊逢金神之煞主重喪六親不足而自嘆年年常為仵作郎呻吟之煞怕金神白虎逢之定不仁日時帶著損妻子定於中途斷絃聲命帶孤神寡宿星看經念佛作道人少年娶室妻子分至老定是作孤身一七之煞是亡神為人性躁有英聲衝入本身人凶暴衝出之時有功名勾絞之煞疊三刑逢之為人編配身春申酉夏亥子秋寅夘冬巳午亡神之煞五鬼臨限行見孛水亡身幼年當忌火湯厄為人作事百無成長生之位主聰俊發達英雄財禄亨華葢之煞為僧道學堂逢貴為儒名桃花帶貴多淫慾常思月下戀風情命坐刼煞十五年爺娘不損是夙縁若見雙親無刑害自身帶疾病相連命坐陽刃忌血星限行見煞定損身命中帶煞難迴避惡曜臨之禍不輕雙頭合煞十有九死兩頭合刃百有九傷合煞翻身三旬内患合煞回身傷刑而已合煞逢衝事事省半煞合逢刃定主夭折煞星逢貴能伏諸煞天月二徳加臨日上一徳當權衆凶皆散吉曜加臨災反為祥煞去逢空煞去逢旺而凶煞去逢絶而亡女忌血蠱男忌光官符怕火喪門怕水男怕擎天女怕遊奕男愛紅鸞女愛天喜喪門加於白虎主有孝服之事官符臨於刼煞必生口舌之嘆須要見行吉星之地忌在刼煞之上嫌於拱臨之中限行臨於惡曜一年反背而已吉星臨於運限門庭多生喜色日時莫逢太嵗不死一年多迍少年限行祿馬為人愈康愈徤少年限行死絶必生迍邅之憂老者限行生旺必是孤身之漢損尅成家之子老来限行庫墓必擅鄉尊之福又有優游之樂能察經中之句敢斷命限祥災判吉判凶知生死明如日月寳鏡臺運限起例支中人元子中單癸水丑巳癸辛當寅中甲丙戊卯獨乙為良辰中乙癸戊巳丙戊庚藏午中丁及巳未乙丁巳鄉申隠庚壬位酉字只辛强戌上辛丁戊亥為壬甲方年上起月正月建寅以年干加天干從寅起甲巳之年丙作首乙庚之嵗戊為頭丙辛之嵗從庚上丁壬壬位順行流更有戊癸何方起甲寅之上可推求日上起時子丑寅夘辰巳午未申酉戌亥甲巳還加甲乙庚丙作初丙辛從戊子戊癸尋壬子丁壬庚子居起立命看太陽在何宫以生時加太陽宫起順數如太陽在子即從子上起生時挨丑順數至夘便是立命宫又看太陽躔第㡬度以量天尺對立命躔何宿第㡬度起大運陽男隂女順行隂男陽女逆行俱從本生月起順行者數未来節氣逆行者數已往節氣皆以三日為一嵗少一日者借一日多一日者减一日只論立春驚蟄清明立夏芒種小暑立秋白露寒露立冬大雪小寒論節不論氣醉醒子曰觀夫大運者乃八字之表裏也取用當度其淺深成嵗須較夫多寡然三日而成一嵗見有餘人謂之零見不足人謂之借但知其零借不知其所以零借假如陽命正月初一日丑時正一刻生至初四日丑時正一刻立春節乃作一嵗全若立春在寅時則多一時乃零一旬也若欠一時乃借一旬也又以行運之法論之假如甲子年正月初一日子時正一刻生行運算至乙丑年正月初一日子時正一刻乃作一嵗内小六箇月即進六日在初七日子時正一刻方作一嵗只要算足十二月却為本年有閏四月乃多一月矣當退還本年十二月初七日子正一刻交運從此算後十週年方换一運倣此永無差悞若學者不知其生刻獨知其生時即以生時扣算交節之時亦不差逺凡行運在干兼用地支之神在支則棄天干之物其間理妙自宜詳玩起小運凡小運不論隂陽二命男一嵗起丙寅順行女一嵗起壬申逆行一宫或與大運相合相生或臨禄馬貴人之鄉其年即有喜慶或與大運相衝相刑或交併更臨反伏吟及煞方其年即主破財悲泣死亡孝服男怕衝女怕併又云君子不刑不發不併不達大抵大運如天將太嵗如人君二者相得相和然後隨事所至逢善則吉逢刑則凶所逢者當生年有則吉凶重當生年無則吉凶輕乆困而運通未必通乆通而運困未必困賦云寅午雖逢於冠帶尚有餘災行運初至於衰鄉猶披勘福五行衰者運宜旺五行旺者運宜衰仔細推詳萬無一失醉醒子曰小運者補大運之不足而立名也古人以男起丙寅女起壬申為從三陽三隂之象以是定逐年禍福鮮有左驗予嘗見一秘書以為男女小運皆由時生而行之逆順亦以年定如陽命陽年甲子時生墮地即行乙丑二嵗丙寅一位一年週而復始隂命隂年逆行亦然嘗試用之屢驗亦要與大運及柱内用神日主較量吉凶及童限未交大運専用此法行死絶煞旺之宫必有厄難先詳八字衰旺喜忌然後以此㕘詳蔑不中矣起大限琴堂洞㣲皆同命宫十五為例以太陽正處為中度遇交宫隨宫交三度起一嵗如立命在子女二女三女四共三度起十一嵗女五女六女七共三度起十二嵗女八女九女十起十三嵗後照此順推如八月十四日太陽在已翼十度照量天尺本行下推即十三嵗出童限入寅二十三卯三十三辰四十八巳五十七午六十四未七十五申之例凡行限遇生我之星定福尅我之星定禍若生星守限更限主飛去又逢生謂之體用俱生若限主飛在别宫受尅謂之體重用輕主是限中有吉有凶若限主受尅得重則雖發而難出此限矣若有救亦無害也起小限從命宫起逆轉如亥生人立命在丑就丑上數亥子年在子丑年在亥寅年在戌夘年在酉辰年在申巳年在未午年在午未年在巳申年在辰酉年在卯戌年在寅之例以宫分言則一命宫二財帛三兄弟四田宅五男女六奴僕七妻妾八疾厄九遷移十官禄十一福徳十二相貌逆數右轉以限度言則一命宫二相貌三福徳四官禄五遷移六疾厄七妻妾八奴僕九男女十田宅十一兄弟十二財帛順數左旋宫分次第不可亂也小限者是流年生日後交過宫其吉其凶一依大限斷之若在財帛遇吉發財遇凶破財兄弟等上禍福一一依宫斷之無有不驗須㕘原守及流年兩斷乃可小限宫中起生月名為月限訣凡一年休咎在小限一宫内若十二月吉凶則散居十二宫如小限在申值恩星官福田財等吉宿臨之是年發福若值煞難凶星其年必災月限亦然如正月看申宫二月未三月午四月巳依宫逐月逆週十二宫從小限行到太隂所泊之宫起生月逆數遇凶吉斷之假如午生人午上安命戌年小限在寅三月生其月在寅四月丑五月子次第逐月移宫謂之月限輪流十二宫週而復始行一宫遇吉凶斷之假如戊子年丑宫安命流土為太嵗流木為喪門病符流水為的刼流金為官符月限十宫逐月出入見木炁則此月有災事見火羅則此月有喜事發財以當生流年一體論之見木則病或孝服見流金則官事見流水則費財口舌不寧餘倣此日宿者直日之宿也月限又將日宿兼推須以太隂為主月是流年太隂即人之身也行度甚速兩日半過一宫故日月之災福繫焉以之加命看當生流年㑹何吉凶星隨遇而斷如命坐巳未申三宫以月水為主喜金水月木畏火羅土計却看流月行宫遇何日宿若日宿遇亢牛婁鬼金度乃生命之宿遷官近貴得財遇斗奎井角木度乃尅難之星解災獲福遇參箕軫壁水度乃本行之星室家和好事業安平遇心危畢張月度亦本行之星朋友康寧内外親睦遇女氐栁胃土度災病口舌官符是非若二限䧟弱身命主星逢刑遇煞禍病死傷遇尾翼觜室火度是非瘡熱驚恐啾唧若二限䧟弱與女氐栁胃土難度同斷若辰酉安命以金為主流月喜逢胃栁女氐之日宿忌尾室翼觜之宿餘倣此推仍將原守流年十二曜利害之星㕘看流年吉凶星照身命十二宫各有日數如命坐未宫喜金忌土流金入子午九日好入丑未八日喜入寅申七日稱意入卯酉六日遂美入辰戌五日好入巳亥四日財喜土為忌入子午九日災餘倣此甲巳子午九乙庚丑未八丙辛庚申七丁壬卯酉六戊癸辰戌五巳亥得數四已上即先天數十二神煞一太嵗劍鋒伏尸寄二太陽天空仍可畏三喪門内外孝事至四太隂貫索勾絞具又曰天醫五官符杖責難迴避六死符月徳同行位七嵗破月空欄干是八龍徳暴敗天厄至九白虎飛㢘衝此㨿十天徳福星卷舌係十一吊客天狗吠十二病符順行位流年十二變曜子年變曜流土太嵗太陽天空流木喪門病符亡神驛流火太隂吊狗勾神流金天喜天徳官符披流水月徳刼虎㢘的流陽天哭流隂天厄丑年變曜流土太嵗病的木太陽鸞驛空吊劫火天徳披喪金太隂天解虎㢘的水天喜厄哭官陽月徳死符隂地解嵗破寅年變曜流木太嵗披劫火太陽天空虎㢘金哭喪暴的水太隂驛解勾破血刃陽官符隂天喜月徳死符土鸞吊病夘年變曜流火太嵗哭暴金太陽天空水月徳地解喪㢘的劫陽天喜太隂勾隂天解官符木白虎病符土天徳鸞披吊辰年變曜流金太嵗月徳地解死符水太陽喜空官符陽天解喪㢘隂太隂勾火嵗破病符木鸞驛厄哭吊土虎披絞巳年變曜流水太嵗天解太隂陽太陽天空隂喪㢘金天喜地解病官的火鸞月徳吊死木天徳驛披破劫土厄虎哭午年變曜流陽太嵗隂太陽天空水驛爵喪病的金太隂鸞吊天解火天喜天徳地解官披木月徳死虎㢘刼土破哭厄未年變曜流隂太嵗水太陽驛鸞空吊刼金天徳披喪火太隂解神虎㢘木天喜官哭厄土月徳死的陽病符申年變曜流水太嵗天徳披刼金太陽空虎㢘的火天馬哭喪厄木太隂解神驛勾土天喜月徳官死陽吊隂鸞病酉年變曜流金太嵗爵哭厄火太陽天空木驛地解月徳喪㢘死刼土天喜解神太隂勾官水虎病的陽鸞天徳絞隂披吊戌年變曜流火太嵗死符木太陽天空飛符刼土太隂喪㢘血刃勾的金爵破病水厄哭吊驛亡陽虎披隂絞亥年變曜流木太嵗勾土太陽天空喪㢘火太隂喜病官金鸞月徳死的水驛天徳披絞刼陽地解厄隂虎哭以上變曜或化為煞或化吉宿並從冬至日為始假如今年丙戌子為喪門寅官符午白虎申吊客酉病符戌太嵗即乙酉年十一月冬至日始變丙戌年星煞則流土為喪門流木為官符流水為吊客流陽為白虎流火為太嵗若丙戌年冬至又變為丁亥年煞星如酉年流金為太嵗龍徳天厄流火為太陽嵗破流木為喪門死符月徳刼煞流土為太隂官符流水為白虎亡神病符流陽為天徳流隂為吊客之類此變曜斷法先以命宫為主隨以各宫所屬主星飛出在何宫與原守流嵗星辰生尅制化衝照拱合相㕘看如戊子年丑宫安命者則流土為太嵗流木為喪門病符流水為的刼白虎煞流火為太隂吊客如以丑安命上為主見木炁則災見火羅喜事財名流木疾病孝服流水破財是非不寧將當生與流年兼推星學大成卷三
