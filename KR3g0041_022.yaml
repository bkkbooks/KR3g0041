body:
  text: 星學大成卷二十二明萬民英撰三辰通載天尾計都星總龜算法將羅㬋定度加半周天數計都論計都為天尾星配屬土之精豹尾黑道之宿也擅行於天與羅㬋相對逆行天道喜則紅鸞天水星怒則為黑煞貫索星遇交於晦朔圓望能掩日月之光壬生人以為祿主星甲生人以為囚星乙生人以為蔭星丙生人以為刑星丁生人以為正魁星戊主人以為印星巳生人以為耗星庚生人以為權星辛生人以為暗星癸生人以為催官福星此星廟在亥旺在戌樂在寅好在未喜卯巳怒在辰琅玕經云計都廟旺最難逄婁宿宫中祿更豐躔栁在身知職貴到寅生夜主名雄榮華更在昴心宿髙旺須同金木宫十一位中尤好處生來多事不成凶賦云計都臨戌亥之位官至左右僕射洞微歌云計都之星喜戌亥餘位之中不可逄此星樂與木氣相會可為貴品威靈節操文武兩全歌云天尾星辰會氣木能解災殃偏主福只是孤尅又云計都之曜不可聞難為兄弟及兒孫若得出家身最貴總為學士兩三分若陷沒與火土孛忌囚之星同宫主下流凶殘夭折刑法破害少男少女少資財多病多迍多口舌若照身命宫則主橫死或主身雕眚六根不足賦云計都照身值溺水兼於毒藥又云計都若臨獅子位須遭五法又云頻遭患難暗曜入於月宫若獨行廟樂之宫照臨者則大貴六壬生人以水為天官正祿與之同宫則吉計都歌計都本名凶惡曜雙女魚羊為好廟面顔似火膽如神骨相堂堂粗勇貌有心機多巧妙夜同隂宫宜守照計都乃凶惡之星好躔雙女雙魚白羊之宫為好廟聲名顯赫有威風掌握兵符權最要在他宫力半效聚散資財立身閙計都在廟地有聲權掌握兵符在他宫減半力資財聚散閙處立身經求博算及屠沽心膽情懷多執拗計都主博算經求見日月真好笑父母無終深可弔金來妻妾被人傷土火徒流遂堪料水來盜賊不良人木紫凶中為吉兆與日月同父母惡死金同妻妾傷土火同徒流水同主盜賊不凶值木紫凶歹吉孛同折首最為凶財帛之中多計較三宫昆仲惡中亡四位舍居曽火燎在三宫昆仲無在四宫居舍被火燒子宜外姓及偏生六位不堪乘馬跳七宫妻尅兩三人疾病躔身難治療計都在五宫宜異姓偏生在六宫不宜䇿馬七宫尅妻八宫主疾官祿如逄獄裏亡十一宫中偏不紹陷宫十二相不全此經妙處真玄妙神尾元來號計都惡星同位必凶徒同宫紫氣反為妙縱有衣糧身也孤天尾一星無大凶最愛加臨福德宫若居疾厄仍舊疾若在妻宫妻父窮羅㬋交日計隨交天尾同位主分第申人若與孛同酉四星居位真神首羅㬋居午計居子子丑生人初主福紫人生辰計在時子孫大貴命先危為人性怪及姦邪夀短元來不用嗟多是此星在髙位自然為事定和諧戌人戌上見其辰以戌為時富貴人生日命中羅孛到謀名謀利兩艱辛辰戌魁罡坐計羅初年謀事若奔波三合火星并土宿年耐虛名不貴何北人時日晝南方羅南計北不空亡官祿太隂本髙貴紫星辰已定田莊癸人甲乙盡居前計都在日是牛田只怕太陽并土宿若教登第便迍邅計都紫氣若同歸戌巳生人喜得之土與太陽同戌位有宫無祿亦堪悲婦人計都尤為祥若居廟處十分強賢德克家生貴子只愁老去卧空床土命計都入辰土此方近廟家資富安次辰巳日時生方主夀髙終辛苦神尾為名少有朋本來天上一提刑人如得地逄之者何慮前程事不成計為凶曜本粗才細膩偏欣木氣來若在廟鄉逄著此更居隂位不成災計同日照疾偏多投藥無如患難何隂毒生來偏妬忌更能快口起風波計都臨喜怒宫喜宫名為紅鸞天水天索星主形神寬大為事慷慨心有惡毒只宜在命及官宫須為官職在别宫若為僧道方可壓若無吉星相同常人必主不測非刑死輕者減夀算貧賤之輩亦不宜入身宫主少年尅母兼母有疾應水火厄及五般疾不然亦在外方破敗惡死有救星減三分若戊巳生人必為顯官怒宫名為毛頭貫索星煞星主作事不知前後暗昧愚癡照身命無救星祿馬落陷主流配數千里外惡死若為僧道可以減災亦主夭夀婦人産厄計都躔宿俱出玉關經玉關歌計躔角宿號天衝五星逄之立見凶惡暴性情尤毒烈促夀猖狂必法終計躔角宿宫有始亦有終辰上計雖怒角印不生凶計都正照臨於角不論晝夜少才學常人主病及官刑有位定遭官職剝計躔亢宿號天戈軍陳成功福未多不是軍戎并健輩定須自縊與投河亢躔天尾入則富貴男有功名女有封位計都在亥未相和縱有才能阻亦多惟利木來并旺土稍居定疊免奔波計躔氐宿號天通東出尤宜十度中若對命宫聲逺著更逄吉曜福豐隆氐為暗曜在栁六度若在辰宫貴曜福履計都東出至於氐十度之前防女妻更是命宫相對照青春發早正斯時計躔房宿號天迍難為兄弟與兒孫晝日陽宫定應破不爾須交見一門房計廟日兔與天尾相宜若計躔到此一生不奔波房中亦喜計都臨志大心髙樂夜隂産業資財承祖力老來猶自性沉沉貴格云尾曜房宿號樂區萬里揚威真尚父計躔心宿號天嗤狡猾無凶出賤微性急心髙難耐事須知夭夀少年時心喜計屬土土餘在卯宫在卯應見土得水性相從計都之星頗類火夜樂於心多急禍交讎宿怨不興慈晝見之人難得可計躔尾宿號明星百計千方巧性存若是火同身須貴自然文學二三分尾寅計都入三陽則生嗔寅艮火生位到此號凶神天尾一星憂入命來居最吉躔在尾必招悖逆不孝兒不孝皆因先自己計躔箕宿號天都不招祖業自身孤心中巧計尤狡猾此人衣食也無餘箕怕計福難堅水豹有財只夀難延人道計都喜寅地躔來箕地宜修進清髙食祿有威權日曜凶星惡死定計躔斗宿號天梁智慧聰明子息強會得文章須近貴文學須教播四方斗上計星到到此則爭妍鎮星同入廟災散永安然計都性急好遊走夜旺二十四度斗土同氣月富貴全若非常流當獨守計躔牛宿號天常丰采堂堂性格良更得善星同在度垂紳搢笏侍君王牛宿躔計廟樂相并為人多福溫厚信誠計都喜立在牛旁眉目分明性善良禮貌溫恭人急速官資卿監祖宗光計躔女宿號天遷為福須為土地官躔在度初大為貴遷官疾速定非難女計號金鑾金鑾福最難煞星在身命妻位不相安計都偏動女人心亦主姦邪亦主淫暗時是非迷酒色何須分度再逄金計躔虛宿號天流父母須逄骨肉仇若見孛星同會死定知處處夜行偷虛喜計土為廟樂宫惡星若入爭雄反凶若論虛中逄著計值此星人多作贅不為僧流却無家亦主俗人相牽制計躔危宿號天遊衣食艱辛事事憂尅子損妻身破散平生孤苦未應休危計到老無末福妻兒孤尅更無成計都姦濫上危門金水相同亂若紛男在妻宫男淫女女守夫宫女必奔貴格云天尾虛危偏福厚保安皇祚不傾危計躔室宿號天真性烈官卑位不清若得水星來救助為官七品至公卿室號天堂計福異常若為廟地惡不相妨計都室宿號髙強大貴權星吉又昌三合若逄竒曜照少年遷職佐君王計躔璧宿號天魚四度之間十度居正廟之中官極貴十年之內位金吾璧星此地號天衢計都躔此福偏殊祿主祿元同度內少年衣祿佩金魚計都本是到雙魚正廟之中璧水㺄四度以前至十度身當極貴宰臣居計躔奎宿號天雄水月逄之官必榮若逄火土凶星照亂世英雄不善終奎星在戌計居多憂到此不輔沉埋悲愁計都若守在奎中五度生人主智雄不論隂陽并晝夜貴星亦要吉星同貴格云計都若臨奎宿度掃淨妖孽定封侯計躔婁宿號天垣旺廟之中定主權體貌堂堂威望重將相論功二十年婁躔計月朦朧若土同入不夭終凶尾宿亦喜白羊宫婁宿逄之亦貴重才智過人身烜赫夜生方得祿豐隆計躔胃宿號天刑日生更逄火來并若不雕青文被面定須犯法必為兵胃戌酉計為廟只要在初度照神尾行來西沒宫胃土雉中不可逄十度以前尤可怕尅妻害子見重重貴格云計都最喜躔經胃秉鉞分符除僣偽計躔昴宿要星扶初限元來懶讀書只可就來刀劍上將軍位上至金吾昴酉計到必至紛更兼是土金終有敗初逄火曜兩爭衡計都喜酉臨於昴夜照為榮同吉曜智謀雄略衆人推性急才能多計較計躔畢宿號天征呼為天上一提刑若還得地逄之吉必定前程有大聲計躔畢晦朦朧女則昏淫男好色其人機巧又孤窮四七宫中忌計都那堪更犯畢中烏長則離妻幼尅母平生處性甚虛無計躔觜宿號天扶僧道之人豈是孤若見財星三合照不是牙人作販夫觜好計來躔為人尊而安神尾觜宿不可逄水金相遇在其中身命值之誠可畏男人淫蕩女私通計躔參宿號天歡水星得遇定文官庶俗若逄須忌此定知毒惡見傷殘參計福元清得氣同度臨計入財當盛加木福尤深計都性行亦為良參水猿中值可傷晝遇之人尤短夀夜生最喜在髙強計躔井宿號天衝命裏逄之立見凶若在祿宫尤見喜提兵百萬逞英雄井在申未位計到井難容得木在秦地天尾不可凶計都執性多貪酷未申井度皆孤獨男主雙妻女再夫幼年傷尅難為福計躔鬼宿號旌旗威武兵權立見機君子逄之官品貴小人刺面有凶危鬼計福相當二星好共行隂鬼自然散安命更軒昻計都躔鬼有風癆斬指屠兒傷害多若臨男女并田宅晝生離散奈愁何計躔栁宿號天災命裏逄之大見乖骨肉分離財破散父南子北不和諧惟是栁星在午宫十三度裏不宜逄更有土星并木曜若來同度最為凶計都栁土度中居尅陷妻兒萬事虛夜生偏喜月榮貴離倫絶類自超殊計躔星宿號天鞍命若逄之有祿官庶俗若逄文秀士凶星如見刃傷殘星逄計宿此來遊星火明而計必愁星火凶星嫌晦曜一生不吉只多憂計都星上日休同晝夜生人不可逄此是蝕神傷犯分目不盲時耳也聾計躔張宿號天狐妻子身邊一箇無疾病耳聾并眼疾貧窮困苦莫嗟吁張不喜計必主迍邅月不依土主難還鄉天尾來臨張月鹿毒害姦貪情性酷日生弱地不為宜夜見強宫未為福計躔翼宿號天蛇性毒心凶身刺花更兼惡事重重見不然心亂好淫邪惟有翼星不喜計翼火蛇行計自通蛇有尾兮能履地初生三度却無功計都晝見翼宫傍破祖須宜兩父娘勞心勞力身無暇為人性氣亦猖狂計躔軫宿號天強官職須教訓練場節度兵刑須大位才猷奮迅佐朝堂軫宿計妙最髙位却喜計都來相纒若是福財兼祿主髙強入廟兩爭先計都在天為暗曜軫水一度為正樂眉踈目秀委權尊雄鋭英才多有效計都行度天尾在隂宫雙魚軫十三度十度以前至四度值之者官位清髙合居廊廟掌國家兵戈財帛錢榖出納之權如在髙位四十前發如在低位晚旺十年性不利父母兄弟若在軫璧三度居東出西沒官為三公職封王侯福祿及子孫也陽宫白羊亦在貴位旺十八年仍須在四正宫若在諸位見木日即吉在下是火土為亂是英雄必不善終若在東出西沒主尅妻前尅凶妻計都入宫日宫主為人重厚作事超羣入位淺諸星在有力位上其人大貴三方主在稍髙位者多因賊害成事乃貴逹月宫主有心機作事明敏木宫主性聰慧更作強宫主貴晝生轉加福力火宫主為人性急好行凶惡事一生多被人暗損陷在心宿其人有殺伐之權不居此宿微有職土宫主為性拘執作事能審是非得暗昧財成富金宫主為人好爭鬬多口舌因婦人致厄難得善星救之可免水宫主有少年多災善星救之可免晚年有祿琅玕經節要計乃好勝貪求之星惟宜夜照福祿贏餘紫木氣同清俊顯任旺廟升遷祿財榮盛計都與紫木二星同居旺樂不分晝夜皆主顯官清俊之任財帛豐盈子孫榮旺水計相逄成敗重重為性不定共處難同水同計都多姦猾好訟便私不可同交友共立事亦多成敗金孛同行夜照權名晝人多難險難招刑或見金同或與孛同夜人居旺主武職貴顯若科名髙亦主文科顯祿之人晝逄則主犯刑招險不忠良之人計都同土晝益財利夜生對照經營迍滯計同日月父母多别主背身低貧窮下劣計同日月多刑尅損頭目促夀傷父母成敗多更若主星不照即窮苦下賤之人為性不常火計夜照宜居廟旺生殺威權兵符可詔忽若逄晝變為凶曜福臨救之蠲災免害獨宫夜照權要自大計都臨照十二宫命宫守照命宫主頭圎眼急貌稜心粗眉小耳大形瘦武勇身多毛聲音焦烈先瘦後肥性急不耐觸心髙性烈喜鬬貪求每慳小棄大執事不回為謀姦猾千方百計髙談闊論頭妻有子小得全成主旺髙強財祿榮發與善星扶合在廟宫為祿主可為貴品威聲節操文武兩全守照命宫居官清顯榮逹職位彌髙白日見之災憂一世經云計都臨命照性暴逞才能背祖身孤立依髙附勢行初年災禍重晚歲福宜生夜逄孤位照家門財業成詩斷計都暗曜最凶星金水加臨名望振何故有官不赴任只為計都入天稱計都守命衆星扶初限元來懶讀書才氣無雙真可許將軍須到佩金魚計都在命孛相尋女破家風必好淫但有善星相照著侯門歌舞遇知音天尾之星人牢名呼為天上一提刑六癸壬庚并入廟前程必定可相成財帛宫取財如緣木求魚水中逐鹿近大財使大財隨得隨失初年成敗中末主却旺計照財帛無成立見財須有惡事破敗詩斷天尾加臨第二鄉勞心只為置田莊莫教土孛同來位翻令手足播馨香第二宫中犯計都一生財帛總成虛更有栁星同一位若不貪婪定主無兄弟宫兄弟不得力若獨行兄友弟恭計照多須見三人少全無詩斷兄弟宫中有計都參商義薄有嗟呼直饒四海皆同氣各自營謀各自居最是巳亥逄羅計羅主尅兄計損弟男犯羅孛女計都男尅妻兒女尅夫田宅宫主父先亡不受祖蔭一世茫茫自立家計有吉星照者只得二分田宅有氣來傍照則不以此論計照一生不招田産及因子孫營立詩斷強宫之上計羅侵福祿消亡禍日深祖業到頭都不守虛勞計較沒身心男女宫男女希少若見早則全尅宜晚年則主一子縱有子多所謂貧家骨肉不相和睦不然亦主是少在壁宿大貴有福力計照合偏子大吉宜求外姓親生全不得力詩斷計都或居五宫中子息生來一箇無若問隂人須寡婦如推男子即鰥夫第五宫中遇計都男兒箇箇要樗蒲在寅戊申并酉上娶得妻來盡尅夫奴僕宫常被奴僕脫悮及防小人欺詐計照平生不可乘騎有墜跌之厄詩斷計都有妾便為妻失財連併及災危下陵上僣不安分須教厄難馬前衰弱宫之內計都侵不見為凶百禍臨縱使機關多智慮虛勞半世沒身心妻妾宫臨妻主亂經云計都紅鸞星一名號天尾一妻不到頭二妻不到尾若娶第三妻亦恐無終始又云三十年前不問妻三十年後不問兒縱有還須生死别黃金也亦化為泥若妻有惡星相抵則無害又云計都第七位賤女聘為妻不賤須重嫁他時不可知主以賤女為妻年髙可免尅凶星産厄腳手有疾計照主妻自刑惡橫死亡詩斷計都暗曜莫相逄何况加臨對命宫舉止乖張饒害尅定知造物不相容疾厄宫土水疾多突壓身危又云主氣疾手足刑破孛同瘖啞盲聾金同雕青痕疾計照主十相不具或行步搬移有天災之厄詩斷次弱之宫名疾厄計羅守此多刑責若逄吉曜更加臨無病却為衣食迫計都一曜最凶宿威焰炎炎是窘迫得臨疾厄第八宫貴賤逄之須病足遷移宫不宜逺出守祖業則安若為官遇他州亦主有權又忌水火災厄不宜兄弟朋友小人為劫奪之患計照招方外卒暴不利改動作事詩斷計都天尾照遷移利害之端仔細推出外迎祥因廟旺不然平照定傾危遷移排在近弱宫第一凶星不可逄偃蹇勒停兼破祖方知計孛在其中官祿宫食祿遲晚四十以後方顯逹常人得之主遭無頭公事官刑主有血光之災初主不好中末主方好君子吉小人犯刑殺死又名剝官煞居官進職及足有疾計照不可與他人作保識多被别人事犯重罪之災詩斷計都之宿最凶殘官祿逄之利害間若在廟方須貴重廷諍天陛逆天顔羅計臨時必主凶不然身計係於公若被孛星同守照徒流身寄異鄉中五星併位居官祿生處英豪多五榖若逄太乙來照破上官赴任定不祿福德宫多主反覆才有好事反成凶兆亦主多計姦巧夀短刑破計照不可與下等人交往多惹是非與小人同謀損陷身事詩斷天之首尾臨福德平生凶事反為吉坦然不忍妄加人患難尤能拯危急天尾計都來到巳入廟之宫當巨富只愁土孛更同行南北遷移無處住相貌宫形神醜惡面貌古怪骨大肉小顔色多惡少善貴而有權亦主暗疾貪花不然以婢為小妾計照性多損失言語不定得人憎怪詩斷計都在後命在前陷溺之宫豈作權假使貴榮當顯要亦須體貌不完全缺唇生瘦并夭刑十二宫中三箇星子戌未方為福德却遭首尾孛同行計都變段星寶瓶宫黑道星又名悲怨星主哀怨悲傷詩斷欲知黑道在何宫子位計都不可逄八煞命宫遭毒藥可憐短命喪兒郎磨蝎宫伏殃星又名孤尅星恓惶尅害六親詩斷計都為惡伏殃星丑上逄之最不仁作事隂謀凶且狠土人得此不為迍人馬宫悖逆星又名卒中星暴卒惡毒呪咀詩斷計都不入三陽宫人馬宫逄悖逆星田宅宫逄人不義更加三五轉無情天蝎宫祿昌星又名天疾星腰駝腳跛刑害詩斷計都却喜卯中藏四正宫中號祿昌兄友弟恭仁又義家風榮盛性溫良天稱宫天嗔星又名刑吊星喪吊臨身詩斷神尾逆行大不順若居辰上號天嗔一生為人心路險切忌雷傷虎豹驚雙女宫六陽星又名虎印星主虎貔印祿也詩斷太乙宫中喜計都處身廊廟得安居君寵臣兮臣盡節揚名鴈塞到中書獅子宮枉亡星又名哭泣星主憂煎哭泣也詩斷枉亡星宿在於離神尾居之大不宜魄散鄷都年不永更憂狼籍損妻兒巨獬宫白衣星又名天孛星主刑獄禁繫也詩斷未上白衣事不堪隂宫凶吉兩相參強宫吉曜同為福第七宫中妻見三隂陽宫地纛星又名天妬星隂謀妬害詩斷隂陽神尾為地纛此位逄之不為福身命四七十宫逄男女同臨受孤獨金牛宫天蝕星又名喪厄星喪吊哭泣臨門詩斷酉中日月怕同臨妻妾宫逄有異心更犯太隂娘早尅太陽父位少光隂白羊宫天符星又名天正星得權祿馬之貴詩斷天符河魁神尾喜雖逄惡曜即為災四正七強俱發福不求名利自然來雙魚宫六喜星又名天遊星主遊冶孤虛之福詩斷計都休作凶神位躔至雙女六喜神文章筆下龍蛇走却作驚天動地人星學大成卷二十二
