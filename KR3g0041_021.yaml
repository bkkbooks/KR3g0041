body:
  text: 星學大成卷二十一明萬民英撰三辰通載天首羅㬋星總龜筭法置積日加五百六十以六千七百九十四逆遊數除之逆遊數别列上位記之其餘不盡者為殘分以五因之却加入上位逆數二以九十三為一度又不滿者入分秒平行一日行五分三十七秒羅㬋論羅㬋為天首星配属火之精黄旛黄道之宿也一名蝕神隠行於天其行宫度有喜怒一宫一年半十八年行一周天逆行天道喜則為天統星怒則為天傷災網星遇交於晦朔弦望能掩日月之光為之薄蝕天地犯之崩裂山嶽犯之傾頺川澤犯之枯竭至於雲恠星妖冬雷夏雪未有不由此也此曜不能興善好作妖孽主血光傷破斬截凶殘寒熱瘴氣身命犯之則有成湯之旱帝堯之水文王拘於羑里夫子厄於陳蔡司馬遷宫刑左邱明失明賈誼之賦忌鵩李斯之嘆黄耳聖賢猶不免此庸人見之更有惡星同宫乃為六極之人一曰凶折二曰疾三曰憂四曰貧五曰惡六曰弱若入廟則為貴格癸生人以為禄主星甲生人以為魁權星乙生人以為囚星丙生人以為印星丁生人以為催官刑星戊生人以為貴星巳生人以為䕃星庚生人以為耗星辛生人以為福星壬生人以為暗星此星廟在午樂在卯旺在辰好在酉喜在戌怒在申琅玕經云權星守要最難遭晝日陽宫近貴豪張角度中身顯地昴星宿上武名曹又云餘宫限内多為福隂位無災禍必消更有變凶為吉處宫當十一自榮超馬嘶龍躍值羅㬋卯酉還來戌上求同日陷妻并害父雖居廟旺亦多憂賦云羅㬋在命位至五品殊勲若得紫木同宫照視可為雄鋭貴品主人特逹慷慨火土孛相㑹多主權刑躁暴公吏掌殺妨妻廢祖貴則威權賤則傷刑若獨行廟樂之宫照臨者則大貴六癸生人土為天官主禄水為科名與之同宫則大貴羅㬋歌羅㬋性格最為髙形相猙獰膽氣豪不奈是非無妬毒日生陽位始堅牢羅㬋性格最髙形相猙獰有膽氣不奈是非無妬毒好日在陽宫逄廟地有操持榮加旌節有旗旄富貴只宜官位立隂宫私合苦煎熬羅㬋在廟地有掌權加旌節之榮宜官中立身若在隂宫煞居凶日月㑹時人見蝕湏憂父母死難逃羅㬋為蝕神與日月㑹則掩日月無光謂之蝕故主尅父母也金㑹助權好兵武更防因色病成癆水到財多逄盗賊本來才調好風騷與金㑹好兵武因色成疾水到財招盗木㑹文章土逆四肢不具足火扶好殺弄鎗刀兄弟不宜財破蕩四宫賣却祖東臯與土同更逆四支不具足火同好武喜殺二宫損財三尅兄弟四破祖業子息位苦啼號六宫妻本名春桃羅㬋在五宫尅子在六宫以妾為妻妻位妻權中主尅八宫攧撲定須遭七宫妻有權主尅妻六宫主攧撲之災福徳夭亡并絶嗣相貌為軍是此遭在十一宫主夭亡絶嗣在十二宫主為軍羅㬋一宿名天首若在髙強好飲酒如逄吉曜共扶持必有重權來到手羅㬋元是貴權星只憂土孛與同行廟樂二宫為福徳他宫重疊犯官刑羅㬋元自是權星甲戊方中起大刑除却廟堂兼帶旺縱饒為福也無名何以羅㬋號天首只為凶星為福厚凶星福厚人未知寅夘午宫分外竒九星活曜梟天首太隂同宫人物醜寅宫卯土午三辰専主此星為福厚命宫官禄若相逄必定其人身在公若被孛星來照着一生刑責累遭凶荆州更及雙魚宫兩處臨之更不凶若是貴人相遇着定持兵印作元戎白手成家自買田只因天首氣聲聮若非寅午并天蝎賣與他人不要錢大凡福徳與羅㬋一生隂徳旺田牛或若對宫逄此宿子孫名譽冠神州午人午上值羅㬋置産生錢及外州更得孛星臨帝座子孫佩印更封侯惟有羅㬋能起福婦人失位招夫禄不在寅午并卯宫子酉二方當納粟帝座尊星人未知或為日位或生時惟有羅㬋并月孛此星相見十分竒羅㬋雖説是凶神若使单行逈出倫對合更無刑戰忌威名端的冠朝臣首曜於人性不和善星不助惡尤多平生好作欺人語壟斷無圖奈若何天首當生所在宫限如逄此有威風不能為禍終成福若在髙強更有功天首從來怕夜生更居凶位伏屍名若非死在隂人手即是征人奠旅靈羅㬋臨喜怒宫喜宫為天權天統星主形神痩薄為事通逹慷慨其星利君子不利小人值木金土更見禄馬主重權之位官職清烈若無五星相協只㸔五星體格得地皆為貴人若無救星更作八煞入西沒宫多為僧道兼主災只是不利入人身宫湏主險難兼母居疾又主暗昧若遇水火二宿更見禄馬便為一品之貴身命逄之無禄馬救星有十二般惡病若单照人身即有不測事一則危險之厄二則六根不具三則母居惡疾免此者湏减爵而極貧窮怒宫為天傷災網星凡人遇之主一生禀性愚昧若照人身命只可為僧宜在公門為人孤獨多招不測災此星宜在命與八煞官禄宫為公卿員郎方可壓如是庶人主牢獄之災處世貧窮不堪照身宫主三般危險之疾一主暴卒二主水火三主血疾若無此主短夀貧賤之徒羅㬋躔宿俱出玉關經玉關歌羅躔角宿號天模性直機謀出衆徒家道自如心莫妄運限扶持事可圖羅㬋角同行居辰禍不生五陽居正位正位則尊榮羅㬋度分到鄭鄉角木星臨喜此逄不在遷移并八煞命宫福位保安康貴格云首曜來躔龍角上誅鋤姦黨理朝綱羅躔亢宿號天般心性藏物也湏寛機權特逹人欽羡晚年衣食恐難安亢宿龍宫居祼體衆星殊百星皆畏謹亦是五陽居羅㬋生殺有威權亢宿居之三品官水若同行操大柄不臨四正亦堪言羅躔氐宿號天擕命若逄之必損妻頭男頭女終湏尅資財却免散東西氐属卯羅逄抑欝又終凶此身不顯赫縮首福皆空威權才勇是羅㬋最怕躔宫氐宿遊官位逄之終剥職凡人值此主徒流貴格云首躔過辰氐宿度上將封侯食萬户羅躔房宿號天從大富資財膽氣雄文武兼全官五品兵刑之任福偏濃房宿正属卯陽宫行到東華氣鋭雄羅首日華湏振領來朝陽位不為凶羅㬋權要最難遭房裡生人定貴豪遇日逄之官位顯少年必是賜衣袍羅躔心宿號天辰巨禄髙才出衆人巧計多知人果毅威聲逺播四夷賓心為大火明堂位人君布政在心宫羅到此宫主孤獨更兼強暴甚貪䝉首星一曜號黄旛心宿度中甚美觀火與同宫威武志性情偏急夜生寛羅躔尾宿號天畋命裏逄之有重權上將論功心好殺何愁此地不為官尾首火雖安首號天府官武職官入閣遷移更孤单忌地如何却躔羅為縁暗曜必多磨不是六根當破相將來風疾恐難逃羅躔箕宿號天聰廟旺之宫禄早逄百萬兵師歸統御金吾位上及三公箕好水同遊羅箕可封侯若木同度立木羅夀更脩箕上權雄得遇羅資財蓄積貴而髙衣錦還鄉人慷慨木如同位有權多羅躔斗宿號天磨命若逄之福來多智慧機宻能出衆也須財利帶犇波斗属丑寅方羅逄福禄清見此為福曜獨好兩宫行天首不利居斗蟹性𦂳無常主妖恠臨妻必是座中亡居宅祖財多破敗羅躔牛宿號天韀剛毅能為主重權面貌豐隆髭滿面妻兒先損謾機圓牛不喜羅躔見土福不綿土雖朝此地牛土夀難延羅㬋幾載上金牛不被囚刑位列侯暗宿日生臨照命湏知心裏好行脩羅躔女宿號天廵牛亥生人立大勲廊廟之中湏大任其他衣食且平平女在丑宫邊羅逄女不堅女本温柔宿首居此迍邅羅㬋與女喜相聞雖則貪滛暗又昏火共土同皆廟旺朝君恩賜荷明君羅躔虚宿號天鏐甲命生人位列侯身命若逄衣食旺到頭終是喜清幽虚星正在此羅列勢難鳴衣冠朝北闕羅立拜嚴宸神首循行虚宿前閑事災殃度怕躔男犯刑傷遭吏責女主流血復迍邅羅躔危宿號天樗此人肥厚更鬍鬚心機藏事財生旺自成自立免憂虞危在子躔此位不隆初主薄甚禄位不豐羅㬋欲度上危方不遇凶星得命長禄非横星兹位立亦能為福復成殃羅躔室宿號天躔為人出衆有威權作事操持心耿直酉命逄之是大賢室天門首朝天若居此鎮蕃宣羅㬋居室最難堪禄命逄之不用貪縱有文章髙北斗中年之數五二三羅躔璧宿號天持機智文章計出竒天文立象湏榮貴夀筭多能名譽馳璧宿正天門星到此居尊惟羅為管轄戴天履地存羅㬋本是逆天行璧水㺄中禄不延惟頼木星同守度方知威武掌髙權羅躔奎宿號天威情性焦煩不受欺為人猛烈心剛直狼貪妬婪足食衣奎宿正在戌羅火封侯職財氣更同臨入廟多逄吉天首陽星最喜陽奎星戌位不為傷七度以前居亥地此為隂處可尋常羅躔婁宿號天誌抗直傷人兼有義多招閑事是非多衣食生來心未遂婁宿正在戌羅宿怕相宜五隂乾亥近五位正天墀羅㬋婁宿正權星火土同臨亂世英膽氣麄豪兼好武為文終是少科名羅躔胃宿號天懌記問淵源性剛直小人此位亦威權君子逄之進官職胃不是廟羅到不宜日生遇火火滅非竒胃中神首主隂迷屈背駝腰怕孛齊若是此星來對照女則傷夫男尅妻羅躔昴宿號天蜻出衆機權多好勝初年湏破晚方成果毅特持有權柄昴羅火不明到此為孤星息宫終尅子木同夀終傾羅㬋昴宿最為凶若無星救身命宫更被囚刑忌合照虎狼惡死恨無窮貴格云羅㬋若在昴星鄉伊尹霍光真此煩羅躔畢宿號天危言語猖狂惹是非尅害妻子君莫怨平平衣食也随時畢宿不宜羅羅同事更多田宅因兵火䘮失若奔波羅㬋畢度金烏晦望夜生人最不竒此是蝕神長掩月處心無定事難為羅躔觜宿號天申亥命逄之是喜神家道興隆金玉富為官應是侍楓宸羅火在觜位惟怕水相防木曜躔箕尾炁順有相當羅㬋暗曜得人憂若更來居觜火猴女落風塵男破蕩金見好滛盗賊流羅躔參宿號天津稟性清閑心洞明籌䇿自能知道釋衆人欽用振威名森羅萬象中惟要太陽同陽明觀萬物參宿不昏䝉羅㬋躔入晋宫來參宿逄之主有災成敗不常財帛散遭官落獄限中排羅躔井宿號天空怒地平生運不通若得木星同在度木羅相愛却無凶井曜首相逄兩界必無功火餘終汨没水同不甚凶羅㬋慷慨性情和井宿相逄事若何身本怒宫未隂位凡人遇此主迍多羅躔鬼宿號天昻心髙機變足文章形貌魁崇肥且厚子孫應是保安康鬼宿兩相當羅來居未方夜生宜好鬼逄則必軒昻羅㬋到鬼闕難定雖負文才少權柄忽然惡曜與同宫兄弟爹娘分兩姓羅躔栁宿號天鰥愛樂林泉志在山胷次文章才廣愽猶如僧道喜清閑栁好月孛兼月亨通羅到為陷必主飄蓬羅㬋躔栁是隂宫不作禄星定主凶忽然獨行官福位若兼火土事難容羅躔星宿號天圓命若逄之主重權兵刑法令堪充任武選文階兩位全星曜兩宜羅好午中男受爵禄女則䕃封羅㬋正廟在於星眼瞋性烈氣豪英三度之中并五度職兼文武掌權兵羅躔張宿號天目命若逄之多發福威聲逺播名髙強師相居朝榮貴禄張宿羅躔福夀綿綿羅㬋廟度不宜張相值之時必反常獨守宫中最髙位不逄惡曜亦榮光貴格云羅旺正廟獨欣張出將英聲閫外揚羅躔翼宿號天愚心毒藏機語不虚巧妙性情容貌美貴人親近得安居巳午本羅廟在午日居中到此為輔佐惟好翼相逄天首之星躔在翼身命臨之招惡疾頑愚暗昧不堪倫死落他鄉非舊室羅躔軫宿號天神武品之官此位逄生殺之權心獨任金吾節度兩般同軫本水羅火逄未亨通為水衝羅㬋在巳人為貴軫十三度大安康土若不來臨此分妻兒雖尅自觀光羅㬋行度入宫天首在陽宫星宿三度及箕四度以前為正廟居此生人主好殺因此立功名官居重權職兼文武法主兵刑值之者二十年主生殺將相之位在隂宫昴心為旺入軫十二度至十五度主為任逺居三品之官二十年主生殺將相之權見木月在四正宫宜官若不居廟旺宫但止見木亦宜官與土同宫主大柄見火亦大富貴遷進疾速日宫主有節操臨事鋭多勇猛有貴位主星如居強位必有生殺之權稍得福星之力主有位如無福星臨三方不居強位一生多惡事上立身因此成敗月宫主文學多色慾有貴位更得諸曜相扶位至三品若無星助三方稍髙其人亦有權木宫主性格聰明足詞多智若入宫度淺晝有位夜有財入宫度深晝微貴夜微富火宫為人性急幹事明白好兵權有掌握晝生大貴夜生有福土宫為人性凶猛好殺害晝生有福夜生大富金宫主為人聰俊有威權晝生貴逹夜生有福火孛同宫則減力水宫性格聰慧好文章有才能入宫淺有位深有財瑯玕經節要天首陽星不宜夜照廟旺除凶資財不耗金木月宫威權雄勢主順髙官顯名榮貴羅㬋同金木二星若主星順廟至英雄貴顯節操重權羅同太陽相見有傷不然尅陷衣禄不長或同月曜刑害亦然旺廟災輕常招訟言羅㬋與日月同宫則有交蝕主尅害父母妻子亦主衣食艱辛非旺廟宫則多訟厄招是非羅同土曜晝則興隆夜生共火權掌兵戎晝土羅㬋入廟封侯夜則損夀土逆凶同羅土二星皆陽星晝居廟旺更順行則掌重權進封公侯之禄夜則為忌更土逆則凶害孛同羅㬋掌握機謀廟旺貴禄餘宫優游羅同月孛主巧性智謀居廟旺主食禄若背則漂流之人星居旺地紫炁同行貴而清職顯於禄名縱在他宫才興名旺夀筭延長福資尤妙羅㬋照臨十二宫命宫守照命宫主眼圓神潔形質端厚貌古有神色重骨堅語音亮大性急怒物臨事有斷義直於人心有謀用特逹慷慨得人欽羡不受人觸小事致惑大事有斷謹而不慳義而濟物少年省事福禄不堅災難易得晚歲方有成立五星相扶便為重權官職清顯若五星在八煞宫及官禄宫皆為貴人鎮諸星而為首背諸星而獨行順躔張栁統領兵符正入陽宫威權獨重在命則表儀浩浩照身則容貌熈熈見木宜遷官進職好官星大煞戌巳午寅夘辰子丑申酉君子立身廊廟為官掌兵食邑萬户一生榮華金火土孛同入主疾尅害妻子破壊祖業宜於貴命見之經云羅㬋臨命位權勢自能髙少逹終有滯財名晚歲牢若然入怒地成敗屢經遭晝遇限宫見迎恩見貴豪詩斷羅㬋星惡見星君却見當年在卯寅更若癸生為禄主仰觀平歩上青雲羅㬋在命若何看文武兼資信不難但得一星金與水若非秉筆即登壇財帛宫入廟吉初年破末自立君子吉小人破如是煞方大耗大破若吉相逄則主横財羅照多得衆人財力若太盛則主有破詩斷財宫之上是羅㬋得已財時便好休更若狂圖多富蓄如何不破被姦偷羅㬋寅午最為佳男兒白手自成家平生兄弟渾無力縱多不若自榮華何以為人富不仁只縁財帛犯星辰星辰不怕逄羅孛羅孛元來怕太隂生時獨犯天首尾不入廟時災咎至如何財帛積如山只為此星居第二有財無産命如何只為財宫帶孛星午上孛星午天首浮財不足税錢多羅㬋財上多官厄非人不用相接識忽然熒孛入宫來任你嘍囉難計覔兄弟宫兄弟三人各胞異姓羅照須見三人怒宫全無詩斷第三宫中有羅㬋侼逆乖為可自憂宗𣲖同源恩義等只縁凶曜一時休田宅宫主父母兩三重或自身螟蛉或随母嫁羅照命有田宅先破後成反不招祖業詩斷若是羅㬋先尅父得居田宅敗湏榮合得隂人財禄貴機權方藝定湏成羅㬋天首最凶殘祖業雖多守則難可惜田園千萬頃都縁凶曜見䦨珊僧家道舍屋楹多實然土宿與天羅田土雖多無屋宇年年飽食别人禾男女宫各胞異姓亦主損子添丁則長子不利羅照合生偏子大吉宜求外姓親生者全不得力詩斷男女如何便榮貴只為權星皆得地若教寅午遇天羅若子若孫長守貴此星随處管吉凶惟有子孫不可逄除却寅宫并午夘其餘長飬總成空寅宫羅㬋最位強未必能歸子息鄉若在子宫真大貴有兒只是置田庄羅㬋臨之皆下賤犇馳茍得未為安六癸生人多足嗣髙攀仙桂定為官奴僕宫防奴婢脱悮羅照平生因奴婢刑尅損命多迍邅事不宜小人詩斷天首加臨第六位心腹親人謹切防雖然足使奴無主欺凌偷盗被逃亡羅㬋難與善星交奴僕之宫逾怒號假使尊嚴崇道徳反居陋巷自簞瓢妻妾宫男主損妾女臨夫宫一同羅照主惡曜之妻中年方尅詩斷羅㬋凶暗名天首不占髙強對宫守是惟一世有災迍孤寡難昏更麄醜天首和諧多美態湏教逺地始為婚不然帶禄兼連印亦因官職有名聞婦人寅午為夫位第一不宜逄紫炁孛同羅㬋是福星合照夫榮并子貴疾厄宫主偏廢風疾損四肢多官災羅照有險僻小疾或於胷脇下有痣大吉湏防登髙失墜詩斷天首羅㬋第八宫世間何事此真凶直饒夜禄重重貴面也湏防有病攻疾厄宫逄土與羅一生疾病十分多直饒紫炁來相助争奈家豪常病磨遷移宫主攧撲不宜朋友羅孛對照多招賊盗羅照不宜道路出入防有不良事損陷詩斷羅㬋凶曜號權星臨照遷移不畏人得在旺宫為禄主必因提薦貴榮身如何破散又離鄉只為羅㬋到戌方戌是遷移羅孛到漂流外縣置田庄官禄宫當官主有威權日水同宫為台座火土同主作盗羅照合有主執四方領䄂受相職位詩斷羅㬋元是貴權星四正居強最吉寧限運逄之多吉慶更延夀筭禄千春天首羅㬋廟處尋得臨官禄是竒珍功著殺伐威聲振諫諍王庭動紫宸永主遭逄強又強天羅此處不相饒若逄火土金交照半文半武志英豪福徳宫為人有權不宜男女同紫木金日月更得地少年榮貴羅照多因凶而吉因災而福主立身之事詩斷天首羅㬋為福徳超羣出衆事乖張合主瘟㾮兼盗賊財空貧賤少年亡十一宫中天首臨凶星來照務荒滛都縁暗曜無威徳故使逄人不仰欽為人似惡本非惡天首太陽相照着官禄若是衝太隂堂吏撫司兼重禄相貌宫為人美鬚髯貌黒羅照性多損失言語不定得人憎恠詩斷羅㬋天首臨相方别為隂徳觧其殃更兼忌曜縱横見若不相殘即繫梁羅㬋變段星寳瓶宫天𤣥星又名天狼星主貪盗亂世也詩斷天枵神首太𤣥星相呼集貴有佳聲更在七宫逄吉曜還湏顕赫且髙陞磨蝎宫天鬼星又名天禄星雄威鎮列九州聲詩斷煞星天鬼號牛斗身命遷移浪蕩遊假使強宫同吉曜也湏破蕩走他鄉人馬宫天威星又名天印星主印禄星貴也詩斷羅㬋寅位號天威掌握威權鎮四夷此是權星來入廟揚名何處不光輝天蝎宫武庫星又名天卒星主卒亡惡死也詩斷武庫之星躔至卯主人心髙性情巧只忌日月此宫中雖貴雙親湏早卒天秤宫地暗星又名天柄星主權柄自為執事詩斷天罡首宿為地暗夫婦鰥寡主惆悵不然寄飬外人家父母資財無可望雙女宫地隔星又名天巨星大富大禄詩斷已上羅曜為地隔八煞宫中成水厄雖然吉曜與同流性格輕盈招盗賊獅子宫龍首星又名大權星掌握貴權詩斷午上龍宫真可羡名至朝叅登玉殿馳名方面掌藩垣威鎮四夷能制亂巨蟹宫暗金星又名天孽星孽毒猖狂詩斷未上羅㬋號暗星豈知凶禍苦來侵身命犯之難得夀輕則孤单鶴髪人隂陽宫天廢星又名妖毒星主遭毒藥夭亡詩斷申宫天廢是羅㬋禀性頑愚少智謀更犯煞星同一位陣前戰士更無頭金牛宫祼形星又名天章星居官吉謀利徒然詩斷祼形之曜在從魁女嫁男婚不用媒滛蕩無仁無禮節棄妻傍妾小和諧白羊宫都官星又名九狐星主狐媚妖邪事詩斷戌上都官獄吏神為人鯁直别尊卑土曜同臨并四正一生受禄有君恩雙魚宫天煞星又名暴卒星主暴死亡不得善終也詩斷乾宫天煞是羅㬋怕至隂宫禄位休若被忌星相照破更加八煞死荒邱星學大成卷二十一
