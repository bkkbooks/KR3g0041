body:
  text: 星學大成卷十九明萬民英撰三辰通載六曜太隂星總龜算法置積日減二算以三千二百二十四一之為順行減積日行餘不滿順行數者以九因之以中數二百四十八數除之除不盡者為殘分在一百二十四以下入疾厯二百二十四以上入遲厯疾行一日行十四度半強平行一日行十三度半強遲行一日行十二度強二十七日有竒行一周天更行二日與日合朔太隂論太隂月宿水之精一名莫星其色青白其性仁慈人臣之象母之所配其行宫度有遲疾弦前行疾弦後行遲已具于前大約遲疾中間率行十三度三十七分一月一周天生於滄海之上出於正西之方也巳生人以為祿主甲生人以為貴星正魁星乙生人以為印星丙生人以為耗星丁生人以為福星戊生人以為暗星庚生人以為權星辛生人以為囚星壬生人以為蔭星癸生人以為魁刑星此星廟戌旺酉喜巳樂申順於亥丑二位怒於寅看此月在何位則為安身之所若旺樂之處則為吉夜生人見之會金木二星於身命宫主福祿全備享福溫暖更為祿主星在旺宫大貴至月朔則交會在卯十五則相望上弦生人為福下弦生人則減福若圓望會羅計二曜定主交蝕此星配屬夜生人三方主琅玕經云月精廟旺照婁星出贊圭璋輔紫宸臨身自然名職重躔胃應為台鼎人水金共位威權鎮木氣同宫秀氣臻不晦不殘行淨道益財益祿自榮身若在驛馬貴人祿宫之地則大富經云安身好在祿貴鄉若逄祿馬最髙強居在妻鄉多作贅不然妻尅主其雙若遇空亡孤寡地九流之士甚相當忽然好生疾囚位男兒夭賤女非良大抵論星須安身坐命臨在祿馬貴人之鄉則無不吉更得善星照視同宫則其貴無疑此太隂星惟六辛人見不分日夜全不得力最忌計羅同凶經云計都臨身難免此生之毒藥鑑心經云計都身命火星逆忽然羅孛或相當此命終須逄夭折不然橫死路頭亡又云計都坐命太隂中身命逄之毒藥終坐命在辰者以此為官星六癸人以為食祿神坐命在丑以為科甲夫看命推星先看其格斷人災福如魁星入天門與天官正祿同宫更吉星照命者便作大魁斷之金木羅土計五座總入廟更一星近月當作侍從命斷之權星祿主為吉星同入命者作京官以上命斷之五位星辰入命或有入廟乘旺喜樂宫者作三品職斷之月孛獨行天門朝有太隂在巳者作翰林學士斷之三刑星同在官祿宫作幕職命斷之二十以上則無赫顯宜四十以後方見享福羅拱天門與氣相望更有吉星入廟照命者或三位星辰在福德宫者並作貴斷之巳生人以火為天官正祿星喜輔於月須夜則吉晝生傷母太隂歌太隂乃是月之精才出中天萬國明初夜一輪光皓潔人皆瞻仰快人情月之初生人皆喜見配母道身從生月配母道身從母生溫柔豐美好儀形命宫兩曜交相合貴位宜居始見榮日月交合照人命主如此歲德同宫賢聖善外家送物不曾停月木相會主賢母夜火會得延齡晝生風患母須刑太隂與夜火合主夀晝生主風雍尅母鎮星來同言蹇滯下弦眼目更無睛土星會主言語蹇滯若在下弦主眼目失明也金好色妻淫聲不賢內政非禮迎月金會好色主妻不賢反非禮婚太乙若逄須庶出紫氣阿母好通僧紫氣阿母甚分明月配母身從母生身與孛會又主庶出天乙相會母通僧道居財帛隂貴成第三間極母康寧自身一世多間逸棠棣和柔好弟兄田宅位聳簷楹子息宫中是女星奴馬金鞍招女使滿前侍妾好娉婷疾厄無刑無疾厄遷移偏是好遊行還居第十并十一有官有福不虛稱戌酉未申見太隂巳兼寅亥喜來臨冝圓冝夜冝三位入命多孤財祿深太隂入祥月數加須榮祿位美奢華晝生淫亂無宗族金木同途宰相家太隂不問入祥在髙強宫與金木同行皆多清貴入宫淺者則官入宫深者則加減以定之也太隂晝生與火同不為奴婢必盲聾更若主星居陷沒其家應少白頭翁太隂未上最多昌若躔柳宿更髙強生日若還逄著此功名富貴必無雙太隂躔昴定非常夀永平生無禍殃切忌計羅并孛照少年必定尅親娘太隂居位乃強宫財帛榮華一世豐入陷間宫憂母死金木交連命不終太隂太陽同宫吉太隂入廟主田庒三方若得齊生旺定知官職至員郎月孛對宫如旺夜必為臺諌肅朝簮更宜夜火必髙貴若遇土星刑害侵月明本位當榮顯廟旺應須作傅岩更或旺宫同水順定居臺省到朝參太隂圓夜若相逄更在髙強廟旺宫三主隂陽無背陷起身從此是名宗月同歲德倍多情必主初年得祿榮若在旺中居午上終看晝錦故鄉行午乃祿號之位月居八煞忌相干豈是朝郎以上官怎可失心居相貌若臨奴僕不堪看天乙對同多益算發財兼水又兼金若還與水同宫位福祿之來必稱心月火分明入命宫金星巨蟹惡星同莫教留逆還原守定要流徒不善終太隂得地主科名官祿文章世有聲年少必登龍虎榜髙攀仙桂一枝榮太隂殿局朝元太隂在巨蟹宫金牛為本殿居子午卯酉為本局張心危畢謂之朝元群曜參奉曰太后受朝隂位值之定為母位臨偏則尚為后若陽命受恩蔭之命太歲值之或羣曜取次輔佐建旺秉權當得正位六巳生人最佳太隂躔宿俱出玉關經玉關歌月躔角宿名天貴學問淵源須大智多才慈惠更溫良夜裏生人最為利角木蛟星度十三月若臨之實可堪不問疾遲并晦朔喜同金木與相參月躔亢宿名天璣富貴榮華人好異平生歡樂足豐榮妻妾顔容更竒美辰為亢宿正金鞍太隂逄此喜團圎月曜金龍身瑩潔珠沉海底水偏寒月躔氐宿名天劫性急多嗔又乖劣日生兵火須逄難若是夜生衣食絶氐宿躔卯又屬辰此宫月曜未分明卯位相連氐土貉月華晦昧失隂精月躔房宿號天祥文章學問更蕃昌出衆機謀多巧計平生衣食夀須長太隂辰滯集于房月兔移來日兔傍鬭戰雌雄雖不決於人那得有安康月躔心宿號天韉運用機謀智未全少年未脫生涯計如臨晚景始安然心宿所屬在東華月華到此不堪誇大火既從心上盛隂精安得不羞他貴格云玉兔疾行心宿度植圭端冕侍君王月躔尾宿號天宗勇智多謀膽氣雄穿窬摽掠心常有見木方教免禍凶尾宿天江月逈遲有才多貌稱丰姿男女多淫色欲重秦樓盡醉不知歸月躔箕宿號天財冠古窮今學問該但得對宫逄吉曜文星得地應儒魁箕位雖然本屬寅寅宫箕位有風清風散彩雲有明月雲開又見月華明月躔斗宿號天封偉望威名學問通君子逄之須得祿小人逄此走西東北斗經躔好月遊瑤池貴就斗星求斗宿同隂偏喜夜月明斗夜向天周月躔牛宿號天蔭作事施為要沉審性直溫良少辛苦才過中年便安穩太隂夜見至牛金間極宫中福倍興私居財帛朝朝進官爵名髙日日新月躔女宿號天寶學識聰明多智巧文章冠世少登榮遷官必定居廊廟女宿從來要隂精隂精女位古同聲若遇計羅來入度太隂必定晦無明月躔虛宿號天常有貌才多更善良衣食豐盈倉庫實聲名閭里自揄揚從來虛宿要隂精月明虛地氣尤清莫要土星來並照月空尤喜月華明月躔危宿號天文胸襟磊落足經綸為人玷汚多巧計圖盡機關行不真月兔移來月燕危平生懶蕩性虛危格中升殿誰知識恬淡純和福夀兒貴格云太隂好處最宜危男必公侯女后妃月躔室宿號天鸞形貌清竒富貴全更得水星同位立直須奏對近天顔亥上本位屬天門八萬三星盡拱環月屬隂柔關內室隂來理內福彌專月躔璧宿號天曄語言蹇滯事沉思若遇蝕神兼月孛主須生長在寒微惟有璧位正天堂月沉雲漢有餘光女有精神男曉事夜生科甲衣金章月躔奎宿錦肝腸不勞餘力至員郎更得吉星居十位定應台輔見君王奎為金闕正陽宫月居闕內秀胸襟須要正陽端在午太隂臨戌廟中尋月躔婁宿號天垣旺廟之中福祿全君子遷官居祿顯小人衣食旺庒田婁宿之中遇太陽婁金狗吠月更深平生作事多謀望終是孤虛枉費心月躔胃宿號天印十度之中貴無並更兼金木又同行金榜題名官一品月行胃宿怕逄金九度逄之貴格深合照更遭水與孛為人不免有貪淫月躔昴宿號天光平生官祿不尋常聰明才貌超今古異日須為給諌郎昴宿屬酉正月門此宫西位月專權更有水星同度立一生清貴富兒孫月躔畢宿號天明峻宇雕墻保萬春更得金星來照助少年及第不虛稱月離于畢雨滂沱身命逄之色欲多闕月躔軫宿號天理勇智多端文學貴少年辛苦老豐隆赫奕聲名傳萬里月如到軫是髙強一生清厚有柔剛身命限中俱見照龍池鳳閣佐君王太隂行度月在婁宿八度十八分以下為向廟以上及行木度為正廟在胃宿一度十八分為背廟胃宿十度以上至五十一分為正旺七度十分以上至十度為向旺十一度以上至十三度八分為次旺以下為背旺巨蟹為本宫若此廟旺樂宫生人並貴在金牛宫胃十度外十一度內為旺度主居貴位若見金木又居有力之地必為一品之官若雙魚宫及有力之地則為節度使若在辰戌之地與蝕神併居蝎則為凶盜之徒見火尤甚必不善終在無力之地見金必落風塵以婢妾為妻及姦通骨肉若在昴宿之間亦居極貴之地只旺七年若在蟹宫為好樂之地亦為木分之宫主貴若張氐胃女之宿及見金更在下位多淫及於男女好色欲也日度主有貌多才足聲名為事方圓明白殊常有福若是主星大貴婦人遇之大旺夫位月度主形貌超群精神爽快平生有稱心之福每遇貴人見知巧言語多淫欲好女色木度主足文學有殊常之福好經營多財産少貧老富中弱火度主性急多災有兵火之厄一生為事卑賤少與貴人結交更有惡星同宫在官夀短吉曜加臨免之土度主一生多蹇若吉星助之更在月初大貴因妻子有憂過三十二吉因妻有喜金度主富貴有貌好歡樂有母妻妾王者委用多因婦人災若是女人主荒淫水度主聰明智慧有學問心下巧出入得貴人重太隂入宫日宫主好歡樂多病平生多福每遇貴人見重是主星夜生富貴日生微福月宫主性密口敏不是主星微有福力若是主星因婦人富貴夜生足財有權位木宫主稟性沉厚好慈善有威名多財祿是主星夜生轉加福厚火宫主為人性急多智勇見事不長平生與人結交因此有厄是主星可免土宫主性溫作事沉審夜生尤甚日生好女色平生好訟性好殺足心機有詞智是主星微有福力不是主星平生多災有善星照望則免金宫主好容貌人知重巧言語多情欲得婦人敬愛謀事多成一生得暗昧財物水宫主性聰明為人有行多智見好文章有聲名足財産夜生輕巧會文章好圗畫不貪多被人玷汚太隂同宫月木同宫主文學出衆更得大貴人見知若二星有一星在旺樂宫有科名當清要任為給諫大富貴詩斷太隂惟木便相會玉骨氷姿謫仙隊男主封侯女貴妃百六如當足祥瑞木月居命不為僧縱然為道也無成只是幽間髙處士須攀桂籍有聲名月火同宫主性急多惹人暗地是非是主星有位非主星多災有善星救則免亦主被惡人纍及性遲鈍因繼女有厄男娶得富妻女稼公侯夀至中年有祿語澀詩斷太隂熒惑喜相逄智將謀臣著顯功天産其人為宰輔如當百六慶無窮太隂若被火相逄一寸資財散落空母賤父亡兼夀短為僧為道也無終月土同宫土是主星有學問身貴晝生福厚貴逹夜生微福不是主星多災害言詞蹇澀性純夜生作事淫濫主缺唇母有疾詩斷月土會遇火為災偏産頑愚性質呆百六會時人夭喪忠臣失職竄天涯月金同宫平生多與婦人結交每被婦人相撓不是主星作事無定宜防婦人相損婚晚多情欲有貌志氣髙詩斷太隂金宿喜相交百六逄之慶瑞􅊶天産其人扶社稷官居裂土與分茅自來月要與金同食祿須知得位崇若是當生為土犯斷然父母兩三重月水同宫主性格溫厚和睦持重若水是主星文藝出衆得國王重用好論訟女人有厄木見則免詩斷月水相逄慶瑞饒人生遇此賦天才溫純德厚榮尊爵百六當之福祿來月羅同宫必主貧賤妻棄子逃日生多招刑法夜生猶可不宜母詩斷太隂天首喜相隨智出鷹揚塞外威莫教望時生叛逆禍臨百六可愁悲月氣同宫主大招衣食醫術顯名詩斷月氣文章一世豪為人志氣冠吾曹母夀靈長兼清雅官班超轉職崇髙月氣相逄最竒祥福被生民慶且昌萬福攸同逄百六人生值此必侯王月計同宫夜生招獄訟日生猶可不宜母月孛同宫亦然詩斷太隂在望計都同爰産姦凶不孝忠不在望時終有怪投河毒藥或瘟逄琅玕經節要月乃隂曜福惠之星主方夜照職祿尤增月圓髙宫顯任威治如同金水益財益位木與月同大為福會天乙對同夀算髙至孛月對同才術可委夜重晝輕所應有異太隂宜見氣木二星主性仁敏名髙才邁清幹之人亦宜孛夜照主廣記博覽才性宏逺動逹尊貴更居廟旺給諫功臣土火月同得失可議夜同土星必招刑害風狂夭夀之人夜同火星雖有刑尅則享福祿若安廟旺則主大貴羅計月同亦為災障太隂好行靜道逄羅計則有交蝕其光不顯却為災障若月在於廟旺減其福祿貶官失祿如居常度又值殘晦則犯刑遭法尅害尊親妻子多刑家道不立親近惡黨恣行凶暴如若逄之多不廉矣更加火土孛逆則為惡死之人如得吉星救之亦帶疾傷殘而不善終金木逄之招其福祿與日同宫顯於名望太隂照臨十二宫命宫守照命宫形貌清古體不重肥面方神足骨秀色清性明急嚴緊能幹身孤力寡或假親戚倚其勢力臨事憂勤不倦足慮多權最宜為商財産失而有成心力能當重事設在窮途亦能成立最喜夜生足財足祿生在廟宫大貴主福祿全備享福溫暖為人俊雅作事善良心懷矯曲結交無終始修學有科名小人衣食不招凶危日生逄火難為母主風狂溺水夜生逄土口啞缺唇在無力之地見金為風塵婢妾與火孛氣同守命宫損父若有水助主風疾逄月孛同計都主尅母在陷宫加凶星難為母金木相當生來少疾秦趙宫中金星助月少年及第詩斷月照人無俗多孤自有成掌財宜市賈託貴有權名明急招言妬妻良贅可膺若能圎夜照財祿自興榮太隂偶臨身命宫更無刑尅起災凶四元三限同強位看取封侯列土封太隂逄氣起災迍計孛交加又變嗔夜裏生人難際遇遇之名字播天門太隂隂滯多淫欲行度照臨頻受福遲留伏逆上推尋入廟天厨分得祿財帛宫主財多耗散得貴人力會祿馬者有積聚多財寶月照一生近貴人財帛亦主得福人財寶成立詩斷太隂得傍命宫排事起隂人大得財若見忌星相破犯必因姦盜此中來月居財上福為深更加廟旺足珠金蝕神若不相照視縱有災星禍不侵兄弟宫有夀有財不宜母兄弟難為凶曜同照有亦不和却多姊妹主良善福德之人月照主兄弟可保一二人之力詩斷第三宫中號玄虛星曜臨之力轉踈惟有太隂當此位命中福祿乃贏餘太隂反為福德星只為加臨到弟兄金水太陽同一位亦知天下有文名田宅宫主招外産置立田莊必命有吉星方能發祿如逄凶曜多貧窮加羅㬋尅父加紫氣尅母流孛破盡祖業又有自縊水厄月照主髙貴宅舍大招田宅産業詩斷太隂火星同到午雖是過房猶尅母若是金木與同行子孫榮貴著金紫太隂照曜若相逄自立榮華萬事通又招隂貴增財力遷移三處振家風男女宫主身近貴得一子力不然義多值羅計同尅長子月照先見女宫詩斷隂偶臨宫識者稀得臨子息愈為竒不惟長子無刑尅更見髙髙折桂枝長子如何多産女只因月與命相依命裏逄之多是吉何况此位更逄之奴僕宫主尅母見金姦通骨肉得小人力若金與祿主會者乃專貼典吏背祿馬者乃卑賤之人月照主招鞍馬有得力女使詩斷陷方奴僕最凶衰隂偶臨之母不宜仰念劬勞恩至大空持甘旨泣慈闈為官侍從多車馬三合太隂出六宫若是土星相對見左右相隨並罔功妻妾宫主妻良善美貌端正有財益夀金牛宫大吉會月孛妻血疾并生離吉星救免主作贅壻月照主貴相之妻反因妻家發旺詩斷太隂西沒最為佳明淨之宫無點瑕更若尊星相對望必生貴子佐皇家夫家有福婦家貧只為孛星加太隂自因夫婦和柔了恰主浮生甑有塵疾厄宫主好潔淨土同主目疾獨見可免值凶星主惡疾更加惡曜疾病尤甚必主一疾壓身終不能脫月照主平生少疾吉有夀不犯天災詩斷太隂臨主八宫存畢世災危杳不聞忌曜莫教同此位雙眸渾似月遮雲太隂加臨疾厄宫太隂官祿足為凶父亡母存母又嫁隨母飄飄西復東遷移宫出入利見大人得人輕重巨蟹宫三倍力加吉星主有官職亦宜財富如見計孛惡星一生孤寡多刑及生離死别吉星救減半月照一生好逺遊常得他方道路之分詩斷太隂得在九宫中三合加臨照命同偏利遷移商賈客必因隂貴得財豐九位遷移犯太隂父兄才死便窮貧對位有星相救助方道貧家在富人官祿宫主少年近貴無官災君子有祿小人衣食會惡星主徒配會吉星祿馬主有科名而貴月照大宜奉公若有官厄常有恩赦之救詩斷太隂官祿作身宫木火同行福倍隆孛計不逄功愈重貴因戚里得侯封身居官祿不尋常福德星辰入命鄉廟樂不曽刑本命為官須坐紫衣堂福德宫為人性善心慈有福德大富會吉星主孝順會凶星心惡暗羅在三合宫主一生暗昧祿馬皆陷為事無成雖有權星臨於祿位不能貴月照多因福人持挈立身髙上詩斷隂偶來臨福德宫雍容道德貴尊崇更有吉星臨木位生長皇家族派中月居福德最為妙處世為人足有餘一生輔弼當明健為官獲福在參厨相貌宫形貌爽朗清秀主富貴聰明月照主形相具足多被小人相輕不可與下等人作事詩斷相貌太隂仍孛星羅㬋同位最相刑兵部牒中著名字末年財帛振英聲三日宫中看命星命中吉德最為榮忽然忌曜來侵犯甘旨空持泣母親太隂變假星寶瓶宫天后星又名天皓星主明健湛寂也詩斷太隂子上為天后女貴男榮盡主權多缺多盈逄望晦三宫得此母長年磨蝎宫瑤池星又名天皓星主清間之福也詩斷太隂元來水之母丑是瑤池佐君父遇望英明至下弦女則金冠男台輔人馬宫陽明星又名天馘星主事馘毒多後悔詩斷陽明寅上曉星臨日出扶桑溺太隂遇夜生人尤減福日生潦漉乏資金天蝎宫桂影星又名天車星好逺行得衣祿詩斷月宫桂影仰扶踈對照西華畢月烏二十八宿皆仰月周回萬里沒差殊天稱宫始晦星又名天關星女遇之孤房也詩斷辰中始晦月無光對望宫中怕太陽火土計羅臨照視英雄難保少年郎雙女宫陽極星又名天暗星主女人暗昧欺罔也詩斷陽每極時隂未至月臨雙女蕩非常女逄忌曜多淫蕩男是貪花卧酒鄉獅子宫朝陽星又名天暗星主得女子橫財詩斷月內金烏躔栁宿正臨離位失其明夜生朝北身榮貴身近君王雨露恩巨蟹宫玉魄星又名天福星主福祿貴逹也詩斷井鬼宫中月喜躔未中玉魄夀長延女人邑號身長貴四正宫逄祿位遷隂陽宫地弼星又名天官星主文章貴顯詩斷宫屬隂陽遇太隂不宜觜宿只宜參參是水猿猿笑月一生才學貴人欽金牛宫玉樞星又名天後星男貴顯女難言詩斷月到金牛號玉樞少年必定飽詩書三方盡在髙強位一世優遊在帝都白羊宫歸朝星又名大道星主妻不賢潔也詩斷太隂元后戍歸期總領羣星上玉霄只怕日生逄首尾為官晚景却蕭條雙魚宫執璽星又名天晦星母不賢潔本身福祿隹詩斷雙魚執璽太隂星月到中天分外明忌曜不侵須富貴水金相照有佳聲天乙紫氣星總龜算法置積日減一千二百八十八以一萬二百二十八大數除之不盡者為殘分轉一當十以二百八十為一度二十八為一分次下除為秒平行一日行三分五十七秒紫氣論天乙紫氣星續木之餘吉祥之曜也一名景星乃天華蓋之氣百川霧露之源又名道德之星順行天輪或隱或見其行宫度一日行三分五十七秒一宫住二十八箇月二十八年行一周天行道有黃赤之不同喜怒之無定此星名太極文昌之星山遇此氣服藥有沖天之人海遇此氣水族有化龍之象國遇此氣則明君出郡遇此氣則賢人生枯木得之變生蘭蕙蚌蛤得之能出驪珠照人身命則富貴雙全福夀備足仁慈道德心孤好善能解孛計之難善救火土之厄辛生人以為祿主星甲生人以為蔭星乙生人以為魁刑星丙生人以為貴星丁生人以為印星戊生人以為耗星巳生人以為權星庚生人以為暗星壬生人以為正福魁星癸生人以為囚星此星廟在丑旺在亥好在寅樂在申午戌宫安皆喜惟未為怒琅玕經云氣星牛斗最為珍福祿崇髙上逹人室壁星臨超職位尾箕應出貴豪倫申宫得見招財祿午戌相逄富貴身身命限中如見照益財恩祿有相親經云紫氣元是木之餘紅肥清白少髭鬚同金同水皆為貴木若臨之福最殊此星天上文星行年及身命限得之學者春秋必逄補中小人見此一歲無憂凡事所為吉無不利如遇科舉之年得臨命限定主秋闈一薦必騰萬里之聲金榜髙登直透三層之浪然亦不可一概論須當推詳命中原守星得力然後看洞微限如遇忌曜則為不吉若為方主反凶成吉遇氣限者功名成就凡事稱心行水限值之亦吉一年顯逹經云紫氣不來難發解任他才學有髙聲奈何金榜無名字只為此年無此星若與太陽同在金牛巨蟹宫為福甚緊皆主貴位若不居樂廟之地在餘宫照人身命主為性緩慢多為九流之士好耽釋氏為福亦甚薄與木月同宫在命主性清髙兼有貴勢多愛奇異晝生母亦長年紫氣天之喜曜性頗類木好清間淡靜所臨之處只與人為福不與人為禍偏樂與水木日月同宫為福緊也獨行更陷在辰戌丑未四位為福甚薄宜仔細推詳紫氣歌紫氣衆星中最善形相分明人仰羡心懷仁義性溫柔作事與人為方便無妬毒多謹願少病利官長夀算紫氣在命主人慈善形相分明性溫柔有仁義作事愛人方便心無毒少病利官有夀好耽僧道立身孤舉措施為慵更懶紫氣在命好耽釋氏孤立性多慵懶日月近貴作間人月會母親先化幻與日同近貴為僧道間人月同尅母夜火同時醫與巫土木更來尢懶慢與夜火會主巫醫與土木會主慵懶金同妻妾是娼尼水會智能稱俊彥與金同妻非娼則尼水會有智能巧技彗星分得賊人財天首僧尼訟爭戰天尾星同有機變與月孛同主分得賊財與首同主因僧尼爭訟與尾會主機巧狡猾財位橫來財寶現三宫姊妹或為僧四處廟田主巨萬在二宫主橫得古器寄隂財寶在三宫只招姊妹兄弟為僧尼四宫巨富奴僕門下出緇流子息須知女先見在六宫主有僧道出身門下五宫先招女子西沒宫中妻密情更與别人情似線在西沒主美妻與外人通八宫終不染時災官位不曽見州縣九宫逰賈福宫間相貌為人性良善紫氣見木木見土或為正限或臨之相逄必是聲名貴此曜元來是紫微九星惟有孛堪畏為福全然歸紫氣跳位臨宫廟次佳其他災福有定議紫氣若與財星至當主資財一等竒只恐早年多破散不然妻妾主生離未人申上見紫氣重疊逄生主清貴孤辰隔角并宫行母死父亡進田地紫氣躔宫到磨蝎要於月上推圎缺圎時清秀有財糧缺處伶仃多破滅亥上紫氣到雙魚若是隂人祖業富重疊逄金尤更嘉一旦文章定遭遇木紫同逄亥子宫髙強衣食大昌隆水入旺方逄紫氣子孫清貴富家翁庚辛之年紫申酉初主奔波人物醜貪色貪財更貪杯又因娶婦旺資財紫氣居前後有日若臨田宅尤為吉月孛計都同共來老去令人貪女色天乙多為應夢竒紫袍呈瑞是佳兒若躔廟旺凶星避的是留侯作帝師流年若與氣相逄種種為祥不解凶舉子遇之須發薦仕途得此必官隆當年紫氣若臨身下筆驚人似有神帝座木星同照著終須富貴作朝臣天乙躔牛是福基性髙行直更心慈若教陷却三方主縱使為官只奉祠天乙從來主大孤命如逄著莫狂圗三方不向竒星陷斷取緇黃即是渠紫氣臨喜怒宫喜宫為太極紫微文鳳清福星若照身命主性清潔為人溫厚清間或照官宫更會吉星當為六品之貴若無祿馬只作中福人怒宫或為天女天虞星天會天匱星若照人身命無救星多主出家及在人之第七宫決然為僧道若是庶人在陷宫見之必尅害妻子顔色烏黑有救星則主清貴紫氣躔宿俱出玉關經玉關歌氣躔角宿號天休機智清間藝術優僧道逄之多吉慶庶人不繫若虛舟紫氣臨人多殊異角木蛟中主尊貴僧道章服庶人財職司之人增祿位氣躔亢宿號天僮性善文章藝術通不獨為官并富旺神仙樂道福無窮貴格云紫氣若來角亢方萬里台星光爍爍氣躔氐宿號天環雲水留心自得間耿介孤髙人自傲為人只是好居仙紫氣來氐不十全雖為財庫夀之源計土火羅同入度災多福少不當言氣躔房宿號天衝平生清福有誰同道釋白衣好消息資財衣祿却豐隆卯中有宿名為兔紫氣正樂房三度榮封妻子祿超羣又且揚名益宗祖氣躔心宿號天德子孫雖有終須尅儒學釋典自能通玄象天文須會得心宿大火在東宫氣曜來居怕火逄紫氣本無心上火氣藏心火必爭雄氣躔尾宿號天姻心性豪強尅子孫謀略威權心莫測聲名忠義播乾坤尾星好氣在寅宫寅位東方氣曜雄蓋氣好行東令首仁慈尊重少災凶氣躔箕宿號天循智識機謀果毅深性直文章聲逺播貴人相遇有知音箕星本在木宫居誰知氣屬木之餘此曜好淫為入廟箕風好動氣終虞氣躔斗宿號天斛飄然孤潔為清福文章忠直外安間朋友柔和衣食足斗為帝曜自尊嚴氣宿相躔福祿綿此位偏宜道德曜得居星斗是朝賢貴格云天乙若臨南斗方尺璧寸珠未為寶氣躔牛宿號天輪尊重清髙害六親金火逄之官顯赫如逄木月富豪人牛星從來正丑親氣朝北位近嚴宸大抵牛星傍斗立牛逄氣曜德惟馨氣躔女宿號天瑞耿介孤髙性獨明但得吉星居十位必為廊廟福蒼生女星雖是子丑宫氣來此地木堪逄氣得女星雖樂好女隂氣味不相同氣躔虛宿號天文清秀為人近至尊骨肉難為自孤潔逹人僧道樂平生虛位躔宫在北辰氣來望闕正朝真須是獨居方有福更逄土忌不相嗔氣躔危宿號天僮為僧章服貴人同談天玄象心明悟樂道逍遙善事叢危星亦在子之宫氣曜來躔福不隆氣係木餘無旺子氣星危曜不安榮氣躔室宿號天玄道釋儒流性自然經術從來胸臆悟文才洞徹事神仙天乙來臨室火豬此星無憂木之餘不值空亡孤貧地福髙貴夀富難如氣躔璧宿號天覺機智文章更多學更能籌算悟天機舉錯施為應不錯氣星到壁事相和妻子逄之有難多最是清孤偏尅陷若為僧道却無磨氣躔奎宿號天乙性直忠良又煩急平生多是不安間不受人欺財聚積奎星漸屬戌白羊此星氣曜主權綱氣若躔奎珍重德德星珍重自相當氣躔婁宿號天虛為人孤害六親踈緇黃自是平生事衣食清間一事無婁宿莫要氣來臨金狗相逄氣不清此曜要行清貴宿婁金狗與氣相刑氣躔胃宿號天音衣食生來却稱心妻子宫中難聚會四方交友自同襟胃星本是酉戌初戌位同躔氣有餘西位火沉無猛曜此星柔順要西居氣躔昴宿號天端為人崇重命孤寒情性耿介難侵犯忠孝家門百行安昴中正屬金中臨氣依金牛道德純此曜孤辰躔昴位妻兒孤獨福間人氣躔畢宿號天吉天乙居中加福力為人清秀善為心官祿星扶進爵秩氣曜名為華蓋星如臨畢宿酉和申十六度中皆喜旺最宜坐命與安身氣躔觜宿號天福衣食安然勝僧道金玉財寶自天來妻子難為終夀考觜星明處氣來遊必使君王早夜求更是官星兼祿主布衣何慮不封侯貴格云天乙最宜躔在觜極品官資性至慈氣躔參宿號天瓊為官終是貴遷榮幹直忠良參相位文章事業擅西清參星偏要氣同行氣臨祿位必公卿道德要逄西位立氣逄西旺必安榮氣躔井宿號天令文武兩全才更敏參樞給諫盡功臣官職崇髙年夀永井宿雖是未宫中氣要恬居愛井逄蓋井深沉太乙靜女尼男道自心聰氣躔鬼宿號天榮積善之家有此人富貴崇髙聲逺振官途超越旺門庭鬼星年位要氣星氣屬木餘入廟深此是隂居宜氣靜金羊偏愛氣金臨氣躔栁宿號天平好靜溫良免禍生衣祿平平無破敗子孫終是不相親栁宿本是午未宫氣躔兩位更英雄氣入栁宫同廟樂一生清貴不生凶氣躔星宿號天強命中若遇定孤孀財旺家門自興盛若為僧道夀延長紫氣行宫入到星名彰祿至照人榮羅㬋同度成勳業位顯官崇台鼎臣氣躔張宿號天芒尅陷妻兒命裏當縱有髙才心又急晚年方可免恓惶張宿好與氣同宫氣若同時必主聰惟有張星偏好此月鹿喜有夀星逄氣躔翼宿號天牢命宫若值定孤髙生計為謀多費力若為僧道自逍遙翼星漸入雙女家巳火焰焰氣咨嗟氣柔不旺在雙女翼躔此宿困天涯氣躔軫宿號天嗟子孫足處定迍乖命若逄之身獨喜此人衣食少寬懷紫氣軫位雖孤獨身命若逄多發祿煞不能入禍不深吉曜終與人為福紫氣入宫天乙室牛為旺箕為樂觜為廟居此生人得大人敬重常近至尊惟宜見金木火月為極貴入宫親密之任旺二十四年見水月好竒異書見金火急性居官顯赫好神仙之事在僧道宜章服在陷宫有水月金火亦為貴人日月宫主為性緩作事方圎好藝術有慈心因道藝成立後乃富貴水木宫主為人性格聰慧智量大有心機主富貴火宫主性格慈惠文武異常見文習文見武習武更諸星居有力位大貴金宫主好兵法有謀略得貴人擢用若諸星在強宫生旺主有位土宫為人有信作事方圎有聲名好文章三主星居有力位必有典郡之權三主在稍髙位定主大富三主在無力位亦主微福紫氣同宫氣日月同宫得父母力近貴人詩斷太陽紫氣會相逄澤潤生民稼穡豐百六遇時祥瑞盛人生遇此會三公月氣文章一世豪為人志氣冠吾曹母夀靈長兼清雅官班超轉職崇髙氣金同宫主得貴人女為妻女人愛慕在陷害宫主有妨害詩斷金星相逄紫氣星禹門先躍化凡鱗威加夷狄為良將燮理隂陽輔帝辰氣水同宫主有聲名足文章居清華之地大富貴詩斷水星紫氣會相逄天産其人福勢長官爵顯榮家又富千斯倉與萬斯箱紫與水星能作善厚德純性學神仙醫卜技工多文藝一生福夀兩綿延氣土同宫主為土地之官好神仙之事長生之道詩斷土星紫氣喜相依冠冕榮身爵位巍丹赤之心剛且毅德延萬里足光輝氣火同宫主宜服色心卑下火星順行主福祿宏逺氣木同宫主大人舉薦之力亦主貴顯詩斷紫氣不來難發解任他才學動公卿寄語才髙須要命不用頻頻祝上清木星紫氣福豐隆百六逄之慶不窮更在廟宫隂德重官為師相位侯封氣羅同宫主器量宏大雄貴顯祿詩斷紫氣羅㬋喜會同人生剛毅抱英雄揮戈却日平姦虜笑取勳名反掌中氣計同宫夜照主文學晝生多招凶險成敗尅害事物詩斷紫氣相逄見計都家多粟帛富莊租廟宫人值貂冠任百六逄時萬禍祛紫氣計都同一位復定經中尤為忌命宫逄此災不輕若見身宫最難避氣孛同宫主足謀多慮能掌兵機職任清髙詩斷蹇薄皆由孛紫逄離鄉背井道途中多情色欲仍為盜千方百計也還窮琅玕經節要紫氣天乙福貴之星官髙遇善福祿彌堅金木同宫名望之重各臨旺度明君委用星行順旺清貴之職可領重權久而不失日月同之助其福祿初度加臨大為榮旺氣同日月多助其福更在初度旺宫身名榮逹如主不順遇蝕神即為僧道術巧之人木祿不背首羅同行職祿殊勳臨於旺樂偃武修文氣同孛計足謀多智夜逄貴旺文權武略若是日逄多主興廢羅㬋日曜宜日生計都隂曜利夜生文武全備雄貴顯祿反此則招險厄成敗尅害之重日土順行財業豐富或旺或廟引從旌旗土日同宫順行主富貴有名望若在廟旺貴權節帥官祿顯揚子孫超卓無不榮貴天乙火同福祿則重火順宫吉職參侍從旺水逄氣廟招地利或道或僧或儒或藝處衆多通樂於遊説時命運逄迎恩被荐起發聲名官有權治紫氣臨照十二宫命宫守照命宫主顔容尊貴不肥重骨節柔長性敏多通臨事有斷博通畏事為事善良性情慈善出衆尊重仁慈道德一生好靜大利僧道孤害六親惡曜刑破處世孤貧見金木火月為極貴之人居親密之任見金火急性居官顯赫及好神仙之事見水月好竒異書畫更得諸福星在強相扶必大闕此星名諫善木土同入命宫謂之紫微垣氣月同入命宫醫卜顯名計孛同入命宫主因酒色犯刑詩斷紫氣臨命照身髙財帛低初年六親散後運總相宜紫氣文章最吉祥照臨身命福非常更解諸凶明道德庶民僧道亦安強紫氣臨宫學冠倫如臨暗曜號孤神雖然不是天庭客亦作禪門第一人財帛宫先破後成氣照多因行業有藝財之分詩斷老陽紫氣木之精道德尊崇性最仁在此弱宫安吉曜破來財帛更豐盈羅孛同來到第二早年學博仍謀利博主多輸謀利空直使中年大昌熾兄弟宫得貴人朋友力兄弟雖有反目無情主相分離氣照合有貴相兄弟詩斷紫氣來臨兄弟時孤星却主兩分離雖然時暫同相聚反目無情性不比田宅宫宜仕宦主父母長夀氣照一生增進父因子孫榮立詩斷當生紫氣四宫行福蔭兩親保夀榮看取耆年精力健都緣強位老人星紫氣居臨父母宫寬懷雅意福須隆若居廟旺無相尅外州莊産積盈豐男女宫見子晚此乃孤星早則傷害除非妻子命有此星相抵則可矣氣星合貴女之分男可保一人之力詩斷氣星來照子孫宫頴悟聰明更美容邁祖超宗榮貴顯家門昌盛永無窮孤星孤氣一人加聰明超俊足竒誇只恐前祿來保守衣色冠帶耀吾家奴僕宫奴馬多聚會氣照大招奴馬因小人發祿有結交之分詩斷解除災厄保康強紫氣來躔最吉祥奴僕小心多戀主田蠶進益富倉箱僕馬宫中紫氣星孤髙落陷不為情成行奴僕難留在飲膳區區自煮烹妻妾宫妻妾方可保守氣照多恃妻妾之力詩斷夀星得在七宫會妻妾歡諧多發瑞官髙職顯侍宸垣華胃家風應不墮妻妾五位怕相逄必定須防見尅凶若在命宫及官祿方袍圎頂或孤蹤有妾有妻事匪他只因紫氣孛同羅縱有三妻并四妾淫聲妬嫉不調和疾厄宫生來少病詩斷疾厄只防多疾病若逄紫氣却成祥為人酒色多無説只為星辰坐太陽解厄脫難最雄強紫氣生來免禍殃道德日增君子泰超羣發秀算延長遷移宫遷官居顯職亦主貴人接引氣照食他方之祿得髙上慈善之分詩斷紫氣迎祥司大福常人得之財富足何况三合臨遷移趨侍宸垣享天祿第九宫中有夀星堂堂眉宇及精神豈知天上清髙宿下照塵寰有道人官祿宫當得貴人委用氣照一生不犯刑名縱有官中大厄自有解脫不成大害詩斷夀星錫福最為竒官祿強宫喜遇之家世綿綿增異福員郎卿監又何疑紫衣師號九流人官祿宫中紫氣星若是木人兄弟取任他清貴亦無名福德宫得男女力氣照受髙上福德主有大富詩斷福德文章紫氣星照臨福德最為珍夀齡永逺豐天祿特産賢英異世倫俊雅超羣紫氣星來居福德祿兼榮顯逹必然三主應為官定是作公卿相貌宫好神仙事氣照性慈有恩見事和平受人倚托因寄附損財詩斷相貌宫中紫氣臨精神瀟灑倍安榮如何晚景身輕健必是當生作夀星紫氣變段星寶瓶宫紫宸星又名華蓋星主為九流僧道之人詩斷紫氣紫氣號紫宸吉宿同臨作輔臣孤寡空亡間極位僧道孤虛技術人磨蝎宫福德星又名天瑞星主貴祿榮顯詩斷氣為福德丑中宫正廟生人貴顯重更得吉星同會聚必為官品至三公人馬宫太虛星又名瑞光星主得空亡九流人橫財詩斷寅宫紫氣最超殊入樂居垣號太虛命位德官雙遇著少年官職逹亨衢天蝎宫天樞星又名天和星技藝巧術智能詩斷天樞昴位氣星臨此曜逄之福且平但要木星諸吉曜同臨此位福髙人天稱宫地庫星又名金匱星主財祿官榮也詩斷紫氣文星若到辰馳名地庫自豐榮再遇木名垣局內文章學問更聰明雙女宫天始星又名紅鸞星主近帝位前詩斷天乙星臨雙女躔初年孤滯晚安然更得木星同合照一生常近帝王前獅子宫天津星又名天孤星主鰥寡孤獨詩斷紫氣天喜臨於午此號天津必有涯富貴一身人莫及子孫榮滿祿尤遐巨蟹宫曠目星又名天潔星主事清潔詩斷未上紫氣名曠目多主災殃無福力除非祿主在髙強亦要同宫會木日隂陽宫十福星又名瑞巴星帝王擢用貴權詩斷申宫十福氣星名樂位逄之富貴人縱有惡星臨著處也須受相定尊榮金牛宫天旻星又名瑞相星文藝技巧之能詩斷酉宫大乙號天旻廟地行為上逹人更得金星來助月髙強必主夀長春白羊宫天盈星又名天乙星主僧道儒流詩斷白羊所喜為天乙位號天盈榖滿倉若在七強為福緊早年登第入朝郎雙魚宫天解星又名祥光星主祥彩得古寶橫財也詩斷天曜雙魚天解中一生謀運足亨通五七宫中妻子貴只憂傷尅的難終星學大成卷十九
