body:
  text: 星學大成卷十八明萬民英撰三辰通載六曜太陽總龜筭法置積日減一筭以三百六十五日二十五分五十秒為一周天之數除之冬至行盈度夏至行縮度漸盈漸縮不可槩論今以盈縮中間率行一度筭之冬至日行一度五分時行八分七十四秒小寒日行一度四分時行八分七十六秒大寒日行一度三分時行八分四十八秒立春日行一度二分時行八分四十九秒雨水日行一度一分時行八分四十一秒驚蟄春分日行一度時行八分二十三秒清明日行九十九分時行八分二十四秒谷雨日行九十八分時行八分十八秒立夏日行九十七分時行八分八秒小滿日行九十六分時行八分芒種日行九十五分時行七分九十六秒夏至日行九十五分並同上小暑日行九十六分時行八分大暑日行九十七分時行八分立秋日行九十八分谷雨同處暑日行九十九分清明同白露秋分日行一度驚蟄同寒露日行一度一分雨水同霜降日行一度二分立春同立冬日行一度三分大寒同小雪日行一度四分小寒同大雪日行一度五分冬至同太陽論太陽日宿火之精一名宻星其色紅赤其性寛厚人君之象父之所配與衆星同道諸星皆畏服五星三合與對望皆留逆而不行其次舍一月一宫一年行一周天生於蓬島之間出入扶桑之内卯酉為出入之門至午為中天離明之地天光所及照燭無私太陽出於卯故卯上立命隨父所在故也惟獨守宫則權專諸星為之輔佐其星廟戌樂巳好辰喜寅旺午怒酉琅玕經云日旺奎宫發有因禄名上達秉臺鈞張星本度須髙職水火同方侍従臣寅位晝生財禄重月華照合顯榮臻蝕神惡曜俱相背福壽人間未易倫賦云日出扶桑遇白羊而金烏照耀又云末嵗亨通定是日月居子午初否後泰日月入身命之宫又云家藏金玉従來日在金宫日生見之㑹金木水星於命入廟及在午皆主貴品清職文學聰明大怕計孛火土同臨弱地則曰交戰叠刑若只與火同宫多破祖上物業父須有尅經云生時火伏日同宫先代家資盡消滅若㑹羅計二宿必主交蝕遇之尅剥父母陷害骨肉夜生見之則其明背乙生人以為文魁星丙生人以為催官星壬生人以為魁星安命在子以為科甲安身在午者為學堂安命在卯者為官星丁巳生人以為天官正禄星此星配屬寅午戌三方主太陽歌七政昭回日最尊配人父道象人君晨朝杲杲従東出萬國葵傾煖似春日為七政之尊人君之象又配父道愛日生人照人命守人身員滿形容性又温言語殊常人仰重處心無黨更無偏太陽照入身命主形容員滿言語殊常人皆仰重無黨無偏或與嵗辰相㑹合文章卓􅕸動乾坤若木相㑹主文章金同位好婚姻妻家財物送来頻金同得妻家財夜見土星晝見火須防病患及尊親首尾更来須惡死紫炁緇流及道門忽有孛星来邂逅瘵勞說盡父根原夜土晝火主父殘疾尾首主父惡死天乙父為僧道月孛主父勞瘵臨財帛聚金銀第四多招好佃賓太陽守財主多財帛在第四主有田宅閑極位中兄弟貴子息賢能止一人西沒羙妻顔似玉入宫一世沒迍邅第九位莫逡巡外鄉近貴有夤縁外鄉近貴人提奬官禄有官兼有禄福宫福徳自安閒一一従頭言仔細請君愛惜莫輕傳人馬尊崇拱太陽喜寅辰巳怕酉鄉最宜官禄兼臨命東出尤嘉福壽長金水如同廟旺方俱来入命喜非常更得太隂相㑹合是為慶㑹也輝光太陽之宿號尊星衆曜相尋如轉輪凡有吉星伏居下不能致福反平平太陽入祥遇木星更添命主必官榮若有二星来轉佐必當榮貴事王廷午宫旺廟最為竒更在強宫始得宜若或陷於閑極位少年父命必凶危太陽次喜白羊宫必定其人祖業隆夜見土星晝見火不能致富反為凶太陽與土八宫逢夜生惡貌并孤窮早失雙親路途走茫茫不識是西東太陽在命九品遷小人富貴足庒田三合近強㸔仔細陷沒沉宫事不全炁木日月最為良儻無惡曜不相妨如逢太乙同對合智巧多財柔乃剛初限不如中末良夜生不如晝生強只怕計孛并火土總同廟旺亦為傷太陽魯分入奎初此是人間大貴圗更得官星行旺地安榮終是入鈞樞太陽殿局朝元太陽居白羊獅子為本殿臨子午卯酉為正局坐房虚星昴四星謂之朝元衆星叅奉曰日帝受朝陽位値之名曰御極當為要職若本命太嵗値之受皇恩䕃覆世代受禄羣曜取次必主調和鼎鼐太陽躔宿俱出玉闗經玉闗歌詩㫁日躔角宿號天成晚年須富少年貧心髙膽大超人衆必定前程有大名太陽度入東南角莊重仁慈性端慤木金㑹聚宿皆同大立功名有才學日躔亢宿號天柱學問文章貫今古為人歡樂最賢豪性識孤髙名未遇亢宿従来號金龍五陽辰位日居中木曜傍臨傾向日富貴雙全禄萬鍾日躔氐宿號天符美貌堂堂出衆徒性快心髙多自耐江湖漂泊少年孤氐宿屬辰并卯炁此宿辰宫氣未充晝誕孟冬受正氣壽年長享永無疆日躔房宿號天禄清潔為人享清福髙才富學有聲名耿介超羣還不俗太陽東躔房日兎出自東方偏喜遇若加本命晝朝生發福髙權貴而富貴格云太陽東出度星房腰下須懸金印黄日躔心宿號天昌白日生人福壽康若至晚年尤享福一生終是足衣糧東華唯有心三星水火同居氣未清若是土星同孛位陽居此位勢難禁日躔尾宿號天枵白日生人富益饒性急多才人莫敵夜生鄙俗事煩騷太陽来尾漸東升晝産皆為上貴人木炁更臨加品位夜生疑慮却多驚日躔箕宿號天魁俊乂文章有大才父母定須生貴子官髙位顯列三台箕宿従来更好風東風觧凍氣朦朧水曜並陽同度立其人定夭必須窮日躔斗宿號天明剛勇施為膽氣英産業經營辛苦志老年豐富享安平南斗東西有度分衆星髙拱太陽尊貴人天乙臨其上手足名臣輔相人日躔牛宿號天機機變尤長文藻馳更得木生来贊助榮貴聲名天下知金牛磨蝎丑之中日度逢之福轉隆此曜最尊怕忌宿喜同土火廟宫豐日躔女宿號天徳清秀聰明多智識天文𤣥象性孤竒白日生人最為吉太陽與女共相齊性不庸愚徳也迷但遇炁星臨此度反災為福立孤睽日躔虚宿號司天耿直聰明膽氣兼白日生人多富盛夜生逢此足迍邅太陽躔度到虚城不論賢愚與富貧髙坐華堂延壽相従容穏步作公卿貴格云日曜正躔虚宿度官居輔弼掌鈞樞日躔危宿號天隆性直文章學問豐營運資財難積蓄老年方見免災凶危宿中隨虚室居君陽危立勢難為虚室兩星前後立位而無輔豈非危日躔室宿號天福膽氣權謀性多慾平生歡樂少迍災父母康強延金穀太陽一曜最為尊室宿臨之豈晦昏惟愛木金同廟度此為君象鎮天門日躔璧宿號天皓富貴雙全兼壽考多男多女見威尊必値文章榮達早壁居亥上正天門日月同宫合壁連更有金星同水至水金輔日有髙權日躔奎宿號端守富貴榮華年壽久文章髙貴衆難加白日生人享富厚奎為玉闗號王車日曜臨之福不殊木曜更来辰上位腰懸金帶佩金魚貴格云太陽妙度最宜奎閫外鷹揚萬里威日躔婁宿號天宫大尹公卿將相逢年少便應居鼎鼐生時値此必興隆西方婁宿號白羊金婁西沉日不長誰識夕陽猶返照白羊宫裏勝扶桑日躔胃宿號天解令徳惟賢位安泰機謀才畧多智能有喜須因賢淑輩天上太陽臨在胃夜生背明真可畏更逢羅計火孛星不尅雙親身必墜日躔昴宿號天房耐事經營足食糧脾疾冷涎身有壽日生却得世榮昌太陽遇昴福興隆勛業超羣志氣雄四月卯時人不壽駒隂過隙翣時中貴格云宻星遇昴福偏隆超羣必作人間瑞日躔畢宿號天強賢徳才髙萬事昌音律善通憂慮少心多嗜慾行無良畢宫好雨曜昏迷陽居東位不宜西須要嵗星心位立正臨扶日不終危日躔觜宿號天鈞足禄多能享世榮學問淵源才挺出此人名必播朝廷觜中日宿是凶星陋短形容菜色青主性頑蒙多暗昧縦教修學也無成日躔參宿號天水冷淡持身欲不累少才多學富聲名官宫有禄終須貴水居參宿正居坤紅輪西墜福難言須要木生寅上照酉時日沒正黄昏日躔井宿號天弼冠世文章増福力公侯卿監世間榮福禄恩波傳子息惟有井曜未申宫日躔井度要深逢十七度中尚在未向南之地有髙功日躔鬼宿號天流先代資財用不休巧計機闗人莫測世間多事出隂謀鬼宿従来怕日逢此生惟有夜生隂惟是邪星莫干正鬼金羊位日隂沉日躔栁宿號天梁仕宦須令仕本鄉金帛豐盈多積蓄晚年須見禄榮昌栁星漸次屬離宫十三度内未遭逢二七度中惟得日方逢午位壓羣凶日躔星宿號流澤卿相當朝須得力三方星主旺髙強富貴榮華主輔弼㸔来午位有三星一張一栁一星明惟有張星樂月鹿君居此位有虚名貴格云君日周天位在星功齊傅說位阿衡日躔張宿號天正才智聰明文武並官星得力善星居禄貴兼全増喜慶太陽尊曜臨張月縦有聲名多歇滅休將此宿在廟堂錯誤於人難可說日躔翼宿號天婁賢徳文才出世豪若得木星同位次定應官職守清髙太陽翼宿不堪親翼火為蛇死不明大主不祥非横死疾宫又遇惡星辰日躔軫宿號天階年少功名自鼎来端潔為人須大量定須九棘與三槐惟有軫宿號天極人言陽極福難當日到南宫終熾盛時居大厦佐君王太陽行度日在奎宿七度六十八分以上至十三度六十八分以下則是火度日是真火為正廟若在五度以下為向廟十三度六十八分以上為背廟日在婁宿八度十八分以上至九度為正旺九度以上至胃一度十八分以下為次旺以上為背旺在八度十八分以下為向旺白羊宫躔婁宿九度為旺度如在八度前必為大卿及大尹三十年居三輔六府或監國負扆設政忠孝恭謹大堪委用如在八度以後即稍減力顯達六年如在九度主員郎少年貴久後無力午獅子宫星宿為樂亦為卿相旺三十年須在有力之地或三方主身命宫在髙強宫分相照或得諸星助之更在廟旺之宫則為至貴之人在五弱宫惟寅丑辰上或見木對欲順不欲逆三十年富貴位至三公或在申戌之位見木逆則為大富之人與金同伏者女人富貴作夫人如夜生時見蝕神賤不得其死日度主性忠直有道藝宜仕宦得貴人委用有聲名平生有福作事長逺更是主星晝生有位近君面員耳聳眼大主大貴月度得父母力為事有宻謀見事深逺善主財是主星有位不是主星大富木度主貴達平生多福合仗本鄉官多見金帛晚年主富火度主作事清直殊常有福性直不顧危亡多厯江海土度主貴人委用宜男女亦多伎巧微貴或虚貴金度主好音律歡樂多怨少仁平生多蹇是主星晝生加福力有貴位水度主財帛豐足多學多智潔净多好使錢有貴人扶持太陽入宫日宫主作事明白足學有智好修善有𤣥藝是主星晝生有位夜生有財非主星晝生大富不受貧苦月宫主得父母力為人性宻作事難量立機謀與人結交無終始少年逺行損財是主星老年大富非主星微有福力水宫主為人聰慧作事有㫁多心機善主財足財帛少苦老樂火土同宫妨父母兄弟是主星晝生轉加富貴與羅計同宫主災禍火宫主為人性微急作事明白知人災福多智見足財産父多病男女亦然日生人及在陽宫轉佳夜生減半土宫主為人性沉厚有威嚴能營運善㫁割多財物是主星晝生大貴夜生大富不是主星晝生少孤獨微有福力更在土度則凶金宫主有賢徳知未来事因女人有喜多計謀好鬬戰有好妻妾及子孫兼主殊常有福水宫主性極聰明智巧足文才所為不定能守事常患冷疾㑹天文晝生是主星大吉太陽同宫日月同宫主多聲名好文章富貴有科名若晝生人日是主夜生月是主更日月在旺廟宫及本宫其人聲聞四海又合得國王重用在未宫衣食至老無退在戌辰二宫甚有鞍馬牛羊詩㫁日月相㑹嵗嵗同十二月中月月逢正月娵訾終𤣥枵聖賢降世福興隆日月慶㑹吉無涯天産英雄福邇遐百六㑹時邦國泰人生値此福奢華日木同宫主近貴人平生少災有福足財帛多子孫更得木星乘旺氣轉好是主星大貴如木星行伏叚損財産日在廟則貴詩㫁太陽交㑹木星臨足禄多財冠古今平步青雲昌熾盛萬般好事稱人心日火同宫主為人有信行作事方員好文章多財物若得一生在旺宫者主貴詩㫁日火相逢火失炎禍盈百六莫迯潛天災遇此民遭厄夭䘮生民害義亷日土同宫主性格聰明有詞章若是主星晝生日在後大貴日在前損父母財産及主惡死月宫尤重亦主父有疾詩㫁日土相逢慶瑞饒産人龍首佐昌朝星臨百六邦家泰萬福攸同百禍消日金同宫主好色慾有好妻兼有妻財夜生金在前日生金在後皆主大富貴有聲詩㫁日金相遇福生民必産竒才異世倫百六㑹時天福熾當知慶瑞在今辰日水同宫為人聰慧好脩隂徳是主星不伏逆其人文學出羣有科名不是主星順行者主微貴有職位雖有文章不主文中成事多因父母立身及貴人舉荐成立若伏逆者主有技藝好音律若是日主在本宫晝生大富夜生微貴詩㫁日水相逢慶瑞盈欣逢水日賀昇平人生値此人中瑞間世竒才保大名水日同宫得地行不能及第也聰明性淳機巧難容事贏得鄉閭有雋聲日羅同宫主不壽身近貴詩㫁太陽正照被羅侵父在他鄉兒沒親先代家財皆破盡奔波衣食不如人太陽朔日怕羅㬋偏産奸雄起簒謀餘日當之興福處惟逢百六禍堪愁日計同宫主多疾厄有腹肚之疾多脫財物詩㫁日計相逢景福昌官尊直諫佐明王怕逢朔日生姦偽百六如逢大不祥薄蝕皆由惡曜侵那堪又在一宫臨破蕩田園皆瓦解東西南北不寜心日孛同宫宜在外邦不宜在家白日生多災詩㫁日孛相刑名字損反産吉人心惻隠姦臣叛世不生兹百六㑹時保安穏日紫同宫多伎藝官至三品父有尅害有疾可免詩㫁太陽紫炁喜相逢澤潤生民稼穡豐百六遇時祥瑞盛人生㑹此必三公琅玕經節要太陽照命金水同位廟旺主方上達之貴炁木月同顯赫可致金水日同宫謂之輔弼格若得地主文章大貴次要得地為限仍須日生如是夜生只富而已有此三星在陷害宫則凶炁木日同對或三合見有即主聲譽之人更各居廟旺居官清顯位近王庭不係主旺亦主富貴主下身低無不掌治如不在方主不入廟則為官不顯亦衣禄不背富而不厚矣水日同宫財禄可及孛日對同機巧可取才幹及人横招財利日與孛同對合照主性機巧作事靈變好音樂智見髙有膽氣柔中之剛多矯詐招外財他息非其主旺財食豐足見在日時益於財禄凡太陽照命不遇惡星自然受福積財不是主旺亦吉日同火土輕禄薄財又遇蝕神破離鄉土如逢火土二星主衣食不厚多招歇滅損害父母亦破祖財亦招刑厄損壽損身妻同子逆善不堅長身無久逺又加羅計刑害太甚離破鄉土亦主傷殘人多憎惡亦好邪􅁋多犯王法更逢交逆滅傷壽筭淡薄初年艱難財禄日沒月藏富而多福太陽臨照十二宫命宫守照命宫主面部嚴方顔色紅白陽宫為命入廟為科名文章貴品清職修學聰明為人性快不藏事務實不偽性敏精忠博通畏事敏而有㫁不忍奸欺不妄求不過貪見苦生念其財與禄成在中末之年福禄兼全有災無虞及主壽筭長逺平生有福慶常得貴人見知不受貧苦與火同對在財帛田宅宫主破遇土星主父母有心腸疾卒暴顛酒與孛同對在三六九十二宫主尅父與木交㑹足禄多財在寅丑辰三宫見木日大貴在申戌二宫見水日大富在酉宫家藏金玉在戌宫田宅廣居在閑極自小無災詩㫁太陽臨命性融和衣禄贏餘禍散磨東出壽長西沒減半生澇漉少年過太陽在命九品遷小人富貴足庒田三合近強㸔紫炁陷沒沉居事不全太陽原是火之精躔度偏宜金水星晦朔孛羅同一處太陽薄蝕命須傾命在太陽孛羅守太陽又怕逢張栁婦人戯謔成姦􅁋男子􅁋犇别鄉走財帛宫初年多破中末方吉主居貴位同木財最多此宫同水主失脫日照一生近貴人財帛主得福人財寳成立詩㫁日居財帛要陽宫晝生為福夜為凶只憂計孛来相尅財帛猶閑壽不中太陽来臨陽極宫還應財物獲榮昌日在長生多得地定須豪貴越非常兄弟宫主招一二人吉得力富貴三合性快為官不過七品為禄必定因同類進財日照主兄弟可保一二人之力詩㫁兄弟有若鴈同行豈使三宫陷太陽雖是同胞如手足分張各自富田庄兄弟相邀出外鄉只因第四犯刑傷刑傷不用他宫取男犯太隂女太陽田宅宫主得父母財物先破祖後自成招外田庄末年方可旺盛日照主髙貴宅舍大招田宅産業詩㫁田宅之宫有太陽須知此位最髙強膏腴萬頃連阡陌榮祖榮宗福禄昌日月合照来田宅田宅定多誇阡陌或逢紫炁與羅㬋一生長是漂流客五男女宫主招一子自身晚貴與金水同主招俊麗之男更入廟不同凶煞男女清貴日照先見男吉詩㫁子孫宫内得陽宫才藻文章竟出塵金馬玉堂應有路少年平步上青雲太陽男少女又足禄順行宫逢土木更兼熒惑不相刑子受官班見五六太陽子位獨難當損破頭男子受殃若有吉星相扶救二男異日貴非常奴婢宫主尅父奴婢不得力此星不凶終吉在白羊宫十分力晚榮貴日照主招鞍馬及有得力女使詩㫁奴婢之宫號陷方照臨君父豈為良縦饒父體常清健亦恐當年壽早傷奴僕雖非髙強地若是太陽亦為貴其他紫炁及羅㬋自然不得分毫利日曜加臨侍從宫賢奴俊馬盛如龍妻母被􅁋欺尅陷破家偷盗反為凶妻妾宫主妻美貌有財性快清秀有吉宿同者娶貴家女財帛豐厚増壯門風身主大貴日照貴相之妻及因妻家發旺詩㫁太陽臨照在妻宫位望尊嚴徳貴崇莫使忌星興悖逆婚姻皇族富豪中西沒之中逢日星頭妻帶甲始安榮半路分離難保守更兼孕育不曽停疾厄宫主身近貴不近小人見水星主有刑破異相火同主眼疾身破免疾日照主身少疾患有壽不犯天災詩㫁疾厄宫中見陽星身體康榮豈見迍設使忌星多犯破反傷眼目不光明第八宫中見太陽偏於酒色起災殃父兄先陷妻先死計孛同宫死外鄉遷移宫主内職出入近侍上貴人得人敬重益壽大旺多利逺行日照一生好逺遊常得他方道路之分詩㫁第九宫中遇太陽更無凶曜在其傍好將平日胷中學對䇿天庭謁帝王官禄宫主大貴居星宿定為一品官小人衣食一生少到官府不加凶危大事成小日照宜奉公若有官厄常有恩赦之救詩㫁太陽得在十宫居抱負宏才仰大儒他日遺賢求吕傅官髙輔弼掌鈞樞太陽金水同官禄主將同行真有福計都在巳孛未鄉横貴功名仍納粟福徳宫主為人洞達無私曲一生好動晝生逢土夜生逢火安閒有壽逢金水主福壽雙全日照主身心勞漉小人遇之奔走無寜日詩㫁福徳宫中遇太陽光明心事又康強金水兩扶成輔弼天然富貴永無雙太陽喜臨福徳地只嫌朔望逢羅計孛亦為災福不全晝火夜土更須忌相貌宫主為人聰明少貴日生逢火麄醜髪黄夜生逢土項短睂麄日照主形相具足多破小人相輕不可與下等人作事詩㫁相貌一宫名惡弱吉星照處合虚着惟怕羅㬋月孛星来與太陽相倚約善星多向命宫排相貌宫中君火来又得星辰行順段平生衣禄自相隨太陽變段星寳瓶宫日華星又名天貴星主得貴人力也詩㫁太陽本是日華星晝夜循環不暫停若是日生多福禄夜生終不免災迍磨蝎宫浮梁星又名天馬星主貴而不達詩㫁太陽年有三百六催促光隂如迅速晦朔惟忌計羅侵夜生之人須減福人馬宫扶桑星又名天基星主得貴人成立詩㫁太陽始出拂扶桑身命加臨近帝王福禄官宫居極品若臨五弱亦尋常天蝎宫晹谷星又名天烏星主横得貴人財詩㫁卯酉𤣥黄二八門日生晹谷最英靈田宅官宫身命貴六宫十二禍深行天秤宫虞泉星又名天輔星得大貴人托輔詩㫁日出龍門生角亢天中曜影登虞泉照臨宇宙施恩澤首尾相逢福綿綿雙女宫白陽星又名天福星因貴人成福禄詩㫁己宫日是白陽烏照曜乾坤總一如無黨無偏君子志何愁福禄不安居獅子宫朱明星又名天禄星得貴人提挈食禄詩㫁騰光離位號朱明日出乾坤萬象清此是太陽真廟旺七強宫内保光亨巨蟹宫曜靈星又名天柱星因貴人委用成家詩㫁曜靈侵入太隂宫錯亂隂陽理不同性硬氣剛須怕婦妻強夫弱挫英雄隂陽宫東君星又名天弼星主大貴人成立也詩㫁太陽五月至於申位屬三隂一氣陽此是東君為失位七強宫得也為殃金牛宫咸池星又名天沒星因貴人成禄詩㫁太陽東出沒於西喜逢吉曜㑹咸池嵗星若得来臨照福壽榮華晚更宜白羊宫大明星又名天徳星主貴人成家詩㫁太陽戌地日歸藏入廟君臣佐玉堂四正宫中并八煞一生富貴壽延長雙魚宫朝天星又名天殘星因貴人損傷破敗詩㫁亥上朝天諸位拱六隂之位来相并玉璽為名象屬君子孝臣忠福禄盛星學大成卷十八
