body:
  text: 星學大成卷二十明萬民英撰三辰通載太乙月孛星總龜筭法置積日加一千二百三十五以三千二百三十五大數除之啇數一千五十列上位其餘不盡者為殘分用七因之上位啇數以二十一因之加八下位以六十二為一度不滿者不入分闕平行一日行十一分二十九秒月孛論太乙月孛星属水之餘天暗之宿也一名彗星一名妖星一名天哭毛頭星隠行於天其行宫度一日行十一分二十九秒一宫住九箇月九年行一周天行道有黄赤之不同喜怒之無定喜則為少㣲星怒則為彗星此星出現使衆曜無光羣星失色或入南北斗中或入太㣲宫或犯天闕國須有災所主分野郡必有災人民饑饉流離其方若兵興將死兵亡乙生人以為祿主星甲生人以為暗星丙生人以為權星丁生人以為囚星戊生人以為印星巳生人以為刑星庚生人以為催官星貴星辛生人以為䕃星壬生人以為耗星癸生人以為福星此星廟未旺寅好巳樂酉喜申順子怒戌琅玕經云命與身宫孛照時栁躔初到最為竒諫官御史元相稱兵寄文衡又所宜富貴可期經翼軫聲名當發在虚危更臨身宿直難者最喜隂方夜見之此星空與人為福多與人為祸若乗栁梢旺度之分善星相㑹便作大官命斷之縱使為官亦為歇㓕又最忌金星同宫亦主尅害妻子經云欲問榮華及好妻生來太白順遷移若逄對照家無子那更同宫被孛欺賦云尅妻害子太白與月孛同宫又云妻無子息都縁孛在髙強推星者宜仔細消息無有不應君子得之在命亦喜劍鋒同宫乙未人劍亥鋒夘巳酉人劍鋒俱丑乙亥人劍卯鋒亥巳丑人劍巳鋒酉乙卯人劍未鋒亥巳已人劍酉鋒巳此煞在命專主權柄在妻損妻臨子害子經云劍鋒之煞細推詳又臨身命最為良執卷之人湏及第釋衣道術足財糧惟有小人全不好㑹教早夭法塲亡更被天刑㐲尸制投河自縊眼無光此星吉星名福煞百人逄之百箇昌若更盡傳真言訣合用金銀數十廂六乙生人孛為正官祿星月孛星同宫不為凶惡之宿月孛歌彗星威烈形似墨眉目精神光灼爍闕猛少言詞膽氣麄雄心性惡能運謀多禮樂最有心機難測度財多聚散一身孤父母家財多索寞金牛巨蟹及雙魚寳瓶宫中好安着堂堂容貌有威權富貴崢嶸人驚愕日月㑹事安着父母凶狂先盖廓木來必定助威權金㑹貪滛妻愛謔男為巫術女為尼水到穿窬入樓閣土火亂世號英雄紫炁更能脩合藥天首㑹好刼掠天尾法塲世抛却居財盗賊破家資兄弟妻宫難檢約疾厄腸風内主災西没之位妻䘮却官宫凌辱夭天年十一宫中偏福薄陷宫十相不曽全依此推之終不錯九晁惟有孛堪畏若到南方宜向未未前中後坐太陽一生名字播馨香獨行尤可免災迍切忌相逄首尾星或更同居髙強位不為人害定遭刑孛星最喜入秦州為官作事最優游平生食祿無停歇佩玉腰金侍九旒與水同行更處閑或無吉曜去相叅限中更若來臨照男作偷兒女必姦子午孛星喜在寅亥申依舊主逄申寅申兩位孛星列子孫榮貴佐明君巳未二方逄月孛九流飄蕩多出入直饒入廟雙女扶只是終身足衣禄莫以此星為大忌除却寅宫偏喜未更得太陽相逼夾兄弟絶無有田地子午還歸子午位若在弱宫方可喜元來富貴亦尋常亦主髙明通性理丑人不喜孛衝年雖居廟樂祸連連遲留若向申辰上媒保得財仍得田太陽若與孛同宫第一隂人不可逄丈夫隂徳并疾厄偏因好事傷財帛太隂本自有虧盈為福為災無定形若見太隂與月孛母亡父䘮惹官刑生時孛在栁躔間更把官星仔細㸔三主若居強位上豸冠丰采爍人寒太乙人加惡曜名逄之多説祸非輕如何却有榮華者在廟因為鈐轄星威權本是將星髙好把功名属汝曹不被凶神輕犯破也湏鄉社作英豪孛星不得善星扶如虎如蛇毒有餘男命刑妻非一室如云女命亦三夫孛同天尾火宫行木土金星陷不明命主更居無力地斷然自縊䘮其生月孛臨喜怒宫喜宫名為天極天曲天亹星若身命逄之為性凶險作事猛烈只宜同五星在命并八煞官祿主有清貴之職若庶人多災厄損妻子随宫分斷之在身宫主枷鎻之厄危險之災水火之厄被人誣頼母必有廢疾若為僧道則有權亦主住持怒宫名為䘮車鬼災天彗星若身命遇之多是非貪酒色更犯煞星主徒配逺方若官祿宫遇之皆主不測灾及為貪婪至賤之軰兼主惡死有救星則平僧道可免月孛躔宿俱出玉關經玉關歌詩斷孛躔角宿號天亹情性聰明丰貌美貪􅁋好酒心不賢煞害傷妻湏尅子角木蛟辰龍見孛必爭雄更逄陽刄位刼㓂法塲中角度相逄怕太乙定遭犯歲多沉沒金木吉曜與同行老歲方能保簮笏孛躔亢宿號天㣲心毒如蛇事事危易喜易嗔人不定此生定是損妻兒亢宿属金龍得孛反生凶孛在龍前為武曬藩垣坐鎮立邊功太乙亢度最清竒九度之中正所宜金徳同之真為美財名横發少年時孛躔氐宿號天僉凡事施為却得安更得官星來􅋞助朱衣紫綬聳朝班氐惡孛星同祼體分外凶誰知氐土貉見孛反孤窮太乙九月過一宫九年一次到氐宫官祿獨行隂夜喜發災還與惡星同孛躔房宿號天瞻若臨身命為大權文韜武畧居官顯更立功名主重權房􅇠日方隆東去孛共蹤卯宫為刑曜隂宿犯陽宫太乙來房性妖孽或女或男皆作劣一生孤苦尅雙親作事無謀心不决孛躔心宿號天祗官職榮華祿位宜百里郎官名位著叅謀半刺着緋衣心宿孛難容陽位孛孤窮土星無夜忌凶忌兩重凶乙星為性多猛烈心上相逄亦作孽不宜水宿同度中六親骨肉情皆别孛躔尾宿號天該家道興隆慶大來身命逄之官祿至將軍公輔藴三才尾宿属春寅孛到必消沉兩宫寅卯位到此惡難成太乙尾宿不完全危險如何保夀年十箇八九多禍夭千思萬計實難言孛躔箕宿號天華位逄燕國定豪奢官班自有超榮貴財物金珠富一家孛宿怕躔箕箕風動刑妻孛到孤刑曜妻位不相宜乙逄燕分著緋衣正喜遊宫定到箕古法盛稱寅地旺此人必貴定無疑貴格云彗星寅位必躔箕節鉞封侯被織衣孛躔斗宿號天嚚面生波浪口無聲不是過房湏有尅貪花愛酒賭錢人斗前難祼體瞻斗有尊權到此不嚴肅朝斗與朝天斗廿四度值乙星多憂多樂亦傷刑刑後忽然身富貴為主圎夜月光明孛躔牛宿號天芳孤寡徒刑性更凶若教疾病躔身上免得生離不善終牛宿號刑星夜生更怕刑孛水土牛忌休問利和名太乙忽然下牛來入在髙宫獨不災此曜所為心性别吉曜同之任意裁孛躔女宿名暗金毒害顛狂曜六親花街栁陌貪遊冶莫教老後更伶仃女好孛星來北闕孛湏諧餘宫皆祼體到此不為災乙星惡曜女家存此命之人定有迍所謀不定心疑慮恩背情踈妻必分孛躔虚宿名天智萬事施為皆遂意官班富貴旺門庭只恐兒孫無一二虚宿北辰宫孛星作福從北闕衆星拱緋衣拜髙穹乙臨虚地將何决萬事過人真殊絶只宜夜旺此宫生財似泉流官不竭孛躔危宿名天姱命若逄之旺一家不是官崇湏富盛妻宫子位必吁嗟危孛逄天京室亥在前程孛到為吉曜少尅老方榮乙曜臨人智術㣲旺宫度分守於危此身若不為臺諫亦主當權宰相機孛躔室宿名天仗星到雙魚為正旺逄之富貴必超榮定作朝廷公與相室孛好朝天到此自䖍惓内室孛尊重祿主少㣲垣月孛室宿未為竒眷属孤傷靡不為多招閒慮心頭事老則防妻又損兒孛躔璧宿號天巴旺地湏逄到一家身命逄之徒説好到頭不免事如麻玉關璧属乾孛惟好此躔天嚴非孛立朝天要夜蟾太乙璧宫好殺害為人不就事難任百端心計多謀畫盗賊奸雄忌火金孛躔奎宿號天便賣盡田園賭盡錢不是酒時須博奕貪花浮浪見憂煎奎宿戌宫排温柔怕孛來祼形奎暗曜難堪孛到猜奎中遇孛心難靜身消痩長貌充秀寛心𦂳性好精神聲名纔有終無夀孛躔婁宿號天邪少年浮浪悦紛華小急大寛心不定平生終不受迍災婁名天狗宫孛怕此曜逄孛來為陷害凶曜必生凶婁星最喜吉曜來若逄太乙轉為災若不刑傷并自縊六親暌别不和諧孛躔胃宿號天翰性急情寛事少閑只恐為官年不永若居貧困夀如山胃居戌位間到此必安閑至酉名吉曜為福必闌珊太乙臨人多災數火喜曜來胃九度夜生值此主歡娱握掌兵機主宰輔孛躔昴宿名天喜命若逄之姿貌美妻宫損尅兩三重祿位湏逄升玉陛昴属酉日雞月門孛相宜諸宫皆祼體惟酉着緋衣常言孛星偏喜酉最利金牛宫昴宿金能助用此中來合主科名兼福夀孛躔畢宿號天詵生湏富貴顯家聲仕途超越登科早朱衣紫綬立朝廷畢星是月門孛到朝至尊畢星惟好雨滛慾有名存畢宿如逄太乙侵不宜逄水與逄金偏惹是非迷酒色風癆痔漏暗傷身孛躔觜宿號天陻門户光輝是此人年少登科官進速性情容易便生嗔觜好孛用水觜孛喜命宫孛到為廟樂七度莫言凶宿觜若見孛來過疾厄宫逄阻難多五位臨之難得子命宫身位禄消磨孛躔參宿號天詮官禄須逄抵不難妻子宫中須有尅更兼天夀在蒼顔申位有參星孛臨視不真迤遷并度近孛􅀢兩相嗔參水猿中見月孛進退所謀皆恍惚羅㬋計都火來侵不至中年便亡沒貴格云水孛到參非失位貴持節鉞更無疑孛躔井宿名天誑衣祿生來須大旺資財恐是别人收有子終須還破蕩井來孛昏濛十七度無光月宫孛朝母初度反作凶太乙躔井未為強神氣踈慵貌亦長性裏欺良懐惡妬若無星救恐刑傷貴格云􅍴搶東井福偏饒榆塞藩垣任可倚孛躔鬼宿名天詫巨富官榮兩無價為人毒害更英雄先有聲名大權覇鬼見正月明孛逄拜蟾京朝瞻居母位敬謹不生嗔太乙之星守鬼門語言稠重出人倫身才魁偉多温厚遇夜生人少見迍孛躔栁宿號天衝將相功勲祿萬鍾威望從來臺憲任蜚聲騰實顯英雄栁孛自優游栁稍位近周十四非為福十三度公侯乙星掛在栁稍頭定知此命主公侯更有木同秦地分少年朱紫不勞求孛躔星宿號天戎定殺妻兒在少蒙為人執抝心多強衣食生來太不中星午正陽明大忌孛來侵孛入終須晦太陽孛難禁乙星若在星邊過又與羅㬋同度坐峥嶸負氣武兵人志壯心髙膽又大孛躔張宿號天權妻子宫中未保全衣食生來自豐足性情髙尚樂忠賢張宿月鹿明孛臨號元真須是旁奎宿張曜孛華明太乙權威勢如虎不宜張宿居於午偏生庶出二重親卓立生涯難守祖孛躔翼宿號天譁此是星辰到本家喜怒不常多色慾心如狼虎毒如蛇翼好孛同行孛躔翼宿亨孛水宜同立聲應位持衡太乙本是惡強星翼宿躔之疾壓身女主産亡男癖疾限行至此不光明孛躔軫宿號天忒戀酒迷花好遊奕家財盡破好行偷若不投軍須有尅軫星屬巳宫巳水孛争雄陽極隂相續相續自無凶太乙獨行來到軫為人性急多明敏若逄土木再同居破散資財離鄉井月孛入宫太乙月孛在虚危栁為樂井畢為廟翼為旺居此生人主居官有威望人多畏服主有節察之位刑殺之權在身命八煞宫見火為盗賊見金為不軌之事妻亦不良在財帛則多耗散為脱賺但在身命官禄則吉在諸位則凶此曜為災福力大於諸星若見木即為臺憲之任見火為亂世英雄見水為盗日木宫主為人重厚心直三方盡在強宫主少年榮逹非在強宫主少年雖得貴人見知諸事不成立火宫主為人性快出言不審是非一生宜防婦人損陷及小人暗窺主星在最髙之地立在㣲職合少年立身土金水月宫主為人性剛作事忠直有謀計好殺害守虚危井栁鬼翼宿者主節察位月孛同宫孛金同宫為行不良妻亦然男為巫女為覡詩斷金星與孛若縱横百六逄之大吉亨人産遇時須抱福家居金玉保康寜孛水同宫主因文學有災多虚詐見四刑星主膿血之災在三九宫主落水死不見屍詩斷辰星不欲相交彗男可為奴女可婢邪􅁋奸濫主貧寒畢世千謀無一遂孛火同宫心好善而實不能行亦多癰疽膿血詩斷熒惑最能誅孛彗掃除􅍴搶為慶瑞官榮上爵秉威權百六逄之為禍害孛木同宫宜官不宜才藝夭夀為悖逆之徒詩斷木孛原來主夀齡今日無分重與輕人生八十髙年客皆由四正有強星孛土同宫夜照損夀傷財刑害瘖瘂之疾詩斷其如土孛坐天心雖要分明見太隂不顧順留并伏逆布衣從此振儒衿孛羅同宫各居廟旺主有威權詩斷彗星若與羅㬋㑹勒石紀功揚塞外常人遇此至千殃百六遇時愈殃害孛計同宫為姦􅁋不廉不潔多損多破詩斷彗星計都不可逄人生薄賤主貧窮須招風疾并癆厄百六當之不善終隂人計孛若入命定是􅁋邪色慾娘若得善星來同照遏雲歌舞近侯王孛炁同宫主性巧聰明多技藝足文詞衣禄有權治之人詩斷蹇薄皆由孛紫逄離鄉背井道途中多情色慾仍為盗千方百計也還窮孛日月同宫主防父母居官有生殺之權日好訟夜好酒賭博詩斷日孛相交名字損反使吉人心惻隠姦臣叛世不生兹百六㑹時保安穏日同彗孛大為凶百六當之禍患重犯法蛇傷并虎咬倥侗畢世一顓䝉琅玕經節要孛為隂曜最宜夜照廟旺身髙機權兵要晝孛日同財名有望夜孛月同財祿榮旺主背多貧運為阻障羅㬋同位喜旺雄貴逄忌宫惡多迍多否二星各居廟旺或在髙強主雄貴重權之位更若同忌星在陷弱宫即多刑尅天乙同宫竒能巧技衣禄豐厚不無掌治土與孛同夜招刑尅晝人若逄廣招財利孛同計火晝逄主祸短夀多刑災厄破敗夜生貴旺衣禄常殊臨順廟權掌兵符孛計日逄主夭夀不夭折則風癩顛狂凶死夜照主衣祿興崇好華飾若在廟旺有武祿重權貴氣金水夜同職位顯榮晝人主順財禄豐隆身主同惡妖濫困窮忽然無救亦不善終木星照順福慶亨通縱然惡厄亦不致凶月孛照臨十二宫命宫守照命宫眉目踈秀體貌堂堂噐量宏偉瞻視自尊大寛小急為人性重易好易惡好殺毒害奸雄氣烈入廟反為權柄善星相扶少年及第無吉星輔助必為災咎為人不足多病不快活假饒富貴亦主犇波食禄之人無由安閒貪酒好色夜照獨宫身名亨逹如是晝生破失根涯在妻宫則妻損早在官禄則居官有威望人多畏服有生殺之權與首尾同宫尅害妻子與天乙對望處世多迍其星名天吏星主禄雄豪又名催官煞諸星皆吉而孛方入乃為催官若孛臨要出宫者不係旺在秋冬為災為福力大於諸星在身命則吉在諸位則凶詩斷孛照命宫人初年災破頻機術心自有權謀亦及人早歲防傾覆中年立有成夜生隂位照財禄有聲名老隂月孛最凶神豈有臨人照命身若在強宫為禄主總領邦國作權臣孛星守照在巨蟹若在髙強亦得觧更遭羅計與土星只主有錢能放債月孛昏沉性不常讀書多懶好遊行不如别作榮身計莫被儒冠誤一身月孛須知是惡星逄之禍患卒難行若要入廟宫中者必定前程有大成財帛宫生來少積夜食平常假饒初年承祖之付託財帛興旺如三春開花正發時狂風猛雨折㧞其根枝若土星照視則産業生旺頻加無破敗也孛照財上暗昩無主執財物耗散詩斷孛照財宫真可畏須防人頼暗為災限逄惡曜君湏忌吉宿同臨主横財凶神月孛臨財時破蕩傷殘豈所宜假使堆金如山海㑹合消鑠似塵㣲兄弟宫皆不得力縱有昆季他東我西彼死我活相見之時如水投火却見他人反成親戚所謂親踈義重不親却親宜自卓立孛照主尅兄弟惡横詩斷孛星無禮最乖張那更凶殘在陷方不見弟兄同燕鴈只聞手足似􅉘狼孛星對照兄弟宫各自榮家各自豐縱使牛田衣食足兄若西時弟亦東手足為親難得力只為其宫逄月孛争取家資不孝人兄弟心強相妬嫉田宅宫尅傷父母縱有祖業終須破散若居次旺則不以傷尅論更加土孛同行多主偏房庶出孛照一生破散住宅不定有成有敗祖業破盡宜與異性同活詩斷田宅宫中土孛防三方閑極可悲傷此身若不為僧道必喚他人作父娘莫愁月孛是凶時有人因此田園旺只縁廟坐午申間午後申前及未上孛星加臨在田宅初年資財真不竭隂人最不喜其星嫁出夫家無寸鐵男女宫主男少女多又宜心性相壓及遲見方好經云男女宫中怕遇孛無男只是女生多若得吉星同照視晚招一對不堅牢如六丁生人化囚見之在此宫者全無子息假饒有三男二女如寃家骨肉一箇抝東一箇抝西如有吉星合照則猶較可與太隂對視則男主有貴女主封號長則性慵昏蔽少則伶俐惺惺别星則减力矣孛照合難得子息多患瘡癤之疾詩斷子孫宫裏孛星攻狀類根甘蒂苦同假使門庭當旺盛也生不肖辱先宗月孛來遊至第五男女雖多多枉死直饒庶子與過房於法推之多絶嗣奴僕宫多不得力亦有走失孛照不可托小人作事有暗昩刑尅之厄詩斷奴僕惟推最弱宫孛星臨照愈為凶當生禄主或全䧟衣食犇波守困窮月孛為星不可言當生逄着病相纒若交奴僕同宫分反主妻奴白日眠妻妾宫須兩三妻妻命有此星相抵反有偕老之期賦云妻無子息都縁孛在髙強經云月孛守妻宫奴婢結為宗無曜居六五為人主脱空註云妻性惡則免孛照合得尊貴慈善之妻反招偏房之妾方應詩斷孛星若在照妻位不是傷夫妻亦防多幸随人為側室不然卑賤得從良婦人月孛入夫宫反主夫家財帛豐更在未方為主將母死父亡財帛隆望門尅婦婦家貧只因月孛到孤神戌亥丑申三四位夫妻和順定無因疾厄宫自小多害病主瘡疥小歲難飬孛照有犬馬所傷之厄膿血之災不可針炙因此抱疾詩斷孛居第八照身宫三合無星不可逄死在路頭無板載更防官死獄囚中月孛伏劍疾宫來年少沉疴染重災歲乆不聞歡喜事年來常聴哭哀哀遷移宫不得逺出主有險阻之難經云第九宫中值孛星終身流蕩百無成孛照主外鄉隂害小人刑官之事詩斷孛宫第九死他鄉路上横屍不可當羅計更臨獅子位法塲之地見身亡孛計遷移又併羅偏於土木損財多雖然已有堪居地毁拆移居不奈何官禄宫有大人君子之權更居樂廟之宫則官職清髙小人帶之則血光刑責孛照多因暗昩之事起災必有重官厄凡遇隂人不可交結詩斷月孛午地是隂宫食禄雖遲也不空或若火星逄禄主多因官職至三公月孛光芒號彗星衆星一見歛威明廟方若作天元主貴擁􅆛貅百萬兵入廟星辰最難得若臨官禄尢為吉鸞臺鳳閣更光華只忌隂陽同月孛孛星主禄大雄豪只要相參土火髙斗角栁中為受用文經武緯列勲曹福徳宫多主反覆纔有好事反成凶兆孛照須有不分明人隂謀相損詩斷福徳宫中要好星如何孛照有昌榮心頭搔擾勞魂夢日日思量欲改更福徳宫中怕孛星忽然火曜兩相刑終身只可三旬夀縱得長生也受迍相貌宫一生為災經云惟有太乙月孛星生時不欲臨此地孛照為人膽大不信隂陽作事不祥詩斷十二宫中有孛星形貌麄醜懼知聞性情不定如狂妄舉止無慿似少神十相不完身跼蹐六根􅃜損善艱辛縱然身在公侯位斷作狂愚廢棄人月孛變叚星寳瓶宫天權星又名天烈星主武勇心機悍烈也詩斷月孛臨人狀似虎子上天權巧心路若是獨行無别星掌握權衡至台輔磨蝎宫伏屍星又名流血星主流血惡死詩斷丑宫月孛見伏屍身宫官禄最凶危更有吉星相扶助福徳宫逄短命兒人馬宫天虎星又名天獄星多招牢獄罪責詩斷天虎孛星寅地旺喜臨箕尾福非常吉凶二曜不相犯四正宫逄福禄昌天蝎宫五鬼星又名天文星主狡猾隂謀䜛佞夭夀詩斷天衡五鬼為妖孽女落風塵男下劣妻家䘮盡定無人孤獨一身無處立天秤宫天妖星又名破軍星主威猛色慾詩斷天妖辰上為凶恠八煞遷移為六害若非寄食别人家庶出倚親多此軰雙女宫雙鸞星又名彗孛星主死兵刄毒藥詩斷孛臨天乙號雙鸞男女逄之是寡鰥更值惡星須惡死吉星相救可安全獅子宫天鬼星又名流尸星主刀鎗弓矢之難詩斷天冠加臨獅子宫星張二宿最為凶如躔栁宿畨成吉富貴功名百事通巨蟹宫垣廟星又名威猛星主威猛尊嚴詩斷孛星最喜到秦州文作清華武列侯不怕惡星侵此位平生富貴自優游隂陽宫天吉星又名敗殘星主敗殘亂家道也詩斷申宫天吉少人知四正宫逄得者稀戊乙庚人為上吉名標四海福相随金牛宫金堂星又名文際星主文章際㑹也詩斷金堂酉地喜相侵不習詩書亦有名自是䕃封多福禄錦衣閭里有家聲白羊宫天囚星又名天邪星主凶猛中失職禄詩斷戌中月孛號天囚白髪孤寡亦未休此曜匕強如在上官災横禍作寃讎雙魚宫遊魂星又名威職星主隂人多妖詩斷孛星須是要安和亥上遊魂福最多禄上資財當巨富終身落薄更消磨星學大成卷二十
