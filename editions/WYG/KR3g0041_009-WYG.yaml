body:
  text: 星學大成卷九明萬民英撰指金虚實五星天機七五賦中推筭必須求命主得失須㸔取推筭之法所重者命宫之主得者如逢生坐實失者如遇煞不空是也一家星理專以命度主為要且如子宫為命有女虛危三宿躔女則以土為主用躔虛危則以日月為主用竟置宫主而不言何謬乎譬夫人之一家則必有主其下雖有弟妹子姪僕從之輩皆為家主所役所以知家主之重也至於推星論理亦一耳而吾家所要得失皆以命宫主為重也次推太隂在何宫方可論窮通太隂為人之一身根基所係葢命者衆人之禍福身者一人之禍福命可同者身乃獨也是以命主雖切於度主身主尤切於度主也身命清吉主星受生命雖駁雜亦為富夀之人若身命俱陷則貧賤凶天無疑矣七政四餘分喜怒逐一須詳過喜怒者如午宫安命以日為主所喜者金水也所忌者木炁也且如日為君主五星逢之皆伏何獨忌木炁盖木炁為難星而疾厄乃人君所不能無也然則木炁又能隠蔽光輝所以忌之餘倣此推此六句為一条論身命配十一曜也天地人盤𤣥更𤣥神仙妙不傳天為外盤地為加盤人是内盤此訣少有人知斡𤣥機之妙神仙之秘左旋右轉合乾坤星禽可取論左旋者天盤右轉者地盤人盤星禽者二十八宿也乾道左旋故二十八宿隨天左旋坤道右轉故二十八宿應地右轉合乾坤造化之妙也吊起飛來明此理泄却天之髓今人多不識吊起飛來之理妄以三合四正為是皆非也吊星之法假如命坐寅宫逆數至東出卯却加宫入命是天盤地盤得氐房人盤屬天蝎原守金為煞星纒在角宿吊起在卯限入卯宫必主有飛横官事此地盤禍福尤切於天盤暗中遇煞逺處逢生其義盡在明心消息子細推詳特舉一隅則三隅可見矣此論吊起之義意深而語妙後學勿泄之身命二主如相尅𤣥機藏可惜如在子宫命身在寅之類所謂身命相尅此訣藏之可惜露之不宜得此秘焉此八句為一條以三盤加身命也初末平分一百年生煞細推研命管初年身管晚年如安命子以土為主喜火忌羅則福此係命主所係之故前集所謂依身命所行是也原守躔星來犯主旺局愁行鬼如立命酉宫金與火同躔實地火居生旺之地金囚死絶之鄉本主已弱更行寅午戌火旺之限煞星恃勢愈强此小人得志命值此者非貧則病而夭立命金宫火同空限逢寅午戌巳解前篇同論前限雖危却無咎後限須當好前限主衰微本為凶夭雖見災危却不夭亡如此必因後限髙强逓出也我旺須要煞無氣不能為我制我為命主也若得令乗旺煞星却陷休囚而煞受制之不暇奚能我制哉主與煞殺不兩立煞强主必失主煞二星不可兩立我弱他必强我强他必衰若彼此皆恃其旺則為戰鬬非凶徒之命則是非之流煞倘得朋愁愈盛受制難為逞金為命主火羅作黨或外拱内夾正照傍臨又居旺鄉為害愈重若空亡受制雖有害我之威安得而逞譬猶虎也性好噬人居於山墻傍壁之間又得羣虎以助其猛則必受其害若陷於機檻之中雖有噬人之心不能施其威矣若還有用不為凶權重凛威風此言煞星有用如命在子木為財福之主命在寅金為福主命在辰火為財元此皆尅命為福不為災禍却主掌握重權揚威沙漠乃不吉之吉也母曜化凶誠非好反主為貧夭母曜者恩星也此言生星為禍如甲人未上安命金為生星木為吉用却是甲人衝干對禄此為非常之凶所遇之宫反為禍也化鬼之訣又不同木須金水逢鬼者如寅宫立命木位寅宫却逢金水同居申上對照盖金生水竊金氣而為水煞勢潜消又為母曜之用命逢此者多是危中僥倖而得榮華以上二十句為一條論命限生殺有生尅制化之妙正煞暗中逢有救凶禍應無有木為命主金水同守寅宫火炎午地金星方與木星交鋒自恃其勢但貪得之心利於前不顧失於後不期木星牽惹午地之火却來破金之强此為暗中有救雖有禍而實無禍或曰金亦尅火但火木成局而金安能尅我哉明生暗遇煞相干化曜吉兆㸔木喜水生水木同躔本為吉兆却值旬中空又被煞星暗處侵陵此是雖吉而實凶也尅命主為刑星如上木炁尅之本為不喜如三合有金尅木則為煞有所制若三合有火羅則謂之化煞盖木能生火火能生土是為煞有所化化煞又勝於制煞餘皆倣此主煞坐實又同宫妙處更當窮主煞二星相遇又不逢空本為凶兆反為富貴之命何以言之假如金為命主金與火同躔申宫乃金旺之鄉火病之地又合起申子辰水局金勢當權火氣失令反為我尅此乃凶中反吉即富貴之命以上六句為一條言三盤之煞有明暗也貴人不必泥生星合格主髙明貴人之命不必專㸔生星若身命二主髙强却合貴格如太乙抱蟾木孛扶印即是貴命貧夭何須尋煞曜活法真為妙貧賤造化不必但求煞曜身命二主俱入惡陷田財二主又空或皆陷弱身命入遷移弱宫多被餘奴侵犯身命田宅官福財帛之主或占兄弟奴僕奴星入命或凶星拱夾身命天元禄主或命居死絶空亡刑煞之宫此皆貧賤之人此四句為一條重合格居强也隂陽左右逢迎主朝中朱紫貴隂陽日月也若身命主居中左右引從或夜生身命二主隨月晝生身命二主隨日必主常侍天顔職任樞機生曜行隨日月明金玉必豐盈生曜乃父母之星印綬之䕃恩渥養育資財者也守官禄則世賞天澤多得富貴餘䕃不得地則官司公力人守田宅財帛則享祖父基業守福宫則得人恩授守遷移則遇外交守妻宫則多招内助守子息則男女榮華守兄弟則鴈行和氣入命宫則凡事稱意臨相貌則半神飄逸所至一宫則主一宫之福若與命主相逢身星胥㑹乃利達根基富貴之物若日月前後行此必主積玉堆金之人禄馬夾身還夾命馬首朱衣引如甲寅生人甲禄在寅寅午戌馬居申木為禄元水為馬元或身坐申水木左右夾之乃五馬諸侯之貴一貴當權羣煞伏將相兵威肅如甲寅生人丑為貴元生於季月立業酉宫土金守命土為貴人又為生曜又乗月令居實此為一星滿用又是天官星謂之一貴當權萬煞頓伏必主將相之材宰輔之職此八句為一條言隂陽禄馬拱夾之至貴也刀筆常招上貴憐倚勢玉堂前玉堂者貴人是也如六辛生人午為貴元太陽守午安命雙女謂之傍玉堂必招貴人引接乃為吏曹之人也又如六庚生人晝生土為貴元夜生月為貴元晝生人申宫安命土為貴元却用凶神飛入未酉之宫外夾此化貴為鬼夜生午宫安命月為貴元躔未被木炁吊起飛來三合對照尅破尊曜必為編配之徒雖傍貴人却被貴人憎怒地驛餘奴前後拱執鞭為僕從地驛者貴元星也餘奴炁孛計羅也且如寅生人馬在申命居戌水為馬元羅是餘奴酉亥前後拱夾必為奴𨽻下賤之流命陷官福馬居强雖榮不久長身命者根本也官福馬者枝葉也根本盛則有花葉之榮根本弱雖有花葉不能勝矣此言身命之主無力却得官福馬有用終還富貴不能久長自非以格局興若身命混凶神之地主星遷陷弱宫必當以此㫁之其驗如神也此六句為一條言向貴向馬命陷而賤也金星與木互同宫風斤月斧工金者刀斧之器也木者棟梁之材也此乃木匠之造化且如命在寅亥身在午地木星飛躔午地逢月為身主星日飛沉酉地如逢金乃身命二主互換相逢金木自相斵削乃運風斤月斧之人也水徳或臨身命陷音樂并漁梁身命失陷却逢一水照臨得地則是酒色音樂之流失地乃習漁梁之業也若還太白入天財綾羅慣剪裁財星者非惟司人資財亦且主藝業莫非天星所定若身命宫不好田宅又受尅獨見一金入於財宫明徤主為裁縫也主來伴月熒夾鎮陶冶知前定熒者火也鎮者土也其二星象乃主陶冶工輔之屬也或身命主值此二星夾拱守照或身命拱夾迎合二星而田財二主無用乃燒磚造瓦之匠命也命若如還火遇金鐵石藝中尋火有煆煉之功金有從革之變金火制化必成器用人命逢此二星照臨或拱夾或守照財宫若非刻金鏤銀則是琢玉擊石之業也水木同行財帛上江湖遶興販水者屬江湖也木者為舟楫也身命官福卑微而水木同臨財帛之宫則篙師生涯之造化孤寡休囚羅計尅多為僧道格僧道格局多是坐孤辰寡宿之間休囚冷淡之處畧無生意及有孤炁单羅獨孛一木照命者只一身宫清吉皆是僧道也狐星烏宿性虛靈雜學更多能心宿者屬狐也其性多疑畢宿者配烏也其性最靈若身居此必主禀性聰明雜學通曉之人蒼龍第二宫中㑹竹木良工是蒼龍者木炁是也第二宫者財帛是也若二星會於第二宫中其人必習竹木之藝矣白虎帶煞入命時公門多是非白虎者日胎也為人多牽惹是非若遇火羅孛計化煞守之多主公事之人也以上二十句為一條言星曜同命入陷而為工商僧道之人也馬入遷移更祖姓身命人無定凡遷移之宫遇驛馬之星照之定主出祖過房移根易葉不然必為萍梗之人他鄉之客若身命坐此則居止不安心神無定常好動摇不安逸矣魚女之宫太白來珠蚌毓雙胎魚者亥宫也女者已宫也魚有雙尾蛇有雙舌若逢辰酉之時生人金為男女主星居己亥上者必招雙生之子也流行九位逢羅火家主煨燼禍流行者流年也九位者遷移宫也且如辰酉宫立命火羅為煞會於遷移上麗財帛入於田宅皆主此人此年必遭家宅火燒之兆此六句為一條言災異與出祖之命也日月頭項水背肩胸膈屬金言天有自然之形人亦有生成之形體以天之形合人之形也以人之形即天之形也午未為頭項己申為背肩辰酉為胸膈矣齊吳下部木為足火宫為肚腹齊者子宫也吳者丑宫也乃為臟腑木者寅亥宫也乃為足火者卯戌宫也乃為腹此人自然之形體用此推之八難凶神若見侵災禍必然臨八難者疾厄宫主凶神者尅我之星如前所謂頭項肩背胸膈臟腑手足肚腹若逢疾厄凶神侵尅主一件之疾實則有之空則無之此六句為一條以七曜配人身而怕煞難也冠帶臨官主尅夫貪花卧栁娛冠帶臨官者婦人之命不宜逢此也盖冠帶者無非淫媚脂粉體態極妍招迎外人背夫且臨官者乃驛馬所臨之宫隂陽交㑹之地如雙魚雙女之類盖驛馬主淫佚奔馳交㑹主重婚疊嫁二者皆是婦人所宜忌若女人立身命於此官福田財有氣者雖為享富貴之家未免亂倫之行不然亦主夫婿重招必好艷容麗服若官福田財無用者又逢咸池金水天乙月孛照之必是娼妓下人造化血光下部兼陽刃最忌來刑命水孛火羅陽刃星皆主血光女人最忌此曜為煞尅命或躔煞或戰身命宫輕則血氣之疾重則生産喪命太陽守照晨牝鷄對月定妨妻婦人若太陽坐命照臨加以身强必主欺夫奪權心髙性急為女中之豪霸有男子之英雄男子命若太隂守照妻宫對宫主妻妾無貌不然亦不正法而婚嫁所以太隂有缺有圓不常之意望前夜生輕望後晝生則重此六句為一條言女命怕煞也金星為煞更逢煞非命兼王法如命坐寅亥宫金為煞星更在諸凶神之上或亡神飛廉的煞刼煞驀刃此人主亡於非命死於王法盖金為肅殺之星又逢凶煞其勢愈増為禍尤重疾宫炁伴主星躔盧扁舊家傳疾厄之宫命主同炁星飛入乃醫人之命吉則以此㫁之凶則帶疾坎坷之人也此四句為一條言遇煞而刑疾也别有源流推姓氏父母妻宫記金為商姓人木為角姓人水為羽姓人火為徵姓人土為宫姓人四餘同論日月以水火論假如金守父母宫主父母商姓木守妻宫主妻角姓他倣此若無守照之星以宫主所屬何音㫁之此訣乃星家之寶得者宜秘之更將所屬别生辰心精見若神所屬者此法有二一以天干所屬一以地支所屬生辰者乃父母妻子之生年也以太隂配戊巳木配丙丁火孛配甲乙土配戊巳水炁配庚辛羅計配壬癸且如丙寅年壬辰月甲子日乙丑時年為父母屬寅若木星守照必主此人丙丁人是父母也不然木命人是也又如甲子日子為妻宫若土星守照必是此人戊巳人為妻妾不然土命是也又如乙丑時為子息若金星守照必主此人先生丙丁之子不然丑命生亦屬金也又一訣丙寅年辰月子日丑時寅為父母必看寅宫之主飛入何地或飛入未上乃是未生人為父母妻子二宫皆倣此詳推要在㑹精聚神萬不失一逢生遇煞分凶吉類應年月日生星為福煞星為禍木星應在亥卯未寅年月日時火星應在寅午戌卯年月日時土星應在辰戌丑未年月日時也且如水星為生曜貴人則應在申子辰巳年必榮膺除擢庶人逢此則財利稱心又如木為煞星貴人逢亥夘未寅則降官黜職庶人逢此則失耗家財病人遇此則殞身喪命無不應驗也其餘年月日皆倣此類推之一章之㫖真是天機妙語也斯文盡是神仙秘談出天機趣斯文者是𤣥機之奥妙也皆探造化之靈㫖受之者必因徳修行尊之所致非易得也若非韞匱藏珠輕泄非人其禍不旋踵而至也以上八句為一條言五行推筭之精也人身亦是小天地舉一知其類戴九履一左三右七二四為肩六八為足言肩舉足則眼目心腹腰腎上下盡在其中矣且如煞在己午非頭面則目有病在夘酉則心腹有疾盖頭離腎坎坤巽肩震兑腹乾艮足故人之一身皆法天象也官福拱財身得地既富還饒貴官福拱財星也身得地身星坐實也俗夫只把原守説死局不知活紛紛雜揉且休言最𦂳是流年死生最怕流年惡原守難憑托命强限弱只主夀身强福元厚有禄無福禄將安享有命無身命將安保故命强不如身壯也日月若夾的刃時禍極必分屍陽年刃在東西現嵗實遭刑憲如甲年刃在夘之類嵗實流年填實也隂年刃在西北馳犯此禍難移如辛年刃戊之類駕前衝驀諸神煞直難休重疊凡人命不宜與太嵗衝不要在太嵗後一位謂之衝驀驀在駕之後悖逆之象身命在上者必凶更加凶星則大作禍加吉星則大作福難星試以午未二宫分之太陽午駕已位一木立太隂未駕午位一土計立人是直星守四柱身命為人凡百不能作事顛倒此八句為一條言的刃直頭之為利害也直刃伴身坐日支妻子早分離妻星遇煞又逢直二次明花燭男女坐空日月來必定損頭胎大槩妻子乃一理尅妻必留子月為兄弟日為妻子息在其時主星却看居何地虛實從其類如申上安命木為妻星飛入亥宫如遇癸亥日則為實地偕老無疑如甲子日則為虛刑尅不免所謂從其類也兄弟子息㫁各例此句句言言妙理深故名曰指金此歌一言一句皆達妙理之深萬世萬人盡仰星家之實得之者自宜韞匱名曰指金夫何忝與此十四句為一條言直刃刑尅妻子宜從虛實以論之也指金虚實五星天機七五賦下世人開口問為官提起與君看大凡為官之命雖要格局之妙莫大乎漏闗漏闗者乃十一曜拱此一處不惟四正强弱宫但㸔漏闗皆是一品之命且如日月引十一曜拱一位或是禄馬或是天門地位或端門帝座或福禄主或生星命主則大貴大富又有漏闗四位無星八位無星或左右兩位無星者亦貴又如日月拱夾福徳日月同宫照命日月拱夾官禄日月包羅五星四餘日月拱夾田財五星如連珠日月如合璧五星輪序五星循環五星向順相生五星聚㑹羅計截㫁羅計押班一星跳垣五星入廟四餘在外七政在内又有五星六曜漏闗格如丙子年丙申月甲午日丙寅時得木星入命者大貴盖丙年木為天禄丙為月禄甲為日禄丙為財禄以此一星為四干元禄星者極妙更合格官至極品又有十二宫安命富貴興衰格局如子上安命或土埋雙女大好無尅十五嵗大限過宫便為官如受尅不濟福木旺在寅十七嵗便有難二十六嵗火為恩則好丑上安命先看命次看金終看身三用俱髙强則為公侯或主星居午更得金入垣官至三公若刑破只是吏人寅上安命先看命次看身水三者俱占髙强為王侯命不要刑破則吉夘上安命最忌福徳星只要火羅日月居髙强無刑破便是好命刑破只是吏人辰上安命夜生人只得身居官位不須㸔命更得日臨獅子不論晝夜謂之星合壁當膺鍾鼎之任不要刑破己上安命先看命主次看身三看木申上孛星躡政更得限好不拘晝夜官列紫綬不要刑破午上安命先看命星次看火星入垣如遇羅星同居官禄或居八煞遇之死亡十五嵗大限過宫便授勑不要尅破未宫安命先看命星次看安身終看火星入垣如與羅星同居官禄則為破格或居八煞遇夜生人十五嵗大限過宫便授勑不要尅破申上安命乃隂陽宫也命先看水次看孛終看金木火皆為吉宿木入宫垣為官星火入官禄只主富或居八煞身居官禄得地主授宣不要刑破酉上安命先看金次看孛三看土星升垣在官在煞為官最殊晝得隂星夜得陽星只是吏人命星髙官髙入八煞官列紫綬若刑破只是吏人戍上安命先看命次看身終看土星升垣如在官福二宫官品顕達受傷刑破只是吏人命亥上安身先看木炁月次看火羅金如木炁月有一髙强為官顯達如他宫混雜命帶刑破多狡吏命為官須要福基厚福薄終難久日月分明拱福禄此命皇家族天門守福日月扶恩近相中書日月扶官恩外拱坐煞邊庭寵亥為天門守福者守照也日月扶者日月夾也恩外拱者星恩在外三方拱照也坐煞邊庭寵者格局髙以煞為權矣恩福扶官身曜明信重御堦行身曜者太隂司天也此十二句為一條言官星有恩福日月相扶為至貴也身福恩官俱好㸔無拱三品㫁六曹四品五品宣身福近君前六品以下京官走身福居君後身者太隂身主也禄者官星也近君前者乃登駕即近君之側也此六句為一條言恩福近君之貴乃其次者也宣官三品不居京君側欠恩星君側欠恩者乃恩不近君也府州縣官俱守印四正官身𦂳守印者正官也四正者子午卯酉宫也官身者官身之星也𦂳者坐實而占髙强也寅申己亥見官星佐貳職親民辰戌丑未官星現雜職隨資轉以上八句為一條言四正四馬四庫官貴不同也武官帶煞身星出地煞空方吉凡武官命多坐煞或坐驀越或主星遇刑星或主星坐馬落空或官星受尅而有救官星逆而逢生其中若帶貴權主封侯建節又如日月同宫二曜朝陽五星隨日火月同宵一星伴月太乙抱蟾金水㑹蛇七政得垣或福官互垣或身命互垣此皆富貴之命也若富人之命必田福宫强實或水火同行或金木同位或水火木金羅之類相生相尅者皆是也盖為富不仁為仁不富故多戰尅煞星前後福恩隨開閫列旌旗煞者尅命也生者生我乃恩星也謂之煞星背我而去恩星向我而來又兼福星入命是主開閫之權身恩坐駕煞不見帶劍日上殿身星恩星坐於嵗駕之上煞星俱空而不見所以能見於君而帶劍日上殿也煞星流空身福竒馬陷鎮城池煞星者為流旬所空而身福二星皆好雖馬陷没但主星不空而鎮城池也此八句為一條言福恩帶煞為武職也禄馬坐實身有拱財徤運中旺財徤者財星坐實地而占强宫也所以運中旺發非横之財也身星最𦂳命次之恩福要相宜此四句為一條言有恩福無官星而為富也命主逢空無祖業其餘身管攝身命若陷總無憑財禄要身承此四句為一條言身命陷而貧煞星全没身星實福好終身吉煞星不實居弱方衝照福無妨三方見煞却無忌禍福𤣥中秘對宫見煞别無災大槩欠舒懐災多福少憑何信福曜居陽刃福貴明如一寶珠切忌刃星虛此十二句為一條詳論煞星而要歸於虛實也忌星絆福身星弱進退難名爵福恩明徤身主髙官實老而豪官星總好福星弱好處還失却恩星守籍少年起福陷中途墜恩星近君信任專一陷命歸泉官實者官星坐實也為官之人無福則力不勝任鮮克有終也籍者生時也福陷空也中途墜者不能久也㫁曰福能保官福一空而居官不久也君者太陽也陷者旬空也又曰恩能取信一陷而信令不行也恩星落空日月逺府縣瞻天選恩者生我之宿也既落空亡又不與太陽星及身主相近是以但居府縣之官而不能覲清光也此十二句詳論恩福官星而要歸於虛實也福官當籍喜恩生煞犯主刑傷煞星坐籍皆臨忌身弱長憔悴籍者我之生時也若官福二星坐於籍上則喜恩星生之若遇煞星尅之則居官不能善終若煞星坐籍駕所謂畏首畏尾是以身弱而常憔悴也歟此四句為一條言恩福不可雜於煞也命守垣城福伴恩壯嵗秉威權恩臨帝座身守福限吉承天禄命中最𦂳是八方格重煞神降嵗駕垣城帝座者為三生也命宫官福田財為五用此八處日月夾拱為第一諸宫主星逓相次之但合此格不甚忌煞五星精要云帝座以本生日納音在處為之垣城以本生時納音生處為之又云帝座子宫是也此六句為一條言恩福之貴在八方而煞降也吏人之命禍福專貴馬有相干坐貴向貴煞守命刀筆操權柄煞星守貌福刃并謀陷没人情官星坐實貴馬徤煞陷風雲變吏人之命煞星守相貌宫官福宫干涉陽刃其人為吏尤多尅剥謀害良人若官星坐實貴馬徤而煞星空則有際遇而為官也此八句為一條言貴馬與煞刃不可相併也婦人之命坐臨官金孛必淫奔婦人命宫日木守貌醜却敦厚從來女命看身宫身好必昌隆福星不棄身居二富貴榮閭里若教坐馬煞却衝孤寡更貧窮凡婦人命坐臨官之宫及與金孛同宫者必淫若命宫有太陽木星同守貌雖醜而性敦厚福星不棄乃不空也身居二身主居財帛宫也若坐馬位而煞星與刼的同衝照孤寡而更貧窮也大抵女命先看身命次看夫宫又看福星兼看田財兩宫星辰如何第一看男女宫次看疾厄宫男女宫有吉星更男女主不受尅疾厄宫又好則主生貴子亦無産難如男女宫低有刑星守之尅曜照之疾厄宫有刑星必主産厄如男女宫主受尅者必招産死女人除寅亥坐命喜金水清㑹榮夫利子其他宫安命不喜金水清十命九婢妾也此十句為一條言女命貴身福而賤金孛煞馬也出家物外縁何格命主居閑極身居華盖福臨財名字動三台僧道命貴清勝俗但忌福身落亡身福俱空命身居華盖鐃磬尋常之輩出家僧道之命又懼命主入兄弟宫太隂居華盖之上以為太隂所忌者也此四句為一條言僧道之命也命坐長生身坐虛非吏亦非儒身命俱空魁獨露藝術多清苦禄居破碎刼衝時貪酒更能詩命空身空限全弱頭白鷄窓客讀書全要福身堅身福限徒然文魁拱命煞都化翰苑増光價魁星雖好煞星隨因學禍遭髠平生一文不能聚身陷的煞據命主坐長生之上太隂坐空文魁煞半强半弱者乃是非儒非吏造化也命主星命宫太隂星疊逢空亡文魁獨露於垣局者又金星炁孛同守天空或入兄弟者㫁其人必是九流藝術之人且如辛酉得禄勲之地辛巳生人酉是破碎若被對宫夘衝之乃聰明好酒之徒如是身命居空文魁獨露者更後全弱雖讀書至老只作白身人又如文魁拱命身者命主及身福更堅實則作翰院之官推之文魁雖在前行煞星却在後隨此等命必因學海害身徒配刺膚之命若身星飛起逢空而的煞又據占本宫則主其人平生一文不能得聚也此十六句為一條言身命恩福魁煞以虛實而論貴賤也財福重空田宅無奔走口難糊限宫泄氣財星窘生理休營運謂行限而飛出遇泄氣之星而財星又為煞星所制所以營運多不利也福財身主入遷移興販足施為福財身三主但一主守遷移則能興販而獲厚利福身二星坐奴僕終日心不足或福身星坐奴僕則不能純厚享安閑之福也此八句為一條言財福限空陷而貧賤也二主臨財萬頃田福命勝為官福命勝為官一作官福喜居垣詩云二宫坐貴三朝禄二主臨財萬頃田又云福星居福真為福官主臨官作顯官須看四柱帶不帶來以定其真假評輕重多寡如丙戌壬辰甲子庚午未上安命太隂在午此為二主臨財可惜丙戌旬中午未空了雖得午字填起縁壬辰是甲申中物二主身命主也臨財坐財帛宫也有田千頃禄千鍾財位見恩重財位見恩重言恩星守財帛宫也財星田主互相守巨富真稀有財星守田宅或田宅守財帛宫也以上六句為一條言田財遇恩而富也馬空貴空命坐奴身陷走卒徒咸池守命身刼的徒配從軍籍禄逢破碎曰梟神身臨薄藝人以上六句言貴馬遭陷而刼的遭凶也身居閒極命天徳交情極易合凡命坐貴馬空位休囚之所三方拱夾亦然命主飛出坐奴僕之宫又不入格局福恩亦無力方可㫁之曰奴僕徒卒之命如貴人亦有坐馬入奴之説須看恩福田官垣旺者不可類推如坐咸池可換又坐刼的行限又是離恩虛地少年中年必在軍伍中也咸池刼的拱夾身命者亦然禄勲值破同宫身星臨其上者必少義無恩徳人也閒極者兄弟也身星臨之命主命宫更坐天徳之上最有情義與人一見如故春風和氣慎終如始也第三宫中號閑極喜與福星易若與官禄兩居垣到老也無權閑極者喜入福徳忌入官祿二主互換亦然尤忌之若與命主相來徃為有福人無尅故為喜也以上六句為一條言閑極主宜與福不宜與官也少年福宫遇嵗君此限藹陽春中年官禄若坐庫恩合還居富嵗君者嵗駕也守於福徳之間此限最利少年二十六七嵗限至此必吉三十六七限至官禄中年也官禄宫若坐辰戌丑未之上三方恩福財官㑹合斯限王富貴也老景遷移八載間疾厄看迎攀命年五十二嵗入遷移六十嵗入疾厄如至遷移之宫後疾厄無所忌則遷移大發也所謂若還後限不如前只許半週天是也此六句為一條言大限貴逢駕也駕前一位是天空禍福類旬中福神十位名壓煞遇者真英傑白虎官符喪吊凶命限怕相逢若與命元真煞㑹不死遭徒配駕即當生太嵗所主貴煞駕前天空與旬中空亡吉凶虛實同類觀之其餘各隨所生年數分禄馬貴煞為用更有天空喪門白虎官符月徳嵗破天徳吊客病符與當生體用遇天空則吉凶皆不可用喪客皆主孝服也官符即飛天官符合限值之有横災官事尤忌日時同到白虎即大煞主官事破財之患病符主病不濟事嵗破主動摇不寧天月二徳名壓煞星男女坐命大貴限嵗見之進喜解厄矣陽年空陽隂空隂此理用心尋甲丙戊庚壬屬陽乙丁己辛癸屬隂更子寅辰午申戌屬陽丑夘己未酉亥属隂所以陽年則空天星而不空其地曜隂年空其地曜而不能空其天星陽年則天星為禍福最𦂳而地曜次之此理當用心尋也天星者金木水火土炁孛羅計天恩催官文魁之類也地曜者殿前貴人天月二徳陽刃刼的禄馬驀越天空白虎華盖六害長生臨官帝旺咸池之類也此十句為一條論流年十二位神煞吉凶虛實也金騎人馬火燒牛尅命實堪憂土埋雙女如作主膽力大如虎金騎人馬木打寶瓶水漂白羊火燒牛角土埋雙女常術談命例作凶言殊不知金騎人馬寅上安命方忌若辰酉安命而騎人馬者則是主星起去制他人十分得力其餘土埋雙女木打寶瓶之類皆然土埋雙女子丑安命土在已宫與前不同主其人膽大力强不伏人也煞星入命或為權切忌犯身元煞星入命若金騎人馬之類尚有用於天元為財福之類若犯身主則凶不可解也好星切忌刃刼的身坐為惡逆金主天元不要坐刼身宫不要坐刃女人尤𦂳若居八煞之上逢生者反操生煞之權縱不逢生為禍亦輕如人身宫犯者金居陽刃為真刃那堪二八小限門財破禍臨身小限在財帛疾厄二八門更合上次官符白虎喪門吊客之類主破財生病天空守命名死穴刃拱禍偏烈天空者本生年前一位是也其上坐命最忌刃煞拱照的煞莫夾官禄鄉夾着禍難當陽刃的刼忌三合拱命身最毒陽刃的刼三星分臨三合之地最怕拱命拱身此十六句為一條論身元命主最忌犯煞也月支一位喜身逢行限㸔西東太隂坐月支上日生則日東月西夜生則月東日西行限到視其順逆㫁吉凶大凡駕上喜日月諸曜分優劣駕上惟喜日月居之諸用之星當視輕重而㫁計羅横截定朝昏混雜不須論或日或月漏闗當分晝夜司之若衆混雜必不論格兩般化煞天機語天禄并身主化煞三方對照衝合正度且如火為煞衝合土星謂之煞化恩也更土曜化刑囚煞四餘之氣除化天禄外皆作煞論此八句為一條言支駕位喜日月天禄身主也士夫功名要問除催官天馬俱催官天馬太嵗吊合煞方遷調煞不合時只平遷恩煞合方陞流年限上恩忽到平地承宣詔天馬一星逐年起催官要同至催官若坐在陽宫東南食禄豐坐隂其年必西北此論真竒特催官恩星四正逢官居直𨽻京若臨寅申并己亥一去三千里辰戌丑未四千餘此法論無虛要問陞除何日月只把太隂説太隂兩日行一宫恩官要相逢恩官㑹着是除日月令喜填出士夫功名之人專以催官天馬為𦂳且如太嵗填實催官天馬之類或三方㑹合對宫衝起其年必有動遷之喜合煞則陞之不合則平遷而已亦須先看目下見行限貴與賤則以官民兩論不同常人皆次吉原守雖如此㫁其流年逐宫轉填實衝合㑹逐月可推如太隂流行至辰則應此月令内必見遷擢也催官陽宫隂宫者以流年為𦂳且如丑年催官在計看計星行到何地與身恩主星同宫者陽宫必出東南隂宫必轉西北但流年恩星到所行之限上必蒙宣詔也此十六句為一條論催官天馬陞除也病人若要問生死依此例中詳此二句為一條論推病依前例也晝日夜月難一例金鳴火終昧火金曽受一畨空未可例言凶限元脱却嵗星陷虛實一般論盖人之生與萬物為一體隨其根𣲖而運化桃梅不結李鐵石安可成金故燕雀不生鳯狐兔不乳馬人之命禀水即一水也十二宫皆作水忌土計餘倣此推此六句為一條言七政當從虛實而論生尅也其間或有𤣥機秘按圖難索驥識得五行顛倒顛方是大羅仙生尅制化自有理癡人多錯擬心上經綸造化移不許俗人知學人得此莫輕付神鬼空中䕶此十句為一條論生尅制化之妙非人所知以總結上意教外别意雜詩二十六首造化惟將一理推旬知虛實發天機源流體用俱當辯運氣尤宜看改移理則只今生尅是氣明天運有推遷古今治亂分輕重此是琴堂法外傳空亡一訣少人知貴賤災祥各有司空處不空分拱夾更將貼襯有無推用宿若空衝得實凶星空了怕衝來不空不實名平局地曜天星禍福該貴賤先須明拱夾賢愚只要看隂陽次明日月同天徳徳性襟懐總易量金輕土重木星慈火燥羅麄水性疑孛狡計奸偏僻氣更將的刃為詳推白虎嫌入六害孤禄空易陷易親疏煞居相貌兼飛刃此是人中破疾徒丑時日是進神星申刻生人把月評子午界開天地宿長生有宿更聰明分明一退當三空有用之星一例同官福田財終蹭蹬定知妻子必遲逢駕前一位號天空百煞逢之不作凶若是用神飛到此限宫無照却嫌窮駕後一宫名驀越諸星遇着减精華惟宜日月居前後此是淤泥出異葩生星第一喜生身財福雖空不苦辛煞若臨深尤你貴限宫一陷命沉淪用星飛出落空中用位分明有實逢更有駕前衝禄馬定為貪利更邀功財臨陽刃守財奴財落三宫好用徒身命二星閑極見津津和氣百無拘動静能分體用明天星地曜更須憑三才定位原無改要識無形有象星一年稱意是何因太嵗填恩照限身財福填時財氣盛官星填起必髙陞禍福相逢禄馬空一空一實忌偏枯官星空了三分實限若逢之必降除金水為恩拱駕行為官定執法司權天門有拱多清要翰苑聲名共此詳九流清苦若何知只把空亡仔細推滿局都空名朽腐平生骨肉必參差流旬空法有神通此法名為御史空縱有吉星居貴地一時空却欠從容諸煞俱嫌太嵗填看他填處在何宫田財官福身星等一一依宫論吉凶吉星守限若逢遲交限三年福始宜出限三年還有力凶星遲了一般推大槩凶星最怕留凶星留却最多愁下年太嵗逢迎了還見餘殃未肯休逆時天運促流年禍福相逢在眼前不必論他宫濶狹只將交處摘其𤣥世運推移異昔年剥官退職横遭愆只因流嵗空恩福煞不收藏的刃專仕宦諸公要問閑空亡一訣理中𤣥官星身命重空却福不空時老做仙星學大成卷九
