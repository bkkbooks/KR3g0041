body:
  text: 星學大成卷十四明萬民英撰三辰通載敘三辰通載一書集琅玕源髓西天都例玉闗等經而作也十一曜為一辰二十八宿為一辰十二次舎為一辰凡星辰廟旺守照常變喜忌吉凶禍福合三辰而通載之開卷了然誠星家之淵海術者之指南也論者病其博而寡要法而不活不善學者遂按圖索驥膠柱鼓瑟謂其無驗而作者之㫖荒矣余重惜之乃摘取十一曜仍為十一卷參以總龜算法綴於四經之後原書首載三日八煞等論理趣優長則收入凡例末載二明三暗之説矯揉太過則附於喬抝此余取舎之意學星者參四經而㑹通之又豈有弗驗哉易水育吾子識三辰通載五星木徳嵗星總龜算法先置積日一十七萬一千三百减七十四以周天三百九十八日八十八分六十一秒去之看餘日多少入在何段下太陽中定星度又以餘日數去之不滿者為定度晨伏十七日行四度去日十三度五十分晨見東方順二百十三日行十七度七十六分留一百十三日行十七度七十六分晨逆四千六百九十四分一十秒半行四度九十一分八十五秒半夕退同上留同上順同上夕伏十七日行四度須與日同度木星論木徳東方嵗星君子之象每一年住一宫十二年滿一周天行有前後順遲留伏逆留段為天喪星减福力伏段闌干星善惡都不管逆段災杖星反為凶逆丙生人以為禄主星甲生人以為福星乙生人以為暗星丁生人以為權星戊生人以為囚星己生人以為䕃星庚生人以為魁刑星辛生人以為貴星壬生人以為印星癸生人以為正耗魁星此星其色青其性仁慈乃福徳之星廟亥樂寅好申喜未琅玕經云木躔室宿是宫星職禄彌髙列縉紳望鬼應除清峻位臨箕能出貴豪倫申宫得見趨財禄禄主推之富貴人身命限中俱見照聲名財禄自亨榮賦云木入秦州旺而初歸巨蟹木徳星君所臨非主亦為禄喜與水木日月同居鑑心經云平生福禄又多才水星同與太陽來異寳從來家裏有日加辰上足多財若在廟旺宫得地無凶忌照破則主人紫綬官班職序貴品家富豐肥仁慈道徳温良恭儉每每見之皆言善宿能解計孛之難善免火土之厄縱在閑弱之地亦為九流僧道之職縱㑹刑星亦主文章雖不修讀也逹文理又曰福壽之星安身寅亥者以此為學堂星坐命在巳申者以此為科甲星坐命在亥卯未者以此為天元印坐命在申子辰者以此為地元禄坐命在巳酉丑者以此為人元綬惟六戊人見之全减其力更忌子丑則名愠怒之星經云木打寶瓶須破碎賦云先吉後凶木到䑕牛之地此星皆怒更為疾厄在十二宫者却不得力凡坐命在酉午者以此木星為天厨禄主星若命坐宫名為天厨宫坐命主人大富貴一生快活非特一身榮貴將來子孫分上更享無窮之福經云天厨一禄少人知識人須是洩天機若在命宫為福𦂳福徳遷移又次之男人得此多財旺交遇中年好爵糜女人逢之主封號此是天上麒麟兒又曰八宫宫主是天厨宫主星髙禄更殊若得吉星同在命管取潭潭府中居此星犯了人夭壽若得髙強意自如男兒命坐多逢此真是人間大丈夫帶此星在命者十有九富貴無不顯逹若得遇水星為丙人天官正禄星或科名科甲五星合格乃宰執公卿之命如被惡星同照則次之木星歌木星在命為丰姿眉目分明世所希文學聰明多藝術常懐仁義有尊卑木星在命形相端美眉目分明聰明文學有尊卑之分心無毒貌怡怡言談有徳好珍竒少病利官無險難夀年長是及期頥木星在命主人喜悦言語有徳少病夀長每有險難常有人救助逢廟樂好官資紫炁同宫筆吏司若在廟樂宫主官資顯赫氣同是刀筆也三合逢之為福厚對宫尤是好鎡基日辰㑹合文章好女后同宫貴位推木星與日水㑹合主文章與月合有貴位夜火合有兵機更逢晝土主旌旗與夜火㑹主有兵權與晝土㑹主建旌旗忌星若來須减力金同文武佐明時金星同宫文武俱備惟有辰星科甲貴位同天乙懶施為與水㑹主髙甲及第天乙㑹性慵懶尾添毒首助威孛同何似獨居之與天尾㑹主有毒與天首㑹主有權孛㑹亦㑹乏力財宫横寳須收得閑極三人手足隨在二宫好財帛多有横來寳貝第三宫兄弟三人田宅富豪多宅舎五宫偏見好男兒第六䧟宫奴得力那堪第七美容妻還居第八無時疫第九他鄉得意歸十位官資須顯赫禄宫夀考亦龎眉前言叙盡神仙訣後學尤宜仔細推嵗星之號名為木亥未虎猴俱作福作福宫中仍或逢此星必定榮衣禄吉星到處皆為福切忌三方惡曜侵三方對照還刑破更居閑極反災迍雙魚宫内及幽州此處應當仔細求若在強宫或守限少年談笑可封侯木入秦州事最佳發財發福自成家若還陷却凶星照反為災咎走天涯木躔寅位五分佳惟逢亥未發英華不在閑宫為主將錢財豐足四方誇莫以木星為大貴子上依然不得地兄弟分離子息窮辛苦飄流無大智金命見木如見禄及第成名因納粟右官武弁及旺行只為金星來犯木土人以木為官鬼雖是相傷多有意為官天下有竒功只喜此星居亥未土人到巳正無氣要得木星先到未巳上如逢金水星隂人大富陽人貴木星疾厄反成殃巳前寅後却為祥水與太陽隨後至文學成名管簿尉婦人夘上木為權大憂男女淚漣漣土命酉生相對見若無色好有牛田亥子午未之四宫此星一吉為一凶好問圖書乘廟旺閑宫安命定昌隆三日宫中水木星定教聰俊逺𫝊聲三方更在髙強位金榜髙登第一名木星天性好文章須信聲名自此彰更若官科俱得地少年及第紫薇郎木乃騰輝向璧中若逢初度好奢風人知兩府成家者更見科名不陷中任是性靈無逺慮終須髙處見乘龍木星殿局朝元木星附太陽曰青龍捧御居人馬寅巨蟹未雙魚亥為正殿居亥夘未宫為本局愛角斗奎井謂之朝元太嵗正宫值之大貴偏側見之天才清俊位升廟廊六丙生人最佳木星廟樂旺順留伏逆廟宫廣南西路木入雙魚亥上名紅鸞太微玉印若人身命遇之更逢祿馬垣局如八煞官祿有星便作極貴如不在本路只是八煞官祿有星者亦是兩府命如八煞官祿無星亦作富豪有位之人留伏逆者减力樂宫西川路木入寅人馬上名紫綬玉冠若人身命遇之更八煞官祿有吉星皆是兩府如不在本路不見祿馬只八煞宫有星作正郎若官祿有星皆主陞朝無星乃富豪之命旺宫燕秦路本入巨蟹未上名天福玉堂若人身命遇之更八煞官祿有吉星者應京朝兩府八座若八煞官祿無星主富豪及郎員僧道遇之有住持之望留伏逆者减力順段木居順段名天殊天壘若照命及限吉星相應主八品之貴若無吉星主大富仍可隨時對官祿馬斷之留段木居留段名天鼎天秉若人身命遇之主有機謀有救星則為清潔之人凡木星行留惟婦人命添吉星照者主為命婦形貌端正聰明詩斷木居留段號天絞所臨之處多姦擾邪言妄語不尋常好與隂人打交道伏段木居伏段名天皇天日若臨身命皆上等藝術之人若有救星即為福星之人但看宫主髙低喜怒子細斷之前伏利名須見早後伏中嵗見亨通詩斷木居伏段名惡宿輔命臨身心自疑但使疑中多見失運行到此沒憑依逆段木居逆段名天庫天華凡人遇之主中福及郎員之位居低位有救星便為品格詩斷木居逆段為天庫身命之中宜詳慮凶星同到有所因財散人離由此處木星躔宿俱出玉闗經玉闗歌木躔角宿號天貴詩禮傳家居貴位更能藝術近公卿財祿豐盈名早遂木星角宿正相宜角木蛟宫木更宜木入辰宫東井地青龍須是福来綏貴格云木星廟度經龍角六印一時都掌握木躔亢宿號天城財禄榮華顯大聲學問操修君委用輔贊巖廊四海清辰宿正屬亢金龍木躔此地最無功亢宿陽星能尅木雖然得位勢難容木躔氐宿號天窮命若逢之災禍凶尅妻害子孤惸早此身衣禄必難逢木來氐宿喜相逢怕入三八十二宫金位值之皆發禄不論貧庶悉皆同木躔房宿號天臧進禄榮身侍聖王白日生日尤大富定應官職佐巖廊夘宫從來正屬房木房值宿要金剛金木相逢為大用木為房用壯髙堂木躔心宿號天喜少年榮貴妻雙美多男多女富金珠國家庫藏君王委心宿要見嵗星扶心居宋分木安居夘位正當宜木徳更添水曜永無虞木躔尾宿號天和官禄榮遷福更多三進又須三退位三七年來國事和尾宿從來半屬寅虎逢木曜壯精神木壯可躔尾火虎枯木欣然遇首春貴格云木躔尾末與箕分衣冕乘軒位列侯木躔箕宿號天祥官職須登佐廟廊才學經邦須大用此身榮貴坐槐堂寅位箕星偏好風木曜躔箕自飄蓬箕木不堪逢火曜木火相逢頓覺空木躔斗宿號天程才智全兼早貴榮柱石邦家須大相必為廊廟福蒼生斗為帝居要木棲木斗相躔器所宜戩榖自然帝祉錫斗宫得木世稀竒貴格云嵗徳經躔南斗舎論功列爵豈能酬木躔牛宿號天犂貧苦初年晚見妻口舌是非君莫怨家財破盡化為泥金牛尅木不相和雖有皮班命不髙若是炁星同上宿福堅尤作富家豪木躔女宿號天機藝術聰明事事為内富外貧財庫足只憂妻子見分離女人見木多殊異朱紫粧身多稱意生時父母夢禎祥性善純和喜紫氣木躔虚宿不曽安天陣之星百事難内外不和家稍進離鄉應是保身安木打凈瓶怒在虚順度強中事亦如更輔水星生葉茂聰俊英聲文有餘木躔危宿號天然骨肉從來在外閑衣食平平庄産置到頭終是不安然危曜雖然屬寳瓶木居危地勢須傾月燕難棲危木地妻兒尅盡見單身木躔室宿號天材俊逸文章福大來柱石標名官爵厚公卿不久坐三槐亥居惟是室星柔衛木來時徳最優三度之中云入廟加臨天乙切莫留貴格云熒惑嵗星俱廟室勲臣永鎮昇平日木躔璧宿號天勲金玉豐登近貴榮若是夜生身不足日生終是富安平璧宿亥宫正位躔木星廟旺正朝天天徳好生生木徳木為仁曜自安然木躔奎宿號天耘災厄雖多訟獄頻少年有災妻子尅老來方始得安寧奎宿富生是本家木星到此主榮華官崇位顯人尊重即忌逆行留伏邪貴格云木星躔宿須榮爵錦繡文章聲望髙木躔婁宿號天英天馬木逢大不平少年晚富多凶害生來孤獨却安寧婁宫木曜不可當婁藏金狗有相傷况是戌為西地管木歸西位見金傷木躔胃宿號天耆舉措施為百事宜性善心慈衣食旺一生應不見凶危胃星要木曜來躔木位兼隆福壽綿木盛可棲胃土雉一生安享不迍邅木躔昴宿號天祥為人大體性忠良妻子安和家道盛到頭終是足衣粮木星一紀及周天十二年來到昴前假使富豪金谷盛氷消瓦散夭天年木躔畢宿號天䝉身命安康福禄榮平生不識凶危事此人才貌更豐隆木來畢宿豈相當財帛重重有所傷男女孤孀偏主夭若居田地自離鄉木躔觜宿號天靈為人秉性最聰明作事機闗人莫測要知財福少豐榮觜宿從來在扵申木居屬水本難禁木火絶交為泛曜更添刑煞禍來臨木躔参宿號天聰性直文章六藝通户口邦畿堪立任位登臺省必髙崇申上參星號水猿猿棲木曜水中材惟是木來參宿立生成盛徳徳堪論木躔井宿號天吏遇此生人必貴榮年少尊髙登要路須知官職在專城木若伏井不堪稱孝服官災疊疊成限若居之不問福且求無禍樂平生貴格云木星東井喜相逢官位居髙徳望隆木躔鬼宿號天精佩紫金魚極貴榮將相居朝三十載輔贊明君四海清木星惟樂鬼神隨木入秦州事可竒男受官班女封廕鬼金羊樂木相隨木躔柳宿號天庭佐國安邦保太平若不居官廊廟位朝臣朱紫賜公卿午宫栁度十三宜十四度中木不棲栁木同躔逢孛宿木躔栁位長南枝木躔星宿號端門聲名宏逺播乾坤貴禄逢榮官進顯廟堂應是展經綸星位正屬午宫中木向南柯福不隆火木相逢孤尅重木臨星午困須窮木躔張宿號天裕福夀康寧人罕遇家藏金玉旺兒孫庄産資財能積聚張宿須要木來宜木到張兮月鹿棲勿謂南枝無木旺木中得鹿又清竒木躔翼宿號天財金玉豐登若土堆進益生財家道盛滿堂金玉自天來巳中原有翼躔宫木曜加臨未可逢翼有異風吹百木火蛇熒木必生凶木躔軫宿號天柱財帛豪強定富榮聲名騰逹人知重惟恐多災病疾生軫宿亦在巳中求木臨軫宿作車舟水輔舟車宜樂軫更加計曜不堪浮木星行度木在雙魚在本宫室三度三十七分二十五秒至九度三十七分二十五秒以上為木度正廟過此度只是向廟言不行廟度向廟次之在井宿二十九度以上至三十度為向旺鬼宿一度為正旺鬼二度及栁三度為次旺過此為背旺人馬是樂宫居此生人主作金門之客木星為清廟室宿木之廟也若六度以上九度以下為正廟合居廊廟為輔弼之臣若逆行必為武職居機要之地仍須得火土助之如金木助之為文官居輔佐之命也木在巨蟹宫臨鬼初度為旺居貴地三十年順為守相逆為將留為富若在人馬宫臨尾十二度箕七度斗五度至十二度主大貴主三進三退凡三十一年仍須有力之地成大吉也惟宜見火與羅㬋必大貴與火相合貴與羅㬋相合與土不相得日度主文藝過人有聲名權柄親貴族得國王重用是主大貴月度主有文章足詞智知未來之事是主星轉加福力若腦後有髙骨大貴木度主性格寛緩文章出羣居貴位有二妻多男女更是主星書生富貴火度主多災厄好爭訟少年難養水同則减主有好妻兼得妻財主持國君務之事土度主多口舌憂訟晝生免之若面生如滿月聲響清正其人大有貴權不是主星多因獄訟不成事亦主有位見妻遲娶他人妻三十以後富金度先文後武得美妻因此有憂宜男女善掌財有國王委用水度性情不定能詩書得貴人重多藝術木星入宫日宫主立性沉厚好慈善為人有信作事方圎殊常有福每遇貴人見知兼主有壽更主國王重用大用權貴晝生人轉加福力第二宫不見火土乃大貴人見火惡死月宫主聰明有文藝得貴人見知有聲名足財物知未來之事日生最吉是主星大貴不是主星平生有財木宫主為人厚重作事有斷好聲名足文學是主星日生大貴不是主星一生多財物貴人見知日生有福大富火宫主為人性急足威嚴能經營事主財物是主星日生在陽宫有文武權大貴不是主星晝主財夜微福土宫主才智内貧外富平生多口舌足讒佞無始終是主星微有職不是主星且免貧賤金宫主為人性急見事深逺明白於人有義得大人委用不乏財近王侯是主星日生富貴夜生有財不是主星平生多福水宫為人性巧聰慧見事明白與人結交有終始内敏外剛殊常有福貴為臺省之任主户口多更壽算長逺木星同宫木火同宫主為人性快作事忠直好文章若木是主日生火是主夜生各乘旺氣主有文武之權名播天下詩斷木星㑹火喜偏饒值此官尊福壽超百六㑹時家國泰忠臣孝子滿皇朝木土同宫主有文章平生國王重用是主星日生有相權夜生給諫詩斷木星宜與土星同百六逢之稼穡豐㑹此乗軒須衣冕記名青史著竒功木金同宫皆順行主文藝過人早發禄有聲名入度淺兩府之命詩斷木星最喜遇金星喜曜相逢百福興百六㑹時多吉泰人生指日到公卿木水同宫聰明有文好修合是主星大貴有貴子詩斷木星喜與水星居天賜洪休慶有餘百六㑹時千福備等閑平歩入雲衢天命之宫水木星一生聰俊逺揚名三方更在髙強位金榜須登第一名木羅同宫在陽宫福厚有位在隂宫惡死詩斷木星最喜遇羅㬋閫外英聲孰可儔怒則誅姦欣則徳如逢百六備休休惟有木星無可怕最愛羅㬋一同舎晝則堂堂韓魏公夜則魁梧吕僕射木計同宫主進退不定詩斷木星若也相逢計反禍為祥千福至百六當之禍自除如歴巨川舟楫至木炁同宫主少年榮顯六親皆無妨害詩斷紫木不來難得解任他文學動公卿寄語才髙須要命不用頻頻祝上清木星紫氣福添隆百六逄之慶不窮更在廟宫隂徳重官為將帥位封侯木孛同宫主憂驚得疾而死詩斷木孛元來主壽齡今日無分重與輕人生九十髙年客皆由四正有強星琅玕經節要木乃文才善美之星順度而行清髙益壽臨於廟旺職禄髙強與日月同位居顯任木為文星若臨廟旺順行則主清髙富壽更為方主日生則主官崇位顯封妻䕃子貴格之人木金禄厚與水髙才晝日逢之輔弼可及與計同宫臺諫之臣若木星同金水入廟旺宫晝日逢之官至一品輔弼之格與計同在寅位名入廟旺貴為臺諫或掌兵權晝同炁土貴而豪富火月夜照顯於台輔晝夜背之刑而相尅更在留逆危而多失木同炁土晝見或同火月夜照主貴豪若背而留逆即多失職羅㬋同宫威權極重與孛同未職參侍從木與羅㬋在宫即為文職威權貴祉之命與孛在未不論晝夜皆貴順臨髙遷逆行力减主背同凶六親失陷托附貴豪必有謀用雖同惡曜少降禍災遇吉星加之富貴壽算綿延不絶妻位有尅謹儉去奢若或順臨財多福厚木星照臨十二宫命宫守照命宫形清瘦聳氣貌柔和外弱中剛身輕體重為人有貌文筆自富為性仁慈好道徳温良恭儉作事大體不得進自然身奮衣食大旺不招凶危益壽算官居五品順旺則富貴逆留薄財禄遇事退懶敏而少斷與日月同宫足禄多財與金同在身命自然顯逹愛亥卯未宫掌禄大吉寅宫有官八宫主殃在土宫家庄廣置在陷害逢火短壽見火與羅㬋大貴忌火孛紫計在六十二宫不得力詩斷木照人聰敏藝術及文才逢危能脫難財禄晚年來木星在命好容貌白凈身材又更長若為禄主長生位自然聰俊有文章木居命裏性柔和更説能文主貴科水若同宫并對照淵源滚滚是英豪財帛宫主大貴近至貴在人馬宫得十二分力財物滋潤積聚無破中末大旺木照一生財帛豐足詩斷木星好樂更臨財一世榮華少有災更得善星居上下雖然運蹇福還來大扺財帛宜拱照木徳臨之固佳妙若是身入弱宫中决然先破成家道兄弟宫主三兄兩弟與人皆孝友上和下睦永不相尅木照主有貴相兄弟三人如伏逆留則全無詩斷兄弟宫中木照時吉星虧陷豈相宜直饒鴈序恩情重恐解東西各自離兄弟有名不得力只為星辰都不吉吉星宜向火中求紫炁木星是虚得田宅宫主業産毗和田宅増益父母俱慶又云木居田宅極為強木照主有絶户隂人田産詩斷木星得入四宫中可見無災喜慶重田宅昌榮須守祖不逢破敗福豐隆田宅名為父母宫木星相並亦為凶除非亥夘未宫見他方亦與惡星同男女宫主男少女多日生則多男夜生則次男聰明智慧女有四徳兼全木照有文章之子春夏有秋冬保一人詩斷木星守位子孫多太乙臨之怎奈何更有紫氣同宫度老年絶嗣更多磨木徳加臨在旺鄉兒孫宫裏喜非常到頭得力招三子箇箇榮華福禄昌奴僕宫主得奴僕力木照合有貴相鞍馬招得力女婢詩斷身主之星是木星豈教陷弱六宫存立身立事皆低下多幸終身靠子孫萬嵗星居第六位爭知奴僕最為良妻妾宫主妻子好顔容面貌有百年偕老亦無尅害木照主美貌福相之妻宜婚外方之家詩斷有妻又有妻家産只為紫氣同木星若在未申亥寅上置田多是用妻名第七宫中木星遊聰明典雅備祥休更饒娶得真賢婦偕老同心到白頭疾厄宫一生無疾厄常享清福永無不測之災自有大來之慶木照招福壽不患重病少非横災詩斷木星疾厄照其宫氣宇安榮語若鍾弱位更教金宿尅顛狂怪誕有如風木星解散照臨宫且免平生患難聞不惟財禄多饒潤體貌堂堂逈出羣遷移宫宜行藏運動或作贅他人凡有所謀吉無不利木照招外富貴接識宜逺行到處受衣食安樂詩斷木星得地九宫存三方傍臨照命星更得髙髙明健處榮遷貴顯自安寧官禄宫少年享快樂决事如雷霹髙處休途金榜題名更得吉星同宫合照則仕途一向清顯官職清髙享厚禄釀賞得此則富貴營運稱心衣禄豐足主一生大有成貴木照有文學招官禄受貴人成立合在中年後受官有横財之喜詩斷第十宫中見木星平生衣禄保安榮須知宏麗文章秀甲第登髙到九卿木星元出坐官宫作福從來不作凶躔地斗牛星衆顯千災萬禍不相逢福徳宫此命必入五福格一生全無蹇滯常處康泰木照主福禄稱意財食大來立身髙上常有貴人喜重詩斷木星一曜最尊崇下照當生福徳宫經史優㳺多博學不勞跬步至三公相貌宫主人肥厚堂堂有子張之容便便同邊韶之腹温良仁義機變超羣行步輕健作事洞然與人交結久而敬之喜林泉好技巧不懐欺詐得恩便報有崇奉道徳之意無凶頑欺狡之志此星不欲處相貌奴僕之位盖為貧弱之地木照主形相分明十相具足詩斷欲究前程看木星得臨相貌不尊榮陷宫更有凶星入官府刑名累見黥木星如臨相貌宫清竒古怪好相逢傅説植鯺商宰相太公非虎作三公木星變段名寳瓶宫欄干星又名曲直星主先破後成也詩斷木星子位號欄干命若逢之見福難首尾同宫并火孛厨無禄食盡天年磨蝎宫亶婁星又名文印星技藝工巧文筆詩斷亶婁三公且平和八煞宫中阻難多身命若能無惡曜資財足用免奔波人馬宫禄存星又名文章星讀書進身文學詩斷木居人馬禄存星七強宫喜立鴻名更得貴人逢禄馬三垣滿用佐朝廷天蝎宫鳯翔星又名天甲星主九流伎術也詩斷氐房心宿鳯翔星財旺身宫禄更榮益子榮妻承祖福惡星相犯不為驚天秤宫青龍星又名天徳星横財為福有徳行詩斷嵗星辰上號青龍四正宫中爵禄崇太白相逢官品極不讀詩書也䕃封雙女宫岩蛇星又名科禄星科名清貴之職詩斷荆州楚分號岩蛇狼毒貪汚性好華狡猾凶頑曹吏輩或為商賈不思家獅子宫横屍星又名䘮車星䘮害六親孤獨詩斷三河周分木為乖身命遭逢百禍來三限若教一限到須主性命到泉臺巨蟹宫文華星又名天魁星主及第魁選詩斷未宫入廟清華貴四十五年為福利文臣官列至朝參武顯邊疆郎將位隂陽宫天貴星又名天駟星主招駟馬軺車詩斷木星天貴喜臨身身命同行作輔臣日月火金并水土此為七煞立功勲金牛宫天傷星又名天棊星主藝能財業成詩斷木星西向號天傷火計相侵入夭亡為道為僧身不了為商為賈路中喪白羊宫獻舞星又名天吊星相尅六親孤獨詩斷戌為獻舞少年孤男犯休妻女尅夫若見太陽并火曜終身却有貴人扶雙魚宫龍徳星又名文貴星主文學魁甲也詩斷龍徳木曜受雙魚順則為官逆則儒祖業豐隆無損壊子孫代代習詩書星學大成卷十四
