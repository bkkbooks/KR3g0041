body:
  text: 星學大成卷二十五明萬民英撰唐一行禪師五星秘文註解人命稟天八字分辨窮其本源胎元尤顯察乎德籍究乎四善知富知貴知貧知賤德者歲星籍者生時四善者年月日時四殿也胎元者生月前第十位是也如殿内有官星身命坐其一二位或對拱相照皆是貴命不拱照者雖富而不貴顯魁符權印斗鬼飛亷論極限位天地並參究其虚實禍福俱全魁符權印解見前印者時也斗者胎元也鬼與飛亷俱詳前篇刑的刼亡尸舌貫欄祿馬陽刃善惡亦專伏尸貫舌欄干貫索並詳前篇陽刃在命主性重金匱生氣難値衝年太歲輪運卯酉門關天驛地驛妙不可言亦合貴人其理顯然太歲天空之類驗其當生考其流年門關者午年卯酉為鬼門關之地遇凶星則十分凶平常亦有灾晦有大吉星則可吉矣天驛正己二申之類六合子與丑合之類如子上有凶吉丑上亦有半凶貴人能化凶也太陽正宫不易天地太陽偏處前後三四吉殿凶宫凶先吉位扣其的時禍福極大流曜流魁宜當審秘如太陽在正宫之中則天地不易安處正中如太陽方過交位之地則安命不可移易如淺則有傷天地造化正氣如深則易四時之位如交宫淺則易三歲之位須當論其淺深如年三十七歲方交官祿宫得吉限則三十四歲與四十歲上下吉與不吉當詳口訣又當問其生時之的吉凶禍福無不驗矣三限變化四正三方有尅無犯必致死亡無尅有犯難直何妨本値二三末過十祥本末全遇此處大亨遇生福輕遇􅂇福長日星先交歲歲一陽空空之妙細宜審詳琴堂碎金富貴論乎格局貧賤究乎經垣星有順行必驟作而乆貴宿皆凶布處困厄而不延三三五五惟主聰明實實空空反其賤榮衝駕獨立驀駕無情至若吉曜當空少易育而壯滯凶星入命少困厄而壯亨宫宫遇吉到老終作賢良一限逢空他吉而終發積水為貌主豈宜逢土金作福神火來悽楚熒惑為官水見䟦扈若遇鎭陽破祖榮祖遷煞逢凶旅况貧苦如遇吉神矗顯他所若乃火居妻位妻須重娶土入妻宫妻娘無貌若在木垣炁位别論火水火孛蚤見孤孀金火金羅刑尅非常喜水喜土於田宅宜木宜日於財鄕子孫利金木陰陽兮炁孛非祥奴僕宜四餘兮尅能戰爭且比夫一星為吉値生煞而同途乃吏曹僧尼兮終非善之徒合局而帶貴煞兮性髙顯而為武夫主星䧟煞而反凶兮非離祖即應貧孤何以一身為髙强兮别其上下何以為限之駁雜兮致死無訝獨歩鈎𤣥琴堂秘訣二曜麗天歲功成兮五星垂象人事應之所以月將加臨生時先觀主曜起處髙低次察身宫泊處安厄命居寶瓶舉一以例其餘主星屬土飛加卯戌恩地最為得所更遇火羅恩星同行燕魯寅戌或在周齊午子蛟龍雲雨如躔晉楚申己有力如虎其他一體定其賓主太陰泊處其理一同但嫌木炁與之迎逢踏實無救乃為真凶火羅化之和氣春風分其向背究其實空身命旣定次求官福生尅旣明次看垣局拱處如朝夾處如矗日月拱命把麾開纛日月照母大貴榮祿更有漏關兼處煞祿拱祿固榮拱煞要伏月為初主日作中年時為末主限歲推遷吉凶之變深不可言四柱六甲與天地叅天地二盤吉凶詳看年月日時四柱實地實地有星禍福非細坎離乾巽六甲空位空位有星吉凶倒置亘古真機神仙所秘桃梅不李鐵石匪金且如人命立巳與申以水為主難以金論官福田財見土俱沉日月逢之損自傷親天元納音土屬則妙土入命宫更為吉兆或坐財宫尤為𦂳要丁未在戌一水獨照富有家資仍嫌孛曜二主臨財萬頃良田官福居垣佩印乗軒身命逢官富貴天然或居殿駕近君承宣惡煞戰破刑害綿綿武官帶煞一有格目僧道九流主䧟三六離祖過房遷田不足寅申巳亥四重之局人命立之事多反覆吏曹之命禍福多專刑不守籍必在身元或居相地刑賞難蠲吉處十分享用亦全官星滿用凡骨可仙祿馬貴人太歲所攝坐命安身富貴雄傑歲對為衝歲後為驀身命逢之悖逆驀越更値星曜言其優劣流年遇之衝驀一般看在何方宫定其端刼亡刃害殘破迍邅的煞淫神汨沒流連唯有大煞最主威權身命逢主有為作畧小人遇之膽大心惡以上煞星驗其生尅尅我命主不可救藥更有直星狂怪凡百八煞宫主號曰難星四柱身命不可交迎午未二宫君后之位不論生尅所畏難星土計木炁最忌侵􅇒歲德朝垣得地者貴福官守籍相生者榮諸星互垣有忌有制富人之命體弱用强金木同位水火同行為富不仁故多戰爭拱夾田財不値空亡田連阡陌千倉萬箱朝天拱斗乾坤互合日月逢生日月拱夾日土晝合火月同宵二曜朝陽一星伴月福祿互聚皆為貴格洞微大限各有定方命宫子丑依數而行體用俱全如木逢陽假如水命水喜長庚有一遇土輕重酌量更詳後限是凶是吉後限勝前庶幾可入後限不利如何得出體用互空歸歟可必空不盡者逢衝帶實吉星得用却又嫌衝寅逢己亥水日無㓛更有天空䑕忌牛宫吉凶輕重直類旬中虎符喪吊次第推窮女人最𦂳身與福德五八更好子貴無厄水星不淸血氣不調居奸娼妓咸池水孛相貌必好夫宫必離身星䧟弱子曜居髙乃生貴子因有稱呼夫坐三六淫賤暌孤寅亥金水旺子榮夫剛嚴貞固土羅計都五星六曜四時一體三春之木逢金亦美各有善惡要知其類用識其源土能生水仰觀俯察應如符契吉凶亦然或貧或富隨其後先以時正命毋以貌觀顚倒之顚𤣥中之𤣥非人勿語得人而傳琴堂五星集四言獨歩看命之法先看命主起處髙低富貴貧苦飛昇實地根本厚許主喜入垣恩喜别遇煞曜居垣限逢財聚弱地弱宫浮業蕩祖次看身星三合朋侣命母相依安然若堵三看限逢用星而取限主髙强求謀遂緒官福田財光我利我奴兄疾相途見縈我不論生尅吉凶如數須看空亡詳在四柱年管平生月先廿五日後廿五五十時主陽年陽空陰空陰取當時者空方為的語命壯煞空旱天得雨命弱煞空一般困取襯貼當推先後是務更是遲留限行不取凶吉不全缺漏必補實地衝空空衝出取逢順而吉弱強勝負流年生尅其理一同命泊子位計為本宫途中遇木獲吉無凶見炁是禍水孛灾濛丑宫主是土星為宗最嫌木炁是為真凶火羅限逢生氣春風寅宫用炁水孛欣逢火羅泄我耗有侵衝辰已有金祿進名崇少老見之忌失一同卯宫屬火孛不宜逢水為我福日進興隆喜見木炁尅土榮豐辰宫金主土計相逢為恩母曜喜氣匆匆見火旺相不致災濛羅計逢化得失之㓛限逢計曜乃有一凶見金自忿無取而終命安初地以水為宗恩金若壯富壽無疆用孛為官氣宇冲冲土計限遇災忌難容午宫安命主星太陽不論生尅金水為强三方拱合廼吉廼昌所忌木炁干我心膓火羅相遇喜怒不常未屬太陰金水孛祥所忌土計致為災殃申宫立命主孛水同占起髙强見金獨壯富貴家資必顯榮旺土計限逢災輕耗蕩正業酉地主曜金星火羅仇隙土計恩榮戌宫立命主用羅星最忌水孛與之逢迎為見木炁和暢充盈限上逢羅必致災驚有救則善合水命傾亥宫屬水水孛我福金火羅纒興災破祿十二宫中金忌所泊欲問貴格日月分明日月拱駕金水朝迎福官登駕勲祿貴憑職􅀆髙下須看恩星或居官祿或抱月榮武官帶煞格局居髙福星壯健福祿滔滔並忌流年尅我災招如犯其刃的刼亡夭恩星不救刑憲難迯欲問陞除催官恩實天馬來逢恩星朝日宜在消詳不可執一欲問富格田財坐實身帶泄神福星伴月煞星受制身星透出祿主髙强福星垣實貧賤可知煞犯月日田財落空限元䧟失馬後安身駕衝的實貼襯逢迎遠近分評尅之者近尅重生輕生之者近生重尅輕鬬合取化散背無情流旬空月營運無能更忌刼的陽刃來刑財物耗散四柱减輕如何夭喪遇煞難憑流旬空限原守空星太歲趕煞的煞相爭更以星弱便得西行正煞實地無化縱横但卜交㑹𦂳要𤣥亨流煞尅月的刃來刑直難犯主亦易而傾師尼之命命位兩岐桃花帶馬貴人多持身坐官祿財祿卑微奴星犯月疾主侵欺壽數一月宜心㑹之淫賤女格身命臨官咸池帶馬多不貴權聰明嬌麗貌好優㳺宫主受尅身坐祿官更忌四角勞苦勤艱富夀女格財福為先對拱三主垣業舒顔恩星伴月晝日合闗閑星貌主互換福閑奴宫有吉福祿齊年僧道之命格與貴同華盖安身妻子刑衝泄神伴月炁木守宫財福滿用田主逢空日月守駕光顯宗風衆星聚㑹先入為尊尅我利我分其後先尅星在後疾病艱難生星在後福祿舒顔星辰留遲災福如山田宅取化吉凶星完庶俗之命歲忌官符或犯煞神耗火趦趄或帶生氣獲彩吉乎官貴之命不忌官符只忌刼煞剥我灾虞惟喜恩到灾脱樂餘更看流陽散遇不虚孤尅男女命宫所取或坐陽刃或坐白虎或坐四角羅計命怒的煞犯身天狗七五火羅炁孛來夾身主天主星空孤眠獨坐吏人之命恩煞兩專好處十分煞犯身元交限生氣名列陞除須要主健氣數綿綿吉曜凶曜朝日近君生星不福煞曜無迍當途限遇須辯晨昏自寅亥至未時止日有氣申時减力日逢太隂晦食無端夜生太陽亦以一般更有四令不作空言日火夜土斯乃俗談並論生尅不無二三天乙貴人坐命安身男命最好女命賤貧男女立處並愛祿勲兼星得局光顯宗親驛馬有四喜忌揀分男喜生旺女喜衰神八字兼用叅究何旬納音所取死活緣音衆星靜處居垣反貧十二次舎喜忌同論隨其憎愛其驗如神為歌一􅀈同志斧斤五宫夜日子女參商晝月居五災子孤張七宫火羅妻晚操強匪則年㓜失倍年量日月反背如此尋常先天秘訣論夫冬木逢水而寒夏木遇火而燥秋金埋土而反晦冬水潰土而致濁無根之木遇孛而漂泛東西受尅之土逢水而崩流四出冬金見月饑寒徹骨春金見金淡薄無情火逢月朗而無光金遇火溫而渙發寒水最宜朝陽夏火不妨見月未宫坐命太陰行限則柔能制剛星度為垣太陰泊處則懦而無力盛夏之火何須木炁相扶六月之水最怕火日涸轍夏金逢日銷蝕無􅂓秋木逢陽凋零無補戍垣之火所用與卯垣不同酉宫之金行限與辰宫有異冬水喜其南發夏火惡其北露冬春之木遇晝日則謂向陽冰凍之土逢火羅方能發福寒土何生金之有秋水非滋木之時酉辰坐命土計犯陰而反佳身逢生也卯戌為垣太乙抱蟾而為害身傍鬼也殘晦之土遇火則有光輝剛燥之金遇土方能滋潤諸星皆退主星獨順乃中流砥柱之人羣曜皆遲一星有用則獨步軒昻之士土居女木居星雖相尅而有義命在申土在亥行此限以何妨觜乃金石之火觸木方燃箕乃蒙泉之水遇金為美璧參之水議論不殊亢娄之金所用則一丑宫坐命不可以木為刑囚星柳為垣當以木炁為難曜宫分有水宫之火火宫之木木宫之土議論萬殊所用不一冬水為命太陰行限財不足清有餘春闕作主土星發用彼無力我何藉論星須當論時論氣無過論理造化貴在擇用術士妙在推詳若論太拘過猶不及此論先天之妙後學宜謹斯文造微論兩儀肇闢六甲始生將三元而作三才建四時而為四柱干為祿本定一生職位髙低支作命基布三限壽元終始年生為根月建為苗日管經營斷中年之休咎時為結果定晚歲之榮枯先推胎息之由次入變通之道為官為貴緣上下以咸和多滯多危本限元而相尅是故格清局正當為臺閣之臣印旺官生必作鈞衡之任馬頭帶劔鎭壓邉疆印綬逢華尊居翰􅁐祿雖多而有害福不為祥煞雖重而無傷災反作吉三竒弗背才高立解成名六甲正逢家富又能增業空亡親於寡宿孤孑寒眠長生䧟於空亡貧寒偃蹇桃花若臨帝座因色亡身咸池更㑹日宫緣妻致富根元淺薄逢生旺而不榮本主興隆遇休囚而反吉陽刃臨于五鬼定須重犯徒流勾絞疊于三刑應是頻遭編配是以登仕途者莫逢吞䧟爵祿􅃜停當兵權者勿遇天中身權退失胷襟澄徹盖因水濟江湖學問淵源本是水居壬癸慈祥愷悌木乗甲乙之鄕焦燥炎陽火盛丙丁之地名髙祿重乾金㑹遇庚辛貫杇粟陳鎭土重親戍巳木繁而無金斵削縱榮而末歲孤窮火炎而無水淘溶縱發而早年夭折粤若水之浮泛惟憑土以隄防土重而無木䟽通遂歸愚濁金堅而無火鍜鍊終是凶頑至若金脆火炎多則損已木柔金重利則傷身水淸而不􅖍土多土弱而不禁木盛火强燥而微眇水畧濟以寛和須將勻配為佳亦以均調為美大顯者貴乎深隱大屈者必㑹早伸壽極年髙皆是祿臨帝旺職崇位顯為緣馬㑹生宫華盖逢迎偏宜僧道學堂遇貴惟利師儒五行若也蕭索五命因而低弱日逢空寡其妻多致生離時値孤虚其子多饒不肖絶宫為皷盆之煞胎宫為白虎之神天空臨嗣息之宫末歲損成家之子運逢吉宿無本主則未足歡娛限守凶神有根苗則不須畏懼歲君若臨惡弱一歲迍邅生時若値休囚一生愁嘆源清者其流必遠本濁者所作無成八字超羣不貴即當大富五行駁雜居安可不慮危休囚者身性卑微旺相者聲名壯實先强後弱必先吉而後凶始弱終强亦始凶而後吉乃若初逢貴局未可便作貴推中遇凶强豈可便為凶兆大抵文星好長生之地刑煞宜死絶之宫是以當憂不憂聞喜不喜詳其本末察體盈虚榮辱窮通不言而喻吉凶悔吝可考而知名曰造微豈云小補奥論大寶龜天地萬物最靈者人自一念媾精之兆含先天無極之仁根在苗先貴莫貴乎胎息實從花後重莫重於時辰太歲君體統攝煞局勲垣日月代用流行富貴貧賤欲究虚實先由胎而及歲要知吉凶必原命以推身土在齊吳驗木炁火羅之正變天心午未察計羅金孛之屈伸勿以所愛者盡作吉看勿以所憎者悉為凶論無中還有有中還無則吉者反凶凶者反吉甲子歲木乾命坎四柱無戌亥乃不吉之吉吉不可量甲午歲水巽命離四柱無巳辰乃非凶之凶凶為巳甚甲戌旬火羅申酉子丑命逢申酉太歲則福起火羅恩星在申酉空亡之地遇申酉年太歲塡實恩星則為福也甲辰旬土計寅卯巳酉垣遇寅卯流年則禍起計難星在寅卯空亡之地遇寅太歲塡實則禍生也特言其生尅尚未盡其愛憎官福田財比同生氣奴兄疾相何異煞神身居官祿陰賤陽貴主入閑極男晦女貞官祿田財俱無氣家無擔石之儲身命相貌俱受傷身有刑傷之苦遷移㑹馬早歲暌離疾厄逢生暮年康泰吉星坐戌寅限歲逢空防小人之窺筭凶星加巳午福月用煞招上貴之甄陶用則火可生金達則水可尅土其間守對三合類有顚倒五行固不可刻舟求劍尤不可膠柱調絃智者如珠之走盤愚者按圖而索􅂹不辭􅃡縷用爾發明賈似道命癸酉庚申丙子丙申立命𤣥枵子上安身析木寅上羅空戍地木廟寅宫木羅俱煞豈不傷身夫何權傾中外威振人主盖羅化煞其身宫與木適居元空地木為禍主是身與福星俱以煞羅為用二十六後大限入寅釣起木羅勃然而起此遇煞逢空發也五十九後限入八煞將旬屬空亡土為命主水為限主一火在丑體用俱傷竄逐而死此時轄晚年之騐也舉此為例學者舉一隅而反三隅斯為美矣其他格局萬緒千條不離殿駕貴人勲垣田財官福取用則在環朝拱夾衝合虚實富貴貧賤明如止水大抵身命祿曜抱括空亡官福田財朝臨垣局兼三才而兩之混六合而一也乃有為之人建非常之業至若胎命身曜環拱官福官福田財朝拱垣城印綬拱時命時命拱官福命官命主環拱用神歲得年星貫朝祿命官福互垣田財㑹聚皆功名勲爵之人盡富貴利達之士􅂿空則方袍團領歩玉登金生實則佩印乘軒澤民致主又有貧窮忽富貴盛極則凶危日月駕籍之宫祿馬亡刼之位留情審諦注意推詳日月交輝之地有煞欲制年時聚貴之宫逢生忽空凶者福實値空吉者煞空坐實要當認火為金慎勿指水作木古人謂燕雀不生鹿狐兎不乳馬所以我之喜者彼亦喜之彼之忌者我亦忌之體究一源用叅八字四柱坐生成貴祿者名髙利厚四殿拱田財身命者家富身榮煞星登殿駕拱財官入宫有横來之財祿祿星照胎月㑹田祿承䕃享見成之鎡基地祿建寅天元肇子故丁卯陽生巳宫乃坐祿而癸酉一陽戍地則以實而不虚知命君子鑑之星辰霄鑑經太史陳卓註史有郎官上應列宿之語傳有庶民中存惟星之言其閒廟旺遲留須當精詳窮究乗旺入廟終為廊廟之才五怒三刑豈掌權衡之任旺者日戌月酉金亥木未水巳火丑土辰紫亥孛未羅寅計巳正廟者日戌月戌金辰水亥水午火卯土丑紫丑孛未羅午討戌遲留者應數所許也順吉遲留不吉宫主得位縱臨弱限不足為虞宫主者命主星也得位者旺廟髙强也縱弱限亦吉身主髙强假使科名䧟而無害身主者身宫學堂也要髙强縱科名䧟亦吉也金水相㑹其人頓使有文章月火同宫此命平生多坎坷金水同宫吉月火同主平生坎坷都例經云就中火星多灾障相對在强并在月中年困多苦歇㓕三方有用見印綬以遷榮八煞無凶遇吉星而照擢三方者乃三方主星也有用則得地印綬者相主星曜也主遷職榮貴八煞者疾厄宫無惡星也若遇吉星主限發福超達非格非局見善曜未必為竒逢怒逢囚縱文學徒然費力格局者謂星旺廟髙三方有用怒囚者即五怒三刑主費力庸人之命亦多木德金星君子命中豈少羅㬋月孛庸人亦有金木星君子命中亦犯羅計土孛先貧後富想初限伏逆䧟宫先富後貧諒遷移逢於惡曜限者三才限主星也初星䧟先貧末星䧟後富終身享福三方總在髙强一世迍邅五怒復逢伏逆三方髙强吉五怒又行伏逆凶中年稱意命星臨官祿之鄕末限昌隆身主在遷移之位命星主星也要在髙强官祿宫身主學堂要在遷移宫吉祖財破蕩權星與惡曜同行惡曜者土火計孛權星者甲木乙金丙土丁月戊水巳炁庚訃辛羅壬火癸孛忌同惡曜謂之枵星動止傷殘囚星與蝕神其位甲計乙羅之類是囚星蝕神者羅計怕與囚同五星躔度貴在留順有情五星者前順後逆皆喜留惟有火土宫四餘皆不喜也四柱之中惟嫌囚怒無氣四柱者年月日時亦人命也忌逢囚怒星無氣四元皆䧟初中無救則貧四元者乃天地人壽元皆䧟無救星主貧九事並强身家有歸必貴九事者四元三限祿主命星也及身命壽髙强主貴忌星更逆縱然貴必不長忌星者日火夜正在身命更逆雖貴不乆惡曜逢囚設使富而不乆惡曜者火上計羅孛囚星㑹雖富而不乆善星權貴遇之必定淸華善星者金木水日月星也權貴為權星主貴如遇之必淸貴喜曜髙强逢者無疑榮顯伏逆不順得之恰也如無喜曜者乃命主要用星辰也髙强喜見然得順方為吉逆則無力也飛起逢囚此等遇如不遇飛起何宫分善星纒忌逢囚縱有如無木星紫炁見太陽必作髙僧木星乃僧道之星也熒惑鎭星値月孛必為曹吏火土忌孛月㑹為吏或軍人格局淸顯當為館閣之官木旺水淸必拜玉堂之職木旺水入廟主貴貴人之命非惡曜以難榮惡曜廟旺或為主星限逢之必發福五弱之宫順行限而方發有用星怕弱逆行順段限逢之方吉木雖難而遇火禍反為祥命宫雖有木星為忌見火星化祥孛獨行而無金安能為害月孛星要獨行大忌金星相對學堂䧟却才髙而不解成名身宫主星䧟則成名晚天首獨行庸軰而須還享福羅星大喜日在六陽宫獨行吉也妻星逢于忌怒婚合難終妻星金星也逢忌怒必主尅妻宫主飛入休囚科名無實命主星忌囚同木紫土臨人馬位處封侯三星喜在寅位日生主封侯金計土入雙魚身為將相三星喜在亥上相聚如在命宫主將相之任水星逢孛為色招凶水星忌與孛同多主因色喪身金德入兊因妻致富金星喜酉必主陰貴成身或妻家富五星伏逆逢吉曜以難榮在伏逆段雖遇貴星亦不成富身命髙强遇空宫而反吉身命宫主坐在髙强宫縦四空下生亦須發福火孛金星同位累冐憲章火忌孛孛忌金金忌火三星相㑹主凶土計水德同宫頻遭編配三星㑹者主徒配惡星如臨身命性習低微惡星無用或下入廟旺生身宫多好下賤不喜髙上之人劍鋒如㑹命宫交遊豪俊惡星有用或入廟旺主性好髙仕途若逢黑道爵祿難髙仕宦之人限逢計都多退職計都者為尾黒道之宿也作事不明公吏如遇三刑因權退職公吏人命不可犯三刑主遭罪退職最貴者諸星乗樂其間反覆未為佳五星皆宜乗旺樂廟反覆者退留順疾也最凶者六曜暗囚若是命主反為福日月炁孛羅計為六曜或作囚星得逢凶反吉科名䧟而無貴謾進趨求科名乃甲乙木星之類是也若䧟無救主不進魁星弱而有囚多圖不實魁星甲羅戌火之類太歲若臨德合一歲迍邅主凶哭天庭若併生時終年坎坷天庭亦太歲也與時併並主災朝榮暮辱盖為金孛同宫初困後榮盖因限逢末福乃大限也先見吉則先榮後見吉則後榮魁星者天之文府見之詞翰淸華魁星主貴九事相扶入廟則文章冠世九事喜廟旺疾厄最宜獨位免受其殃疾厄囚星固不喜雜諸星男女若遇弱宫晚年方有男女天嗣也甲月乙水作男女進福紫炁星為晦氣男孤而女子無夫東方水曰吉神縱破也還他復位木星者東方甲乙生主散災四元駁雜終身只是腐儒三元祿主皆䧟名駁雜乃白衣人也三貴髙强不貴亦須大富三主居髙强不貴即富也亷貞若臨身命嗣續有傷亷貞羅計也在命宫主尅子息縱有亦主貧寒科目更入命宫妻身難任科目者諸星也命宫主尅三妻方且保守尅妻害子太乙與首尾同宫太乙孛星若同羅計必尅妻子失業亡家熒惑與刑囚共位火星怕與刑星囚星共位主災駝腰跛足囚星火土同行囚星者疾厄星也若日生與火同夜生上同或都共位駝腰跛足之疾作主星雖貴不免疾厄之苦也瘖啞盲矓疾厄計羅共位疾厄者亦囚星或與計羅共位主疾是以强星入廟豈可便作貴看星入廟旺不照身命二宫亦無益命遇惡星安可便為凶論如火土羅計孛在孛命二宫未可便為凶論若作主星有如祿主甲火乙孛之類又羅主星在陽宫火孛計在陰宫夜生人亦吉推其强弱細察幽微休咎吉凶萬無一失星辰瀛海經才名髙顯紫金臨身命之宫粟帛豐饒紫土入田園之次登第若逢年少金水髙强臨文兼及科名忌星莫犯綬星入選限之宫須由正奏馬貴居壽元之上定中甲科選祿朝元喜紫金星居禁闕時星入樂忌刑晦度入封疆分野星居本度利祿宜人選除限入官宫銓曹遇主官優銓長官星與科甲同明限値忌刑寺府以丞郎佐理紫木臨財重佐必膺錢榖合衝有巳祿秩定黜坑塲臨文値命豈姓字之卑沉限度不刑見師儒之榮貴魁文星入官宫甲科首選天乙光臨冊府館職榮登學堂廟地優登翰墨之塲度分强宫驟入臺郎之貴水逰雙女官居給舎郎臺紫占限躔職入淸華禁苑天乙加臨官祿館殿優㳺選除星入忌刑初中迷滯官同祿綬居强入叅禁從限怕忌刑犯守升礙銓曹九事㑹限定膺九棘之榮二忌主方亦入二丞之貴正臨七品官星與印綬同明從厯九丞地祿以凶刑入忌計同人綬朝元入提樞柄孛共權星主向出鎭刑臺印文廟旺著三館之才猷限祿刑衝大一同之政績聲馳玉帳官星以金火加臨部領邉疆選限以土羅衡照水宫已申也天乙文星禁地入蓬仙火位戍卯也將權金火羅計也使節牙璋征遠塞選擢右科天乙入火金之舎官臨邉守太白資首尾之威鸞坡節制科名與科甲同宫鴈塞征强走曜逐黄幡入限金垣帶貴任三品於樞庭限忌逢官祗外遷於藩鎮曹銓知遇祗緣選限星髙陞擢驟遷兼得髙官曜合科星忌䧟少年登第應難祿主髙强中限臨官又顯金星輔日臨文還取髙科武曜佐權選授必居躐等順星迎魁宿之强早初登第逆度値忌星之合中末題名藩垣守土十一曜以朝元選祿値星六合宫而降等貴由科目文星順入强宫官出雜流人元必以刑忌忌犯科文異日方登上第時臨惡曜中年乃顯仕途臺丞戰掾四元限付權謀師幕兵叅多忌星兼限弱身入財宫無惡忌省府優登星居順殿守廟垣丞郎佐理優登瀛府官星與祿主同明對犯忌宫貼職以花城降品貴由承襲馬元還入官宫居享羨餘祿主元居職位計羅動以朝元出兼權柄火土忌而犯屬入佐中臺珠珍餘羨察飛伏以臨財省府遷除以星躔而拱日印星拱日定膺府寺之榮科目同宫兼領外臺之貴命分十曜貴飛拱於太陽限㑹三星必依光於帝座官優府寺以財限之主宫佐入丞郎怕忌星之犯舍權曜順而主向威總軍戎福星守以限躔職司藩鎮羅為黄幡計為豹尾即天節天惡星也在好樂喜廟旺之宫曰順行木金紫日月得地皆福也要入限乃帥臣守土之格玉衡經日為衆星之宗身乃一身之主衆星司令稟陽君方敢行威三日逢刑縱月光不能為福晝生從日喜居六陽之宫夜生從月利見六陰之地子丑寅卯辰巳六陽也午未申酉戌亥六陰也日喜居陽月喜居陰最怕失位設若反背未免災迍酉乃西沉生於卯時必然夭折卯為東照生于酉時必難長大經云四月卯時人不壽可知也若論陰陽須看晝夜背太陽於父有憾背太陰於母有虧五星俱要比和以得時為貴經云得地不須論䧟弱失時何必論髙强四餘不宜衝突而獨行為佳单羅獨計能為福獨孛孤熒最利人雜犯有禍伏逆無光順行有氣五星有遲留伏逆順行者由我逆行者由他受制則聽命于人也盖曜髙强逢之則能榮顯金星孛命好色而假淸髙木德臨垣剛德而懐惻隱水如臨命多學少成火若當權恣行惡毒沉謀熟慮為緣土入命宫巧筭多機或者計居垣位獨孛則為人慳吝单羅則賦性貪婪紫炁照臨為人伶俐雖是星辰如此又看月令若何女命限到火躔防夫害子男命限到月躔招妾招妻水孛如守田財難招祖業火羅若臨父母㓜失慈親命主逢陽終富貴安身傍母必尊榮一宫遇孛終身漂泊無拘十地逢羅少年誇豪逞訟水羅若居子午終尅也有情木土偏愛陽宫雖戰而無損彗星晝見女人反以為殃天乙夜行男命見之反尅年月日時三生値煞立見刑徒官魁進爵三主髙强自然榮顯金月互垣必有立成之分水陽得局豈非榮顯之人主星喜居母地主傍貴以成家母星飛入命垣多因妻而致富木居獅子居官不能享官木星居于午宫乃烟飛火㓕之鄉雖有官而不能享也經曰木星得令早歲科名然在午則為忌星楠􅀈也計入三陽有祿不沽于祿三陽寅宫也非計所居之地然亥乃官祿之所故祿最忌刑囚暗耗計若居寅乃能衝破以寅癸生人論水喜順而不喜逆土愛煖而不愛寒以元守官食合論人之享用元天元也食乃食神合是天干合論命不論元守官食合論人之享用不識變通造化如甲人木為天元火為祿主辛為官丙為食神已為合是也以官魁爵祿馬定人之前程如甲子生人用金為官羅為魁土為爵木為祿元水為馬此四星守照逢生坐實主一世富貴也最喜者四角之有星所忌者三宫之無曜四角寅申巳亥三宫即申子辰之類四角有吉星則吉三宫無星則凶馬臨官祿出祖成家祿入妻宫因妻致富男命安居子午必强狠而專權女人命立巽乾必淫冶而誇色坐貴不宜衝貴見合不宜見刑壬癸生人命坐亥貴在巳對衝則近貴不為力也又如貴人宜合不宜見刑合則致其喜刑則致其怒立身合論馬元失官則徒然奔走凡坐命馬上若得官禄主星同守之則馬有拘束不致奔走不然必勞碌也聚財則觀財庫無守則必定敗亡如金庫在丑若官祿財星臨于丑宫則有収拾又要看合拱無他煞尅破則吉若庫主失經受制凶不須輕用閑奴此等須當我用若兄弟奴主有來破我財庫則為他用我將何用煞不宜真真難磨㓕申子辰煞在已若安命其上乃真煞也若當令凶祿不宜破破則貧窮甲祿在寅申宫有煞星衝則為破祿主衣食艱辛孤而加寡妻子難為寅卯辰生丑為寡己為孤男忌孤女忌寡空以加亡功名難遂如甲子旬生人甲為陽見戌為空見亥為亡乙入見亥為空見戌為亡是也刑不宜戰戰則必刑三刑帶戰必然刑害合不宜衝衝則必破合還衝破作事無成論刑須要論煞刑害重而難當論官必論魁星官魁合而必貴甲生人以金為官以羅為魁逢生旺居官享福也旣參官星本宿當以太陽相參官星即官祿主星也奈何以太陽相參盖午宫天盤以日為主官星故以此參也雖論刑害星辰合以天煞互論人盤本無煞若加盤上天煞來臨更逢凶神禍甚二句結上兩煞夾垣須破相三刑臨煞必傷殘且如辰生人已有煞卯有刃主帶疾破相三刑即寅刑已已刑申煞若在申主夭折身命最喜入宫坐閑坐奴將何用日月不宜夾煞夾祿夾貴以為榮子午為聖人端坐之宫諸煞莫入二宫乃端門帝座凶神俱不敢犯限到此雖危無妨辰戌為小人惡弱之地天乙莫臨天乙乃貴人也辰戌本惡弱之宫貴人豈居之哉煞立必暗金可畏若臨命宫夭折無疑此論四暗金煞戌宫婁金度秋生未宫鬼金度夏生丑宫牛金度冬生辰宫亢金春生若人立命遇此四煞更魂星同遇定主貧夭魂星即飛亷也余謂暗金恐是的煞限遇惟明火無情若居煞位惡凶難免火居八極宫行限遇之煞星有令主九死一生之斷日月若居華盖僧道流行辰戌丑未為華盖日月居之主孤尅不然僧道之流祿馬如䧟空亡巫醫術士如人命坐官祿及祿馬之宫落空亡九流術士也桃花帶合男女皆為無禮之淫如申子辰生見雞寅午戌生人見兎亥卯未見䑕己酉丑見馬為桃花也若辰宫命人見酉為合為祼刑露體男女皆為無禮之淫也隔角逢孤縱有嗣續皆過房之子隔角如未申亥子丑寅巳午是也若人命逢之更孤神同照身定主過房螟蛉之子也坐祿向馬乃利名顯達之人甲寅生人命坐寅馬居申乃坐祿向馬水木得令顯達之人也對祿坐貴亦文章騰踏之士如壬癸生人命坐巳祿在亥貴人又有巳為對祿坐貴定文章之士終貴然不如坐祿向馬為妙更不宜坐貴向勲有官無祿命在貴人對官勲者為人取祿稍遠有馬無祿矣若能㑹祿馬交命祿厚官髙祿馬二星夾身夾命不富即貴故曰祿馬夾命身富命臨六厄三周必見災危六厄馬前六害也小兒立命于此三周之中災凶煞値三元晚年方可進用三元陽男陰女衝前一辰如子衝午未是也陰男陽女衝後一位是限行只此尤妙木羅㑹舍喜入寅宫如六甲生人寅宫命木羅臨㑹寅謂文科守命宫水計相刑怕居辰地二星相刑主惡死更加刑地不延年己申命尤忌刼頭乃非活路刃末最是凶關刼煞初逢至凶陽刃臨脱至狠故曰刼頭刃尾凶煞星作黨有不巳之戰爭如坐命宫羅計孛同位或三合見之戰爭無巳也二毌爭權乃制過于姑息如火如羅剛對剛也木見炁孤尅孤上見計遲鈍對遲鈍水見孛柔弱對柔弱土命火羅单行妙也餘倣此孤日臨于命限勤苦勞心孤日守命限勞苦盖孤陽不生孤陰不長成也一月单臨官祿精靈可愛月要单行為妙謂之孤月獨明若當射三方無刑尅方好如照官祿二宫主夜生精彩最顯婦人當以身宫為重男人當以八煞為權女人身宫淸吉則尊貴若凶星居之則卑賤矣男人若八煞宫吉星居之主有威權凶星居之則有凶禍靣目傷殘刑囚不宜傷相貌心神漂泊水孛最忌入遷移遷移本流遷之地水孛又是漂泊之星在宫心神泛濫不寧對照逢羅婚姻反掌五宫逢孛男女虚花月孛當頭須損子羅㬋在命必傷妻見木方有子我尅者為妻對宫之禍福如立命卯宫屬火對衝酉宫金為妻便看金星居于何所而以强弱虚實定其禍福命畢而閒健三位有鬬爭如立命亥以酉為閒極金健木弱必爭鬬也二主臨財資財豐厚兩强戰尅田宅動摇身命自臨財帛無尅財必豐盈兩强星戰尅田宅不吉福星喜臨垣祿星宜鎮位福居福垣祿居祿上逢生旺無不貴也以木炁金水為君子以火羅計孛為小人木炁金水受制君子不能為福火羅計孛四星得時有用則小人為大事也十二煞神子細推詳三百六十細參吉凶一太歲二生氣三喪門四天醫五官符六死符七年破八龍德九福德十天德十一弔客十二病符一云九白虎磨􅒢賦命惟一理人為物靈五星緯天相尅相生而不定二氣賦命其生其死之弗齊須知取用多門務必考叅諸說詳觀制化更識安危富貴雙全盖是用星制難如午安命木炁為難被金尅羅被水尅是也貧寒一世只縁仇主傷恩立命子宫火為恩被水尅羅為次恩被孛尅是也恩居四正定超凡恩用二星守命㑹妻男田財官福是也難若當頭何用説如難星當頭照命不吉無救倒限有救疾病破財仇難守命非過房離祖定主異姓同居忌難臨身非庻出偏生必是塡房入舎或刑傷骨肉或出自貧寒要明大化之機不可一例而斷取彼舎此認假成真難星若占田財斷無祖業恩星司守田宅廣置田庄凶中變吉盖緣仇主受降吉中成凶却是恩星受制官福田財命宫主星逢生坐實財吉反此則凶也難星秉令限宫終身成敗破碎刑傷財庫衣祿艱辛行限宫遇難星得令無制則成敗多矣忌難同行當獲福恩仇如遇主無成忌難同行自相尅反吉恩星到限忌亦到則破害引鬼入室貧不自聊如子命水孛守命木炁合水孛拱照主貧賤一世難星為用不可戰尅化難生恩福來不小難用同行相尅凶無尅反為福更難來生恩反福忌㑹仇星必主刑傷恩星守限遇仇來禍生不測忌仇二星同家凶尤甚恩守限遇仇相攻尅大凶難若當頭逢用制福却難量如行限遇難本凶若是用星正照尅難又大發也二母爭權决不為福兩鬼自鬬豈是無災恩星縱顯重見無功恩重當頭得地升殿仇用遇之再見無功難仇雖輕再見必死逄恩不發盖因恩在仇宫单逢恩則發在仇宫則不發此以限逢而言遇難不凶是由難居用地逢限地遇凶難必然為禍在用地則吉難守難宫禍不淺恩居恩地福無量難守正宫禍來不小恩星升殿發福非輕難坐恩宫轉凶成吉恩居仇地縱發亦輕難星若居恩宫反吉恩星若居仇宫尤凶是知造化之機難盡明言之㫁官星貫日定為顯達之人恩用居官亦是榮華之客官祿貫太陽富貴恩用二星照官祿宫尤貴顯亦審虚實强弱更無駁雜何用狐疑當看髙强次推輕重恩居用位縱逢仇也見掀彰難宫直待用恩來方能榮顯行限遇難本凶若得恩用二星當途方許發福忌星守照須看三方恩用照臨必分正合忌星三方拱照凶恩用正照刀轉重拱照刀轉恩無餘氣藉用星而制仇用若當頭儘難星而作祟忌命金為恩無餘氣借木炁二星則富貴更若太陰守命雖限逢凶難不為害也向背固宜斟酌晝夜更要推詳夫妻本是難星逢尅化反能偕老如命辰水為妻火為難若同居齊眉到老兒女主是恩宿逢生旺反主刑傷如辰命土為男女火星同行雖相生終為難星主刑恩守命宫福祿雙全恩星守命必然富貴雙全忌難臨身破刑帶疾如難星與身命二星同宫縱然發福亦主刑傷巳身可免母命難逃命立土宫諸宿喜躔火度限行水局三方忌見金星木炁髙强禍來無地火羅夾命福必滔天二曜五星制化不同三方四正照臨有氣靑雲得路恩星身命兩朝陽白手成家命主恩星同守宅旣欲求名請舉須看當道祿神為難忌則不榮無疑化用恩而登科無慮且看有無駁雜庻㡬論命不差行限若遇恩星置田換宅宫内如逢難曜重病破財或重或輕有黨有救難星有黨得地禍不可言恩星坐實逢生福尤堪恃身命主失纒逢難則一生成敗反覆之間耳已上本文甚明然亦有註之者反生支節故不錄禍福依稀盖是恩仇相雜恩星與仇星相混雜則為禍福反掌耳身命入恩逢時發達身命纒難度難宫至老艱辛辰酉立命土㑹太陰須當獲福二宫安命太陰㑹土計乃恩星反言富貴又不以上忌犯太陰論寅亥立命金氣臨身將何以為二宫立命太陰㑹金氣謂之安身傍鬼非金助月華火羅計孛本是凶神化恩星獲福莫量木炁金水本為善宿為忌難見禍最速土命人行金限遇火不能尅金而發福土命人行木限遇水反能黨木以生災如子丑宫命行限酉金乃金旺火衰盖火生土土生金所以得助則福如寅亥木限逢水旺則水助木尅土所以災生限逢難在髙强無救必然倒限倘若恩居忌弱有黨亦不為祥所以喜者恩星秉令或逢生最可嫌者難星司權兼有黨恩居强宫逢生行限遇之獲吉難星秉令有黨行限遇之無救星學大成卷二十五
