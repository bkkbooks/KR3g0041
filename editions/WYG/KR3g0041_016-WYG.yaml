body:
  text: 星學大成卷十六明萬民英撰三辰通載五星土徳鎮星總龜筭法置積日減二百六十四以三百七十八日九分二十三秒為伏見留退一終之數除之又下太陽中定星内加一周天以餘日數去之晨伏二十一日七十五分二度七十五分六百十九度而晨見東方順行八十三日行七度十一分留二十三日不行晨退五十一日二十九分六十一秒半行三度四十二分五十四秒半夕退畱三十三日順行八十三日夕伏二十二日七十五分又與日合土星論土徳鎮星土之精也一名地羅㬋建中宫之氣其色黄其性信女主之象光明順道所在為福變退與逆隨分野降災色青黑主疫疾之患色赤白有兵將荒亂其行宫度一宫住二十九箇月二十八年行一周夭行有伏順留逆入留叚為暗星逆叚為破家星伏叚為瘟星戊生人以為禄元星甲生人以為䕃星乙生人以為耗星丙生人以為福星丁生人以為暗星巳生人以為權星庚生人以為囚星辛生人以為印星壬生人以為刑星癸生人以為貴星此星晝生有禄之魁夜生人必為災楚地逢之衣禄淺薄須要木曜與之同宫則為禍稍輕葢楚乃巳位屬水廟旺之地土到同宫其中反為尅制賦云欲知淺薄土居雙女則招憂經云晝生見土事和諧夜裏生人反為災巳位臨之身淺薄木照縱横禍不來若更係忌星或同計孛共度則為禍凶暴為人自忖不受激觸言語蹇訥狼性毒害作事成敗成者必因靠勢敗者盡縁邪慾行歩大吃食麄有威權足膽勇能掌握多是非早歳艱難涉歴壽有四旬以下日中生人若見土者命壽長有九九之數此星正廟在丑樂在子旺辰好戌喜午琅玕經云土廟北方斗宿神旌旗五馬表門庭臨齊自是招財祿入亢應為土地星與木共金榮貴格或同炁宿主髙名陽宫晝日行宫順老福爺娘壽自榮賦云叅政學士皆言土好齊瓶又云土歸鄭國好亢而正位天宫鑑心經云亢上若逢戊巳者白日生人在榜標皆為入廟亢乃辰宫之地稱為亢者乃星辰廟旺之宿也安命午未者以此為科甲坐命在酉戌者以此星為官星申子辰安命以此為刑星復以此為天元印經云天元一祿少人知申子辰上土曜推地元人元更髙處必多俸祿定無疑不逢惡曜相刑尅為官權握建旌旗三元禄主一齊空火孛羅計入命宫六主一時全陷了定恒求丐路途中凡推此三元者要居旺樂之地更有喜星相合則大貴若更㑹天宫正禄等星無不顯達土星歌鎮星本生戊巳位安静為尊象厚地晝生惟愛守陽宫土星愛日生守陽宫相貌之中主大鼻土星主人大鼻少言語多慳細硬直心腸有膽氣上在命中少言語多慳吝心曠直有膽氣順行度分廟宫中土星愛順在廟樂土地旌旗必雄貴土為主若順行主守土旌旗為廟樂分掌握資財有福人只怕夜生反為忌留與逆尤可畏刑尅隂宫身更瘁土在隂宫主身短刑尅不招上代祖資財四體多災苦憔悴居官惡處立其身愽弄操刀能幹利夜土在命主不利上祖産業身多有病若有善星夜生人得免居官惡處立身或屠宰幹利在家不定好博弄夜生人與日㑹尅了賢尊難躱避太隂母位不堅牢若在下弦目障翳太隂在下弦主目木來必定主文章火㑹逺行千里外土木同㑹主文章土火相㑹主逺行金若來妻早棄水星忌與刑同類土金尅妻水土相刑若逢華葢懶慵人孛對雙盲難看視上紫㑹主慵懶輿孛㑹主雙盲首同隂位法塲終尾㑹腰駝并背曲與天首同在隂宫法死與天尾合主腰背曲之人也財星應有外鄉財三位徒流為昆季在財宫得外財三位兄弟徒流田宅宫家破易子息雖多不成器居奴奴引盜來偷西沒主妻先作祟疾厄宫傷脾胃癰瘇風邪堪驚悸遷移作客盜賊侵官禄重重主官事福宫晝見相貌位自是英雄多曕智須知此訣不尋常後學得之莫道易九曜鎮星名土宿得之未必皆為咎子丑二宫占文星定主為官分左右土星入廟最為竒辰戍二方欣得之南極一星相照處看他鶴髮與龎眉土臨齊地及揚州富貴須知必易求齊地貴時須位顯揚州財盛見錢流土星最嫌計相望平生一向為災障對在東西丑未宫四十以後渾家䘮土星不可入妻宫婦人夫位亦遭凶妻主罵夫無禮義直饒為婦亦欺公土星水木反為福見水未能資福禄金星相次入寅宫初主財多末主窮土與孛星同犯主壽髙不過三旬許假饒延引未傾亾亦主孤貧無道路土人以土為兄弟兄弟宫中尤不利五男五女十為羣獨自伶仃直至死婦人兄弟土星逢父母家貧姑舅隆子位或若當兄弟又愁子息早聞鐘甲人亦以土為財午未土逢主發財莫教太隂同在午末年四十死相催金人以土為父母父母宫中宜在子此星此宿位偏强宜主雙親福壽長夜生専忌土星侵吉少凶多更損身或若更兼凶宿照且歸泉路作亡人土躔虚宿㝡為宜行順官須宰相為但得此星來照命縱然失度亦多奇土入揚吳傍斗明或來齊地見危星强宫日裏科名共射策天庭一舉榮土同孛向命中來當是英雄亂世才對合更教俱有力股肱王室應三台土為夜忌固為災若在强宫亦有財但得竒星為左右不愁晚景不榮來信厚無過土照人等閒語話懶開唇若逢水宿身飄泛却愛多言衆不憑土星殿局朝元土附太陽曰勾陳鎮殿居寳瓶子磨蝎丑天秤辰宫為本殿居辰戌丑未為本局愛氐女胃桞四宿為朝元羣曜叅奉曰地㬋受朝輔佐身命太嵗值之掌國權柄致身廟堂仔細推之戊巳生人㝡佳土星廟樂旺順留伏逆廟旺樂宫廣東土星寳瓶子上磨蝎丑上名為玉鳯玉珠星若人命限遇之禄馬星辰相生便可言大貴不生本路只作常貴更無禄馬只作三品留逆伏叚減半力詩㫁命在巨蟹土寳瓶生在此方作帝親三公相國分茅土攝位邦家紫炁生土在磨蝎命隂陽八權之地極熒煌若得土星行順叚國家侯伯佐堯昌順叚土入順叚者性重厚為事逺大寛慢仁義多為國戚更遇旺氣禄馬不背有吉宿照臨便是列土皇侯亦是帝親國戚隂人為后若遇吉曜不犯煞者亦主為詞翰侍從之臣中天台輔入後順叚為性如初上朝本宫下臨本國禄馬不背亦是卿監命終遇煞者便是武職將軍女為后妃留叚土入留叚名為時煞月煞身命逢之皆小小下賤之流兼主十般惡疾孤獨僧道之人若有救星主為性清節作事直達禄馬不背須作京朝貴客若帶煞是都監巡檢之人并為僧道庶人為上等户若限逢忌星大減力矣入後留叚為性如初照命者為上等户庶人若不入忌限更為禄馬亦作九品官也詩斷土星留叚號天休主人作事多懐憂一生患難常花酒好作狂歌上酒樓伏叚土入伏叚名為黑煞瘟星性孤寡多為不了僧道之人愚惡無知兼是兵戎之人無救星多為僧若見禄馬多於火土上求衣食帶煞者大不祥入後伏叚身命值者更無救星兼入忌限主人至賤不近人道孤獨尤甚若又犯煞在身宫皆流配五千里外兼主十般惡疾若有救星只減五分女人風塵之輩詩斷土入伏叚名天豪隂謀暗慮多牽惹但是招呼便願隨相生更不論髙下逆叚土入逆段名為四刑八煞若人身命遇之主有百般營運趂衣食為性不知前後愚痴暗昧不慈之輩多為僧道更犯煞入忌陷便斷夭壽百般惡疾惡刑若有禄馬無救星入忌陷平生清閒之人有救星減疾矣詩斷土入前逆名辰貟財上多磨散復聚輔星在命好貪求親戚逺離如萍住入後逆叚為性不知前後愚痴暗昧更逢忌限并逢惡星别無救助必主徒流婦人産厄詩斷土入后逆名血淋一生値此必埋沉凡所運謀多患難㓜年危禍至如今土星躔宿俱出玉闗經玉闗歌土躔角宿名天壽蓋世文章冠魁首經綸事葉富胸襟不是公卿主富有土宿雖是好辰宫夜入土曜不堪逢青龍戴角須嫌土龍蟠泥裏不能衝土躔亢宿號天仁博厚文章達帝京廊廟之中官極貴安鎮蠻夷四海清亢宿從来號鎭星土歸鄭國庸天宫季位土星為廟樂同宫木曜福兼隆土躔氐宿號天牢命宫若値定孤髙年少定應傷骨肉中年榮貴免煎熬氐宿要上壯皇猷土逢氐宿兩相侔氐有火星生處旺更加禄主福綢繆貴格云鎭星順叚度躔氐旌表門閭衣錦人土躔房宿號天信少年作事苦勞心語言誠信人無妄男女難招食貴人鎮星如從房裏過命夭孤寒家自破七宫妻濫號奸星畱伏之時瘟疾禍土躔心宿號天忌性情遲鈍又多災疾病躔身須夭壽身無意氣性庸呆心星日夘土相宜心宿土臨夜不宜若在禄星兼福主自然快樂不奔馳土躔尾宿號天竒百六逢之必有依若是忌星須夭壽又須消息本根基尾曜雖然號屬寅中居兩界土逢生尾火虎居宜来此此星到此有生成土躔箕宿號天彬衣食豐隆却稱情官位若逢貴星照國家掌判有聲名土宿何因入箕豹狡詐奸雄多計較定是英豪曹吏人無事如何又入閙土躔斗宿號天樞事業文章富有餘台鼎任中朱紫貴定須象簡與金魚斗宿在丑木星臨方為入廟可無傾禄主更同陽在晝土陽宜晝最光明貴格云土星行度經南斗間世英雄眞國寳土躔牛宿號天侗心性溫和衣禄豐若是夜生多蹇難身多下賤處貧窮牛星須要土星遊土牛惟好退宫求若是順行逢木曜土牛殘蕩必無收土躔女宿號天常柔順機謀足食粮經營勞力心多慮只恐生来父早亾女宿經躔在兩宫子丑雙宫在廟同縱是夜生應有福日生長福更無窮貴格云鎮星得此女星居柱石功臣鎮帝都土躔虚宿號天冠好樂之宫定出官四九度中登宰輔重金重紫列朝班虚星四度至於九好樂土星宜永守主為將相助君王福禄堅榮自長久土躔危宿廟堂窠禄厚財興事不訛舉措施為多利便言柔語順性温和危宿土曜入廟堂寳瓶須樂火相當火土相生為廟福若逢木尅必為殃土躔室宿名天伏福厚財豐足衣禄多男多女有資財家道安然富金谷室星居亥正為乾土宿相躔要木堅木築髙堂須要土土居木位福延綿土躔璧宿號天異禄馬豐盈有權位身名逺播定安榮官禄吉星須大貴土星最怕在隂宫何況來居璧水中更有月同多冷疾行宫若遇患脾風土躔奎宿號天津貧賤奔波損父娘若是中年貧苦至晚年方是足衣糧奎宿星躔戌亥宫土宿到此福重重土好玉奎奎好土木有根兮土亦通土躔婁宿號天􅀈土婁須要木相逢婁木雖髙非土北刀鎗之下走西東婁中土宿災難論土金相望豈宜婚倘是夜生憂壽促平生沉滯性愚昏土躔胃宿號天磨財物充盈積倉庫難婚終是少男兒不貴仍須還大富胃宿終來好土隆土髙胃宿有髙功晝日居方為大貴富貴雙全比壽松貴格云鎮星度胃正為佳青史書名功業成土躔昴宿名天伏平生須食貴人禄多因胥史得榮名將相聲名人畏服昴宿在酉正雞棲土來此位路中迷那更水星兼孛立凶刑尅戰損兒妻土躔畢宿號天回能通經術足錢財中年便得文章力兒孫必定達三才中央土宿鎮之星畢宿逢之未見明改易無常人不信晝生遇着且平平土躔觜宿號天模父母先亾身早孤衣食平平身泊沒此身應懶讀詩書觜宿好土樂隂陽土星此宿好非常土居坤位災消爍戊人科甲有文章土躔參宿號天津立世經營業未昌男女猶如隣畔客貴人得禄信非常土居申位號長生參宿之宫亦可行夜則好閑貪懶睡日生多學少能成土躔井宿號天驪命若逢之心似癡若習文章應費力此人衣食也微微井宿度中夜見土處世憂勞多辛苦初主淡薄損六親末主離鄉多破祖土躔鬼宿號天文縱有資財化作塵男主須防無上下一生不足歴艱辛土星守鬼未能靈遇木逢金事稱情三合若遇刑煞忌夜生漂溺在波津土躔栁宿號天稽無禄無財又損妻若是日生衣食足晚年終是色沉迷桞土獐星不喜土多疾破財損父母夜生刑忌作囚星閒疾臨身多是苦貴格云土星若來躔栁度虹蜺志氣錦肝腸土躔星宿號天途子因父貴事非虚只恐夜生脾疾苦日生應可足金珠星日馬中土㑹來為人魁偉長身材且見髙官有貴位再逢吉曜主三台土躔張宿號天蛾信行為人事不訛少年淹滯中年貴形神肥厚足田禾張宿怕土固難禁張月鹿兮怕土臨人道午宫宜土廟誰知張土反為凶土躔翼宿號天然經術雖通性不堅㑹有文章身不貴聲名逺播足威權翼宿屬火怕土臨火蛇棲土福沉深土臨雙女號别宿若為禄主定科名土居雙女事甚常翼宿之中不可當日夜見之俱不利為官極重豈無傷土躔軫宿號天箋財藝皆通亦少閑平生未得文章力只將經術保身安土宿入巳人嫌怕軫位逢辰宜淺度不為刑忌不夜生喜曜同臨即堅固土星行度土在斗十八度以上為向廟二十度以上至斗三度為正廟在寳瓶為樂宫在亢宿六度為旺度生時遇之主為重權鎭星斗為大室土之廟也在十七度外至二十一度則居將相二十年若逆入則為元帥守則為王若在天秤宫亢四度及七度前旺度為大丞相掌國家剏業之權三十年為國師若是寳瓶虛四度至九度為好樂之宫有將相之位九年至十八年大貴與木不相得與水不相宜晝為父夜為母日度主父貴常患冷疾夜生尤甚為人厚重性有終始若是主星書生大貴夜生微福月度妨母損財多患冷疾好文章足詞智是主星轉厚若腦後有髙骨大貴木度主有財貴人見重晚年必得男女力火度主損父母兄弟四十以前有女人厄晝生一生有福多因國家特達用之夜生好行凶惡事主醜惡殘疾若是主星少年多災日後貴土度大富貴有聲名財産有權位禄馬金度父先亡三十以前多厄多辛苦必有二妻是主星有殊常之福每遇貴人見重水度主人畏服食貴人之禄損男女多被人損害有木同宫可免土星入宫日宫主髙位招財日生大吉好事清潔月宫主父多聲名母先亡損財平生多災每被婦人相撓與人結交多因此致其厄難是主星可免晝生富貴不是主星夜生貧賤木宫主聲名利國家居貴位妨男女養人子為子為性沉厚作事難測多得貴人見重是主星晝生有位夜生有財非主星晝生富足夜生有福火宫主知謀多膽氣性鈍多難有疾病壽不長性凶好殺官有兵機作事不長逺是主星有貴位非主星多醜惡殘疾有救星可免土宫主性格寛緩柔順足詞智見事深逺於人有情富文章足道藝多利便夜生多難是主星國家進用身有貴權非主星大富金宫主尅母難婚少男女老孤一生得婦人敬愛好色能盃因婦人成立足財帛兼有貴位水宫主為人聰明通經術少言語有文章足財帛是主星晝生大貴夜生微貴不是主星晝生大富夜生多災土星同宫土金同宫主好色能盃一生財帛聚而多散有婦人見重得好妻妾亦因女人發旺為人輕薄有二母少子且有二男土是主晝生金是主夜生俱有位金土相逢此命能修合詩斷土星若曰㑹金星妻妾榮華福禄真一躍禹門能變日九州之衆悉魂驚土水同宫主語澁人多不信好圖畫書籍平生多得貴人見重是主星有祿位詩斷土星若㑹水星同學行孤髙膽氣雄秉節揮戈文武備福臨百六慶無窮土木同宫主有重位兼足財帛詩斷木星宜與土星同百六逢之稼穡豐㑹此乘軒須衣冕記名青史看竒功土火同宫妨父母兄弟多疾病不宜先代産業土紫同宫日生貴顯夜生貧苦詩斷土星紫炁喜相依冠冕榮身職位巍丹赤是心剛且毅徳覃萬里足光輝土孛同宫官至三品詩斷且如土孛坐天心須要分明見太隂不顧留順與伏逆布衣從此出儒林土羅同宫主藝髙强詩斷土星最忌㑹羅㬋百六天災大可愁人遇一生多困苦瘟㾮病染坐亡囚官榮劍染匈奴血羣少傷人被截頭異疾怪形保安穩女須墜産最堪憂土計同宫夜生貧窮餓死徒配刑名詩斷土宿計都不可逢人生薄淺更顓蒙誅徒溺水兼癰患百六天災萬種凶琅玕經節要土居好樂壽筭彌髙晝人得遇順主貴豪夜土多蹇積財有散富而勞生貴而退懶土為陽星不為隂夜雖然三方水旺有禄有財終身勤苦縱貴亦懶而退職日月土同財帛被失對照三合險危水厄土與羅㬋晝生權謀夜見刑忌衣食日求日木水火尅刑多凶順旺則吉逆背非忠土與日月破財離鄉井損頭目尅父母促壽命蹇衣禄招危險水厄土與水火同凶險之人土計晝同禄財大蓄或同炁木財食豐足廟旺順行顯食天禄土金孛同晝生豐厚隂夜多刑反招殃咎一土與金孛同日生則吉更行順旺則貴夜照土在隂宫成敗凶險之徒或犯官刑或為主星却吉各係是主旺福禄堅牢吉曜若同轉為榮貴土星照臨十二宫命宫守照命宫神色蒼剛形貌厚實偏僻寡合為人沉重肥壯無力赤黑色性緩純厚為事大體忠直信行執古務實謹細悔後口不亂言附貴依勢聲應可致日生則吉若在廟旺之宫更得順行身榮豪富更是主星當主國王重用在辰入廟官至貟外郎與金相逢長命修雅火曜孛同入主有疾木不相得水不相宜在子曰八侯之地在丑曰氣衝牛斗火土在丑一品公卿夜生與凶星同不貧即夭土照主性燥暴不柰人侵欺中年抱四時疾患詩斷土照憂勞人命孤初年祖業有如無若逢依附終為有晝生禄主貴豪居土徳髙强臨子丑富貴聰明世稀有夜生若乃為忌星破祖破家那可守土星居命主心癡若有文章命裏遲更㑹木星并水宿此人衣食也微微財帛宫生來財帛耗散十浮九沉成敗不常末主興旺土照合有四方外財多招不義之財因財發福詩斷土星財上最堪加田宅凶星反破家身命吉星須細筭陽宫日月問榮華惡曜天中號土星興災起禍不堪論若教財帛宫中見積貯看看化作塵兄弟宫不得兄弟力雖有不和詩斷土臨兄弟五人同得他之力害重重恐招他姓為兄弟四海相逢也是空土為信徳世皆有兄弟宫中乃陷虧凡事不情分彼我自然反覆更猜疑田宅宫難招祖業早尅父母田宅爭留連宜自卓立方可土照合因田土上發福如在日生更主外鄉田宅之分夜生大破父母之業詩斷土星尊位為陽徳髙占强宫為福力或在當生四煞中發禍興災豈能極土星到丑十分奇田宅宫中喜得之若不髙科須食禄亦須置産得便宜男女宫只宜一子若入廟則有一雙之力刑忌囚怒則減力矣土照主子多有形相不具多見三人少則並無詩斷土星五位在陽宫五箇男兒盡送終忽然孛星相照犯男孫疾患半成空土徳凶星世所聞豈教照臨在兒孫若行留逆都無有甘旨誰人奉厥尊奴僕宫奴僕有主走失若與木曜同宫則至老奴婢成行土照主多奴婢詩斷奴婢宫中見土星萬般謀運一無成不如釋道歸林藪髙卧雲中有大名妻妾宫多招醜貌之妻亦主相離難為偕老妻命相抵則無害土照主多災亦尅頭妻詩斷莫言土曜便為凶東出之時看對宫若落坎宫明健處雍容壽考福無窮土宿羅㬋不可逢妻宫正照醜形容縱使早年成喜事亦主分離西與東疾厄宫有三般惡疾壓身方好如有吉星臨則無妨害土照多患四肢脾臟之疾一生忌食四足之物主頭脚風之疾詩斷土徳來臨疾厄時凶星燄燄是災危多因䏊啞雙睛翳不是駝腰必病脾疾厄宫逢土與羅一生疾病十分多直饒紫炁來相助爭奈家家有病疴遷移宫不宜逺出船行陸步慮有驚土照不利逺行在外逢惡人刑害失脱財物詩斷土徳當生在九宫命星合照莫相逢男女漂蕩他州裏女子淫奔外姓中遷移不止是遷居於中土宿忌牛墟縱是宅多居好處亦於妻妾寄門閭官禄宫事多啾唧然此乃權柄之星若獨行此宫亦主兩全富貴土照必招官中有不測懐憂因文書相連之厄詩斷土星官祿占髙强凶惡威嚴不可當若在廟方為祿主植圭端冕侍君王土木同官福禄星兩星髙位最為榮若逢日裏全為福夜半生人福又輕福徳宫一生快活衣食不缺土照或忌星或刑星年不過四十須招富人有虧尅陷身之事詩斷土星福徳照臨時若處生方始為奇沙漠揚威名國輔英聲傳播鎮華夷土星夜逢多損壽與木同行有疾牽更若火金星到福不愁福壽不延綿福德宫中土宿臨利宜商賈又宜僧吉星對叠家豐足凶宿逢之活未能相貌宫主人醜厚天庭髙濶性重眼小則無害眼大則有傷更若有孛星照臨老定有眼疾不然須有破相終得壽長所作奸詐多好積蓄喜髙堂大厦好山林遊逸土照主狀貌方滿禀性重厚詩斷土星凶熾不堪聞限弱之宫主禍迍不是年來羅網蓋須愁狂疾不完身土星變叚名寳瓶宫天厨星又名天貴星日生貴位興隆詩斷土星子位是天厨福徳妻宫慶有餘子息命宫官禄位逢之禄秩達天衢磨蝎宫禄厨星又名天富星日生財物巨富詩斷廟居南斗土為尊四正宫中達聖君縱此夜生為日忌也須榮達感皇恩人馬宫貪癡星又名天吝星慳吝不與人和睦詩斷貪癡人馬不堪逢耗散多財直至終更被四刑星照破日生猶可夜生凶天蝎宫天梁星又名天保星多藝能掌握位禄詩斷夘宫鎮星號天梁足有資財旺此方旌表門閭官極品兒孫代代出朝郎天秤宫禄庫星又名禄權星文才厚重有財大貴詩斷土臨夘元為禄庫足禄多財又堅固官崇位顯佐君王若在財宫主巨富雙女宫無依星又名天咎星小人讒佞欺罔詩斷土星巳上無依倚縱使吉星多不利日生人病沒資財夜遇終歸須自縊獅子宫玉堂星又名天鎮星主鎮守安静之福詩斷玉堂吉星位南離主性温柔喜禮儀黄閣馳名金紫貴光輝家族顯妻兒巨蟹宫天相星又名天福星為事反覆無定詩斷天相鎭星未中央性好清閑本善良若見孛星金助月功名顯赫佐朝堂隂陽宫太微星又名天罡星主事快能有剛節詩斷太微土宿在隂陽信義為人百事强只怕孛星同守尾却將吉事反成殃金牛宫都堂星又名天正星主事正直無私詩斷酉上都堂土喜事髙名科甲有詩書只憂留逆并伏叚帶酒貪花百事虚白羊宫天將星又名天鰥星鰥寡孤獨詩斷白羊宫分是天將喜日相逢㑹太陽日土同宫身必貴更加夭壽得延年雙魚宫黒符星又名天嗇星儉嗇安静詩斷亥上黒符不為榮空有詞言立不成火孛相親身獨立妻兒雖有也伶仃太白金星總龜筭法置積日加三百七十六以五百八十三日九十分二十七秒為伏見留退一終之數除之不滿者為餘日下太陽中定星以餘日數去看在何叚積計成度便知定度夕伏三十九日行四十九度五十分去日十度半而夕見於西方順行二百二十三日行二百五十一度十二分留五日不行退十日行四度十二分晨退十日留五日不行順行三百三十三日晨伏三十九日行四十九度五十分金星論金星太白之精一名那頡星建西方之氣其色白其性義將軍之象出依期民安國泰伏見不時兵將暴起將易政其行宫度有前後伏順遲逆叚輔從太陽不離前後二宫約法一月一宫一年一周天入留叚號天阜星主癆瘵疾入逆叚號天赤星為主兵戎入伏叚號天虞星主為性癡愚丁生人以為禄主星甲生人以為耗星乙生人以為福星丙生人以為暗星戊生人以為魁權星巳生人以為囚星庚生人以為印星辛生人以為刑星壬生人以為貴星癸生人以為䕃星此星乃文華秀麗専主兵革文章聰明廟辰旺亥樂酉好巳喜午琅玕經云金居財帛福偏饒倚靠他財勢必豪辰上角星兵任重酉宫躔位引旌旗三方順照多財禄若遇未申福壽髙逆伏囚留俱不遇超世榮貴福堅牢賦云西方太白向衛分而益壽延年又云要問榮華大扺金居亢宿鑑心經云金木之星室宿逢定知名位至三公金星在酉火居婁夜生必定佐王侯惟金最喜與日月水同宫賦云生來少疾日月與金水相當都例經云金水相逢最為羙智慧聰明須見水此為有福無難人一生營求皆稱遂此星名為妻妾星若臨得地必為榮只嫌月孛同宫分中年不免被災侵夫人命居夘戌位者以此為科甲若髙强入廟則主名掛金榜經云科甲文星對命宫陷時及第必難逢災遭惡曜相刑尅假使為官是䕃封廟旺更居在四强驚天動地振文章如有吉星同分度科名登第好稱揚更有安身在酉辰位以此為學堂若居髙强廟旺則學問必出羣聰明冠世經云身宫宫主名學堂相貌奴僕不可當更有疾囚皆是陷文華縦有命難長坐命馬牛宫者以此為官星如臨人命更得吉曜相㑹無不言羙怒則反是寅上躔度則為愠怒星經云金來人馬受恓惶若在相貌宫全減力也金星歌金星潔淨好顔容秀目踈眉白又紅身短不長聲響喨好躭音律習商宫金星在人命主形相潔浄顔色紅白身短不長聲響喨好音律多淫慾美情悰結交朋友久而恭不奈是非長憫念更於金鐵巧施工臨身自有將軍勢照命兵權越是雄妻財有勢才同因妻榮達不曾空金者兵星也照人身主有將軍之位在命主有兵金為妻主有妻財而達太陽遇貴人提挈女主如逢母外通水㑹之星淫更佚火逢因色起災凶日生主宿為豪貴夜鎮令妻貌不中天乙貴好相逢好逰商賈走西東妻妾愛陪僧與道孛來同枕患殘癃天首若來居武位尾同至老是田翁居財帛財帛豐三宫姊妹是同宗金在三宫只主姊妹田宅隂人成卓立五宫見女定重重金在四宫女人卓立在五宫只招女子也第六主妻多下賤七宫妻不送臨終第八病時休針灸遷移客女作家風金在八宫有病不可針灸九宫客女為事官禄妻家有官䕃福宫白髮福無窮第十二宫逢吉曜其人定主美貌容此是前賢微妙訣學人子細去研窮金星入廟來天命初主封侯仍佩印若還主將不同行只資田地樂平生金星聮水清無比洶湧墨池才調美如何天下有才名甲子金星兼水智金星與水居辰位金木逢龍須入相不居主將不同行亦主標名金榜上金星位處利天秤若到金牛分外明如或更居髙强位黑頭定是見功名金星元來名六害六親縦有不相愛日生若被火來侵定是少年須死快金星最怕太乙星若在髙强禍必侵或在閑極惡星見男須浮浪女須淫金水二星同入未婦人凶事成吉利更逢日月近宫行夫不為官須子貴莫以金星専福星亦能為福亦為名併得水星居巨蟹子孫榮曜達天庭聾盲喑啞全無氣寅上尤嫌不得地若還木位植其星専主斯人失厥内祖財多破隂財獲初歳迍邅晚嵗成晝喜日同夜逢土最嫌火孛計來迎金居婦室主妻多亥午宫中陷子何若與太陰同照已雙生貴息顯家和寅與申宫莫見金有星若更是刑侵此生定作孤貧客口舌無憑禍復深常招賢貴為妻室職重權髙有令名廟旺宫中多福力人形方面更端平忽然紫炁來相並須知妻有不良聲夜生福𦂳晝生慢金木相逢財自成金木二星為善星所臨非主亦非榮本位金臨皆有喜即為豪貴顯王庭在官遷轉加重禄白衣之士選門開若為商旅多財帛士庶人家喜慶來金入辰宫氣已豪更逢亢宿勢尤髙三方不䧟行仍順定掌兵權建節旄入局天權號貴星此星何慮欠科名玉堂深處還他到先着青春折桂榮金名吉宿處何如禄馬人元要共居主着官鄉如遇此魁名終是唱鴻臚金星殿局朝元金星附太陽曰白虎從駕在金牛酉天秤辰雙魚亥為本殿居巳酉丑為本局愛亢牛婁鬼謂之朝元若身命値之定為將帥惟六丁生人最佳金星廟旺樂順伏留逆廟旺宫淮南金入天秤辰上名為天角天曙星若人身命見之更在八煞官禄宫有星皆主極貴不在本格亦應三台兩府命不然只作平常命斷之樂宫梓州台州四川金入金牛酉上名為天旭華盖星若人身命遇之更若吉星相應又有禄馬更廟樂者主為左右金吾將軍若不帶煞只作文官三品斷之如在别宫伏留逆叚則減力順叚金入順叚名為天雄榮達星若人身命遇之皆為福徳如身宫不在却斷為淫慾平常之格雖有救星亦平入後順叚入宫又遇禄馬主京朝之職禄馬不背更廟樂為大官并作宗親之命斷之留叚金入留叚名為天異天阜星若人身命遇之則癆瘦之病多帶氣痰有救却主多藝音樂之人為性嬌閑喜華飾多為僧道若有忌星同更在水宫土宫主為上等官貟更帶禄馬須是六品武職入後留叚為性如初若遇煞者須是屠宰水土木匠之人命强有禄馬只是五百料錢之人若陰人尅夫多淫詩斷金入留叚號天區運用遲疑必致虞凡所圖謀皆不契晚年禍患必嗟吁伏叚金入伏叚名為天虞天賴星若人身命見之主為性癡愚多為火刃之藝泥水軍人輩若遇木火二宿些少刀斧之藝若有禄馬便斷為小小軍員頭角之人女人主殺夫有救星平善大率女人命須是夫宫無惡星便清潔若有忌星混雜則是淫濫之人詩斷金入伏叚名為弱為人如繩自遶縛究竟不能解其身致使後思前事錯逆叚金入逆叚名為天赤救盜星凡人身命見之無救星皆主兵戎之兆多淫慾無慈惠之人隂人遇者風塵無疑身宫在閑主為刀斧之藝若禄馬行於木運為九品佐職之人無禄馬主小小刀斧之藝或為屠宰之人陰命多妨夫入後逆叚遇火土二星交身宫俱閑兼犯煞并遇忌宿其人必總兵戎若坐禄却為中福轉達之人詩斷金行前逆名辰隊平生多入囹圄内所為多是不遜心橫惡暗躔不能退金行後逆名位傷此星降福甚不祥父母兄弟皆見惡婚姻之中更有妨金星躔宿俱出玉闗經玉闗歌金星躔角號天清少年登第必髙名衣禄生平豐且旺為官穩穩佐朝廷金星躔木西方宿東見西行躔到角順逆生旺不伏留權位貴榮能掌握金躔亢宿號天昌挺生大節負忠良文武兼全為宰輔定應禄位主榮昌亢宿五度至八度不為廟旺亦亨榮金入太常同度分官居才藝見聲名貴格云金星躔亢産忠良佐助中興國祚昌金躔氐宿號天將少失尊親性自剛平生衣禄能文學貪欲之人損父娘金躔氐宿事平平莫與同居月曜并男子見之多色慾女若逢之暗室人金躔房宿名天角衣食生來殊不薄為人多義更方圓形貌端嚴性多學金來房日兎中居才冠羣英自有餘忽逢首尾日月命女作為尼男作巫金躔心宿號天孚未離强褓値身孤温良處巳心多慾若是文章一字無金星喜夘躔心五喜曜合照有財賦文人五馬作髙官武則建節當守土金躔尾宿號天殃骨肉資財定見傷若不修仙并積徳定須夭壽見悽惶尾火虎星半寅卯若是金臨人至狡直須水曜解其災一切所為皆稍稍金躔箕宿號天彤妻子乖離吉見凶總饒家活能豐足老年不免又貧窮箕宿更忌太白遊太白箕躔甚可悲人馬有金凶且忌金居人馬奈難修金躔斗宿號天銓貪財貪色行非賢男女雖多身是客更無衣食少安全金星入貯斗中安為主凶星墓絶間作事總乖家業破縱登科甲位難攀金躔牛宿號天繩色慾多貪命裏淫衣食生來自豐足晚年優裕享安寧貴格云金星度次到牽牛書史功名應不朽牛宿正屬土躔宫太乙躔之作貴蹤金牛莫待逢夜裏妻兒孤立一塲空貴格云金星若臨牛宿上被承睿旨古今稀金躔女宿名天奸多男足女少安閒若是十宫星得力何愁此地不為官女宿躔處要金厨金居女曜掌中珠金女號為珠貴曜武人名鎮外藩隅金躔虚宿名天編美貌豐容性自安平生有壽無災害衣禄隨時性自寛金性堅剛切忌虚六親恩愛自情踈凶殃蹇剥加淫濫自立生涯出祖居金躔危宿號天競温著忠良性自清文學定須因女富文星入命出官榮金雖死子喜居危棄祖成家物自歸琴瑟調和朱紫貴方知妻子有恩隨金躔室宿號天勲必定遷官足貴名聲振四方持節鉞任登機宻位尊榮室宿衛分屬雙魚金星到室貴安居室宿有金來潤澤金居室位福應殊金躔璧宿號天光彭祖年時壽命長女人見喜資財旺美貌豐容性自剛璧玉從來要金厨金星玉曜内連珠金樂此宫偏作貴金門待詔仰天居金躔奎宿名天厭未遂功名心更逸為人温厚更寛容性識孤髙應不淺奎宿真箇好文章金躔此位實非常一二度中方作福金星入火有相傷金躔婁宿號天薨必定為人少失親酒色是非應不免晚年富貴樂平生婁金之宿喜逢金只恐刑囚火土侵少失尊親身獨立夜生猶可晝難禁貴格云金星為福廟星婁塞外英雄孰與儔金躔胃宿號天端命若逢之五品官任是兵刑兼法令定須出入是金鸞胃宿度中十五半八度金星偏喜玩此位樂地命逢着才藝聰俊人有斷那頡廟堂星度胃佩玉鳴金朝紫陛金躔昴宿號天璋為官進速任闗梁卿監位中名早得也須腰紫佩金章趙分金星助月華未臨六度昴星加英才冠世誰能比進獲隂財長福芽金躔畢宿號天聨赫奕功名秉重權不作外臺觀察使須登廊廟職陞遷金畢之功至十一此度之中主大權如居下位郎官吏火若同宫妻獨眠金躔觜宿號天營冠世文章顯貴聲翰院詞章身獨貴也應金紫列朝纓觜宿從來號火猴火猴得勢若金鈎雖是水星無慮火金居觜宿福難謀金躔參宿號天晶學問詞鋒冠世英若是官宫星得力定須桂籍早標名東南有宿號為參上下相生特夢金若是遷移宫分土榮妻貴子惠慈心金躔井宿是吉宫髙才愽學福豐隆為官定是居廊廟福及蒼生禄萬鍾金德循行陷井旁奸淫妖濫事難當大隂并遇人貪色文武兼資順度良金躔鬼宿號天淫婦人遇着惡聲名戒行不循迷酒色平生衣食却豐盈鬼星元屬鬼金羊金來此位福深長長庚到鬼應加福金宜此宿大為祥貴格云金星偏喜躔鬼度榮顯富貴福無窮金躔栁宿號天闗快樂平生衣食閑貴人知重多男女錢物豐盈性自寛桞曜經躔午未邊金來栁位福難堅命曜若躔十度上穿窬奸宄計争先金躔星宿號天熒理義精通學業深更若火星來會此是非酒色定奸淫金居星位有何竒金火相逢去路迷須要水清金始白火炎金白福攸基金躔張宿號天𤾉財物多貪行不良若是妻遲難得子衣食平平壽命長金星張宿號金堂身若逢之最喜强禄貴更加人有職三方雖背貴人昌金躔翼宿號天英學問文章顯大名經術更能修顯著此身榮貴樂平生金係武星恢武業只為金宿走翼蛇財庫禄行如遇着更同水徳甚堪嘉金躔軫宿號天程口舌輕狂凶害生言語不眞心泛濫多汙非禮事奸淫軫星最喜金來到際㑹遭逢命中坐女兒雅麗男英才此身永保無災禍金星行度金在天秤是本宫角九度三十分以上為向廟亢二度八十一分以上為正廟過此為次廟在室七度十三分為正旺牛名為樂居此廟旺樂生人必主權國柄太白亢為精粹金之廟也在五度外八度内為正廟二十年為將相之位有文武全才負忠良大節若在魚宫臨室五度及十三度處機宻之務居節鉞之榮旺十八年若十三度雖居貴位心常不快為節度使若在牛宫胃八度至十一度官至五品十二度至終度主兵刑之任法度之官自昴初度至九度為卿大夫闗梁之任三十年尾女有厄自七度至十一度必為司馬畢初度至十一度並主大權若在下位郎吏之官若見火不宜妻火同宫妻不良與蝕神居位男為覡女為巫與木相宜與水相妬見火為淫晝為女人好色夜為狡猾男子日度難婚性凶猛好争戰有出長之計因戰伐而立功名若聲語細前後必有七星是使相之財也月度主多淫因婦人財物上立身或娶下人為妻行非禮之事男主貴女人遇之主淫木度主武勇超羣常歡樂快心性足財物貴人見重火度因女人有喜平生難婚偶亦被婦人損陷土度主晚婚娶妻老㓜不等相去十載以上者少年離鄉井因妻妾有憂好色欲財帛聚散不定是主星主有位金星主有兵權之貴好色慾有好男女水度得人敬愛有好妻一生貴達合娶親戚女為妻不然先姦後娶金星入宫日宫主為人性剛作事無定多得貴人見重難婚偶是主星有位非主星長壽若行留逆叚行不良多被婦人相撓月宫主為人性和作事明白有宻謀善貯積因女人財物日生好女人之事是主星夜大貴晝微貴不是主星夜生大富貴晝生有禍木宫主聰明有智性格過人作事敏疾得女人之財有聲名因貴人有喜是主星晝生有財夜生有位非主星晝生微富夜生大富如對望合照性格並同亦主有福火宫主為人性急燥作事無定因女人有厄及口舌狂亂是主星有福夜生有位非主星有道藝逆行諸事減半土宫主為人好歡多色欲少男女毎得貴人見愛土同則為事不正下賤之人是主星夜生有位晝生有財有福能掌財貴人見重非主星微有福矣金宫主為人聰明作事和緩日生好女因女人有厄是主星有貴位非主星晝生有福夜生微有職位水宫為人聰明智性超羣見事敏疾有節操是主星轉加富貴晝生微有職位不是主星多因婦人引惹因而獲福金星同宫金水同居文武雙全平生有極貴人舉薦若水是主星日生主文中成事有貴權不是主星亦主文中立身微有職位金是主星日生主武中成事夜生大貴留逆者雖有文武之藝主平生多難淹滯不可作貴人詩斷金水三星若相㑹俯取官榮如拾芥大凡遇此喜非常百六逢之多吉泰金木同宫主大富貴人又多子孫女即殺夫詩斷木星最喜㑹金星吉曜相同百福興百六㑹時多吉泰人生指日到公卿金土同宫主難為妻亦忌門户不正濫有財物少男難婚偶詩斷土星若曰㑹金星畢世榮華福禄興一躍禹門三汲浪九州之衆悉魂驚金火同宫主妨妻妻不良多淫慾詩斷火星慶㑹喜逢金百六當之慶瑞生人生逢之登上第佳名烜衍保千尋金炁同宫主性温艮難觸犯有志節心多慈愛敬信佛道有事業壽長有禄詩斷金宿相逢紫炁星禹門先躍化凡鱗威權重大為將相變理隂陽輔帝宸金羅同宫主有兵權之貴詩斷金星不喜逢天首狼戾奸凶為契友富豪苗裔也卑微百六逢之殃不少金計同宫主墜馬死在中年詩斷金馬設若逢天尾人生奸邪愚且詭百六當之大不祥財散人離災病起金孛同宫主少年多尅晚年有禄詩斷金星與孛若縱横百六逢之大吉亨人産遇時須發福家居全不保康寧琅玕經節要金乃右弼與日晝同益於權勢廟旺推之致身豪貴水木同宫文華巧妙處性清髙子孫續紹羅㬋同宫兵權之重天乙對同貴而富厚金土晝同福壽堅牢更加廟旺自致貴豪金與火宫若同在晝刑妻破財尚招災咎更在留逆傷殘損壽若遇順行文武重權夜合火照各臨旺喜壯歳成名位居主將夜同計孛亦凶亦貴主臨旺地掌握權治凶險之多財禄俱備晝若逢之還破福纒福星不救夭促天年不逆不囚入逢喜樂財禄豐盈福終到老金星照臨十二宫命宫守照命宫主面滿骨堅神色明潤語聲響喨才性快利武勇超羣好習兵法為人慈和方正曉事通達為事善方圓有文學多情慾好盃飲性剛人形方短不招凶厄得隂人財亦主損妻心明性巧快利易曉懶文輕學好事華飾心不伏人不喜静宻少不成財心無慳鄙所為多義更宜祖業能獲隂財外禄陽金好色隂金好聲在申多武在辰曰入地之前在酉曰總管之前在辰酉二宫主官禄在夘戌二宫少失尊親亢室榮華室宿長年與火同宫在午主失財與土相逢長命修合與日同行主欲與太隂同行主夫美貌金木同行及第髙名紫炁㑹星是謂孤星主有名僧道又須限星得地方可斷與首尾同宫男巫女尼忌日火同在諸宫為害與水同在六宫主夭壽忌火孛紫炁詩斷金星照命氣雄豪妻美兒遲晚嵗牢莫使當年凶忌犯文章妙麗入詞曹金星臨命性難慈將相多淫美貌姿若被火星相照視却於官位反成虧財帛宫主晚年妻財金照一生有隂人財帛其人吝嗇詩斷財帛宫中喜金碧角亢之宿并昴畢堆金只為辰從龍遇火鑠金渾無迹金居財上喜為深多招女禄衆人欽只憂火孛來相尅惟恐中年早退心兄弟宫主三人皆得力金照主有義姪可保四人見二人力詩斷第三宫中見金星義斷分金弟别兄雖是雁行親手足反成背面少恩人木星兄弟忌金星金絶於寅合主刑人馬金居忌星尅同胞兄弟異途行田宅宫主得祖業父母俱慶衣禄自然金照主有絶户隂人田業成活之象詩斷金星吉曜成奇福田宅逢之主厚禄上下加臨不可刑畢世安榮自豐足男女宫長宜女次則男夜生人三男二女或書生人更在寅上兼六乙生人見之只宜桃花夾竹異姓偏房之子金照先見三四女後見一二男詩斷金星第五便為竒子息當推有四兒莫使同宫因火尅榮宗榮祖福無涯奴僕宫奴僕亦得力金照有女使進六畜詩斷金居奴僕尅少妻水金輔陽男女貴只因五六正相隣名達天庭振經藝妻暗私期奴僕宫星逢太白主難容因之逃走家財物難保驅馳去險中妻妾宫妻主聰明温良直雅若有太乙月孛羅㬋計都凶忌星曜則主尅妻賦云尅妻害子太乙與首尾同宫無此星則有偕老之期金照妻不良詩斷金星本是號妻星要在髙强廟旺宫夫婦共榮多福兆蠲消災患更無凶娶婦生離仍帶子只為妻星犯金土未亥辰方三位强又須娶婦置田庄疾厄宫主有小疾若六丙六戊六丁六庚六辛六乙生人見之不妨金照小患不可針灸詩斷疾厄金照本為良氣概英雄少咎殃火孛相將皆此會直須骨折與根傷遷移宫出入吉利道路平寧營運稱心末主大旺金照宜出入招損僧道隂人喜重衣食之分詩斷金星得地照遷移調任榮遷福自宜若更命無凶曜照仰觀平地上雲梯官禄宫生來少官事防有女人仇賴君子得之早年食禄無有淹滯金照得金玉於隂人兼得隂人舉薦立身宜求公無刑禁詩斷官禄宫中太白星照臨方地産豪英若為禄主居强位文在廟廊武帥兵禄星守此立科名切忌三方惡曜侵縱有文昌相助限為儒不第一生貧福徳宫衣食榮旺受用不少若在燕分與凶星惡曜同宫則先凶後吉又忌照破男女須用子細推詳禍福金照主有福禄稱意財食大來立身髙上常有貴人喜重詩斷金星福徳最稱竒徳照髙門長貴兒冠世雄才攄錦繡禹門一躍過天池相貌宫為人端正性格聰明身材却好衣食榮旺凡在相貌宫者無星更好金照主形相分明作事有權十相無破詩斷金星相貌並西隣一部髭鬚胡口人若遇貴人相接引定為曹吏處公庭惡弱為臨天秤宫凶星成吉吉成凶惟逢金木乗龍路父母妻兒亦䕃封金星變叚名寳瓶宫白獸星又名天色星主色事為美人敬詩斷坎宫白獸怕逢金火孛加臨禍最深若見水星怕月助一生方得免呻吟磨蝎宫天廩星又名天妖星主妖怪好師巫詩斷天廪之星到斗牛資財足禄廣田疇兒孫貴顯家門盛自有聲名播九州人馬宫絶體星又名四刃星因色傷身婦人犯惡死詩斷岱岳峯前金絶體縱逢吉曜也頑愚慳貪鄙吝無髙下女作娼兮男匹夫天蝎宫地刼星又名夭媚星主媚惑淫欲也詩斷地刼宫中怕太衝其星失位禄難逢無名無利刑妻子祖業田園沒始終天秤宫金鸞星又名天貴星因隂貴人成禄詩斷金鸞之宿最髙强財福加臨見寵光金木逢龍為福徳定知名譽四方揚雙女宫太白星又名天軍星主兵軍武貴也詩斷太白金星主大權喜臨楚分息塵煙出則將兮入則相三分足用喜駢駢獅子宫天陽星又名天淫星主好色詩斷天陽喜遇太陽宫西地朝南臣盡忠人子孝廉存禮節更加爵禄自重重巨蟹宫右弼星又名天欲星主隂人多淫欲詩斷金星右弼最為良四正宫中及學堂只忌六宫并十二文章縱有也荒唐隂陽宫天辰星又名多情星主到處情色有也詩斷金臨申上號天辰順則官超逆則貧若在十宫為福利如臨五弱反為迍金牛宫白虎星又名那頡星主兵權領將軍勢位詩斷金精白虎到金牛文武朝班位列侯若是垣宫行順廟子孫代代福優游白羊宫天哭星又名破禄星因隂人惑成親後失詩斷白羊金曜為天哭怕行星火絶天禄若遇髙强得自然五弱相逢壽難續雙魚宫天景星又名天隂星得隂人為貴福詩斷景星到亥四方明室璧加臨禄有情君寵臣兮臣盡職莫愁官禄不昇騰星學大成卷十六
