body:
  text: 星學大成卷二十四明萬民英撰星經雜著叙慨自道裂術興星家者流徃徃挾一聞以為竒傳一得以為秘不以告人况肯著之書乎古人觀天知命之公心翻為後人釣名餬口之私計江湖術士大率類此余甚不取乃裒集家藏秘訣精語單經短賦共三十餘篇總編一卷以其非純於一家故名之曰雜後之覽觀者有聞一知二之資當念是集㧞十得五之難云易水育吾子識星經雜著唐一行禪師十六兩金門人徐子賢註造化分定闗係身命壽夭賢愚格局乃知凡命坐處有官福拱夾有四善拱夾取其善則為吉諸星間位成雙曰星分兩兩格每宫一星遍布十二宫安命空曰星分五五格卯上坐命金水輔日停勻或輔命主不偏曰三台輔弼格金水日月同宫合年月日時之上者曰魚水和同格日月同宫同度不相食者曰合德格金在亢太常垣木在室璧太極垣水在張翼軫太微垣火在氐房天市垣土在斗牛紫㣲垣己上曰五垣格主星臨歲駕祿馬在前後曰前引後從格甲乙生人寅亥安命木守本垣丙丁生人安命卯戌火守本垣戊己生人子丑安命土守本垣庚辛生人辰酉安命金守本垣壬癸生人己申安命水守本垣曰受命于天格凡星辰在命順行金前土後火前木後木前水後依次順行盤靣曰五星順行格太陽金木水火土行曰四令環陽格羅計子午得用者曰跳關曰首尾分天格羅計各分星辰兩處曰首尾平分格衆星在巳午未曰戴天格在亥子丑曰履地格又要分其晝夜更具七十二格見于聚論中宜詳審以知其妙刃煞變直立死無疑日月並照禍福誰期若刃星為煞又作直難者死不可逃此限若太陽同行斷其喪父或父有疾與太陰同行斷其喪母或母有疾自身亦主災犯重者與限有關係順者則災可减矣煞考衰旺計于四時榮枯得失各應非遲如煞是木星又生春令則煞旺而害人非遇火金不能制化生于秋令則减半矣火旺夏金旺秋水旺冬土旺辰戌丑未宜心㑹之衝駕驀駕離祖獨居逄生喜順見煞喜逄如午生人子上安命謂之衝駕己上安命謂之驀駕主孤尅離祖有發福榮貴者宜考聚論内説逢生喜順者如子上土申上木辰上火則火順而能生土化木背則不能見炁而無大凶害也助煞化煞逄空遽發二限推遷死生特逹如用土星水木炁孛同行對照乃助煞有害如木火炁羅同行乃化煞致吉若遇空則煞無用反能發福大小二限各有真理宜取用星宿于口訣四善重輕拱夾分别年月日時各有詳訣四善者年月日時之殿也以年殿居首日殿居次月時又其次也看其坐照拱夾何星何宫如子生人拱子曰拱駕夾子曰夾駕拱夾四柱内年月日時各有其名如子上坐命寅戌有殿曰夾命午上有殿曰對拱申辰有殿曰傍拱在本宫曰坐殿太陽一殿例於聚論中取之四殿拱夾之命妙秘亦考聚論身宫命宫的池忌逢非貴莫救煞惡愈凶如酉上安命的煞在上又値水孛在内此謂之金坐滛宫非貴人不足以救解之禄亦可以制定之池者咸池也如寅午戌人卯是咸池煞又逢水孛為花酒滛蕩太陽雜處㓜鬼定理隨命制化喜怒無比如辰上安命土計金同行土計日同宫乃父母有力亦主生來坐享見成之福火羅金火羅日同行主尅父或不利父或父有疾不過應于少年若發越者在所限而斷其吉凶太陰獨明輪運非輕漏關跳關晝夜有情諸星皆欲生惟月要獨明或守年月日時處大吉輪運者限元有相管攝關係也口訣詳于聚論中曉然如鏡漏關乃羅計截斷太陰出於外或有吉星出於外亦是也歲星守歲逢順無配又作吉神立登科第如甲寅生人木為歲星乙邜生人火為歲星若木在寅火在卯曰歲星守歲其餘倣此又逄生星限元又順其福無比立登科甲逢凶曰歲星化凶德深為不吉之地月居月位各從其類若値亡神其禍無避如寅月生人太陰守寅之類最宜獨明獨行値吉倍吉忌凶星惡煞重逢日守日垣晝逢作官夜誕逢煞刑害纒綿如甲子日生人太陽在子寅日生太陽在寅之類謂之日守日垣以例推之晝生坐官順行大吉若夜生又遇煞于上大凶主父母有疾亦纒綿也時逢福曜官星喜到若論重籍陰陽沓照如子時生人子上是籍得祿星官星到曰爵星㑹籍如日月並於上者其貴可知矣又當考限元命元祿者即甲祿在寅之類胎元戰尅祖分無力父母難存必迎刃直凡人胎元主人生前之事與命有管攝如惡星居之則主胎中之孝服或破祖又値刃直星不特父母難招自身却作大禍如戌上胎元不宜水孛作刃直居之餘依此推年月日時旣已定十二宫中留心訂寅申己亥重相關辰戌丑未須當認一篇亘古之𤣥機神仙考之亦難盡年月日時旣定矣論十二宫生尅惟寅申己亥四位實有相關為互刑重故也非聚論之言不足以明此理辰戌丑未考其本源為力稍薄若是四柱申地亦還其富也此十六金之真筌於聚詩中大有管攝也章章明白當為萬金之秘傳唐一行禪師聚論詳議註解星旣居垣先論刑衝虚實垣者本宫也刑者三刑也衝者對衝也虚者空位也乃四柱旬中空也實者三合位實也命已入局須分逆順遲留局者寅午戌之類逆者退行順者疾行遲者慢行留者不行進退須有情也究根基以論尅制根基乃命元也尅制者五行有顚倒相生相尅之理其中𤣥妙即水生火火生金之義也有口訣求貴賤以反因由刑衝虚實之妙能反其元而致其可貴可賤可貧可富之𤣥奥體必原於四柱論命必極其四柱之精𦂳要處看生殺何如用深括於五行論限元所用之星落于何處遇尅犯者凶遇相生者吉又看虚實刑尅如何祿不臨於四極馬不徃於四刑祿卽崇勲也甲祿在寅之類四極者辰戌丑未之地此地原凶非祿所止馬者寅午戌馬居申之類四刑乃寅申巳亥是極刑之地馬不安也煞喜居官煞者即飛亷煞星也若居官祿宫主有大權却忌居於男女夫妻田宅弟兄之位殿宜拱夾殿者四善也又名四喜拱年月日時身主命主官主并財元則吉雖有衝壊亦吉終不騐也拱處如日月上有凶星亦貴凶星者金在寅之類情性考年生於何地情性何如皆從人生年斷之出身吉與不吉此段論煞測之必以官主所屬配之口訣諒如是乎父兄參月生月中論父母兄弟䕃刃如何便知尅制夫婦日辰論夫婦凶吉尅制以日辰考之宜口訣子孫時别男女以時别之此篇年月日時皆處煞地以四柱推之口訣有例日月交輝凡日月或三方或對位之地不空凶亦可伏能致其吉若遇忌星或年尅非疾厄則妨父母或少年背父生也遇之者終吉四善拱煞四善即四殿也拱處空則吉用夾財亦吉亦不可以空而推之此法非口傳心授不能衝能致吉此言須口授惟僧少異耳男犯者必弱否則淫於花酒而散財遇空處尅亦可吉刑能致凶刑者三刑即寅刑巳之類四柱八字與盤靣中相犯全者方驗輕重天馬重見有當生天馬有流年天馬如甲子生人甲祿在寅申子辰馬居寅即火是天馬之類若受生者大貴以十干禄主取天馬如甲熒乙孛丙柴頭之例是也天喜重逄有當生天喜有流年天喜坐七强宫為上要與命限相關魁星用三魁者卽文魁次魁小魁此星坐身命更兼學館相㑹即以文著名文星二用文星卽文昌枓甲是也同上斷乾坤互沓如子午上安命二宫申亥相逄得格者乃文人才子大貴顯以文成其名也驛分天地天驛地驛二星在命或在身宫或在官祿便可言其有名更命限好者大貴難直忌重居八煞主與直頭星同行其凶不可言權煞宜虚位煞星同作權者臨空位則可取之四柱内無亦曰虚位餘則不然孤寡畏三刑孤神寡宿之星畏三刑之地六害窮八字子未六害之類若八字中全與盤内星合來大凶後有例見推大煞以論刑有其刑則有其煞在命位主尅性命在兄弟主尅兄弟在男女夫妻田宅奴僕疾病等宫皆忌之此星有刑故也惟官祿宫見之必主有大權柄也怪亡神以立身亡神在申申上立身安命忌之駕上亦不宜見之騰厄重迎風騰煞與天厄同宫者大忌之不宜坐命安身更限不吉必主破敗一空重者主法死天妖刃神天妖即丁甲金兮丙從火之類若為煞星深忌之空亦刑尅也池忌實見如咸池煞命主帶之四柱上又見深忌之其人必因色而亡身相忌疾親相貌宫與疾厄宫主有相關及同位互換者主破相有疾陽不守於四凶陽者陽刃也寅申巳亥為四凶之宫惟辰戌丑未四宫値之偏重也狗獨嫌於五七天狗星嫌居五七之地在夫妻尅夫妻在男女尅子女不尅則亦如途人耳産星用二此星遇之男主血光女主産厄犯重者凶輕者亦有血氣之疾帝城則一帝城垣城也為貴人之地忌凶煞居之貴人遷變此二星諸宫遇之則能伏煞當各論其遷變必論陰陽也祿神恊吉禄神者甲木孛兮乙水星丙計丁羅是也作生星則吉作尅星則凶用之終不吉也舊本云催官恊吉生氣宜身太陰居于生氣上者主一生無險難事其例有二月後第三位是也考通書合乃生月後此法可用於小兒金匱宜室子午日子丑未日寅寅申日辰卯酉日午辰戌日申巳亥日戌金匱星主妻財宜居二七位吉田宅輕偏宜妻宫坐之得妻之財刼不利於少年刼在命主少年多滯老後主有權柄刑主妨於就晦本宫之星不喜與四柱内相刑為就晦之禍太重也坐馬忌衝寅午戌馬居申之類如限星坐馬上忌年衝之大凶凡命吉星坐馬上主機狡乖劣有格者主五馬之貴如凶星破之諸星不來如五馬之害己也有祿馬壓之則吉子妨華盖華盖男女宫忌之身命亦不宜居之六合在全六合者子與丑合之類此六合全不空方為合互垣宜制互垣之星看其吉凶相制隨處斷之白羊立業鎮水同宫金牛處命羅土相從閑處則吉要處則凶如戌上安命水土偕行當命限上則欲作用酉宫安命羅土同居亦然若刃水刃火最為利害忌之兎逐鷄窠龍居犬穴馬馳䑕道牛奔羊結凶可為祥吉可為孽此言卯酉辰戌子午丑未二宫之星吉凶如何用别輕重反吉為凶反凶為吉變化不測論造化異于常人當口傳心授兎逐雞窠火入金鄕龍居犬穴金入火位馬馳䑕道移乾就濕牛奔羊結土鎮月宫借宫則論煞巳亥二宫坐命以寅申水木借用寅忌土計申忌土金四餘則論絕金木水火土絶處如以孛羅計作用神行事吉凶立驗如神金因絶於寅而火生於寅金生在巳火臨官己金敗午火旺午故金無餘氣金主殺天道好生故無餘氣且水有孛火有羅木有炁土有計天地閒水土木多火燃處即多獨金雖神仙燒煉亦無有也宵中火金凡夜生人火星看坐何宫論空實則大驗自未至子為陰自丑至午為陽晝逢太陽同上丑至午為陽此二章論其空實之理也二德相拱天德月德三方拱者至吉縱然凶終有救解無大害歲在箕度冬至之日太陽在箕七八九度便作下年例之看前後月之大小便知其箕之幾度若上月大則牛一度上月小則後一度如二月俱小則是九度身値獨處太陰只要獨行最忌刑衝則吉凶在目前淫樂亡敗有之用在七强用者限元也起處要臨七强宫方為得地隨其制化衝處不起四殿拱處伏了諸星皆實行則禍福於此最𦂳可貴可富可貧可賤空處不生生我之星空了諸星不在取福反取禍其中凶能致吉吉反為凶身元極關於命主四正刑切於三方雖三方照主吉亦主凶若四柱與命盤中相刑則𦂳切致禍矣禍福先後歲籍晦明命之死生或應前或應後三年者直年太歲與人之生時關係或因衝戰或三方吊起以論吉凶財帛積聚水計論量凡命中水計同處或命主或財關係可致富己宫立命之人水計同行可富可貴可壽皆在衝尅中之類量其或水木水炁水日月水金之類福自為福殃處為殃此承上文財帛積聚之説言之福自福禍自禍難用推除此言極當驀駕立命狡性戰爭如子生人亥宫命謂之驀駕其人多狡猾好與人爭鬬生曜逢空反不為祥坐命處忽有生星至本宫被魁鬼空了反不為吉餘宫减半杓宜指禄斗杓指祿者驟富合格令者大貴人也又須論生尅則應自生月起至生時是也非甲祿在寅者乃甲人用辛為官辛祿居酉是也財宜制尅財星起處要尅他宫星必主富值空反不為祥尅他不空為上吉也夾位喜母有用處有母曜在内拱夾者妙如身坐處有吉星拱夾者亦有變化之妙也拱喜時徳時者生時也德者生年也年時拱官命財者妙拱凶者主為禍不輕三空四空變化不同三空者魁鬼流魁也四空者日月時斗空也與本年者輾轉相關囬衝順衝貧富難容年月日時相關衝實衝虚順衝者星隨而去之老人忌衝空之位雖吉處他宫亦多災厄衝則輕也且如卯上値酉衝行卯年來則云回衝也五常為吉二符忌凶官福田財身宫主星皆作吉星論生年病符死符到處惡星坐其上限又逢之作惡星用主大凶寅卯辰位巳丑相關巳午未人申辰欠安申酉戌申亥未翩翻亥子丑宫寅戌最難寅卯辰人水土之星限見生則為吉惟夫妻兄弟之中有妨年月日時亦有相關己午未生人或坐命處金水二星申酉戌上木月二星亥子丑上木火二星命限見之尅與上同坐星生星尅制非凡水木金水木月木火雖是生星但生年與日時命限逢之富自富貴自貴亦須有尅星宫亂合宫分偏正逐兎攀龍超凡入聖炁與羅合木與日合凡星坐命宫分偏正淺深驗生時之尅制刻數則行限便知吉凶前後如行卯限先入乎辰則吉凶可知以金伐木猴來則變作權人仇土打蛇猪見乃靑雲得路土埋雙女己上行限路遇此猪乃亥星正管限則有變化之理平歩可致公卿若不空不衝大凶亥宫命是也金騎入馬遇水則轉生木土埋雙女遇木則制其難要不外乎生尅制化之理耳直財入庫富有千金直祿入官位居極品更有田星拱之足祿如財帛星入庫水土辰金丑木未火戌如甲生人祿在寅更得命限好大富宫主又作祿神如祿宫為官宫若受拱為大貴魁臨學館主冠世之文章馬入身元乃離鄕之傑士文冠臨於學堂之上者生平有文學魁世以文得名聲馬與身主㑹離祖成名身性無定女人切忌衆星靜處不作僧徒翻作貧人五星致凶不露暴流自微得著五星皆靜而不相生者一生不能發越必下等人也凶人欲行上人之志立身後欠善終一時暴發君臣慶㑹凡人卽拜公卿命毋犯衝當路卽為寒士年月日時同處為實地平人即為公卿生我之星謂之母曜被衝壊了在限上不吉或於他處亦然終作貧寒之士也詳究之命立歲主配偶犯重命立破鄕生意濛濛如子年生人立命子上則妻必犯重或生尅逢生亦主富貴子生人立命午則為歲破必然自權自立限行遇吉星生之則亦富貴若又子時生則管限中亦能反覆其吉凶也雖吉則七旬上必亡子上有生星亦吉重子立命土木七宫少者怙恃長則何庸寅宫巳水亥日無功此承上文而言為十二宫綱領有𦂳之吉凶人心自解凶為吉吉為凶盡在此章重卯酉籍孤苦貧窮若遇日辰和氣溶溶與上文相類以六十甲子中詳推之卯酉為二人之門故為而作例然十二宫亦有管攝須以吉凶辰論之可以意㑹在卯酉日辰上見之福官入宫須分彼此若作令神富貴無比不令不尅亦可為喜大凡官福星入命者分其生尅若能助其光輝者大吉又作令神則全美星光輝相助若不是令星旣無尅制則亦為吉終是福官之星可喜日取陽曜夜取光芒殿居四實官坐廟廊若處飛馬日奔夜忙如命係日中生衆星入命雖有尅制亦分彼此夜生人有光之星入命為通機在實地當成名若居飛馬奔走不閑飛馬者以日時起之即申子辰馬在寅之類陰忌計土不分南北已午未申限元無力若居酉辰如虎而翼太陰若與土計同宫惟辰酉二宫相生他宫同處皆不為美限若又行巳午未申之地則全然作凶論主夭折若土計坐處値空則不相妨謂土計値空也其不凶可知若己午未申之地不空其凶不可言大格五經大格者大全格也五經者曰獨歩摘金歌難經總斷論碎金也其閒𤣥妙之語摘金難經獨歩總論雖少異於人反説之不知其義者可于大格中例推之然奴貌相宫何異于人非口訣安知其義凶神吉神諸凶煞諸喜神不可不考當考其直年為上又有時候不可輕斷令星毋曜實處為隣令星者春木夏火之類毋曜者如子宫命土主火為母星之類如星得令相關命主相宜同處者為上格之命限元中亦看可推得令之意金木水土寅亥巳申順則富貴刑則天貧四星於四刑之中相有相關神妙莫測如亥中有水巳中有木寅中有水申中有木如遇土金犯之致富致貴凡人皆以寅亥不宜見金豈知其中有生水之妙巳中見土有生金之義若見刑尅則凶忽遇流年致刑尅亦不為祥遇刑遇衝遇天空則為妙處論也留心考究傳宜得人凡五星須當留心細推空亡刑尅虚實方得其驗如不驗必其生時之差琴堂易覽註解琴堂五星先賢所秘吉凶匪同常星有異琴堂之名乃昔有琴堂和尚傳授吕逸齋逸齋受之唐一行禪師盖因和尚盛行於世故號之琴堂所論吉凶禍福與加盤耶律躔度子平法諸家五星取用不同凶能致吉吉處反凶有變異是以言常星有異先推命與身次看生尅制生尅旣巳明三方并吊起先看命宫受生受尅命主起去如何次看太陰落於何處在强在弱然後看三方對照六命相生相尅更看田財官福妻男受生者便可言吉受尅受空以不吉㫁之入垣入局廟互垣合格類子細與推詳其中多妙義五星入垣其貴可知互垣合格多有深奥入垣者可考十六兩金合格者當詳七十二格於中妙趣多矣庸術能知之可羨更可喜一天星與辰分明皆語汝學者宜審思非難亦非易觀星先看命和身次察盤中各位星最是限元為第一吉凶惟與命同論五行相生最喜順行順則有吉退則無情且如木生火火在前木在後順行而相生如木退度則木火無相生之義故為無情五行順克為禍太疾若逢制化稍减其力五星相尅者順行為禍太速且如金尅木如木在前金在後是也若遇火羅三方對照金星則為制煞若遇水孛則為化煞為禍稍輕反能致吉魁從年生掌握一世遇之全生吉凶倒置虚實要明後詳次第凶宿値之反富反貴此星於當生年上起管一生事虚者四柱中所無實者四柱中所有符憑月起半空之理二十五年吉凶畏喜此星從月上起自少年管至二十五歲半空也吉凶變易凶致吉吉反凶權乃日中推𤣥妙罕能知半管五十載餘星各有期此星從日上起自二十六歳管至五十歲亦半空虚實與前同印者時所攝五十至末年空空之妙訣深逺不可言此言是時上主一生事而半空也其星此處看是何胎元如甲子胎甲為陽斗在陽位乙丑胎乙為陰斗在陰位也坐身命者為人欠實而不誠也鬼曜卽天空與前星亦同半掌一生事吉凶安止容天空即當生天空有流年天空管一生之事却半空也以上六星皆看四柱有無有則為實無則為虚以斷其吉凶若吉星遇此四柱内無塡則變吉為凶尅星見此則易禍為福天乙貴人星値之能化煞拱夾命與身限到渾早發此星坐處多致吉見凶亦能化伏而不為大咎加拱身命限者大吉也天祿是崇勲如臨命與身更坐官宫中還須是貴人此星安身生命者主貴更入官宫主大貴所謂真禄居官位居極品是也却不宜䧟於奴僕之宫坐之主一生勞碌喜自庖厨歲德入年干命身深喜居生平鮮難厄入限中貴推德乃年干取臨命坐身吉一生少難可伏煞時籍是垣城命身惟欲臨坐之能致貴當考生尅星此星有三名時籍垣城帝座安命立身者主貴然此又當看身命限元若何方可言之也金轝主妻財祿前三位該此星坐妻宫專主得妻財餘宫非也生氣臨身吉一世永無災當生月後第三宫是如與身星同處主一生少難無大災也正祿與斗杓二星一處來富貴自天然此格誠善哉此言斗杓指祿主大富貴如杓不指祿但坐身命官宫亦貴也斗杓者卽用月常加戌時上見破軍是也自生月上起戌順數至本生時是斗杓也正祿者即甲用辛為官辛祿居酉非十干享祿主也天馬與地驛二星專致吉身命及官宫値之有祿秩此二星坐身命官宫其貴可知如坐主星者亦貴其驗如神不可不考如其不吉亦有俸祿之人有名播世試之累驗年月日時云四柱四柱有星名四喜四星拱在髙强宫縱遇相衝尅不起四喜即四殿又名四善拱身命限者皆吉有凶不能致禍拱尅處則尅不起故四善拱伏則不能動也宜詳口訣天喜紅鸞二吉星常居四正喜臨身若臨命元并限度與之進喜及添榮此二星常在四正之位在命主有喜事在財帛主得財在兄弟主兄弟有喜或朋友相舉而得名利在財宅主父母有喜或増田宅在官祿為官者有陞文書之喜照身者家中進人口與當生㑹極好文宿有三星名利以文成加臨學館上天下播其名文宿乃文魁次魁小魁坐身命官禄宫與學館同處乃文人才子名揚天下也巳亥須借官官命難一般申宫須借木寅宫作水看己上坐命行申限水為官星是以借木為官星亥上坐命行寅限亦以木為官星故假水為官以此斷之吉凶無有不驗專以官星却又難以限元論三合有天馬値之有吉祥安身并處命莫不貴榮昌天馬者即火計水木土之類此星為煞稍輕為福甚大能致吉盖化為天馬故也五星居絶地絶地豈能生權將餘曜論非貧擬作僧金絶于寅木絶于申火絶於亥旣自居於絶地豈能生他人耶却將餘星斷其生尅此等命非貧即為僧道為煞不甚凶大煞飛亷最主有權尅妻害子為煞至專即正戌二巳之類若在官宫主有權在妻宫尅妻在男女宫尅男女在田宅不利父母在兄弟而少兄弟作尅星為禍太重的煞淫神偏惟忌陰男逢汨沒女逄多淫一名淫神一名汨沒在命者淫佚作事顚倒女命深忌犯之刼煞一星坐命安身少年不利多主邅迍此星坐命安身不利主疾病有權煞亡神立身命坐斯神作事反覆多學少成此星安身命者似有如無作事多學少成一生不濟事驛馬之星忌親命身若逢戰破日夜馳奔有星居上尅而順行身命㑹之機狡無情寅午戌馬居申之類坐身命者動靜不安與身同行更限元不吉者乃離鄕之士若有星辰坐其上遇尅去之更有飛馬時上惟安身立命日夜奔馳辛苦命限好者却勞碌而成家刃星作直致凶甚惡若是尅星匪亡亦厄刃者乃祿前一位是也如刃宫主星入作直頭星者為禍大惡重者必死矣星名天狗主人無後五七遇之妻子安有此星忌入妻男宫在妻尅妻在子尅子其應如神桃花煞主星女命忌居臨命身如遇此必定亂人倫乃寅午戌兎從茅裡出之類若坐命安身男好酒色女必淫佚更行限値尅者必因花酒而喪身又當考獨歩中金水孛如何此言厯厯皆驗看女命宜細詳之凶曜號風騰命身不喜迎夭厄更同處家破又遭刑命身在上更行限必主破敗更與夭厄同行家計一空為尅星至惡重者必主徒刑不然法死也衝駕衝驀二曜孤尅坐命安身凶能致吉衝者當生歲破也驀者當生歲後一位也立命安身者主孤獨奸狡刑尅詳聚論中則皎然方知其美孤神寡宿四柱所屬凡人遇之偏主孤獨此二星主孤尅畏於三刑之地妻子宫不宜見亦必有損男女四柱地支與盤相刑命身限遇其刑匪輕四柱地支與盤圖中相刑者身命限行至上或流年相刑者其禍太重必受刑憲也刑者即寅刑巳已刑申之類産星有類例惟主血光事若也作煞星女受産厄死此星為煞星者方忌之男主血光刑害女主産厄重者必死八煞宫主號難星化為煞宿來相侵若是遷移來互換死於道旅受遭貧疾厄宫主星為禍最重與遷移互換重者亡于道路輕則在外受貧直頭星與天妖神二星為煞甚難論化作煞星來尅破十分為禍亦非輕此二星太惡為十分凶平常亦不吉子丑立命土為主星寅亥相見為殃豈輕寅亥命宫辰酉相逄若無制化其凶愈凶卯戌二局火作宫元若見巳申凶不可言辰酉宫中太白所止卯戌飛來無救則死巳申之屬土屬辰宿子丑為殃非亡則哭午未之宫君后之京鎭計相犯非亡必刑以上十二宫為禍不相容若能反其吉非尅必受空五星并二曜生星深喜到如是値空尅安能言吉兆推究四餘氣其中多妙理生尅與星同空空却别議生尅制化俱已明還推坐命尅和生一天星宿盤中取學者留心子細評星學大成卷二十四
