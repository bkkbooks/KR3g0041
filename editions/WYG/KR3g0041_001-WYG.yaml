body:
  text: 星學大成卷一明萬民英撰星曜吉凶圖例右周天都計三百六十五度二十分五十秒分布十二宫惟子午兩宫每宫計三十度四十三分八十秒其餘十宫每宫計三十度四十三分七十九秒歲必三百六十五日零三時而交春是合周天之度月必三十日零五時二刻而交節是合一宫之度凡常氣晨昏定刻自秋分至春分皆在卯酉自清明至白露皆在寅戌太陽出入定刻自小寒至芒種小暑至大雪皆在卯酉惟冬至出辰入申夏至出寅入戌氣候有盈虚愆忒而成月令太陽有出入長短而成歲功固仰觀俯察所當知亦出作入息所必考也夫星辰之入垣局如仕宦之在廟堂上格之命須得星歸垣局則官職顯要歴三台八座翰林之榮命格雖高而星不入局則雖有禄位終為中品下品之貴天盤之法順數天左旋也人之立命在十二宫有不同而以天盤之卯加之則同經云天盤轉出地盤上卯上分明是命宫是也耶律十二宫發明望斗經東升西没新註其説已詳矣時學不知此圖只以子宫為例而槩以十二宫者有之又有知其卯位自加寅辰疊加已丑三位加子午四正加亥未五位加申戌六位加酉對衝加亦但得其迹而未知其所以也地盤之法逆數日月右轉也地盤不動故十二宫立命同此一通關也經云縱漏關横漏關是已時學但知子關卯丑關寅辰關亥巳關戌午關酉未關申而不知其以一卯關子逆數之則通關所以然之理不待説而自明矣人盤之法重虚實者以其四柱欲與天星相聨續琴堂之所重者此也假如壬申丁未戊戌甲寅生人則星盤中未申戌寅填實宜歲令身命官福居之戌卯辰子空虚宜難星忌曜居之若吉空則凶凶空則吉吉實則吉凶實則凶也餘倣此推定十二宫神二十八宿分野所屬角亢秤宫辰屬鄭氐房心卯蝎宋遊尾箕人馬燕寅位斗牛磨蝎丑吳流女虚危瓶齊子地室壁雙魚亥衛州奎婁白羊魯國戌胃昴畢酉趙金牛觜參隂陽申晉地井鬼巨蟹未秦州柳星張周獅子午翼軫雙女楚已頭定十二宫次舍析木原來本在寅大火在卯壽星辰鶉尾在已鶉火午鶉首在未實沈申大梁居酉降婁戌娵訾在亥定其真𤣥枵在子星紀丑十二宫中仔細尋定十一曜周天行度之數木星大約一年一宫十二年一周天卯年卯上起故名之曰歲火星大約兩月一宫二年一周天土星大約一年一宿二十八年一周天金水星一月一宫不離太陽前後一年一周天炁曜二十九年一周天孛曜九年一周天羅計十八年一周天約太陽行度法歌我朝立法多在虚一度立春立春虚四度雨水危十求驚蟄室九度春分壁六遊清明奎十一榖雨婁九留立夏胃十一小滿昴十收芒種畢十四夏至井一頭小暑井十八大暑井初秋立秋柳十二處暑張十週白露翼五度秋分排軫遊寒露軫十八霜降角十二立冬氐五度小雪房五時大雪尾火九冬至箕六依小寒斗十三大寒牛五遲約太隂行度法歌欲識太隂行度時正月之節起於危一日出行十三度五日兩宫次第移二奎三胃四從畢五井六柳張居七八月翼宿以為初龍角季秋任遊歴十月房宿作元辰建子箕星細尋覓丑月牽牛切要知周天之度無差忒此是太隂行度方人命身宫從此得約二十八宿度數歌十八正相室三五居東壁十七半奎闌十三婁不覓胃言十四半十一昴全算二八畢躔加半觜河邊燦參九在其方三十遇井郎一増雙是鬼二七柳花芳七星夜還走張翼各十九軫宿十八半十三角當首亢九日光輝十六氐相宜房心各五度十七尾南飛箕輝照十方二十四斗郎牽牛七夕過十一半女娘虚星無十度危星十六當約二十八宿過宫度數歌氐一過卯尾三寅斗三度兮丑中陳女至一度方過子危十二度亥中陳奎一入戌胃三酉畢六度兮移過申井八過未柳三午張十四巳軫九辰以上度數特其槩耳其詳具於三辰通載定十二月寅時訣歌正九五更二㸃徹二八五更四㸃歇三七平光是寅時四六日出寅無别五月日高三丈地十月十二四更二仲冬纔到四更初便是寅時為君記定太陽出沒法歌正九出乙入庚方二八出兎入鷄腸三七發甲入辛地四六生寅入犬藏五月生艮歸乾上仲冬出巽没坤方惟有十與十二月出辰入申仔細詳十干變曜所以然之理無可稽考余故作此圖以發明之甲乙丙丁戊己庚辛壬癸專配火孛木金土月水炁計羅而太陽不與者葢十曜皆由陽君所授分配十干而化為禄一定之序也以下凡化福者皆其食神化䕃者皆其偏財化貴者皆其六合化刑者皆其七煞化囚者皆其梟印化暗者五陽干皆是陽刄五隂干皆是傷官化耗者五陽干皆是傷官五隂干皆是正財化印者五陽干皆是正官五隂干皆是正印化權者五陽干皆是正印五隂干皆是比肩夫傷官陽刃俱為之耗正官正印俱為之印此理固然而五隂干以正財為耗以比肩為權何也葢五隂柔順能濟五行之剛而不能尅五行之剛今見所尅用力有損故謂之耗五隂雖有印綬相生隂柔不能主事故賴陽干比助而後有力故謂之權此天地自然之道隂陽不易之理也豈易知哉十干變曜所屬凡當年之變為天元禄者即其星之管官禄也變為暗者屬相貌變為福者屬財帛福德遷移變為耗者屬兄弟變為䕃者屬妻妾變為貴者屬男女變為刑者屬奴僕變為䕃者屬田宅變為囚者屬疾厄變為權者屬命宫此又變曜之所屬也故名為管庫星云論天元禄主星與官禄並詳凡祿主星一宜在七強宫二喜照命三要順行四要廟旺五要在當生年納音長生臨官帝旺宫以上並得用主大富貴如在五弱宫或入四煞位更行留逆故為福不純主人淹滯雖不在五弱臨在七強亦初中年不得發福矣詩曰禄主當生入命宫田財旺氣大亨通官星更在高強位年少聲名達聖聰天福星與福德財帛遷移同推凡福財星宜照福德為上身命次之男女宫見之為上吉緣此宫與福德相對故為上喜在廟旺兼行順段為福如在陷弱宫及伏逆留段為福淺更宜消詳身命根本方可以輕重斷之大凡在財帛在七強與身命主同宫主大富或有惡星同宫更行留逆主人一生財帛成敗聚散不常詩曰身宫及命福星臨廟旺高強享福深若遇陷宫并惡曜榮華消鑠禍難禁天印星與田宅並詳此星喜居田宅宫及七強入廟生旺之地主多業產如留逆無氣更在閒極陷地俱不得祖業主多破敗田宅宫别有吉星臨照亦自能成立如田宅地更是忌星相犯加以命弱失陷一生並無田宅詩曰生來須有皇恩命官禄高強位䕃星若遇科名科甲貴因兹食祿播王庭天貴星與男女並詳此星同男女之象居七強順行樂廟旺宫及當生年貴人馬上更無惡曜刑尅主生貴子如在遷移奴僕兄弟宫主過房或在七強被惡曜刑破多主傷尅或四煞得用多男無女男女宫星弱主子不得力男女宫星強主一子力二者強子孫衆多詩曰身遇高強及印權命宫三合更相聨貴多刑少居官禄職位榮華祿更遷天䕃星與妻妾同推此星妻宫星喜入生旺得妻財入死絶主多病順行則吉逆行則凶七強宫見之相宜五弱宫不利妻星居遷移主外婚在奴僕不宜正婚居四正宫主有妻財惡星不犯主夫妻偕老或與惡星同躔妻宫又犯空又妻宫主星闘必再婚相尅詩曰䕃星逢著有操持須是高強廟旺時福祿印權并貴㑹官榮極品耀天墀天權星與命宫同天權照命及身若入廟順行主得貴人扶持更與太陽福禄星同必大權貴詩曰權星遇貴在高強縱有刑囚亦不妨更遇命宫高格局定須祿位作朝郎天囚星與疾厄同此星怕入七強生旺及在逆段或照命或臨身並不相宜若是紫炁木星為囚星然其性本善不可便以囚忌為嫌但戊癸人見之減力終不為禍恰齋云囚星大槩不可拘泥如汪安撫丙戌生火星對照命宫葛樞相壬申生水星守命宫二公曾未見其為囚也詩曰天囚若在四刑星膿血傷殘命夭終若是壽星臨照著也須為福不為凶天刑星與奴僕同此星在閑極宫無惡星相犯奴僕皆得力或在七強及得地主僕從奸狡更有凶惡加宫小人無故相侵犯凌辱此星宜弱不宜強宜順不宜逆若是命主星又不妨無自刑之理故也詩曰天刑若陷最為惡身命田宅怕逢著限臨必主身不全黥面文身方免却天耗星與兄弟同此星耗財之星故以兄弟當之忌在田財二宫别宫無甚害詩曰天耗之星不可逢生來財帛化為空若臨貴地并權禄尚自區區待限通天暗星與相貌同此星最忌在官宫及官魁文星身命逢之皆無發達詩曰富貴因何福不榮只縁命内暗傷星高強皆是為凶惡入陷孤高患自輕變曜歌訣禄暗福耗䕃貴刑印囚權火孛木金土月水炁計羅六吉夾四凶毎三吉夾二凶也假如甲生人欲推何星化貴則念至貴是第六字又念火孛至月是第六字便知月化貴也若乙生人欲推何星化福則火不要念只念孛起至金止又念禄起至福止便知金化福也餘依此推七政旺宫星度歌七政各得居強所君看分明乘旺處日據白羊十九間月入金牛第三度土在天秤二十一火居磨蝎四與七水居女上三五中金占雙魚必當室不離七與十三前據此求之始為的木經巨蟹初入鬼此生所舉多如意但於旺處逢一星斷然莫作常人視論七政旺宫太陽躔婁宿八度是戌宫十九度也太陽躔胃宿六度是酉宫三度土躔亢宿六度是辰宫二十一度也火躔斗十八度并二十一度是丑宫四度與七度也水躔翼八度并十度是巳宫三度與五度也金在室七度并十三度屬亥宫木在鬼初度并十三度屬未宫論廟旺尅忌歌星辰本宫為廟堂生我之宫為樂鄉我生之宫為旺度福與禍兮堪審詳星尅其宫名入制其星若忌號刑傷本元星主居其位貧乏之徒可較量此宫度者號樂旺廟要與太歲相攝若處刑尅之中雖樂旺廟而無用若處帝旺駕勲朝垣入局之上者更不以刑尅為忌雖在樂旺廟而汨没凶敗休囚衝驀之宫亦不可用也星辰妙度歌又為貴格辛待制太陽東出度經房腰下須懸金印黄玉兎始生心宿度桓圭衮冕侍君王鎮星若也度躔氐旌表門閭衣錦衣熒惑正行心宿度高牙大纛擁旌旗首曜一星氐宿度上將封侯十萬户尾星房宿最為佳沙漠揚威兼宰輔辰星偏好度經箕丹桂高攀第一枝熒惑之星躔尾宿禹門一跳過天池彗星寅位必躔箕侍宸獻納古今稀金星若躔箕宿度功葢諸侯披錦衣太隂最喜度牽牛極品功勲世罕儔歲星宿躔南斗㑹論功列爵豈能酬火星行度經南斗間世英雄真國寳太白次度到牽牛朱紫分明應不朽土宿若也居南斗富貴榮華兼壽考天乙如臨南斗方尺璧寸珠未為寳鎮星好度女星居柱石功成鎮帝都日宿正躔虚宿度官居輔弼掌鈞樞太隂好處最宜危男必封侯女后妃天尾度危偏福厚保安皇祚不傾危熒惑歲星居廟室勲臣永鎮昇平日水星度壁福偏濃突出千羣推第一熒惑當生樂廟婁官高職重位分茅計曜若躔奎宿度開邊拓土烈難侔木到奎星須列爵文章錦繡佐王侯太陽旺度奎最便閫外英聲衣錦裘那頡廟宫星度胃佩玉鳴珂朝紫陛太陽遇昴福偏多超羣必作人間瑞計都又喜經躔胃秉鉞分符除僭偽羅㬋若還到昴鄉樊噲霍光真此類炁星最喜躔在觜極品官勲世罕如木孛到參非失位貴持節鉞更無疑火星觜宿福偏洪龍躍天池氣概雄水宿正行參宿度貴居廊廟至三公太隂本廟居秦鬼累世緋衣居顯位金宿經躔於鬼度決定為官服朱紫攙搶東井福偏饒邊塞藩垣任可倚木星最好東井宫官既居高福又隆孛宿若躔於柳度榮昌富貴福無窮羅㬋本廟最宜張出將英聲閫外揚土宿若躔於柳度虹蜺膽氣錦肝腸君日周天廟在星功齊傅説與阿衡水曜正行星宿度經邦論道佐昇平太隂又喜張星度官入中書聲望騰火宿最好來躔翼位助邦家權要職水星到軫是真垣委任股肱扶玉厯太白金星若躔亢輔佐當朝神聖王木星廟度經龍角為官必定佐岩廊首曜一星度龍角六印一時都掌握天乙來歸角亢方萬里台星光爍爍星曜喜宫歌欲識星辰躔廟宫土丑羅寅火卯中金在辰宫計在巳水羅午地好相逢孛星惟向未中取紫炁申宫總一同日月戌方云入廟計都木亥盡亨通更有諸星乘旺方水瓶火丑孛寅當土羅計在卯中旺辰位土宿再榮昌水日巳宫金到午木居未上紫乾揚太隂在酉天尾戌金木之星亥上藏又㸔諸星入樂鄉但尋宫主在何方土星子丑金辰酉未屬太隂午太陽火星卯戌水巳申木星躔到亥兼寅羅㬋午上計都子紫來戌上孛逢辰十二宫中有喜星日寅月亥水辰清土居午上木居未火申羅戌便昌榮更識星辰所好局但尋次舍星何屬太隂太陽與土星子午卯酉為垣局木星辰戌及丑未水火寅申及巳亥羅計卯酉福猶奢孛紫寅申邦國㤗再識星躔廟樂儔日躔奎宿月躔牛水星土亢金胃上火星木氐喜渉游角躔羅宿婁躔計月孛東井南日炁星行此地產公侯列爵功名題史記星曜怒宫歌火燒牛角水漂羊土埋雙女命尋常木打寶瓶須粉碎金騎人馬實恓惶三限之星俱值此終身貧苦走他鄉忽然落陷為灾淺若占強宫見禍殃或在第五并第七刑妻害子細推詳假令命在金牛宫歲星當占寶瓶中第一吉星推木德反遭鞭打性強凶又如命在天秤安便㸔巨蟹甚星辰第一凶星推月孛當生守占反為官吉星為禍凶為福但從宫分測根源星居怒地最堪憂地產姦邪起簒謀木怕𤣥枵金怕卯戌婁遭水被漂流土嫌巳上無飱食火到大梁盡焚灸日居朔日遇羅㬋月在計都同望夕日月二星最忌蝕大抵五星皆惡逆五星留逆最不祥善惡五星皆少力金星不喜躔尾宿榮華太過終受辱土星到軫不為良害義傷廉遭法戮歲星不欲經行女罔法奸邪難制禦火星度昴禍偏多子告父愆臣反主水星最怒奎戌度日月相同非曰怒忽然日月不相同不忠不孝天不䕶羅與日同當朔月簒亂人主興大蘖計都同月在望時速取誅鉏及癰結計都月孛最凶星二者相逢惡怒名紫炁從來同吉慶羅㬋只恐蝕交征大槩廟星皆曰福稍遇凶星皆主辱最𦂳五星明變段廟順俱全享天祿前法星分廟怒宫須知星度在何中廟星在分生賢哲怒在何宫產禍凶論禄勲祿者天元祿甲火乙孛丙屬木丁是金星戊土求己是太隂庚是水辛炁壬計癸羅㬋是也勲者甲在寅乙在卯丙戊在巳丁巳在午庚在申辛在酉壬在亥癸在子星入垣廟即為崇論玉堂玉堂者天乙貴人也晝貴人詩甲戊庚兮是牛鄉乙己䑕兮丙猪方丁猪壬癸居蛇位穴辛逢馬貴為陽夜貴人詩甲戊庚兮居羊地乙己在猴丙丁雞辛遇虎穴壬癸兎此是夜中貴人梯按此晝夜貴人依臺厯推載其通書所載隂陽貴人乃是冬至後用陽貴夏至後用隂貴其法以陽貴出於先天之坤順數隂貴出于後天之坤逆數天干之德未足為貴而干德之合氣乃貴爾雲間儲先生曰至靜而能制羣動至尊而能鎮虚浮以其有坤黄中通理乃為貴人之徳三車一覽五行精紀論貴又不同詩曰天乙貴人衆所欽命宫全帶福彌深蜚聲騰實人爭慕博雅該通貫古今女命休須帶貴人空亡驛馬不堪聞五行更忌逢生旺偏愛休囚死絶神論文星詩甲羅乙計丙戊金丁火己炁庚木星辛人見土壬逢日癸人見月定昌榮文星者五行相濟而成文也甲見羅則通明乙見計己見炁則疏通丙見金則陶鎔丁見火則光明戊見金辛見上則秀氣壬見日癸見月則暉光庚見木則斵削此皆相濟而成文獨不以水孛為文者以其無質也論魁星詩甲用太隂乙太陽丙羅丁計戊炎方己金庚水辛逢孛壬炁癸水號魁光魁者隂陽和合相生而成魁獨不以土為魁者以土愚濁也論文昌甲乙巳午報君知丙戊申宫丁巳鷄庚猪辛戌壬逢虎癸人見兎入雲梯文昌星者乃天干生地支所藏之人元也甲生丙在巳乙生丁在午丙生戊戊生庚在申丁生己己生辛在酉庚生壬在亥壬生甲在寅癸生乙在卯獨辛不以生而以戌為文昌戌在辛之方位以其有從魁河魁夾之也子丑辰未不與者何也葢文昌欲顯而不欲隱子丑地下辰未庫也定科名星甲乙生人木向榮丙丁火宿實通亨戊巳土星壬癸水庚辛金宿定科名科名十干配天元廟旺之時第一仙若居陷沒及留逆發薦連連不步蟾此上謂之十干科名星若在七強順段旺廟則名位高也若在五弱及留逆段雖中科甲名次低也定科甲星科甲文星對命宫逆留弱惡必難逢廟旺七強行順段狀元高第必登龍假令人馬宫為命與隂陽宫相對即以水星為科甲星在七強順段入廟必主高甲在五弱留逆雖貴甲第必低論官星甲炁乙水是官星丙羅丁計戊孛成己火庚金辛見木壬隂癸土定功名官星者乃十干官星之禄星琴堂謂對禄是也甲以辛為官辛以炁為祿則甲人用炁為官星十干皆以此例獨陽君不與者以其官君之所授也論印星甲木乙日丙是熒丁月戊土己羅辰庚金辛計壬逢水癸人見孛是印星印星者五行相符合而為印甲以木丙以火戊土庚金壬水是也五隂干取日月羅計孛亦以相生而相類然十一曜獨炁不與者以其善柔而非羅計孛之比焉論催官星甲金乙水丙日宣丁羅戊木見為歡己炁庚孛辛土宿壬月癸計是催官催官之星主遷官進職也大扺此星與祿主相為催尅如甲人以火為祿而見金則催乙人以孛為祿而見水則催丙人以木為禄而見日則催丁人以金為禄而見羅則催是也十一曜獨火不與者以其有太陽在焉論祿神甲兼木孛乙水星丙計丁羅戊土居己火庚金辛紫炁壬日癸月是祿神禄神者正祿神遇之主食正祿俸十一曜俱全而甲獨兼木孛者以其陽干之首也論喜神甲羅乙計丙炁星丁水戊月是喜神己土庚金辛見水壬孛癸火最堪親人命月逆行喜神逆祿十曜司祿而順布喜神隨月以逆承故祿之序火孛木金土月水炁計羅而喜神之序羅計炁水月土金木孛火是也論天厨甲乙巳午丙在子丁戊己午己申儲庚落寅中辛尋午壬厨居酉癸居猪天厨祿名食神祿指南云假如甲生人逢巳甲食丙丙祿在巳乙生人逢午乙食丁丁祿居午是也歌云天厨一祿少人知識時須是泄天機若在命宫為福𦂳福德遷移又次之男人遇此多財旺交入中年好爵縻女命逢之主封號此是天上麒麟兒八宫宫主號天厨宫主星高強最殊更得吉星同在命管取潭潭府中居此星陷了人無壽若在高強意自如男兒坐命遭逢此真是人間大丈夫論天嗣甲月乙水丙炁餘丁計戊羅己火居庚孛辛木壬金宿癸人見土是天嗣六合為夫婦有夫婦而後有男女人之父母凡祿之餘者孰不與其子故甲人祿是火己人祿是月甲人以妻之祿月與子名之曰天嗣故欲推天嗣者即其變曜中化貴者是也論歲殿只㸔他命天元干神宫主是且如丙辰生人從辰上起甲數至午見丙便是歲殿也餘倣此須是福主權財命主身主星官星科甲科名居其上方曰登殿第一要身命臨之次則福祿主臨之入此格局皆貴命也若殿中無星有身命二主日月福祿主星祿馬官魁拱之尤主大貴茍被飛星遷其上兼囚煞加臨則曰客曜臨朝飛星破殿不為福也如有主星處其上又為煞星客曜混雜刑尅縱主功名富貴不惟艱辛亦難久享夫歲殿者乃天上太歲之尊人命十干之首言曜臨之疇非富貴凶曜臨之必皆貧賤殿者猶天子之御殿也有金馬玉堂之􅃉龍池鳯陛之高警蹕森列威儀整肅非榮華顯達之士莫能至其上也詩曰主星入殿福非常客曜加囚必主殃福祿官魁如不陷拖青紆紫列朝堂論歲駕只看他命支神宫主是也若是子年生子宫便是駕主星居其上則曰臨駕第一要身命主第二要日月宫第三要福星祿主大貴如駕上無星得身命日月福祿主官魁祿馬拱之亦主富貴若飛星遷其上則曰客曜臨朝飛星破駕乃為灾凶縱有主星臨之復為飛星雜處囚煞加臨雖見祿亦為磨難夫駕者乃太歲之位歲君所臨之地茍非富貴榮華之人孰能居其上而享其福也詩曰客曜臨朝第一凶飛星破祿亦皆同若還囚煞加身命假使為官是䕃封論地爵五言鼠猴元是土猪羊火裏生馬牛均下水逢兎炁孤神虎蛇皆屬木鷄犬便逢金龍人惟見孛為爵必官清爵者地元爵也自年支中出也遇之進爵除拜最要官福身命為之又喜在高強惡居陷地論紅鸞天喜紅鸞子年加卯逆數天喜子年加酉逆數此星主夫妻喜事若限坐其上主有喜事動二者每毎相對子紅鸞則午是天喜卯紅鸞則酉是天喜也論天德月德天德子年加酉順數月德子年加巳順數天月德二星乃是三合若坐命主男女大貴又名壓煞星吉論解神解神一年有二乃天解地解是也天解每從辰上起子年挨宫順輪值本年歲君即是地解以子丑年在未寅卯年在申辰巳年在酉午未年在戌申酉年在亥戌亥年在午只居六隂之地不到陽宫此二神能解一切凶能興一切善化凶作吉之曜也論赦文以上俱依臺厯吉神次序赦文乃命之父母星假如土為命主飛坐巳土失地以火為命母在戌而戌為赦文得火飛來生我者是也以金生水土生金木生火水生木為例唐符祿前八位是國印祿前九位是二星守照身命為奇論福星貴人歌甲丙相邀入虎鄉更逢鼠穴最高強戊猴己未丁宜亥乙癸逢牛福祿昌庚趂馬頭辛到巳壬騎龍背喜非常此為有福文星貴遇者應須被寵光詩云福星之貴與天官時日如逢一様㸔更遇祿神同守占高攀月桂又何難論官星貴人歌甲愛金鷄乙愛猴丁猪丙䑕巳寅頭戊尋玉兎庚壬馬辛癸逢蛇官未休此為六甲官星貴士人談笑取公侯如甲以辛為官辛祿在酉是也詩云十干官貴妙難言更遇文星太極神少壯榮華登仕位安邦鎮國展經綸論天德貴人歌正丁二坤宫三壬四辛同五乾六甲上七癸八寅同九丙十居乙子巽丑庚中詩云天德元來大吉昌若臨時日最為良修文必定登科甲庶俗經營事事強天德貴人罕遇之若臨限運最為奇成家立業皆緣此富貴之中細細推論月德貴人寅午戌月德在丙申子辰月德在壬亥卯未月德在甲巳酉丑月德在庚其法從寅上起丙甲壬庚逐月順數周而復始詩云人命若還逢月德百事所為多利益士農工賈各相宜兄弟妻兒無破尅天月二德若重逢貴比汾陽富石崇生下足知承祖䕃不然年少歩蟾宫論月合寅午戌月在辛申子辰月在丁亥卯未月在己巳酉丑月在乙從寅上起辛巳丁乙逐位順數周而復始詩云命裏若還逢月合須是當生無駁雜更兼官貴兩加臨名姓定教題鴈塔論月空寅午戌月在壬申子辰月在丙亥卯未月在庚巳酉丑月在甲從寅上起壬庚丙甲逐位順數周而復始月空之人亦罕逢那堪官貴在其中金鱗豈是池中物不日天書下九重星學大成卷一
