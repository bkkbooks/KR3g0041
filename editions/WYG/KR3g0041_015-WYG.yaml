body:
  text: 星學大成卷十五明萬民英撰三辰通載五星熒惑火星總龜筭法置積日數加二百二十二日以七百六十九日九十二分九十六秒為伏見留退一終之數除之不滿者為餘日看有多少下太陽中定星加一周天以餘日數去之看在何段便知定度所在晨伏七十一日行五十一度去日二十度晨見東方順行三百八十日行六百十四度九十分留八日不行晨逆三十日九十八分四十八秒行八度五十五分六十八秒夕逆三十日留八日不行順二百八十日夕伏七十一日行度並同前火星論火德南方熒惑星也一名虛漢星又名靈漢星其色赤其性禮執法之象履道而明民安國泰退逆失度或犯天闕或犯南斗或入紫㣲宫天下大亂死人無數行度無定故有前後順遲留逆段大抵約二年一周天順疾而行則為福入留段號天虹星招火災入逆段號天坎星主瘟疫入伏段號走曜主暴災厄甲生人以為禄主星乙生人以為權星丙生人以為囚星丁生人以為印星戊生人以為正魁刑星巳生人以為貴星庚生人以為䕃星辛生人以為耗星壬生人以為福星癸生人以為暗星此星廟在卯旺在丑好在戌樂未喜申好寅鑑心經云夜生火曜照蝎宫合主三台殺伐權若然居丑與奎婁夜生必定佐王侯厯象賦云南方星官在蝎宫面貴饒衣食詩云火躔心宿職彌强生殺權威鎮遠方斗宿度中兵任重婁奎星内禄非常夜向申宫名喜位水金同照任朝堂星主夜逢宫度順定招財禄兩榮昌書生人逢之為忌星最怕陽宫也又不可以日生火便言忌曜須明喜樂好旺或為禄主或為權星或是三方主或作科名星詳其所臨宫分三合照臨察其災福如晝生見火在隂宫不為大害臨危不危臨險不險總有災殃虎頭䑕尾都例經云夜生忌土晝忌火各自相逢必為禍土在陽害火在隂縱有災殃還較可經云莫言忌火便為災若為方主禍不來此星英雄武畧威勇猛烈大怕酉辰二位號為怒地主人尅害骨肉鑑心經云火星若在酉與辰其人少失二尊親又云火星行到參星腰駝眼瞎賦云中年運蹇見生時火在酉宫賦云金臨火位其人少失尊親火入金宫此命早抛兄弟葢辰酉乃金星好樂之宫火星到此相尅故為慍怒如火命不論此若君子之命已入貴格更得劒鋒星煞入命則為三司格局劒鋒煞甲戌生人劒寅鋒丑甲申生人劒子鋒寅甲午生人劒戌鋒辰甲辰生人劒申鋒午未甲寅生人劒午鋒申甲子生人劒辰鋒戌小人在命主不善死在八宫十宫有權此劒鋒之煞利君子不利小人君子則貴小人則凶女人以火照命宫者口硬心軟處性不和生得端正多與夫不和如廟旺則貴兼以此為夫星若得地則䕃潤夫宫偕老大抵火遇夜則光金遇夜則明坐命在亥卯未者以此為地元禄坐命在寅午戌者以此為天元印坐命在申子辰者以此為人元壽六甲生人以火為天官正禄與之同宫則吉火星歌熒惑之星本日餘須分晝夜定賢愚夜生隂位更逢廟面色微紅眉又踈火好夜生在隂宫主面色㣲紅眉目踈秀有武藝㑹兵書言詞猛快氣豪麄形神上小下須大只好安身武位居夜生在四强四正宫主有武藝言詞猛快有膽氣只宜武位權握重管兵機生來財物又居儲夜火在命主有權掌有財禄富貴惟怕晝生陽宫度面生顴骨惡肌膚火性剛多燥暴常懷氣概立身軀不招祖業資財散博弄經求及宰屠火星剛日生為忌在陽宫生面骨腮火急不招上祖産業多愛博弄乃屠宰伏仗氣既立身逢日月事何如爺娘早逝早嗟吁晝火逢日月主尅父母歲熒兩備兼文武遇土英雄亂世需若遇金星淫更佚妻招産厄至嗚呼火木相合主文武俱備火土相㑹必為亂世之英雄更招婁産難也火金相㑹主妻淫佚水與孛愛穿窬更逢計曜定遭誅水火孛同主作賊計都主惡死天首武臣高貴位如臨紫炁號師巫火羅相逢主武位有權與紫炁㑹師巫居財帛財帛虛三宫兄弟主流徒田宅祖居相破蕩六宫放火是家奴晝火在財帛不招財帛在三宫兄弟遭徒在六宫破祖業在九宫主奴僕放火五位長男先惡死七宫妻妾亦先殂疾厄瘟㾮腰背曲遷移客死别人廬晝火在五宫子息惡死七宫尅妻八宫主瘟㾮及腰駝背曲九宫客死居官禄有憂虞血光刑獄事區區福徳宫中人促壽䧟害十相不全俱晝火十宫主刑獄血光十一宫促壽十二宫十相不全微妙仙經無價寶珍藏待價却沽諸火星為性要君知日裏生人切忌之四正宫中如遇着一生財物似灰微白羊天蝎若相逢平生財禄自然豐齊衞分中有悲喜子孫年老有豐隆火雖多禮亦為心既能為福亦為迍命與身宫重疊犯正是平生燥暴人為人何故苦多言土孛之星與火兼當初只喜夸雄辨反被傍人苦惡嫌玉體痕瑕多見傷皆因丙乙起為殃若同火土居亥位遺腹難生亦尅娘火星因是晝生凶旺在隂宫亦有功名據高强逢紫炁必然驟發至三公火居天蝎旺心初夜裏逢之貴有餘若是科名并命主諫垣言路一時居火星殿局朝元火星附太陽曰朱雀捧御附太隂曰􅋦赦居磨蝎丑天蝎卯為正殿居寅申巳亥為正廟愛尾室觜翼為朝元本命太歲值之建旺則秉將帥勇鋭猛烈之權六甲生人最佳火星廟旺樂順留伏逆廟宫京東路火入天蝎卯上名為天成天角星若生本路身命遇之更八煞官祿宫有星學館星不閑便為貴命决之若只八煞官禄宫有星只陞朝格中富之人如見禄馬八煞官禄無星亦是四品之官兼主武職不在䧟宫兼有官資或遇留伏逆減半樂宫京湖重宫火入白羊戌上為左契右契星如人身命遇之加臨官禄更有吉星定應兩制之貴中犯煞者便為武職將軍之位星入八煞官禄宫皆為樞職只作從官須兼帥職女為命婦須㝷禄馬高低斷之旺宫兩浙路火入磨蝎丑上名為天權天皇星若人遇之主一生作事亨通而大富如官宫有星只作官職斷之僧道見之有住持之望若遇兵戎必作上等郎員留伏逆減半順段火入順段名為天偕天武星若人遇之有救星更犯煞星必作武職六品之官兼為將軍女人為命婦更㝷禄馬斷之留段火入留段名為天剉天哭星若人於身命見之皆主好殺其心不慈不仁若有救星却主平善若入䧟無救星皆坐遠配軍州不祥之禍斷之詩斷火入留段名天厭身命逢之名恥玷平生雖善治家生亦被妻兒多怪念伏段火入伏段名為天婁天車星若人身命見之皆犯囚刑重難而死若有救星却於分野上㝷斷其星最怕居忌䧟主有不祥之禍或有救助主於爐冶中求覔衣食亦主孤獨若婦人為風塵不善之家更隨忌䧟高低斷之逆段火入逆段名為天患伏尸星若人身命見之無入格星辰皆主孤寒貧苦若䧟忌定主惡疾或犯煞無救星皆主非横死女人産厄見血而死詩斷火星前逆名困厄親上施恩反作讐在命輔身臨妻位一生性蕩遠方遊火星后逆名披首心蕩花衢最躭酒煩燥心神無三思因兹暗裏成災咎火星躔宿俱出玉關經玉關歌火躔角宿號天娼衣食隨時不善良尅妻尅子婚難合免教食禄見恓惶火星偏好角星逢角木相生勢位隆得禄理財全在手若逢水曜必須窮火躔亢宿號天戈妻妾宫中有折磨好色損妻心不定此人衣食必奔波火加亢宿主離財夜裏生人亦有災若是日生憂壽促只逢孛計為同來火躔氐宿號天輕衣食生來不稱情心性輕狂多膽智晚來稍稍得安寧卯宫見火為之主未到氐宿度土度晝生留逆遇皆凶夜生順行多智慮火躔房宿號天梁官職超遷輔弼良將相公侯名極貴此身佩紫與金章熒惑房二并四度超越之人誠好武雄豪大畧主威權富貴榮華官職固火躔心宿號天相統領兵機為上將更兼樞府四十年富貴功名徹天上火從心宿號明堂初度之三正相當統壓萬兵權至重文星魁發少年郎貴格云熒惑正行心宿度高牙大纛擁旌旗火躔尾宿號天穆此人必定榮衣禄安然裏面不奔馳超騰晚景最多福尾宿之中當防火姦險所為難保可不然瘡㾿阻於人亦主一生多横禍貴格云熒惑之星躔尾宿禹門一躍過天池火躔箕宿號天明作事機權性最靈為官須得君王用大任終當領萬兵箕星不要火相逢火躔箕宿益飄蓬箕好火風終汨沒水星同度火須凶火躔斗宿號天征生殺之權有大聲禄旺中年主富貴位至三公及九卿斗十八至二十一火曜夜臨主貴極公卿帶印掌高權尤忌伏行生在日火躔牛宿號天朽先代家資盡滅亡形貎魁梧多智勇此生終不少年郎牛星雖是屬丑宫火臨此地晦朦朧遇土不明多騫滯縱教辰上亦生凶火躔女宿號天暗多成多敗心狂亂若非木旺在宫扶六親害盡資財散女子如何被火煎便教富貴壽難延惟甲夜生行順疾此身當在聖君前火躔虛宿號天磨貧困初年財不多心愛是非躭女色更添女子不相和虛星屬子一陽生火逢坎地固難明况是北凝兼水旺火為離曜必傷身火躔危宿號天淋好色貪花智勇深破家離祖自成立施恩終是福重興火星齊地過危橋夜順光明事可饒炁若同之為旺處官位高遷職更超火躔室宿號天强勇智操持武職良更得木星來救助定須學館作文昌火宿從來室火猪自知夭壽命難踰炎炎不息終為禍男敢妻家女敗夫貴格云熒惑徳星居廟室勲臣永鎮千秋日火躔壁宿號天滅兄弟兒孫道路絶伶仃孤苦萬千般晚年稍稍身安悅璧宿切莫火相侵壁為水曜夜常明火曜來躔終不利熒躔璧曜正刑星火躔奎宿號天厨衣禄生來自有餘勇藝智高才學美定是威名達帝都奎木之中生火曜文學聰明夜生照若是逆留六八宫不主令終亦主夭火躔婁宿號天暘命裡逢之出賛襄恩徳又施家富貴淵源學問翰林塲火星雖為戌宫主若是婁中亦可住招刑招疾且生凶夜則順行人喜遇貴格云熒惑當知廟樂婁官崇威重位分茅火躔胃宿名天沒定是終身無子息中間困苦又艱辛奔走東西漫勞役熒惑膽氣更豪雄胃度之中且莫過那更土并羅計合自知壽短禍消磨火躔昴宿號天鏤身蹇身孤性自愚貪酒多滛心不足到頭衣食亦無餘昴宿正屬酉命中火燒牛角正添愁若是木星同度立火無西旺水終揫火躔畢宿號天危身見災迍必損妻破家蕩業須遊冶資財耗盡走東西畢宿雖樂月中烏火行此地自難居火燥不堪行沒曜便有熒光禍自如火躔觜宿號天滛風花雪月四時并浮泛自然家業破奔馳晚歲始身榮古法常言火轉申誰知觜宿好相親日月同之多眼疾夜生順度始光明貴格云火躔觜宿福偏洪龍躍天池氣概雄火躔參宿號天倫性如風火好傷身工巧細心兼有智做此隂隲與兒孫參宿從來屬隂陽火入隂陽氣自剛隂陽配合精神足坎離交感火明彰火躔井宿號天終智慧威嚴膽氣雄衣食平平人命蹇晚來方始見榮通井宿半度在申宫十七度中未位逢火到此宫須怕水縱逢吉曜亦無功火躔鬼宿號天祥此星家富少兒郎只恐天年多夭折不然惡死沒家鄉鬼宿為曜號金牛火通明處鬼難當金地火星常照灼此星為惡不為祥火躔柳宿號天馳多慮多疑多是非尅妻害子兄弟絶平生衣食却隨時火星居柳多驚怕惡死猖狂甚奸詐男女必是少年亡女人産厄何足迓火躔星宿號天榮必定前程有大聲更得十宫星有力為官穏穏到公卿火星切忌來星馬損父元來從母嫁日生最重夜生輕處世忙忙無少暇火躔張宿號天頡汨沒平生難共說若非壽夭父母亡尅子害妻兄弟缺張宿更在午星遊火曜逢宵展大猷木曜同躔張宿上若加禄主位封侯火躔翼宿號天憐心性猖狂學少成智術多端加嗜慾衣食生來却稱情翼宿屬在雙女宫火臨初夏氣英雄火曜不堪來此立那堪見水又無功貴格云火星最好來躔翼輔佐邦家權要職火躔軫宿號天暴手足風狂損年少晚年衣食稍平安只恐妻兒命難保軫宿屬水又水宫兩逢水曜氣英雄火曜不堪來此立身遭鬼尅不堪供火星同度火星在天蝎是本宫自氐宿五度八十一分至十一度十一分係行火度不為廟度自氐宿二度至三度為正廟不居此度為向廟在磨蝎宫斗宿十八度至二十度并牛宿初度為正旺白羊為本宫是次旺生時遇之主為重權之人熒惑為明堂火之廟也主為將相秉重權有威望若在房二度者亦旺二十年或在心初度至三度為上將綂萬兵出將入相四十年見土為旺見金水好神仙之事見首尾私通國戚見水以賤為妻若在斗十八度及二十一度必為公卿即二十年秉生殺之權常帶將相之印仍不犯日月及水土則貴若見水則被人妬若在四正宫為本宫居奎宿則有文章若逆行苐七八不善終雖順行亦損壽見血亡與木相資與金相仇與水相惡同宫為水尅即惡死日度為人性急幹事不免是非一生被人作念損祖財老當刀兵之厄是主星夜生有位日生有財不是主星平生多訟好色慾變善為惡晝生帶劒死月度主性急食卑下之禄雖聰明亦短天其人出言不實多是非與人交結不久長多有暗昩災因文人有厄是主星得免木度主一生多災厄因疾病中損害四肢或犯風狂損傷男女是主星得吉曜相扶助則可減矣火度主威名嚴厲一生足詞智因武藝則有鋒芒多子孫亦忌小人相損若是主星總被人損亦不成事因此得重禄更兼勇智超羣若有損即轉貴土度主損兄弟男女主惡死木見則免三十二以後有財金度主一生多受貧窘因女人敗聲名木見則免若是主星晝生轉加福力身有貴位水度主一生多災厄施恩徳有不善之報火星入宫日宫作事多成為人性急有聲名善决斷有武勇作文詞是主星有權兵之貴不是主星目疾損父母或夭死天乙可免月宫主性格不安定多驚怕出言不審是非若是主星夜生有位日生有財不是主星夜微有福日生被婦人損䧟亦主促壽不善終木宫主得王者任用有兵權之貴為人内剛外柔於人有義見事深遠是主星有權貴不是主星大富火宫為人性堅宻有道藝好文才足聲名富貴機巧若是主星富貴非常不是主星性急忠直外敏内剛知人災福又好燒煉夜生富貴晝生財薄土宫性急形貎魁偉有勇志損祖業兄弟好行凶惡招暗中是非有惡聲名不足畏懼是主星好殺有權不是主星多因殺害而死金宫好色損妻好鬭争見事不遠與人交結無終始是主星㣲有職位不是主星㣲有財水宫工巧細心有財智多刑獄好殺害一生多被人阻撓與人結交無終始是主星見小利不顧大事幹事多成毎被人損䧟是主星可免非主星因小人損䧟性命火星同宫火土同宫主性凶惡好殺害土是主星晝生火是主星夜生及順行本位至防禦練土是主星夜生火是主星晝生各乗旺氣可主監司如不乗旺氣主微職亦主多疾横終腰疾言語吃􅧣詩斷火星㑹土福偏隆錦繡文章氣概雄南極星官添福壽封侯萬户食千鍾火金同宫主性急燥見事不長一生少得婦人私愛多被婦人損䧟難婚姻妻妾不良多滛慾詩斷火星度㑹喜逢金百六當之慶瑞深人若逢之登上第佳名蕃衍世皆欽自來熒惑怕逢金共照隂陽必主滛更有惡星刑戰着不過强仕即悲吟火水同宫主平生多學道藝兼好文章若俱順行不伏逆者是事有成伏逆者毎事多難有善星相扶助主有位無善星助主目疾詩斷火星怕與水星交困苦相殘百事淆隳癈凌遲逢百六夫妻父母總相抛火如逢水自相刑怕在陽宫與晝生不滿三旬防横死若能知命學修行火木同宫主大富貴有權位主兵刑在壽限主長命在陽宫薄壽詩斷木星㑹火喜偏饒值此官尊福壽超百六㑹時家國泰忠臣孝子滿皇朝火同木徳斷無災必主其人健有才足智多謀身早達官居五品亦竒哉火羅同宫日則凶夜生主為國臣在九宫方主無力主燒屋詩斷火星最忌見羅㬋害義傷亷事大愁兵火焚燒多刼掠金倉谷府總無留火計同宫主患癰癤而死日生燒屋詩斷火宿偏嫌㑹計都金人風疾怪刑軀丐殍寒賤終貧困好是文身賊冦徒毒藥傳勞并刑死莫能照命握兵符如逢百六天災厚不問封侯也被誅火孛同宫主虎狼傷不死亦主癰疽膿血詩斷熒惑最能誅孛彗掃除攙搶為慶瑞官榮上爵秉威權百六逢之為禍害火炁同宫主足文學少子日生屋多火燒詩斷火星紫炁最亷平百六逢之慶福齡逢生必是人間瑞龍鳯叢中第一人琅玕經節要火行順旺或同水月順位高宫仁慈禄厚天乙火臨不以晝夜福䕃於身職禄雄覇火星順行同紫炁不拘晝夜主受積祖福䕃火水孛星男女多滛夜生宫順招財進禄廟處權治順旺興隆火土木同夜照困窮首尾一處非吏即戎或留或逆刑害重重火星及土夜照不論三方即困苦之人更同羅㬋當於刑法中立身留逆則多官厄尅害六親妻子順旺則昌盛之人火日同行二親殃禍木不照之先代主破火計隂曜惟宜夜照權掌兵機貴於廊廟火計夜照威武之人或文則帶生殺之職廟旺則福禄堅牢火若在晝逢貴亦凶忽然主背難保善終火木順照遇惡無凶同吉榮曜益壽添禄火星照臨十二宫命宫火星臨人命主人意氣雄勇急直好勝明敏見快多學少成得志則寛量失志則􅄶燥心明性急意直膽大愛骨肉與人交則不能長古執自持傲上喜大凡事後悔性不好閒愛技術善醫卜不受拘束不奈觸犯有枕骨睡多側臥先瘦後肥因災變福始勤終怠好食硬物夢則雲水波澤荒邱古塜疾則足同脾腎有膽能權握順㫖則喜逆意則嗔夜生逢此廟樂則文武兼資勇智並用若逢土孛計羅同宫主人凶暴夭折作事迍蹇纔有吉慶事又或顛倒夜生必有九九之數其事綿延凡事稱遂火照主性燥暴不奈人侵欺合主中年抱四時患詩斷火照命宫心量洪倚公附勢立身躬初年財散家難聚順旺如逢財禄豐火人不要火居命兩火炎炎空自盛若遇火星居天蝎富貴光華須易熄身命宫中遇火星此人燥急性聰明平生喜怒真難測凡事須交立便成財帛宫初年耗散有似蓮花貯水纔滿必傾多招是非若有吉星合照同宫則反凶成吉財帛四十八後五十以前漸漸見發火照一生招盗損財詩斷火星財帛旺初年中主交時恐不堅若得善星同照犯末年退後又團圓財帛宫中要得豐豈容惡曜故來攻忽然凶曜來相犯帑庫炎炎一􅅡空兄弟宫不得祖業又云火星守時皆不順獨行處性也剛雄火照主有兄弟雖多終久全不得力詩斷火臨兄弟事如何爭競紛紛惹禍多親戚有恩還反目自然手足不相和田宅宫田宅難靠宜自卓立莫問兄弟父母賦云少失資財金火同臨於田宅火照多因官中破家常被惡人相損田宅破散父母家業詩斷祖基破盡豈難窮火宿親臨第四宫若是廟方須發福不然孤苦一生中婦人為夫别沒刑田宅多逢水火星隂陽若是水火曜田宅逢之却大榮男女宫招三人亦宜桃花夾竹偏生過房相壓更好若與土星首尾合照兼又晝生及六丙生人全不得力孤寡若晝生火居男女宫必主絶嗣火照主有雙生之子貴可得二人之力詩斷熒惑臨兒長兩兒在家出外沒尊卑不然尅害哀傷子或者傷娘子復悲火若來臨第五宫此星凶暴似寃仇婚姻若得同偕老男女必定少年憂奴僕宫主有僕馬但不久遠六甲生人在此宫者主臨於惡弱之地難享福矣若科甲科名二主高强則無慮也火照同詩斷火徳凶殘勢莫回䧟害奴僕愈災危女人更作當生限夫位重重見别離六位如逢水宿來害刑牛馬定多災屯殃變異起奴僕得地專權自劇裁妻妾宫多主生離逺别若妻命有此星相抵則無害不然宜娶同庚長歲方保遲得始宜不宜早男二十五前為早男早尅妻女早尅夫火照主尅宜夭婚亦主妻因産厄而死詩斷火星合主别離居入宫伏䧟少年孤白日生人為忌曜夫尅妻兮妻尅夫生來火宿若臨西女哭男兒男哭妻或在五宫三五娶水宫一箇定無疑疾厄宫切忌土宿惡曜同處主有不測之災凶險疾病六根不足風疾躔身經云火土同臨疾厄宫眼不盲時耳又聾賦云日月有災八宫見火如夜生不然在消息論之火照主瘡疥之疾防漏火之厄有疾不可救詩斷火臨疾厄要推詳見物為􅐃更是殃假使仙丹能起死也須身染病臨床火星八位憂血難災來非命禍難禁腰駝背曲缺唇齒必定刑囚死獄深遷移宫居處不定宜外居更好不宜在家若居祖業則難以興發如有凶星合照防惡人侵害財帛及虫獸之厄火照同詩斷火星宫分照遷移不可將同惡曜推得在强宫為禄主姻聯皇族貴當時火星破命入遷移遷變東西土産離客店與人和合住未年有屋可遷移婦人不可更遷移若是遷移是滯兒火孛土星交丑亥帶兒再嫁要先知官禄宫君子一生主文字煩擾如係禄主則少年遷擢文章出衆才藻非常汪汪如千頃之波浩浩傾三峽之水用力少見功多受厚禄享重貴若日生見彩雲易散美處難全喜地有怨福中有禍不宜享福壽不長久火照主招惡人連累官災合牢獄之厄詩斷火星凶􅆋入官宫仕列全曹少始終若在强宫為禄主㑹看附鳯與攀龍火星到卯氣飄飄非遇宫主亦官僚水土同宫臨任死皮袋那知被火燒福德宫衣食豐厚倉庫盈積財物足用更得火星合照一生優游若與凶曜同宫則減其力火照或忌星或是尅星年不過四十須招富人有虧尅䧟身之事詩斷火星白日損人壽若受官班終不久蝕神忽若入宫來骨肉妻兒難保守火星滿用臨强位十一宫中福為最道徳威嚴禮義崇騰播英聲盈海内火星土宿與金星三辰喜在福宫臨内只火星為急燥為人因此失人情相貌宫主人瘦薄情志輕浮形神短矮只見他非不責已過性潔白好戱謔好時喜到底怒時抝到底有人激觸心中發憤只是片時過心中無事火照形相惡醜言語剛烈不服人欺情行忠直詩斷世間何事最嗟吁相貎宫中火德居男性剛强多惹禍女持箕箒泣前夫火星行變不為佳却破兄弟與妻家若逢計孛兼天首孤窮眉目有痕瘕火星變段名寶瓶宫天暴星又名天刑星有心膽能住持詩斷坎名天暴火為災夜生縱可日迍乖七宫妻妾多滛蕩立禍須知妓妾來磨蝎宫天驛星又名天徳星主有福徳轉災為福詩斷天驛之星為熒惑此曜偏宜會磨蝎更加土宿此宫來富貴功名憑口舌人馬宫天倉星又名天穆星主倉庫盈滿内實外虛詩斷天星寅位火星臨官位長生秀氣兼不值惡星侵本位重金重葢爵重添天蝎宫天輔星又名天職星主有大職印大貴也詩斷天輔貴星臨卯位蝎宫最喜火來臨禄無失䧟身榮貴名播清聲入翰林天秤宫天休星又名天勒星刑尅暴害凶惡詩斷角亢休宜火來臨畏逢首尾孛相侵身命遭逢無吉曜犯刑惡死少光隂雙女宫狐疑星又名熒惑星主事多進退詩斷狐疑軫翼言難定志大心高疑慮人女人身命若逢此順則為厄逆為塵獅子宫天雷星又名天時星横得貴人待用詩斷火星獅子號天雷正直無私福禄來若望太陽人悖逆更逢四正子孫乖巨蟹宫天友星又名天熾星心性戱謔多詐詩斷四五七宫并第十名為天友定應孤若非父母隔絶早往往偏房寄外居隂陽宫太虛星又名天孽星主夫婿孽毒也詩斷太虛之宿最為良身命俱逢福壽長金木并臨須顯達若逢八煞即為殃金牛宫熒惑星又名流血星主怯惡死詩斷酉宫熒惑最為凶不問七强五弱宫若得吉星傍臨照也須辛苦受貧窮白羊宫天廟星又名天赦星逢難自脫明多豐足詩斷白羊天廟最為竒禍則消除福則隨寅午命宫逢吉曜少年平歩上雲梯雙魚宫披頭星又名天旋星主疑惑多驚恐詩斷亥上披頭何所知虛名虛譽足嗔􅅓若不遭遇留伏逆曹號揚名處處知星學大成卷十五
