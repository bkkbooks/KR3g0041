body:
  text: 星學大成卷十明萬民英撰耶律學士星命秘訣序星命之説其法傳自西天今西天都例聿斯等經散載諸家余弗獲覩厥全然我朝欽天監有囘囘科毎年推筭七政度數二曜交蝕較漢歴為尤凖乃知西天之法的有真傳信不誣也耶律五星耶律純傳自高麗國禪師國師傳自西天今觀其大者如論一太陽五太隂二金二火六木六水六土之説分偏正以定宫度别體用以取身命重天元月令合上下盤局及二百字真經步天標本等論皆根極造化洞究天人後雖有作者弗可易也諸家竊其餘緒各立門户究厥㫖歸不能外焉今術者但知重琴堂而不知重耶律是不知二書互相發明不可舉一而廢一也術者謂琴堂凖於我朝耶律凖於遼金此又拘於氣運之說而不思論道理重身命官禄田財妻妾逰行則古今一而已矣考厯代國家取人之法或以文武進或以孝廉顯或假納粟入官或推恩蔭受職或重天潢世派或喜黄冠緇衣出身雖有不同榮貴則無或異論星命者能隨時消詳自其所重者推之則耶律可凖於今而虚實亦驗於古矣岐而二之可乎余故詳叙為看星者法焉易水育吾子識天星標本序大遼征和二年翰林學士耶律純以議地界事奉國書使於髙麗至其國聞國禪師精星躔之學具重幣設威儀求見屢請不從一日自請於髙麗國王曰臣奉國書來此稔聞國師富於道徳星命之學願借玉音得遂一見以請所有何啻昌黎之遇大顛也國王遂命一見既見之後往復數回乃請曰微生跧伏北方聞國師深於星命之學今日天幸得面鈞顔願北面從師得聞一二以聳北方之學者亦是三生夙縁不知可乎國師曰何不可之有但學士平生論學有何所得吾與學士從長商確而已何以師為曰膚學得於生尅制化之外亦有十條前六條看根本後四條看流年其一曰太嵗尊神加臨管攝其二曰無中有曜弱處髙强其三曰得經失次細辨盈虚其四曰身傍母吉傍鬼者凶其五曰同宫千里異宫尺寸其六曰黨母福多藏鬼禍大其七曰原守雖詳流年猶急其八曰當生變曜流年飛星其九曰限併諸煞貴祿不臨其十曰流年諸星無忽柔曜此十條者各有詳註未審如何國師曰十條之說抑末矣本之則無姑就學士談星根本以宫主為重耶度主為重耶曰得於平昔之講明以宫度兼論不可用一而廢一也國師笑曰宫度兼論吾恐子於是度胸中不能自斷何以斷人之禍福也且如命躔丑宫之牛金宫土度金限行遇火一生一尅何以為斷又如命坐寅宫尾火宫木度火限行遇水一生一尅何以為斷於禍福何凴遂再拜曰願棄所學而從師求敎師曰吾嘗以近世談星者言宫不知度言度不知宫二者胥失矣吾於海上異人授我以偏正之垣於二十八宿之中分之曰一太陽五太陰六木六土六水二火二金之説學士曾聞之乎曰未也國師曰人生於地日月五行見於天其生值七曜之吉則一生享福安榮遇七曜之凶則一生忙迫日不如意日月五星其為物也於天地間最大於天下萬物日主晝月主夜乃天之眼目也在天有五星在地有五行人生於世五者一日不可缺觀星談命茍不知此根本徒學宫度兼論之術何以決人之禍福故十二宫有偏正之垣子宫以虚日䑕為正垣䑕乃子垣之宫神非正垣而何也丑宫牛金牛寅宫尾火虎卯宫房日兎辰宫亢金龍已宫翼火蛇午宫星日馬未宫鬼金羊申宫觜火猴酉宫昴日雞戌宫婁金狗亥宫室火猪皆本宫之正垣此為千古不易之論談星之大根本可以盡知其要妙也所謂一太陽者太陽君象天無二日民無二王惟星日馬乃太陽之正垣五太陰者后妃之象后妃嬪衆多宜太陰之五也故以鬼金羊為太陰之正垣其餘張心危畢皆偏垣之月也六木者寅宫尾火虎亥宫室火猪為木正垣其餘斗奎井角皆偏垣之木也六土者子宫虚日丑宫牛金為土正垣其餘女氐胃柳皆偏垣也六水者已宫翼火申宫觜火為水正垣其餘箕壁參軫皆偏垣也二火者卯宫房日戌宫婁金為火之正垣二金者辰宫亢金酉宫昴日為金之正垣天地之間水木土隨處皆有隨所居而可得木滿山林土滿寰宇水滿江河至於金火則不可多得焉只有二火二金使金火如木水土之多則天下常有持刃縱火之患豈不為世道憂吾有偏正垣七政論日月並明說計八篇又有二百字真經二十五題詳於學士十條者學士所舉十條人常聞常知也吾之諸論人所未聞未知也今以諸論八篇與夫二百字真經二十五題授學士純遂拜受而寶之大遼征和二年八月十三日耶律純自識髙麗國師賦元星入局富貴無虧母曜歸窠榮華有凖若見財星得所發積成家倘或制鬼當先刑傷破耗母曜莫傷於財曜財星莫制於母星母入財鄉清淡守株之士財居子位慳貪薄藝之人子衝煞地是英雄子若衝財家破耗子居母腹必多蹭蹬之財煞守元方定是孤寒之士大抵母曜無傷元須得地夀入夀而無虧年過一百財遇財而有制囊乏分文母健子明而男女成行財破元魁而夫妻反目元局破而猶可元星虧而立凶泄氣重逢貧無立錐之地閑神疊見身無一日之安戰煞必要其降煞戰必湏他弱星運一元氣分萬象元氣貴乎生旺官星切忌休囚當明官鬼之元一星二用必達母財之理二曜一情財破庫傷終身危蹇元衰財弱一世孤寒鬼旺則夀筭必虧子生則田宅有發元坐孤虚骨肉參商却宜僧道令居驛馬功名蹭蹬偏喜醫巫逢生則皆致祥遇絶則能成禍官印不虧必作青雲之客令母有情當為黄甲中人煞盛元虧則早年夭折令傷母損則中嵗孤貧鬼入元方利名無就元居母局官爵顯榮財庫不生而不絶亦可守成令元不旺而不虧僅能承蔭白手成家必是令生財宿青雲得路當知令護元辰煞化為官多是險中僥倖令變為鬼必於閑處榮華妻星弱而重害室家母曜陷而六親早尅滿門昌盛皆因格局安和一世貧寒必是令元臨戰官令逢傷縱得名不過虚譽鬼閑太盛雖有權而終無實貴煞祿勲得用則星純可取官庫嵗駕不傷則曜實為佳切忌無情夾拱須看有意揖朝不可一途而取要明三限之元大抵閑神不可交迎制忌亦嫌拒敵尅我者有用何妨生我者凶神何用空亡絶地會吉非祥禄馬旺鄉逢凶反福元居亡刼有鬬多災母坐煞宫無救多滯生旺處為禍還輕死絶處有福亦淺盖五行順則為祥逆則為禍也玉堂寶書五星斷夫五行者木火土金水也在天曰五星在地曰五行在人曰五常太極既判天地初分合乎至道體乎自然一動一静萬物生焉盖造化而有變也夫金生夏而旺於秋水生秋而旺於冬木生冬而旺於春火生春而旺於夏土乘火氣初生於已每於四季節中氣前三日為旺其月在辰戌丑未為正位故金旺木死木旺金囚水旺木相火旺土休生我者為父母我生者子孫尅我者官鬼我尅者妻財比和者同類然五行之性各致其由是以元星入局福夀無虧母曜歸窠榮華有凖若見財星得所發積成家倘或刑星當前尅傷喪命遇子旺宫多顯發子衝煞處必英雄子可順於財星財莫傷於母曜興財享福印旺滋元反禍為祥用强制鬼刑星有制要逢我盛他衰元若居財切忌財星受死本宫正旺母受刑生榮有日元如虚弱無逢子掘發無因清談守株子居母局性貪薄藝母入財鄉元局故怕受傷元星亦嫌受尅元居鬼局破耗非輕子入元方艱辛有救謀利失本生局逢刑好事多磨妻宫制母元莫傷於財曜子可逺於母星衝鬼須當子在先援母必當鬼在後為禍須逢死絶為福切忌休囚妻來入母父道先亡母若遇財坤宫早逝呻吟庶出母入兒胎衾枕孤單妻宫夀局尅傷離祖鬼局逢刑破害臨身妻宫逢鬼母入刑宫情斷絶子居鬼煞繼無親子居子局怕逢死絶之鄊妻入妻宫切忌休囚之地妻居印局怙恃乖離子入夀鄊女男昌盛子星受制寄養偏生妻曜居生因妻致富母居夀局棣蕚聨芳鬼入元宫雁行分序子入子無傷則男女成行財遇財有尅則夫妻反目兒鄉有尅當尋妻曜長生妻局受傷須要子星帝旺母星入制孤尅散離夀曜居財慳貪喪失五行相尅便知先者受傷兩曜相生必是後來泄氣先詳體用次察尊卑一舉纔通萬無一失耶律學士星命秘訣七政論一太陽一太陽者午為正宫星為正垣乃太陽為主也如房日火也虚日土也昴日金也皆有所屬乃日之次舍若正月酉時四月午時十月子時立命在午日在正垣亦謂日居日分升殿也却不喜居於心危畢張則為日入月宫陰陽反背偏生庶出之人也日為君主則有金水之佐金乃官星水為福元前引後從太陽不宜獨行無輔皆貧薄之人未申酉戌亥時生於他宫見太陽亦宜有輔皆可取也無輔皆貧薄之人也正月酉時生人太陽在子謂之移乾就濕二月申時生人主入疾厄木炁强者多主疾病命書云孤陽射破三方煞又曰水化伏尸遇太陽豈為惡曜乃太陽能救諸宫凶煞不特戌上見水得日可救他宫五怒得日皆可救也此宫最忌者木炁也以日為君火羅計孛雖凶曜也然臣也豈敢犯上惟木為難星疾厄雖至貴者不能免若太陽飛去與木同度重則夭折輕則貧病木在亥為煞難入垣在子為難當頭在寅戌傍臨在卯加入命皆為不足炁乃木餘與木同凶木炁者樹木蔭翳之象能蔽日光其次忌日火同行二曜朝陽嫌處離明之地二曜火羅也他宫立命見火日同行多早喪父多敗祖業日者祖父也火者自己也以已與祖父敵不貧亦天矣故凡四五月生人日在申酉者不利父母蓋申酉為日沒之鄉也惟行限喜太陽煞星近太陽皆能反凶成吉四正互加之宫宜詳酌也五太陰五太陰者以未宫鬼度為太陰正垣乃午與未合日與月配也其次則心危畢張謂之偏垣為五太陰也日為身宫論生尅之妙者以月所泊詳其傍鬼傍母五星中以月最重若更立命在五太陰者尤為利害蓋身宫命宫度主俱從焉吉則俱吉凶則俱凶其可忽乎五太陰中以張月鹿為第一宫何則未與午合取日為逺張鄰於星取日為近午為一陰始生月喜居之次則危對虚日心畢皆與日度相連月非日則無光也若命度張月加以近望夜生之人皆大富貴一生無憂夜生而在他宫立命月躔張者主一身安享命在張月在畢危心或四月度立命月亦在四月度者皆可起家發跡成立也最喜金水孛會金為金助月華㑹水為水涵蟾魄會孛為太乙抱蟾皆為貴格惟女人獨喜一金星伴月遇水孛近身皆無貞烈故日生喜太陽不可獨見夜生喜太陰却喜獨見中旬三五之月最為圓浄詩云殘星伴月落邊城月到中天分外明滿天諸宿皆沉沒只有團團月照人又詩云五更旦氣十分清斗落參横日未昇相隨寶月上河漢惟有長庚伴月明丑寅時生人金月相隨皆主文章明了却不宜木為命度主也太陰經云己申二命惟怕月在土宫土宿之中其餘夜生而遇火羅謂之火月齊明遇木炁而福禄有用亦吉木炁强則土計衰土計盛則月必晦五太陰中有危月到天門乾有金生質厚歴試人命有子上危度命者遇土計則凶十三度在亥命度者行土計多茍免此𤣥之又𤣥者也獨有鬼度命其人必詭譎多謀詐故太乙謂月孛南方之蓄蠱乃太陰之精如此豈曰陰柔乎此星若正得其光明之時為人相貌堂堂肌膚皎然但鬼月遇火不謂之火月齊明於金有梗見土却不曰土生金乃反害月焉論者不可不察六木尾室火度實寅亥之正垣故見水孛則大發其次有井木度者多於二十八宿木入秦殿秦州度栁者減力太半次則斗二十三度次奎有十八度又角有十三度井以末二度隣於鬼合還太陰正垣斗以末度隣於牛合作丑土奎以末度隣於婁合作戌火角末隣於亢合作辰金此四木惟角木弱况是金垣木必衰弱木在午行午限午為三河之地其地多風又為木入離宫化成灰多主夭折木在己巳為㢲風動又屬水能生木室尾二度見風稍輕深忌火羅火能焚木羅為奴犯主亥上立命限行火羅多死只喜水孛獨行或金入水鄊金水同行同度為上吉蓋煞無餘氣木命得之多富貴金水加合有力皆為可喜如金月同宫不謂之金助月華若是生於冬月及壬癸年更得天元月令助之為竒六土六土者虚牛為子丑正垣次則女氐胃栁為偏垣如女土近虚得子正位子為帝旺之地氐土近房亦居明堂出政之宫立命於此得火能發大福為官必至卿相非小小也惟胃土居酉土敗之地天盤又為反吟局人多不足若得火羅十分為上有木炁往來必然困厄至於牛金之土惟喜一火一羅獨行若限見火羅作黨則不吉也他土亦然謂二母爭權遇水孛同行土亦崩甚不可謂土尅水為財也最怕木炁當權得時破局入垣為大凶亦不可在四木度中謂之失次之土安身與火羅同度同宫者皆有福之人制化加合之妙又在善詳推之六水六水者翼觜雖火皆水正垣論度者皆以二宫見孛為水尅火不知水星行限怕逢孛為奴犯主也此二宫安命多易看蓋己申忌土計其説多騐已之張翼軫申之畢觜參皆水也怕見土計獨有井九度屬木人之論命每易於此宫次則辰有軫八度水亥有壁寅有箕壁水生於乾亥金混水軫亦生於辰之金見土計稍輕惟箕水生於艮山蒙泉之地受質稍薄一見土計不破則夭故寅宫之水金星得地為大利主持之命惟喜金水同行或金水互垣亦好此宫深喜太陰與金同為金助月華深忌月與土計同宫為安身傍鬼以行限而言卯辰己午四位不可見土無金行限次第逢之卯有土十五嵗中凶辰有土二十五前凶乃無中有曜若見金入水鄉水居金位皆是竒特二火二火者七政所躔各有四而火全不與何則尾寅室亥屬木而觜翼屬水矣火之所居不宜多有若火之多如水土木隨寓而有則火性炎而有焚燒之患故火之正垣惟卯戌二位戌為火庫卯與戌合卯火居房日之下以燧取火於日也戌火藏於婁金鼎鍋之下以金擊石乃有火也喜木炁為上躔在四木之度為吉四水度為凶孛與水同二位之火最怕水居亥子之地謂之水滿江湖火必微滅何則水在亥卯宫三合見之水在子卯宫加臨之戌上安命十五後見亥限有水破我相貌二十五後行子限見之破我家福徳年少逢之多貧夭惟喜水木在天盤卯辰之間木在子不謂之木打寶瓶蓋木在子巳加子戌宫二十五以後逢之皆吉此宫喜木月同行不喜水月同學者宜詳之也二金二金者金度有四而牛婁鬼各有所屬獨有亢為正垣曰龍者變化不測之物天為凶器若動用不可度也次則酉宫金旺辰與酉合為金喜土計而畏火羅此二宫命土計近月不為土犯太陰為安身傍母乃富貴之人也辰上立命行限至午見火羅多死午為火旺之地又為金敗之鄉限行多凶惟酉金遇火為災遇羅為有救蓋酉反吟之局羅㬋在戍計在辰辰加戌羅在亥計在己巳加亥羅㬋在子計都在午午加子天盤有救解也酉上安命却有土星在子為福甚大為官星為命母入垣逢旺加以禄主為天干月令有用之星行子限必大富貴如辰宫安命遇土於午稍弱於酉金矣金主不宜坐於四火度中宜在四土度也日月並明說日之與月其次舍在天相近故在子午卯酉四正子為帝座午為端門卯為明堂皆日月所居酉為西沒之所人生身命在此皆富貴之人安命在午日在巳月在未為陰陽夾命日月在男女遷移夾拱有力必權柄能卓立日午月子日卯月酉皆富貴命也月卯日酉皆賤命也日居月度月居日度亦反背也其人必庶生二母日生忌火夜生忌土亦當以標本論詩曰十二宫中不言主强云晝火夜忌土何以不忌水木金是致五星皆莽鹵行限若是見日月妙不可言或限中日月夾拱皆致富火羅犯日土計犯月皆損害六親朔日蝕望月蝕命在日月度不夭即盲啞之人日月同在命宫其人多貴已為陽極月不宜居亥為陰極日不宜居月巳妨母日亥妨父日月拱命拱二主皆貴拱田財必發拱遷移必外發拱妻子必得賢妻子力拱疾厄必少疾病以類言之百無一失日為主躔木度月為主躔土度皆失也太陰黄道說太陰論夫命取太陽安命以明其體取太陰為身以明其用論命則人之所可同身則人所不可同如命宫諸富貴格貧賤格與此身無相涉皆所不論必須與身有干係深重者方是太陰九行說月有九行以黄道為經緯之主青道二出黄道東赤道二出黄道南白道二出黄道西黒道二出黄道北四時更可隨黄道而變遷春黄道始於東夏黄道始於南秋黄道始於西冬黄道始於北其日南陸北陸又是隨天道而旋也以九道捷法推之四時太陰所經之度立春木黄道火青白道土黑道金赤道水白道月立夏火土金水木立秋金水木火土立冬水木火土金以上五行係月所經由之度以此推其黄黑道如太陽則從火月度則從水論論命以日月為身所係考九道晦明如人身生世而稟賦厚薄道行所屬而為吉凶黄道内得五星之吉為福土計孛羅為減力蓋四餘暗道之曜非黄道所可見也見則必掩晦黑道正四餘得志之所又非五星所可從也黄道為人聰明清和粹美春風和氣灑落通變赤道太陽光輝之所為人多權畧任勢敢為青白道多清潔有風節廉操進退以禮大抵青白道為孤髙之所若更命局與當生孤刑然局無禄貴駕殿者必孤尅更空亡刃碎交横必是僧道有吉局亦為貴中孤命黑道雖富貴人諸吉局亦必自艱難中起黄道雖弱亦可為吉但怕黄道遇掩晦是月行于天而片雲蔽之蓋以其昏晦也黑道愚而好自用賤而好自専心髙無實志大無成之人大抵專繫於九道之内次㕘得何星之用如妻星主内助而起亦由内親而成功名田宅主得父母力財得財官主貴更㕘諸局無失矣論太陰之說假如太陰度婁婁金也當以金星論如金星得垣占髙强有夾拱與禄貴駕殿相係更見土來生之吉立命在已人必有貴如金星失躔為他星所斷或截其脉不與禄貴駕殿相係却與陽刃的煞相干此又下賤矣如金星失道太陰得夾拱或見黄道所喜之星禄馬殿駕貴人相涉亦為吉命如金在辰升殿當官禄或火在申子辰當令或難直此不可以身主居官斷也蓋受火之欺為令所役為官所驅何福之有若更有土與火之脉相貫串此又轉凶為吉之道蓋火欲傷金見土則反去生土土又生金矣挽回一團福氣全在土上却看土是何宫主妻得妻力男得男女力官則貴福則富土為持重之星有培植之功為人亦有持久之福若為火所燥無土挽回凶焰為人多受漂忽震蕩之禍得吉尤凶也若金見水却看水是何宫主田妻男吉官福尤髙是身得此福若主無用之星奴僕兄弟無益於我精神氣脉為彼所竊平生為人無力以小失大如金見木為財看是何宫主妻得妻財奴得奴用之類活法推之無不中矣太陰引從夾拱之辯引從夾拱當辯其孰吉孰凶如月度婁前三十度内有吉星為引後三十度内有吉星為從引以逺者為吉從以近者為吉前後夾拱匀停不論何星多寡皆為引從夾拱但看協和爭鬬如何耳前引後從又要求太陰之前不拘多少近前一星以之為主若前面之星與所主之星皆相生無戰尅非貴即富有戰尅不純粹矣若所主之星與日月有傷此為下賤若日與官禄貴殿駕職元無非富貴前後擁從匀停所主之星與月相得前面諸星不相戰爭只要不傷月前主星不碍其為名利若三合釣來亦如此論但當明剖合道望道之說在月前為緊富貴皆特力為之不藉他人合道望道必因人而成此二項望道尚可成功名合道非仰他人則不可貴格亦是蔭官拱夾中亦有禍福如夾吉則吉拱凶則凶又在詳推之也一太陰前犯殿傷宿之說犯殿者如主弱下凌恃其權而犯殿傷宿者上剛下暴各恃其力如太陰度胃而羅計占昴畢二宿昴畢日月也天之日月人之君后羅計乃黒道狂暴之星犯其日月身前有此凶星安得不凶傷宿者如太陰在胃立命在子丑木星在月前身命皆係乎土木將來傷之退度尤凶主為人獷狼愚執更若當陽刃刼煞之類必是凶惡之徒當受刑法否則夭折又有此格而富貴者乃坐祿馬貴垣殿駕廟旺日月聨格有以伏凶星之勢雖犯殿不妨也推者宜加詳審不可以一槩論也太陰讓殿之説讓殿者如人不臨正室而在别處所讓之殿有吉則福有凶則禍如太陰度柳星二度之間諸星在翼軫之類獨讓張宿在中或月度翼諸星在栁星亦是前為緊後為緩當禄貴殿駕為富貴中間更有金水各一星在張宿謂之一星朝后謂之留守護垣此至吉也若讓殿有土計羅孛之類不謂朝后謂讓殿受欺此凶格也太陰出垣入垣羅計界出太陰若登殿駕禄貴者吉居煞者凶月乃柔星有晦朔弦望全籍諸星輔之日生宜木水炁日夜生宜金孛計火羅在太陰之前後見最怕陰陽反背諸星失志太陰前有吉星相近禄貴後惡星趕趂尤急太隂倒限子上危月度立命限行至卯尾一二度本宫對合皆無星有忽然死者蓋日月晦明不同危月也至卯日出之所正入剛陽之地是謂有他無我兼以太陽惡弱倒限無疑又如午上日星度立命限至酉畢度本宫無星而忽然死者蓋星為日日至酉酉為月出之地亦有他無我兼太隂惡弱倒限無疑二百字真經四正宫神暗加管攝四正者舉一而三者相貫串也如子午卯酉寅申己亥辰戌丑未是也人多以三合論而不知四正生尅為急如木在子卯酉有金暗受傷尅如水在申巳亥有土亦暗受傷尅如金在丑辰戌有火亦然餘倣推之可知根本之强弱矣天元得地有用者昌天元者甲乙年是也為科甲若又為命主官禄福權之星居髙强得水為助必富貴如受傷害必貧困矣月令當權乘氣之旺月令者寅卯月木是也如春以木為令又以為身命主及官魁福禄之類乘旺得水助之為富貴之命也正垣氣旺傍我無權正坦者七政各居十二宫為正垣吾甞謂言宫不知度言度不知宫人多不知此處𤣥妙如土旺在子子為正垣之所危之近虚濱土之水淺水之下皆近岸濕土自危一至危五皆土也次則斗二十一起合還土度辰宫角十一十二合還亢午張一至三度合還星未井二十九三十合還鬼戌宫奎十七十八合還婁此皆歷驗非億度也界限分明彼木此火此八字以寅卯界限之説言之蓋尾三度屬卯火為主餘度屬寅木為主若以寅尾為火則誤矣主居退留餘曜難救觀星以遲留順逆為最急主星尤闗利害入順度則平生作事順快有福如入退留一生作事進寸退尺兼為人不剛果流於慈懦者有矣母居退留為福不力生我者為母如入退留則是欲生我而不力也母星無生何暇顧子如以火為主羅為奴木為母若木不生火反生餘奴之羅或乙丁人又為刑囚是我父母有用之氣反黨餘奴刑囚之輩何暇顧我生我而為福哉母尅於用福力潛消如土為主火為母若火不來生土却與金同行則所恃之母氣反與金相戰縱有力以及火子亦少減矣敵强難攻用力有損書云相刑相戰則處世多迍相順相和則終身安靜人多以我尅者為財言之則謬者多矣若以金為主限見木炁木為主限遇土計之類二星作黨者强敵也見之重則刑囚輕則貧病必然之理也兩母爭權姑息太過如土為主限見火或羅則發福如火羅同會若吉而實凶蓋母與餘奴方爭權未息縱能愛子亦無力矣太陽當空羣曜潛伏太陽者君也如七八月己午時生安命在卯如躔房宿火為主將後行己午限見日如或金水木土與日同宫為科名科甲官魁福禄遇太陽必伏諸星必無光也月兔無光晦朔倚日人命生於晦朔命在月度此時月與日同會若日月前後有吉星必吉凶星必凶設若日近火羅土計者凶日近金水木者吉也河漢艮坤為士必秀河漢者天文也秀士者人文也河漢始於丑寅尾於未申如人命在此宫者必為秀士丈人次則戌奎亦然煞尅於奴本主自旺如人行險阻而遇賊必先將奴僕殺傷而本主得免也如木為主金為煞金不尅木而與炁同行是與炁相敵而力不及木矣而本主之木得自旺也餘奴犯主縱吉為凶如木為星炁為奴木主與炁同非享福發財之命甚則早夭若生年帶煞十凶八九限遇煞奴十難一免奴星敵煞如木為主金為煞炁為奴限行見金煞又遇炁奴三合無水火救之十難免一又云如金見火為煞限行不見火見羅為煞之奴星亦不免也母無餘氣藉木解讐此言己申與箕壁之水宿以金為母金無餘氣得木氣居於强宫以尅制土計之仇謂之子能敵鬼與母力一同也煞無餘氣逢火灰燼此言木為主星金為煞而無餘氣若行火羅亦能焚燒山林每於金煞也正煞暗生轉禍為福正者正盤暗者加盤天機禍福多在加盤如子上立命以土為主行限寅見木為煞如是暗盤巳上有火在焉木生火火生土為暗救有力又如戌上立命奎度行子限見金如巳上有水暗中有救必能轉禍為福也正生暗煞化吉成凶如子上立命土為主行寅限見火而生若巳上有水孛傷火乃暗中受傷也朔望食神陰陽非利日食朔月食望如日正食之時而人生在四日度日既食而無光此命豈能有福如望夜之時而人生在月度中立命亦然也界限中安離家遷祖所謂界限者天文本無界限而人有之如軫十氐二之類立命於此者多出祖過房依於人否則不住祖屋還移不定若諸星多在過宫上亦主不安也上盤下局加合參商命書所謂天宫地位十二辰消息其中全看行度則於加合之中宜細推詳有加著加不著宜觀太陽過度二盤尅合子午卯酉之正各於上下二盤寫一星然後以一星加合則上盤下局之星加合瞭然可見生我尅我在與不在合與不合宜詳之釣合衝臨分擘闊狹此即同宫千里異宫尺寸之説所謂釣合者申子辰之類衝臨者子午卯酉對衝之類如立命在子火在午吉木在午凶萬一命在女四五之間木在張十二三之間照命度不及豈能為災若木在栁七八度正照則為禍必矣餘星闊狹亦宜分擘筭之二十八條斷例四正宫神互相管攝四正者如日之虚房星昴木之角斗井奎之類互相管攝凡看星辰先看主星落何方有何生尅制化若論凶吉合依星辰而斷同宫千里異宫寸尺且如子上立命女三至危十雖是同垣何止千里若危十一危十二子上立命視亥上危十三十四有尺寸之隔此何可以異宫論也他倣此二母爭權姑息太過如木星見水孛或臨本宫三合獨見方為福若同見二母爭權反為禍餘倣此一星得地初無二用或土宫立命或命主土星在别處三合見火生本吉設若三合火見金火性炎上便去尅金却不能生土餘倣此水火相戰其勢俱敗如水命火同在命或三合或十五度之内相照雖火受水尅火亦不寧其勢俱敗餘倣此日月爭權到底無光如日為命主夜生本無光或與月同宫或見三合月為命主日生本無光或日同宫或合照是自爭權無成於福氣禄嫌衝破衣食艱難如甲坐人禄在寅立命在申祿當頭為命衝破終是艱難奔走限逢之亦然餘倣此馬忌空亡衣食奔波如己巳生人馬在亥行限至此或命身值此更加以凶星守照必生受餘倣此母主無權福氣不大如命在子土為主限行遇火或三合為水孛所傷其母受尅子必無力福氣不大他倣此向前得力再後無功如命在亥木為主行子限三合見一水單行必能發福若人行限到辰再見水孛必無再發之理若是無形終難制有五星乃有形餘氣無形五星相尅此理甚明如炁近上孛近火乃餘氣侵有形其力終緩或戌上立命命主火星在子金水同宫辰上雖有氣亦難化水生火之理况子宫水旺之地其火受尅不淺以此合言夭命他倣此黨惡則亂制惡不行如木命行限遇金木自受尅加土計臨三合助威為煞氣重若同火羅則制其金惡不行矣獨陽不生孤陰不成若男人命遇太陽居四正為得地左右無吉星三合又無為獨陽不生女命遇太陰居七强亦得經入廟三合皆無吉助為獨陰不成為事多尅戰無成男命看四正女命看七强刑囚入陷縱惡難施如甲生人命在戍火為主水化刑本能尅我三合有土計制之或水入陷地彼受制之不暇豈能施惡於我哉或土計自陷又恐不能制水暗耗雖强逢生反益如甲生人命在酉金主化耗限逢土計不以為耗又如乙生人命在亥木為主化暗得宫有水孛生之其暗反明四正日月最怕西沉如子午卯酉四正之地為日月之垣獨酉為西沉之地若日月居其上終無顯達三方禄馬最喜拱照如乙生己酉丑之人命在未馬在亥禄在卯三合拱照一生衣禄不少此論地元禄馬安身傍母福禄尤佳如土為命主火為土母月火同宫不以傷身論又如命在辰金為主土為母身與土同行不以蝕月論乃富貴格局奴賊臨身妻兒必尅如寅亥木為主炁為奴星若炁與月同行或傍其人必孤又如子丑土為主計為奴若計與月同行或傍其人必受刑傷不然必夭餘倣此主數遇陷有救不凶如木命人木陷于子或入金宫化刑囚或值命限到此本受尅縁三合有水孛能觧金厄轉凶作吉但未免勞心耳母若當權為福莫大如子上立命土為命主以寅卯為福官之地若有一火羅獨守在上是母當權大吉餘倣此同室操戈必遭禍變如立命在子不問主星客星但有水火同垣金木同位雖彼自相戰尅與命宫不相干終是窘我室廬禍起蕭墻之内也飛星破駕終是廢人凡論命必殿駕為先假如甲辰生嵗駕在辰金為駕主辰酉立命金為命主若有火羅飛入辰宫乃為害曜破駕必賤人也餘倣此刼煞抗衝威烈以怒如壬子生人命在已乃的煞之地更有刑土刃星居其上是謂煞見煞行限必夭三元並駕禄又加官如甲子生人禄馬俱在寅甲生人又以木為天元是木為三元若臨身命必顯達子丑午未命凶相順相生當觀向背如立命戌火主入丑宫躔斗九度又有木躔斗十此謂之向發福必大若火斗十木躔斗九謂之背雖發亦輕相順相尅須驗實虚如命在已水在申躔參有土在辰躔角彼自受制安能尅我若有木炁臨照彼虚我實矣土若躔氐更有火羅合照助其實是彼實我虚矣行限至此必夭若其間有金照臨又能生我之水反凶成吉原守推詳流年尤急經云原守雖然無咎流年尤怕為災此二句不可忽之且如火為命行年水星到命限焉得不為禍占煞尤重步天經序大凡論五星先以本主為重然本主强弱闗係輕重而命母厚薄亦闗係輕重命母固有闗係而身宫尤為切要命本既弱身主有失雖命母不能以救其為夭折必矣命主之弱身宫之陷得命母之力以救之却能易危為安𤣥齋所謂論命主須論身宫又當論命母三主不陷不弱其為富貴格局明矣其次則論福徳官祿福氣重則享福必厚官氣重則名位必髙又其次則論尅我之星他强我必弱他弱我必强彼既伏降我方得以施其志耳他若强梁負固必能為我之敵我自受制之不暇何暇為人福哉蓋三方四正當看拱夾之何如然三方四正又不可以一槩論若論三方又論四正不無泛雜蓋子午卯酉生人於子午卯酉上安命便當以四正為重三合為輕所謂太嵗宫神互相管攝是也或者又曰四正無星便觀三合三合無星便觀四正亦是一說設若生於子午卯酉坐命於寅申己亥辰戌丑未又以三合拱夾㕘看不必專論四正也十二宫中皆効此例𤣥齋曰專以宫主斷人之禍福則二十八宿躔度不必論又何謬乎蓋二十八宿天經也金木水火土五星也四餘乃地緯也常相脉絡互相往來二十八宿實於五星有所闗係且如子丑宫乃土之位子宫有虚日危月又是一家之閫奥如隔界又是一家藩籬也吾家所主却以土為主宰焉得不以宫主為重度主為輕所主却論度以此觀之萬無一失蓋五星之中木怕炁火怕羅水忌孛土忌計此理甚明如子宫安命所怕者木假如行限到木便觀木起何宫躔何宿若受制坐陷皆不足慮若居生旺之地豈不為我撓不待三方四正照著皆為禍患如或拱夾臨限災愈重也其餘皆効此例十二宫中獨有午宫星日馬有五數正是人君九五之位安命於其上主生平為人寡合作事無氣不能勝任大事若有凶星惡煞居之皆不能施其凶惡天下自古無臣犯君之理也如危月張月心月畢月乃后妃之殿安身於此必主聰明膺富貴又如安身安命於觜火觜星天上無曜不能安載其身主人生平飄泊無有定居鬼有二度號為天眼此上立身安命多是奸雄冦盜之流蓋星辰吉單行為福愈力如是凶星惡煞三方為黨自相鬭戰又不能為禍若有一黨惡其為禍莫大焉大凡星辰在天激之則變如安於垣安於駕升於殿其性雖惡亦善耳又不能為禍也且如安命於子午卯酉乃四煞之地桃花之位男人安命於此必能誇逞英雄躭迷酒色女人安命於此過於伶俐酷於貪淫寅申己亥為四馬之鄊不問男女皆不閑逸多受艱苦辰戌丑未乃為四庫安命於此處性晦迷多是尅戰孤寡故𤣥齋論有十忌一忌破禄二忌空亡三忌太嵗當頭四忌閑神入局五忌飛星破駕六忌客曜臨朝七忌吉星背行八忌背宿入命九忌女帶男星十忌晝行夜曜犯此十忌如有吉星扶之亦不能為吉小兒闗煞莫若三六九十二之煞為是士夫功名便以天馬運行為凖男人無婦皆縁身命坐孤神婦人尅夫大抵身命居寡宿僧道格局多於華蓋安身娼妓貪淫並以冠帶安命又如立身于午未分明以金水日為富貴若背行於辰巳雖有官亦卑若向於申酉其為官必顯若遷官轉職又以天馬加流年而數之若帝旺長生必有遷轉若休囚死絶必罷職剥官論其造化其應如響其流年禍福看大小限有何星辰臨照吉星臨之則吉凶星臨之則凶便以一太嵗二太陽加減而論遇官符則必有官符遇嵗破則必招破財其餘十二煞神推筭禍福無不明驗後之學者可以寶之然其術也源髓老人得之於𤣥齋𤣥齋得之海上異人故以此為序以為星家之衣鉢云步天經警句十二宫中何所忌加臨原守細推求寶瓶最怕飛來木紫炁臨之不必憂丑宫又喜金臨照木炁分明是我仇大喜火羅為福氣若還水孛轉為仇𤣥齋曰子宫怕木却不怕炁何為喜炁以炁竊木之氣是以木不為患多有癸丑生子上安命有炁化囚者在命發積如丑宫喜金怕木炁蓋金為官禄以尅其木與炁之仇况丑為金局又與子宫不同然其所喜者火羅所忌者水孛盖火羅乃是吾家之命母水孛乃吾家之賊也寅宫亥宫皆屬木惟有水孛能為福逢金端的是焦枯遇火亦能為惡毒寅上火羅俱不怕羅㬋能煮雙魚腹更嫌土計兩陸梁設若侵垣多不足𤣥齋曰二宫屬木所喜者水孛所忌者火羅金此説誠然蓋木有二説亥上冬令之木寅上春令之木冬令木火羅焚之其勢衰敗至於春旺之木雖遇火羅不能焚之是所怕土計則一也土計是吾家賊焉得不怕卯戌二宫皆屬火卯宫與戌不相同卯宫不以羅為忌戌上逢羅定是凶最此兩宫喜木炁但於水孛莫相逢火命若還逢木炁必是當年運限通𤣥齋曰二宫皆屬火喜木炁亦喜土所怕者水孛金也金能黨賊為凶人能制吾命母之木炁也若羅則二宫所怕者不同戌上最怕羅如在子丑之間化土亦無妨害寅亥逢之必夭折卯宫之火却不忌羅蓋火敗之地反為救而不為慮也辰酉二宫從太白却於取用有差别酉垣最忌水孛侵水孛必能為我泄辰宫又喜水孛逢若遇火羅必消爍土計能為命母星木炁閑神何所說𤣥齋曰辰酉二宫皆屬金喜土計但取用不同金旺到酉怕水孛泄其氣辰宫水局喜水孛滋潤相生忌火羅喜土計此兩宫功用皆然若夫木炁雖是財亦能為命母之蠧號為閑神忌曜申巳二宫皆屬水申宫獨得水之清西方專稟金之氣何怕當頭土計侵最是已宫憂土計晝生尤怕火羅臨二宫之水皆防孛若遇刑囚禍轉深𤣥齋曰申巳之宫皆屬水申宫乃金臨官之地怕上計輕已宫乃四月之水怕土計重二宫最怕者孛也孛為水餘能泄水氣若夫已宫之水忌者火羅申宫之水忌者木炁火羅炎炎能燥其水木炁閑神能泄其水所以忌之獅子之宫有太陽明知金水必為祥至尊之地皆無忌只怕當年木作殃炁乃餘星何足畏無形安得蔽其光秋冬行令俱零落春夏之時乃受傷𤣥齋曰太陽之位不怕火羅計孛最忌者木也木乃八煞之主能蔽日光秋冬則枝枯葉落春夏則葉茂枝繁却能遮蔽日光紫炁乃木之餘宿在天無象焉能為害多有癸丑生人炁在申遇此限亦有發者縱不發亦無大禍獅子分明怕木星我之所喜水和金申宫見木災重疊木到金牛禍不生酉限當頭逢卯木加臨照命却灾迍金星入廟如生旺限到金牛禄福臻𤣥齋曰此一段専言午宫安命人最以木星為忌行限至申申上有木必主重疊之災至於酉限是金為管攝若有木木到大梁無忌不能為灾於人更看金在何處如入廟生旺必能發財若是木在卯加合酉或三合四正照之却生禍碧玉經云木到大梁畨作咎是以木為主者言非指午宫命也未上分明是巨蟹獨以大陰為主宰喜逢木炁火羅星土計却能為蝕晦躔在心張危畢地夜裏生人尤可愛土星若健木星弱生平反覆多成敗𤣥齋曰未上月為主怕土計若木炁强何憂乎土計木炁弱土計强未免成敗若躔四月之地其福於人可知矣命入寅宫多口舌罵人罵鬼無分别為人清秀更文章身命因躔壁奎列立命若居心與畢止堪巫覡并才術安命室火定為災回禄多遭家業失𤣥齋曰寅乃喉舌之府奎壁乃文章之宿安命於寅必多口舌罵殺時人若在奎壁則為文章之士也又如心月狐畢月烏諸星中甚有靈性立命二宿主多才藝堪作巫醫卜筮術數之人若室火安身則多回禄之灾生尅星辰固易言若言制化誠難取申命不怕土居酉酉命何怕子上火酉宫有土土生金子宫有火火生土縱不為福亦無凶十二宫中皆倣此生尅制化理之自然且如申上安命水為命主所怕者土也設使土居酉此土能生酉金金盛水强反吉若不為福亦無禍及人若土為忌在戌却有火生土以黨凶神為害己甚餘倣此推之假如命在亥中居却有金來窘室廬三合加臨無救解分明最喜炁之餘奴星反與敵相抗本主依然得自如更得木星强位立福根反壯禍根除𤣥齋曰亥之為命木是主宰最怕者金也如有金星在命或三方照或行限臨之却有紫炁合照加臨乃木之餘氣抗金之敵木之本主却無傷也如更木星入庫旺必能轉禍而為福日月雖為原守星最嫌日月兩同行日無晦朔皆明顯月却無光借日明若是晝生為福力設逢夜誕斷無情術家何可一概論當以晨昏論重輕月本無光借日之光日無晦朔一般光明月有盈虧難與同論晝生之人月借日光多有權福夜生之人日既無光月安有輝晝生月為命主怕與日同夜生日為命主怕與月同有此必廢人也此指日月同宫論火忌羅㬋木忌炁水怕孛兮土怕計假如立命子丑宫木炁同行何足畏木星只以炁為仇那有工夫侵我位羅火單行誠可取同行端的無生意𤣥齋曰土之為命所怕者木炁也若木炁三方臨照或同躔共度木炁自相仇耳何暇為我仇哉又如火羅為命母若單行則吉同行却不能為福二母爭權姑息太過是也餘依此例最是火羅為性決若逢牽惹便能燃土宫坐命限到卯恩地官鄉喜兩全更有火羅臨正合驟然一發必滔天如逢水孛來加㑹夭折貧窮在少年𤣥齋曰火羅之為宿與他宿不同牽惹便能燃燒子丑立命行卯限火垣恩地必能發達更有火羅三合四正臨之必主大發如逢水孛決是貧窮夭折在少年見之水星為性愛流東限路循行最喜空除是金星生則旺閑神若阻不能通月金若是三方照為名為利若御風秋怕孛星春怕土混居雜處必無功𤣥齋曰水之為性疎則決窒則塞此理然也如以水為命一路行限三方見金見月便有生意其發可知其餘火羅能燥水性終是作事蹇滯若春逢土秋逢孛亦為禍也土孛從來最破官單行作黨一般看九流藝術為倫品雜學多能不一般若在長生多智識若居死絶又艱難若還木炁臨身命便作巫醫格局看𤣥齋曰孛星主巧土星主多能官禄乃官星之地如有孛土二星或單行或作黨破我官禄便是九流人物其人多學多能加之木炁臨照便是師巫造化更加白虎胎神臨之必罵神罵鬼妄談禍福之人也日生専取日木土夜生却以火金月若是當年有用星以是發用皆無阻設若閑神無用處背時生旺皆為禍却將晝夜細推詳不宜拘泥三方主𤣥齋曰日生論日木土夜生論火金月此理明甚假如土之為命若是晝生遇火是有用之星必能為吉夜生遇之愈見光彩不分晝夜皆能為福如是晝生金神當道乃閑神非惟泄氣又能為禍却不可以三方主為拘泥故曰女人最忌男人曜日裏須防夜裏星行限須防太嵗衝不能破尅亦能凶若還灾病重重見行限亭亭在此中要免此災除是喜喜神當道煞逢空若從太嵗上行限災難無侵禍不逢𤣥齋曰太嵗當頭立諸神不敢當太嵗之神大可畏也行限若衝太嵗必見破必見尅若在中心對衝尤為利害自古道喜神壓煞除是喜神可以壓煞也設若太嵗上行限又有喜神而無凶厄術者不可不詳吉曜未來先作吉凶神過去始為凶先前見了曾為福此後相逢定罔功假若火人行水度須看水起在何宫若躔旺位興災害死絶休囚方免凶𤣥齋曰人之命且如辰鄉有吉星為福主卯限末便有發用起來至於行限則是受用了設有凶星在卯正在卯限不能為禍過卯交辰方有餘殃如子上安命丑上見火見羅初年必發一段福力至於辰巳二限三合四正再見必無再發之理如水行過不必重見又如卯上安命行軫水限最以水為忌如水生於申旺於子他得勢我必衰微受制宜矣如或敗於酉制於土局彼自受制豈暇為禍初不待三方四正見之皆為禍福於人煞神為煞最難當煞地無星不必防更有凶星來煞位相逢必定見災殃閑神入煞何干預吉曜臨垣始吉祥若遇空亡難著脚斗鄉午位更無傷𤣥齋曰申子辰生人刼煞己寅上安命最怕逢金乃是金生在已逢此煞能為然爾若煞地無星不須防也若是閑神居之與我無干亦不為禍設若水孛居之反為吉祥如甲午生人辰巳為空亡縱有惡星居上亦無所施其惡餘倣此南斗之地獅子之鄉煞星自伏何暇殺人隔角星辰相照應往來經緯可㕘儔本宫原守當研究莫把加盤探隠幽天地人盤多錯亂恰如樓上駕髙樓若還無曜當加合既有星辰莫逺求𤣥齋曰天地盤加合不必過而求之如本宫既有星辰三方四正可以㕘詳如本宫無星辰便當加天地盤以驗吉凶最是十二宫隔角上不同三方四正俱照得著子午卯酉為四煞喚作闌干併貫索子行卯限定遭灾午命到酉難著脚行限若教逢惡曜人離財散家消鑠此闗喚作鬼門闗十有九人難過脚𤣥齋曰子午卯酉乃黄泉之門亦是貫索闌干之煞如子上安命卯末端的一闗午上立命酉末端的一闗及有凶神惡煞臨之其死無疑如無凶神惡煞亦難迯一險卞試九驗有如影響主星若是朝君位定是當朝作貴臣設若母星依日月必能大富潤其身崇勲嵗駕相闗攝日月朝之定出倫若是凶神侵禄駕陰陽相拱反為迍𤣥齋曰假如亥上安命木為命主若木起朝君居前為引居後為從似此必是朝貴之命更兼水孛强健便以貴命論若是水孛依日月却不能貴是為大富造化或有陰陽拱禄必致富拱駕必致貴如拱忌難星必見破敗其命徒然得貴人敬重不得貴人之力若論功名何所據甲人端的將金取先看官禄次臨官又看此宫星所制為官蹭蹬老無成第十宫中逢難火爵星若陷印星制懦弱無權椎且魯𤣥齋曰多有人以科名科甲魁星官禄定人之前程不亦難乎假如甲人以金為官星金星受制於火雖是官職未免蹭蹬無成若使官星髙强爵星印星弱陷是為人真閑懦耳官星為上禄星次之其餘不必論餘依此斷無不明也官當遷轉論官星財主尊隆定富人財若壓官官不顯資財必重決名輕官星若把財星尅縱合為官徹底清兩主相生俱壯健必膺富貴一般榮𤣥齋曰為官必看官禄主論財須論財帛星財星尅官星宜致富官星尅財星為官清要財官比和無相尅戰是兩全造化富貴命也安身安命如向貴職掌文書為吏輩命身若在貴人邊職在堦墀無坐位若是刑囚破貴元為胥不了終編配貴星生我我星强出入貴人終見愛𤣥齋曰如人身命坐貴能為貴人如向貴近貴是曹吏造化此最有理如丙子生人申上安命水為命主出門逢酉上之貴酉上或三合逢金貴人必然敬重六丁生人以孛羅為刑囚破貴如在酉上必為編配蟲蛆之人行限逢之必然不利有甚星辰能致富不論田財先論庫水人端的在辰宫破奪侵欺財不聚財帛宫神不必論若還木命須觀土生成旺相必興財若陷刑囚拘不住𤣥齋曰水為命庫在辰最怕凶神破庫又怕金星泄庫所怕者金氣也餘宿侵庫者紫炁也有此星辰在宫生平不住財惟守耗財而已若是孛為福禄守辰宫必得婦人財亦能驟發又看土在何宫居財帛有氣更有火生土必發財若居陷弱不會發財却更破財餘凖此也得富非難得夀難夀星須把令星看令星若起逢生旺夀筭巍巍等泰山不怕尅星惟怕煞根基淺薄福闌珊縱敎主曜逢生旺也作顔回夭夀看𤣥齋曰令星者春木夏火秋金冬水土在四季也論令星生尅以此占人長短盖金木水火土在人為仁義禮智信俱能致夀如令星入煞必是夭折之命若不陷于休囚死絶而入於長生帝旺臨官無不長夀嵗星最是分凶吉却把令星明得失令星若陷嵗星强創業為艱却富室嵗令二星俱明健富貴榮華無勞力更於命主有相闗係是人間髙貴格𤣥齋曰人之造化最重者納音次重者令星此二星命中根本若髙强壯健更與命主有相闗乃是人間上等之命若嵗星强令星軟柔終能致富難享見成令星强嵗星弱成敗進退人也最怕閑神來守駕又怕淫星奔坐馬更忌飛星破駕勲尤嫌餘宿侵吾舍背星入限黯無光孤曜當頭孤且寡陰陽無輔各單行到老艱難無片瓦𤣥齋曰閑神守駕是外人當權我何氣力淫星坐馬是妖邪無制奔走不停飛星破駕禄則惡曜占强餘宿侵本垣乃小人用事背星入限謂之失時孤宿當頭謂之無伴獨陽不生孤陰不成所以到老艱苦自古男兒志四方主星不喜庫中藏主如入庫為人晦縱有文星也不光獨有婦人偏喜此為人守志在閨房若還孛彗來侵庫奔走他鄊自嫁郎𤣥齋曰庫者藏也男命主星入庫縱能為官亦晦女人主星入庫必能守志如有孛侵庫必發淫奔之興先賢以為彗星宜也坐命如居四馬宫動摇不定颺心風田財二位如逢此成敗興亡頃刻中若是女人臨馬位嫁夫招婿必重重臨官帝旺那逢著多是踰墻暗裏通𤣥齋曰四馬之地不宜安身立命男子得之主心不定田財二位逢之各有動摇女人於上安身立命必然招夫疊疊若是臨官帝旺相逢更主淫蕩盖寅為人馬申為陰陽已為雙女亥為雙魚皆犯重疊耳賤人格局是尋常安命安身細酌量若在馬前并馬後主星受制暗無光更嫌奴宿侵吾舍奴隸為驅離逺鄉縱有吉星來救助亦須植立傍人墻𤣥齋曰賤人之命如在馬前安命馬後安身多是賤格如甲子生人或卯或丑上安命是馬前後也若是火為卯主土為丑主失陷本為奴隸之命又若計丑羅卯必為驅使奔走他鄊是為馬以攔趕爾設若有吉星救助亦傍貴人門墻終是無植立餘倣此男命須防八煞星女人切忌刃鋒辰煞星照限遭官禍刃宿傷人亂血經受制不能為我撓黨之愈重見灾迍男逢陽刃女逢煞縱發為災亦少輕𤣥齋曰男怕八煞女忌陽刃八煞主官灾陽刃主産厄此理甚明男逢陽刃女逢八煞却不為害也那箇合為僧道格分明木炁為孤尅不於華蓋上安身或者孤神為命宅若是木羅相會遇終身只作山林客炁星在命好安閑亡刼臨之閑不得𤣥齋曰人之安命若在孤神寡宿之鄊又如木羅相㑹天華地蓋合照拱照皆是僧道造化如亡神刼煞在命雖欲閑散不可得也且說夫星是尅星髙强必是聘賢人若居父母并兄弟端的因親上致親以我生他為子息若他陷尅必無成我之尅破為奴婢他若髙强必弄權𤣥齋曰尅我者為夫星我生者為子我尅者為奴婢此理甚明若是夫在强宫必招賢夫若在兄弟父母之宫必因親而致親此議論不可破人皆以妻妾男女僕馬宫不若此之為真學者可以知之如是受尅之星髙强必招妾弄權也水金原來是情星相順相生必有情中有閑神來間斷為人刻薄義恩輕女人却把為淫宿生旺其間必雜行若是朝君居嵗駕君前父側不行淫𤣥齋曰金水二星謂之情星可相合而不可雜如有相順相生必有恩義如有一星間斷於其中必無仁義之人不問何命當以此斷女人反是當以金水星為淫星金水分明非娼則婢如近君嵗駕則不然以此用之萬無一失多是女人為水性水從上下多淫佞羅㬋相向逆而行血經來往為無定火孛同行午未宫到老已招勞倦症設如八煞遇羅熒胎前産後多灾病𤣥齋曰婦人最以火羅為忌火羅主血經也羅若逆行自辰至巳必是月經不定設若水順流而行為人必主淫蕩火孛同行於午未之宫必招惡症設如八煞逢火羅胎前産後必致多灾只為八宫見灾那見婦人好淫冶不怕貴人不怕馬身宫若在冠帶位臨死好淫重疊嫁更加火孛惡星臨月下花前多引惹不為婢妾也為娼亦是人間女豪霸𤣥齋曰婦人淫蕩非惟貴人驛馬最怕冠帶安命不惟重重嫁夫乃淫慾不止婢妾娼妓之命最怕小兒逢直難刃兼刼煞不須嗔甲壬戊子從申起庚丙旬人數起寅數至本年方是數三九六十二為真小兒若是逢斯難父母徒然生此身𤣥齋曰甲子壬子戊子旬生人從申上起子去未上逆數至本生年住庚子丙子旬生人從寅上起子逆數至本生年住却又從本生年起自一數至本年安命宫住若逢三六九直數也更逢直難其殺身必矣此乃休扣和尚秘訣五黄係是朝廷客三碧臨垣多破尅為人清貴有文章六白一白并八白生逢四綠必為災口舌官符為七赤九紫山林客散人壓身破相為二黑𤣥齋曰此乃方道之書一白主人秀氣二黑宜為僧道破相可免三碧主人先破後成四綠主人多灾病破祖五黄主貴七赤主凶狠為軍卒九紫主人清間為山林客以上起法從太嵗順數至命宫住看發何數以定白黑而論禍福謹按六白一白八白者以洛書乾坎艮之數也五黄者中央之五也九紫者離也三碧四緑者震㢲也二黑者坤也數以北方一白為最美故主清貴文章五黄為黄中故主朝廷貴客而三碧四緑二黑為凶其法起太嵗順數至命宫四仲旬生人起坎四孟旬生人起震四季旬生人起坤而逐位飛數至本年遂起一白數到命宫是何色以斷吉凶此法以後天之八卦與洛書之數相為經緯以之㕘看人命不亦備與論倒限太嵗為衆煞之主統衆煞行於黑道中所以為灾不違時刻看人夀夭窮困終身不吉皆因身命宫位日月命主俱落煞鄉更煞神拱夾又占髙强縱或得福皆非横中得財然限入煞鄉未免死於非命或吉為凶神所惱凶為吉神所臨刑害可知宜加詳審故有十忌一忌破禄二忌空亡馬三忌太嵗當頭四忌坐煞向煞五忌煞星得志六忌限入鬼鄉七忌粧成鬼局八忌二煞夾限九忌命主受制十忌母星尅令立命行限此十忌為凶至慘經云夀元不永定休論處世多屯常冷淡若見當生日月命主俱各受制大限方入煞神之初或出煞神之末不見救星未有不凶者今分諸煞强弱為詩二十首于後刼煞原來是煞魁身空命主不須來若為鬼局應當死煞曜臨之不必猜若是無星居此位更於三合細推排天盤加得凶星到命似風燈不久摧要知三煞最為凶直難同臨不善終三合無星更須忌煞星切莫又相逢若還日月同居此官禄臨之禍愈隆大限相將離煞尾黄泉之下定行蹤煞中陽刃最為凶身命同臨主破刑大限若交當畏懼煞星在上恐難行若無凶曜尤當忌局勢㕘詳判死生三合更加神煞拱纔離陽刃入幽㝠皆言七煞是亡神莫道亡神禍患輕身命若還居此地貧窮蹇滯過平生凶星惡曜加臨到大限渾如履薄氷三合更須明審察煞來夾拱更難行巳中的煞金生處殺氣嚴凝人畏懼莫教刼煞又同宫便主黄泉尋去路若為水命土星到粧起煞神真局勢世人莫只忌秋生四季生人尤可畏酉中的煞旺中金金氣秋霜殺氣深陽刃若還同到此煞星日月不須臨若非惡死便言夭大限纔交便促行太嵗當頭又衝動此身安有可延生的煞如逢在丑宫煞神歸庫不為凶更加三煞并陽刃限數存亡頃刻中若是亡神煞星到雖然不死也為凶若為日月三方拱禍患憂危更不同限星不入煞神同日月三方拱更凶刃煞夾之尤可畏天盤加到福重重午宫坐命尤嫌木亥上還為八煞宫不必木星同到此水星若到亦當終局勢尤當子細推世人不識此天機煞星不到還須忌鬼曜臨之限亦危設若太陰居鬼局纔交限局便傾危更加刼煞并陽刃煞在天盤禍不遲星家倒限有真機第一先將煞曜推切莫一途拘泥著須看命主有無虧命星安穏無刑尅此生平善實無疑若為命主遭他害任是仙神也皺眉欲識煞神停力處二煞中同人畏懼更看加合反復宫煞神飛到誠為慮縱然煞星加不臨須忌行年太嵗侵行年煞星照臨著大命傾危不可禁刼煞怕頭三煞尾陽刃兩頭皆要忌陽刃若在相貌宫破相毁形端的是此煞排歸八煞中太陰飛到為凶比陽刃刼煞扶兩旁禍起之時難可避煞若飛廉凶又凶莫安身命在其中欲知鬼局十分重命主陰陽不可逢此煞不須和合看只將地局究其功若還行限臨其地煞曜臨之不善終煞神不可例言凶煞落空亡逈不同日月不臨命不到煞星不在命無凶若還限脫煞星尾必定為灾福不隆此是天機真妙處根基淺薄禍無窮煞星難曜分生旺春夏秋冬子細推若是煞星來秉令也分晝夜論安危若為反背須還忌夀算摧殘禍有基衆煞下臨人畏懼此身安有百年期寅丑二宫中立命陰陽合作難星看夜陽晝月誠為忌煞位相逢限不安若在貴人并禄上也須減力命凋殘若還煞拱凶尤甚限數初交死不難若論閻浮死惡人命身俱各值凶神煞星入命命入煞日月臨之必害身更怕煞神來拱夾刑囚為煞更相侵必然死在刀兵下命似殘花滿地零人行空限無星照限若無星福不生加合通闗煞神至煞神在上恐難行非惟貧困多凶禍破蕩田財似水傾限度若臨天命絶縱然度得也伶仃煞曜從來怕冷窺飛來落影是真機若還大限行臨此陰府王宫立限追餘曜為凶凶更甚度躔黑道禍相随五星為煞分强弱受制還須見福遲日月同居官禄宫限星入此福偏隆若還入到中間度稱意中亡總是空不必煞星并煞局刑囚為煞更相攻欲知倒限真竒訣驚倒人間學術翁雜論倒限限度尤防真照臨如限見土度忌見真木加以限主宿弱倒限流年煞星添力亦然三合尤切限度防戰鬬火頭孛尾皆為大災若計孛凶星一迎一送決主倒限本宫三合子細詳之亦有當生限無星辰被流年凶星尅倒者凶星戰鬬者如火孛水計計孛孛羅等亦倒限人命忌星行限十有九凶日生火夜生土為煞則灾重納音逢奪必有重灾限行到此度為煞必死為主之星不論化氣㑹主之星復論化氣煞星若化吉為禍亦輕若化凶尤緊母星化吉為福大化凶為凶亦緩照命限者生尅至緊加盤例亥加申子加酉丑加戌寅加亥戌加未卯加子酉加午辰加丑申加巳未加辰午加卯巳加寅加盤之法決要天地盤各有子丑寅卯辰巳午未申酉戌亥且如立命子先以天盤卯對地盤卯然後寫十一曜在地盤上且如火星在地盤夘天盤卯亦相對寫一火星諸星并要上下盤各寫一星却以天盤卯加子依此決斷無差也餘尤奥妙詳見十二宫安命論通闗例未闗申午闗酉巳闗戌辰闗亥申闗未夘闗子酉闗午寅闗丑戌闗巳亥闗辰子闗卯丑闗寅從卯上起子逆數以丑闗寅以寅闗丑夘闗子辰闗亥巳闗戌午關酉未闗申申關未酉關午戌關己亥闗辰子卯相通丑寅相通辰亥相通己戌相通午酉相通未申相通如人立命子通闗夘若卯宫有禄有殿駕有火羅命母則一生吉利如通刃刼破碎有煞氣鬼星則一生屯蹇學者宜知之星學大成卷十
