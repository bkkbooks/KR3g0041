body:
  text: 星學大成卷五明萬民英撰宫度主用二十八宿所屬宫度詩角角木之度本居辰春則木兮秋則金不怕金星為惡曜限中只怕火羅侵亢從來亢宿屬金垣四季元來受氣全最怕火羅為忌賊同臨煞地夭天年若遇水土能為福氐四季氐宫作土看餘時只把火相參不怕木氣為凶曜水孛同躔主命難夏令只把火相兼辰戌丑未月作土房房日元是火宫神最嫌水孛損其身命限忽然逢木氣資財積聚福昌榮心心度元來屬卯宫晝生亦與火相同夜間是月君須記子細推詳斷吉凶心度本是火之餘上弦下弦倚月推尾尾四度兮皆屬火入到寅宫作木推木怕金宿火怕水彼此分明更問誰水土相逢能為福氣金若遇禍相依箕箕初是木餘是水土計同行為煞鬼春間便把木參詳不可一例言生死斗斗四寅兮是真木丑宫木土兩相關餘時四季皆言土惟有春生作木看斗四至十春木推餘時及牛全作土牛牛星原不是真星躔在丑宫變土星却喜火羅來尅我限逢木氣定傷身女從來女度皆言土升殿歸垣喜北方若遇火羅多發福如臨木氣定招殃虛虛躔是土報君知水氣相逢定失尸若遇火羅能發福祝君細認莫遲疑危危初五度土一般十二度後太隂看若生四季皆言土晝夜參詳莫道難四季之晝以土論夜生月論室室十八度皆屬水土星亦合能為福火羅若遇破資財限值氣金是真煞壁此曜必是壁水㺄土計同行限﨑嶇火羅作黨六親尅夫損妻兮妻損夫奎奎二亥宫真木星戌宫木火兩相尋縱遇春生為木論限行水孛亦災侵婁婁宫戌上正宫神不是金星是火星不怕火羅來尅我但嫌水孛損其身胃胃四度分皆屬土酉宫金土亦分明若生四季皆言土秋旺餘時只看金昴昴為金宿莫胡傳土計相逢五福全只怕火羅為惡煞不居貧難夭天年畢畢六度兮酉晝金夜月不類同申宫水孛原來一般看上計相逢一例凶觜觜半度兮位在申宫中是水火無晶祝君只把水為主忌曜惟嫌土計侵參參躔是水在隂陽金星若會福祿昌金水主躔為上吉限逢土計定遭殃井井九度兮皆屬木未宫木月最難明春看木兮夜看月晝生木月一齊言合干音論之木星秉春月之令晝生合從木用不可言太隂也其他時節以太隂為主春夜亦作太隂鬼鬼宿元來屬太隂不分晝夜月當明最好金水來助月惟嫌土計恐傷身秋冬時節與金之干者安可棄乎金柳柳度分躔午未宫兩宫土論總相同惟有午宫嫌木氣未宫木氣半言凶星星日馬宫居正殿不分晝夜屬陽精火羅作黨六親尅木氣相逢是難星張張月鹿兮居午垣晝陽夜月兩般專若居隔界在雙女一例都言是月躔翼雙女垣中翼火蛇水為主宰是君家不嫌水孛怕土計金曜相逢實可誇軫軫宿分躔巳與辰二星皆是水之精只怕土計為凶曜若遇金星福更隆右二十八宿度主定人命當論宫當論度又以月令推論十二宫取用歌子子宫安命誠為土其取用者卯上火火為命母又為官又以羅㬋為次母母星強健福堅牢若在陷宫何所補最嫌木氣在高強化作刑囚傷本主丑丑宫亦是土之宫取用瓶中又不同火羅固是為吾母先以金星定吉凶金強金弱觀輕重生在秋冬更有功誰知寅亥關造化木氣臨之主困窮寅寅宫真是臨官木純以水星為官祿水星強健福堅牢太乙亦能為我福亥宫設有惡星臨限到辰宫當夭促此蓋丑卯最相關若論天盤當反覆卯卯宫乃是火根源命母當為木氣論獨有此宫無福德官星却是太陽尊多以木氣為功用水孛相逢不可言此星若在申巳上一生破尅沒安存辰惟有辰宫觀日月便將官福分明説土計雖然是母星最怕單行逢水孛熒羅作黨旺離方到此貧窮諸事拙亥卯二宫逢土計資財豐足無消折巳巳宫安命何處觀水為宫主水為官便看太隂何處泊最於福德有相關卯戌兩宫逢土計多災多難轉艱難若有單金在雙女逢生入局一般看午午宫偏愛逢金水金水正是為官福水白金清兩得經申酉逢之多富足宫神四正互相加最怕當年逢木氣此宫獨坐帝君尊火羅計孛何所畏未未宫端的屬太隂此宫最喜火與金木羅孛氣亦堪處土計凶神不可侵單火獨羅皆有用夜生最喜戌宫臨生於白晝無光彩縱禍於人亦稍輕申申宫隂陽分水局此宫最喜火與木土計分明是我仇戌亥兩宫為官福丑卯兩宫相脈絡更無疾厄無奴僕金為母宿若高強一世優遊無不足酉酉宫取號是金牛四正相加最隱幽土計母星好明健一生享福最優遊水清又是田財主設在高強富可求縱有火羅為我擾齊子之地亦無憂戌戌宫安命火之庫木氣母星喜相遇水孛此宫相臨著少年夭折多災苦卯巳兩宫相關係最喜當年官福地土木氣逢福又輕單行獨旺誠堪取亥亥宫為木號雙魚却於辰上默喜扶若還金氣相同角不能夭折定焦枯卯未兩宫真三合又與寅上著功夫此宫若有水孛照富可經營貴可圖十二宫主用變吟歌子水土元來旺到子水土如何可兼取危月乃知水之精虛日乃是土為主雖然如此分輕重當看歲君何黨與若是火土為納音此宫端的純乎土丑丑宫本以土為垣亦以金神論本源丑宫雖則屬土局金星是庫又是官土金兩般俱要論此宫最怕太陽臨寅寅宫屬木局屬火火土如多屬木行木氣設如居午戌此宫變局反為熒卯卯宫端的火之垣水孛臨垣又為木木氣臨之是火垣三合水孛為木局辰若論辰宫是水金更將水土相聯續一輕一重多難明更看歲君何所屬巳巳宫本以水為垣亦以金神論本源酉丑二宫逢計土定為金局更何言如無土計真為水餘宿間神不必論更值歲星為土宿一生飄泊不安存午午宫論日未論月却與他宫大相别此宫純看輔弼星相生化氣不可説未午宫當以金水言未宫火金不可缺歲星縱健不能傷却當於此分優劣申申宫蓋得水之真若論臨官又是金土計縱強終減力歲星是木禍尤輕木為官主火為福誰將木火作間神設如太歲真為水却忌當年土計侵酉酉宫金旺為金位最怕熒星為太歲若遇羅㬋照限宫羅中有計何足畏戌戌宫見水定生災子丑逢熒定為貴歲星屬土更為竒最喜此星逢四季戌垣端的逢熒惑此火尤存戌庫位亥亥乃木垣真屬木木星又在亥中安若還大限經遊處便作當生木主看惟此四宫無反覆間神限宿不須看十二宫各度喜忌説子宫虛日不論晝夜生以土論所喜者火羅若單行為福重雙行為福輕所忌者孛氣危月初度至十二度日生以土論所忌者水孛所喜者金月火夜生發福女土初二度至十一度以土論所喜者火羅為恩所忌者木氣為仇丑宫斗木四度至九度木正垣忌火羅金十度至二十二度以土論喜火忌羅木氣為仇三方合煞主夭折牛三度至七度忌木氣寅宫尾火三度至十七度以木論忌火羅金如行限見之亦主小災若見水孛土計主發福箕水二度至九度以水論忌土喜金水月孛卯宫氐土二度至十度以土論忌木氣孛喜火羅發福十度至十六度火垣忌水孛主夭折亦忌羅喜木氣發福房日火正垣喜木氣忌水孛金羅主夭折星月初度至六度以火論喜金木忌土計夜生以太隂論忌土計喜金水火月發福尾火初度至二度以火論喜木氣發福忌水孛夭折辰宫軫水十度至十六度以金論忌火羅喜土計發福角木三度至十二度以木論忌火羅凶亢金垣喜土計忌火羅夭折氐土初度至一度以土論喜火羅忌木氣巳宫張月十五度至十九度以太隂論忌土計喜金水月發福翼火水正垣忌土計喜金水月忌火孛羅軫水二度至九度以水論喜金月忌土計孛羅午宫柳土四度至十三度以土論忌木氣喜火羅金星日日正垣喜金水忌木氣凶張月初度至十四度日生以太陽論喜水金月忌木氣夜生喜火金月忌土計夜生逢木氣金月大發福未宫井木九度至十五度以木論忌金羅土計十六度至三十度以太隂論喜金水月忌土計主夭折鬼金月正垣喜金水月忌土計主夭折柳土初度至三度以土論喜火羅金忌木氣申宫畢月以太隂論忌土計金月主發福觜火以水論忌土計喜金月水發福參水喜金忌土計孛主夭折井木二度至八度以木論忌土計夭折酉宫胃土初度至十三度以土論忌木氣喜火羅金會命母主發福十二度至十五度以金論木氣土計發福火羅孛主夭折畢月初度至六度半太隂論半以金論忌火土計凶喜月水旺發福戌宫奎木二度至八度以木論喜土計水忌金羅凶夭折九度至十六度以火論喜木發福忌水孛凶婁金火垣喜三方木氣發福忌水孛主夭折亥宫危月十三度至十八度太隂論喜火月金水主早年發福忌土計為煞室火木正垣所喜者水孛所忌者火羅金主夭折土計為仇璧初度至九度木論喜水孛忌土計火羅金凶奎木初度至一度以木論喜水孛為福忌金羅凶陳都憲十二宫安命論理精子宫安命論女二度直至虛日六度帝旺之貴土也危一至危五度乃海涯之土危六至十二夜生人以太隂論為海濱初出之月晝生人以土論不以危月論詳宫主屬土最喜太隂在南方巳午未謂之安身傍母與火羅同行則吉遇木氣水孛為鬼黨其煞皆主不祥女土虛土忌木氣水孛出門行斗木度三方有三合拱照斗四便夭蓋斗度乃煞限見水孛為鬼助煞權如寅午戌上三方有火羅相引至尾火虎度亦還一發危土六度內外見木氣水孛不夭大難臨身復見計前迎必喪乃是奴星犯主煞難相逢見金水孛火徐徐而發見金生子禦鬼為福最大見火為恩限中如遇木氣要見火羅煞生印化無不發福危四至危十二太隂之議此以危月燕而言見金水火羅皆吉危八至危十三亦太隂忌見木氣土計行卯限見土計前迎木氣引出者無不夭矣丑宫安命論斗四度至斗九度至十三度以木論東方寅卯辰遇見水孛印生身限三方拱照主少年發福行限至辰入亢金度又見三方土計金合照便斷一險限中稍見水孛天盤加出主有一病免死而已如春令木逢生旺再加三度木論又見水孛生我者無往不利子細推究出見氣土金則夭矣見氣乃曰奴星犯主見土星為鬼生煞權斗十四度至二十四度以土論之甲乙生人又以木論此以宫主言之限行火羅卯辰限係官福之宫三方合照亦主善發木氣稍輕煞乃居丑金鄉木不得地有制尅我無力無妨出限見計奴前迎禍必慘矣五星中最忌奴星犯主若木計同行亦不可解狂奴之星犯主也牛一至牛七全以土論最喜羅月相逢居於子午之宫子細推之大造初行寅限見火羅二十以上在寅宫行尾火虎度發而大富羅月在子三十六入辰限官祿之鄉亦能發福限至南方巳午之地愈見福厚土至南方乃為父母之邦只怕孛氣鬼生煞計氣不受傷只於過宫之時子細推究女一度亦以土論寅宫安命論尾三至尾六七度以尾火虎論便看安身立命太隂吊起木氣謂之安身傍母便享祖業如行辰巳限單見木氣當途恩用之星或三方外拱便發再見水孛以助木氣煞又生印發福非小加增田産大怕安身近水孛謂之安身傍鬼必無祖業見金水孛號曰鬼生其煞相引過關斷夭無疑尾八度至末度以木而論丙丁生人亦以火論此斷宫主而安身與水孛相逢謂之安身傍母必享祖業根本壯厚臨官之木次看木起何宫如是寅申巳亥四正之宫豈是尋常斷作吉論二十五六後行辰限遇見水局或有水孛於申子辰三方拱照平平而發如巳宫遇孛水單行巳乃水鄉為水在水故吉若遇金星相扶助是曰煞生印此時發奮進田莊出限稍見土金前迎是曰鬼生煞若不主喪身災禍重重巳酉丑亥卯未生人先主官符之破免死而已如夏令生人遇火氣炎或稍可制伏箕水豹至五度看月令如夏令遇火氣春生遇木氣冬生遇水氣在寅箕六度至九度全以水論乃艮山柔弱之水也略見些少金水之氣亦發福行亢度金乃父母之鄉軫水局善發如此出限稍見火羅計孛三方見火羅為黨土計見孛為奴故主凶前迎後送死難之鬼斗一斗三度以木論卯宫安命論氐一至氐九及十六度以土貉而言辰戌丑未年生人由其屬土真土論也最喜近火羅相逢無有不發二十五六初行已限翼火度斷入佳境如見火羅至巳午單行見木氣以助其威發福非小按卯為火宫房心火之地氐土居之是曰入垣入廟若火羅更在巳午真如錦上添花二十五六便發歌曰吉星望見先為福是也更加木氣相助其吉可知最忌水孛相引木乃歲德之星為福不為禍惟水孛引之故為災也名曰鬼生之煞推至送限之年斷其禍福歌曰凶星過去始為災是也氐十以後至夏令以火論餘以土論房一度至心一度全以火論此宫主論安身太隂居於亥卯未宫木氣逢之便是吉人造化再詳水為恩主居巽亥垣行巳午限官福之宫亦發一場便為吉論心二度至五度寵姬之月晝生火論夜生月論斷卯宫則以火月土三件而論尾一至尾二度火論辰宫安命論軫度以水而論秋氣三分之金同納音秋金九分之金此以金論此星屬水最喜金月躔角及三方拱照行限見金水木氣前迎一生發福興隆如遇火羅險中復險事事不吉若有水孛尅制方免其死角一至角八秋冬生乃是枯敗之木其論金明矣角後度生春令并甲乙生人以木論餘俱金論亢乃正垣之金要太隂共土計尤妙亢金喜土計發福非淺最怕寅午戌合限遇火羅木氣相引出入十死其九見水孛能潤辰宫亢金亦主發福氐一度在辰土論巳宫安命論張十五度至十七度蓋如水中之月秋令人此度安身立命決主清貴是水中之月見金乃花酒中無心發財或太隂起近孛會於危畢度一生得隂人為侣助限內三方見氣合照多因婦人財祿成家翼一至十九度夏令生以火論秋冬生以水論軫一至軫九乃東方河漢之水行西方申酉限單見金或在辰上財帛宫或在子上奴僕宫三十五六後略見申限發福非小此宫土計難星最怕火羅相接斷必禍死喜金居財帛主白手成家惟不喜金居田宅限元稍弱必破祖矣午宫安命論柳四度至柳八度端門之貴土也今以土言之先看土起何宫若居四木度早年十五歲內逼井木度限看水孛之鬼三合亥卯未見之便當一忌如是四土或四火之地太隂與火羅相逢少年無災限行申酉稍見火金單行限相逢決然一發喜羅單行夜生人見寅午戌宫相照亦必一發柳後度并星六日馬以太陽論鶉火之中日論明矣最喜照官福之宫申酉處權貴有名利凡事吉慶不怕火最忌木氣之鬼如春令甲乙生人木旺之時限若相逢出入見火羅相引必喪其夀若木氣黨之只主官災破蕩張月鹿有十四度居午旺時前三後二月論明矣晝生人以太陽論張四至十四度乃天之月也夜生太隂明矣最喜見金水無往不佳徐徐而發未宫安命論井九至十五度及二十一度歸庫之木遇金亦能剝削見火羅亦能災傷皆主不利限若交接前迎後送必作少年之鬼福氣難享井二十二度以後春令即木鬼二度夜生全以太隂而論正垣之月晝生喜金出門行申酉戌限如遇金水火羅單行無有不發遇孛亦妙如見土計禍患輕也出限三方見木氣之鬼加以流年填難斷夭折也柳初至二度夜生太隂論晝生土論土則資質本薄少年行限井木度子細推究三方若遇見水孛之鬼少年便夭喜酉戌係官福之地遇金火羅便能大發三方外拱為恩雖重尤能發福戌中奎木之宫詳天盤加減且如水孛之鬼外生木氣之煞斷死無疑矣申宫安命論畢七至十四度夜生月論晝生水論喜金水孛發福其理最明忌見火羅為禍限行寅午戌三方見土計則夭折而死觜參全以水論乃是長生水最喜見金水在辰酉便發二十六七歲行戌宫見金在寅午戌宫合照發福亦輕須至亥限官祿宫亥卯未三方照起方見發福子丑限若見土金離祖發財廣布田莊申宫水之至清行限見奴孛鬼羅相逢臨照險地主不善終遇火亦能喪命井一至井三度分金氣秋令全以金論遇土計金迎而發寅午戌相逢刑尅不免如遇火羅若不傷財險中復險蕩散家貧免死而已井五度至八度甲乙生人木論餘作水論遇金亦能剝削見火羅亦忌同前參詳論之酉宫安命論胃度以土論之自敗之土喜見火羅金則發木氣會孛而險阻胃九至十四度納音金又秋令庚辛生人金論昴日真金而論不怕羅遇土計單行大能發福行亥子丑限見土計吉忌見木氣不吉只怕行限合見主凶災見火羅木氣為黨必死畢一至畢三水論畢四至畢六夜生月論晝生金論乃是妃妾之金也喜見月孛臨胃度無不吉利有禍不折見火羅非貧賤則夭折也水孛平平木氣宜卓立成家行戌限若遇火羅必死無疑遇土計不能害身子細推論戌宫安命論奎二至九度全以木論遇水孛發福見火羅單居子丑亦發見木氣不凶交限見金土相照并三方拱必禍死奎十至十五度十六度春令木論夏火論奎十七度全以火論乃是火正垣見木氣善發見金水孛行限至此相引相迎必死無疑此宫火不怕水只怕羅孛婁度晝以火論如納音金秋冬生以金論餘火論胃有三度居戌土論此宫土資質本薄見木氣水孛必禍死行限喜見火羅木金平平發福此宫火不怕水只怕羅孛險中復險破耗刑衝災難亥宫安命論危十三度至十五度末上弦明月而論以步天衢星光彩行子丑限危月斗牛度見水孛樂然而發夜生見火羅亦然如遇木氣土計之鬼煞前迎後送便斷禍凶出限則天室初至十七度皆以木論此木初生不能當其火羅如夏令生人限若逢火命在須臾前迎之限土計金照必主夭折璧一至十度以水論春令木論乾金所生江湖之水不怕土計行子丑限見金火相逢一發而福怕忌難尅戰不宜也鄭幼學二十八宿元髓血脈經角木蛟者乃是刀頭斧柄之木也自初至十喜春生見金禍輕遇火羅禍甚夏忌火羅尤緊其木喜亥卯未局及四木四水度初年巳限必得父母遺廕翼四至初不無悔破張度有徐徐之福見水孛必能白手富貴行星度木惡南奔至柳度關隘之地不吉更六丙生人陽刃遇火羅無救夭折有水孛土計解之不夭必破財刑害柳度平鬼度井中遇吉星則吉遇火羅更丁生人陽刃如羊投虎口井十三關隘縱無火羅亦不全善參觜畢有水孛助更六庚生人祿寅午戌人馬到此必發若得天馬官魁相助晚景功名老當益壯昴度金局更六庚生人陽刃寅申巳亥生人的煞到此刑害破蕩若遇秋金就此阻壽胃土財限平平戌上婁度枯木投火縱有水孛援之老有風燭之患若遇火羅更六辛生人陽刃於壽有礙無火羅亦不免腸胃下部之疾亥宫璧室晚節黃花清香在尾子地木逢地劫曷可言也丑寅二限無火羅金可享耆頥之壽亢金龍者乃堅剛之真金也亦刀劒成器之物生於春夏忌火羅見之禍甚初午巳限水局故水孛能潤其色若壬癸生人貴人丙戊生人祿少年奮迅白手成功翼三至初晦昧無成春夏生人遇火羅礙決阻壽秋冬生人禍輕更申子辰子午卯酉生劫煞的煞之地到此應無素休張度平平遇土計水孛白手而成名香利潤星度有木氣或火羅得道死亦無疑更丙戊生人陽刃招非命而終或火計同為煞生母吉柳土平平小福鬼度返吟拖戈若夏月丁巳生人陽刃到此非死亡必破蕩刑傷井度財鄉遇水孛必主福氣見火羅春夏禍甚秋冬為禍稍輕參觜畢皆順酉宫昴胃度金局老當益壯戌上婁度不吉更六辛生人陽刃若遇三煞天鋒主死於非命或火羅木氣居之死無疑矣或火局遇土計許有黃花晚節之味亥子限中宜守株度日丑限見火羅有風燭之患也氐土貉者乃扶桑之地日出之所也帶火氣自初至一與亢金同自二至十四五乃土為主喜生辰戌丑未月及秋冬得時喜火羅忌木氣春生見之禍甚初行角木更六乙生人陽刃害不一軫度乃汪洋之水土寒之地晦困見木氣水孛不吉遇火羅不能為福翼四至初見火羅一發不久張度淡淡星度離明火局決能發福見木氣倍加光彩柳土平平之福鬼度順井木中淹晦見木氣凶遇火羅尤加春色利潤名香申宫無木氣守株度日遇木氣阻壽酉限金局脫氣更六庚生人陽刃寅申生人的煞招心腹之疾可延婁度晚年康健奎八關隘決無素休亥限室璧木局倘木氣臨衝照合壽止於此子限土局旺甚不吉房日兔乃扶桑太陽之真火也當作火論喜木氣忌水孛限行少年亢度中見水孛必阻壽遇木氣小小福力角度平淡軫翼度晦滯更子午卯酉申子辰生人乃的煞之地到此有礙若水孛居之乃是煞星居煞卜此地死而無疑否則傷殘肢體官非刑害張度無水孛淹晦守株星度順得木氣決能顯用柳鬼中如常井度得意如順水之便倘木氣助之更甲戊庚生人天乙貴或官魁天馬元局主臨衝窵合當為臺閣勳臣吉利名香人物申宫水局多凶少吉更水孛居之無木氣救如羊投虎口酉宫財局見金晚年稱遂遇水孛壽決難延戌宫火局得木氣相助老當益壯亥限木局黃花晚節子限晦阻不吉心月狐者亦扶桑初出之月也自初至三房火同論自四至六不問晝夜皆以月論喜秋夜生忌土計喜金火相助十五歲內氐度晦困亢度便能振作角軫度中守株度日翼火中若壬癸生人貴人更金生助必能發福張度雖返吟不為忌倘遇火或金必能顯達星度日助月明更丁己生人祿六辛生人貴到此利潤名香前程亨奮柳土度無火羅助惡守株無咎遇土計晦蹇刑害鬼度稱意井度如常見火羅生意春風申宫水局平平無咎更六庚生人祿寅午戌生人馬晚景優遊酉宫金旺之地更遇金乃福壽之鄉胃土稍晦遇金吉見土計凶婁度火助月華遇土計阻壽奎度淹晦平淡亥限木局脫氣子限土旺難鄉安能至福鬼録難逃尾火虎度乃樹尾所燃之火自初至三當以火論喜木氣忌水孛自四至十八乃臨官之木喜春生得時秋冬失令宜居亥卯未局生平享福一世優遊倘居巳午乃離明星度辰酉乃亢金大梁之位身體卑微勞碌不吉初限卯木之鄉天乙生人祿壬癸生人貴無金臨衝窵合早年得意辰上亢度晦破更秋生遇金夭折無疑倘六乙生人陽刃更遇天鋒刑囚死於非命角軫翼度小小福力如壬癸丙戊生人祿貴福氣倍加張度徐徐之福星度木惡南奔灰飛煙滅更丙戊生人陽刃倘遇飛來窵煞天鋒等凶重則非命喪身輕則遭官刑害柳鬼度中守株度日井度晚景優遊申限木絶之鄉老有殘疾酉限金局更六庚生人陽刃寅申巳亥生人的煞遇土為天鋒助煞為患安能善終得水孛可延其壽戌限火局脫氣不足言也亥限木局旺甚不利箕水豹度乃丑艮山下蒙泉之水忌土計孛喜金宜生春夏不利秋冬限行卯遇土計決夭更六甲生人陽刃其禍愈甚辰宫亢度順必能發用得金倍加福力如秋生更六甲生人陽刃到此遇孛主縊溺喪身角度脫氣宜守株度日軫度返吟拖戈翼度頗順如壬癸生人貴更吉張星度順柳度午宫丙戊生人陽刃或天鋒飛刃決主不義亡身鬼度小福井度脫氣不可強求只宜守舊遇土計孛又何患乎申度限亦宜退守酉宫水敗之鄉得金助晚年康壯胃婁中忌見土計更六辛生人陽刃如羊投虎口亥子限土旺之鄉不足言也矣斗有二十二度乃橋沉底下之木也初至十八九度不問四季皆以木論不忌金火羅惟忌氣遇之有礙夜生男命遇之輕則尅戰重則夭折初年尾心度皆是順境早能振作房火中平淡生涯氐度財限六乙生人祿壬癸生人貴必能顯用辰宫亢角不順六乙生人陽刃到此不無破尅軫水泛濫無成翼淡淡生涯如丙戊生人祿壬癸生人貴若得金水助之或魁職元局主臨衝窵合決能白手成名無吉曜相助則有進寸退尺之憂張度生意頗順星度晦無成柳度無氣星免咎有氣就此阻壽鬼度淹晦井度返吟拖戈十五度關隘之地丁巳生人陽刃更氣當途夭折無疑申宫水局木絶之鄉不無險阻酉宫金局六庚生人陽刃寅申巳亥生的煞遇此鬼録難逃否則必遭官刑牛度乃未經煆煉之礦金也當以土為主見木無咎遇氣禍重初限斗箕早年晦滯尾度頗稱無氣平平之福心房氐火局生意勝常更火羅當途六乙生人祿居福壬癸生人貴人到此必能超顯積榖拘財亢角中亦無阻隔見氣禍輕軫翼水局遇氣不吉無氣礙平善張星柳中得火羅發達水孛氣同不無戰尅未宫雖木局無氣平淡生涯若遇氣更丁巳生人陽刃女多尅戰無救阻壽申限水局無咎見氣有礙酉限戌宫老當康壯奎璧度有風燭之患女度乃積聚糞壤之土也至輕微至薄賤喜生辰戌丑未寅午戌月得時忌亥卯未月生此土泊土局土度火局火度吉居木局木度凶如生遇木水孛刑害破耗初午限行斗箕尾木局晦昧無成更遇水孛木礙道倘巳酉丑生人劫煞輕則貧病重則夭折尾三尾四度至心房氐度母鄉得意見木氣火羅大能振作氐五度反吟關隘六甲生人陽刃到此不利得火羅臨衝窵合無咎遇木氣死而無疑亢度清淡守株角度晦破見木必夭軫水中泛濫漂流其禍如燃家財冷退猶招肢體之疾見木決夭翼四至初許有平平之福張度平淡家風星度老更精神柳土無咎未宫木局多凶少吉如丁巳生人陽刃木氣居之必登鬼録申限頗順酉限皆不能保守於此問壽虛度乃午上星日太陽照臨下土之日影廣厚高大之土也喜生辰戌丑未月得令得時忌生春及亥卯未月無氣喜火羅忌木見之禍甚計奴猶能犯主初年入斗箕度淹晦破害遇木得少年夭折尾度平淡得火羅更六甲生人祿申子辰生人馬決能白手成名財豐祿厚卯宫火垣得火羅木氣同更六乙生人祿居祿壬癸生人貴居官前程亨奮名利兩全氐度遇木計化刑囚暗耗更六甲生人陽刃猶慮夭於非命亢角中平淡軫翼度寒地土愛暖而惡寒故也如遇木氣更申子辰劫守疾厄或化刑囚非喪命必傷肢體午宫火局老當康壯晚福優遊未宫木局晦滯災非丁巳生人陽刃阻壽無疑否則刑害申宫水局小吉酉宫金鄉脫氣不足言也危月乃張度之月影日生自初度至五與虛土同論危六至十五度當作太隂看喜夜生秋令忌弦望晦朔見土輕忌計重喜火羅金以助其輝忌行四土計或火羅同決阻其初年虛女晦滯多災牛斗箕未能作事尾火自初至七為事頗稱無土計迤邐春風心房氐火局見之得意氐土十五度關隘如土計同決主刑害破耗辰宫亢金生意洋洋得土計倍加春色角度平淡軫度水涵月魄作事有進寸退尺之憂翼度如常張度雖拖戈無土計不忌星度日助月華老當康壯柳土晦滯鬼度井度有三五年晚福酉宫康壯室火乃樹頭之火初至二火為主自三四至十八度乃亥中初生之木喜生春夏及亥卯未月暨亥卯未之宫如人命遇此終身無咎喜水孛忌火羅金見之為患幼年危度平善虛度女土財局遇金不吉更六壬生人陽刃六丙生人飛來陽刃到此必喪於非命得水孛解減福逢火羅無咎牛度平平斗度遇火羅禍甚無火羅或水孛臨衝釣合更甲戊生人貴如官魁職元局主相助決然白手成名箕尾度臨官之地得水孛更六甲生人祿申子辰生人馬倘天馬官魁衝拱富貴雙全名揚寰宇卯宫遇土計積榖聚財火土同倍加春色心房度遇金更春夏生人不能為患秋生更六甲生人陽刃決主刑害官非氐土小小福力辰宫亢金難地如遇金更秋生六乙生人陽刃六庚生人飛刃見之禍甚主非命而終春夏生人減福刑害破尅角度無火羅平平之福軫翼度水泛木浮如遇水孛未為全善見金火羅無咎張度徐徐之福星度木惡南奔柳度晚年康壯遇金得壽鬼度晦人井度得意有黃花之賀遇火羅必登鬼録璧度乃文章之宿天然養木之水初至二與室同論三至九以水言之喜行四水四木度乃財福之限更官魁祿馬職元局主或薦元官星臨衝釣合必為顯達之人名馳翰苑聲播寰宇忌行四土度及遇土計更刑囚或陽刃天鋒當道無救決無素休非夭必破蕩刑害四火度及火局遇土計禍亦無疑夏生尤怕火羅煎焚之禍如羊投虎口奎木乃文章之宿火柴之木也凡人於此安命者聰明智慧自初至十五不問四季皆以木論忌者火羅金也凡行限見之無救為禍必甚亥限幼年平善子限虛度木為地劫火羅無咎遇金為患無救夭折金牛度稍晦斗度天盤返吟若遇火羅更六癸生人陽刃辰戌丑未的煞到此必然夭阻斗十關隘如羊投虎口箕尾度臨官若水孛更六甲生人祿申子辰生人馬如官魁祿馬局主職元衝合白手功名前程亨奮卯宫木局得水孛木迤邐春風房度遇火羅更六甲生人陽刃非夭折必官刑破尅氐土財限得意亢角中蹇剝刑破軫翼度水泛木浮有進寸退尺之憂張度平平星度灰飛煙滅更火羅臨衝拱合六丙生人陽刃遇此決阻壽無疑柳土平淡鬼度晦滯井木返吟拖戈十五度關隘申宫木絶不吉婁度乃鍋鼎之金以火為主喜生寅午戌之月及春夏得時忌水孛為難遇羅犯主見木氣白手發用若火居寅午戌局得令得時終身獲福若居巳酉丑一世迍邅初行亥限早年稱遂子限見水孛有制禍輕牛金守株度日斗木母鄉若遇木氣當途更甲戊生人貴必能發福更官魁天馬職元局主決許名題鴈塔箕度稍晦有木氣發福遇水孛禍甚尾度得意見金戰尅破蕩得水孛木氣返增福力心房迤邐春風更六乙生人祿遇氣老當益壯氐角亢金早宜退守慮有風燭之患軫水中翼火中皆非順境於壽有礙張星度旺甚亦宜守常术限木局老更精神胃度乃泥竈之土也初至一與婁火同二至十四以土為主喜生辰戌丑未月怕春失時忌木氣喜火羅限行婁幼年得意奎木晦人遇木氣必阻得火羅早能卓立亥限木局晦昧無成得火羅却能顯用子局土旺之鄉六癸生人祿居祿乙巳生人貴居官更單火獨羅大能展布利潤名香牛度如常斗度不吉木氣得道更六癸生人陽刃倘更刑囚的煞死何悔哉箕水財地無木氣吉遇木氣凶尾度遇木氣礙其凶甚遇火羅稍順卯宫火位無水優遊之福有火羅遇水孛事事晦辰宫亢角度不利軫水翼度乃羊腸之道鬼録書名午宫火局老景康壯未宫井木多晦少安如遇木氣決阻壽算昴度乃酉宫西沉之日影也餘光次舍只以金論喜巳酉丑月及秋生忌春夏失時見火羅尤重忌孛泄氣遇土計決能發用初行婁度早年晦滯更火羅或六辛生陽刃到此夭折無疑有救減福此度見土計必發奎木財鄉無火羅平善有火羅禍甚亥限遇木氣必能發用見火羅返禍子宫土局子歸母腹必發優遊之福更六癸生人祿居祿乙巳生人貴居官得土計或官魁祿馬局主職元居之決然白手成名富貴人矣遇火羅倍加福力見孛禍輕丑宫牛度徐徐平福斗木財限得木氣水助之發福見火羅居之不吉箕水脫氣晦滯遇孛阻壽尾度木臨官木氣當道生意洋洋卯上心房二度火之正垣忌見火羅怕木氣居之黨其煞氣更六甲生人陽刃遇此決無素休無火羅木氣於壽無礙多見坎坷氐土老當益壯亢度有土計無咎午限有孛或火羅不吉更丙戊生人陽刃於壽有傷未限木局丁巳生人陽刃遇火羅不吉畢月乃酉宫太隂次舍餘光寒潭之月影也自初至四與昴同論自五至七度上弦中旬夜生以太隂為主喜金火助力忌土計及行土局土度晦滯多災更遇土計火羅凶四金度得意畢八至十六觜參同論以水為主喜生秋度春夏失時申宫乃西方金臨官之地見土計禍輕忌孛尤重故西方初生之水本清怕孛混濁之初行酉宫金局畢昴度少年得意得土計助之愈加福力如孛居之主縊溺傷亡之患胃土晦人婁度火局見木羅必發財福遇木氣同倍加春意奎璧室度木局脫氣守株平淡家風子宫土局見金必能發用六癸生人祿乙巳生人貴愈更精神無金晦昧進退得失不一此局遇土計亦晦見孛主隂人破蕩牛度平淡生涯斗度脫氣見土計無咎遇火羅發財箕度無孛計平淡心房氐小小福力氐五度關隘更六甲生人陽刃如不喪身決傷肢體破蕩人矣亢金老當益壯角軫翼晦滯迍邅更申子辰生人劫子午卯酉生人的或見孛礙衝合到此必登鬼録觜度乃漁燈之火與參水同論參水乃申宫初生清冷之水喜金及秋冬生辰戌丑未月生見土計禍稍輕遇孛禍甚限行金局金度更得金助或祿馬貴人更官魁天馬局主職元隂注陽受臨衝窵合決能白手成名增財進業行四土度及遇土計刑破多危見金同返吉如四水度或金度遇孛更陽刃天鋒當道天壽無疑若婦人遇之主落孕傷胎之患如木氣解救減禍井木自初至八乃西井之木除初度與參水同論自九至二十五不問四季皆以木論此木乃東井丹桂之木也與凡木不同見金火羅為患輕遇氣禍甚少年參水度水局早有成立金局昴度作事進退水孛必能顯用立業興家胃土財限得土計決然增添財産婁奎度脫氣返吟之地奎八關隘倘遇氣更六辛生人陽刃或天鋒等煞臨衝非喪命必破蕩璧水室火皆是順境如遇水孛及土皆能發福興田進業危虛亦宜守株藏器入牛女度如常斗度返吟斗十關隘更六癸生人陽刃辰戌丑未的煞無氣破蕩刑害有氣阻壽箕水無氣老亦康壯尾度平平無咎心房氐局脫氣多滯六甲生人陽刃不吉氐土財限無火羅氣稍順如行亢角中老有風燭之患井二十六至三十與鬼金同論此金嫦娥首飾之金也皆以老隂為主喜秋夜生得時忌晦朔怕土計及行四土度喜金局金度火局火度初行申水局平平之福酉宫金局倘金月同更夜生及六辛生人祿居祿丙丁生人貴居福更官魁天馬薦元官星居之必白手成名權居翰苑昴度得土或計倍加光彩胃度得金愈更精神婁度遇火羅為剛星助月遇土計不吉若八月秋生減福辰戌丑未月遇之更六辛生人陽刃到此應無素休有救則刑害破病無救死而無疑奎璧室木局得火羅能助月華土計居之受制無咎子宫土局淹晦坎坷遇土計單行為福必矣輕則貧病重則喪身牛斗中守株度日箕尾限豈能邀福心房火位夜生得火外助老當益壯遇土計阻壽氐土亦然亢金度晚景康壯角度天盤返吟倘六乙生人陽刃不吉柳土乃離明天河之土也乃日之正垣火之旺地此土主貴喜生辰戌丑未月自初至一乃柳稍之月與鬼同論自二至十二皆以土言喜火羅及行火局火度忌木氣及行木局四木度初年未限井度晦蹇不利如丁巳生人陽刃到此見木或氣夭折必矣井度見火羅必發初年之福申宫水土長生之地未為全美進退得失酉宫土敗皆未可言福胃土返吟拖戈得火羅喜木氣同愈加福力如無木氣必阻婁度火局事事平和得火羅臨衝窵合晚年稱意奎璧室木局遇木氣阻壽見火羅老更康健子宫土旺平淡守株大抵怕遇木氣見之為患丑宫牛度如常斗度難鄉斗十關隘若六癸生人陽刃辰戌丑未生人的煞到此終壽見木氣死亦無疑箕尾中皆非順地卯宫火位康壯無咎氐土返吟六甲生人陽刃更木氣刑囚礙之決為泉下之人也星度乃離火之精真太陽也喜夏晝生不宜夜生喜金輔佐忌木以蔽其光怕羅薄蝕之春夏木羅逢之禍甚秋冬木羅遇之禍輕初行未限井木晦人申宫水局稍稍見金水吉遇木必災破酉宫得金或水拱守臨衝更六辛人祿居祿丙丁人貴居官如官魁天馬局主職元臨衝窵合必能白手成名聲播寰宇胃土或木不吉戌宫火局迤邐春風奎婁度遇羅更六辛人陽刃必主中年之憂刑傷破尅亥限木局晦困蹇滯遇木決阻子限平淡無成丑限斗度忌見木氣羅礙之不吉寅限猶忌木當途卯宫火位遇羅有咎六甲生人陽刃於壽有礙張度初至三太陽同論張四至十四度太隂為主喜秋夜生忌朔望弦晦怕土計及行土局土度喜金火羅以助其輝喜行四金度金局得意幼年星度無礙柳土晦人遇土計必天更丙戊生人陽刃倘天鋒飛煞必喪於非命鬼度得意井度平善見土計無咎遇火羅必能發福申宫水局金臨官之地徐徐之福酉宫金局生意春風六辛生人祿居祿丙丁生人貴居官更得金臨衝窵合或官魁天馬拱合中年得意必發非常之福胃土遇金倍加光彩土計居之更六庚生人陽刃主刑傷破害婁度火局得火羅助更夜生決然得意土計同反禍更陽刃其禍愈甚奎璧室木局不利火羅居之黨土計之威子宫虛危度六壬生人陽刃更刑囚暗耗臨衝非喪命決刑傷破蕩丑宫牛斗度多晦少利寅宫箕尾度得火羅助平平無咎土計居之亦能為患翼度乃漁燈之火自初至三乃火為主忌水禍輕見孛禍甚自四至二十度皆以水也與軫同論軫水乃大海汪洋之水與翼同論喜金忌土計孛見之無救非夭則破蕩貧病得金水會蛇癸與巳酉丑人位居清要給諫之臣初限張星少年擢用名播乾坤柳土不吉無火羅有土計平淡災咎遇土計火羅非夭必刑破鬼度一載無光井三十至二十三二年生意出入順便利祿井二十五至井初木局得火羅白手發財無火羅土計平平無咎遇火羅金平福遇土計無礙參度雖拖戈乃金臨官之位不能興害若得金助更六庚生人祿居祿寅午戌生人馬居官如天馬官魁臨衝窵合由文學進白手成名酉宫金局遇金更六辛生人祿丙丁生人貴無火羅孛必發非常之福有土計助愈加厚福胃中遇土計凶得金反吉戌限火局得火羅必發福木氣助尤妙土計居之為禍不少奎璧室木局見火羅居之有財土計孛礙之減福子宫土旺之地土計礙道三合衝拱更陽刃決阻其壽子丑二限見金無火羅孛老更精神寅限木局脫氣慮有下部之疾此分經造化大抵舉一而知十只依五星生尅制化子細消詳萬舉萬中更五星遲留伏逆為緊度數闊狹推究若能熟讀之於心可作術家之衣鉢十二宫定數賦文義俱佳寶瓶子位玄枵齊邦女虛乃屬土之正垣危月亦為水之旺氣水孛冬旺而立見成家火羅夏生而必然富貴火土生成招厚福計氣忌怒遭憲章日月順躔縱坐孤亡而生涯飽暖木氣攻度如不夭折而家計傾頺若逢太白照臨必趕退當年之弱木更兼夭首入宫未可化正宫之難氣晝火未能成器夜羅必能致祥寅卯二宫官魁顯而名早登鴈塔寅亥二宫暗耗欺而財似雪溶湯冬火無光亦主家道充足春木有氣必愁體用早亡夏水臨官而慳貪吏輩秋計同位而兜攬牙郎夜月明在虛躔文章不露晝陽輝於虛位福祿愈昌限值寅宫之歲宿虛度少年更逢卯位之孤神惜乎壯歲磨蝎丑位星紀揚州正當斗牛之星輝偏喜火金而燦爛夜土單行而千災不陷晝火獨立而百禍俱消日月無情不照覆盆之下木氣相攻難保生身之全單氣而六親氷炭獨計而五族華夷金星入局一生發非橫之財熒惑歸垣終世享優遊之樂卯辰火羅寅亥炎熒夜生為貴以榮身晝誕為災而不難五星朝官居極品九曜會貴不可言若在空亡之地火羅生夏令何愁不發若在高強之位木氣攻秋金必主無成冬水入垣必須破祖秋計會命亦當損財孤神照而常挑嫁帳寡宿臨而孤苦無兒寅宫強木之為凶必主天年之不保卯位健氣而為煞斷定人禍以相招人馬寅位析木燕分尾斗乃木之真垣箕宿亦水之次舍文士生而多此宫泊宿舉子現亦於燕地安身木火交而多招病患水火會而過惡難施金月臨五更有氣筆下生煙孛羅會三春得用閙裏有錢旺氣居辰常患風恙秋金入局亦忌癆癱更看天上何宿又推地下何星官魁現於天上四旬名揚四海爵印顯於地下三十位列三公水陽居鄭虛逞嘍囉土計守亢一生愁嘆忽逢刑孛與高強因官致富若有囚水占官宫傍貴成家身同亢躔縱夜生傷財難免太白歸垣若冬令不能為害亥藏土計生身不出辰宫荆有水羅大貴必生巳上天蝎卯宫流火宋分正當大火之尾房亦會氐心之土月孛星守而心腹災生水宿臨而臆肝疾定最喜入命木星為刑囚亦當致富又宜到限紫氣作暗耗亦能有成福熒夜朗功名早動宸京刑孛攻熒魂魄早歸岱嶺木氣攻田而田宅進益水孛破福而福壽俱消金牛見孛常防隂女而傷身人馬逢金大忌官符而破碎日東月西名不求而自得隂陽易位利多取亦無成陽酉隂卯決無久遠家風水西孛東那有連綿活計羅星守而自逞英雄計星入而為人愚蠢大抵星躔如此亦觀月令相同限到煞宫須夭折命逢難宿定遭凶天稱辰宫鄭國兖邦芒孛呈輝於亢度壽星亦現於水躔最宜金月夜朗而名動甲科又逢土計晝生而官居極品若逢火羅旺三河必斷少年之薤露又值孛熒臨獅子壽於壯歲不經霜太隂獨行巨蟹更喜孛星太白獨守亢宫又宜土宿身月獨明月孛單照若還反生於魯分傷妻害子又或順行於雙女損子離夫大抵太陽獨行午位而百福來迎設有五星會合離宫而千瘡不利宋宫遇計而家積珍珠豳位逢苴而粟藏千囷水孛會命錢財常施於隂人計孛背行福祿每求於吏輩巳宫雙女鶉尾楚荆張軫二宿真水局火蛇秋令正清辰土宿臨宫防不壽計都到命必傷殘金水同宫秋令亦能發迹水金獨旺夏月必能有成單水若會隂陽末年大富太隂夜生巨蟹唾手成名太陽臨位為人萬象包容太白對望此輩千機兜攬孛計立而身流四海孛羅會而命喪三隅太隂生於瓶地一生勞碌不曽間土計若旺留宫半世顰眉而獨立若逢空庫中年萬一不如前更會呻吟末世千倉亦破碎午宫獅子鶉火三河星張為君臣之正禮柳土作輔弼之相隨太陽臨星而登正殿一世無災太隂入張而守后宫終身有慶金水扶陽而為貴木氣相攻而作凶火羅重疊晝生必定傷殘孛計交會夜誕亦當産喪單水為人巧計單金主性多剛朔望反而衣食何益隂陽順而富貴非遲最宜單火單羅福權反盛若還獨計孤孛威勇尤昌逢木月則重粧嫁飾遇月氣則再作新郎須為林下之先生方免刑傷于一世未宫巨蟹鶉首秦州太隂初生於鬼躔少年薦鶚快橫秋旺木四時生井宿壯歲化龍知有日土計交始為蝕神不啞聾必遭毒藥孛羅背方能為福作武士必主英雄太陽單行六親失力紫氣獨旺俗計無緣金水伴而名必顯火羅背縱富無名木月同躔非特富而且貴太隂遇忌雖聰秀亦奚為月羅來往此身難免不歸鄉月計同行斯命必然暴外路須教破病暗纒身庶使優遊於一世申宫隂陽實沈晉益觜參乃水之正宫畢井為身之次度水宿難經名早題於虎榜木星入命利常滿於龍倉日月不明任得地只成小富土計為煞縱為福也主凶危孛羅背財求陸路孛計會切忌遠方太白獨行富而且貴火羅順往任富無名土計同入雙魚本為煞而無患水孛戰於白羊雖為吉亦傷殘紫氣入而財豐厚土宿獨而禍俱消身同官宫功勳生於毫管金月魯分名利出於征鋒火土獨守福官橫財可取土計夜臨衛分一世迍邅酉有金牛大梁趙分昴畢乃日月出入之門胃度亦土金相生之宿月生滄海利黃昏太白歸垣宜夜裏土計為人豐厚火羅主性多剛夜生為禍不侵晝誕天年不永日為西沒卯時必定早亡月臥金牛晝誕名亦何益木氣忌星逢春生必獲資財孛宿凶神遇二八不能為禍水宿躔身為財星入命月居卯戌作鬼旺身衰少年多富多福以榮昌壯歲破財破宅而不利火羅為煞夜生喜照於寶瓶木氣為財四季不宜於齊子金火不降舉手傷人之輩月熒爭耀敢獨衝陳之徒蓋忌星反作吉星吉曜反為煞曜戌地白羊降婁魯國甘羅幼歲成名月居奎度鄧通少年巨富太隂在婁日月臨錢財常滿於囊篋火羅旺名利每出於旌旗身月奎宿呈輝文章奮發孛宿婁宫爭水痼疾躔身單羅可忌恐壯歲暴亡水孛相攻定少年夭折木氣守而財帛昌盛木氣限而富貴非遲孛計晝生而不夭常患災生水火夜誕亦無傷難堪疾苦單氣為人好善隻木主性多能若逢旺土守官宫末年獲福更植紫木在丑位發成便亡亥位雙魚五星好顯於娵訾豳到天門九曜宜臨於衛分位極官高蓋因太白旺乎室名登臺省身月常照璧兼危忽遇氣金身恐隨於蝶夢若逢計孛命必喪於龍宫出地入天日生有氣移乾就濕晝誕無虞金星入而防妻魍魎水宿會而恐子螟蛉單羅而功名蓋世單計而妻妾重傷氣孛常患於性剛恩中反怨羅月必遭於病患服藥無功縱有刑囚內夾因官致富若教福祿齊行為吏成名水孛單行喜居寅丑月金有氣最喜燕邦單金單木占妻田中年發福孤陽單月坐官福縱富無名身月若居天稱太隂忽坐金牛若逢春生必貴若生秋令無光三方陷而無吉助一世安能進身更推諸煞以伏降末年皆由平坦二十八宿坐命詩斷安命若在鬼井中敢言敢斷性英雄生身若在星柳位孛計同躔作貝戎東西南北月歸垣筆下文章冠世賢若是晝生無發用中年見月必斷弦翼軫從來屬地户唾手成名文必露若還孛計在高強決定中年尸外路角躔安命性不柔機關作事世無儔若歸亢度生秋月高官極品百年秋氐房心宿屬卯宫定他氣性最英雄若還水孛一齊入設使居官不善終尾箕主人多病患管有一呼百人喚斗木為人性有剛牛女為人寬且緩虛宿單行分晝夜晝生剛直言語徐夜生必是破資財富貴浮雲如水苴室璧從來木向榮包容萬象性如神不惟服衆居鄉校不日成名達紫宸奎宿文章世所稀少年筆下有珠璣更兼夜火一齊入身著錦衣換布衣婁星度兮有十二日生凶頑無可比夜生沒有福祿臨大抵作事無終始胃昴二宿與金同為人自逞有成功若還木氣臨齊子一世空為百歲翁觜參立命屬隂陽倐忽聚散未為昌朝雨暮雲無定性木火臨之福必降星學大成卷五
