body:
  text: 星學大成卷十一明萬民英撰十二宫安命論上子宫安命論子乃土旺地命坐此土為主如登垣登殿入局登籍坐貴與宫神太嵗相關即吉如凶忌刑難混雜則不為福吉凶相等則中常斷也又本宫三宿如女虛二宿不問晝夜並以土論獨危度夜生從月取用亦依弦望而論有月可為主無月只取土用事然須在望前太陰有用中間亦不離乎土若夜生火居強得經最吉此宫土喜火羅又為官星六丙生人不為囚六戊生人不為刑甲生人為真祿壬生人為真福夜得火尤為光明身主臨之為安身傍母亦為身主傍官更在高強無忌曜侵之為福夏末晝生見火亦能為福如火星獨垣前後無相雜是官星明健起於命前即為滿用又為貴格若水星晝見起於高強當為吉利蓋財元木也三限星水也若木與太陽相離又為得用春令又強夏則次之又不可為忌蓋日生從陽木土乃一體之功用惟夜生為鬼九十月為直若太陰遇木為安身傍鬼縱是木得經財祿得意其間亦多刑尅疾病之類若木入命值留退不分晝夜皆以凶斷若木火交合可從吉用水火交合命母受凶官星受尅為凶若混以刑囚直難皆凶寅宫福德木居之乃害曜入垣或本命天元納音屬土即為奪星或臨亡神劫煞或有刑囚終為凶忌若有太隂在寅巳之宫謂之四正逢刑怕見身也蓋寅中加己巳中加申是寅刑己巳刑申其不足可知矣其中有一火星為官星得局更得土星在寅巳是寅加己巳加申雖曰刑是刑而生我非刑而尅我更如命主有情祿馬在命合此格者寅限可以名利無疑矣卯為官祿火星居之或三合見火皆貴若無火而有木更加以太陰在寅卯未即為土得木局多主夭折若加以難直尤凶亥為財酉為田金木同行於命前後或交命度此田財二用實為吉利若是冬臘金木交於命宫多是不仁而富春月庶幾已為疾厄水星居之為難星入垣壬生人在七八月多凶或有壓身災病水星主濕病臨濕局多隂濕手足之疾若金助之為害尤甚孛水居強或居官祿遷移亦凶如壬甲生人子卯兩宫通關陽刃如官宫值此難免中年之厄子宫命者一為天地通關局二為四正局三為四破局須看命與太嵗生時合成何局論之子宫立命午上有祿酉上有身卯有命主乃一隂一陽之謂道而天地通關局成矣亦謂之衝干對祿否則互見之亦佳如癸人祿子乙人祿卯丁巳祿午四正互加皆是崇勳而四正局成矣四破局者四位俱不見祿唯會刑星害曜難直等星如太隂命主在寅申戌未是未中有戌戌中有丑不然只在丑戌者亦戌中有丑丑中有戌加之四位有煞氣守之為四破局此乃加盤之妙正盤所不及正盤衆人之禍福加盤本身之禍福故前賢云天盤轉出地盤上卯上分明是命宫此加盤之妙用也且如子上立命甲丙戊庚壬四正往來通關陽刃其間子午有羅計主之可以鎮定命度雖在虛危不為忌論若是羅計偏孤又不臨於子午日月福祿臨於二八多是中年發福而不長久其四正次舍中間限度交對如女度立命限入氐土虛危立命限入房心此乃四刑度內乃闌干貫索伏尸卷舌為煞限路逢之中有發福者忽有夭折又不可測但是伏吟四正體局者犯此煞又不可以次舍度中為得也此局正則為四正偏之亥為三合偏之丑為不入局四正是四正災福三合是三合災福一星稍異理皆不然且如子上危十二度立命上盤是卯下盤是子此乃四正為體土為命主如躔於亥宿初度則是上盤卯下盤亥即成亥卯未三合局為用若偏之丑太隂在巳初度是上盤卯下盤巳又成巳酉丑局為用或有祿馬扶之亦是貴格發明云子宫土旺之地坐命以土為主如登垣殿入局登籍坐貴與宫神太嵗相關則皆貴命也如難刑囚混雜則不為福如難直吉凶相等無彼此強弱則平常命也所忌者木氣二星所樂者火羅二曜火之一星既為母曜又為官星雖丙戊生人化為刑囚亦吉壬甲生人化為福祿則錦上添花木之一星固為害曜雖甲丙生人化為福祿終以為害若戊庚生人化為刑囚為禍尤深氣之一星為禍與木星同雖好惡如此然亦須看守宫者何星所用者何星混雜者何星黨與者何星又不可一概論也如福祿權財混之以直難則塞翁得馬未必為福也木星固知為害若混之以火羅則反為吉以木能生火恩有益於我也十二宫之最切者莫若福德官祿八煞也福宫屬木設有木星居之不可為福德主謂之害曜入垣若有太隂在己申之宫謂之四正逢刑怕見身蓋寅刑巳巳刑申其不吉可知矣其寅中有一火星謂之官星得局又能為福更得土星在寅巳是寅加巳巳加申雖曰相刑是刑而生我非刑而尅我更加命主有情祿馬在命合此格者寅限可得名利無疑矣卯為官祿宫設有火星居之謂之官星入垣或三合見火皆吉若無火而有木更加木在亥卯未即為土命人得木合此格者多主夭折若加以難直尤凶必死於非命萬不失一也已為疾厄宫水星居之為難星入垣難星疾厄主是也更六壬生人生於七八月多主惡死輕則破相壓身之疾水星若有金助之為害尤甚孛水居強或居官祿遷移亦凶如六甲六壬生人子卯二宫通關陽刃加官宫值此難免中年之厄子宫坐命者一為天地通關局二為四正局三為四破局須看命主所臨與太嵗生時合成何局以論之子宫立命午上有祿酉上安身卯有命主乃一隂一陽之謂道即天地通關局成矣此局有四裏有八表謂之衝干對祿否則互換見之亦佳如癸人祿子乙人祿卯辛人祿酉丁人祿午四正互加皆是崇勳而四正局成矣四破局者四位俱不見祿惟會刑星害曜難直等星如太隂星命主在寅申戌未者是未中有戌戌中有丑不然只在丑戌二宫者亦戌中有丑丑中有戌加之四位中有煞星守之故為四破局耶律所謂四正宫神暗加管攝是也此乃加盤之妙正盤所不及正盤衆人之禍福加盤本身之禍福故前賢云天盤轉出地盤上卯上分明是命宫此加盤之妙用也又有巳加戌辰加亥亦有相關大槩先看局之重輕然後參以加盤而明禍福如火星在卯禍福由此而分四正局見之則卯加子火來生土必然為福返吟局見之是卯加酉火來尅金必然為禍此局正則為四正偏之亥為三合偏之丑為不入局四正是四正災福三合是三合災福一星稍異理皆不然中間又有偏局且如子上危十二度立命上盤是卯下盤是子此乃四正之體土為命主飛入於亥宫初度則是上盤卯下盤亥却成亥卯未三合局為用或有祿馬扶之亦是貴命丑宫命丑與子合故以土為主雖主相同然取用體局與子宫别子為四正丑為諸不入局三位互加以丑加亥亥中無間極而兩宫通關以寅關丑論其星辰雖緩且急亥為兄寅為相此宫有吉凶可以通斷外雖緩而實急胎中造化自有玄微所忌者太陽木氣所喜者金火羅㬋正二月生太陽直難為凶多是夜生有此若秋冬兩季晝生行太陽之道而禍亦輕木氣為嫌但論晝生庶幾可取金為官星火為福主二皆可用晝生功淺夜生用多若火髙強明健雖晝生亦可發福如壬甲人見火如乙丁人見金其福尤大獨羅有用氣計無成若混以刑囚直難當作凶斷若貴祿馬職元局主之類稍吉此宫屬土中有斗牛二宿斗度命者當取木為用須甲乙生或納音木火命更以春令而生即以木論亦且不離乎土以此命度見孛故有功火亦得用惟晝生見金為忌若夏令之際生在晝時合得木用金之不忌亦明然矣若或庚辛生人或春夏之夜生木盛金衰當從何論或秋冬以金主事則又不可以金尅木論蓋庚辛人金亢金也春夏之夜者金之廢也秋冬者金之權也巳酉丑者金局也三限皆金火夜生以金火為主合以金為長土次之火其用也何曽以木為本元若或戊巳生及納音土安命於斗雖春夏生不必論木即以土斷土度四季不離乎土土者金之母二者不可離若夏令以火行權金不怕火以土性存焉若秋冬得金獨垣局無凶難功名又何疑此宫命者是宫無祿馬多是三煞臨之辰戌丑未四位皆煞命妻官田總局若命丑身亥是身入鬼鄉如寅午戌生人此為三煞此格多凶害然諸宫皆以身入間宫為喜惟此宫難與他比如身在亥有木臨照為禍尤甚縱無木氣亦不為吉通以凶斷以卯辰午為緊要之地午為難宫太陽居之為難星入廟若得火居之或三合見土為福星入局是八煞有星更以祿臨之少年功名可必辰為官祿金星入廟太隂居之身入官鄉如木氣臨之是木入水局土主不宜為害曜破官祿如失用更不可如木氣同太隂在酉辰是亥加酉午加辰辰午酉亥俱全皆為不足卯為福德土星臨之是土入火垣有情生土或木星臨三合能破我福德是卯加入丑為我命害少年刑傷十二宫命惟此宫乃緩中之急前所舉相貌間極是若命主土星在寅亥者或有火羅合之是福相造化若土單行二方二方間相是也又為凶局若身與火交是安身傍母身與木交為安身傍鬼又如乙祿在卯乙人丑命為加盤之祿甲祿在寅甲人丑命為通關之祿壬祿在亥壬人丑命乃祿入間極以午加亥得下盤之祿命得此三者為祿也如辛祿酉丙戊祿巳此三者安命於丑合照有祿是合祿也正所謂隱中之顯是製局之體用合此者無不顯貴又不可不觀子寅若火寅金子為官福夾命夜生福尤重日月在二宫亦妙日在子月在寅為上日在寅月在子次之己酉兩宫與此通斷當審吉凶又以丑之為命故知其與諸不入局於中又有緊要處若安命稍正則合從入局斷若安命偏於子又從四正局矣偏正之中有天地德合局六害局六合局又不可以諸不入局斷以六害為六合極相霄壤六合則始終有吉六害則始終有患發明云丑宫立命以金為官星乙丁生人化福祿更美火為恩曜若壬甲生人見之為福尤重羅乃火餘為福一也晝生功淺夜生用多若火髙強明健雖晝生亦可發福人皆以木氣為善星火羅為惡曜豈知善星發福緩惡星發福驟但恐混以囚忌之星反能為禍矣若混以職元祿主崇勳貴人為福愈有力也宫之最切者八煞官祿福德三宫也午為八煞太陽在上謂之難星入垣惟火居之或三合見土一則土命人得火局二則福星入垣局三則八煞有星更有祿馬加臨少年功名可許辰為官祿金星在上謂之官星之垣又為金星入廟月在上謂之身入官鄉俱為吉利惟木居之一則木入水局二則害曜破官三則辰午為煞十二宫主惟相貌間極乃緩中之急若命主二星在上或有火羅合之多是卿相造化如鄭敬齋壬辰十一月十九日辰時安命在丑土星在亥係間極宫官至公相若此顯達者不可枚舉雖土在亥本為土逢木局而未宫有火却成木生火火生土況命坐崇勳而見火加入命宫此其所以為佳也須知此格方妙亦有於寅位輳成火局或有火羅乘之者如單見一土入木局當以凶斷不可一例推之要之最切者莫如加盤最妙者莫如入局正謂得地不須論惡弱失時何必問髙強今之術者不知加盤之妙以為鄭敬齋之首發達者何辰限為大魁又何三十六氣此中氣推之正交入辰限辰限無星不知辰加寅既加見祿又加見馬安得不榮達切不可以弱宫論之又如巳宫雖曰遷移實為切要若有金星在上一則照命二則照祿三則官星入局值此者多是晚年顯達切不可以弱宫論也然又要觀子寅二宫有夾有扶尤妙若火在寅金在子為官福夾命日月在二宫亦佳日在子月在寅為上日在寅月在子次之日在巳月在酉亦謂之隂陽拱夾亦好身命若拱夾好則一生吉利若不好則一生災晦又是前為胎元後為三日其為禍福不亦重乎其次要觀命主命宫為緩命主為急故殿駕經云命雖空亡而主領猶在即命主也最要者拱夾不然諸星揖拱日月朝拱皆貴命也又其次要觀身主若拱祿拱殿拱駕皆是貴格若身命主在辰卯上謂之官福入命不可與諸煞相參若身命二主拱卯不為拱福德却為拱木局土命得之皆為失格間有救處亦是貧天之命又其次要觀當生之時若攀殿駕登祿馬亦是貴命在十二宫皆要太隂居間極獨此丑宫與亥宫最怕太隂在間極蓋丑土也亥木也月臨之謂之安身傍鬼又成木局主一生迍蹇重則夭折既觀此生時又要觀所生之日有天月二德帝座或日月夾垣城帝座或二主夾垣城帝座或官福夾垣城帝座或身命夾垣城帝座此三台八座之格如日在丑月在亥中夾一子若丙子丁丑日生水旺在子乃日生以帝旺為帝座也納音旺處是帝座也庚午辛未日皆土旺在子故帝座在子日月夾之豈不竒哉惟癸巳乙卯乙酉更髙一著是謂暗祿入局日在丑月在卯更於丙寅丁卯時是納音火長生在寅謂之日月夾垣城畢竟謂之安身傍鬼以中夾寅木若更遭刑煞囚難等星在其中則必為害又不可以垣城論也若無他忌只恐寅木為害此亦小節不足慮也又以丑之為命故知其為諸不入局偏則為四正局於中亦有變處正則為諸不入局蓋安命稍正則合從入局斷若安命偏於子又從四正局矣偏正之中有天地德合局六害局六合局六破局不可便以諸不入局看以六害為六合不啻霄壤六合則始終有成六害則始終有患須於偏正中仔細推之寅宫命寅宫屬木獨陽不生木生在亥寅與亥合兩宫互加丑為通關卯為加盤一則財帛二則相貌若有凶吉臨於卯丑吉則為福凶則為禍人但知拱夾為重不知互加為妙若在外而實在內也宫神艮丙生人卦氣以日木土為三限主木土為田財以金水為官福木土二星晝生明健福力非常夜生亦可金為忌害秋冬之際常行於卯辰巳之間是時木瘁而衰金強而怒晝見有災如金會水日尤可為用若金獨立無水日以制之三合左右有太隂助金臨之木土禍何可堪冬月本非晝用何況難星黨鬼又為身與鬼交此為慘毒若春夏之際金星行於東南西北晝生不利夜生金水同行亦為吉火同行為有情會合太隂亦不為凶蓋夜從陰金火皆隂也若太陰更臨陰方又為吉用況其木盛金柔我強彼弱何足畏之水為官星晝夜有用此宫尾箕二宿於內尾乃火之垣寅午戌乃火之局其火之用明矣然而火乃木之子木乃火之母必先母而後子茍捨木而全取火是為有子而無其母寅尾命晝生以木為先夜生當以火為用金星禍福前斷已明水雖為忌亦為利害獨有丙丁人及納音火者可以為緊其他命者又不相同如箕度水四時取水為用水乃木之母先水而後木水之一星一為命母二為命度三為官星諸用畢備若水孛交計水會水火交征水土相迫雖為凶忌尤當明審如春夏生水為休囚彼強我弱是故不足生於冬月水星旺相命主官星秉令凶惡夾之反為輔衛是猶武卒之於將相若居於髙強富貴可必茍失地亦能為凶古人云人命臨於箕多疾害兼箕星好風且主簸揚身命忌曜交夾或星曜戰鬭於人多災病縱有官亦有讒謗之類人馬安命人多好動主遷移此宫禍福與亥不同亥以隂為主寅以陽為論日木土三者故不離乎取用夜生用輕亦不可失辰為福德已為官祿但木忌居福德若月居之為身居鬼鄉遇水解之免凶辰與亥通關限入此者本宫有星可以明斷若無星必於亥宫取其禍福若亥有命母財元天馬之類皆以吉言凶星臨之則凶已為官祿一生成就之地己戌通關依上取用水為官星得失強弱生平賴之中間輕重前段已具午宫為遷移諸星臨之善惡易别六巳生人太隂臨其上為大吉午乃六巳人祿兼卦氣上盤巨蟹乃太隂之垣廟此命當為貴格又不可以難星斷之非六巳人不可言未乃難宫此宫與他難星不同此是太隂為難身主相干若身更入難宫申來加未未加午午未二宫忽有忌曜又為前後三日胎元此兩宫為禍福最緊宜明審察惟丑乃財帛宫丑與寅通若此宫有田財二主或當用之星為吉與他處財帛命管攝者大不同蓋此財帛有命宫也如甲之申子辰坐此是命有祿馬以木火為最重如甲之寅午戌則以木火為竒亦命宫之有真祿馬對衝也若己酉丑人身居福德乃身命夾三煞此宫所合數局本為不入局若偏之卯則有伏吟局天地通局在焉雖然如此亦難捉摸所貴者得其綱領而已發明云寅宫屬木木生在亥寅與亥合兩宫互加丑為通關卯為加盤一則財帛二則相貌若有吉星居之則帛相貌皆是貴命若有凶星居之皆是賤命好則福生有基不好則禍起蕭牆人皆知拱夾為重而不知互加為妙若在外而實在內也此宫所好者水也孛也所忌者金也月也皆難星也金水二星最關利害細看閃避互宫換局貴賤了然若金入水位水入金宫不然金入水局水入金局皆是仕宦命也若金水相隔一位水居無用之地則為夭折之命大抵恩星雖化為刑囚直星亦吉若化為福祿愈佳然難星雖化為福祿亦凶若化為刑囚尤酷餘宫依此斷之雖然好惡之星如此又次看守宫之星如何所用之星如何印蔭混雜之星如何方可以斷吉凶且如庚生人以水為祿主乙生人以孛為祿主固為福也若五六月生人混之以火土是火直生土囚尅祿水耗尅祿孛未必不為禍矣又如巳生人以金化囚為忌辛生人以太隂化囚為忌固為害矣若春生金混之以水得水以泄金太隂水精以生孛反為有福不可槩論也當審輕重斷之若有職元局主天馬地驛與夫難星害曜直煞之類又不可以此斷論十二宫惟官祿福德田宅八煞至切也已為官祿所屬者水水星居之謂之官星入垣太隂居之謂之身入官祿木星居之謂之木入水位命主有氣謂之命主坐官或丙戊生人謂之祿居官祿俱是富貴之命若金星居之謂之害曜破官午有水星破禍成福有火居之亦能為福若辰酉有金破福成禍辰為福德屬金若金星居之不為福星入垣即為害曜入垣太隂居之不為身居福德即為安身傍鬼又為難星黨害曜木星居之不為命主坐福德却為木困金鄉是貧薄命也若金居之混之以水破禍成福木星居之若申子辰有水星即為木入水局太隂居之若六乙生人卯上有祿即為身命夾祿好惡之辨可細推也田宅亥宫也金水若在亥行辰限多發福若有金土在亥行辰限多為禍男女戌宫與官祿巳宫相關有金在戌行限遇水則吉利若有土金在戌到巳限不見水則不利八煞未宫太隂居之謂之難星入垣若三四月生人月為直星主生疾病六辛生人月化囚星多有官災更加申午二宫若有凶星臨之嵗煞值之謂之以煞見煞有大禍存焉有吉星臨之未必為福是申為胎元午為三日前扶後引惟命主木星居之一則入局二則入秦三則八煞有星不為主居疾厄也更有吉星扶之不貴即富矣此宫亦有數局一為天地通關局二為天地德合局三為六合局四為諸不入局五為六害局所謂天地通關局者以隂加陽以陽加隂主星得宜是也如寅生人以木為主飛入於申加之以酉申者陽也酉者隂也申屬水酉屬金是金生水酉生木木飛申上有祿寅宫安命謂之衝干對祿謂之六合局為吉若辛生人木為主星飛在戌上亦加之以酉雖曰辛祿在酉酉屬金木逢之不得其次反成六害局酉戌是穿心六害為不吉也所謂天地德合局者此宫坐命有二丁巳生人祿在午木為主星飛在午午宫有未是午與未合六癸生人祿在子木為主星飛在子子宫冇丑是子與丑合如甲戊未庚生人貴在丑未而命主飛在未是未宫有午午與合如六辛生人貴在午寅而命主飛在午是午宫有未未與午合如乙巳生人貴在子申而命主飛在子子宫冇丑子與丑合又甲戊庚生人命主飛在丑丑宫有子子與丑合有如此數即為之六合局不然互拱見貴尤其佳也其他皆為諸不入局是天盤地盤加合不成如有職元殿駕局主卦氣天馬地驛在命主所躔之宫即為好命如有刑囚難直煞星在命主所躔之宫即為凶命也又謂不入局中有六害存焉木為命主在酉是酉宫有戌戌宫有酉好則為天地通關局不好則為六害焉又如木為命主在卯辰卯辰是六害辰宫有卯卯宫有辰為六害局惟是這處便有輕重此寅之一宫得隂注陽受二星最為利益專解直難一星八煞宫屬月以月為難星若得隂注陽受解之不為身犯難宫若以月所到處皆成難星守位如此則此宫安命者俱無好命矣貴乎有隂注陽受而附加之尤以為佳所以大煞僧多值此星亦有大仕宦者多值此星互加暗加之法後學鮮知最妙者寅中之造化萬物殊途皆由此出人徒知有寅也而不知有艮也人徒知有艮也而不知有震也先天後天大有施設誰能明達至此乎寅宫坐命皆從卯上加所謂天地左旋而右轉又以偏正而論所合者數局殊不知伏吟局有之六害六合局有之天地通關局天地德合局亦有之惟其如此亦難捉摸所貴得其要訣則判然如在目前矣卯宫命卯與戌合故為火命居於此為伏吟偏於寅則為不入局偏於辰則為六害局子卯通關四正取用最為緊切此宫體認與四正四刑反吟局相表裏如天地通局自卯起子卯為東方之地子為支神之首以此加之是為諸局之總故先有天地通局一則生二二則生三生生無窮宫神震庚人卦氣火金月為三限主以木土為田財以太陽為官主以水為忌難卯主陰夜生用火金月也金火有情於我處於髙明為福必矣晝生則用輕晝生若木土臨命度不為田財之用而為陽明之助火為本領與木相維春夏當權雖晝生不為忌夜更有功一火滿用此為最切得之必有勇略又能謙恭起於太陽之處為命主朝君廊廟之士也若會於午最明若在陷宫則減力水為難星於春夏者以木土為主令我強彼弱水力終微七月八月生值之者以難加直故為不足身近水為身與鬼交多主暗疾生冬月水常經於寅卯之間此時木衰火老水正得時見之不利若得水星合木木能生火乃絶而復續也若助之金孛其凶尤甚若金水交行是為難星得助此宫三宿如房度太陽為性與火通類經云太陽與火通斷生尅制化惟依火而行心月度夜生從太陰為主金火助之吉見土計為忌蓋夜生隂局命者亦以火計為嫌晝生從火斷如氐度戊巳生人及納音土者命宫與土星相管攝方可以土斷又不可以土助之蓋天地間土從火中出必有火而後有土以氐為土度斷則土生旺但不可一例以木氣為嫌戊巳人納音土者九月十月方以木為礙終無傷人元氣若春夏之際木又為財元生旺論之不可一槩言也庚人得之而為化氣必能獲福又喜土計臨之蓋天元屬金故夜生人亦不為忌此宫立命無分晝夜不問四時必藉太陽臨之吉地輔之吉曜守於祿宫卦氣之上則功名顯達茍陷於惡弱混以刑囚直難必有凶纍此是凶暴之徒每犯刑憲此宫主命為伏吟之體難比三合六合論所緊者考於四正四正吉凶有無虛實則命宫同一體午為官祿子為田宅酉為妻俱相關係蓋子午卯酉本為四刑之地甲丙戊庚壬人之四刑者闌干貫索伏尸卷舌是也得其吉則有驟然之福歸之凶則有暴然之禍命宫為始官祿次之妻宫為終翻覆往來凶吉倚伏處中交之際多是世變風移善惡相反也設若丙戊生人官宫主事此為天地盤中上下交若有福祿日月臨之多是發福中主夭暴如得子午上有羅計主之方可禦患蓋天星制地煞此局機關最為靈驗福德主巳以巳加巳上下無度只尋其初而窮其終與官祿體勢甚别或以軫加翼以其深淺不同禍福則異若丙戊人祿所在若子午卯酉人破碎所在當斟酌而言此宫無四正變換之理合戌中加之通關有吉可以吉斷有凶則以凶言通關無吉凶之曜當取三合有無制局解之方定禍福卯宫坐命體勢最難明白本宫無變但看深淺如何正則無復變偏則體局又變其間詳審在伏吟圖中申宫主厄所忌水星唯七八月間多生於東南之際以太陽故也如初中末見之當審其患又看制化如何最宜明辨發明云卯宫屬火火庫居戌卯與戌合戌者陽也卯者陰也故以火為命主春夏當權雖書生不為忌夜更有功命居於此為伏吟偏於寅則為不入局偏於辰則為六害局卯辰是六害伏吟無度大槩要推日出入度之淺深如日入淺躔氐一度雖天盤在卯則加辰地盤則寅加卯以卯時而論則命度與日同度有如此類便以為伏吟局其説謬矣又六合局有之六害局有之天地通關局天地德合局亦有之於中暗有造化若日躔房度以卯時生則正為伏吟局既得伏吟局之正故無往而不正在十二宫中亦皆以正論其禍福只在一十五度內見之使有一水星在亢初度水能尅火是禍起蕭牆使有一木星在尾初度木能生火是福生有基木氣者此官之父母水孛者此宫之鬼賊木為母曜氣為木餘固能為福若六巳生人於十一月十二月生者復混以生未必不為禍也難星囚直不惟作災又制其木不使為福又如水孛固能為害若六辛六丙生人於二月三月生者混之以木氣未必不為福也是水生木又以氣泄水不能為禍至此方知其妙要之十二宫最切者無如戌宫酉宫其次申未宫禍福不出乎此蓋戌宫關我官祿且官福二宫有好星在上未必吉惡星在上未必凶惟有暗加之吉凶最驗也未為遷移申為八煞申未通關難星居之俱為不足月臨之亦未為善更火星臨之却不為火臨坤地災消爍而為災愈甚人多不知其然也此宫坐命一曰深淺互加二曰翻覆互加三曰就本位加且以深淺互加言之以一宫有三十度有竒日初入則謂之淺日將次欲出則謂之深不然命宫三十度皆然今試言此一段加盤方曉其義以命宫之入淺而論則八嵗至十五嵗是卯加辰辰所主也若有水星在辰是辰金生水為災愈甚十六嵗至二十一嵗是辰加辰二十二嵗至二十六嵗是辰加巳巳上加見辰水謂之害星入垣能制其火二十七嵗至三十四嵗是巳加巳三十四嵗至四十二嵗是巳加午四十三嵗至四十六嵗是午加午四十七嵗至五十二嵗是午加未以命主入深而論自一嵗至七嵗謂之卯加寅雖坐命於卯而却一半在寅起所以卯加寅也自八嵗至十五嵗是卯加卯此伏吟局加盤也大槩日漸淺而漸深不可便以為淺便以為深返旋加減則命度自明此則言其大略也若行限則又看中氣更看在何宫上如逢職元局主卦氣天馬必能為福如逢嵗煞刑囚直難必能為禍不可一例推之所謂及覆局互加既以天門加地户又以地户加天門天門屬乾亥宫也地户屬巽巳宫也奎初至軫七軫七至奎初此理點實於中造化隱然之妙正在丑加寅子加卯亥加辰戌加巳午加酉申加未所謂本局互加亦反覆局例以寅加辰次第加去禍福了然以上加盤要看星辰對度消詳取用以論吉凶辰宫命辰與酉合金為主已在前卯在後人見其夾拱而相統攝卯本加辰辰加巳兩宫互加於此亥為通關反覆巳亥兩宫禍福最緊宫屬四庫既無祿馬又無卦氣命宫於此六害二體考之禍福翻覆為先互加次之此宫立命以太陰為官祿主以火土為田財主晝生以土水木為三限主如晝之木土本強若更處髙明必合體用夜生則量輕重雖為反曜而亦無凶水之用涉得失難辨臨凶則凶遇吉則吉火星為財夜見為福晝則無功戊庚辛人多為不利甲巳丁人見之為喜秋令則名利兩全夏令則名為利奪行之陰道財福最多居之陽分人多貪吝如逢水孛則以為凶會土計為吉羅㬋泄財之氣木氣養之取其得失與其他宫分不同中有軫角亢三宿木同軫亦無翼水在金中土不為忌角之一宿木主乎春春月生人則為有用如甲乙為干納音屬木先忌金羅次嫌火氣與其他干音又不同秋冬金強於木何有晝夜以金為首得其吉用為剛方若例以凶神恐乖仁義雖宫有三宿然主用要明不可一槩以戰為論蓋水之為相是金之水四時常行之道晝夜不忌乎土見土用為三限得土則金有滋生若角之為度是金中有木金柔則木盛金盛則木衰此二者皆我家本然之物何以刑戰但白晝以金木相交則恐為六悲之害當以凶斷其他時候如金木相去爭差何凶之有若角木苟以金為忌則亢金豈以火為財得失消詳又當明審此宫坐命生於冬月者金依太陽每行東方艮震之地亦有躔尾箕於寅人皆以金騎人馬為忌此乃星家常論此宫與酉宫金騎人馬不同酉宫論者晝見為凶辰宫論者夜生有禍晝夜造化已别明白更中間藴奧處乃玄中之玄也且以安命在辰取上盤之卯加辰財帛在卯取上盤之寅加卯間極在寅取上盤之丑加寅雖下盤是寅字而上盤却是丑字金得天之局故以為竒若戊庚人有祿馬貴人以是上盤之貴合下盤之祿馬此又為竒中之竒所以為吉中間體勢皆暗中造化又有亥為奴僕多為官星入格此又分别一段論亥雖奴僕與命相關此為弱中之強也此宫立命與戌宫相等所貴者奴僕也蓋戌中有己辰中有亥與其他安命之奴僕不同此宫體勢喜太隂與土同若太隂在奴僕若卯未有土合之即為妙用所妙者以下盤之亥為木局入上盤之戌為火局若得土合是火生土土生金身命相關最為大利故曰得天者貴得地者富午為福宫善惡相半得其吉用則曰培植失之於凶反成黨鬼未為官宫上有午下有未名曰六合為官惟此一宫立命有此格其他宫分無此能知者罕有如有一星得用在其間可以得名得祿若六巳人太隂居未又為官星更是祿主星又得上盤之崇勳卦氣豈不為超倫出世之流酉入難宫辰與酉合彼此相同戌宫與八難相類如見難星只依晝夜生尅而論禍福金為命元又為難星不可以命宫與八難同論辰宫乃天涯地角之所若合以驛馬臨以水孛多是離鄉奔走之人若交之紫氣是僧道師巫之流也此宫體勢與四正不同與六合亦異偏之卯則曰伏吟偏之巳則為不入局輕重當自察之發明云辰宫屬金坐命以金為主金之一星最關利害若飛起入官福二宫又臨駕登殿入局無惡星雜之則以貴命論若飛入四宫更加福祿權財相會而不以暗耗雜之則以富命論或在奴僕相貌弱宫又無官福權財助之則以貧賤命論若坐煞宫會刑囚直難則以刑夭命論此宫所忌者火羅所喜土計也土為命母又為田宅宫主計乃土餘所以皆喜也火為煞星羅乃火餘所以皆忌也雖然喜忌如此取用亦須看守宫加合印蔭何如耳如火羅雖為煞曜若混之以土計則轉禍為福矣土計雖為思星若混之以木氣尅我命母反助火羅之惡為禍非輕若以十二宫輕重言之無如命宫主之最緊也午為福德未為官祿日在午為福入福宫月在未為官居官位不惟官祿入垣又是隂陽入廟最為竒也或命主居於強宫又與太嵗宫神祿馬天馬地驛職元局主互相管攝則功名顯赫矣卯為財帛火星居之不為財元入廟乃是刑曜入垣酉為八煞金星臨之不為難星入垣乃是八煞有星合此格者無有不好若科名科甲拱夾愈加其妙若金星在午福德之位日為福主在巳月為官祿主在未謂之日月夾主又為官福夾主則為福不淺矣且如王待制甲申十月初五日寅時生命在辰金為主在寅本居間極之宫又臨天馬未足為榮蓋寅為祿馬之地天盤以丑加寅是為坐貴坐祿若日在卯月在丑乃日月夾主星況日月二主又是官福丑寅卯皆隔一位加見官祿又是夜生人不背年三十餘官至待制地位若金在午羅在巳火在未謂之火羅夾命主若是六戊六丙生人以火羅為刑囚謂之刑囚夾本主刑害可知天盤巳加午主犯囚星以午加未主為刑星所犯謂之合處受傷為害不小必然刑夭破敗雖日月夾奚補哉縱富貴亦須夭折若寅午戌三合者有土計居之可以泄火之凶不然己申宫有土則火能生土土能生金又可挽回春意以有益於我之金如土計二星更為祿貴天馬地驛之類助之尤為大福也此辰宫安命隔一位互加一則為天地通局二為六害局或有官星祿主祿星貴人在卯辰巳三位則吉是卯加辰辰加巳謂之天地通關局若火羅二星又為刑囚直難在卯巳二位亦以卯加辰辰加巳俱是刑囚是火來尅金謂之六害局蓋吉星居之則為天地通關局其為福可知凶星臨之則為六害局其為禍可知或者不識飛宫變局可以互加舉一隅則三隅反又如火星在午是財星逢旺亦是刑星逢旺既為財元坐祿又為刑星破福既看財元不當以刑星論蓋火為財元逢旺若是丁巳生人祿居午位乃是財元坐福坐祿加以土計二星為祿主權星在寅戌二宫或在巳未二位大約三十六嵗行午限得土計為福祿臨之必大發福也若火為財元逢旺倘會刑囚難直在午又是嵗煞之所在若更生於夏月之時火神用事若三十六嵗限到午必然夭折縱有當生之金在巳酉丑三位亦難救達者觀之不待辨而自明矣巳宫命巳宫屬水此宫安命謂之諸不入局亦謂之借局三位互加與卯未兩宫相關係巳戌通關與戌宫為翻覆命宫加卯福德加巳以巳關戌以戌通巳此宫取用為無體局多以借局用之借局者即制局之類也宫神屬巽辛人卦氣三限之主則金火月以水為命元官祿主以太陰為福德以木為田宅以金為財帛以火為難以土為忌水之所主四時不竭春夏之水為用淺秋冬之水為用多冬水秉令得之多謀術蓋水者主智之義也水之於土為忌害甲乙命猶庶幾壬癸人實為鬼土埋雙女見木氣不以為忌火起髙強見木氣亦為禍晝生見土不甚為凶夜生見火反凶為吉四季之土必有悲傷夏月之火為難太重土星犯月故以為凶火星犯月晝尤利害土為奴僕犯命臨身生來輕賤雖有基業之人亦如奴僕奔波火為疾厄居身入命生來多招殘疾雖有享用中年亦主殘傷金木為田財之主得晝用則義重利輕得夜用則義輕利重春水敷榮秋金堅鋭交以凶神田財亦利若冬季生人水與土計會不可以槩論蓋主神得令雖有凶忌而反輔衛居命臨官却有吉用水與金交是為官財得勝人有進身於仕宦者多溺於貪汙若水會木星或生於草茅者亦篤於文學水朝太陽為官主朝君少年科第水背太陽為官星潛伏老無出身水臨月孛多貪酒色水近太陰多逢官貴水逢紫氣勤儉立身多主僧道水會計都多能計算必熟商賈蓋水為性遇凶則凶遇吉則吉此宫二宿軫翼居之其間水火爭差陰陽迭異翼火度者水中之火火中之水亦猶五行丙子丙午得其制化為水火既濟冬令則火不能勝水夏令則水不能勝火黨之木則為火勢臨之金則歸水性丙丁天干從火則是壬癸命者取水為先若行火令臨以木氣是為助難五六月生直難兼具若行水令會以金星是為生官冬臘生人名利兼全此翼之一宿乃火之經復乃水之度火在中間以此為之火度合以水星主其本次以火星求其用先取時令之強弱次驗人命之緩急但以水為用必無差火之為用當明輕重若行失勢是謂本主衰微火行得助是難星火熾中間得失務要詳察不可輕斷官福二宫在於申未此為要地如水與月同行為官福交會未申通關官中有福福中有官若有一宫得吉前後俱利一星為凶彼此受災雖各宫分别而實相維未宫亦與巳相統攝申乃官宫巳乃命宫禍福往來可以取驗申乃水垣吉臨之官局凶則破我官祿戌宫疾厄翻覆之宫也下盤乃寅午戌上盤乃申子辰失其用則為疾厄受刑得其用則為通關有吉若火土臨之是火生土土尅我水也若三合有金水反成申子辰水局上盤加申與官宫相關係下盤是戌與巳相往來此宫極緊不可緩也最宜明辨發明云巳宫屬水安命於此謂之借局亦謂之諸不入局隔三位互加卯為間極午為相貌兩宫雖為怒陷實與命宫官祿暗有相關水星在午卯二位盡是陷弱為福必難安知水在午午加申皆是水位水在卯卯加巳水星入垣亦為水臨雙女若癸酉癸丑之人帶此多發達水在午午加申官祿主坐長生不惟命主入垣亦是官星得局若六庚生人水為祿主乃是祿主居窠申宫又為嵗殿之所在必少年騰踏此加盤之妙能知弱處之強緩中之急未為福德之宫月居之為月居月位福入福宫若六巳六丁生人為祿主福星為福尤緊孛星在上為太乙抱蟾六乙生人得之為祿居祿位若兼之以木氣天馬地驛職元局主之類乃上貴人也六丁生人得之是身犯囚星若混之以土計四星直難又是橫夭之命矣酉為遷移之宫水居之乃水命金局金星在申謂之金水互垣官星命主有氣六辛生人祿在遷移丙丁生人貴在遷移若有木星在丑酉亥宫照命多是文章顯達之人否則離祖榮身也戌為八煞之宫水星臨之為主居疾厄火入命宫為難星與命主互垣水火互換未免抱病壓身更加土計在寅午拱主又是庚申生人為害不小若木氣在卯亥二位卯加巳巳加未又見木氣長火之惡若無救解則是抱薪救火帶此者多主利害惡死否則手足傷殘六根不具子為奴僕之宫水星在上謂之主入旺鄉又是主居陷弱善惡難辨若與金星同居更於冬月水神用事謂之逢旺得局若與火土同居更生於夏月火土用事我命水未免有傷不可一槩而論若太隂居之主是偏生庶出若癸生人孛羅為福祿夾拱偏官右選造化蓋巳宫所喜者金星母星也財帛官主也所忌者火星八煞宫主也土計也煞星也金在巳謂之財元逢生與水同宫謂之金水會蛇水在未謂主居福德與月同居謂之水涵月魄水在申謂之官星入垣月在申謂之身居官祿福入官宫月在申水在未謂之官福互垣皆是妙用造化土星在巳謂之土埋雙女火星在巳謂之難星入命火土在巳為刑難作黨土在未謂之刑星破福加入命宫土在申謂之刑星破官祿水在子土在巳為命主與奴僕互垣或水土皆在遷移之宫必死於道路皆是刑夭之命若是丁生人以金為祿主乙生人以金為福主必大發福矣如韓丞相八月十五日卯時生人坐命在巳祿又在巳命坐祿水為命主為官星為祿元在巳滿三用皆入垣月為福德主在亥乃戴天履地格正是日月拱官福合作一品之命有火為難星守辰宫臨駕是為客曜臨朝水與太陽同宫坐汨沒煞則主多磨障凡福星得地得局臨駕攀殿居驛馬皆要吉星臨之為官則一生享福若有刑星臨之必為刑煞之所制縱為仕宦亦蹇滯宜斟酌輕重論之則不為按圖索驥也午宫命午為離明之地四正之宫四位通關卯加午午通酉子為對宫宫神惟六巳人卦氣崇勳四正互加官祿為緊此午未𨽻於天故為日月子丑𨽻於地故為土寅申巳亥乃四時運乎其間則為木火金水秉春夏秋冬之令午為君象此宫安命與他宫不同虛昴房不可以太陽為主惟星日馬為正度以日為主金水為官福財帛以木為難又以日木土為三方主以四序而言晝以木土别其用夜以金星為權秋令得金官星秉令冬令得水財星旺夜不為凶晝金用淺以水土木為文經以金火為武略得水土木為人必賢良得金火羅計人多勇略此宫取用與其他宫分立命不同此宫人多以火羅計孛為嫌然太陽當空羣凶自伏雖然火羅亦不敢形見此宫之於諸曜用金水為官福日木土為三限主人命臨之木土金水皆有用得其吉可為吉星之助得其凶即為凶星之忌如木星多不得用獨日生用為三限主如火羅計孛居子午人多以為嫌且以羅計中分五宫是首尾相截之類人命得之豈可為忌論而多有超達者何也午猶人君之位人君居位固親賢宰輔尤不可以無武將以衛之若人命有火羅計孛臨子午多是操略之人如體段稍大即為貴格更加善星臨巳午未申之宫凶星合命此乃吉星為助凶星為衛也如此必有制閫之權非小小守土官也申為福德巳為財帛二者往來吉凶相應人徒知巳與申之類不知卯加午則寅加巳巳加申所以申巳二宫可以通關用若有吉臨則為生我福德助我財帛或有凶破之又為寅刑巳巳刑申三刑六害之類也酉為官祿最為緊地在上盤則午加酉在翻覆則午酉通關是命中有官官中有命二不可捨金星入垣多行於春夏之際白晝見之或會太陽氣象亦可中間却不以金星失令而遇伏或得朝陽亦可言貴雖然為官終有讒謗金居田宅田宅多居秋冬之際夜中見之更會太隂主名利兼全秋金主富人多義氣剛方冬金主殺人有精敢強勇金生於巳居官多主貪汙金絶於寅為官必主激駁若金水得經十分純粹然亦可為富厚之命亥為疾厄是以木為難星於九月十月木星髙強臨官福命宫三合人多疾厄若臨於疾宫是為難星入難為災尤甚紫氣者木之餘同木取斷惟白晝見之雖忌亦小可或臨於日月之中及福祿二宫中年多殘疾秋冬生金主令木衰又不能為害或合處見金亦如是也若夜生太陰與木相值終不為竒更諸凶忌是身臨難終有患害有命居午金星入命太隂居官身入官宫官星入命當為公相又有命居午本月在申此乃寅刑巳巳刑申三刑俱動難主臨身安得不死於法此則眼前之善惡己自分明更入太陰在戌加未日為命主入酉加午太陽得上盤之午太隂得上盤之未是日月尊強得天者貴此格千中無一發明云午為日宫坐命於此以日為主是為四正之體且日在子午卯酉四位互加皆是入廟蓋子有虛午有星卯有房酉有昴四宫皆有日乃為四正互加四位若有殿駕祿貴在上更兼身命二主天馬地驛臨之左右拱夾繼以金水為官福會馬此乃出將入相之格或孛羅二曜為福為權拱夾必兼殺伐之權日為命主喜金水二星互垣互局對日宫行若是金居金局水入水鄉此為入格為官福入垣或金在申水在酉又為官福互垣若身命二主更居官祿福德之位臨駕攀殿又坐貴祿無雜星以混之則為大貴造化若身命二主居官祿之宫不臨殿駕兼火羅在申酉二位六丙六乙生人逢之亦未得為全美矣若金水日在巳六丙六戊生人是命主與官福坐祿亦是仕宦之命或金水日在酉更為竒特若金水日在卯尤妙更兼安身在酉是身居官祿又是日月拱命主若丙生人駕在子貴在酉可為日月拱駕四位互加皆是臨駕入局更加天馬地驛不背亦是公相之命且如虞學士乙未四月二十九日午時生午上安命日為命主在酉以酉加午謂之升殿金為官星化福日為命主三元上下二盤皆入廟旺月與火同宫在戌以戌加未又是月居月位日月升宫況未生人未為殿駕月為嵗星火為嵗德戌未相加二星臨駕朝垣是謂嵗德朝垣火月升殿合此格者少年及第名冠天下此酉戌二位與午未本無相涉而大有相關以日在酉月在戌人皆以為反背晦明矣然焉知午加酉未加戌皆是日月升殿此乃加盤之妙也巳為財帛之宫水在巳為財元入廟土星臨之害我財帛水在申為福星入垣土在申破我福德若金在卯水在酉皆加入命宫日在午為命主入垣官福左右夾命日在子駕在子為命主臨駕官福拱命拱駕皆是上格之命若六庚六丁生人見之更妙日在子火在申羅在辰謂之火羅拱命六乙六丙生人見之更毒不可不知也亥為疾厄之宫命主臨之是主居八煞俱為不足然則日為命主乃人君之象雖遇火羅計孛皆不足慮所慮者木氣二星木為難曜氣為木餘如臨照身命實足為害日為宫主與木同居謂之命主犯難氣星亦然九月十月生人為害愈重不然生於春月木神用事必致橫禍日與木在巳又是寅生寅時寅上是煞宫巳上是月煞直難刑囚居之為害尤重若木在申身命在申在巳是皆寅來刑巳巳來刑申是為三刑局合此格者皆刑徒命也且如晏頭陀壬寅七月二十四日寅時生寅刑巳巳刑申乃三刑局命也不合土水火孛在命水為囚直與火土孛戰於命宫安得不死於非命蓋享賊首之福是全為官星在巳逢生坐貴會命主所以享福而終為惡死今略舉其一二乃知加盤之妙亦知四正局為福三刑局為禍或木為難在卯加入命宫謂之難星逢旺入命必為災矣若生當冬月之時水神得地及與水同居六戊生人以木為囚又見水星得時而長木之囚惡更加身命主星坐煞逢傷必死於牢獄或傷殘手足眼目而為廢人方免不然或病風癱而死若木不與水同居而與金相會七八月生人秋金用事金神剛健木被金傷木自謀已不暇傷人則木不能為害也若火與木同宫乃是旺在卯雖入命宫如六甲生人以火星為祿木星為福祿元馬元遇五六月生人火星當權是木難化為福以生權星祿主之火反能為福也造化之妙須看飛宫變局為要或貴人為煞所制伏或煞為貴人之驅馳亦是多凶少吉孰重孰輕禍福如見以此斷之毫髮無差也星學大成卷十一
