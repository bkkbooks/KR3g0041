body:
  text: 星學大成卷二十八明萬民英撰流年論此以下俱論流年倒限流年禍福必從當生禍福為凖以正命宫為定方判吉凶且如一般行限一般流年星辰到而禍福並不同者何也必須先看身命限度當生有無吉凶星守照方可言之如立命子行限寅當生難星守大限流年難星亦到甚者死輕者病如有天官符地官符干涉田財命限則有官刑輕重一般斷之有喪門白虎守命限則有孝服如當生無難星到流年有難星到命限者有禍或者當生有一恩照則吉餘倣此切不可一例以火羅計孛為凶星木氣金水土為善星又如立命於子木氣為難火羅為恩若火羅照命限未可以為凶乃恩星也必得意遇紅鸞天喜有喜遇陽刃亡劫空亡太歲亦不降福如逢流孛難星到火羅亦到是他星反激起火羅之怒又不能降福矣又如木氣是流年難星到命限或是對合必主不寧亦須看當生星得地否更看流年限到何度如是限到難度當生難星明健必主重險如限到恩度當生難柔弱流年難星來而禍重矣更可詳細分别病訟孝服等事如逢歲破大耗亡劫天地官符必訟若流年喪門白虎天哭吊客輕則孝服重則親喪如擎遊病符死符披頭血刃有病重輕生死依當生限度上定之但是凶難守照命宫則禍輕臨照限宫則禍重吉凶亦然所緊要者太歲有太歲守命限一年平安又有喜事有太歲守命限而一年凶災疊出或孝服重重止從納音生尅與命宫限度有情無情衝守有偏有正正則必禍偏則無妨更於當生星辰上衝併吉凶以斷之便從太歲上數起一太歲二太陽三喪門四太陰五官符六死符七歲破八龍德九白虎十福德十一吊客十二病符從命限所臨之地流年星辰凶吉以定禍福火羅頭見計孛土主尾見木氣同時皆主末關之事全在太歲神煞上取用流年都天賦命為本限為末定中年之榮枯星移次煞移宫決流年之休咎太歲乃諸神之統領月將為衆煞之樞機月建併煞臨身無吉曜必遭橫攪太歲趕煞入局遇惡曜定入泉鄉喪門白虎哭聲騰血刃官符公訟起擎天遊奕照身命則倐頓生災豹尾黃幡臨限程則纒綿有病大耗并計孛火羅於地座則家破人離紅鸞遇木金氣水於限程則財豐祿厚催官星至須知恩命之榮倉祿星臨乃見文書之喜添人進口天喜便遇吉星足祿多財三煞不臨財位紅鸞乃非吉曜天喜乃是凶神須看交併何如方定災祥奚若遇吉則為吉斷逢凶須作凶看天蠱為血光之神白虎乃重喪之煞紅鸞照命有喜可消膿血之災大煞臨身無病必招刑憲之禍木氣須為吉曜土命之人則以為災土孛本是凶星木星之人反能招福水孛主腎部疾嗽失脫破財火羅主心腹血光是非致訟欲知陰人齟齬金孛照命值官符如逢高貴提攜氣木臨身逢天喜財逢劫煞須防盜賊之侵田值官符未免户爭之撓擎天莫臨妻子之位骨肉相刑官符怕到兄弟之宫訟庭爭理死符病符當命限切忌浮災大煞劫煞臨田財須防暗損凶攢煞聚九死一生之年煞值星扶三滿三平之歲馬到遷移逢紫氣千里稱心祿臨主限照金星四時進喜血刃傷財破蕩六害尅子防妻咸池併限閙林中三煞衝身路泉口吊客主門庭之孝血毒生瘡疾之災黃幡怕與火羅併囚中致死豹尾只宜木金救險處生祥凶星得用進權名惡煞攻身防險厄棄人間事歲君趕煞併限入喪門從地下遊歲破攢凶併命臨三煞所喜者左助右救所忌者後逼前空更加闌干之凶必定幽冥之禍驟加官職天喜照限福星臨橫進資財官祿臨身凶曜退勾絞四時多撓交爭不明劫亡一日為災迍邅莫免更忌星躔留退尤防煞反攻神攢凶須作夢中人聚惡乃為泉下客有救則吉無救則凶若參較乎災祥宜酌量乎輕重僅見斯文祕之為寶流年雜斷且如子丑安命火羅計孛入命更元守有凶蓋命宫屬土火羅生我如晝生以火羅為嫌雖凶亦輕但恐孛併却為凶惡如夜生遇火羅更有木合之天喜扶之飛殿合之是年却有喜慶仕宦有遷除之喜常人亦吉慶惟嫌木氣孛更以土計併或限入煞鄉或遇子午邜酉之年禍患愈甚且如命在巳申俱以火羅土計孛為災火羅晝生愈速夜生稍輕土計孛亦主災患夜生其禍甚焉若土計交運交限最凶諸化福祿何益在庶人則多疾病破耗在官貴則被紏彈公吏則主刺配若命中元守薄惡根基淺弱必主夭亡若是天干夀元金者或木氣交合却不致於傷夀亦不能無災病官非若木氣交合天喜飛殿臨之申命則取木為官巳命則取木為田主皆為吉用倘或晝生甲乙干或納音木者便以水為天馬職元局主及當用三方主之類是年決有喜慶庶人得財仕宦升職且如寅亥坐命亥以火為財夜生得之有財寅以土為財晝生乃得利若星交羅計土孛在命限者晝生皆能為災甚至夭折若命與身元坐煞地必致傷殘但諸星單行斯為有用不犯官病符喪門吊客其流行之星雖為忌曜難星無凶星黨之其為害不甚切忽以土星入流於寅亥遇流金入宫為害其人當一場大禍縱根基深厚倘三合無火制之亦危若生秋冬月更會流年秋冬三月其禍未易支持勢須水入宫或三合見水方可少化其毒生於春夏命中元守有水在焉可以泄土金之氣壯木之根則無患矣若流年火土金星三合交併加以煞動即不可遏矣若水星合木流入命宫又天喜加臨飛殿在仕則遷在庶人得財喜僧道有住持商賈得財且如命在辰酉最怕流年火羅為災如火羅入命限有木氣會之比其黨惡縱其歲煞星不動亦主多災本宫三合有土見之方可化其毒若土單行於此二宫或臨限度晝生當有名利夜生為福亦輕酉宫立命者流年火土交土孛會皆為吉用土為官星君子為官小人得財辰宫立命獨火行權無孛羅相掩夜生主有財喜晝生亦輕蓋火為財帛主也若火土木為天馬職元局主得之大吉縱非驛馬職元局主次吉獨辰宫夜生見火為吉酉宫見火為嫌若流年有土計會之亦好且如命坐卯戌最怕流年水孛為災遇火羅不為忌火羅土計孛併官符病符相犯即主災殃若獨火獨羅或水孛流行或水孛流退逆在彼則災不小若加流煞衝動多致夭亡必須元守有木氣土計制化之方可無害否則有腸風腎氣之病若流木合水孛更有喜氣扶之即為吉用若飛殿會命限入官木氣得地入照對宫或三合更遇時令強盛必有不擬機會縱無火得用亦可稱情若命元守當用之星高強斷可名利卯宫命者以水為難更值流水孛同行或遲或留在少年一病可過中年值此必得宿疾縱不致死亦為身纍戌宫命者或火孛入限遇喪門白虎吊客併到於六親兄弟必主殘傷如喪門吊客等不併只為官符之類相併主奴僕小人侵盜以致官災否則兄弟有爭此為至驗且如命在午未者午太陽未太陰居午者則火羅計孛為武職之用不可目之為忌曜若他宫則火羅計孛為犯分之星午宫流年獨火獨羅計孛俱不足畏蓋以端門帝座之位凶徒惡黨何敢犯上只恐羣凶交併傍無吉曜解紛倘有制化亦不然矣若火羅計孛獨行不見流年諸煞官符重會則吉未上之火見於白晝未免為忌夜生值火流入命宫或三合無土計孛合之斯為吉宿蓋未以火為官主火羅晝交亦非吉土計夜交尤為凶甚至傷殘輕則重厄蓋夜見土計本為忌曜况土為難故值此不死亦主有宿疾及陰小之災仕宦則有剝職之憂庶民有非常之厄最忌土計處強為緊若獨孛流入命宫不會流年諸煞反為可取之星凡流年諸星須詳與命限有用無用切勿以化氣為取舍得其用則刑囚暗耗能為吉矣失其用則福祿權貴又何益焉詳推造化斟酌吉凶出於一時之明見安可執一而不通也哉太歲歌最是凶神為太歲須把宫神相正配相生相順福之基相尅相刑真可畏假如木德是宫神最怕納金來相尅一生福氣少精神縱有發揮終進退歲駕歲勳并歲貴此星最忌入空亡馬如空馬貴空貴縱有前程不久長若是崇勳居此地不能安享坐高堂身空宜向門前立須把年頭仔細詳歲宿當權為惡毒衆星各各俱降伏他如尅我我無權一生寂寞多孤獨我尅他時他受制手足傷殘傷耳目歲星宫主要比和同室操戈皆不足流年太歲怕當頭中度逢之實可憂口舌破財須疊見更兼忌尅惹間愁若還壓命兼臨限更值凶神不死休十二宫中皆可畏惟有子午得優遊凶神惡煞如何看須把凶神參可斷如逢旺相必為凶若遇長生多險難休囚死絶禍尤遲縱有災危應減半歲星惡黨禍難逃不憂侵命憂侵限駕為太歲號尊君命忌居前不足論奴僕若臨終闕上夫妻如遇奪夫權兄弟臨之多凌辱疾厄臨之貌不全最忌凶星侵限路又怕難星傷限元若是命身如坐馬一生安享福長年更説歲星玄又妙駕星最喜居垣廟平生多近貴人財必有貴人扶左右不宜破駕有飛星不喜臨朝逢客曜少年及第取功名駕中還有官星照歲星若是土為區行限須當怕計都縱使金神為命主若逢餘曜亦焦枯能奪土星又無氣處世無權作懦夫歲德為尊防泄氣豈知所忌在餘奴命宫莫把他宫取須於命處尋元守行限須交論變通便把局垣深考究若本宫星已陷弱雖有流年安可救兩強爭長迭強梁到底還須奴宿強須要正星知退伏自相遜讓更何妨若還兩母俱生我正母還須氣力剛餘母無權兼受制自然安靜更無殃假如辰上安命人巳未兩宫偏怕土命宫為體限為用命主論宫限論度其中造化妙而玄十二宫中俱倣此古來子丑偏怕計彼皆分泄當生氣縱然能生不到頭若是單行生我主他宫别處可推求三合照臨却得力五星推此無限休巳申之中孛可忌邜戌二宫羅可憂寅亥二宫氣不喜倒限要訣倒限之法亦難取用有一般難星而一死一生須看命躔何度次看虛實時候晝夜旺相休囚死絶方可判之如立命辰金為主所怕者火羅不死者何必先問命度如或命緯亢度前面逢火羅若是司令晝現必死背時夜生不死命緯金度亦如是斷又如立命在辰土計為恩守於命宫前面逢火羅甚者必死或火羅稍弱決不可倒限其餘宫分並依此例又如一般難度必須問空亡有空亡者不死無空亡者死又如難星值限兼被黨之者必死矣又如立命亥怕者金星如金居子三合有援者不死無援者死金若在丑及巳酉丑三方照見金星皆可斷的然倒限巳酉丑乃金局縱然有援不甚親切必死餘者依此例斷㿩谷倒限説且如倒限一説跟挨度數而推有煞刃者遇太歲必傷無煞刃者縱凶不死子虛女度木煞真凶丑金斗木金亦為憂惟有牛金獨氣為害箕水寅宫木土兩取土當火令水弱必傷若逢春季之中却又不能為禍尾火度內寅邜兩端寅宫屬木水孛禍輕卯末尾初羅水必死心月房日忌水孛羅氐土火垣木弱不尅辰宫末度木氣必傷亢金堅實不忌火羅怕逢夏令角木焦枯專嫌羅火金亦為憂軫占辰巳兩宫巳軫獨怕計渴翼火水垣冬嫌土計星忌奴羅張懼奴計栁土兩説午桞最怕奴忌鬼栁忌氣忌羅井懼計羅又怕冬旺參嫌奴孛土亦為憂奴氣亦凶四時皆忌畢月忌氣又怕土計為害不問申酉二宫最怕氣以燋渴昴日胃土見木必尅婁金火殿又忌水星夏火最嗔羅㬋奎中金氣皆是凶神壁水又忌氣星又嫌水孛滋嘬觜火室火羅計水孛皆凶煞若同行其度不以為利更看命在何宫限行何處於斯消詳決不失也倒限歌子虛有木星三冬人須卒丑牛有金星遇土須富室秋土損亢金計都亦相逼刃月怕傷木不死生重疾設若富貴人見之破屋室角木遇者凶斗木遇者吉若犯奎木度十有九人死木土好齊瓶九夏水為迍尾火怕秋金冬水傷房日又有翼火蛇有土三冬滅星日與翼同鬼井忌計攻昴日忌羅火參水專怕孛婁金怕水星孛亦能為泄室火木之垣計羅難説吉須要辨煞星難忌皆值刑更落空亡位遇者夀須傾説三關之詳如子上初關危十二度中關虛六度末關女二度並以首尾出入度分初中末度為正關九五度為卒三合吊者不過三度四正衝者不過一度煞居三方之正垣其人死於上節煞居初關死於下節之前上節之後煞居末關死於下節之後上節之前一度節後一日死二度節後二日死三度節後三日死並依度數加減日分上取之無有不準歌云危張心月怕土計虛危二宿又怕氣心中二宿怕羅星畢月嫌羅與計氣火羅同木日灰飛夏月逢之死莫疑木氣不宜居土度若躔土度有災危金木不宜居四土行限木度必災殃火星忌剗四金度限若逢之人必死水星若躔四火度喚作斷橋無去路土行水限不為竒若行此度便驚危陽刃的煞奴欺主皆怕同行剗度中煞重權高逞劒鋒剛強勇敢氣如虹項王休逞拔山力韓信徒誇建國功一行剗度無星救堪喚危亡頃刻中倒限要訣日月夾煞凡命以日月為緊但臨於本年煞地為凶子午邜酉煞已宫是也二曜同居其上或前後兩宫皆有夾煞倘凶併即傷殘日月會煞如破碎三煞之鄉二曜同臨其上前後不出三十度少年行限亦危中年多不出此最是緊關之煞不可不信大忌官宫入煞即無解也必至傷殘日月犯刃如乙人辰為刃更以歲家三煞交會其上日月臨之雖吉星資扶行限至此亦為凶兆或者行限脫此煞尾亦不可脫若在強宫如官祿福德之類緊日月入四正命以日月為諸星之首三合對處有利害若會處亦有疾病如日月之會近朔晦即臨於朔前後不過三四日矣若日月會四正最怕天凶地煞併之天凶乃羅計土孛地煞乃陽刃四刑破碎之類若合此格限度臨之亦凶矣與其發福發禍更速若日月合天凶地煞在偏局則輕正局不免輕亦傷身甚則惡死惡星犯日月夫惡星犯限居日月之後則不凶犯日月之前為凶不小日月同犯促日月同行逢之於前皆為忌須是落空亡方不為傷若在強宫斷非所宜善星會日月善星會日月本以為吉人皆知吉善而不知其善中有惡是真惡也善者惡之胎若星曜會於吉地則可倘或臨於空亡陽刃破碎之鄉為災不可言雖處安居無事之時而有卒夭暴亡之患多出於人所不意大抵凶星居空亡則利吉宿居之則凶此理之必然也忌曜相攻且如未上安命本以夜忌土為煞若忌星居空亡則無力矣或又日生孛氣之類攻之則忌土何暇為我害倘以火助其威計黨其毒則其勢已甚必至夭亡善星失用何謂善星金木水氣之類是也一星居強得用則為我福受傷我失其恃限行於此流煞小有所衝必成險厄多是無事中暴忽之禍人所不知也所謂天星不能制地煞何謂鬼局金行寅午戌之類是也將煞就煞且如命宫正盤十二宫有祿馬貴人之神陽刃破碎七煞之類如寅申巳亥生人限行於酉上盤亦是酉字子午邜酉生人交巳限上盤亦是巳字此將煞就煞以邜宫命論以煞見煞且如丙戊生人陽刃是午行午限是此局更子午邜酉生人有上盤之陽刃下盤陽刃上之破碎下之破碎已限是福德亦為陽刃加的煞的煞加陽刃皆為以煞見煞若遇福德則遲見禍若遇官宫則速禍矣縱有吉星日月臨之其死尤速出煞入煞如人行限前是陽刃後是破碎如乙酉生辰上是三煞陽刃入已限破碎或前三煞後破碎限度出入之際如二十五六三十六七五十一二出限入限之際值出煞入煞之時更加流年小有凶併必難保夀元失陷人命以夀元為緊何為夀元納音是也如納音受尅乃木生人木望金金生人金望火倘鬼旺主衰四正三合見之行限至此值之雖少年亦主傷殘暗氣加臨且如氣星天文無象如盲人然亦是老人之象凡入命照命亦主刑尅孤獨主人􆆁祥如命宫三合對照之時人當有夀然亦須見合照無四正星以破之方好若老人行限值此設若流氣併當生之氣此年必主倒限倒限拾遺詩十二首主星遇煞是如何限到其中是煞窩流煞更來無避處閻浮一夢入南柯子宫箕限水星臨木氣同臨定不禁若在邜宫逢水孛夀應難買任千金寅宫立命邜宫行羅火金星亦可憎卯火命居行巳限倘逢金水不聊生丑宫辰限水星來命入黃泉不可猜土計更臨并會煞陰司有詔急相催辰宫午限煞之鄉切莫加臨見煞王救度有星須見土若無逢救定堪傷巳宫須看未與申莫教土計暗相侵土計若逢金到處反殃為吉更精神午宫木氣最無情孛若同行更可憎若遇煞星加得到限行至此必須傾未申土計莫教留酉宫土計不須憂只愁羅火居其上限行似火炙氷消酉宫到戌土之鄉亥上元來火母藏有煞加臨尤可畏若無煞到不須防戌宫子上煞來臨煞旺其間怎可禁木土不來休道好黃泉有詔急相尋亥命逢金固可憂火羅二曜亦為仇煞宫遇此加臨到身世悠悠蝶化周煞宫元係鬼門關地煞天星要細觀福曜加臨還壓煞凶星加到出應難星學大成卷二十八
